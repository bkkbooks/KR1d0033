body:
  text: 儀禮要義卷四十宋魏了翁撰既夕禮三陳器廟中南上壙前東面北上至于壙陳器于道東面北上釋曰自此盡拜送論至壙陳器及下棺訖送賔之事云統于壙者對廟中南上此則北上元士葬用輁軸設撥以引輴即紼天子諸侯用輴大夫朝廟亦得用茵先入以其茵入乃後屬引下棺於其上以須藉柩故茵先入云元士則葬用輁軸加茵焉者元士謂天子之士葬時先以輁軸由羡道入乃加茵於其上乃下棺於中知元士葬用輁軸者檀弓云孺子䵍之喪哀公欲設撥注云撥可撥引輴車所謂紼問於有若有若曰其可也君之三臣猶設之顔桞曰天子龍輴而幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也以此言之天子諸侯殯葬皆用輴朝廟用輴可知大夫雖殯葬不用輴朝廟亦用輴以其士殯葬不用輁軸朝廟得用之明大夫朝廟得用輴故上注云大夫諸侯以上有四周謂之輴以其大夫諸侯以上有四周謂之輴以其大夫朝廟得用輴故言之也諸侯之大夫有三命再命一命殯葬不得用輴天子之元士亦三命再命一命葬得用輁軸者春秋之義王人雖微猶在諸侯之上明天子之士尊謂之為元元者善之長柩至壙說載除飾屬引於緘耳屬引云於是說載者謂柩車至壙解說去載與披及引之等除飾者解去帷荒池紐之等然後下棺云更屬引於緘耳者案喪大記云君窆以衡大夫士以緘鄭注云衡平也人君之喪又以木橫貫緘耳居旁持而平之今齊人謂棺束為緘以此而言則棺束君三祍三束大夫士二祍二束束有前後於束末皆為緘耳以紼貫結之而下棺人君又於橫木之上以屬紼也主人俠羡道為位不哭以下棺宜靜主人袒衆主人西面北上婦人東面皆不哭釋曰主人袒者為下棺變婦人不言北上亦如男子北上可知不哭者為下棺宜靜云俠羡道為位者羡道謂入壙道上無負土為羡道天子曰隧塗上有負土為隧僖二十五年晉文公請隧弗許是也乃窆云窆下棺者春秋謂之塴凡禮幣皆用制五匹合為十制襲贈用制幣𤣥纁束云云釋曰云丈八尺曰制者朝貢禮及巡狩禮皆有此文以丈八尺名為制昏禮幣用二丈取成數凡禮幣皆用制者取以儉為節聘禮云釋幣制𤣥纁束注云凡物十曰束𤣥纁之率𤣥居三纁居二此注云二制合之束十制五合者則每一端丈八尺二端為一匹五匹合為十制也弔賔有趨揖問見友五者之等卒袒拜賔主婦亦拜賔即位拾踊三襲釋曰卒謂贈卒更袒拜賔云反位者各反羡道東西位其男賔在衆主人之南女賔在衆婦之南鄭知賔是相問之賔也凡弔賔有五此舉中者案雜記云相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退注云此弔者恩薄厚去遲速之節也相趨謂相聞姓名來㑹喪事也相揖嘗㑹於他也相問嘗相惠遺也相見嘗執摯相見也以此而言此經既葬而退是相見問遺之賔舉中以見上下藏用器等於棺旁加見見謂棺飾藏器於旁加見釋曰云器用器役器也者用器即上弓矢耒耜之等役器即上甲胄干笮之屬此器中亦有樂器不言者省文知有用器役器者以下别云包筲之等則所藏者是此器也云見棺飾也者飾則帷荒以其與棺為飾是以喪大記云飾棺君龍帷黼荒大夫畫帷畫荒士布帷布荒注云飾棺者以華道路及壙中不欲衆惡其親也此柩入壙還以帷荒加於柩故鄭注云及壙中也云更謂之見者如此則棺柩不復見矣以其唯見此惟荒故名帷荒為見是棺柩不復見也云先言藏器乃云加見者器在見內也內之者明君子之於事終不自逸也者以用器役器近身陳之帷荒在柩外周人名為牆若牆屋然其外又置翣為飾包筲藏於見外椁內棺外得容物藏包筲於旁云於旁者在見外也者以其加見乃云藏包筲故知見外也云不言罋甒饌相次可知者以其陳器之法後陳者先用先用罋甒後用包筲包筲藏明罋甒先藏可知棺椁之間君容柷大夫容壺士容甒引喪大記者欲見椁內棺外所容寬狹得容器物之意也鄉人助執紼及下棺實土故主人拜之實土三主人拜鄉人注謝其勤勞釋曰案雜記云鄉人五十者從反哭四十者待盈坎注云非鄉人則少長皆反以此而言於時主人未反哭鄉人並在故今至實土三遍主人拜謝之謝其勤勞勤勞者謂在道助執紼在壙助下棺及實土也即位踊襲如初注哀親之在斯謂既拜鄉人乃於羡道東即位踊無算如初反哭者於祖廟謂下士祖禰共廟者乃反哭入升自西階東面云云釋曰自此盡門外拜稽顙論主人反哭賔弔之事案檀弓云反哭升堂反諸其所作也注云親所行禮之處是也云反哭者於其祖廟者謂下士祖禰共廟故下經賔出主人送於門外遂適於殯宫適士二廟者自殯宫先朝禰後朝祖今反哭則先於祖後於禰遂適殯宫也案春秋僖八年經書用致夫人左氏云凡夫人不殯於廟者春秋之世多行殷法不與禮合也云不於阼階西面西方神位者以特牲少牢主人行事升降皆由阼階今不於阼階故決之以西方神位知者特牲少牢皆布席于奧殯又在西階反哭之禮主人男子等先入主婦婦人等後入故婦人入丈夫在位者皆踊婦人不升西階者由主人在西階故鄭云辟主人主婦反哭于室婦無外事反所飬小斂後主婦等位在阼階上西面案檀弓云主婦入于室反諸其所飬也鄭注云親所饋食之處但主人既在西階親所行禮之處以婦人無外事故於饋食之處哭也云出即位堂上西面也者自小斂奉尸侇于堂已後主婦等位皆在阼階上西面弔賔皆堂下北面賔長升堂釋詞賔弔者升自西階曰如之何主人拜稽顙知賔弔是衆賔之長者以其弔賔皆在堂下今升堂釋詞故知賔中為首者賔之長也云反而亡焉失之矣於是為甚者亦檀弓文引之證周人反哭而弔哀之甚也云弔者北面者以經云賔弔者升自西階即云曰如之何不見弔者改面之文明升堂北面可知云主人拜于位者拜于西階上東面位知者以其上經主人升自西階東面故知仍東面位也云不北面拜賔東者以其亦主人位也者鄉飲酒鄉射主人酬賔皆於賔東主人位特牲少牢助祭之賔主人皆拜送于西階東面故於東面不移以其亦主人故位也婦人即位于堂南上主人堂下直東序西面遂適殯宫皆如啓位拾踊三案士喪禮朝夕哭位云婦人即位于堂南上主人堂下直東序西面啓殯時云主人位如初又云主人入即位則此如啓位婦人亦即位于堂東面主人即位于堂下直東序西面直東序西面即中庭位也虞卒哭則緦小功免異門大功可歸兄弟出主人拜送丈夫婦人在殯宫拾踊既訖兄弟入門者出主人拜而送之知兄弟小功以下也者此兄弟等始死之時皆來臨喪殯訖各歸其家朝夕哭則就殯所至葬開殯而來喪所至此反哭亦各歸其家至虞卒祭還來預焉故喪服小記云緦小功虞卒哭則皆免是也云異門大功亦可以歸者大功以上有同財之義為異門則恩輕故可歸也卒哭後衆主人出闔門主人居倚廬衆主人出門哭止闔門主人揖衆主人乃就次釋曰云衆主人出門者則主人拜送兄弟因在門外云闔門者鬼神尚幽暗云次倚廬也者以未虞以前仍依於初東壁下倚木為廬齊衰居堊室大功張幃喪服傳云既虞柱楣翦屏此直云倚廬據主人斬衰者而言猶朝夕哭不奠自啓殯已來常奠今反哭至殯宫猶朝夕哭如前不奠耳檀弓云葬日虞弗忍一日離也是日也以虞易奠故不奠也三虞凡三日又隔柔日為卒哭祭三虞者再虞用柔日後虞改用剛日又隔柔日卒哭用剛日故云卒哭三虞之後祭名也云始朝夕之間哀至則哭至此祭止也者始死主人哭不絶聲小斂之後以親代哭亦不絶聲至殯後主人在廬廬中思憶則哭又有朝夕於阼階下哭至此為卒哭祭唯有朝夕哭而已以昭穆之班用柔日祔祔祭名明日以其班祔云班次也者謂昭穆之次第云祔卒哭之明日祭名者以卒哭用剛日祔用柔日是以下士虞記云卒哭祭即云明日以其班祔士不疾在燕寢疾在適室東首北墉記士處適寢寢東首于北墉下云將有疾乃寢於適室者以士喪篇首云士死于適室此記云適寢者適室一也故互見其文若不疾則在燕寢將有疾乃寢臥于適室故變室為寢也云東首者鄉生氣之所云墉下者墉謂之牆喪大記謂之北墉下必在北墉下亦取十一月一陽生於北生氣之始故也士喪禮論其死事故不云疾此記人記其不備疾者齊不齊不居適寢有疾疾者齊注正情性也適寢者不齊不居其室釋云有疾者既有疾當齊戒正情性故也云適寢者不齊不居其室者案鄉黨孔子齊居必遷坐又祭義云致齊於內散齊於外皆在適寢但散齊得鄉外故云於外耳是其齊居適寢也男女飬疾者皆齊正情性飬者皆齊注憂也案曲禮云父母有疾冠者不櫛行不翔笑不至矧怒不至詈不飲酒食肉疾止復故男女飬疾皆齊戒正情性也徹琴瑟父母有疾憂不在于樂故去之案喪大記云疾病內外皆掃君大夫徹縣士去琴瑟疾甚曰病內外掃徹䙝衣為賔客疾者與飬疾者皆齊明服𤣥端疾病外內皆掃釋曰云疾甚曰病者則外內皆掃為賔客來問疾自潔清也徹䙝衣加新衣此文承疾病者及飬病者則徹䙝衣據死者而言則生者亦去故衣服新衣矣喪大記亦云徹䙝衣加新衣鄭注云徹䙝衣則所加者新朝服矣互言之也加朝服者明其終於正也互者䙝衣是𤣥端新衣是朝服案司服士之齊戒服𤣥端則疾者與飬疾者皆齊明服𤣥端矣檀弓云始死羔裘𤣥冠者易之而已羔裘𤣥冠則朝服故知臨死所著新衣則朝服也故鄭云終於正也盡孝子之情禱五祀但不當請乃行禱于五祀云盡孝子之情者死期已至必不可求生但盡孝子之情論語子疾病子路請禱禱禮也請之非也五祀當考注五祀博言之士二祀門行始死之奠用吉器尸南首奠在牀東即牀而奠當腢用吉器若醴若酒無巾柶謂就尸牀而設之尸南首則在牀東當尸肩頭也此即檀弓云始死之奠其餘閣也與云用吉器器未變也者謂未忍異於生故未變至小斂奠則變毼豆之等為變矣云或卒無醴用新酒者釋經若醴若酒科有其一不得並有之事以其始死卒未有醴則用新酒若然醴酒俱有容有醴則用之不更用酒以其始死不備故也若小斂以後則酒醴具設甒二君大夫士之喪主人主婦等有坐有立室中唯主人主婦坐兄弟有命夫命婦在焉亦坐案此士喪禮故鄭云别尊卑也尊謂命夫命婦案大記君之喪主人主婦坐以外皆立若大夫喪主人主婦命夫命婦皆坐以外皆立也士之喪主人父兄主婦姑姊妹皆坐鄭云士賤同宗尊卑皆坐此命夫命婦之外立而不坐者此謂有命夫命婦來兄弟為士者則立若命夫命婦則同宗皆坐也喪不二孤廟不二主孤亦云喪主經直云主人唯君命出不言衆主人故記人辨之云衆主人不出在尸東耳云不二主者曽子問云喪有二孤廟有二主為非禮不云不二孤而云不二主者彼廟主與喪孤相對此孤不對廟主孤亦是喪主襚者委衣于牀不坐由牀高襚者委衣于牀不坐注牀高由便釋曰云牀高由便者曲禮云授立不跪授坐不立此委衣於牀者不坐委之以牀高婦人中帶若漢時禪襂陸氏襌作褌設明衣婦人則設中帶釋曰經直云設明衣不辨男子與婦人故此記人云設明衣者男子其婦人則設中帶鄭云中帶若今禪襂者鄭舉目驗而言但男子明衣之狀鄭不明言亦當與中帶相類有不同之處故别雖名中帶亦號明衣取其圭潔也襂音衫襌陸氏作褌音昆設握即士喪所謂握手設握裏親膚繫鈎中指結于掔釋曰手無決者以其經已云設握麗于掔與決連結據右手有決者不言左手無決者故記之云以握繫一端繞掔還從上自貫反與其一端結之者案上文握手用𤣥纁裏長尺二寸今裏親膚據從手內置之長尺二寸中掩之手才相對也兩端各有繫先以一端繞掔一幣還從上自貫又以一端鄉上鉤中指反與繞掔者結於掌後節中𨽻人涅廁如漢時徒役作者𨽻人涅廁鄭舉漢法今之徒役作者也云為人復往䙝之又亦鬼神不用者若然古者非直不共湢浴亦不共廁故得云死者不用也絞襟用布倫如朝服凡絞襟用布倫如朝服釋曰言凡非一之言以其唯小斂至大斂有絞大斂又有襟故知凡中有大小斂也言類如朝服者雜記云朝服十五升是也儀禮要義卷四十
