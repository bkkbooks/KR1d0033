body:
  text: 儀禮要義卷四十七宋魏了翁撰少牢饋食禮一鄭以少牢饋食為諸侯之卿大夫禮少牢饋食禮第十六釋曰鄭知諸侯之卿大夫者曲禮下云大夫以索牛用大牢是天子卿大夫明此用少牢為諸侯之卿大夫可知賓尸是卿不賓尸為下大夫為異也養牛羊曰芻犬豕曰豢豕亦稱牢少牢饋食之禮釋曰自此盡如初儀論卿大夫祭前十日先筮日之事云禮將祭祀必先擇牲繫於牢而芻之者案周禮地官充人職云掌繫祭祀之牲牷祀五帝則繫於牢芻之三月享先王亦如之注云牢間也必有間者防禽獸觸齧養牛羊曰芻三月一時節氣成案楚語諸侯卿大夫等雖不得三月亦皆有養牲之法故鄭據焉言芻之唯據羊若犬豕則曰豢故地官稿人職云掌豢祭祀之犬樂記亦云豢豕作酒非以為禍不言豕曰豢文略也云羊豕曰少牢者對三牲具為大牢若然豕亦有牢稱故詩公劉云執豕於牢下經云上利升牢心舌注云牢羊豕也是豕亦稱牢也但非一牲即得牢稱一牲即不得牢名故郊特牲與士特牲皆不言牢內事謂冠昏祭祀外事征伐巡守等日用丁巳取其自丁寧變改日用丁巳釋曰云內事用柔日曲禮文彼云外事以剛日內事以柔日內事謂冠昏祭祀出郊為外事謂征伐巡守之等若然甲丙戊庚壬為剛日乙丁己辛癸為柔日今直言丁巳者鄭云取其令名自丁寧自變改皆為謹敬之義故也云必先諏此日明日乃筮者以其舉事尚朝旦不可今日謀日即筮是以此文云日用丁巳乃云筮旬有一日是别於後日乃筮也筮旬有一日筮之日即齊筮旬有一日釋曰知旬十日者此云旬有一日以先月下旬之己筮來月上旬之己者除後己之前通前己為十日十日為齊後巳日則祭若然筮日即齊乃可故下文筮日即云乃戒官不云厥明也鄭直云下旬巳上旬己據用己一日而言若用丁言先月下旬丁筮來月上旬丁若丁己之外辛乙之等皆然鄭必言來月上旬不用中旬下旬者吉事先近日故也筮祭冠用祭服他事則否筮於廟門之外主人朝服西面於門東釋曰主人朝服者為祭而筮還服祭服是以上篇特牲筮亦服祭服玄端以此而言天子諸侯為祭卜筮亦服祭服案司服云享先王則衮冕祭義云易抱龜南面天子衮冕北面雖有明知之心必進斷其志焉是為祭而卜還服祭服則諸侯為祭卜筮服祭服可知若為他事卜筮則異於此孝經注云卜筮冠皮辨衣素積百王同之不改易士冠主人朝服注云尊蓍龜之道日用丁亥舉一以况餘或他亥亦可主人曰孝孫某來日丁亥用薦歲事於皇祖伯某以某妃配某氏尚饗釋曰云丁未必亥也直舉一日以言之耳者以日有十辰有十二以五剛日配六陽辰以五柔日配六隂辰若云甲子乙丑之等以日配辰丁日不定故云丁未必亥經云丁亥者不能具載直舉一日以丁當亥而言餘或以己當亥或以丁當丑此等皆得用之也云禘於大廟禮曰日用丁亥者大戴禮文引之證祭用丁亥之義也云不得丁亥則己亥辛亥亦用之者鄭云此吉事先近日唯用上旬若上旬之內或不得丁己以配亥或上旬之內無亥以配日則餘隂辰亦用之故春秋宣八年經書辛巳有事於大廟文二年經書八月丁卯大事於大廟昭十五年經書二月癸酉有事於武宫桓十四年乙亥嘗此等皆不獨用丁巳之日與亥辰也云無則苟有亥焉可也者此即乙亥是也必須亥者案月令云乃擇元辰天子乃耕注云元辰蓋郊後之吉亥也隂陽式法亥為天倉祭祀所以求福宜稼于田故先取亥上旬無亥乃用餘辰薦歲事于皇祖伯某鄭云且字非五十字云伯某且字也者以某在伯下若某在子上者某是伯仲叔季以某且字不得在子上故也云大夫或因字為諡者謂因二十冠而字為諡知者以某且字者觀德明功若五十字人人皆有非功德之事故知取二十字為諡也春秋者案隱八年左氏傳云無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族公命以字為展氏彼無駭之祖公子展以展為諡在春秋前其孫無駭取以為族故公命為展氏若然無駭賜族不賜諡引之者大夫有因字為諡證伯某某或且字有諡者即某為諡也此經云伯某是正祭之稱也若時有告請及非常祭祀則去伯直云且字言某甫則聘禮賜饔唯羮飪筮一尸若昭若穆僕為祝祝曰孝孫某薦嘉禮于皇祖某甫是也若卿大夫無諡正祭與非常祭一皆言五十字在子上與士正祭禮同則云某子故聘禮記云皇考某子是也特牲士禮無諡正祭稱皇考某子若士告請之祭則稱且字故士虞記云適爾皇祖某甫左執筮右手下韇擊筮史曰諾西面於門西抽下韇左執筮右兼執韇以擊筮釋曰左執筮及下云擊筮筮者皆是蓍以其用蓍為筮因名蓍為筮云兼執韇者上文已用右手抽上韇此經又用右手下韇是二韇兼執之也云易曰蓍之德圓而神者鄭彼注云蓍形圓而可以立變化之數故謂之神也引之者證蓍有神故擊而動之也主人命筮史述命同辭命龜述命異遂述命曰假爾大筮有常孝孫某來日丁亥用薦云云云遂述命者史既受主人命乃右還向閾外西面遂述上主人之辭謂之述命述命訖乃連言曰假爾大筮有常此是即席西面命筮與述命同為一辭者對士喪禮卜葬日云不述命若述命即與即席西面命龜異異者鄭注云述命命龜異龜重威儀多也對此大夫少牢述命命筮同筮輕威儀少為文也云常吉凶之占繇者謂應凶告吉應吉告凶則不常繇辭則占龜之長若易之爻辭若不吉則及逺日至下旬丁巳不吉則止若不吉則及逺日又筮日如初釋曰云逺日後丁若後己者案上曲禮云喪事先逺日吉事先近日近日即上旬丁巳是也若上旬丁巳不吉則至上旬又筮中旬丁巳不吉至中旬又筮下旬丁巳不吉則止不祭以其卜筮不過三也是以鄭云後丁若後巳也大夫筮尸後宿尸戒尸士有宿無戒宿注宿讀為肅進也古文作羞自此盡改筮尸論筮尸宿尸及宿諸官之事云大夫尊儀益多者其大夫宿戒兩有士有宿而無戒尸神象故主人肅祝擯吉則乃遂宿尸祝擯釋曰云筮吉又遂肅尸重尸也者以其諸官一肅云祝為擯者尸神象者決前筮尸時皆主人出命至此使祝擯以尸是神象故使祝擯也案特牲使宗人擯主人辭又有祝共傳命者士卑不嫌兩有與人君同此大夫尊下人君故闕之唯有祝擯而已又此尸不言出門面位案特牲主人宿尸時尸如主人服出門左西面鄭注云不敢南面當尊則大夫之尸尊尸出門徑南面故主人與尸皆不在門東門西也凡賓去皆拜送尸尊送主人揖不拜主人再拜稽首祝告曰孝孫某來日丁亥用薦歲事于皇祖伯某以某妃配某氏敢宿告尸以主人為此事來肅尸拜許諾主人又再拜稽首主人退尸送揖不拜尸不拜者尸尊釋曰凡賓主之禮賓去主人皆拜送今云尸送揖不拜者以大夫尸尊故也宗人北面請祭期大夫尊有君道主人門東南面宗人朝服北面請祭期主人曰比于子宗人曰旦明行事釋曰言比次早晏者一日一夜辰有十二冬日夏夜長短不同是以推量比次日辰之早晏也云主人不西面者大夫尊於諸官有君道也者決特牲主人門外西面士卑於屬吏無君道特牲視牲視殺别日此同日君亦别日明日主人即位于廟門之外云云牲北首東上司馬刲羊司士擊豕宗人告備釋曰自此盡東榮論視濯之事案特牲視牲與視殺别日今少牢不言視牲直言刲擊告備乃退者省比大夫禮視牲告充即刲擊殺之下人君士卑不嫌故異日矣必知人君視殺别日者大宰職云及執事視滌濯及納亨贊王牲事注云納亨納牲將告殺謂鄉祭之晨既殺以授亨人又云及祀之日贊玉幣爵之事注云日旦明也是其視牲與殺别日案祭義云君牽牲穆答君卿大夫序從既入門麗於碑卿大夫袒而毛牛尚耳諸侯禮殺於門內此大夫與特牲士皆殺於門外者辟人君司馬以火官刲羊而擊豕乃非司空云尚書傳曰羊屬火豕屬水者此尚書大傳文引之者解司馬刲羊以其司馬火官還使刲羊羊屬火故也案周禮鄭注司空奉豕司士乃司馬之屬官今不使司空者諸侯猶兼官大夫又職職相兼况士無官僕𨽻為司馬司士兼其職可知雍爨羊豕魚臘之竈凡溉陳之告挈雍人溉鼎匕俎于雍爨雍爨在門東南北上釋云雍人掌割亨之事者周禮饔人職文云凡溉者皆陳之而後告挈者案特牲視濯時皆陳之視訖告挈此亦當然注羊豕魚臘皆有竈竈西有鑊廩人掌米入故溉器于廩爨廩人溉甑甗匕與敦于廩爨廩爨在雍爨之北釋曰云廩人掌米入之藏者周禮地官廩人職文以其榖入倉人米入廩人故也云甗如甑一孔者案冬官陶人職云甗實二釜厚半寸脣寸甑實二釜厚半寸脣寸七穿鄭司農云甗無底甑以其無底故以一孔解之云匕所以匕黍稷者也者上雍人云匕者所以匕肉此廩人所掌米故云匕黍稷也鼎五在羊豕鑊之西魚臘與膚統於牲羮定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西釋曰自此盡簞巾於西階東論鼎及豆籩盤匜等之事云魚臘從羊膚從豕統於牲者案公食大夫云甸人陳鼎鄭注云甸人冡宰之屬兼亨人者此大夫雍人陳鼎者周禮甸人掌供薪蒸與亨爨聨職相通是以諸侯無亨人故甸人陳鼎此大夫又無甸人故使雍人與亨人聨職故亨人云職外內饔之爨亨故使饔人也云魚臘從羊膚從豕者上文溉鼎時鄭云羊豕魚臘皆有竈今陳鼎宜各當其鑊此三鼎在羊鑊之西二鼎在豕鑊之西故云魚臘從羊膚從豕也其實羊豕魚臘各有鑊也此直有羊豕言皆有鑊前注何知魚臘皆有竈案士虞禮云側亨於廟門外之右東面魚臘爨在廟門外東南豕腸胃不實于鼎膚脅革肉云豕無腸胃君子不食溷腴者禮記少儀文倫膚九知脅革肉者下文云膚九而俎亦橫載革順故知膚者是脅革肉倫擇也凡設水用疊沃盥用枓他文不具司宫設罍水于洗東有枓設篚于洗西南肆釋曰云凡設水用罍沃盥用枓禮在此也者言凡總儀禮一部內用水者皆須罍盛之沃盥水者皆用枓為之鄭言禮在此者以士冠禮直言水在洗東士昏禮亦直言水在洗東鄉飲酒特牲記亦云然皆不言罍器亦不云有枓其燕禮大射雖云罍水又不言有枓故鄭注總云凡此等設水用罍沃盥用枓其禮具在此故餘文不具省文之義也祭時將至主人朝服于阼東主人朝服即位于阼階東西面注為將祭也釋曰自此盡革順論祭時將至布設舉鼎匕載之事士以祝筵几此大夫官多故几席異官司宫筵于奧祝設几于筵上右之案特牲云祝筵几鄭云使祝接神此使司宫者此大夫禮異於士故司宫設席祝設几大夫官多故使兩官羊無别俎豕有膚俎以加故為下陳鼎于東方當序南云云膚為下匕皆加于鼎東枋釋曰此云膚為下門外陳鼎時不言至此言之者以膚者豕之實前陳鼎在門外時東有俎據鼎所陳則膚在魚上今將載於俎設之最在後故須分别之也云膚為下以其加者以羊無别俎而豕有膚俎故謂之加以加為下前膚鼎不見心舌故此特明之俎皆設于鼎西西肆肵俎在羊俎之北亦西肆釋曰以前膚鼎時不見心舌嫌不在爨故明之云皆如初為之于爨皆者皆羊豕羊豕皆有心舌也案特牲記云肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎即是未入鼎時則制此心舌然也既未入鼎時先制之是以雖出爨亦得為皆如初爨也云凡割本末食必正也者鄉黨孔子云割不正不食故割本末為食正也云肵之為言敬也者郊特牲文彼云肵之為言敬也言所以敬尸也云周禮祭尚肺者禮記明堂位云有虞氏祭心殷祭肝周祭肺是周之禮法祭肺而此肵俎不取肺而用心者以其事尸尚心舌心舌知滋味者故特牲記鄭注亦云心舌知食味者欲尸之饗此祭實鼎曰升實俎曰載今實俎亦言升上利升羊載右胖髀不升注升之以尊卑載之以體次案升羊載右胖者準例實鼎曰升實俎曰載今實俎而言升者以其升者上也是以載兩言之也但此經所載牲體多少一依上文升鼎不異而重序之者以其載俎之時恐與入鼎時多少有異鄭以俎拒為介距之距謂俎脛中橫節腸三胃三長皆及爼拒云云云拒讀為介距之距者案左氏傳昭二十五年云季郈之雞鬭季氏介其雞服氏云搗芥子播其雞羽鄭氏云介甲為雞著甲又云郈氏為之金距注云金距以金踏距今鄭君合取季氏之介又取郈氏之距而云介距之距也引之者彼距在雞足為距此俎距在俎為橫也是以云俎距脛中當橫節也案明堂位云俎有虞氏以梡夏后氏以嶡殷以椇周以房俎注云梡斷木為四足而已嶡之言蹶也謂中足為橫距之象周禮之距彼注云周禮謂之距即指此俎距而言是距為俎足中央橫者也此言俎距脛中當橫節者案明堂位夏后氏以嶡謂中足之橫下仍有殷之椇謂橫下仍有曲撓之足下又有周之房俎謂四足下更有跗鄭云上下兩間有似於堂房是橫下更有二事故言脛中當橫節也下利升豕進下食生人進腠腠是本下利升豕其載如羊無腸胃體其載於俎皆進下釋云進下變於食生也者決公食大夫鄉飲酒牲體皆進腠腠是本是食生人之法此言進末末為終謂骨之終食鬼神法故云變於食生也云所以交於神明者特牲文云不敢以食道檀弓文載魚皆右首有進腴進鰭進尾進首異司士三人升魚臘膚魚用鮒十有五而俎縮載右首進腴釋云右首進腴亦變于食生也者凡載魚為生人首皆向右進鰭其祭祀亦首皆在右進腴生人死人皆右首陳設在地地道尊右故也鬼神進腴者腴是氣之所聚故祭祀進腴也生人進鰭者鰭是脊生人尚味故公食大夫云魚七縮俎寢右鄭注云右首也寢右進鰭也乾魚近腴多骨鯁是也云有司載魚橫之少儀曰羞濡魚者進尾引之者欲見正祭與儐尸載魚禮異又與生人食禮不同以其尸之禮上大夫載魚橫之於人為縮於俎為橫既見乾魚則進首可知復取少儀者濡魚進尾見與乾魚異有司徹進首是上大夫繹祭儐尸之禮有乾魚橫於俎宜進其首則少儀羞濡魚者是天子諸侯繹祭可知以其天子諸侯繹祭乾濕皆有乾魚則進首鮮魚則進尾必知是天子諸侯繹祭者以其大夫儐尸云如膴祭少儀云祭膴又與儐尸加膴祭於上同故知義然也臘亦進下如羊豕載禮始見於此臘一純而俎亦進下肩在上注如羊豕凡臘之體載禮在此釋曰以諸經唯有臘文無升載之事故云載禮在此儀禮要義卷四十七
