body:
  text: 儀禮要義卷三十九宋魏了翁撰既夕禮二公及大夫皆有臣臣皆尊之曰公公賵玄纁束馬兩自此盡入復位杖論國君賵法之事云國君也者公及大夫皆有臣臣皆尊其君呼之曰公故在氏傳伯有之臣曰吾公在壑谷今此云公則國君非大夫君也以下云主人釋杖迎於廟門外與喪大記如此迎送者皆據國君也云賵所以助主人送葬也者案兩小傳皆云車馬曰賵施於生及送死者故云助主人送葬也者是以下注云賵奠於死生兩施注引季康子事證賵馬助人云兩馬士制也者謂士在家常乘之法若出使及征伐則乘駟馬其大夫以上則常乘駟馬故鄭駮異義云天子駕駟尚書康王之誥康王始即位云諸侯皆布乘黃朱詩云駟騵彭彭武王所乘魯頌云六轡耳耳僖公所乘小雅云駟牡騑騑大夫所乘是大夫以上駕駟之文也引春秋者左氏傳哀公二十三年春宋景曹卒注云景曹宋元公夫人小邾女季桓子外祖母又云季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉是以不得助執紼使求從輿人注云輿衆也又云曰以肥之得備彌甥也注云彌逺也康子父之舅氏故稱彌甥又云有不腆先人之産馬使求薦諸夫人之宰其可以稱旌繁乎注云稱舉也繁馬飾繁纓也引之者證公有賵馬助人之事主人釋杖迎賔尊君命衆主人不迎擯者出請入告主人釋杖迎於廟門外不哭先入云云云尊君命也者謂釋杖迎入是尊君命也前文袒襲皆據主人此則衆主人亦袒亦是尊君命云衆主人自若西面者以其主人一人迎賔入門門東而右其餘衆主人不迎賔明自若常位柩東西面可知也馬是庭實故設於庭在重南馬入設注設於庭在重南釋曰以馬是庭實故云設於庭知在重南者以庭實法皆參分庭一在南設之又重北陳明器不得設馬故知在重南棧謂柩車凡士車制無漆飾主人哭拜稽顙成踊賔奠幣於棧左服出注云棧謂柩車也凡士車制無漆飾者此棧車即柩車以其賔由輅西而致命云奠幣於棧者明此棧車柩車即蜃車四輪迫地無漆飾故言棧也云左服象授人授其右也者案聘禮宰授使者圭時云同面使者在左宰在右而授其右也此車南鄉以東為左尸在車上以東為右故授左服容授尸之右也公所將命曰賔謂卿大夫士賔賵者將命注賔卿大夫士也案自此盡知生者賻論賔及兄弟賻奠之事云賔卿大夫士也者以其上云君下有兄弟則此賔是國中三卿五大夫二十七士可知言將命者身不來遣使者將命告主人案雜記諸侯使卿弔鄰國諸侯主人使擯者告賔云孤某須矣貨財曰賻施於生者云貨財曰賻者公羊傳文也鄭知施於主人者以下經云知生者賻是施於主人也案春秋文五年春王使榮叔歸含且賵傳譏一人兼二事此賔所以兼事彼譏一人獨行不與介各行故譏若雜記云上客弔即其介各行含襚賵則不譏則卿大夫士禮一人行數事可也無器則捂受謂對面授受捂即遻若無器則捂受之云云以堂上授有並受法以其在門外若有器盛之則坐委於地若無器則對面相授受故云捂受之捂即遻也對面相逢受也就器謂玩好奠於陳謂明器之陳若就器則坐奠於陳釋曰知贈無常者案下記云凡贈幣無常注云賔之贈也玩好曰贈在所有言玩好者謂生時玩好之具與死者相知皆可以贈死者故此經云若就器則坐奠於陳者就器則是玩好之器也云陳明器之陳者以其廟中所陳者唯明器即陳於車之西以外或言薦或言設無言陳者兄弟賵奠謂小功以下非同財者兄弟賵奠可也釋曰知兄弟有服親者喪服傳云凡小功以下為兄弟既言兄弟明有服親者也知非大功以上者以大功以上有同財之義無致賵奠之法云可且賵且奠許其厚也者若然此所知許其賵不許其奠兄弟許其二賵兼奠而上經亦賔而有賵有奠有賻三者彼亦不使並行俱見之見三禮之中有則任行其一故揔見之所知許賵不許奠兄弟賵兼奠所知則賵而不奠言所知明是朋友通問相知言降於兄弟者許賵不許奠也云奠施於死者為多故不奠者但賵與奠皆生死兩施其奠雖兩施施於死者為多知者以其言奠為死者而行知死者贈玩好知生者賻貨財知死者贈知生者賻注云各主於所知者以其贈是玩好施於死者故知死者行之賻是補主人不足施於生者故知生者行之書賵於方書遣於䇿遣中并有贈書賵於方若九若七若五云云以賔客所致有賻有賵有贈有奠直云書賵者舉首而言但所送有多少故行數不同書遣於䇿云簡䇿者編連為䇿不編為簡故春秋左氏傳云南史氏執簡以往上書賵云方此言書遣於䇿不同者聘禮記云百名以上書於䇿不及百名書於方以賔客贈物名字少故書於方則盡遣送死者明器之等并贈死者玩好之物名字多故書之於䇿䇿書明器之物應在上文而於此言之者遣中并有贈物故在賔客贈賄與賵之下特書也編連為䇿不編為簡百名以上書䇿厥明陳鼎五於門外如初案自此盡主人要節而踊論葬日之明陳大遣奠於廟門外之事知五鼎是羊豕魚臘鮮獸各一鼎者以下經云羊左胖豕亦如之魚臘鮮獸皆如初與少牢禮同故知也云士禮特牲三鼎者特牲饋食禮陳三鼎故知也云盛葬奠加一等用少牢也者以其常祭用特牲今大遣奠與大夫常祭用少牢同其上遷祖奠時云如殯謂如大斂明此云如初亦如大斂在廟門外及東方之饌也雖如大斂鼎數仍不同以其大斂三鼎此則五鼎然大小斂時無黍稷朔月則有黍稷此葬奠又無黍稷者大斂前無黍稷者以其初死至朔月乃有之故鄭注云至此乃有黍稷今葬奠更無黍稷者以其始死至殯自啓至葬其禮同特豚有一鼎三鼎少牢有三有五大牢七以上凡牢鼎數或多或少不同若用特豚者或一鼎或三鼎若士冠禮醮子及婚禮盥饋并小斂之奠與朝禰之奠皆一鼎也三鼎者婚禮同牢士喪大斂朔月遷祖及祖奠皆三鼎而以魚臘配之是也其用少牢者或三鼎或五鼎三鼎者則有司徹云陳三鼎如初以其繹祭殺之於正祭故用少牢而鼎三也五鼎者少牢五鼎大夫之常事此葬奠士攝之奠用少牢亦五鼎聘禮致飱衆介皆少牢亦五鼎玉藻諸侯朔月少牢亦五鼎其用大牢者或七或九或十或十二其云七鼎九鼎者公食大夫下大夫大牢鼎七上大夫鼎九是也鼎十與十二者聘禮致飱於賔飪一牢鼎九羞鼎三是十二也又云上介飪一牢鼎七羞鼎三是其十若然案郊特牲云鼎俎奇而籩豆偶以象隂陽鼎有十與十二者以其正鼎與陪鼎各别數則為竒數也吉祭羊豕升右胖此凶事左胖其實羊左胖云云云反吉祭也者以其特牲少牢吉祭皆升右胖此用左胖故云反吉祭也云言左胖者體不殊骨也者既言左胖則左邊共為一段故云體不殊骨雖然下云髀不升則除髀以下膊胳仍升之則與上肩脅脊别升則左胖仍為三段矣而云體不殊骨據脊脅以上膊胳已下共為一陳器凡再由朝祖至夜斂藏今再陳陳饌已訖又陳明器也本作夜斂似寫誤云適斂者以其上朝祖之日已陳明器此復陳之者由朝祖至夜斂藏之至此厥明更陳之也既啓後不可離位迎賔唯君命出賔入者拜之釋曰此時有弔葬之賔主人皆不出迎但在位拜之所以不出迎者既啓之後既覩尸柩不可離位以迎賔唯有君命乃出將設葬奠先徹祖奠徹者入丈夫踊設於西北婦人踊云云云徹者入者謂將設葬奠先徹祖奠故云徹者入謂祝與執事徹祖奠者亦既盥乃入由重東而主人踊至徹訖設柩車西北則婦人踊也朔月奠遷祖奠鼎如殯此葬奠但言入鼎入釋曰以其徹者既祖當設葬奠故五鼎皆入陳也云陳之也蓋於重東北西面北上如初者以其上篇小斂奠舉鼎入阼階前西面錯大斂奠云舉鼎入西面北上又朔月奠云鼎入皆如初其遷祖奠云陳鼎皆如殯則皆在阼階下西面北上今此但云鼎入不言如初無正文故云蓋以疑之既疑而知在東北西面北上者以其奠祭在室掌設者皆陳鼎於阼階下西面如大小斂故知也重倚於門東北壁既虞埋倚處甸人抗重出自道道左倚之釋曰自此盡徹者出踊如初論將葬重及車馬之等以次出之事云道左倚之者當倚於門東北壁云還重不言甸人者上云二人還重不言甸人至此乃言甸人也云重既虞將埋之者雜記文彼注云就所倚處埋之但天子九虞諸侯七虞大夫五虞士三虞未虞以前以重主其神虞所以安神雖未作主初虞其神即安於寢不假重為神主又士大夫無木主明亦初虞即埋之也云不由闑東西者重不反變於恆出入者恆出入則闑東闑西也云道左主人位者檀弓云重主道注云始死未作主以重主其神也則重主死者故於主人之位埋之也鄭云今時有死者鑿木置食其中樹於道側由此者引漢法證重倚道左之事人臣賜車馬乃有遣車個謂包遣奠徹者入踊如初徹巾苞牲取下體案檀弓云國君七個遣車七乘大夫五個遣車五乘注云人臣賜車馬者乃得有遣車遣車之差大夫五諸侯七則天子九諸侯不以命數喪數略也個謂所包遣奠牲體之數也雜記曰遣車視牢具彼注云言車多少各如所包遣奠牲體之數也然則遣車載所包遣奠而藏之者與遣奠天子大牢包九個諸侯亦大牢包七個大夫亦大牢包五個士少牢包三個大夫以上乃有遣車以此而言士無遣車則所包者不載於車直持之而已士有一包而云包三個鄭又云個謂所包遣奠則士一包之中有三個牲體故云前脛折取臂臑後脛折取骼苞者象歸賔俎盛葬奠與少牢同云苞者象既饗而歸賔俎者也案雜記文而言云取下體者脛骨象行者以父母將行鄉壙故取前脛後脛下體行者以送之故云象行也云又俎實之終始也者此盛葬奠用少牢其載牲體亦當與少牢同案少牢載俎云肩臂臑膊骼在兩端又云肩在上以此言之則肩臂臑在俎上端為俎實之始膊骼在俎下端為俎實之終行器茵包以下從柩車在廟後出行器案包牲訖明器當行鄉壙故云行器茵包器序從注如其陳之先後車從此直云序從者序從即上文器西南上茵包已下是也次列車以從明器徹者出踊如初徹者謂包牲訖當徹去所釋者出廟門分禱五祀者徹者出時主人踊云於是廟中當行者唯柩車者以其上文明器及車馬鄉壙者皆出唯有柩車在廟史讀賵讀遣必釋算榮其多主人之史請讀賵執算從柩車當前束西面云云案自此盡滅燭論讀賵讀遣之事經直云史請讀賵鄭知史北面請者以其主人於車東請訖乃西面請時及入時書在前算在後則史西面之時算在史南西面今燭在史北近史照書為便若在左則隔算不便也讀書釋算則坐云必釋算者榮其多以公史讀書成其得禮之正以終公史自西方東面命母哭主人主婦皆不哭云云鄭知公史是君之典禮書者以其言公史故知君史案周禮大史小史皆掌禮則諸侯史亦掌典禮可知云成其得禮之正以終者以其死葬之以禮是死者得禮之終事故以君史讀而成之葬時乘車故以功布御柩披商祝執功布以御柩執披釋曰自此盡杖乃行論柩車在道發行之事云執功布者謂執大功之布粗者也云以御柩執披者葬時乘車故有柩車前引柩者及在旁執披者皆御治之從柩者丈夫右婦人左男賔前女賔後凡從柩者先後左右如遷於祖之序者上遷于祖時注云主人從者丈夫由右婦人由左以服之親疏為先後各從其昭穆男賔在前女賔在後云出宮踊襲以出宮有此踊襲以出宮有此踊者止為出宮大門外有賔客次舍之處父母生時接賔之所故主人至此感而哀此次是以有踊踊訖即襲襲訖而行也故檀弓云哀次亦如之注云次他日賔客所受大門外舍也孝子至此而哀柩至邦門謂國之北唯君命止柩餘否至於邦門公使宰夫贈玄纁束釋曰云邦門者案檀弓云葬於北方北首三代之達禮也此邦門者國城北門也贈用玄纁束帛者即是至壙窆訖主人贈死者宰夫將致命主人乃去杖不哭由柩車前輅之左右柩車在廟門時賔在柩車右主人在柩車左故知此亦當前輅左右也云當時止柩車者下記云唯君命止柩於堩其餘則否注云不敢留神明此宰夫致命時柩車止也在廟贈幣奠左服此道贈奠棺蓋中主人哭拜稽顙賔升實弊於蓋降主人拜送復位杖乃行釋曰賔既致公贈命訖主人乃哭拜稽顙賔乃升車實幣於棺之蓋中載以之壙上文在廟所贈之幣皆奠於左服此實於蓋中者彼贈幣生死兩施故奠左服此贈専為死者故實於蓋中若親投之然云復位反柩車後者上在廟位在柩車東此行道故在柩車後也儀禮要義卷三十九
