body:
  text: 儀禮要義卷四十一宋魏了翁撰既夕禮四大斂籩豆之實巾之小斂不巾凡籩豆實具設皆巾之釋曰論大小斂奠記經不備之事云實具設皆巾之者謂於東堂實之於奠設之二處皆巾故云皆巾之云籩豆偶而為具具則於饌巾之巾之加飾也者此鄭指解大斂之實饌於堂東之時巾之加飾對小斂之實於堂東不巾不加飾小斂奠設于床東巾之為在堂經久設塵埃加故雖一豆一籩亦巾之即禮記檀弓云喪不剝奠也與祭肉也與以其有牲肉故也小斂辟襲奠不出室猶以生事之小斂辟奠不出室注未忍至去之釋曰云未忍神逺之也者釋奠不出室之義始死猶生事之不忍即為鬼神事之故奠不出室云辟襲奠以辟斂者以經云小斂辟奠故知辟襲奠只為辟斂也云既斂則不出於室設於序西南者又解襲奠不出室若將大斂則辟小斂奠於序西南此將小斂辟奠于室至於既小斂則亦不出於室設于序西南故言不出室若然奠不出室為既斂而言也云事畢而去之者斂事畢奉尸侇于堂乃去之而設小斂奠于尸東始死至斂無踊節其哀未可節無踊節注其哀未可節也釋曰自死至此為節賔主拾踊有三者三有踊節而云無踊節者除三者三之外其間踊皆無節即上文踊無算是也絰象大帶絞帶象革帶餘布帶既馮尸主人袒髺髮絞帶衆主人布帶釋曰小斂于户內訖主人袒髺髮散帶垂經不云絞帶及齊衰以下布帶事故記者言之案喪服苴絰之外更有絞帶鄭注云絰象大帶又有絞帶象革帶齊衰以下用布齊衰無等皆是布帶也知衆主人非衆子者以其衆子皆斬衰絞帶故知衆主人齊衰以下至緦麻首皆免也大斂于阼未忍離斂後西階賔之大斂于阼注未忍便離主人位也主人奉尸斂云云釋曰經大斂時直云布席如初不言其處故記云大斂于阼階是主人位故鄭云未忍便離主人位也云主人奉尸斂于棺則西階上賔之者喪事所以即逺斂訖即奉尸斂于棺賔客之故檀弓云周人殯于西階則猶賔之是也巾奠而室事已故執燭者出巾奠執燭者滅燭出降自阼階由主人之北東釋曰上篇大斂奠時直云乃奠燭升自阼階無執燭降由主人之北故記人言之云由主人之北東也云巾奠而室事已者既巾訖是室事已故執燭者出也尊卑皆三日説髦去子飾既殯主人説髦釋曰自此盡乘車論孝子衣服飲食乘車等之事云既殯置銘于肂復位時也者案上篇云主人奉尸于棺乃蓋主人降拜大夫之後至者北面視肂卒塗祝取銘置于肂主人復位云復位者從西階下復阼階下位也凡説髦尊卑同皆三日知者喪大記云小斂主人即位于户內乃斂卒斂主人馮之主人袒説髦髺髮以麻注云士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也是尊卑同三日也必三日説髦者案禮記問喪云三日而不生亦不生矣以髦是子事父母之飾父母既不生故去之三日成服絞垂謂士禮除死三日三日絞垂釋曰以垂小斂日要絰大功以上散帶垂不言成服之時絞之故記人言之云成服日者士禮生與來日則除死三日則經云三日成服此云三日絞垂之日也小功緦麻初而絞之不待三日也吉凶皆冠武别材凶冠外縪冠六升外縪纓條屬厭釋曰云冠六升者據斬衰者而言齊衰以下冠衰各有差降云縪謂縫著於武者古者冠吉凶皆冠武别材武謂冠卷以冠前後皆縫著於武若吉冠則從武上鄉內縫之縪餘在內謂之內縪若凶冠從武下鄉外縫之謂之外縪故云外之者外其餘也云纓條屬者通屈一條繩為武垂下為纓屬之冠者吉冠則纓武别材凶冠則纓武同材以一繩從前額上以兩頭鄉項後交通至耳各綴之於武使鄉下纓結之云屬之冠者先為纓武訖乃後以冠屬著武故云屬也云厭伏也者以其冠在武下過鄉上反縫著冠冠在武下故云厭也五服之冠皆厭但此文上下據斬衰而言也首尊故冠三升衰裳同三升衰三升釋曰經直云衰鄭兼言裳者以其衰裳升數同故經舉衰而通裳但首對身首為尊故冠六升衰三升衰裳同三升也是以吉時朝服十五升至於麻冕鄭亦為三十升布與服一倍而解之倚廬在中門外東方北户居倚廬釋曰知在中門外東方北户者一釋案喪服傳云居倚廬既虞翦屏既練舍外寢鄭彼注云舍外寢於中門之外屋下壘墼為之不塗塈所謂堊室鄭以子夏傳以既練居堊室而言外外為中門外則初死居倚廬亦中門外可知也東方者以中門內殯宫之哭位在阼階下西面鄉殯明廬在中門外亦東方鄉殯是以主人及兄弟卿大夫外位皆西面云北户者以倚東壁為廬一頭至地明北户鄉隂至既虞之後柱楣翦屏乃西鄉開户也寢苫枕塊哀親之在草土寢苫枕塊釋曰孝子寢臥之時寢于苫以塊枕頭必寢苫者哀親之在草枕塊者哀親之在土云苫編藁者案爾雅白蓋謂之苫郭云白茅苫也與此不同者彼取潔白之義此不取潔白故鄭因時人用藁為苫而言編藁云塊堛也者亦爾雅文人日食六升四合喪則日一溢二升餘啜粥朝一溢米夕一溢米不食菜果釋曰云不在於飽者案周禮廪人中嵗人食三釜注云六斗四升曰釜三釜為米一斛九斗二升三十日之食則日食米六升四合今日食一溢二升有餘是不在於飽又案檀弓云必有草木之滋焉以為薑桂之謂也彼薑桂為滋味此鄭以菜果為滋味則薑桂之外菜果亦為滋味也云粥糜也者案爾雅饘糜謂粥之稀者故鄭舉其類謂性不能食粥者糜亦一溢米百二十斤曰石即一斛二十兩曰溢云二十兩曰溢為米一升二十四分升之一者依算法百二十斤曰石則是一斛若然則十二斤為一斗取十二斤分之升得一斤餘二斤斤為十六兩二斤為三十二兩取三十兩十升升得三兩添前一斤十六兩為十九兩餘二兩兩二十四銖二兩為四十八銖取四十銖十升升得四銖餘八銖銖為十絫十升升得八絫則是一升得十九兩四銖八絫於二十兩仍少十九銖二絫則别取一升破為十九兩四銖八絫分十兩兩為二十四銖則為二百四十銖又分九兩兩為二十四銖則為二百一十六銖并四銖八絫添前得四百六十銖八絫總分為二十四分且取二百四十銖分得十銖餘二百二十銖八絫在又取二百一十六銖二十四分分得九銖添前分得十九銖餘有四銖八絫四銖銖為十絫總為四十絫通八絫二十四分得二絫是一升為二十四分分得十九銖二絫將十九銖添前四銖為二十三銖將二絫添前八絫則為十絫為一銖以此一銖添前二十三銖則為二十四銖為一兩一兩添十九兩總二十兩曰溢在喪乘惡車唯拜君命拜賔有故主人乘惡車釋曰云拜君命拜衆賔及有故行所乘也者以其主人在喪恆居廬哭泣非有此事則不行知義然也引雜記者證喪事上下同無别義以其貴賤雖異於親一也故孝經五孝不同及其喪親唯有一章而已亦斯義也云然則此惡車王喪之木車者案巾車云王之喪車五乘發首云不車蒲蔽是王始喪所乘木車無飾與此惡車同故引之見尊卑同也喪車無飾故白狗幦蒲蔽犬服等白狗幦案玉藻云士齊車鹿幦此喪車無飾故用白狗幦以覆笭云未成豪狗者爾雅釋畜文也蒲蔽注藩也謂車兩邊禦風為藩蔽以蒲草亦無飾也御以蒲菆御謂御車者士乘惡車之時御車用蒲菆以策馬喪中示不在於驅馳云蒲菆牡蒲莖者案宣十二年楚熊負羈囚知罃知莊子以其族反之厨武子御每射抽矢菆納諸厨武子之房服注云菆好箭又云厨子怒曰非子之求而蒲之愛注云蒲楊栁可以為箭以此而言蒲非直得策馬亦為矢幹也犬服云笭間兵服者凡兵器建之於車上笭間喪中乘車亦有兵器自衛以白犬皮為服故云以犬皮為之取其堅固也云亦白者幦用白狗皮明此亦用白犬皮也木錧其車錧常用金喪用木是取少聲也約綏約轡知約是繩者案哀十一年左傳云人尋約吳髮短杜注云約繩也故知此約亦謂繩也平常吉時綏轡用索為之今喪中取其無飾故皆用繩為之也木鏕平常用馬鏕以金為之今用木故知亦取少聲也主婦車以疏布裧亦名幃裳童容主婦之車亦如之疏布裧注裧者至垂之此在亦如之之下見不與男子同云裧者車裳幃者案衛詩云漸車幃裳注云幃裳童容又案巾車后之翟車有容蓋容則童容也若然則裧與幃裳及容一也故注者互相曉也云於蓋弓垂之者案巾車云皆有容蓋容蓋相將其蓋有弓明於蓋弓垂之也大夫以上有二車士在喪有二車二車白狗攝服釋曰依正禮大夫以上有二車士卑無二車但以在喪可有副二之車非常法則有兵服服又加白狗皮緣之謂之攝服下室饋奠𨽻子弟掃潔朔月童子執帚郤之左手奉之釋曰自此盡下室論饋奠掃潔之事案曲禮掃地者箕帚俱執此直執帚不執箕者下文掃室聚諸窔故不用箕也云童子𨽻子弟者案桓二年左傳云士有𨽻子弟服注云士卑自其子弟為僕𨽻祿不足以及宗是其有𨽻子弟也童子掃室垂末內鬛從執燭者出比奠舉席掃室聚諸窔布席如初卒奠掃者執帚垂末內鬛云云釋曰案上文童子從徹者入及此經則從執燭者出者以其入則燭在先徹者在後出則徹者在先執燭者在後童子常在成人之後故出入所從不同也云室中東南隅謂之窔者爾雅釋宫文下室燕飬饋羞湯沐之饌如生平燕飬饋羞湯沐之饌如他日釋曰云燕飬者謂在燕寢之中平生時所有共飬之事則饋羞湯沐之饌是也如他日者今死不忍異於生平之日也云饋朝夕食也者鄭注鄉黨云不時非朝夕日中時一日之中三時食今注云朝夕不言日中者或鄭略言亦有日中也或以死後略去日中直有朝夕食也知羞四時之珍異者聘禮有禽羞俶獻聘義云時賜鄭云時賜四時珍異故知此羞亦四時珍異也引內則者證經進湯沐亦依內則之日數知下室日設之者言其燕食在燕寢又下經云朔月不饋食於下室明非朔月在下室設之朔月若薦新下室不饋月半亦然朔月若薦新則不饋于下室釋曰云以其殷奠有黍稷也者大小斂奠朝夕奠等皆無黍稷故上篇朔月有黍稷鄭注云於是始有黍稷唯有下室若生有黍稷今此殷奠大奠也自有黍稷故不復饋食於下室也若然大夫已上又有月半奠有黍稷亦不饋食於下室可知云下室如今之內堂者下室既為燕寢故鄭舉漢法內堂况之云正寢聽朝事者天子諸侯路寢以聽政燕寢以燕息案玉藻云朝玄端夕深衣鄭注云謂大夫士也則亦在正寢也凡葬先物土乃筮筮吉乃掘坎筮宅冡人物土釋曰自此盡不哭論筮宅卜日之事正經筮宅之事不物土故記人言之云相其地可葬者乃營之者凡葬皆先相乃筮之筮吉乃掘坎卜宅吉宗人告從于主婦卜曰吉告從于主婦主婦哭婦人皆哭主婦升堂哭者皆止釋曰正經直云闔東扉主人哭不云主婦升堂哭者皆止之事故記明之云卜曰吉宗人告從于主婦主婦哭時堂上婦人皆哭主婦升堂堂上婦人皆止不哭將啓殯內外不哭止歡嚻啓之昕外內不哭釋曰自上皆記士喪上篇事自此以下皆記此篇葬首將啓殯唯言婦人不哭不云男子故記以明之云內外男女不哭止歡嚻故也士二廟先朝禰如小斂奠其二廟則饌于禰廟如小斂奠乃啓釋曰自此盡主人踊如初論上士二廟先朝禰奠設及此次之事云其二廟則饌于禰廟者以先朝禰後朝祖故先於禰廟饌至朝設之故也云如小斂奠者則亦門外特豚一鼎東上兩甒醴酒一豆一籩之等也云祖尊禰卑也者欲見上文朝祖時如大斂奠此朝禰如小斂奠上士異廟中下士共廟云上士異廟據此經而言下士共廟據經而言中士亦共廟而唯言下士者略之其實中士亦共廟故祭法云適士二廟官師一廟鄭云官師中下之士是也朝禰廟正位兩楹間重不入朝于禰廟重止于門外之西東面柩入升自西階正柩于兩楹間奠止于西階之下東面北上主人升柩東西面衆主人東即位婦人從升東面奠升設于柩西升降自西階主人要節而踊注重不入者主於朝祖而行若過之矣門西東面待之便也釋曰此是上士二廟先朝禰之事雖言正柩于兩楹間奠位在户牗之間則此於兩楹間稍近西乃得當奠位亦如輁軸饌于柩階間而近西然也云衆主人東即位者柩未升之時在西階下東面北上柩升主人從升衆主人已下乃即阼階下西面位云婦人從升不云主婦者以其婦人皆升故總言之云主人要節而踊者奠升主人踊降時婦人踊也云門西東面待之便也者以其祖廟在東柩入禰廟明旦出門東鄉朝祖時其重於柩車先東鄉祖廟便也若先在門東西面及柩入乃回鄉東則不便喪在道在廟前後各一燭燭先入者升堂東楹之南西面後入者西階東北面在下釋曰此燭本是殯宫中照開殯者在道時一在柩前一在柩後今又一升堂一在堂下故鄭云先先柩者後後柩者適祖時燭亦然且記於此者上適祖時直有朝廟在道柩前後之燭至廟直云質明滅燭不見燭之升堂不升堂此文見至廟燭升與不升不見在道燭故云適祖時燭亦然且記於此以其皆有在道及至廟燭升與不升之事也朝禰之明日朝祖祝舉奠巾席從祝及執事舉奠巾席從而降柩從序從如初適祖釋曰自此盡不煎論至祖廟陳設及贈之事云此謂朝禰明日者以其下文朝祖之時序從如初中有燭若同日則朝祖之時已自明矣何須更有燭也以此言之則此朝祖與朝禰别日可知故鄭云舉奠適祖之序也云此祝執醴先酒脯醢爼從之巾席為後者此禰奠與小斂奠同凡喪自卒至殯與自啓至葬其變同云凡喪自卒至殯自啓至葬主人之禮其變同者主人常在喪位不出唯君命乃出迎及送其變同則此日數亦同以其此二篇薦者啓日朝禰又明日朝祖又明日乃葬與始死日襲明日小斂又明日大斂而殯亦同日主人主婦變服亦同以其小斂主人散帶主婦髽自啓至葬主人主婦亦同於未殯也云序從主人以下者案上注云主人與男子居右婦人居左以服與昭穆為位是也薦乘車謂魂車載旜亦攝盛薦乘車鹿淺幦干笮革靾載旜載皮辨服纓轡貝勒縣于衡注士乘棧車鹿淺鹿夏毛也幦覆笭玉藻曰士齊車鹿幦豹犆干盾也笮矢箙也靾也旜旌旗之屬通帛為旜孤卿之所建亦攝焉皮辨服者視朔之服貝勒貝飾勒有干無兵有箙無矢明不用釋曰此并下車三乘謂葬之魂車云士乘棧車者巾車之文云幦覆笭謂車前式豎者笭子以鹿夏皮淺毛者為幦以覆式是以詩韓奕云鞟鞃淺幭傳云鞟革也鞃軾中也淺虎皮淺毛也幭覆軾也孤卿建旜大夫士建物此士而用旜故云亦攝焉云皮辨服者視朔之服者案玉藻云諸侯皮辨以聽朔於大廟鄉黨孔子云素衣麑裘亦是視朔之服君臣同服是以此士亦載皮辨視朔之服也朝君有朝無夕士朝夕謂私朝道車載朝服釋曰知道車朝夕及燕出入之車者但士乘棧車更無别車而上云乘車下云稿車此云道車雖有一車所用各異故有乘車道車稿車之名知道車朝夕者案玉藻云朝玄端夕深衣鄭注云謂大夫士也私朝之服春秋左氏傳云朝而不夕據朝君於是有朝無夕若然云朝夕者士家朝朝暮夕當家私朝之車又云及燕出入者謂士家遊燕出入之車案周禮夏官有道右道僕皆據象路而言道又案司常云道車載燧鄭注云王以朝夕燕出入與此道車同則士乘棧車與王乘象路同名道云朝服日視朝之服者案鄉黨云緇衣羔裘是孔子所服鄭注云諸侯視朝之服是君臣同服故玉藻云諸侯朝服以日視朝士之道車而用朝君之服不用私朝玄端服者乘車既載孤卿之旜故道車亦載朝君之服攝盛也田獵辨服棧車此小獵行鄙蓑笠稿車稿車載蓑笠釋曰云稿猶散也者司常云斿車載旌注云斿車木路也王以田以鄙謂王行小小田獵巡行縣鄙此散車與彼斿車同是遊散所乘故與斿車同解若然士亦與王同有以田以鄙者亦謂從王以田以鄙也若正田獵自用冠辨服乘棧車也云蓑笠備雨服者案無羊詩云爾牧來思何蓑何笠彼注云蓑所以備雨笠所以御暑而此并云備雨者非直蓑以御雨笠亦以備雨故都人士詩注云笠所以御雨喪事不辟暑是以并云備雨之服云今文稿為潦者案周禮輪人為蓋鄭云禮所謂潦車謂蓋車與若然彼注此文則為潦車者義亦通巾奠乃飾棺牆謂帷荒巾奠乃牆釋曰正經直云降奠當前束商祝飾棺不云巾奠故記人辨之巾奠訖商祝乃飾棺牆即帷荒與棺為飾故變飾棺云牆也茵著用茅秀廉薑澤蘭香且御濕茵著用荼實綏澤焉荼茅秀也綏廉薑也澤澤蘭也皆取其香且御濕釋曰茵內非直用茅秀兼實綏澤取其香知且御濕者以其在棺下須御濕之物故與荼皆所以御濕菅筲三其實皆瀹未知神所享葦苞長三尺一編注用便易也菅筲三其實皆瀹釋曰經直云筲三黍稷麥不辨苞之所用及黍稷生熟故記人明之是以云筲用菅草黍稷皆淹而漬之云未知神之所享者以其鬼神幽暗生者不見故淹而不熟以其不知神之所享故也云不用食道所以為敬者案檀弓云飯用米貝不以食道食褻則不敬公賜有常賔贈幣無常在所有凡贈幣無常釋曰正經云公賜用玄纁束帛是贈有常矣上又云賔贈奠幣如初直云奠幣如初不云物色與多少故記人明之以其賔客非一故云凡贈幣無常鄭云賔之贈也云玩好曰贈在所有者詩云雜佩以贈之是贈在所有車立道左謂墓東墓南面為正車至道左北面立東上釋曰正經直云陳器于道東北上統于壙以其入壙故也不云三等之車面位之事故記人明之以其不入壙故東上不統於壙也云道左墓道東者據墓南面為正柩車至壙乃斂車服載之示不空歸柩至于壙斂服載之釋曰正經直云柩至于壙屬引乃窆不云柩車斂服載之故記人明之云柩車至壙祝説載除飾乃斂乘道稿車服載之不窆以歸者此解説載謂下棺於地除飾謂除去帷荒柩車既窆乃斂乘車及辨服道車朝服稿車蓑笠三者之服載之於柩車示不空之以歸者也云送形而往迎精而反者禮記問喪文引之證此不空歸之義云亦禮之宜者形往則送之主人隨柩路是也精反則迎之主人隨精而反卒窆而歸不驅其反如疑卒窆而歸不驅釋曰此文解上斂服載之下棺訖實土三孝子從蜃車而歸不驅馳而疾者疑父母之神不歸云孝子往如慕反如疑者亦禮記問喪文遂匠納車載柩遂引徒匠載窆既正柩賔出遂匠納車於階間釋曰正經不云納柩車時節故記人明之既朝正柩於兩楹之間當此之時遂匠納柩車於階間云遂人匠人也者以其周禮有遂人匠人天子之官士雖無臣亦有遂人匠人主其喪事云遂人主引徒役匠人主載柩窆職相左右也者案周禮遂人職云大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役注云致役致於司徒給墓上事陳役者主陳列之耳是遂人主引徒也又鄉師職云及葬執翿以與匠師御匶而治役謂監督其事又此遂人與匠人同納車于階間即匠人主載窆與遂人職相左右也云車載柩車者以其此云納車于階間正為載柩若乘車道車之等則當東榮不在階間蜃車與輴同有輪無輻曰輇云周禮謂之蜃車者案遂師職云大喪使帥其屬以幄帟先及蜃車之役注云蜃車柩路四輪迫地而行有似於蜃因取名焉是也云雜記謂之團或作輇或作摶聲讀皆相附耳未聞孰正者言或作輇作摶者皆合禮記别本故云皆相附耳但未知孰正也云其車之輿狀如牀中央有轅前後出者觀鄭此注其輿與輴車同亦一轅為之云設前後輅者正經唯云前輅言前以對後明知亦有後輅云輿上有四周者此亦與輴車同云下則前後有軸以輇為輪者此則與輴異以其輴無輪直有轉轔此有輇輪引許叔重説者案許氏説文云有輪無輻曰輇證此輇無輻也弓矢之新謂死者沽功示不用弓矢之新沽功釋曰自此盡篇末論死者用器弓矢粗惡之事以其正經直云用器弓矢不辨弓矢善惡及弓矢之名故記人明之設之宜新者為死者宜用新物云沽示不用者沽謂粗為之翭矢骨鏃短衛示沽不可用翭矢一乘骨鏃短衛云骨鏃短衛亦示不用也者案上文沽功鄭云示不用故此亦之云生時翭矢金鏃者此亦爾雅釋器文案彼云金鏃翦羽謂之翭是也此言短羽即翦羽也云凡為矢五分苛長而羽其一者案周禮矢人上陳五矢下乃云五分其長而羽其一故云凡以廣之也案鄭彼注云矢苛長三尺五分羽一則六寸也謂之羽者指體而言謂之衛者以其無羽則不平正羽所以防禦其矢不使不調故名羽為衛志矢習射矢即書射之有志志矢一乘軒輖中亦短衛釋曰云志猶擬也者凡射志意有所準擬故云志猶擬也云習射之矢者案司弓矢鄭注云恆矢之屬軒輖中所謂志以此言之則此恆矢也在八矢之下如是習射矢者以其矢中特輕於習射宜也案六弓唐弓大弓亦授習射者則此矢配唐大也引尚書盤庚者證志為準擬之事輖􅜛者鄭讀輖從􅜛以其車傍周非是軒􅜛之􅜛故讀從執下至云無鏃短衛翭矢生時用金鏃死用骨鏃志矢生時用骨鏃死則令去之云生時志矢骨鏃者亦爾雅釋器文案彼云骨鏃不翦羽謂之志此志矢是也云凡為矢前重後輕也者案司弓矢鄭注云凡枉矢之制枉矢之屬五分二在前三在後殺矢之屬三分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中若然前重後輕者據殺矢翭矢枉矢潔矢矰矢茀矢而言引之者證此志是恆矢痺矢無前重後輕之義但周禮有八矢唯用此二矢者以其八矢之內翭矢居前最重恆矢居後最輕既不盡用故取其首尾者也儀禮要義卷四十一
