body:
  text: 儀禮要義卷十八宋魏了翁撰大射儀三三耦卒射公與卿大夫將射三耦卒射賔降取弓矢于堂西釋曰自此盡共而俟論第二畨射三耦訖次公卿大夫之事但此賔先降取弓矢即升堂者以其不敢與君並俟告故下云司射告射于公小射正取公之決拾并授弓拂弓是君得告乃取弓矢是不敢與君並俟告也云取之以升俟君事畢者案下文云公將射則賔降適堂西袒決遂執弓搢三挾一個升自西階是君事畢君事畢賔降袒決遂乃更升若然賔於此不即袒決遂者去射時逺故不可即袒大射正與司射各一小射正不止一人小射正授弓拂弓皆以俟于東堂據此經上下或云大射正或云司射或云小射正不同者今行射禮大射正一人為上司射次之或云小射正若然大射正與司射各一人據其行事小射正不止一人而已此云小射正一人取公之決拾於東坫上下云小射正奉決拾以笥與此一人此又云小射正授弓與取決拾别則小射正二人也云授弓當授大射正者下云大射正執弓以袂以授公明此小射正授弓者當授大射正也大射正司正司射之同異與上注似違大射正執弓皆以從於物注大射正舍司正親其職前解大射正與司射别人案此注大射正舍司正親其職則大射正與司正為一人又案上文司射請立司正遂立司射為司正則司射又與大射正為一人與上解似相違者以大射正與射人俱掌射事相當則大射正與司射别若通而言之射人不對大射正射人亦名大射正鄭謂既袒乃設拾拾當在襦上公袒朱𥜗卒袒云云小射正又坐取拾興贊設拾云云案上文設決訖乃云公袒朱襦始云小臣正贊設拾拾當拾斂膚體冝在朱襦之上故鄭云既袒乃設拾拾當以韝襦上鄉射云袒決遂以其無襦故遂與決得俱時設若大夫對士射袒纁襦設遂亦當在袒後射正順弓隈以授公公揉之觀其安危大射正執弓以袂順左右隈云云公親揉之注云揉宛之觀其安危也者案考工記弓人云其弓安其弓危者以弓弱者為危其弓强者為安則此云觀安危者謂試弓之强弱注云隈弓淵也獻酬皆授罰爵不授惟大夫已上授司宫士奉豐云云勝者之弟子洗觶升酌散南面坐奠于豐上云不授者射爵猶罰爵略之者案詩云兕觥其觩㫖酒思柔注云觩陳設貌觥罰爵不手授此飲射爵亦不手授故云猶罰爵也案獻酬之爵皆手授之此不手授故云略之也若然士以下飲罰爵者取於豐大夫已上皆手授尊之故下注云授爵而不奠豐尊大夫也其三耦之內雖大夫亦取於豐者以其作三耦與衆耦同事不復殊之不勝之黨皆飲若有數中亦得助祭命三耦及衆射者云云釋曰以其經云三耦及衆射者皆升飲射爵者言升之明知不勝之黨無不飲但大射者所以擇士以助祭今若罰爵在於不勝之黨雖數中亦受罰及其助祭雖飲射爵亦得助祭但在勝黨雖不飲爵若不數中亦不得助祭以其飲罰據一黨而言取其助祭取一身之藝義故不同也尊者西階上北面立飲不以己尊枉正罰賔諸公卿大夫受觶于席以降適西階上北面立飲云云云不可以己尊枉正罰也者正罰謂上文飲者在左勝者在右於西階之上北面跪取豐上之觶飲之是也今雖不取於豐亦於西階北面飲公不敢用罰爵從獻酬之爵若飲公則侍射者降洗角觶升酌散降拜釋曰云侍射賔也者以其賔與君對射耦自相飲故知侍射者賔也云飲君則不敢以為罰從致爵之禮也者罰爵如上文罰者飲之而已今則從燕臣致爵於君之禮下文所謂夾爵者是也但此經云角觶與上文觶皆是三升曰觶觶與角連故謂之角觶或單言角或單言觶是以禮記少儀云侍射則約矢侍投則擁矢勝則洗爵而請不角注云角謂觥罰爵也於尊長與客如獻酬之爵又詩云我姑酌彼兕觥毛𫝊云兕觥角爵箋云兕觥罰爵是其角觶兕觥皆罰爵此角觶以兕角為之非謂四升曰角者也若然此角觶對下文飲君云象觶故云角觶謂賔酌如兕自飲君即下文賔降洗象觶亦從獻酬之爵不敢復用罰爵也君若不射則不獻大侯之獲司宫尊侯于服不之東北云云釋曰自此盡侯而俟論設尊獻服不之事云不於初設之者不敢必君射也君不射則不獻大侯之獲者若然此設大侯之獲者君不射則不設之不豫設者不敢必君射案上張侯先設大侯君射大侯張之必君射者但聖人設法一與一奪以大射者為祭擇士所以助祭人君不可不親故奪其尊使之必射故豫張大侯至此設大侯之尊君射訖乃設之者許其自優暇容有不射之理是以不射則不設射乃設之凡祭祭肺不離肺皆不奠爵獲者左執爵右祭薦俎二手祭酒云祭俎不奠爵不備禮也者祭俎者謂祭俎上肺但肺有二種此云祭是祭肺也非是離肺知者案鄉射記云獲者之俎折脊脅肺臑又曰釋獲者之爼折脊脅肺皆有祭則此俎祭肺亦離肺若然凡祭祭肺皆不奠爵是其常云此不奠爵不備者但祭肺離肺兩有祭肺不奠爵若空有祭肺亦不奠爵今祭俎不奠爵故云不備禮司馬師獻𨽻僕人等如獻服不司馬師受虛爵洗獻𨽻僕人巾車獲者皆如大侯之禮云巾車張大侯者舉尊者而言其參侯干侯亦張之是以上文司馬遂即量人巾車張三侯此直云大侯舉尊而言之云及參侯干侯之獲者以其上文以獻大侯服不獲者明此經獲者是糝侯犴侯可知云𨽻僕人巾車於服不之位受之知者以其𨽻僕人巾車素無其位而經云如大侯之禮明就大侯之位受獻是以鄭云功成於大侯也云不言量人者此自後以及先可知者案上張侯之時先言量人後言巾車君射之時乃有𨽻僕人掃侯道受獻先言𨽻僕人而後言巾車是自後以及先𨽻僕尚得獻明量人在巾車之先得獻可知凡繼射者命耦而已不作射不作取矢三耦既拾取矢諸公卿大夫皆降如初位云云云凡繼射命耦而已不作射不作取矢從初者言凡繼射命耦者前三耦卒射後大夫降至三耦之南西面北上司射東面于大夫西北耦大夫與大夫命上射曰某御於子命下射曰子與某子射卒遂比衆耦云云至公即席後賔升階復位還筵而後卿大夫繼射後衆皆繼射釋獲皆如初注云諸公卿言取弓矢衆言釋獲互言也鼓為樂節今投壺篇猶具存司射命曰不鼓不釋注不與鼓節相應不釋算鼓亦樂之節釋曰引學記者證鼓得與樂為節之事云凡射之鼓節投壺其存者也者射之鼓節多少無文案今禮記投壺篇圖出魯鼓薛鼓云取半以下為投壺節盡用之為射節是其投壺存者云周禮射節天子九以下者是射人樂師皆有此文貍首即曽孫之詩樂正命大師曰奏貍首間若一注貍首逸詩曽孫也貍之言不來也案騶虞采蘋是篇名貍首篇名可知射義下文諸侯君臣盡志於射又云故詩曰曽孫侯氏四正具舉小大莫處御于君所注云此曽孫之詩諸侯之射節也四正正爵四行也四行者獻賔獻公獻卿獻大夫乃後樂作而射也上云貍首下云曽孫曽孫章頭也彼注以燕以射先行燕禮乃射是也云間若一者調其聲之疏數重節者謂九節七節五節中間相去或希疏或密數中間使如一必疏數如一者重此樂故也大夫雖無俎賔及公卿皆送俎故亦降諸公卿取俎如賔禮遂出授從者于門外大夫降復位注門東北面位釋曰云大夫降者大夫雖無俎以賔及公卿皆送俎不可獨立於堂故降復位云門東北面位者謂初小臣納卿大夫門東北面揖位案下文賔諸公卿皆入門東面北上謂在西階下知大夫不復在西階下位者以其言復位者復前位其西階下舊無位大射先燕燕法牲用狗羞用鱉鯉等羞庶羞注羞進至鶉鴽釋曰知有􅍧肝膋者此大射先行燕禮燕法其牲唯有狗又案內則云肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼注云膋腸閒脂故知此羞中有肝膋也又知有狗胾醢者以其公食大夫有牛胾炙羊胾炙豕胾炙此燕無三牲故知胾醢亦用狗知有炮鱉膾鯉者案六月詩云吉甫燕喜既多受祉又云飲御諸友炮鱉膾鯉故知有此也公食大夫有王事之勞乃有之故六月詩鄭注以吉甫遠從鎬地來又日月長久今飲之酒使其諸友恩舊者侍之又加其珍美之饌所以極勸之也是有王事之勞乃有之無王事之勞則無故公食大夫不見也又知有雉鶉鴽者公食大夫二十豆有此四者二升觚獻大夫三升觶獻士用小者尊主人洗酌獻士于西階上士長升拜受觶主人拜送釋曰自此盡奠于篚論獻士及祝史等之事云獻士用觶士賤也者言獻士用觶對上獻大夫已上觚觚二升觶三升用大者賤用小者尊賔為士舉旅行酬因媵觶于公賔降洗升媵觶于公酌散下拜公降一等云云自此盡旅酌論賔舉爵為士舉旅行酬之事注賔受至再拜釋曰云賔受公賜多矣禮將終冝勸公序厚意也者上文為賔為卿為大夫舉旅皆臣自致爵今此其賔為士舉旅行酬因得為賔致爵於君階下位無席户牖間位則有席賔降洗象觚升酌膳云云賔升成拜公答拜賔反位自此以前賔位在西階下東面無席户牖之間位則有席此賔升成拜不言降反位明反位者反於户牖之間席位云此觚當為觶者凡旅酬皆用觶獻士尚用觶故知觚當為觶下經觚亦當為觶凡受酬拜後就席坐行酒漢時亦然公坐取賓所媵觚興唯公所賜受者如初受酬之禮降更爵洗升酌膳下再拜稽首小臣正辭升成拜公答拜乃就席坐行之坐行之注若今坐相勸酒堂上旅皆坐酬士立堂下故大夫興酬大夫卒受者以爵興西階上酬士士升大夫奠爵拜士答拜云興酬士者決向堂上相旅皆坐相酬執爵者行之大夫未能受酬者輒興西階上故鄭云士立堂下與上坐者異也士旅酬祝史以下于西階上士旅于西階上辨注祝史小臣師旅食皆及焉釋曰鄭知祝史以下皆得旅酬者前得獻祝史與旅皆得獻明此旅酬得之可知士賤不坐無執爵者故以次自相酬士旅酌注旅序至爵者釋曰云無執爵者對上文卿大夫等有執爵者以其坐故也士無執爵者以其賤不坐故以次自酌以相酬無執爵者也公食堂上夾北有宰位射禮無遂獻左右正與內小臣皆於阼階上如獻庶子之禮云庶子內小臣位在小臣師之東者案公食堂上夾北有宰夫內宰在東北此射禮堂上夾北無宰位又案執事者堂上又非樂人不得在樂正位以其與小臣師同名小臣故知小臣師之東也又云少退西上者見公食在宰東北少退故知此亦少退知西上者以此位皆西上故也凡行酬即轉爵遞飲猶待公卒爵乃飲無算爵云云受賜爵者以爵就席坐公卒爵然後飲案凡行酬之法轉爵遞飲今膳散兩有宜得即飲猶待公卒爵乃飲猶代飲然明惠從公來嫌得即飲不代故著嫌必卒爵然後飲故曰嫌不代於此無升成拜以將醉正臣禮賔及諸公卿大夫皆降西階下北面至升反位注升不成拜云於例臣於堂下再拜稽首得小臣以君命辭其拜不成當升成拜今直升不成拜者以其拜於下是臣之正禮故鄭云於將醉正臣禮公不送賔賔禮訖正臣禮公不送注臣也至禮也釋曰案燕義云使宰夫為獻主臣莫敢與君亢禮嚮來安燕交歡君若送之是臣與君亢禮故君不送賔也故燕禮注云賔禮訖臣禮是也燕在路寢次射于郊學故末云公入驁公入驁注驁夏至入也釋曰云驁夏亦樂章也者案周禮鐘師有九夏皆樂章其中有驁夏云此公出而言入者射宫在郊以將還為入者天子射在虞庠周之小學在西郊案鄉射記於郊則閭中鄭注云諸侯大學在郊是諸侯大射所故言入射宫在郊以將還為入也鄭知燕在路寢者燕禮記云燕朝服於寢與羣臣賔客燕不合在燕寢故知從路寢大射三番多依鄉射故不重釋此篇所解多不具者以其諸侯大夫射先行燕禮大射三番多依鄉射是以與禮同者於此不復重釋之也儀禮要義卷十八
