body:
  text: 儀禮要義卷三宋魏了翁撰士冠禮三冠子不醴則醮用酒謂用舊俗若不醴則醮用酒注謂國有舊俗可行聖人用焉不改釋曰自此已上説周禮冠子之法自此已下至取籩脯以降如初説夏殷冠子之法云若不醴則醮用酒者案上文適子冠於阼三加訖一醴於客位是周法今云若不醴則醮用酒非周法故知先王法矣故鄭云若不醴謂國有舊俗可行聖人用焉不改者也云聖人者即周公制此儀禮用舊俗則夏殷之禮是也云曲禮曰已下者是下曲禮文也云君子行禮不求變俗者與下文為目謂君子所往之國不求變彼國之俗若衛居殷墟者也故康誥周公戒康叔居殷墟當用殷法是以云兹殷罰有倫使用殷法故所引曲禮皆據不變彼國之俗但君子行禮不求變俗有二塗若據曲禮之文云君子行禮不求變俗鄭注云求猶務也不務變其故俗重本也謂去先祖之國居他國又云祭祀之禮居喪之服哭泣之位皆如其國之故謹修其法而審行之注其法謂其先祖之制度若夏殷者謂若杞宋之人居鄭衛鄭衛之人居杞宋若據彼注謂臣去己國居他國不變己國之俗是以定公四年祝他云殷人六族在魯啓以商政亦不變本國之俗故開商政示之皆據當身居他國不變己國之俗與此注引不同者不求變俗義得兩合故各據一邊而言言醴與醮皆酌而無酬酢酌而無酬酢曰醮醴亦當為禮釋曰云酌而無酬酢曰醮者鄭解無酬酢曰醮唯據此文而言所以然者以周法用醮無酬酢曰醮案曲禮云長者舉未釂鄭注云盡爵曰釂是醮不專於無酬酢者若然醴亦無酬酢不為醮名者但醴大古之物自然質無酬酢此醮用酒酒本有酬酢故無酬酢得名醮設庭洗當在設尊前有篚篚亦盛勺觶洗有篚在西南順釋曰知洗庭洗者上周法用醴之時醴之尊在房今醮用酒與常飲酒同故洗亦當在庭是以下云賓降取爵于篚卒洗升酌故知洗在庭也設洗法在設尊前此洗亦當在設尊前席之故此直云洗有篚在西不言設也若然上不言設洗者以其上云醮用酒即連云尊文勢如此故不言設洗云當東榮南北以堂深者上已有文也云篚亦以盛勺觶者周法用醴在房庭洗無篚此用酒庭洗有篚故周公設經辨其異者但醴篚在房以盛勺觶此庭洗篚亦盛勺觶故云亦也周之禮三加乃一醴此始加訖即醮始加醮用脯醢賔降取爵于篚辭降如初卒洗升酌釋曰云始加醮用脯醢者此言與周别之事周家三加訖乃一醴於客位用脯醢此加訖即醮於客位用脯醢是其不同也但言始加醮用脯醢者因言與周異之意其實未行事是以下乃始云賔降取爵于篚也云加冠於東序醮之於户西同耳者經不見者嫌與周異故辨之其經不言冠者醮之處即與周同再醮攝酒謂添益整頓示新加皮辨如初儀再醮攝酒其他皆如初釋曰云攝猶整也整酒謂撓之者案有司徹云司宫攝酒注云更洗益整頓之不可云洗亦當為撓謂更撓攪添益整頓示新也扃冪謂以茅覆鼎有大扃小扃若殺則特豚載合升離肺實于鼎設扃冪釋曰云設扃冪者以茅覆鼎長則束其本短則編其中案冬官匠人廟門容大扃七箇注云大扃牛鼎之扃長三尺又曰闈門容小扃參個注云小扃膷鼎之扃長二尺皆依漢禮而知今此豚鼎之扃當用小扃也云特豚一豚者若郊特牲之特主人與祭同右胖此牲皆左胖云凡牲皆用左胖者案特牲少牢皆用右胖少儀云大牢則以牛左肩折九箇為歸胙用左則用左而祭之鄉飲酒鄉射主人用右體主人亦與祭同用右者皆據周而言也此云用左鄭據夏殷之法與周異也但士虞喪祭用左反吉故也煮於鑊曰亨云煮於鑊曰亨者案特牲云亨于門外東方西面北上注云亨煮也亨豕魚臘以鑊各一爨詩云誰能亨魚溉之釡鬵是鑊在鼎直有升名在俎升載兩稱云在鼎曰升在俎曰載者案昏禮云特豚合升又云側載特牲亦云卒載加匕于鼎少牢云司馬升羊實于一鼎皆是在鼎曰升在俎曰載之文但在鼎直有升名在俎則升載兩稱也故少牢云升羊載右胖升豕其載如羊有司徹亦云乃升注云升牲體於爼也是在俎升載二名也云載合升者明亨與載皆合左右胖者以升載並陳又合在二者之間故知從鑊至俎皆合左右胖也凡肺有舉有祭舉祭名有三稱云離割也割肺者使可祭也可嚌也者凡肺有二種一者舉肺一者祭肺就舉肺之中復有三稱一名舉肺為食而舉二名離肺少儀云三牲之肺離而不提心也三名嚌肺以齒嚌之此三者皆舉主人為食而有也就祭肺之中亦復有三稱一者謂之祭肺為祭先而有之二者謂之忖肺忖切之使斷三者謂之切肺名雖與忖肺異切肺則忖肺也三者皆為祭而有若然切肺離肺指其形餘皆舉其義稱也今文扃為鉉古文冪為密云今文扃為鉉古文冪為密者一部之內皆然不從今文故疊之也再醮不言攝酒而三醮言如取省文周與夏殷一醮再醮三醮之節釋曰云攝酒如再醮則再醮亦攝之矣者周公作經取省文再醮不言攝酒以三醮如之則再醮攝之可知前不殺之時一醮徹肺醢為辟再醮之脯醢至再醮不言徹脯醢者以三醮上唯加乾肉不薦脯醢故不徹也今殺亦然一醮徹薦爵至再醮亦不徹薦直徹爵而已亦為三醮以不加籩豆加牲俎是以祝辭一醮亦云嘉薦至三醮者直云籩豆有楚楚陳列貌是三醮才加籩豆明文也孤子加冠與父在異若孤子則父兄戒宿冠之日主人紒而迎賔拜釋曰上陳士有父加冠禮訖自此至東孰北面論士之無父自有加冠之法也周公作文於此乃見之者欲見周與夏殷孤子同冠於阼階禮於客位惟一醮三醴不同耳是以作經言其與上異者而已言父兄諸父諸兄者以其上文父兄非直戒宿而已故知此是諸父諸兄非已之親父親兄也經云拜揖讓立于序端者謂主人出先拜賔答拜訖揖讓而入於廟門既入門又三揖至階又三讓而升堂乃立於東序端賔升立西序端一皆如上父兄為主人故作文省略總云揖讓立于序端皆如冠主也云禮於阼者别言其異云凡拜者謂初拜至及啐拜之等賔主皆北面與父在時拜於筵西南面賔拜于序端東面為異也案上文父在亦有殺法今鄭云孤子得申禮盛之者不為殺起止為陳鼎于外而言鄭知父在有鼎不陳於外者以上文若殺直云特豚載合升不辨外內孤子乃云舉鼎陳於門外類于上父在陳鼎不於門外也凡陳鼎在外者賔客之禮也在內者家私之禮也是在外者為盛也今孤子則陳鼎在外故云此庶子加冠不於阼不醮於客位若庶子則冠於房外南面遂醮焉釋曰上已言三代適子冠禮訖此經論庶子加冠法也周公作經於三代之下言之則三代庶子冠禮皆於房外同用醮矣但不知三代庶子各用幾醮耳今於周之適子三加一醴夏殷適子三加三醮是以下文祝辭醴一而醮三皆為三代而為言至於三代庶子皆不見别辭則周之庶子宜依適子用一醮夏殷庶子亦依三醮三代適子有祝辭若庶子則無故下文注云凡醮者不祝知房外謂尊東也者上陳尊在房户之間案鄉飲酒賔東賔東則尊東明此亦於尊東也云不於阼階非代也者案下記云適子冠於阼階以著代也明庶子不於阼非代故也於客位成而不尊者下記云醮於客位加有成也是適子於客位成而尊之此則成而不尊故因冠之處遂醮焉吾子相親之美稱冠者母不在使人受脯于西階下戒賔云云願吾子教之云吾子相親之辭吾我也者謂自已身之子故云吾子相親之辭也云子男子之美稱者古者稱師曰子又公羊傳云名不若字字不若子是子者男子之美稱也今請賔與子加冠故以美稱呼之吉日令辰互言言辰有幹可知始加祝曰令月吉日始加元服云云再加曰吉月云云釋曰上云令月吉日此云吉月令辰互見其言是作文之體無義例也云辰子丒也者以十幹配十二辰直云辰子丑明有幹可知即甲子乙丑之類有祝辭醴辭醮辭凡醮者不祝祝曰云云再加曰云云三加曰云云醴辭曰云云醮辭曰云云再醮曰云云三醮曰云云醮辭唯據適子而言以其將著代重之故備見祝辭也此注云凡醮者不祝者言凡謂庶子也既不加冠於阼又不禮於客位無著代之理故略而輕之也亦不設祝辭者曽子問注云凡殤不祭之類也其天子冠禮祝辭案大戴禮公冠篇成王冠周公為祝辭使王近於人逺於天嗇於時惠於財其辭既多不可具載其諸侯無文蓋亦有祝辭異於士也旨酒既湑謂泲酒而清再醮曰旨酒既湑嘉薦伊脯注湑清也釋曰湑泲酒之稱故伐木詩云有酒湑我注云湑莤之也鳬鷖詩云爾酒既湑注云湑酒之泲者是湑為清也字辭曰伯某甫仲叔季唯所當字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉云云釋曰云伯某甫者某若云嘉也但設經不得定言人字故言甫為且字是以禮記諸侯薨復曰臯某甫復鄭云某甫且字以臣不名君且為某之字呼之既此某甫立為且字伯仲叔季者是長幼次第之稱若兄弟四人則依次稱之夏殷質則稱仲周文則稱叔若管叔霍叔之類是也云唯其所當者二十冠時與之作字猶孔子生三月名之曰丘至二十冠而字之曰仲尼有兄曰伯居第二則曰仲但殷質二十為字之時兼伯仲叔季呼之周文二十為字之時未呼伯仲至五十乃加而呼之故檀弓云五十以伯仲周道也是呼伯仲之時則兼二十字而言若孔子生於周代從周禮呼尼甫至五十去甫以尼配仲而呼之曰仲尼是也若然二十冠而字之未呼伯仲叔季今於二十加冠而言者一則是殷家冠時遂以二十字呼之二則見周家若不死至五十乃加而呼之若二十已後死雖未滿五十即得呼伯仲知義然者見慶父乃是莊公之弟桓六年莊公生至閔公二年慶父死時莊公未滿五十慶父乃是莊公之弟時未五十慶父死號曰共仲云故二十冠時則以伯仲叔季當擬之甫是美稱如儀家尼孔之類釋曰知甫是丈夫之美稱者以其人之賢愚皆以為字故隱元年公及邾儀甫盟于蔑穀梁傳云儀字也父猶傳也男子之美稱也是也云孔子為尼父者哀十六年孔丘卒哀公誄之曰哀哉尼甫因字號諡曰尼甫也云周大夫有家甫者桓公十五年天王使家甫來求車是也云宋大夫有孔甫是其類者案左氏傳桓二年孔甫嘉為司馬是也鄭引此者證有冠而為此字之意故云是其類也云甫字或作父者字亦通屨不與服同陳冬夏異上下異屨夏用葛玄端黑屨青絇繶純純博寸釋曰自此至繐屨論三服之屨不於上與服同陳者一則屨用皮葛冬夏不同二則屨在下不宜與服同列故退在於此此言夏用葛下云冬皮則春宜從夏秋宜從冬故舉冬夏寒暑極時而言詩魏地以葛屨履霜刺𥚹也云屨者順裳色者禮之通例衣與冠同屨與裳同故云順裳色也云玄端黑屨以玄裳為正也者以其玄端有玄裳黃裳雜裳經唯云玄端黑屨與玄裳同色而却不取黃裳雜裳是也三服見屨不同玄端黑屨云云素積白屨云云爵辨纁屨釋曰案此三服見屨不同何者玄端以衣見屨以玄端有黃裳之等裳不得舉裳見屨故舉玄端見屨也皮辨以素積見屨屨裳同色是其正也爵辨既不舉裳又不舉衣而以爵辨見屨者上陳服已言纁裳裳色自顯以與六冕同玄衣纁裳與冕服之嫌故不以衣裳而以首服見屨也云爵辨屨以黑為飾爵辨尊其屨飾以繢次者案冬官畫繢之事云青與白相次赤與黑相次玄與黃相次鄭云此言畫繢六色所象及布采之第次繢以為衣又云青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻鄭云此言刺繡采所用繡以為裳此是對方為繢次比方為繡次不屨繐屨欲見大功未可冠子不屨繐屨注繐屨喪屨也釋曰案喪服記云繐衰四升有半繐衰既是喪服明繐屨亦是喪屨故鄭云喪屨也云縷不灰治曰繐者斬衰冠六升傳云鍛而勿灰則四升半不灰治可知言此者欲見大功未可冠子恐人以冠子故於屨末因禁之也凡言記未知定誰所録記冠義始冠緇布之冠也云云釋曰凡言記者皆是記經不備兼記經外逺古之言鄭注燕禮云後世衰微幽厲尤甚禮樂之書稍稍廢棄蓋自爾之後有記乎又案喪服記子夏為之作傳不應自造還自解之記當在子夏之前孔子之時未知定誰所録云冠義者記士冠子之義者記時不同故有二記六國時所録故遭秦燔滅典籍有韋氏雕氏闕其記則在秦漢之際儒者加之故王制有正聽之棘木之下異時所記故其言亦殊也士冠訖敝緇布冠庶人則常服注太古唐虞以上緌纓飾未之聞太古質蓋亦無飾釋曰云大古冠布者謂著白布冠也云齊則緇之者將祭而齊則為緇者以鬼神尚幽暗也云冠而敝之可也者據士以上冠時用之冠訖則敝之不復著也若庶人猶著之故詩云彼都人士臺笠緇撮是用緇布冠籠其髮是庶人常服之矣古吉凶同白布冠喪服起夏以後鄭注郊特牲云三代改制齊冠云云明太古唐虞以上可知經云始冠緇布之冠即云大古冠布則齊冠一也故鄭云冠其齊冠也云白布冠者今之喪冠是也者以其大古時吉凶同服白布冠未有喪冠三代有牟追之等則以白布冠為喪冠若然喪服起自夏禹以下也名受於父母為質字受於賔為文冠而字之敬其名也注名者質所受於父母冠成人釋曰案內則云子生三月父名之不言母今云受於父母者夫婦一體受父即是受於母故兼言也云冠成人益文者對名是受於父母為質字者受於賔為文故君父之前稱名至於他人稱字也是敬其名也以周漢禮辨冕可聞與夏殷異未聞委貌周道也章甫殷道也毋追夏后氏之道也周辨殷冔夏收云制之異同亦未聞者案漢禮器制度辨冕周禮辨師相參考之冕以木為體廣八寸長尺六寸績麻三十升布為之上以玄下以纁前後有旒尊卑各有差等天子玉笄朱紘其制可聞云未聞者但夏殷之禮亡其制與周同異亦如上未聞也五十而后爵有未五十已為大夫古者五十而后爵何大夫冠禮之有注云云釋曰云周之初禮年未五十而有賢才者試以大夫之事猶服士服行士禮者鄭解古者五十而後爵何大夫冠禮之有是古者未有周大夫有冠禮故非之此鄭云未五十則二十已上或有未二十有賢才亦得試為大夫者故喪服殤小功章云大夫為昆弟之長殤鄭云大夫為昆弟之長殤小功謂士若不仕以此知為大夫無殤服言為大夫無殤服謂兄殤在小功則兄十九以下死大夫則十九已下既為兄殤服已為大夫則早冠矣丈夫冠而不為殤故也雖早冠亦行士禮而冠是大夫無冠禮也云二十而冠急成人也五十乃爵重官人也者解試為大夫二十則其爵命要待五十意也云大夫或時改娶有昏禮者釋經而有其昏禮以其三十而取五十乃命為大夫則昏時猶為士何得有大夫昏禮乎五十已後容改娶故有大夫昏禮也衰世故作公侯冠禮以正君臣公侯之有冠禮夏之末造也注造作也云云釋曰鄭云至其衰末上下相亂至以正君臣也者解經下夏之末造公侯冠禮也引坊記者欲見夏末以後制諸侯冠禮以防諸侯相篡弒之事也云同車者謂參乘為車右及御者也云不同服者案玉藻云君之右虎裘厥左狼裘又云僕右恆朝服君則各以時事服是不同服此謂非在軍時若在軍時君臣同服韋辨服也天子元子冠猶依士禮天子之元子士也天下無生而貴者也注元子世子也云云釋曰此記者見天子元子冠時亦依士冠禮故於此兼記之也天子之元子雖四加與十二而冠其行事猶依士禮故云猶士也元子尚不得生而貴則天下之人亦無生而貴者也云無生而貴皆由下升者天子元子冠時行士禮後繼世為天子是由下升自餘天下之人從微至著皆由下升也周衰記禮之時士死則諡之死而諡今也古者生無爵死無諡釋曰記人記此者欲見自上所陳冠禮以士為本者由無生而貴皆從士賤者而升也云死而諡今也者據士生時雖有爵死不合有諡若死而諡之正謂今周衰之時也云古者生無爵死無諡者古謂殷以前夏之時士生無爵死無諡是士賤今古皆不合有諡也鄭云今謂周衰記之時也古謂殷者周時士有爵故知古謂殷云殷士生不為爵死不為諡者對周士生有爵死猶不諡也云周制以士為爵死猶不諡耳下大夫也者案周禮掌客職云羣介行人宰史以其爵等為之牢禮之陳數鄭注云以命數則參差難等略於臣用爵而已羣介行人皆士故知周士有爵雖有爵死猶不諡卿大夫已上則有諡也云今記之時士死則諡之非也者解經死而諡今也云諡之由魯莊公始也者案禮記檀弓云士之有誄自魯莊公始也若然作記前莊公誄士至記時亦行之郊特牲云死而諡之今也古者生無爵死無諡鄭注云古謂殷以前也大夫以上乃謂之爵死有諡也以此而言則殷大夫已上死有諡而檀弓云幼名冠字五十伯仲死諡周道也者殷已前皆因生號為諡若堯舜禹湯之屬是也因生號以諡故不得諡名周禮死則别為諡儀禮要義卷三
