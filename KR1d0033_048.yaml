body:
  text: 儀禮要義卷四十八宋魏了翁撰少牢饋食禮二卒脀以後為隂厭之事卒脀至户內西面注將納祭也釋曰自此盡主人又再拜稽首論先設置為隂厭之事也此惟一人與主婦同服士妻與助祭同服主婦被錫衣侈袂薦自東房韭菹醓醢坐奠於筵前主婦贊者一人亦被錫衣侈袂執葵菹螺醢以授主婦主婦不興遂受陪設於東韭菹在南葵菹在北主婦興入于房釋曰云主婦贊者一人亦被錫者此被錫侈袂與主婦同既一人與主婦同則其餘不得如主婦當與士妻同纚笄綃衣若士妻與婦人助祭一皆纚笄綃衣以綃衣下更無服服窮則同故特牲云凡婦人助祭者同服被錫讀為髲鬄取賤者髮被䯰云被錫讀為髲鬄者欲見鬄取人髮為之之義也云古者或剔賤者刑者之髮以被婦人紒為飾因名髲鬄焉者此解名髲鬄之意案哀公十七年左傳説衛莊公登城望戎州見己氏之妻髮美使髠之以為吕薑髢是其取賤者髮為髲之事也云此周禮所謂次也者見周禮追師敦象龜周飾器如脰鳴胸鳴各以類主婦自東房執一金敦黍有蓋坐設於羊俎之南婦贊者執敦稷以授主婦主婦興受坐設於魚俎南又興受贊者敦黍坐設於稷南又興受贊者敦稷坐設於黍南敦皆南首主婦興入於房釋曰敦有首者尊者器飾也飾蓋象龜知有此義者以其經曰敦南首明象龜獸之形故云首知象龜者以其蓋形龜象故也云周之禮飾器各以其類者案周禮梓人云外骨內骨以脰鳴者以胸鳴者之類鄭云刻畫祭器博庶物也又周禮司尊彝有雞彝之等是周之禮飾器各以其類也云龜有上下甲者欲言此敦蓋取象之意以龜有上下甲故敦蓋象之是亦取其類也敦蓋既象龜明簋亦象龜為之故禮器云管仲鏤簋朱紘注云謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉言以玉飾之還依大夫象形為飾也天子則簋敦兼有九嬪職云凡祭祀贊玉齍注云玉齍玉敦受黍稷器是天子八簋之外兼用敦也特牲云佐食分簋鉶注云為將餕敦有虞氏之器也周制士用之變敦言簋容同姓之士得從周制耳則同姓大夫亦用簋特牲少牢用敦者異姓大夫士也明堂位云有虞氏之兩敦夏后之四璉殷之六瑚周之八簋鄭注云皆黍稷器制之異同未聞案周禮舍人注圓曰簋孝經注直云外方曰簋者據而言若然云未聞者據殷已上未聞周之簋則聞矣故易損卦云二簋可用享注云離為日日圓巽為木木器象是其周器有聞也孝經緯鉤命決去敦規首上下圓相連簠簋上圓下方法隂陽是有聞而鄭云未聞者鄭不信之故也先設饌後酌酒酒尊饌由尊者成祝酌奠遂命佐食啓會佐食啓會蓋二以重設於敦南釋曰酌奠酌酒為神奠之者以其迎尸之前將為隂厭為神不為尸故云為神奠之也云後酌者酒尊要成也者上經先設餘饌此經乃酌者酒尊物設饌要由尊者成故後設之也引特牲者酌奠之處當在鉶南此經不言故引為證釋柔毛剛鬛嘉薦普淖主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事於皇祖伯某以某妃配某氏尚饗主人又再拜稽首注羊曰柔毛豕曰剛鬛嘉薦菹醢也普淖黍稷也普大也淖和也德能大和乃有黍稷春秋傳曰奉粢以告曰潔粢豐盛謂其三時不害而民和年豐也釋曰云羊曰柔毛豕曰剛鬛下曲禮文羊肥則毛柔濡豕肥則鬛剛也彼注云號生物者異於人用也引春秋者證黍稷大和之義案彼左氏桓六年傳文主人不出迎尸尸在廟門外疑於臣祝出迎尸於廟門之外主人降立於阼階東西面云云釋曰自此盡牢肺正脊加於肵論尸入正祭之事云主人不出迎尸伸尊也者禮記云君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君故主人皆不出迎尸尸在廟門外為臣道故主人不出迎尸伸尊也引特牲者尸出入時主人與賓西位上皆逡巡辟位尸入祝主人再拜妥尸祝主人皆拜妥尸尸不言答拜遂坐釋曰案爾雅妥安坐也故云拜妥尸拜之使安坐也案特牲云尸啐酒告旨主人拜尸答拜祭鉶嘗之告旨不得遂坐此經云答拜遂坐故鄭解其遂坐而卒食之意以其間有不啐奠不嘗鉶不告旨也大夫之禮尸彌尊故無拜事特牲所云嘗鉶謂嘗豕鉶此不嘗鉶謂不嘗豕鉶也知非不嘗羊鉶者案下云嘗羊鉶故知不嘗豕鉶也不告旨者既不啐奠故無告也言彌尊者既不啐奠一尊又不嘗鉶不告旨是彌尊也云不告旨者為初亦不饗者案特牲迎尸即席坐主人拜妥尸尸答拜執奠祝饗主人拜如初注云饗勸強之也其辭取於士虞記則宜云孝孫某圭為而孝薦之饗是士賤不嫌得與人君同大夫尊嫌與人君同故初不饗後亦不告旨故云不告旨者為初亦不饗也黍稷之祭為墮尸尊神餘故祭上佐食取黍稷于四敦云云兼與黍以授尸尸同受祭於豆祭云黍稷之祭為墮祭者肺與黍稷俱得為墮故周禮守祧職既祭則藏其墮墮中豈不能兼肺肺與黍稷俱祭於苴上上既藏之明肺與黍稷器不動人就器減取之故特得墮名舉肺則全取因上絶之不得墮稱及其藏之并有墮名也云將食神餘尊之而祭之者謂隂厭是神食神食後尸來即席食尸餕鬼神之餘故尸亦尊神而祭之以其凡祭者皆不是盛主人之饌故以祭之為尊也古飯黍不用箸就器中取而食之上佐食爾上敦黍於筵上右之釋曰曲禮云飯黍無以箸是古者飰食不用匙箸若然器即不動器中取之故移之於席上便尸食也此食舉在羞肵下與特牲文異食舉釋曰此食舉在羞肵之下特牲食舉在羞肵之上不同者彼特牲食舉下乃云羞肵俎者是其正以食舉後尸即嚌幹之屬即加於肵俎故食舉後即進肵是正也此食舉不在羞肵之上上佐食羞鉶羮尸祭鉶訖乃得食舉故退食舉在祭鉶之下又不退羞肵在食舉下者由主人敬尸故不退在下也特牲爾敦下設大羮此不云者大羮不為神直是為尸者故此不言儐尸乃有也食大名據一口亦謂之飯三飯注食以黍釋曰知先食黍者以前文先言爾黍云食大名者以其論語文多言食故云食大名也云小數曰飯者此少牢特牲言三飯五飯九飯之等據一口謂之一飯五口謂之五飯之等據小數而言尸告飽祝勸侑天子諸侯亦當然尸告飽祝西面云云獨侑不拜侑曰皇尸未實侑釋云侑勸也祝獨勸者更則尸飽者此決特牲九飰三侑皆祝主人共侑不更以侑者欲使尸飽若其重侑則嫌相褻特牲重侑不更者以上禮九飯縱更亦不飽故不更此大夫禮十一飯更則飽故有更是以使祝獨侑與主人更之義云祝既侑復反南面者戶內主人及祝有事之位尸席北祝無事之位今侑訖亦復尸北南面位也此與特牲皆有尸飯法天子諸侯亦當有之故大祝九拜之下云以享侑祭祀注云侑勸尸食而拜若然士三飯即告飽而侑大夫七飯告飽而侑諸侯九飯告飽而侑天子十一飯而侑也主人酳尸取饒羡之義乃酳尸尸拜受主人拜送釋曰自此盡折一膚論主人酳尸之事云酳猶羡也者取饒羡之義故以為樂之祝代尸酌主人又俠爵拜彌尊尸祝酌授尸尸醋主人主人拜受爵尸答拜主人西面奠爵又拜云彌尊尸者此少牢與特牲尸酢主人使祝代尸酌者已是尊尸今主人拜受訖又拜為俠拜是彌尊尸也綏祭即桵墮同取墮減之義上佐食取四敦云云下佐食取牢云云以綏祭案經中綏是車綏或有禮本作挼者故亦讀從周禮守祧既葬則藏其墮取墮減之義也云將受嘏者下文主人受嘏之時先墮祭是以佐食授黍稷與主人為墮禮尸常坐有事則起主人常立有事則坐主人左執爵右受佐食坐祭之又祭酒不興遂啐酒釋曰云尸常坐有事則起主人常立有事則坐者案禮器云周坐尸曲禮云立如齊鄭云齊謂祭祀時則是尸常坐主人祭時則常立經云坐祭之謂墮祭尸餘是尸與主人為禮是主人有事乃坐也尸答主人拜乃立是尸有事則起也尸使祝嘏主人士禮尸親嘏二佐食各取黍於一敦上佐食兼受摶之以授尸尸執以命祝卒命祝祝受以東北面於戶西以嘏於主人曰皇尸命工祝承致多福無疆於女孝孫來女孝孫使女受祿於天宜稼於田眉夀萬年勿替引之注命祝以嘏辭嘏大也豫主人以大福工官也承猶傳也來讀曰釐釐賜也耕種曰稼勿猶無也替廢也引長也言無廢止時長如是也古文嘏為格祿為福眉為微替為袂袂或為臷臷替聲相近釋曰云嘏大也者郊特牲云嘏長也大也故鄭云豫主人以大福案特牲尸親嘏主人此尸使祝嘏主人者大夫尸尊故不親嘏特牲無嘏文不具也天子嘏辭與大夫同詩懷筐受異主人坐奠爵興再拜稽首云云詩懷之云云案少牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也是王受嘏與大夫同也案楚茨詩既齊既稷既匡既勑注云嘏之禮祝遍取黍稷牢肉魚擩於醢以授尸孝孫前就尸受之天子使宰夫受之以筐祝則釋嘏辭以勑之天子嘏辭與大夫同也云復嘗之者重之至也者前已嚌之是已嘗今復言嘗是重受福之至也特牲不言復嘗者文不具也大夫士廟皆五架棟北為室主人獻祝設席南面祝拜於席上坐受注室中迫狹釋曰言迫狹大夫士廟室也皆兩下五架正中曰棟棟南兩架北亦兩架棟南一架名曰楣前承簷以前名曰庪棟北一架為室南壁而開戶即是一架之開廣為室故云迫狹也必知棟北一架後乃為室者昏禮主人延賓升自西階當阿東面致命鄭云阿棟也入堂深明不入室是棟北乃有室也尸言拜送禮重祝言答拜禮輕主人西面答拜注不言拜送下尸釋曰上主人酳尸尸拜受主人拜送今主人獻祝祝拜受主人答拜拜送禮重答拜禮輕主人獻祝不拜既爵大夫祝賤祭酒啐酒云云卒爵興釋曰亦如佐食授爵乃興者此經直云卒爵興不云授爵故特明之案下文主婦獻祝祝卒爵坐授主婦爵主婦又獻二佐食二佐食坐授主婦爵主婦獻祝與獻二佐食同明主人獻祝祝授主人爵亦與二佐食同可知云不拜既爵大夫祝賤也者此決特牲祝卒角拜主人答拜以士卑故祝不賤男女不相授器不相因爵有司贊者取爵於篚以升授主婦贊者於房中釋曰云自此盡入於房論主婦亞獻祝獻尸與佐食之事此直云有司授婦贊者於房案禮記內則云非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而后取之此經雖不言受以篚及奠於地之事亦當然也云男女不相因者案特牲佐食卒角主人受角降反於篚升入復位訖主婦乃洗爵於房酌亞獻尸是不相因爵也引特牲者證男女不相因爵主婦不取此爵也特牲賓長獻尸爵止此致爵在儐尸上賓長洗爵獻於尸尸拜受爵賓尸西北面拜送爵尸祭酒卒爵案特牲賓長獻爵止注云欲神惠之均於室中待夫婦致爵此大夫禮或有儐尸者致爵在儐尸之上故不致爵爵不止也若然有司徹尸作止爵三獻致爵於主人主人不酢主婦又不致爵於主婦下大夫不儐尸賓獻尸止爵主婦致爵於主人酢主婦主人不致於主婦特牲主人與主婦交相致爵參差不同者此以尊卑為差降之數故有異也上大夫得儐尸故致爵上辟人君下大夫不儐尸故增酢主婦而已士卑不嫌與君同故致爵具也事尸之禮訖於廟門主人出立於阼階上云云祝告曰云云祝先尸從遂出於廟門釋曰自此盡廟門論祭祀畢尸出廟之事注事尸之禮訖於廟門者上祝迎尸於廟門今禮畢又送尸於廟門案禮記尸在廟門外則疑於臣是以據廟門為斷祝徹肵俎不出廟門將儐尸祝反復位於室中主人亦入於室釋曰自此盡篇末論徹肵俎行餕之事云徹肵俎不出門將儐尸也者決特牲佐食徹尸俎出廟門者送尸者也云肵俎而以儐尸者其本為不反魚肉耳案曲禮云毋反魚肉謂食時魚肉不反俎司士乃辨舉謂舉膚知舉是舉膚者以其尸舉肺餕者下尸明不舉肺當舉膚是以特牲云佐食授餕者各一膚明此大夫禮亦舉膚也主人不拜受爵總答一拜大夫餕賤卒食主人洗一爵升酌以授上𧃊云云授次𧃊云云云不拜受爵者大夫餕者賤也者決特牲使嗣子與兄弟餕為貴故拜受爵也云答一拜略也者特牲亦無再拜法此言略者以其四餕皆拜主人總答一拜凡賓出主人皆拜送送佐食不拜賤釋曰賓主之禮賓出主人皆拜送此佐食送之而不拜儀禮要義卷四十八
