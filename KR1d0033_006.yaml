body:
  text: 儀禮要義卷六宋魏了翁撰士昏禮三舅姑没三月廟見猶存時盥饋特豚若舅姑既没則婦入三月乃奠菜注以篚祭菜釋曰自此至饗禮論舅姑没三月廟見之事必三月者三月一時天氣變婦道可以成之故也此言舅姑俱没者若舅没姑存則當時見姑三月亦廟見舅若舅存姑没婦人無廟可見或更有繼姑自然如常禮也案曽子問云三月而廟見稱来婦也擇日而祭於禰成婦之義也鄭云謂舅姑没者也必祭成婦義者婦有供養之禮猶舅姑存時盥饋特豚於室此言奠菜即彼祭於禰一也奠菜亦得稱祭者若學記云皮弁祭菜之類也祭同几席今婦見舅姑象生時故異席於廟奥東面右几席於北方南面注北方墉下釋曰案周禮司几筵云每敦一几鄭注云周禮雖合葬及時同在殯皆異几體實不同祭於廟同几精氣合又祭統云設同几同几即同席此即祭於廟中而别席者此既廟見若生時見舅姑舅姑别席異面是以今亦異席别面象生不與常祭同也婦人以肅拜為正今扱地重拜婦拜扱地坐奠菜於几東席上還又拜如初釋曰云扱地手至地者以手之至地謂之扱地則首不至手又與男子空首不同云婦人扱地猶男子稽首者婦人肅拜為正今云扱地則婦人之重拜也猶男子之稽首亦拜中之重故以相况也案周禮大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜室事交于階敬也舅言奠嘉菜姑言告婦降堂取笲菜入祝曰某氏来婦敢告于皇姑某氏釋曰不直云降而云降堂者則在階上故云降堂階下也云室事交乎户今降堂者敬也者室事交乎户禮器文彼子路與季氏之祭云室事交乎户堂事交乎階今此既是室之事當交於户今乃交於階故言敬也云於姑言敢告舅尊於姑者上文於舅言敢奠嘉菜不言告是舅尊於姑言告是姑卑也祭訖闔牖户婦出祝闔牖户注凡廟無事則閉之釋曰先言牖後言户者先闔牖後閉户故為文然也以其祭訖則闔牖明是無事則閉之以其鬼神尚幽闇故也舅姑没老醴婦壻饗送者釋曰舅姑生時見訖舅姑使贊醴婦於寢之户牖之間今舅姑没者使老醴婦於廟之房中其禮則同使老及處所則别舅姑存舅姑自饗送者如上文今舅姑没故壻兼饗丈夫婦人如舅姑饗禮并有贈錦之等辭無不腆無辱贄生皮帛可制記士昏禮凡行事必用昏昕受諸禰廟辭無不腆無辱知辭無不腆者郊特牲云告之以直信信事人也信婦徳也注云此二者所以教婦正直信也是賔納徵之時不得謙虚為辭也云主人不謝来辱者此亦是不為謙虚云摯不用死者凡摯亦有用死者是以尚書云三帛二生一死摯即士摯雉今此亦是士禮恐用死鴈故云不用死也云皮帛必可制者可制為衣物此亦是教婦以誠信之義也同牢時用鮮用鮒用全腊必用鮮魚用鮒必殽全注全不餒敗不剥傷釋曰腊用鮮者義取夫婦日新之義云魚用鮒者義取夫婦相依附者也云殽必全者義取夫婦全節無虧之理此並據同牢時也女子許嫁未許嫁皆有笄及醴醮異女子許嫁笄而醴之稱字注許嫁已受納徵禮也云云云笄女之禮猶冠男也使主婦女賔執其禮者案雜記云女雖未許嫁年二十而笄禮之婦人執其禮鄭注云言婦人執其禮明非許嫁之笄彼以非許嫁笄輕故無主婦女賔使婦人而已明許嫁笄當使主婦對女賔執其禮其儀如冠男也又許嫁者用醴禮之不許嫁者當用酒醮之敬其早得禮也祖廟髙祖宗室大宗之家小宗有四祖廟未毁教于公宫三月若祖廟已毁則教于宗室釋曰此謂諸侯同族之女將嫁之前教成之法經直云祖廟鄭知女髙祖為君者之廟也以有緦麻之親者以其諸侯立五廟太祖之廟不毁親廟四以次毁之經云未毁與已毁是據髙祖之廟而言故云祖廟女髙祖為君之廟也共承髙祖是四世緦麻之親若三世共曾祖曽祖小功之親若共祖大功之親若共禰廟是齊衰之親則皆教于公宫今直言緦麻者舉最䟽而言云宗室大宗之家者案喪服小記繼别為宗謂别子之世適長子族人來宗事之者謂之宗者収族者也髙祖之廟既毁與君絶服者則皆於大宗之家教之又小宗有四或繼祖或繼禰或繼曾祖或繼髙祖此等至五代皆遷不就之教者小宗卑故也問名主人受鴈楹間還阼階上對問名主人受鴈還西面對賔受命乃降釋曰知受鴈於兩楹間南面者納采時賔當阿東面致命主人阼階上北面再拜又云授于楹間南面問名如納采之禮故亦楹間南面授鴈於彼唯不云西面故記之也云還于阼階上對賔以女名者此即西面對與拜時北面異處也昏禮六反命于壻父者惟四使祭醴云云賔右取脯左奉之乃歸執以反命釋曰知反命是此問名納吉納徵請期者以下云凡使者歸反命曰某既得將事矣敢以禮告言凡非一則知四者皆有反命也以納采與問名同使親迎又無使者故據此四者納徵如納吉禮授幣如授鴈禮納徵執皮攝之内文兼執足左首隨入云云釋曰案經直云納徵𤣥纁束帛儷皮如納吉禮則授幣得如授鴈之禮至於庭實之皮無可相如故記之天子廟門容大扃七个士降殺釋曰執皮者相隨而入至庭北面皆以西為左云隨入為門中阨陜者皮皆横執之案匠人云廟門容大扃七个注云大扃牛鼎之扃長三尺每扃為一个七个二丈一尺彼天子廟門此士之廟門降殺凡官有長有屬長是士則屬遞降主人受幣士受皮者自東出於後自左受云云釋曰云士謂若中士下士不命者但諸侯之士國皆二十七人依周禮典命侯伯之士一命子男之士不命命與不命國皆分為三等上九中九下九案周禮三百六十官皆有官長其下皆有屬官但天子之士上士三命中士再命下士一命與諸侯之士異若諸侯上中下士同命今言士謂若中士下士不命者據上士為官長者若主人是中士則士是下士若主人是下士則士是不命之士府史之等女出父戒于阼階母戒諸西階不降女出于母左父西面戒之必有正焉若衣若笄母戒諸西階上不降釋曰此記亦經不具以母出房户之西南面女出房西行故云出于母左父在阼階上西面故因而戒之云母戒諸西階上者母初立房西女出房母行至西階上乃戒之云託戒使不忘者謂託衣笄恒在身而不忘持戒亦然故戒使不忘也下文父母及庶母重云戒者並與此文相續成也此士禮父母不降送案桓公三年經書九月齊侯送姜氏于讙糓梁𫝊曰禮送女父不下堂母不出祭門祭門則廟門言不出廟門則似得下堂者彼諸侯禮與此異以其大夫諸侯天子各有昏禮婦登車以几猶後人用臺婦乗以几從者二人坐持几相對釋曰上經雖云婦乗以几不見從者二人持之故記之也此几謂將上車時而登若王后則履石大夫諸侯亦應有物履之但無文以言今人猶用臺是石几之類也對文𤣥酒明水别其實一也婦入寢門贊者徹尊鼏酌𤣥酒三屬音燭于尊釋曰明水者案周禮秋官司烜氏云以隂鍳取明水於月郊特牲云其謂之明水也由主人之絜著此水也注云著猶成也言主人齊絜此水乃成可得也配尊之酒加𤣥酒鬰鬯與五齊皆用明水配之郊特牲云五齊加明水三酒加𤣥酒不言鬰鬯者記人文畧也相對𤣥酒與明水别通而言之明水亦名𤣥酒故禮運云𤣥酒在室彼配鬰鬯五齊是明水名為𤣥酒也以其俱是水故通言水也房與室連無北壁故名北堂釋曰房與室相連為之房無北壁故得北堂之名故云洗在北堂也云所謂北洗者所謂經中北洗也云北堂房中半以北者以其南堂是户外半以南得堂名則堂是户外之稱則知此房半以北得堂名也知房無北户者見上文云尊于房户之東房有南户矣燕禮大射皆云羞膳者外自北階立于房中不言入房是無北壁而無户是以得設洗直室東隅也云洗南北直室東隅者是南北節也云東西直房户與隅間者是東西節也婦人相饗無降以北洗篚在上凡婦人相饗無降釋曰本設北洗為婦人有事不下堂今以北洗及篚在上故不降經不言故記之也言凡者欲見舅姑共饗婦及姑饗婦人送者皆然婦入三月助祭謂適婦舅没或姑没婦入三月然後祭行注入夫之室三月後祭行謂助祭釋曰此據舅在無姑或舅没姑老者若舅在無姑三月不湏廟見則助祭案内則云舅没則姑老者謂姑六十亦𫝊家事任長婦婦入三月廟見祭菜之後亦得助夫祭故鄭云謂助祭也此亦謂適婦其庶婦無此事適婦有饗庶婦使人醮之不饗庶婦則使人醮之婦不饋釋曰不饗者以適婦不醮而有饗今使人醮之以醮替饗故使人醮之不饗也云酒不酬酢曰醮者亦如庶子醮然知亦有脯醢者以其饗婦及醮子皆有脯醢醴適醮庶儀同不盥饋特豚異注適婦酌之以醴尊之庶婦酌之以酒卑之云云釋曰適婦用醴於客位東面受醴贊者北面拜送今庶婦雖於房外之西亦東面拜受醮者亦北面拜送故云其儀則同也云不饋者共養統於適也者謂不盥饋特豚問名而曰誰氏婦人不以名行問名曰某既受命將加諸卜敢請女為誰氏釋曰云誰氏者謙也者以其下達乃納采則知女之姓矣今乃更問不敢必其主人之女也且本云問名而云誰氏者婦人不以名行三族之不虞父昆弟已昆弟子昆弟請期曰云云惟是三族之不虞使某也請吉日釋曰鄭知三族是父己子三者之昆弟者若大功之喪服内不廢成禮若期親内則廢故舉合廢者而言以其父昆弟則伯叔及伯叔母已昆弟則己之親兄弟子昆弟則己之適子庶子者皆已之齊衰期服之内親故三族據三者之昆弟也引雜記者見大功小功之末既葬則可以嫁子娶妻經云三族不據之矣今據父之昆弟期於子小功不得與子娶妻若於子期於父小功亦不得娶妻知今皆據壻之父而言若然己父昆弟於子為小功而言此三族者已及子皆為服期者亦據大判而言耳禮女用醴在廟醮子用酒在寢父醮子命之曰徃迎爾相承我宗事釋曰女父禮女用醴又在廟父醮子用酒又在寢不同者父禮女者以先祖遺體許人以適他族婦人外成故重之而用醴復在廟告先祖也男子直取婦入室無不反之故輕之而用酒在寢知醮子亦不在廟者若在廟以禮筵於户西右几布神位今不言故在寢可知也大宗小宗皆適妻之長子宗子無父母命之釋曰云宗子者適長子也者案喪服小記云繼别為宗繼禰者為小宗大宗小宗皆是適妻所生長子也宗子無父母命之親皆没已躬命之注母命之紀裂繻云云是也躬命之公孫夀云云釋曰云母命之在春秋紀裂繻来逆女是也者案隠二年經書秋九月紀裂繻来逆女公羊𫝊曰裂繻者何紀大夫也何以不稱使昏禮不稱主人何休云為養亷遠恥也又云然則曷稱稱諸父兄師友宋公使公孫夀来納幣則其稱主人何辭窮也辭窮者何無母也辭賔言辱以白造緇曰辱然後壻見云云主人對曰云云今吾子辱云云釋曰云以白造緇曰辱者謂以絜白之物造置於緇色之中是汙白色猶今賔至已門亦是屈辱主人不出大門壻見於寢奠摯異賔客主人出門左西面壻入門東面奠摯再拜出注出門出内門入門入大門不出大門者異於賔客也釋曰云壻見於寢者聘禮凡見賔客及士親迎皆於廟者聘禮敬賔客故在廟親迎在廟者以先祖之遺體許人故在廟此壻見外舅姑非賔非親迎故知在適寢也云奠摯者壻有子道不敢授也者凡執摯相見皆親授受此獨奠之象父子之道質故不親授奠之而已云摯雉也者以其士執雉是其常也壻見主婦婦闔左扉立于内見主婦婦闔扉立于其内注云云兄弟之道宜相親釋曰云闔扉者婦人無外事者婦人送迎不出門兄弟不踰閾是無外事也云扉左扉者士喪禮卜葬云闔東扉主婦立于其内既言東扉即是左扉冠昬燕射賔皆有幣此醴壻無主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣釋曰主人與壻揖讓而入寢門升堂醴壻故訓及為與也云無幣異於賔客者上冠禮醴賔酬之以幣昬禮饗賔酬以束錦燕禮大射酬賔客皆有幣此無幣母與妻黨亦為兄弟鄭云兄弟之道宜相親者爾雅母與妻之黨為兄弟故知主婦於壻者兄弟之道也壻門外主婦門内主婦先一拜壻立于門外東面主婦一拜壻答再拜主婦又拜壻出注必先一拜者婦人於丈夫必俠拜儀禮要義卷六
