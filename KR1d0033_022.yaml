body:
  text: 儀禮要義卷二十二宋魏了翁撰聘禮四醯醢夾碑在鼎中央醯東順陽釋曰案既夕禮云罋三醯醢屑鄭注云罋瓦器其容亦蓋一觳旊人云簋實一觳又云豆實三而成觳四升曰豆則罋與簋同受斗二升也禮器云五獻之尊門外缶門內壺君尊瓦甒注云壺大一石瓦甒五斗即此壺大一石也云夾碑在鼎之中央也者上陳鼎云西階前陪鼎當內亷東面北上上當碑南陳下腥鼎亦如之此言夾碑自然在鼎之中央可知云醯在東醯穀陽也醢內陰也者醯是釀穀為之酒之類在人消散故云陽醢是釀肉為之在人沈重故云陰也大宗伯云天産作陰德地産作陽德注云天産六牲之屬地産九穀之屬以六牲為陽九穀為陰與此醯是榖物為陽違者物各有所對六牲動物行蟲也故九榖為陰郊特牲云鼎俎竒而籩豆偶陰陽之義也又以籩豆醯醢等為陰鼎俎肉物總為陽者亦各有所對以鼎俎之實以骨為主故為陽籩豆榖物故為陰也有司徹注又以庶羞為陽內羞為陰者亦羞中自相對內羞雖有糝食是肉物其中有糗餌粉餈食物故為陰庶羞肉物故為陽也先饔次豆次餼次芻禾等以熟為主餼二牢陳于門西北面東上牛以西羊豕豕西牛羊豕釋曰先言饔後言餼者陳者先以熟為主是以先陳饔饔下即陳熟物繼之故六豆以下相次此餼是生物其下次陳芻薪米禾之等相繼也云牛羊右手牽之者曲禮云效馬效羊者右牽之以不噬齧人用右手便也言右手牽之則人居其左也云豕束之寢右亦居其左者豕束縛其足亦北首寢卧其右亦人居其左案特牲云牲在其西北首東足鄭注云東足者尚右也與此不同者彼祭禮法用右胖故寢左上右士虞記云陳牲于廟門外北首西上寢右鄭注寢右者當升左胖也變吉故與此生人同稻粱加黍稷正故黍上端稷下端米百筥筥半斛設于中庭十以為列北上云云釋曰上享時直言庭實入設不言中庭則在東西之中其南北三分庭一在南此更言中庭欲明南北之中也上文公立於中庭宰受幣于中庭皆南北之中也知此上東西為行者以經云北上黍粱稻皆兩行稷四行若南北縱陳止得言東西不得言北上何者以黍稷稻及稷當行皆一種無上下故也明橫陳可知黍兩行在北次粱兩行次稻兩行次南稷四行所以不用稻為上者稻粱是加黍稷是正故黍為上端稷為下端以見上下而稻粱居其間亦相變者亦上䋫屈錯之義大夫之禮米禾皆視死牢門外米三十車車秉有五籔設于門東為三列東陳云大夫之禮米禾皆視死牢者上文飪一牢腥二牢是二牢死故米三十車并下禾三十車亦是視死牢也云秉籔數名也秉有五籔二十四斛也者下記云十斗曰斛十六斗曰籔十籔曰秉若然一秉十六斛又有五籔為八斛總二十四斛也云籔讀若不數之數者鄭君時以籔為數字仍竹下為之得為十六斗為籔故下記注云今江淮之間量名有為籔者薪從米芻從禾四者車皆陳北輈薪芻倍禾釋曰云薪從米芻從禾者以其薪可以炊㸑故從米陳之芻可以食馬故從禾陳之鄭言此者以經云倍禾恐並從禾陳之故也云四者之車皆陳北輈者以其向內為正故也引聘義者欲見主君享禮聘賓外內皆善故引為證也凡館不於敵者之廟皆下一等揖入及廟門賔揖入釋曰云使者止執幣者下經始云大夫奉束帛入明此賓揖入時使者止執幣可知云賓俟之于門內謙也門內即寧下故下賓問卿云及廟門大夫揖入鄭注入者省內事也既而俟于寧下是也云古者天子適諸侯必舍于大祖廟者案禮運云天子適諸侯必舍其祖廟下記云卿館於大夫大夫館于士士館于工商鄭注云不館於敵者之廟為大尊也以此差之諸侯無正文鄭注舍于諸公廟者諸公大國之孤云大夫行舍于大夫廟者謂卿舍于大夫讓不言三者不成三至于階讓大夫先升一等釋曰云讓不言三不成三也凡升者主之讓于客三敵者則客三辭主人乃許升者是三讓三辭成也今賓三讓大夫即升無三辭案周禮司儀云諸公之臣相為國客大夫郊勞三讓登聽命又云致饔餼如勞之禮即得行三讓之禮此中古文云三讓與彼合鄭不從者周禮則統舉其大率而云三讓此儀禮據屈曲行事觀此經直云讓大夫先升是主人或三讓大夫無三讓故不從古文也大夫歸饔餼先升今私儐無君命故後賓升一等大夫從升堂釋曰前大夫奉君命歸饔餼故先升一等今賓私儐使者無君命體敵故賓先升在館如主人之儀故也知皆北面者以其體敵又下始云賓奉幣西面大夫東面明此北面可知大夫稽首於賓尊君客大夫對北面當楣再拜稽首釋曰賓主既行敵體之禮當行頓首今大夫稽首於賓為拜君之拜尊君客故也凡敵體者授由其左受幣于楹間南面退東面俟釋曰此賓儐使者是體敵之義經云受幣于楹間南面知賓不南面並授而云賓北面授者几敵體授之義授由其左今尊君之使是以大夫南面賓北面故知賓北面授幣賓拜于朝知諸侯外朝在大門外明日賓拜于朝拜饔與餼皆再拜稽首釋曰知拜謝在大門外者以其直言賓拜於朝無入門之文故知在大門外若然諸侯外朝在大門外明矣引周禮者秋官掌訝職云賓客至于國賓入館次于舍門外待事于客及將幣為前驅至于朝詔其位凡賓客之治令掌訝聽之引之者欲見賓客發館至朝來往皆掌訝前驅為之導知此拜亦皮辨者以受時皮辨故知此拜亦皮辨也故公食大夫云若不親食使大夫各以其爵朝服以侑幣致之賓朝服以受明日賓朝服以拜賜于廟彼朝服受還朝服拜則知此皮辨受亦皮辨拜可知下大夫歸饔餼於上介賓介異館上介饔餼三牢云云釋曰自此論主君使下大夫歸饔餼上介云賓介皆異館者案下記云卿館於大夫大夫館於士士館於工商彼云卿即此賓一也彼云大夫即此上介也彼云士即此衆介也故知賓介各異館必異館者所陳饔餼後無所容故也宰夫歸餼衆介牢米不入門略之士介四人皆餼大牢米百筥設于門外釋曰自此至無儐論使宰夫歸餼於衆介之事上文賓與上介米陳碑南餼陳門內此不入門陳於門外者鄭云略之也云米設當門亦十為列北上彼亦當門此直云設於門外不云東西明當門北上與賓同云牢在其南西上者以此餼本設於庭在門內由士介賤不得入門且賓與上介門東有米三十車薪六十車門西禾三十車芻六十車皆統門為上此餼本非門外東西之物制不在門外東西宜當門陳之云牢在其南西上知如此設之者以其賓上介餼在米南門西東上明知此牢亦在米南而西上為異耳宰夫致牛朝服無束帛略士介宰夫朝服牽牛以致之釋曰案下記云士館于工商則此致者在工商之館宰夫從外來即為賓客宜在門西東面此就大牢之中取以致餼云朝服無束帛亦略之者決上賓與上介皮辨有束帛賓齎聘君之幣問主國卿朝服問卿釋曰自此盡無儐論賓齎聘君之幣問主國卿之事云不皮辨别於主君者對上文行聘享私覿皆皮辨此朝服降一等故鄭注云别於主君云卿每國三卿是其常鄭言此者欲見三卿皆以幣問之其主國下大夫曾使向己國者乃得幣問之與卿異大夫三廟有别子者立大祖廟卿受于祖廟釋曰卿受鄰國君所問之禮不辭讓大夫三廟有别子者立大祖廟非别子者并立曾祖廟王父即祖廟也今不受於大祖廟及曾祖廟而受於祖廟者以其天子受於文王廟諸侯受於祖廟大夫下君故受於王父廟大夫二門廟在入門東有每門每曲擯者出請事大夫朝服迎于外門外再拜賓不答拜揖大夫先入每門每曲揖及廟門大夫揖入注入者省內事也既而俟于寧也釋曰大夫二門入大門東行即至廟門未及廟門而有每門者大夫三廟每廟兩旁皆南北豎牆牆皆閣門假令王父廟在東則有每門每曲之事云入者省內事也者曲禮云請入為席是也云既而俟于寧者寧門屋寧也知俟于寧者下云賓入三揖皆行鄭注云皆猶並也賓與卿並行以卿俟于寧故得並行與卿三揖不俟于庭者下君也案曲禮云客至於寢門則主人請入為席然後出迎客主人肅客而入此卿既入不重出迎客賔行私面於卿散文面亦為覿擯者出請事賓面如覿幣釋曰自此至授老幣論賓行私面於卿之事賓私面於卿其幣多少與私覿於君同故云如覿幣賓私覿之時用束錦乘馬則此私面於卿亦用束錦乘馬可知也云面亦見也其謂之面威儀質也者覿面並文其面為質若散文面亦為覿故鄭司儀注云私面私覿也又左𫝊云楚公子棄疾以乘馬八匹私面鄭伯是也凡受幣楹間者禮敵南面並授賓稱面大夫對北面當楣再拜受幣于楹間云云釋曰知賓北面授者以云大夫南面退西面立言退明賓不得南面又見下文賓當楣再拜明北面授因拜可知云受幣楹間敵也者凡授受之義在於兩楹之間者皆是體敵故昏禮云授于楹間南面注云授於楹間明為合好其節同也南面並授也謂賓主俱至楹間南面並而授是以曲禮云卿與客並然後受注云於堂上則俱南面禮敵者並受此是敵者之常禮也雖是敵者於兩楹之間或有訝受者皆是相尊敬之法則此云大夫南面賓北面授雖是敵禮是尊大夫故訝受又前致饔餼儐使者於楹間賓北面授幣鄭云賓北面授尊君之使自餘不在楹間别相尊敬是以前云公受玉于中堂與東楹之間鄭注云東楹之間亦以君行一臣行二又云公禮賓賓受幣當東楹北面注云亦訝受又賓覿公云振幣進授當東楹北面如此之類不在兩楹之間者皆非敵法就文解之介覿主君同衆介入今於卿特面擯者出請事上介特面幣如覿介云云釋曰自此盡再拜送幣論上介私面於鄰國卿之事云特面者異於主君者介初覿主君之時不敢自尊别與衆介同執幣而入今私面於鄰國卿不與衆介同而特行禮焉大夫辭衆介幣賓為衆介辭擯者出請衆介面如覿幣云云大夫辭云云禮請受賓辭釋曰自此至拜辱論士介私面於鄰國卿之事云賓亦為士介辭者亦者亦士介私覿於主國君時主國大夫嘗使至者以幣問之下大夫嘗使至者幣及之釋曰自此盡于卿之禮論主國大夫嘗使至已國者聘君使上介以幣問之事諸侯之國皆有三卿五大夫其三卿不問至已國不至已國皆以幣及之上已論訖其五大夫者或作介或特行至彼國者乃以幣及之略於三卿故也言君子不忘舊者此大夫嘗與彼國君相接即是故舊也今以幣及之大夫有故不得受聘幣君使人代受大夫若不見注有故也釋曰自此盡不拜論主國卿大夫有故不得親受聘君之幣之事言有故者或有病疾或有哀慘不得受其問禮云各以其爵主人卿也則使卿大夫也則使大夫者若然經云君使大夫大夫中有卿大夫總名也云各以其爵亦是易以相尊敬故也云不拜代受之耳不當主人禮也者案周禮宗伯云大賓客則攝而載祼鄭注云宗伯代王為祼拜送則王亦此類拜是致敬之事不可代人之拜故直授之而已夫人使大夫歸禮賓介其實君使之夕夫人使下大夫韋辨歸禮釋曰自此盡賓拜禮於朝論主君夫人歸禮於賓與上介之事云夕問卿之夕也者案下記云聘曰致饔明日問大夫夕夫人歸禮是其問卿之夕也云使下大夫下君也者歸饔餼使卿此夫人使下大夫故云下君也云君使之云夫人者以致辭當稱寡小君者案隱二年𫝊九月紀裂繻來逆女何休注云禮婦人無外事明知此使下大夫歸禮者君使之可知而稱夫人使者以其致辭於賓客時當稱寡小君故稱夫人使下大夫其實君使之也醙黍清皆兩壺其實稻黍三酒各二壺設于東序北上二以並南陳醙黍清皆兩壺釋曰其設壺於東序自北向南而陳稻黍粱皆二壺並之而陳也故言醙黍清皆兩壺也云以黍間清白者互相備者醙白也上言白明黍粱皆有白下言清明稻黍亦有清故也於清白中言黍明醙即是稻清即是粱也故言互相備也三酒既有清白二色故言六壺必先言醙者以白酒尊重故先設之也主國大夫餼賓介設于門外大夫餼賓大牢米八筐釋曰自此至牽羊以致之論主國大夫餼賓及上介之事云陳於門外知者經無牢米入門之文故明是門外可知云牲陳於後東上者此與君餼士介略同餼士介時不言門東西鄭注云當門則知此門外亦當門云不饌於堂庭辟君也者案上君致饔餼籩豆在堂牲牢米等在庭此在門外諸侯之臣牢禮同無問大國次國公於賓一食再饗釋曰此篇雖據侯伯之卿聘使五等諸侯其臣聘使牢禮皆同無大國次國之别是以掌客五等諸侯相朝其下皆云羣介行人宰史皆有飱饔餼以其爵等為之牢禮之數陳又云凡諸侯之卿大夫士為國客則如其介之禮以待之鄭注云尊其君以及其臣也以其爵等為之牢禮之數陳爵卿也則飱二牢饔餼五牢大夫也則飱大牢饔餼二牢士也則飱少牢饔餼大牢也此降小禮豐大禮也以命數則參差難等略於臣爵而已以此言之公侯伯子男大聘使卿主君一食再饗小聘使大夫則主君一食一饗若然案掌客子男一食一饗子男之卿再饗多於君者以其君臣各自相望不得以君決臣此經食在饗前公食饗在食前云饗謂亨大牢以飲賔也者以其饗禮與食禮同食禮既亨大牢明饗禮亨大牢可知但以食禮無酒饗禮有酒故以飲賓言之引公食饗與食互相先後者此經先言食後言饗則食在享前公食言設洗如饗禮則饗在食前饗先後出於主君之意故先後不定也燕與羞俶獻無常數燕與羞俶獻無常數釋曰案周禮掌客上公三燕侯伯再燕子男一燕皆有常數此臣無常數者亦是君臣各為一不得相決知羞謂禽羞鴈鶩之屬者案下記云禽羞俶獻故知是禽知成熟煎和者以其言羞鼎臐之類故知成熟煎和者也知禽是鴈鶩之屬者案下記云宰夫歸乘禽日如饔餼之數鄭注乘禽乘行之禽也亦云鴈鶩之屬俶始也始獻四時新物聘義所謂時賜無常數由恩意也介既從賓饗獻復特享之客之也上介一食一饗注饗食賓介為介從饗獻矣復特享之客之也介雖從入不從食賓食畢介逆出是不得從食矣知從饗者下記云大夫來使無罪饗之過則餼之其介為介注云饗賓有介者賓尊行敵禮也故知介從饗案襄二十七年宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也叔向趙孟介而得從饗是其義也云復特饗之即此經是也君有故不親食使卿生致牢禮有幣若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐案上文云君使卿歸饔餼於賓館賓儐之今君有故不親食使卿生致其牢禮亦於賓館但無儐為異云謂有疾及他故也者他故之中兼及有哀慘云無儐以己本宜往者饔餼之等不宜召賓故君使人致禮賓則儐使者此饗食之禮主君無故合速賓之來就主君入廟賓無儐禮今主君有故生致於賓亦無儐酬幣謂饗禮酬賓勸酒之幣所用未聞致饗以酬幣亦如之釋曰云禮幣束帛乘馬亦不是過也者鄭以饗之酬幣無文故約上主君禮賓之時用束帛乘馬禮器云有以少為貴者圭璋特琥璜爵鄭注云圭璋特朝聘以為瑞無幣帛也琥璜爵者天子酬諸侯諸侯相酬以此玉將幣也彼經不云天子諸侯相酬之幣故此注云蓋言酬諸侯者公侯伯用琥於子男用璜引之者證與此酬饗大夫不同主國卿大夫饗食聘賓上介大夫於賓一饗一食上介若食若饗若不親饗則公作大夫致之以酬幣致食以侑幣注作使也大夫有故君必使其同爵者為之致之列國之賓來榮辱之事君臣同之釋曰此一經論主國卿大夫饗食聘賓及上介之事此直言享食不言燕亦有燕是以鄭詩羔裘云知子之來之雜珮以贈之鄭注云與異國賓客燕時雖無此物猶言之以致其厚意其若有之固將行之士大夫以君命出使主君之臣必以燕禮樂之助君之歡是也又昭二年左傳云韓宣子來聘宴于季氏𫝊無譏文明鄰國大夫有相燕之法又此大夫相禮饗食有常數雖有燕之亦無酬幣矣儀禮要義卷二十二
