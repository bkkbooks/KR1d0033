body:
  text: 儀禮要義卷十九宋魏了翁撰聘禮一此聘禮是侯伯之卿大聘聘禮第八鄭云大問曰聘者則此篇發首所論是也云久無事者案下記云久無事則聘焉注云事謂盟會之屬若有事事上相見故鄭據久無事而言云小聘使大夫者下經云小聘曰問其禮如為介三介是也周禮曰者大行人文鄭彼注小聘曰問殷中也久無事又於殷朝者及時相聘也父死子立曰世凡君即位大國朝焉小國聘焉此皆所以習禮考義正刑一德以尊天子也必擇有道之國而就修之然嵗相問殷相聘聘義所云比年小聘三年大聘是也大行人云上公九介侯伯七介子男五介又云凡諸侯之卿其禮各下其君二等聘義上公七介侯伯五介子男三介是諸侯之卿介各下其君二等者也若小聘曰問使大夫又下其卿二等此聘禮是侯伯之卿大聘以其云五介上介奉束錦士介四人皆奉玉錦又云入竟張旜孤卿建旜據侯伯之卿之聘者必見侯伯之卿聘者周公作經互見為義此見侯伯之卿大聘玉人云瑑圭璋八寸璧琮八寸以俯聘上公之臣公食大夫爼實云倫膚七據子男之臣是各舉一邊而言明五等俱有是其互見為義也因朝於三卿中選可使者聘禮君與卿圖事注謀聘故至謀事者必因朝云云言及可使者謂於三卿之中選可使者即經云遂命使者是也其總三事皆須謀者也言謀事者必因朝者欲取對衆共詢之意云其位君南面已下知面位然者此儀禮之內是諸侯三朝燕朝燕禮是也又射朝大射是也不見路門外正朝正朝當與二朝面位同案燕禮大射皆云卿西面大夫北面士東面公降階南面揖之是以知正朝面位然也若天子三朝射人見射朝司士見正朝不見燕朝以諸侯正朝與燕朝同明天子燕朝亦與正朝同也使者既在謀內猶見宰問所之遂命使者注既謀其人因命之云聘使卿者以其經云及竟張􅎶周禮司常云孤卿建􅎶故知使卿也若然使者自在謀內審知所聘之國逺近何以下記云使者既受行出遂見宰問幾月之資鄭注云古者君臣謀密草創未知所之逺近問行用多少但所謀之時經云出聘不言其國使者不得審知故更問之是以左氏吳公子季札遂聘齊晉衛鄭之等下文云無行則重賄反幣是亦有歷聘之事也諸侯以司徒為冢宰宰命司馬戒衆介介皆逆命不辭注逆猶受也釋曰天子有六卿天地四時之官是諸侯兼官而有三卿立地官司徒兼冢宰立夏官司馬兼春官立冬官司空兼秋官是以左氏杜泄云吾子為司徒叔孫為司馬孟孫為司空故禮記內則云后王命冢宰降德于衆兆民鄭云周禮冢宰掌飲食司徒掌十二教今一云冡宰記者據諸侯也諸侯并六卿為三或兼職焉是其諸侯并六卿為三諸侯以司徒為冡宰義與此同宰上卿二君事諸侯謂司徒為宰者也云士屬司馬引周禮者案司士屬司馬而云作士適四方使為介諸侯之司馬亦然故引以證諸侯司馬戒衆介也云不辭者是其副使之賤者故不敢辭宰書聘幣幣稱其邦之大小宰書幣注書聘云云宰又掌制國之用宰即上命司徒兼官者也云書聘所用幣多少也者謂聘鄰國享君及夫人問卿之等幣周禮司儀云凡諸侯之交各稱其邦而為之幣以其幣為之禮鄭云幣享幣也於大國則豐於小國則殺先行之日夕幣及期夕幣釋曰自此盡受書以行論陳幣付使者之事云夕幣先行之日夕知者下云厥明釋幣于禰是行日明此夕是先行之日夕也云視之者正謂賔及衆介視之故下云使者朝服帥衆介夕注云視其事是也管人布幕以承幣於外朝管人布幕于寢門外云館人謂掌次舍帷幕者也者案天官有掌舍掌次幕人等掌次云有邦事則張幕設案掌舍職云為帷宫設旌門又幕人云掌帷幕幄帟綬之事鄭云在旁曰帷在上曰幕幕或在地展陳于上即此布幕是也館人即彼掌舍以諸侯兼官故鄭總言之也云幕以承幣者即下文官陳幣是也云寢門外朝也者謂路門外即正朝之處也下記云宗人授次以帷則館人與宗人共掌之若賔客則宗人掌之也官陳享幣不陳璧琮無皮則用馬官陳幣皮北首西上加其奉於左皮上馬則北面奠幣云云云官陳幣者即上文官具者也館人布幕於地官陳幣於其上云奉所奉以致命謂束帛及玄纁也者所奉謂後享時奉入以致命故知是以下文享時所致束帛加璧以享君玄纁加琮以享夫人鄭不言璧琮者璧琮不陳厥明乃授之也云馬言則者此享主用皮或時用馬者主用皮謂有皮之國國無皮者乃用馬故下云庭實皮則攝之鄭注皮言則者或用馬也記云皮馬相間可也注間猶代也土物有宜也君在路寢聽政宰入告具宰入告具于君君朝服出門左南鄉注入路門而告案朝在路門外故知入路門至路寢而告君以其在路寢聽政處故也史展幣授宰宰告備故也宰執書告備具于君授使者使者受書授上介公揖入云史展幣畢以書還授宰者以其宰在幕東西面史居前西面讀書展幣展幣訖明回還授宰宰以書授使者展幣授使者訖禮畢故入於寢也賔介將行釋幣于禰反則釋奠厥明賔朝服釋幣于禰注告為君使也賔使者云云釋曰自此盡亦如之論賔與上介將行告禰之事云朝服者卿大夫朝服祭故還服朝服告也云天子諸侯將出告群廟者案禮記曾子問云孔子曰諸侯適天子必告于祖奠于禰注云皆奠幣以告之是諸侯出告羣廟案彼下文又云孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出是天子與諸侯同告羣廟之事云大夫告禰而已者大夫三廟降天子不得並告故直告禰而已若父在則告祖知者下記云賜饔唯羮飪筮一尸若昭若穆注云筮尸若昭若穆容父在父在則祭祖父卒則祭禰以此言之明初行時父在釋幣於祖廟可知案昭元年楚公子圍聘於鄭云布几筵於莊共之廟而來服氏云莊謂楚莊王圍之祖共王圍之父是大夫並告羣廟者彼不告聘直告娶故得並告古者大夫得因聘而娶故傳云且娶於公孫假氏是也云凡釋幣設洗盥如祭者案曾子問云凡告用牲幣注云牲當為制則告無牲直用幣而已但執幣須潔當有洗而盥手其設洗如祭祀之時亦洗當東榮南北以堂深水在洗東篚在洗西必知無祭事者下文還時云乃至于禰筵几于室薦脯醢觴酒陳鄭云行釋幣反釋奠略出謹入是其差也使者稱賔入廟中更云主人有司筵几于室中祝先入主人從入云云云更云主人者廟中之稱也者上云賔至此更云主人是廟中之稱故特牲少牢皆稱主人對聘稱賔也帛錦十卷名束脯亦曰束制幣文尺異釋幣制玄纁束奠于几下出云凡物十曰束者案昏禮玄纁束則每卷二丈自餘行禮云束者每卷一丈八尺為制幣帛錦十卷者皆名束至於脯十脡亦曰束故云凡物十曰束也云玄纁之率玄居三纁居二者言率皆如是也玄三纁二者象天三覆地二也云朝貢禮云純四只制丈八尺者純謂幅之廣狹制謂舒之長短周禮趙商問只長八寸四八三十二幅廣三尺二寸大廣非其度鄭玄答云古積畫誤為四當為三三咫則二尺四寸矣雜記云納幣一束束五兩兩五尋然則每卷二丈若作制幣者每卷丈八尺為制合卷為匹也釋幣于行行神在廟門西又釋幣于行釋曰云行者之先其古人之名未聞者此謂平治道路之神云古人名未聞者謂古人教人行道路者其人名字未聞云天子諸侯有常祀在冬者月令祀行是也言此者欲見大夫雖三祀有行無常祀因行使始出有告禮而已至於出城又有軷祭祭山川之神喻無險難也大夫三祀曰門曰行曰厲者祭法文云喪禮有毁宗躐行出于大門者檀弓文案彼云掘中霤而浴毁竈以綴足及葬毁宗躐行出于大門殷道也下文周柩入毁宗雖不云躐行亦有行可知所毁者毁廟門西而云躐行明行神在廟門西矣不云埋幣可知者承上宗廟埋之此亦埋可知云今時民春秋祭祀有行神古之遺禮乎者鄭以行神無正文雖約檀弓猶引漢法為况乎者猶疑之矣若然城外祭山川之神有軷壤是月令冬祭行注云行在廟門外之西為軷壇厚二寸廣五尺輪四尺是也賔釋幣訖不復入介待賔大門外上介及衆介俟於使者之門外自此盡斂􅎶為使者與介向君朝受命即行之事知待於門外東面北上者上云賔釋幣訖不復入明介待賔於大門外賔出則向君也言東面北上者依賔客門外之位使介受命于朝謂皋門外非路門外常朝位使者載􅎶帥以受命于朝云至于朝門者凡諸侯三門臯應路路門外有常朝位下文君臣皆朝列位乃使卿進使者乃入至朝即此朝門者臯門外矣知北面東上者還依展幣之位也賈人取圭垂繅授宰繅有二種賈人西面坐啓櫝取圭垂繅不起而授宰云其或拜則奠于其上者故覲禮記云奠圭于繅上是也但繅有二種一者以木為中幹以韋衣之天子五采公侯伯三采子男二采采為再行下記及典瑞皆有其文此為繅也下記云絢組尺及曲禮下文執玉其有藉者則裼鄭亦謂之繅若韋版為之者奠玉於上此則無垂繅屈繅之事若絢組為之者所以繫玉於韋版使不失墜此乃有屈垂之法則此經所云者是也案向來所注皆以韋版繅籍解之者鄭意以承玉及繫玉二者所據雖異所用相將又同名為繅是以和合解之故以韋版為之者以解絢組之繅也使者受聘君圭享君璧聘夫人璋享琮受享束帛加璧受夫人之聘璋享玄纁束帛加琮皆如初此經中三事上經已受聘君圭此經受享君束帛加璧又受聘夫人璋又受享夫人琮案上文夕幣時云官陳幣皮北首西上加其奉於左皮上鄭注云奉所奉以致命謂束帛及玄纁也則知所陳直陳束帛及玄纁不陳璧琮是以此經受璧而連言束帛玄纁者以其享時束帛加璧於其上玄纁加琮於其上以相配之物故兼言束帛玄纁若然璧琮右受者以其璧琮與圭璋同類尊之故也云帛今之璧色繒者周禮大宗伯云孤執皮帛鄭注亦然又案宗伯云以蒼璧禮天下云牲幣各放其器之色幣即幣帛禮天之璧用蒼色則幣帛之色亦蒼色是璧色繒於漢時云璧色繒者亦因周法則此束帛亦與璧色同以其相配但未知正用何色耳云聘用璋取其半圭知半曰璋者案周禮典瑞云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月璋邸射以祀山川以上向下差之以兩圭半四圭圭璧半兩圭璋邸射又半圭璧是半圭曰璋也云圭璋特達瑞也者聘義云圭璋特逹德也鄭云特逹謂以朝聘也言瑞者大宗伯云以玉作六瑞公執桓圭以下皆是瑞故尚書云班瑞於羣后言特達者不加束帛也舍於郊謂脫舍朝服服深衣而行遂行舍於郊釋曰受命則行故云遂行言於此脫舍衣服乃即道者上文云賔朝服告禰及遂朝君受命至此衣服未改鄭注云吉時道路深衣則此脫舍朝服服深衣而行引曲禮者見受君命及君言言别有告請之事遂行舍於郊則彼云不宿于家也諸侯相聘有假道周衰天子亦假道若過邦至于竟使次介假道束帛將命于朝曰請帥奠幣注帥猶道也釋曰自此盡執䇿於其後論過他國竟假道之事云諸侯以國為家不敢直徑者案左氏傳僖三十三年秦師襲鄭不假道於晉為晉所敗是其不假道直徑過天子之師行過無假道以其天子以天下為家所在如主人故也天子微弱則有之是以周語定王使單襄公聘於宋遂假道于陳以聘楚服氏注云是時天子微弱故與諸侯相聘問主國致餼諸經釋餼鄭望文為義餼之以其禮上賔大牢積唯芻禾介皆有餼釋曰此謂主國所致禮云凡賜人以牲生曰餼者言凡者總解諸文案此下經云主國使卿歸饔餼五牢云飪一牢腥二牢餼二牢陳于門西鄭注云餼生也牛羊右牽之豕東之是牲生曰餼上介及士亦皆牲生為餼論語云告朔之餼羊鄭注亦云牲生曰餼春秋傳云餼臧石牛服氏亦云牲生是凡牲生曰餼春秋僖三十三年鄭皇武子云餼牽竭矣服氏以為腥曰餼以其對牽故以餼為腥詩序云雖有牲牢饔餼鄭云腥曰餼以其對生是活故以餼為腥又不為牲生者鄭望文為義故注不同也餼猶稟也給也者於賔為稟稟受也於主人為給給賔客也云以其禮者尊卑有常差常差者上賔上介牲用大牢經不言上介知與賔同大牢者若上介與羣介同當為介皆少牢是以下文大夫餼賔云上賔上介皆大牢米八筐衆介皆少牢米六筐是上介與賔同之義也云米皆百筥以下盡二十車皆約下文君使卿致饔餼禮未至主國習入廟聘享之禮未入竟一肄釋曰自此盡私事論雖未至主國預習聘享威儀之事此與下文為目所習之禮事在下云謂於所聘之國者鄭解未入境案覲禮與司儀同為壇三成宫方三百步此則無外宫其壇壝土為之無城又無尺數象之而已云帷其北宜有所向依者雖不立主人賔介習禮宜有所向故帷其北也云無宮不壝土畫外垣也者不壝土為宫是畫外垣垣牆壝土為外牆土今則不畫宫也此所習之禮不習大門外內及廟門內之禮者以其於外威儀少而易行故略之但習入廟聘享揖讓升降布幣授玉之禮是以直云北面西上之位也注云入門左之位者案下文云賔入門左介皆入門右習聘享皆公事致命者不習私事習享士執庭實注士士至之節釋曰享時庭實旅百獻國所有非止於皮知所執是皮者以其金龜竹箭之等皆列之於地不執之所執者唯有皮云習夫人之聘享亦如之者以其行聘君訖則行聘夫人行享君訖即行享夫人還君受之一如受君禮故云亦如之也云習公事者謂君聘享夫人聘享及問大夫皆致君命故鄭云公事致命者是以下文行君聘享及夫人聘享訖擯出請賔告事畢鄭注云公事畢又問卿時云卿大夫升堂北面聽命賔東面致命鄭注云致其君之命皆公事致命者也私事者謂私覿於君私面於卿大夫故下文賔覿入門右注云私事自闑右為若降等然是也若然大夫之幣不在朝付之至郊乃付之避君禮不謂非公事及竟張􅎶明事在此國及竟張􅎶誓釋曰自此盡入境斂􅎶論賔至主國之境謁關人見威儀之事云張􅎶明事在此國者以其行道斂􅎶及境張􅎶明所聘之事有此國故張􅎶以表其事也是以鄭云明事在此國也云張􅎶使人維之者案節服氏掌祭祀朝覲六人維王之大常諸侯則四人但大常十二旒人有六則一人維持二旒鄭云維之以縷用線維之大夫無文諸侯四人不依命數大夫或一人或二人維持之使謁關人關告司關關告乃謁關人釋曰古者境上為關者王城十二門則亦通十二辰辰有一門一關諸侯未知幾關魯廢六關半天子則餘諸侯亦或然也云關譏異言案王制云關幾而不征注亦云幾幾異服異言二注皆無正文案周禮司門云幾出入不物者注云不物衣服視占不與衆同鄭以出入不物幾之則不物中含有此異服異言云衣服視占不與衆同則是異也但周禮司關上士二人中士四人又云每關下士二人但司關為都總主十二關居在國都每關下士二人者各主一關今所謂關人者謂告每關關人來告司關司關為之告王故司關職云凡四方之賔客叩關則為之告關人問從者幾人即知大聘小聘關人問從者幾人釋曰不問使人而問從者關人卑者不敢輕問尊者故問從者云欲知聘問者問得從者即知使者是大聘亦知使者是小聘知者以君行師從一州之民卿行旅從一黨之人若大夫小聘當一族之人百人也且謂有司當共委積之具者賔客入竟當於廬宿市設少曰委多曰積問從者幾人當為卿行旅從對今不云而以介與受命者對是謙也聘禮上公之使七介至三介皆禮記聘義文入竟又斂􅎶乃展幣者入竟斂􅎶乃展釋曰自此盡賈人之館論三度展幣之事云重其事者亦恐有脫漏失錯故云重其事不可輕也斂􅎶變於始入者上及竟張􅎶注云事在此國也此則入竟後乃斂斂之者謂若初出至郊斂􅎶鄭云行道耳未有事也此亦及竟示有事於此國張之始入張之去國逺更是行道未有事故鄭云變於始入羣幣謂聘享訖以己物私覿私面有司展羣幣以告釋曰云羣幣私覿及大夫者上展君及夫人幣訖此言有司展羣幣故知是私覿及大夫者私覿者行君夫人聘享訖賔以私禮己物見主君云大夫者亦謂賔以己物面主國之卿必知私覿之幣是賔介自將己物者以經記上下唯有君及夫人聘享及問大夫聘之幣付使者之文不見有付賔介私覿之幣又案下文賔將還云遂行舍于郊公使卿贈如覿幣使下大夫贈上介亦如之使士贈衆介如其覿幣還至本國陳幣于朝云上賔之公幣私幣皆陳上介公幣陳他介皆否注云此幣使者及介所得於彼國君卿大夫之贈賜也其禮於君者不陳公幣君之賜也私幣卿大夫之幣也至於賔反命訖君使宰賜使者及介幣以此言之彼國所報私覿之幣還與賔介明知私覿是賔介私齎行可知也夏官校人云凡國之使者皆供其幣馬鄭注使者所用私覿若然彼使者謂天子使卿大夫存俯省問諸侯之事使者得之行私覿私覿之馬校人共之與諸侯禮異也王畿千里逺郊百近郊半之及郊又展如初釋曰云周制天子畿內千里者周禮大司徒云制其畿方千里據周禮而言其自殷已上亦畿方千里商頌云邦畿千里唯民所止夏亦千里王制云天子縣內方千里鄭據夏時禹貢方千里曰甸服據唐虞畿內是也云逺郊百里者司馬法文畿方千里王城面五百里以百里為逺郊若公五百里中置國城面二百五十里故逺郊五十里自此已下至子男差之可知云近郊各半之者亦約周天子逺郊百里近郊五十里亦無正文尚書君陳序云命君陳分正東郊成周鄭注周之近郊五十里今河南洛陽相去則然鄭以目驗知之若然天子近郊半逺郊則諸侯近郊各半逺郊可知也畿內道路皆有侯館逺郊或亦有勞及館展幣於賈人之館如初釋曰案周禮遺人職云十里有廬三十里有宿五十里有市有候館畿內道路皆有候館鄭云逺郊之內有候館者據此候館在逺郊之內指而言之不謂於此獨有也以行道之間停息故云小休止沐浴又得展幣也注云展幣不于賔館者為主國之人有勞問已者就焉便疾也者若并在賔館則事煩不疾若展幣於賈人之館其賔館受勞問是以就賈人之館展幣便疾也案大行人諸侯朝天子上公三勞侯伯再勞子男一勞孤不問一勞諸侯自相朝無過如朝天子遣臣相聘無過一勞此下文使卿近郊勞此乃逺郊之內得有此勞問己者謂同姓舅甥之國而加恩厚者别有逺郊之內問勞也上介出門西面請事入門北面告賔上介出請入告注出門西面請所以來事也入告者入北面告賔也釋曰此時賔當在賔館阼階西面故上介北面告賔也云每所及至皆有舍其有來者皆出請入告于此言之者賔彌尊事彌録者道皆有廬宿市候之舍前士請事大夫請行亦當出請入告於此始言之者先士次大夫後卿以是先卑後尊今復見此言故云賔彌尊事彌録也凡為使不答拜不敢當其禮勞者不答拜釋曰言凡者非直此卿為君勞賔不敢當其禮不答拜聘賔亦初入大門主君拜賔辟不答拜也如此之類皆然故云凡以該之至後儐勞者與之答拜為已故也比侯伯之臣若公之臣則受勞于堂賔揖先入受于舍門內釋曰知公之臣受勞于堂者案司儀云諸公之臣相為國客及大夫郊勞三辭拜辱三讓登聽命是公之臣受勞於堂賔在館如主人故勞者東面致命勞者奉幣入東面致命釋曰賔在館如主人當入門西面故勞者東面向之也大夫家臣稱老授老幣釋曰大夫家臣稱老若趙魏臧氏老之類也儐勞者謂賔以來者為賔賔用束錦儐勞者釋曰云言儐者賔在公館如家之義亦以來者為賔者凡言儐者謂報於賔今以賔館故賔若主人故云儐勞者即以勞者為賔故也勞者稽首受儐賔亦稽首送幣勞者再拜稽首受釋曰周禮大祝辨九拜一曰稽首首至地臣拜君法二曰頓首頭叩地平敵相拜法三曰空首首至手君答臣下拜法郊特牲云大夫之臣不稽首非尊家臣以辟君也今此勞者與賔同類不頓首而稽首故云尊國賔也下賔亦稽首送者以是為君使故亦稽首以報之也賔之使者執皮勞者從人訝受勞者揖皮出乃退賔送再拜執皮者是賔之使者執皮者得揖從出勞者從人當訝受之是以公食大夫禮云賔三飯公侑食以束帛庭實設乘皮賔受幣賔出揖庭實出鄭云揖執皮者若親受云上介受賔幣從者訝受皮則此從者亦訝受可知也主人與祝立少頃示有俟於神主人立于户東祝立于牖西注少頃之間示有俟於神釋曰案士虞禮無尸者出户而聽若食間此無祭事故云有俟於神取幣降卷幣實于笲埋于西階東注埋幣必盛以器若藏之然儀禮要義卷十九
