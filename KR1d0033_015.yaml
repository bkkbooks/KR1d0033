body:
  text: 儀禮要義卷十五宋魏了翁撰燕禮二三卿重席於賔東每卿異席司宫兼卷重席設于賔左東上釋曰此經設三卿之席在于賔東言兼卷則每卿異席也者若三卿同席則直云卷重席不須言兼今云兼卷則兼三卿重席皆卷之故知每卿皆異席也云重席重蒲筵者案公食大夫記云司宫具几與蒲筵常緇布純加萑席尋𤣥帛純彼為異國之賔有蒲筵萑席兩重席故稱加上小臣設公席與公食大夫席及賔皆稱加亦是兩重席兩重而稱加此燕己臣子一種席重設之故不稱加若然案鄉飲酒云席于賔東公三重大夫再重公升如賔禮大夫則如介禮有諸公則辭加席鄉射亦云大夫辭加席案彼二文雖稱加上文云三重再重則無異席故彼記直云蒲筵彼云加者以上席加于下席故鄭彼云加席上席也故此下注云重席雖非加猶為其重纍去之是其一種席也飲射公大夫之席統於遵此卿坐統於君云卿坐東上統於君也者决鄉飲酒鄉射諸公大夫席于尊東西上彼遵尊於主人故鄭注云統於尊故統于君而東上也云席自房來者案公食記云宰夫筵出自東房卿重席非加猶辭之以辟君卿升重席司宫徹之云重席雖非加猶為其重纍去之辟君也者案鄉射云大夫辭加席之等皆是異席而辭之此重席重蒲筵不合辭以君有加席兩重故辭之以辟君鄭以諸公為大國之孤容牧有三監卿皆升就席若有諸公則先卿獻之如獻卿之禮云諸公者謂大國之孤也知者周禮典命云公之孤四命侯伯已下不言孤故據大國而言云孤一人者鄭司農注典命云上公得置孤卿一人後鄭從之故此亦云孤一人與司農義同云言諸者容牧有三監者以其言諸非一人案王制云天子使其大夫為三監監於方伯之國國三人彼是殷法同之周制使伯佐牧不置監周公制禮因殷不改者若士冠醮用酒之類故鄭云容言容有異代之法據周禮天子大夫四命與孤等故同稱公席孤北面無加席以近君屈之席于阼階西北面東上無加席釋曰案上文卿初設重席辭之乃徹此孤北面無加席者皆是為大尊屈之也云亦為阼階西位近君君則屈親寵苟敬私昵之坐者案下記云賔為苟敬席于阼階之西以為敬此孤亦席于阼階之西小臣請二大夫媵爵如初小臣又請媵爵者二大夫媵爵如初釋曰自此至送觶公答再拜論一人致爵于公之事云二大夫媵爵如初者亦上二人媵爵媵爵者阼階下皆北面再拜稽首公答再拜媵爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降阼階下皆奠觶再拜稽首執觶興公答再拜媵爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜媵爵者執觶待于洗南相似也故言二大夫媵爵如初也為賔舉旅又為卿舉旅公又行一爵若賔若長唯公所酬釋曰自此至奠于篚論為卿舉旅之事知一爵是先媵者之下觶者以其前大夫二人媵爵皆奠于薦南以其上觶者以為賔舉旅今又行一爵故知先媵者之下觶也其後媵一觶者留之後為大夫舉旅也大夫不酢主人又不拜既爵禮又殺於卿主人洗升獻大夫于西階上云云立卒爵不拜既爵釋曰自此盡皆升就席論獻大夫之節云不拜之者禮又殺者前卿受獻不酬酢辟君已是禮殺今大夫受獻不但不酢主人又不拜既爵故云禮又殺大夫獻後乃席遍獻乃薦降於卿辨獻大夫遂薦之繼賔以西東上釋曰凡大夫升堂受獻得獻訖即降獻遍不待大夫升遂薦於其位大夫始升故言遂也云遍獻之乃薦略賤也者決上卿與賔得獻即薦貴故也云亦獻而後布席者亦上獻卿之時司宫兼卷重席設於賔左此大夫不言設席明亦得獻後即布席也若然案大射席小卿賔西東上注云席於賔西射禮辨貴賤也以此言之燕禮主歡不辨貴賤小卿與大卿皆在賔東故此賔西無小卿位作樂有歌笙間合四節席工于西階上少東樂正先升北面立于其西釋曰自此至降復位論作樂之事此上下作樂之中有四節升歌一笙二間三合樂四凡執技藝者稱工此工瞽矇諷誦詩者注工瞽矇歌諷誦詩者也凡執技藝稱工釋曰工瞽矇歌諷誦詩者也者案周禮瞽矇掌播鼗諷誦詩鄭云諷誦詩謂暗讀之不依詠也彼不依琴瑟暗讀之即爾雅徒歌曰謡此作樂之時依於瑟即詩注云曲合樂曰歌一也故下云工歌鹿鳴之類是也云凡執技藝者稱工者執技藝文出於王制但能其事者皆稱工是以引少牢饋食祝稱工樂記師乙為大師樂官亦稱工至於冬官巧作者皆稱工云樂正于天子樂師也知樂正與樂師相當者案周禮樂師職云凡樂成則告備此樂正告樂備故知樂正當天子樂師樂師下大夫四人上士八人下士十有六人樂師大小多矣此諸侯樂正亦有大小之名也故大射云小樂正從之鄭注云小樂正於天子樂師也是其諸侯樂正雖有大小當天子樂師知大樂正不當天子大司樂者以其天子大司樂不告樂備故不得以大樂正當之但大射主於射略於樂故小樂正告樂備此燕主歡心故大樂正告樂備故不同工四人從大夫制公羊傳乃舞人數小臣納工工四人二瑟云云釋曰工四人者燕禮輕從大夫制也者鄭言此者決大射禮重工六人從諸侯制案公羊傳諸公六諸侯四若然知非大射是諸公制此燕禮是諸侯制者案卿射皆工四人是大夫制則諸侯不得有工四人五等諸侯同六人彼公羊六人四人不同者自是舞人之數不得以彼決此也燕尚樂面鼓燕輕於大射故小臣相工云面鼓者燕尚樂可鼓者在前也者此決鄉飲酒左何瑟後首臣降於君故也引天子大僕二人也者周禮序官文引之者此經小臣相工大射云僕人正徒相大師僕人師相少師僕人士相上工僕人以下同官既多遞換相工但大射辨尊卑故僕人正等相工此燕禮輕故小臣相工是以别周禮同官人多得相參之意工歌小雅之三各有取義工歌鹿鳴四牡皇皇者華注三者皆小雅篇也鹿鳴君與臣下及四方之賔宴講道修政之樂歌也此采其已有㫖酒以召嘉賔嘉賔既來示我以善道又樂嘉賔有孔昭之明德可則效也四牡君勞使臣之來樂歌也此采其勤苦王事念將父母懷歸傷悲忠孝之至以勞賔也皇皇者華君遣使臣之樂歌也此采其更自勞苦自以為不及欲咨謀於賢知而以自光明也釋曰云工歌乃獻之賤者先就事也者歌詩是其事先施功勞乃始獻之是賤者先就事對工以上不就事而得獻也故大射注云工歌而獻之以事報之是也工北面以西為左云左瑟便其右者工北面以西為左空其右受獻便者酒從東楹之西來故以右為便案大射云獻工工左瑟鄭注云大師無瑟於是言左瑟者節也以其經云僕人正徒相大師無瑟言大師左瑟者為飲酒之節此與鄉飲酒同無所分别師或瑟或歌是以不得言節之衆工衆笙皆洗皆祭工拜於席鄉飲酒大師則為之洗則衆工不洗也此經主人洗升獻工不辨大師與衆工則皆為之洗爵又案鄉飲酒記不洗者不祭此篇與大射羣工與衆笙皆言祭故知皆為之洗云工拜於席者以經云工興左瑟即云一人拜受爵不見有降席之文明工拜於席可知燕尚飲故歌後笙前舉旅與大射異公又舉奠觶唯公所賜以旅于西階上如初釋曰此燕尚飲酒故工歌之後笙奏之前而為大夫舉旅大射雖行燕禮主於射故笙之間至射乃為大夫舉旅云言賜者君又彌尊賔長彌卑者案上為賔舉旅直云公興以酬賔為卿舉旅而云若賔若長言若不定科酬其一不專為賔是君禮漸尊賔禮漸殺雖然猶言酬至此言唯公所賜者以上下言之舉旅酬畢曰卒卒注旅畢也釋曰言旅畢者謂為大夫舉旅行酬於西階之上或從賔或從卿次第盡大夫笙詩三篇注與鄉射同惟縣中磬南異笙入立于縣中奏南陔白華華黍注以笙播此三篇之詩縣中縣中央也鄉飲酒禮曰磬南北面奏南陔白華華黍皆小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周大師歸以祀其先王至孔子二百年之間五篇而已此其信也釋曰此笙奏南陔白華華黍三篇等經注與鄉射同亦不復重釋但此云笙入立于縣中以其諸侯軒縣闕南面而已故得言縣中鄉飲酒唯有一磬縣而已不得言縣中而云磬南注引鄉飲酒者欲見此雖軒縣近北面縣之南也獻笙西階上不升堂主人洗升獻笙于西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵不拜既爵升授主人注一人笙之長者也鄉射禮曰笙一人拜于下笙間六詩皆小雅衆笙不拜受爵降坐祭立卒爵辨有脯醢不祭乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀注間代也謂一歌則一吹也六者皆小雅篇也魚麗言太平年豐物多也此采其物多酒㫖所以優賔也南有嘉魚言太平君子有酒樂與賢者共之也此采其能以禮下賢者賢者纍蔓而歸之與之宴樂也南山有臺言太平之治以賢者為本也此采其愛友賢者為邦家之基民之父母既欲其身之壽考又欲其名德之長也由庚崇丘由儀今亡其義未聞鄭以召南為興王周南為受命遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋注周南召南國風篇也王后國君夫人房中之樂歌也關雎言后妃之德葛覃言后妃之職卷耳言后妃之志鵲巢言國君夫人之德采繁言國君夫人不失職也采蘋言卿大夫之妻能修其法度也昔大王王季居于岐山之陽躬行召南之教以興王業及文王而行周南之教以受命大雅云刑于寡妻至于兄弟以御于家邦謂此也其始一國爾文王作邑于豐以故地為卿士之采地乃分為二國周周公所食也召召公所食也於時文王三分天下有其二德化被于南土是以其詩有仁賢之風者屬之召南焉有聖人之風者屬之周南焉夫婦之道者生民之本王政之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂鄉飲酒升歌小雅禮盛者可以進取燕合鄉樂者禮輕者可以逮下也春秋傳曰肆夏繁遏渠天子所以享元侯也文王大明綿兩君相見之樂也然則諸侯相與燕升歌大雅合小雅也天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙間之篇未聞歌鄉樂鄭以合樂解歌與合同云遂歌鄉樂者鄉飲酒云乃合樂與此文不同者以其二南是大夫士樂大夫士或作鄉大夫或作州長故名鄉大夫樂飲酒不言鄉樂者以其是己之樂不須言鄉故直言合樂此燕禮是諸侯禮下歌大夫士樂故以鄉樂言之又鄉飲酒注云合樂謂歌與衆聲俱作彼經有合樂之字故也此經無合樂之字故闕而不言其實此歌鄉樂亦與衆聲俱作是以彼處解合為歌與衆聲俱作耳此歌而解合明同也歌笙間合各三終為一備大師告于樂正曰正歌備注升歌及笙各三終間歌三終合樂三終為一備知升歌以下四節皆三終者案禮記鄉飲酒義云工入升歌三終主人獻之笙入三終主人獻之間歌三終工告樂備故知皆三終彼與此經間歌合樂不獻之者但間歌合樂還是始升歌笙奏之前已得獻故不復重獻云備亦成也者案周禮樂師職云凡樂成則告備燕禮主於樂故大樂正升堂大射小樂正升樂正由楹內東楹之東告于公乃降復位言由楹內者以其樂正與工俱在堂廉則楹南無過處故由楹內適東楹之東告于公云復位位在東縣之北者案大射略於樂小樂正升堂經有左右正則知亦有大樂正至席工於西階上少東東面時小樂正亦降立於其南北面卒管工向東坫之東南西面北上坐時鄭注云於是時大樂正還北面立於其南臣位尊東明工升堂時小樂正升大樂正東方西面工來東坫之東南西面時大樂正東縣之北北面其小樂正則立于西階下東面此燕禮主於樂故大樂正升堂今降明復于東縣之北北面也堂上未立司正已舉旅堂下立司正乃旅射人自阼階下請立司正公許射人遂為司正釋曰自此盡皆反坐論立司正遂行所監之事云君三舉爵者為賓為卿為大夫舉旅云樂備作矣者歌笙間合四者備作各三終矣案鄉飲酒鄉射立司正後始行旅酬者彼是士饗禮饗禮之法莫問尊卑遍獻之後乃行旅酬故立司正之後乃行旅酬此燕禮國君燕其臣子雖一獻以辨尊卑故主人獻君而受酬主人卑不敢酬公獻之禮成於酬故使大夫媵觶於公當酬公君行大惠即舉之為賓賓得觶請旅諸臣遍卿大夫乃成一獻之禮復獻卿大夫皆為之舉旅行酬皆成其獻但卿大夫皆堂上有位近君不敢失禮故雖舉旅行酬而未立司正作樂後將獻羣士士職卑位在堂下將為士舉旅恐失禮故未獻之前即立司正監之故不同也司正命卿大夫曰以我安鄭兩解司正受命命卿大夫君曰以我安卿大夫皆對曰諾敢不安釋云君意殷勤欲留賓飲酒命卿大夫以我故安者以主人安客乃安故欲安賓先語卿大夫以我意故須安也云或亦其實不主意於賓者鄭意兩解前解主意為賓故使卿大夫為賓安或亦其實不專主為賓兼羣臣共安也堂上立行禮不說屨燕坐必說屨賓反入及卿大夫皆說屨升就席公以賓及卿大夫皆坐乃安釋曰凡在堂立行禮不說屨安坐則說屨故鄭云凡燕坐必說屨以其屨在足賤不宜在堂陳於尊者之側也云禮者尚敬敬多則不親燕安坐相親之心者左氏傳云饗以訓恭儉設几而不倚爵盈而不飲燕以示慈惠饗在廟立行禮是敬多則不親者也燕在寢以醉為度是相親之心者也若然且云賓及卿大夫說屨不云君降說屨則君說屨之在堂上席側是以禮記少儀云排闔說屨於户內者一人而已矣彼據尊者坐在室則尊者一人說屨在户內今此燕在堂上則君尊說屨於席側可知也未坐前骨體以致敬說屨後庶羞盡愛羞庶羞注謂􅍧至之道釋曰案大射云羞庶羞注云所進衆羞謂􅍧肝膋狗胾醢也或有炮鱉膾鯉雉兔鶉鴽大射先行燕禮明與彼同此注不言炮鱉已下注文不具鄭知有此物者以經云庶羞不唯二豆而已案內則為肝膋取狗肝一蒙之以其膋濡炙之舉燋其膋不蓼注云膋腸間脂此及大射其牲皆用狗故知有肝膋狗胾知有炮鱉膾鯉者詩云吉甫燕喜飲御諸友炮鱉膾鯉又內則及公食大夫上大夫二十豆有雉兔鶉鴽禮記王制云庶羞不踰牲此燕用狗必可有此物而已鄉飲酒鄉射亦有狗但經直云羞不云庶是以鄭注云胾醢明二豆無餘物也云骨體所以致敬也者據未坐以前庶羞所以致愛據說屨已後也君命無不醉賓及卿大夫興對司正升受命皆命君曰無不醉皆興對曰諾敢不醉皆反坐釋曰云起對必降席者經云反坐不云降明起對必降席既對乃反坐也是以孝經云曾子避席曰參不敏亦是起對也大夫用觚旅乃觶此獻士即用觶主人洗升獻士于西階上士長升拜受觶主人拜送觶釋曰自此盡立飲論獻士之事云獻士用觶士賤也者對上大夫以上獻用觚旅酬乃用觶此獻士即用觶故云士賤也不從今文觚者若從觚與大夫已上何異燕末行射如鄉射之禮若射則大射正為司射如鄉射之禮釋曰此一經論燕末行射之節云大射正為司射者燕禮輕又不主為射故射人為擯又為司正至射時大射正為司射大射之時略於燕主於射故大射正為擯又為司正至射又親其職故不同為司射也酬皆用觶此媵觚誤以角旁氏似觚賓降洗升媵觚于公注酬之禮皆用觶言觚者字之誤云云釋曰自此盡賓反位論賓媵爵于公之節云古者觶字或作角旁氏由此誤爾者案冬官梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣鄭引南郡太守馬季常云觚當為觶豆當為斗鄭康成云古者觶角旁氏似觚故誤為觚時人又多聞觚寡聞抵是以誤此反位是反席以堂下無席賓反位釋曰知反位是反席者以其堂下無席堂上乃有之而曰賓升成拜不云降明上反位者反席可知也為士舉旅有執爵行之若漢時坐勸酒前三舉旅皆酬者自酌授人公坐取賓所媵觶興唯公所賜釋曰自此盡士旅酌卒論君為士舉旅之事云唯公所賜者辭與為大夫舉旅同也云至此又言興者明公崇禮不倦者也以其說屨升坐之後理當倦今言興明不倦矣有執爵者無算坐勸酒有執爵行之者今此為士舉旅亦有執爵行之若無算爵然後士有盥升主酌授之者若然前三舉旅皆酬者自酌授人也坐行之若今坐勸酒此注大夫興酬士士立堂下無坐位大夫卒受者以爵興西階上酬士云云云興酬士者士立堂下無坐位者凡禮堂上有席者坐堂下無席者立是以禮記檀弓工尹商陽是士而云朝不坐堂下無坐位者也獻庶子外內臣言內小臣遍獻可知卒主人洗升自西階獻庶子于阼階上如獻士之禮辨降洗遂獻左右正與內小臣皆於阼階上如獻庶子之禮注庶子掌正六牲之體及舞位使國子修德學道世子之官也而與膳宰樂正聨事樂正亦學國子以舞左右正謂樂正僕人正也小樂正立于西縣之北僕人正僕人師僕人士立于其北北上大樂正立于東縣之北若射則僕人正僕人士陪于工後內小臣奄人掌君隂事隂令后夫人之官也皆獻于阼階上别於外內臣也獻正下及內小臣則磬人鐘人鑮人鼓人僕人之屬盡獻可知也凡獻皆薦也釋曰此一經獻庶子以下之節云庶子掌正六牲之體及舞位使國子修德學道世子之官也者案周禮諸子職云大祭祀正六牲之體凡樂事正舞位國子存遊倅使之修德學道彼天子諸子之官屬大子若據諸侯為庶子之官引之者以天子謂之諸子諸侯謂之庶子掌公卿大夫士之適子掌事是同故取諸子職解此庶子之事云而與膳宰樂正聨事者以掌正六牲之體得與膳宰聯事掌國子修德學道得與樂正聯事以其樂正亦掌教國子故也言此者欲見膳宰得獻此庶子亦得獻之意云樂正亦教國子以舞者欲見庶子掌國子得與樂正聯事左右正謂樂正僕人正也僕人正以下至北上鄭知義然者見大射禮而知云左右正者據中庭為左右大射禮工遷于東僕人正亦與樂正同處名曰左正復云右正明是小樂正在西為一也若小樂正不在西大射之禮不得有左右正之文又兩靣俱縣明大小樂正各監一縣庶子至內小臣獻於阼以别於他臣云內臣奄人掌君隂事隂令后夫人之官也者案天官小臣序官云內小臣奄上士四人其職云掌王之隂事隂令鄭注云隂事羣妃御見之事隂令王所求為於北宫彼后之官兼云夫人者欲見諸侯夫人內小臣亦與后之內小臣職同故雙言之云皆獻於阼階上别於外內臣也者臣云外內者案周禮有外內命夫鄭注云外命夫六卿以出案內命夫朝廷卿大夫則諸侯臣在鄉遂及采地者為外臣在朝廷者為內臣但外內臣皆獻於西階上此獻於阼階故云别於外內臣也無算爵對四舉旅前皆有次有數無算爵注算數至而止釋曰自此盡無算樂論酒行樂作無次數之節云爵行無次無數者此對四舉旅以前皆有次有數席以東為上席下謂席西云席下席西也者賓與卿大夫席皆南靣統於君皆以東為上燕末拜下不稱賓皆正臣禮士不拜受爵大夫就席士旅酌亦如之公有命徹幂則卿大夫皆降西階下北靣東上再拜稽首公命小臣辭公答再拜大夫皆辟注命徹幂者公意殷勤必盡酒也小臣辭不升成拜明雖醉正臣禮也不言賔賔彌臣也君答拜於上示不虛受也釋曰云士旅酌亦如之如大夫相酌之法云公有命徹冪者此君尊在東楹之西專大惠故待無算爵乃徹冪鄉飲酒尊在房户之間賓主共之故賓至則徹之與此異也云小臣辭不升成拜明雖醉正臣禮也者臣之禮當下拜為正今不言升成拜者於下已拜是雖無算爵已醉而不倦行臣禮禮之正也云不言賓賓彌臣也者經直言卿大夫皆降不别言賓是燕末賓同於臣言彌者上旅酬云若賓若長猶言賓但言賜不言酬已是賓卑今乃設賓不言賓是賓彌臣故同臣例也云君答拜於上示不虛受也者案燕義云禮無不答言上之不虛取於下也彼釋此言也但彼言不虛取於下者總申此燕禮君答拜之事不獨為此言也凡燕設燭者射後終宴則至宵宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為大燭於門外注宵夜也燭燋也甸人掌共薪蒸者庭大燭為位廣也閽人門人也為作也作大燭以俟賓客出釋曰凡燕法設燭者或射之後終宴則至宵也或冬之日不射亦宵夏之日不射未必至宵也云燭燋也者古者無麻燭而用荆燋故少儀云主人執燭抱燋鄭云未爇曰燋但在地曰燎執之曰燭于地廣設之則曰大燭其燎亦名大燭故詩云庭燎之光毛云庭燎大燭也鄭云夜未央而於庭設大燭毛鄭並指此甸人執大燭之文也司烜氏云凡邦之大事共墳燭庭燎𤣥謂墳大也樹於門外曰大燭於門內曰庭燎言樹則大燭亦在地廣設之而已此閽人為大燭于門外者亦是大燭在地者按郊特牲云庭燎之百由齊桓公始也注云僭天子也庭燎之差公蓋五十侯伯子男皆三十文出大戴禮也此亦諸侯禮以燕禮輕故不言庭燎設大燭而已云甸人掌共薪蒸者天官甸師氏職文引之者以其內有燭燋故使之在門為大燭也云閽人門人也者按天官閽人掌守王中門之禁諸侯亦當然公燕四方使者與已臣同唯戒異公與客燕注謂四方之使者釋曰自此盡敢拜賜命論與異國臣將燕使卿大夫就館戒客之辭事但燕異國卿大夫與臣子同唯戒賓為異故于禮末特見之也云謂四方之使者以其云客以寡君對之故知四方使卿大夫來聘主君將燕之也燕朝服於寢者記經不具記燕朝服於寢注朝服至異也釋曰凡記皆記經不具者以經不言燕服及燕處故記人言之也云謂冠𤣥端緇帶素韠白屨者皆士冠禮文案屨人注天子諸侯吉事皆舄諸侯朝服素裳素韠應白舄而云白屨者引士冠禮成文其實諸侯當白舄其臣則白屨也鄭注周禮屨人云復下曰舄禪下曰屨下謂底以此為異也云燕於路寢相親眤也知燕於寢者以其饗在廟明燕在寢私處可知也引漢法欲見與古異者周時𤣥冠服則緇布衣今衣皮辨服是其異也注今辟雍十月行此燕禮𤣥冠而衣皮辨服與禮異燕禮公食鄉飲亨狗注各不同亨於門外東方注亨於門外臣所掌也釋曰此君禮故云臣所掌案公食記云亨於門外東方注云必於門外者大夫之事也注不同者以其饗食在廟嚴凝宜親監視不得言臣所掌故注云大夫之事也鄉飲酒亨狗於堂東北者非君禮是臣於堂東北不在外者宜主人親供又法陽氣之所始故三者注皆不同鄭以四方賔燕之節擬公食其實多不同若與四方之賔燕則公迎之于大門外揖讓升釋曰云自戒至於拜至皆如公食者此燕用狗彼用太牢此戒賔再辭彼三辭至于卿大夫立位皆不同而云如公食者謂除此之外如之若然依公食從首使大夫戒各以其爵上介出請入告已下至北靣再拜稽首皆如之饌具之等不如之也云亦告饌具而後公即席小臣請執冪請羞者乃迎賔也者言此者欲見燕四方賔此等依上文與燕己臣子同亦不如公食以其公食公無席又無入廟之事又公食無請執幂羞膳故别言此也聘賔為苟敬席阼階西其介為賔賔為苟敬席于阼階之西北靣有脀不嚌肺不啐酒其介為賔釋曰云主國君饗時親進醴于賔者謂行聘享訖禮賔之時君親酌醴進於賔若然前有饗食不言之者饗禮亡無以引證食禮又無酒醴所獻之事故不言而云饗時也云今燕又宜獻焉者按上燕己臣子使宰夫為主人知此親獻者若不親獻即同己臣子賔何須辭之而為苟敬故知君當親獻焉云至此升堂而辭讓者若此時升堂不辭即行燕賔之禮故知辭之在初升堂時云欲以臣禮燕為恭敬也者此謂在阼西北靣故云席之如諸公之位也云言苟敬者賔實主國所宜敬也者賔實主國所宜敬但為辭讓故以命介為賔不得敬之今雖以介為賔不可全不敬於是席之於阼階西且敬也燕聘使君得專席受賔酢與燕已臣異無膳尊無膳爵注降尊以就卑釋曰郊特牲云三獻之介君專席而酢焉此降尊以就卑也注云三獻卿大夫來聘主君饗燕之以介為賔賔為苟敬則徹重席而受酢也專猶單也彼與此事同故鄭引彼經以證此燕已臣子不見有君親受賔酢若燕異國臣子得有專席受酢者獻卿大夫之後依次各為此三人與旅獻士之後賔乃媵觶於公賔取所媵觶為士舉旅應以為酢君君專席而受之也與卿大夫燕皆大夫為賔聘使則介為賔與卿燕則大夫為賔與大夫燕亦大夫為賔釋曰此謂與已臣子燕法若與異國賔燕皆用上介為賔如上說也云公父文伯飲南宫敬叔酒路堵父為客是魯語文此三人皆魯大夫自相燕法云此之謂也者此謂不使所為燕者為賔之義云君恆以大夫為賔者大夫卑雖尊之猶逺於君者案禮記燕義云不以公卿為賔為疑也明嫌之義也注云公卿尊矣復以為賔則尊與君大相近是不用公卿為賔恐逼君用大夫為賔雖尊之猶逺於君賔及寢庭金奏肆夏示易以敬若以樂納賔則賔及庭奏肆夏云云云肆夏樂章也今亡者鄭注鍾師云九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具也云以鍾鑮播之鼓磬應之者鍾師云掌金奏鄭注云擊金以為奏樂之節金謂鍾及鎛又云凡樂事以鍾鼓奏九夏鄭注云先擊鍾次擊鼓是奏肆夏時有鍾鎛鼓磬彼經注雖不言磬但縣內有此四者故鄭兼言磬也言所謂金奏也者所謂鍾師掌金奏也云記曰此鄭引二記之文何者云入門而縣興是仲尼之文仲尼燕居云兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋郊特牲云賔入大門而奏肆夏示易以敬也必引二記文者以燕在寢賔及庭及寢庭與仲尼燕居入門而縣興事相類故引之證賔及庭樂作之義也此肆夏以金奏之故引郊特牲示易以敬證用肆夏之義也不取賔入大門者大門非寢門鹿鳴言升歌新宮言下管明笙奏異常燕升歌鹿鳴下管新宫笙入三成釋曰鹿鳴不言工歌新宫不言笙奏而言升歌下管者欲明笙奏異於常燕常燕即上所陳四節是也今工歌鹿鳴三終與笙奏全别故特言下管新宫乃始笙入三成者止謂笙奏新宫三終申說下管之義云新宫小雅逸篇也知在小雅者以配鹿鳴而言凡升階四連步一栗階二歷階三躇階四凡栗階不過二等注其始至升堂釋曰凡堂及階尊者髙而多卑者卑而少按禮器云天子之堂九尺諸侯七尺大夫五尺士三尺士冠禮降三等受爵辨鄭注云降三等下至地則士三等階以此推之則一尺為一階大夫五尺五等階諸侯七尺七等階天子九尺九等階可知今云凡栗階不過二等言凡則天子九等已下至士三等皆有栗階之法栗階不過二等據上等而言故鄭云其始升猶聚足連步一也故曲禮云涉級聚足連步以上鄭注云涉等聚足謂前足躡一等後足從之併連步謂足相隨不相過也此即聚足一也天子已下皆留上等為栗階左右足各一發而升堂其下無問多少皆連步雜記云主人之升降散等鄭注云散等栗階則栗階亦名散等凡升階之法有四等連步一也栗階二也歷階三也歷階謂從下至上皆越等無連步若禮記檀弓云杜蕢入寢歷階而升是也越階四也越階謂左右足越三等若公羊傳云趙盾避靈公躇階而走是也賔若飲君燕則夾爵若飲君燕則夾爵注謂君在不勝之黨賔飲之如燕媵觚則又夾爵釋曰夾爵者將飲君先自飲及君飲訖又自飲為夾爵鄭以房中樂無鐘磬與磬師注異有房中之樂注弦歌至君子釋曰云弦歌周南召南之詩而不用鐘磬之節者此文承四方之賔燕下而云有明四方之賔而有之知不用鐘磬者以其此二南本后夫人侍御於君子用樂節是本無鐘磬今若改之而用鐘磬當云有房中之奏樂今直云有房中之樂明依本無鐘磬也若然按磬師云教縵樂燕樂之鐘磬注云燕樂房中之樂所謂隂聲也二樂皆教其鐘磬房中樂得有鐘磬者彼據教房中樂待祭祀而用之故有鐘磬也房中及燕則無鐘磬也儀禮要義卷十五
