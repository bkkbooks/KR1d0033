body:
  text: 儀禮要義卷五宋魏了翁撰士昏禮二女次純衣不言裳婦服不殊裳女次純衣纁袡立于房中南面釋曰不言裳者以婦人之服不殊裳是以内司服皆不殊裳彼注云婦人尚専一徳無所兼連衣裳不異其色釋次純衣纁袡之制注次首云云周禮追師掌為副編次注云次首飾也今時髲也周禮追師掌為副編次者案彼注云副之言覆所以覆首為之飾其遺象若今步繇矣編編列髪為之其遺象若今假紒矣次次第髪長短為之所謂髲髢言所謂謂如少牢主婦髪鬄也又云外内命婦衣鞠衣襢衣者服編衣禒衣者服次其副唯於三翟祭祀服之士服爵弁助祭之服以迎則士之妻亦服禒衣助祭之服也云純衣絲衣者此經純亦是絲理不明故見絲體也云女從者畢袗𤣥則此衣亦𤣥矣者此鄭欲見既以純為絲恐色不明故云女從袗𤣥則此絲衣亦同𤣥色矣云袡亦縁也者上纁裳緇袘袘為縁故云袡亦縁也云袡之言任也以纁縁其衣象隂氣上任也者婦人隂象隂氣上交於陽亦取交接之義也云凡婦人不常施袡之衣盛昏禮為此服者此純衣即禒衣是士妻助祭之服尋常不用纁為袡今用之故云盛昏禮為此服云喪大記曰復衣不以袡明非常者以其始死招魂復魄用生時之衣生時無袡知亦不用袡明為非常所服為盛昏禮故服之引之者證袡為非常服也然鄭言凡婦人服不常施袡者鄭欲見王后已下初嫁皆有袡之意也姆以婦道教人若漢時乳母選有徳姆纚笄宵衣在其右釋曰云姆婦人年五十無子出而不復嫁能以婦道教人者婦人年五十隂道絶無子乃出之案家語云婦人有七出就七出之中餘六出是無徳行不堪教人故無子出能以婦道教人者以為姆既教女因從女向夫家也云若今時乳母者漢時乳母與古時乳母别案喪服乳母者據大夫子有三母子師慈母保母其慈母闕乃令有乳者養子謂之為乳母死為之服緦麻師教之乳母直養之而已漢時乳母則選徳行有乳者為之并使教子故引之以證姆也纚以縚髪笄漢時簮綃衣謂領云纚縚髪者此纚亦如士冠纚以繒為之廣充幅長六尺以縚髪而紒之姆所異於女者女有纚兼有次此母則有纚而無次也云笄今時簮者舉漢為况義也云宵讀為詩素衣朱綃之綃者引詩以為證也云姆亦𤣥衣以綃為領因以為名者此衣雖言綃衣亦與純衣同是禒衣用綃為領故因得名綃衣也必知綃為領者詩云素衣朱綃詩又云素衣朱襮爾雅釋器云黼黻領謂之襮襮既為領明朱綃亦領可知案上文云女禒衣下文云女從者畢袗𤣥皆是禒衣則此綃衣亦禒衣矣女與女從禪黼領此姆以𤣥綃為領也后夫人狄衣内子黼領士妻假盛女從者畢袗𤣥纚笄被顈黼在其後云云釋曰案周禮内司服云掌王后之六服褘衣揄狄闕狄又注云侯伯之夫人揄狄子男之夫人亦闕狄唯二王後禕衣故云后夫人狄衣也云卿大夫之妻刺黼以為領者以士妻言被明非常故知大夫之妻刺之常也不於后夫人下言領於卿大夫妻下乃云刺黼為領則后夫人亦同刺黼為領也但黼乃白黒色為之若於衣上則畫之若於領上則刺之以為其男子冕服衣畫而裳繡繡皆刺之其婦人領雖在衣亦刺之矣然此士妻言被襌黼謂於衣領上别刺黼文謂之被則大夫已下刺之不别被之矣案禮記云郊特牲云綃黼丹朱中衣大夫之僣禮也彼天子諸侯中衣有黼領服則無之此今婦人事華飾故於上服有之中衣則無也云如今偃領矣者舉漢法鄭君目驗而知至今已遠偃領之制亦無可知也云士妻始嫁施襌黼於領上假盛飾耳言被明非常服者對大夫已上妻則常服有之非假也主人迎賔壻入賔升奠鴈于房戸主人𤣥端迎于門外西面再拜賔東面荅拜注賓壻釋曰此言女父迎賔壻入廟門升堂父迎出大門之事也云賔升北面奠鴈再拜稽首者此時當在房外當楣北面知在房戸者見隠二年紀履緰來逆女公羊𫝊曰譏始不親迎也何休云夏后氏逆於庭殷人逆於堂周人逆於户後代漸文迎於房者親親之義也前六禮主人皆拜獨此授女不荅拜主人揖入賓執鴈從至于廟門揖入至賓升北面奠雁再拜稽首云云釋曰云賔升奠鴈拜主人不荅明主為授女耳案納采阼階上拜至問名納吉納徵請期轉相如皆拜獨於此主人不荅明主為授女耳云主人不降送禮不參者禮賔主宜各一人今婦既送主人不送者以其禮不參也壻御婦車授綏蓋僕人之禮壻御婦車授綏姆辭不受注壻御者親而下之云云釋曰云僕人之禮必授人綏者曲禮文今壻御車即僕人禮僕人合授綏姆辭不受謙也景之制蓋如明衣即褧衣婦乗以几姆加景乃驅御者代云云釋曰云景之制蓋如明衣者案既夕禮明衣裳用布袂屬幅長下膝鄭注云長下膝又有裳於蔽下體深也此景之制無正文故云蓋如明衣直云制如明衣此嫁時尚飾不用布案詩云衣錦褧衣裳錦褧裳鄭云褧襌也蓋以襌縠為之中衣裳用錦上加襌縠焉為其文之大著也庶人之妻嫁服也士妻䊷衣纁袡彼以庶人用襌縠連引士妻䊷衣則此士妻衣上亦用襌縠碩人是國君夫人亦衣錦褧衣則尊卑同用襌縠庶人卑得與國君夫人同用錦為文大著此士妻不用錦不為文大著故云行道禦風塵也御者代注云行車輪三周御者乃代壻壻乗其車先壻於婦家大門外乗其車導婦俟于門云壻車在大門外者謂在婦家大門外知者以其壻於此始言乗其車故知也云男率女女從男夫婦剛柔之義自此始也者並郊特牲文云門外壻家大門外者命士已上父子異宫故解為壻家大門外若不命之士父子同宫則大門父之大門外也壻揖婦入寢門席于奥媵御沃盥交婦至主人揖婦以入及寢門揖入升自西階云云媵御沃盥交釋曰此明夫導於婦入門升階及對席媵御沃盥之儀云主人揖婦以入者此則詩云好人提提宛然左辟是也云夫入于室即席者謂壻也婦在尊西未設席壻既為主東面須設饌訖乃設對席揖即對席為前後至之便故也云升自西階道婦入也者以尋常賔客主人在東賔在西今主人與妻俱升西階故云道婦入也云媵送也謂女從者也即姪娣也云御當為訝訝迎也謂壻從者也以其與婦人為盥非男子之事謂夫家之賤者也知媵沃壻盥於南洗御沃婦盥於北洗者以其有南北二洗又云媵御沃盥交明知夫婦與媵御南北交相沃盥也禮有舉鼎執匕執俎或兼或别賛者徹尊幂舉者盥除鼏舉鼎入陳云云匕爼從設釋曰案郊特牲少牢公食與有司徹及此昏禮等執匕爼舉鼎各别人者此吉禮尚威儀故也士喪禮舉鼎右人以右手執匕左人以左手執爼舉鼎人兼執匕爼者喪禮畧也云從設者以從男之事故從吉祭法也公食執匕爼之人入加匕於鼎陳爼於鼎南其匕與載皆舉鼎者為之特牲注云右人也尊者於事指使可也則右人於鼎北南面匕肉出之左人於鼎西爼南北面承取肉載於爼士虞右人載者喪祭少變故在西方長者在左也今昏禮鬼神隂陽當與特牲禮同亦右人匕左人載遂執爼而立以待設也云匕所以别出牲體也者凡牲有體别謂肩臂臑肫胳脊脅之等於鼎以次别匕出之載者依其體别以次載之於爼吉㐫鄉燕禮有設湆不設湆之異設湆于醬南設對醬于東云云設湆于醬北釋曰云湆即上文大羮湆在爨者羮宜熱臨食乃將入是以公食大夫大羮湆不和寔于鐙由門入公設之于醬西是也又主人食公食大夫是也特牲士虞為神設皆為敬尸尸亦不食也鄉飲酒鄉射燕禮大射不設者湆非飲食之具故無也少牢無湆者文不備有司徹有湆者賔尸禮䙝故有之與少牢異也云設湆于醬北者案上設壻湆於醬南在醬黍之南特爼出於饌北此設婦湆於醬北在特爼東饌内則不得要方上注云要方者據大判而言耳云啟㑹卻于敦南對敦于北者取壻東面以南為右婦西面以北為右各取便也卻仰也謂仰於地也謂爾黍為移置席上昏從祭法贊爾黍授肺脊皆食以湆醬皆祭舉食舉也釋曰云爾移也者爾訓為近謂移之使近人故云移置席上便其食也案玉藻云食坐盡前謂臨席前畔則不得移黍於席上此云移置席上者鬼神隂陽故此昏禮從特牲祭祀法同牢示親故三飯成禮與祭異三飯卒食注卒己也少牢十一飯特牲九飯而禮成此獨三飯故云同牢示親不主為食起三飯而成禮也酳所以潔口且安食贊洗爵酌酳主人主人拜受云云酳婦亦如之皆祭釋曰云酳漱也酳之言演也安也潄所以潔口且演安其所食者案特牲云主人洗角升酌酳尸注云酳猶衍也是獻尸也謂之酳者尸既卒食又欲頥衍養樂之又少牢云主人酌酒乃酳尸注云酳猶羡也既食之而又飲之所以樂之三注不同者又有詳畧相兼乃具士虞亦是酳尸注直云酳安食也不言養樂及羡者喪故畧之此三酳俱不言獻皆云酳直取其潔再酳如初無從三酳用卺亦如之卒爵皆拜贊答拜受爵再酳如初無從三酳釋曰云再酳如初者如自贊洗爵已下至答拜受爵也云亦無從也者三酳用卺亦如之亦自贊洗爵至受爵鄭直云亦無從用卺文承再酳之下明知事事如再酳有從再酳如初無從三酳用卺亦無從故鄭以亦無從言之其實皆同再酳也媵御祍席交姆授巾主人說服于房至御祍于奥媵祍良席在東皆有枕北止釋曰自此至呼則聞論夫婦寢息及媵御餕之事也云主人說服于房媵受婦脫服于室御受者與沃盥文同亦是交接有漸之義也祍于奥至于婦席使御布婦席使媵布夫席此亦示交接有漸之義也云祍卧席也者案曲禮云請席何鄉請祍何趾鄭云坐問鄉卧問趾因於隂陽彼祍稱趾明祍卧席也若然前布同牢席夫在西婦在東今乃夫在東婦在西易處者前者示有隂陽交㑹有漸故男西女東今取陽往就隂故男女各於其方也云孟子者案孟子離婁篇證婦人稱夫為良人之義也婦人十五許嫁著纓明有繫主人入親說婦之纓釋曰知從房還入室者夫前出說服於房今言入明從房入室也云婦人十五許嫁笄而禮之因著纓者案曲禮云女子許嫁纓又曰女子許嫁笄而字鄭據此諸侯文而言但言十五許嫁則以十五為限則自十五已上皆可許嫁也云明有繫也者纓是繫物為之明有繫也纓有佩容臭有許嫁笄亦有二注纓蓋以五采為之其制未聞云其制未聞者此纓與男子冠纓異彼纓垂之兩傍結其絛此女子纓不同於彼故云其制未聞但纓有二時不同内則云男女未冠笄者總角衿纓皆佩容臭鄭注云容臭香物也以纓佩之為廹尊者給小使也此是幼時纓也内則又云婦事舅姑子事父母衿纓綦屨注云衿猶結也婦人有纓示繫屬也是婦人女子有二時之纓内則示有繫屬之纓即許嫁之纓與此說纓一也若然笄亦有二等案問喪親始死笄纚據男子去冠仍有笄與婦人之笄並有安髪之笄也爵弁皮弁及六冕之笄皆是固冠冕之笄是其二也成昏後纚笄宵衣去嫁時盛服夙興婦沐浴纚笄宵衣以俟見釋曰自此至授人論婦見舅姑之事云纚笄宵衣者此則特牲主婦宵衣也不著純衣纁袡者彼嫁時之盛服今已成婚之後不可使服故退從此服也父子異宫禮不云年限鄭云十五言昏明之晨者以昨日昏時成禮此經言夙興故知是昏之晨旦也云興起也俟待也待見於舅姑寢門之外者因訓即解之也云古者命士以上年十五父子異宫者案内則云由命士以上父子異宫不云年限今鄭知十五為限者以其十五成童是以鄭注喪服亦云子幼謂年十五已下則不隨母嫁故知十五以後乃異宫也鄭言此限者欲見不命之士父子同宫雖俟見不得言舅姑寢門外也舅席于阼階姑席于房户外之西質明贊見婦于舅姑席于阼舅即席席于房外南面姑即席釋曰此經論設舅姑席位所在鄭知房户外之西者以其舅在阼阼當房户之東若姑在房户之東即當舅之北南面向之不便又見下記云父醴女而俟迎者母南面於户外女出於母左以母在房户西故得女出於母左是以知此房外亦房户外之西也婦見舅姑用棗栗腵脩婦執笲棗栗自門入升自西階進拜奠于席釋曰此經論婦從舅寢門外入見舅之事也必見舅用棗栗見姑以腵脩者案春秋荘二十四年經書秋八月丁丑夫人姜氏入戊寅大夫宗婦覿用幣公羊𫝊云宗婦者何大夫之妻也覿者何見也用者何用者不宜用也見用幣非禮也然則曷用棗栗云乎腵脩云乎注云腵脩者脯也禮婦人見舅以棗栗為贄見夫人至尊兼而用之云乎辭也棗栗取其早自謹敬腵脩取其㫁斷自脩正是用棗栗腵脩之義也案雜記云婦見舅姑兄弟姑姊妹皆立于堂下西面北上是見已注云婦来為供養也其見主于尊者兄弟以下在位是為己見不復特見又云見諸父各就其寢注云旁尊也亦為見時不來今此不言者文畧也笲如漢之筥􅠚籚注笲竹器而衣者其形盖如今之云云知笲竹器者以字從竹故知竹器知有衣者下記云笲緇被纁裏加於橋注云被表也笲有衣者婦見舅姑以飾為敬是有衣也云如今之筥􅠚籚矣者此舉漢法以況義但漢法去今已遠其狀已無可知也云進拜者進東南乃拜者謂從西階進至舅前而拜云奠之者舅尊不敢授也者案下姑奠于席不授而云舅尊不敢授者但舅直撫之而已至姑則親舉之親舉者則親授之婦人與丈夫為禮則俠拜母於子猶然舅坐撫之興答拜婦還又拜云婦人與丈夫為禮則俠拜者謂若士冠冠者見母母拜受子拜送母又拜母於子尚俠拜則不徒此婦於舅而已故廣言婦人與丈夫為禮則俠拜授醴面枋冠昏同惟受醴南東面異贊者酌醴加柶面枋出房席前北面婦東面拜受云面枋出房者以其贊授故面枋冠禮贊酌醴將授賔則面葉賔受醴將授子乃面枋也婦東面拜贊北面答之變於丈夫冠禮者禮子與禮婦俱在賔位南面受與此東面異有姪娣有二媵大夫士即以姪娣為媵云古者嫁女必姪娣從謂之媵者媵有二種若諸侯有二媵外别有姪娣是以莊公十九年經書秋公子結媵陳人之婦于鄭公羊𫝊曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯夫人自有姪娣并二媵各有姪娣則九女是媵與姪娣别也若大夫士無二媵即以姪娣為媵鄭云古者嫁女必姪娣從謂之媵是據大夫士言也云姪兄之子娣女弟也娣尊姪卑者經解云雖無娣媵先之義以其若有娣乃先媵即姪也云猶先媵客之也者對御是夫之從者為後若然姪與娣俱名媵今言雖無娣媵先似娣不名媵者但姪娣俱是媵今去娣娣外唯有姪姪言媵先以對御為先非對娣也稱媵以其姪娣俱是媵也云始飯謂舅姑者舅姑始飯而今媵餕舅餘御餕姑餘是交錯之義若媵御沃盥交也舅姑饗婦與盥饋同日舅姑共饗婦以一獻之禮舅洗于南洗姑洗于北洗奠酬釋曰自此至歸爼于婦氏人論饗婦之事此饗與上盥饋同日為之知者見昏義曰舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦鄭彼注云昏禮不言厥明此言之者容大夫以上禮多或異日故知此士同日可也此與上事相因亦於舅姑寢堂之上與禮婦同在客位也云共饗婦以一獻之禮者案下記云饗婦姑薦焉注云舅姑共饗婦舅獻姑薦脯醢但薦脯醢無盥洗之事今設北洗為婦人不下堂也云姑洗於北洗洗者洗爵則是舅獻姑酬共成一獻仍無妨姑薦脯醢也云凡酬酒皆奠於薦左不舉者此經直云奠酬不言處所故云凡通鄉飲酒鄉射燕禮之等云燕則更使人舉爵者案燕禮獻酬訖别有人舉旅行酬是也饗亦用醴酒知者以下記云庶婦使人醮之注云使人醮之不饗也酒不酬酢曰醮亦有脯醢適婦酌之以醴尊之庶婦酌之以酒卑之是也婦降自阼階明授婦以室代已舅姑先降自西階婦降自阼階注授之室使為主明代已釋曰案曲禮云子事父母升降不由阼階是主人奠者之處今舅姑降自西階婦降自阼階是授婦以室之事也歸爼于婦氏人明得禮歸爼于婦氏人注言饗禮有牲婦氏人丈夫送婦者釋曰案雜記云大饗卷三牲之爼歸于賔館是賔所當得也饗時設几而不倚爵盈而不飲者乾而不食故歸爼此饗婦婦亦不食故歸也經雖不言牲既言爼爼所以盛肉故知有牲此婦氏人即上婦所授脯者也注又云當以反命於女之父母明其得禮尊無送卑知此送者女家有司舅饗送者以一獻之禮酬以束錦注女家有司也云云釋曰此一獻與饗婦一獻同禮則異彼兼有姑此依常饗賔客法知送者是女家有司者故左氏𫝊云齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之以此而言則尊無送卑之法則大夫亦遣臣送之士無臣故知有司送之婦人送者𨽻子弟之妻妾姑饗婦人送者酬以束錦注云云釋曰左氏𫝊云士有𨽻子弟士卑無臣自以其子弟為僕𨽻并己之子弟之妻妾但尊無送卑故知婦人送者是𨽻子弟之妻妾也云凡饗速之者案聘禮饗食速賔則知此舅姑饗送者亦速之也凡速者皆就館召男女送各有館親速與遣人速亦異注凡饗速之云云云若異邦則贈丈夫送者以束錦鄭云就賔館則賔自有館若然婦人送者亦當有館男子則主人親速其婦送者不親速以其婦人迎客不出門當别遣人速之大夫不外娶士不嫌故有異邦送客若異邦則贈丈夫送者以束錦釋曰案莊公二十七年冬莒慶来逆叔姬公羊𫝊云大夫越境逆女非禮也鄭注喪服亦云古者大夫不外娶今言異邦得外娶者以大夫尊外娶則外交故不許士卑不嫌容有外娶法故有異邦送客也儀禮要義卷五
