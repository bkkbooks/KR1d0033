body:
  text: 儀禮要義卷十四宋魏了翁撰燕禮一鄭注燕有二疏推廣有四燕禮第六案上下經注燕有四等目録云諸侯無事而燕一也卿大夫有王事之勞二也卿大夫又有聘而來還與之燕三也四方聘客與之燕四也若然目録云卿大夫有勤勞之功聘使之勞兼王事之勞二者也知臣子眺聘還與之燕者四牡勞使臣是也知有王事之勞燕者下記云若以樂納賓則賓及庭奏肆夏鄭注云卿大夫有王事之勞則奏此樂焉是也知君臣無事有燕者案魯頌云夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮鄭箋云君臣無事則相與明義明德而已潔白之士羣集於君之朝君以禮樂與之飲酒燕樂以盡其歡是其無事而燕也又知賔及庭奏肆夏是己之臣子有王事之勞者案郊特牲云賔入大門而奏肆夏鄭注云賓朝聘者是異國聘賓入大門奏肆夏故知記云賓及庭奏肆夏者是己之臣子也又知異國賓有燕者聘禮所云燕與時賜者是也燕主聘者兼樂羣臣故使小臣戒燕禮小臣戒與者釋曰自此已下盡射人告具論告戒羣臣及陳饌之事必使小臣戒與者以其燕為聘使者為主兼與舊在者歡樂之故今戒可與之人使依期而至云小臣相君燕飲之法者案周禮大僕職云王燕飲則相其法又案小臣職云凡大事佐大僕則王燕飲大僕相小臣佐之此諸侯禮降於天子故宜使小臣相是以下云小臣師一人在東堂下注云師長也小臣之長一人猶天子大僕正君之服位者也是諸侯小臣當大僕之事云與者謂留羣臣也者謂羣臣留在國不行者也案大射云君有命戒射者以其大射辨尊卑故云君有命明政教由尊者出燕禮主歡心不辨尊卑故不言君有命膳宰具官饌于路寢東擬燕設膳宰具官饌于寢東釋曰以其燕在寢故膳宰具官饌于寢東擬燕時設之云膳宰天子曰膳夫掌君飲食膳羞者也者以其天子有宰夫兼有膳夫掌君飲食諸侯亦有宰夫復有膳宰云具官饌具官之所饌者云謂酒也牲也脯醢也知者案下所設亦有此三者牲即其牲狗也云寢路寢者以其饗在廟服朝服下記云燕朝服於寢正處在路寢不在燕寢可知故云路寢也案公食大夫云凡宰夫之具饌于東房不使膳宰者彼食異國之大夫敬之故使宰夫具饌此燕已臣子故使膳宰卑者具饌必知膳宰卑於宰夫者案天子宰夫下大夫膳夫上士天子膳夫卑於宰夫則知諸侯膳宰亦卑於宰夫者也大射宿縣以學宮不常縣此燕不宿縣在路寢樂人縣釋曰案大射樂人宿縣在射前一日又具辨樂縣之位者以其大射在學宫學宮不常縣樂射乃設之故射前一日縣之又辨樂縣之位此燕在路寢有常縣之樂今言樂人縣者為燕新之而已故不在燕前一日又不辨樂縣之處又直云樂人未知樂人竟是何官案周禮春官大司樂云凡樂事宿縣又案樂師云凡樂成則告備是天子有大司樂并有樂師之官案序官樂師下大夫四人上士八人下士十有六人以此知天子有大司樂樂師諸侯無大司樂直有大樂正小樂正以其諸侯兼官此二者皆當天子樂師大夫及士則諸侯樂師不用大夫大樂正當上士小樂正當下士為之故鄭下注云樂正于天子樂師也大射注亦云小樂正於天子樂師若然縣樂之法案周禮􅢂瞭職云掌太師之縣鄭注云大師當縣則為之案下僕人相大師則諸侯無􅢂瞭則使僕人縣樂太師以聲展之樂師又監之云縣鐘磬也者案小胥天子宫縣諸侯軒縣面背鐘磬鏄各一虡大夫判縣士特縣不得有鎛故云鐘磬案下唯有磬而無鐘而云鐘磬者鄭泛解樂縣法故兼言鐘其實諸侯之士特縣磬而已為卿大夫士設方尊公尊司宮尊于東楹之西兩方壺云云公尊瓦大兩有豐云云云尊方壺為卿大夫士也者以其燕總有卿大夫士又别有公尊瓦大兩故知方尊為此人也云於東楹之西豫君專此酒也者此決鄉飲酒鄉射皆於房户之間賔主共之此於東楹之西向君設之人君尊專大惠士旅食謂未得正祿庶人在官者尊士旅食于門西注士衆食云云所謂庶人在官者釋云士衆食謂未得正祿者以其士大夫已上得正祿王制云下士九人祿中士倍下士上士倍中士下大夫倍上士卿四大夫祿皆正祿此則未得正祿云所謂庶人在官者也者所謂王制文故王制云庶人在官者其祿以是為差謂府史胥徒謂府八人祿史七人祿胥六人徒五人皆非正祿射人主此禮以燕或有射射人告具釋曰云射人主此禮以其或射也者案公食大夫禮贊者負東房告具以其無射故使贊者此乃射人告具與大射同案下文若射則不獻庶子言若者或射或不故此鄭注云以其或射言或以亦是不定之義案大射告具之上有羮定此不言羮定者文不具也先筵賔後設公席凡禮卑者先即事小臣設公席于阼階上西鄉設加席釋曰自此下盡諸公卿者論君臣位次及命羞者之事注引周禮者司几筵之文也彼諸侯祭祀神席及受酢之席此乃燕飲之席引之者欲見燕飲與受酢席同若饗諸侯來朝則郊特牲云大饗君三重席而酢焉是也燕他國之臣即郊特牲云三獻之介君專席而酢焉此降尊以就卑也故君單席受酢也云後席公席者凡禮卑者先即事尊者後也者此燕私禮故賤者先即事大射辨尊卑故先設公席後設賔席也小臣納卿大夫就門東揖位士以下從徑即庭位小臣納卿大夫云云士祝史小臣師士旅食者云云云納者以公命引而入也者雖無正文進止由君故知以公命者也云自士以下從而入即位耳者對大夫以上小臣引之就門東揖位未就庭位自士已下不須引從大夫而入徑即庭位云師長也小臣之長一人猶天子大僕正君之服位者也者案夏官太僕職云掌正王之服位出入王之大命彼下文有小臣之官上士四人其職云掌王之小命詔相王之小法儀諸侯兼官無大僕唯有小臣出入君之教命正君之服位揖人必違其位故公揖卿大夫降阼立公降立于阼階之東南南鄉爾卿卿西面北上爾大夫大夫皆少進釋曰曲禮云揖人必違其位是以公將揖卿大夫降立阼階之東南南面揖之變揖言爾者爾訓近也移也卿大夫得揖移近中庭也是以鄭云揖而移之近之也云大夫由北面少前者三卿五大夫初入門右同北面三卿得揖東相西面五大夫得揖中庭少進北面不改宰夫為主人是大夫賔亦是大夫射人請賔注命當由君出也釋曰案大射云大射正擯擯者請賔此直云射人請賔不云為擯者但射人有大小大者為大射正其次為射正又其次為司正悉監射事見於大射禮大辨尊卑故云大射正為擯此燕禮或因燕而射以其禮輕或大射正為擯或小射正為擯此二者皆是射人故直云射人請賔不定尊卑也公曰命某為賔注某大夫也知大夫非卿者以其賔主相對宰夫為主人是大夫明賔亦是大夫燕義云不以公卿為賔而以大夫為賔為疑也公揖臣乃升就席鄭云人之也公揖卿大夫乃升就席注揖之人之也釋曰言人之者公將及升堂故以人意相存偶是以揖之乃升射人請賔小臣執幂膳宰羞彌略膳宰請羞于諸公卿者釋曰言彌略者上請賔使射人請執幂使小臣已是其略今羞諸公卿乃使膳宰膳宰卑于小臣故云彌略也知膳宰卑於士者周禮膳夫是上士此諸侯膳宰明非上士且禮之大例薦羞者尊於設俎者公士為薦羞膳宰設俎故知膳宰卑也此射人納賔是小射正與大射異射人納賔釋曰自此至賔以虛爵降論賔升堂主人獻賔之事案大射大射正擯此云射人為擯與上射人請賔義同還是小射正也賔入門出堂塗北面公降揖賔入及庭公降一等揖之釋曰鄭知至庭謂既入而左北面時者以其云賔入及庭賔入謂入門時及庭謂賓入門而出堂塗北面是其當公降揖之節公升就席以宰夫為獻主不參之公升就席釋曰鄭知將與主人為禮不參之者下經云賔升主人亦升是其賔與主人為禮不得相參之知主人是宰夫者案禮記燕義云使宰夫為獻主是也云宰夫太宰之屬者案天官云太宰卿一人小宰中大夫二人宰夫下大夫四人宰夫屬太宰故云太宰之屬云掌賓客之獻飲食也者案宰夫職云凡朝覲會同賔客掌其牢禮委積膳獻飲食引之者證宰夫為主人云天子膳夫為獻主者案膳夫職云王燕飲酒則為獻主是也案燕義注云天子使膳宰為主人則是膳宰膳夫一人也上文注云膳宰天子曰膳夫者欲見天子諸侯之臣名異其實同也代君為獻主升降不由阼階與賔同由西階賔將酢主人以虛爵降爵即觚賔以虛爵降釋曰自此已下盡序內東面論賔酢主人之事上既言爵矣復言觚者嫌易之也者上文主人洗觚獻賔云賔以虛爵降此經又云坐奠觚中間言爵者欲見對文一升曰爵一升曰觚散文即通觚亦稱爵以此言之此觚即前爵主人不啐酒辟正主主人坐祭不啐酒釋曰案鄉飲酒鄉射皆是正主經直云祭如賔禮亦不見有啐酒之事未知正主有啐不此云不啐辟正主者案文可知以燕禮大射啐酒告旨並不為者經云不啐酒不告旨並言不鄉飲酒鄉射直云不告旨不言不啐酒明主人啐矣有司徹儐尸之禮尸酢主人云席末坐啐酒是其雖不告旨唯有啐酒之事篇內公應先拜者皆後惟獻禮重先拜主人盥洗象觚升賔之東北面獻于公自此下盡奠于膳篚論主人獻公之事凡此篇內公應先拜者皆後拜之尊公故也是以下舉旅行酬皆受酬者先拜公乃答拜此公先拜受爵者受獻禮重故也是以下云主人受公酬得酌膳燕主歡故也大射主人受公酢者辨尊卑故也云士薦脯醢膳宰設折俎者案前獻賔薦脯醢及設折俎皆使膳宰者賔卑故也今於公士薦脯醢膳宰折俎異人以其士尊於膳宰君尊故使士薦必知士尊於膳宰者以其諸侯膳宰當天子膳夫上士二人諸侯降等膳宰則卑故下記云羞膳者與執幂者皆士也鄭注云尊君也膳宰卑於士者是其士尊也大射主於射略於飲酒故公及賔同使宰胥薦脯醢庶子設折爼此燕禮燕私主于羞故賔之薦俎庶羞同使膳宰君之脯醢庶羞同使士尊官為之大射必使庶子設折俎者案周禮庶子下大夫大射序尊卑變於燕禮故尊官為之引大射禮者證此經脯醢從左房而來天子諸侯有左右房故得言左房大夫士無右房故言東房而已受公酢而自酌不敢煩公更爵不襲尊更爵洗升酌膳酒云云注更爵者不敢襲至尊也釋曰自比以下盡主人奠爵于篚論主人受公酢之事主人受公酢而自酌者不敢煩公尊君之義獻君自酢同用觚必更之者襲因也不敢因君之爵主人酬賔皆西階上未升筵此降筵誤主人盥洗升媵觚于賔酌散西階上坐奠爵拜賔賔降筵北面答拜釋曰自此盡東南面立論主人酬賔之事案前受獻訖立于序內以來未有升筵之事案鄉飲酒大射酬時皆主人西階上坐奠爵拜賔西階上北面答拜酬前賔皆無逆在席者又以下文賔奠于薦東賔降筵西東南面立以此約之則此無升進之事或言降筵者蓋誤媵觚訓送今文作騰鄭讀或為揚云媵送也讀或為揚揚舉也者案禮記檀弓下杜蕢洗而揚觶注云舉爵於君也禮揚作媵揚舉也媵送也揚近得之若然此注今文媵作騰騰與媵皆是送義讀從檀弓杜蕢揚觶之揚揚訓為舉義勝於媵送主人代君行酒不立飲賔辭主人坐祭遂飲賔辭卒爵拜賔答拜釋曰案鄉飲酒鄉射主人酬賔皆坐卒觶此主人酬賔亦坐飲賔辭之者上文獻君君立卒爵此主人代君酬賔亦宜立飲今主人坐祭遂飲故鄭云辭者辭其代君行酒不立飲云此降於正主酬也者正主謂鄉射飲酒正主酬處獻時禮盛賔卑酬訖賔尊禮殺主人降復位賔降筵西東南面立云賔不立于序內位彌尊也位彌尊者其禮彌卑者案上初賔得獻降升之時序內立是不敢近賔席是禮尊而賔卑至此酬訖立於席西是賔位彌尊禮漸殺故云彌卑也云記所謂一張一弛者禮記雜記獻時為盛是一張也酬時為殺是一弛也無正文故云是之類與二大夫媵爵于公往來以右為上小臣作下大夫二人媵爵云云序進盥洗角觶云云交于楹北釋曰云楹北西楹之北也者二大夫盥手洗爵訖先者升西階由西楹之北向東楹之西東面酌酒訖右還由西楹北向西階上北面後者升西階亦由西楹之北向東楹之西酌酒訖亦由西楹之北西階上北面相待乃次第而降故云交而相待於西階之上既酌右還而反往來以右為上云以右為上者謂在洗南西面及階上北面時先者在右地道尊右故也二大夫奠觶薦南不敢必君舉若君命皆致則序進奠觶于篚云云坐奠于薦南云云云序進往來由尊北交于東楹之北者前二人酌酒降自西階故交于西楹之北此酌酒奠于君所故交于東楹之北交于東楹北者以其酒尊所陳在東楹之西西向而陳其尊有四并執幂者在南不得南頭以之君所又唯君面尊尊東西面酌酒以背君故先酌者東面酌訖由尊北又楹北往君所奠訖右還而反後酌者亦於尊北又於楹北與反者而交先者於南西過後者於北東行奠訖亦右還而反相隨降自西階云奠于薦南不敢必君舉也者案鄉射皆云奠者於左將舉者於右是臣雖賔皆拜堂下君辭則升成拜公坐取大夫所媵觶興以酬賔賔降西階下再拜稽首公命小臣辭賔升成拜釋曰云升成拜復再拜稽首也先時君辭之於禮若未成然者凡臣於君雖為賔與君相酬受爵不敢拜於堂上皆拜於堂下若君辭之聞命即升若堂下拜訖君辭之即升堂復再拜稽首所以然者以堂下再拜而君辭之若未成然故復升堂再拜稽首以成之升則不云再拜稽首直云成拜以堂下既有再拜稽首則此文是也若堂下未拜之間聞命則升升乃再拜稽首則不得言升成拜以其堂下未拜即下經云小臣辭賔升再拜稽首鄭注云不言成拜者為拜故下實未拜是也凡臣拜於君有三等初受獻拜於堂下或親辭或遣小臣辭成與不成如上説至於酬酒雖下堂拜未即拜待君辭即此下經云公坐奠觶答再拜執觶興立卒觶賓下拜小臣辭賓升再拜稽首鄭注云不言成拜者為拜故下實未拜也下不輒拜者禮殺也此篇末無算爵受公賜爵者皆下席堂上拜稽首不堂下拜者禮末又輕於酬時賔拜于君左經不言嫌敵偶于君賔下拜小臣辭賔升再拜稽首云此賔拜于君之左不言之者不敢敵偶于君者上云公酬賔于西階上則此賔升再拜者拜于君之左可知經不言拜于君之左者若言再拜于君之左則臣與君敵偶君尊不酌臣凡爵不相襲公坐奠觶答再拜執觶興賔進受虛爵降奠于篚易觶洗云君尊不酌故也者以其君酬賔當親酌以授賔今賔爵自酌者君尊不酌與臣故也云凡爵不相襲者也於尊者言更自敵以下言易者於尊者言更謂受尊者之爵及與尊者爵皆言更上文主人獻公訖受爵以降奠于膳篚更爵洗酌膳以自酢是受尊者之爵言更也下文云賔酬卿若膳觶也則降更觶鄭注云言更觶卿尊也是與尊者之爵言更云自敵以下言易者謂與卑者之爵及受卑者之爵皆云易此文公酬賔云賓進受虛爵降奠于篚易觶洗言易者賔尊以公舉觶酬賔是與卑者故言易受酢受於尊者言更爵受酬言易主人受公酢賔受公酬二者之爵皆從尊者來所以受酢為受尊者之爵言更受酬為與卑者之爵言易者以其主人受酢由己獻公公報己己所當得是以為尊者之爵言更也賔受公酬以公舉媵觶就西階上以酬賓特為賔舉旅故以為尊者與卑者之爵言易案下士舉旅公坐取賔所媵觶唯公所賜受者如初受酬之禮降更爵洗升酌膳彼亦是尊者與卑者之爵不言易而言更者旅酬下為上尊前人案少牢更爵易爵似不别又案少牢不儐尸主婦致爵于主人主婦更爵酬注云更猶易也若然更與易似不别者但更易不殊以尊卑不同設文有異凡下未拜或禮殺或君親辭下拜小臣辭賔升再拜稽首釋曰云凡下未拜有二或禮殺或君親辭云禮殺者謂若酬時不為拜實未拜辭之即升再拜稽首是也云或君親辭者謂若公食大夫云公拜至賔降西階東北面答拜公降一等辭賔升不拜直言階上北面再拜稽首是階下未拜不得言升成拜直言再拜稽首而已公答再拜注拜於阼階上也賔請旅侍臣必請者不專君惠釋曰云於是賔請旅侍臣者案下記云凡公所酬既拜請旅侍臣鄭注云既拜謂自酌升拜時也擯者阼階下告於公還西階下告公許旅行也謂行酒於羣臣必請者不専君惠也大射於此時賓請旅於諸臣賔以旅酬大夫言大夫則卿在其間賔以旅酬於西階上射人作大夫長升受旅注以次序勸釋曰此經論旅酬先尊後卑之法仍未行旅下經射人作大夫長乃始旅酬遣射人作大夫者燕或射故使之云言作大夫則卿存矣者以其卿稱上大夫言大夫長故知卿亦存在作中矣云長者尊先而卑後者賔則旅三卿三卿遍次第至五大夫遍不及士酢時禮盛坐卒爵拜既爵旅酬輕反之賔坐祭立飲卒觶不拜釋曰此對酢之時坐卒爵拜既爵是禮盛也今旅酬立卒觶不拜既爵故云禮殺也雖立為賔仍是大夫卑於卿若膳觶也則降更觶洗升實散大夫拜受賔拜送案上文體例與卑者之爵稱易與尊者之爵稱更雖立為賔仍是大夫為之是賔卑於卿故言更觶者卿尊君為賔舉旅行酬君禮成乃獻卿主人洗升實散獻卿于西階上注酬而後獻卿别尊卑釋曰自此盡無加席論主人獻孤卿之節此酬非謂尋常獻酬乃是君為賔舉旅行酬以其主人獻君君酢主人主人不敢酬君故使二大夫媵爵于公以當酬處所以覆獻也但君恩既大為賔舉旅飲酒之禮成於酬故酬辨乃獻卿以君尊卿卑是以君禮成卿乃得獻故云别尊卑也儀禮要義卷十四
