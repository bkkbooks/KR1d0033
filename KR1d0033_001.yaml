body:
  text: 儀禮要義卷一宋魏了翁撰序二禮同出周公注儀者帷鄭注周者多周禮儀禮𤼵源是一理有終始分為二部並是周公攝政太平之書周禮為末儀禮為本本則難明末便易曉是以周禮注者則有多門儀禮所注後鄭而已其為章疏則有二家信都黄慶者齊之盛徳李孟悊者隋曰碩儒慶則舉大略小經注疎漏猶登山逺望而近不知悊則舉小略大經注稍周似入室近觀而逺不察二家之疏互有長短時之所尚李則為先案士冠三加有緇布冠皮弁爵弁既冠又著𤣥冠見於君有此四種之冠故記人下陳緇布冠委貌周弁以釋經之四種經之與記都無天子冠法而李云委貌與弁皆天子始冠之冠李之謬也喪服一篇凶禮之要是以南北二家章疏甚多時之所以皆資黄氏案鄭注䘮服引禮記檀弓云絰之言實也明孝子有忠實之心故為制此服焉則絰之所作表心明矣而黄氏妄云衰以表心絰以表首以黄氏公違鄭注黄之謬也黄李之訓畧言其一餘足見矣今以先儒失路後宜易塗故悉鄙情聊裁此䟽未敢専欲以諸家為本擇善而從兼増己義仍取四門助教李𤣥植詳論可否僉謀已定庶可以施矣士冠禮一士大夫諸侯天子加冠之年不同士冠禮第一鄭目録云童子任職居士位年二十而冠主人𤣥冠朝服則是仕於諸侯天子之士朝服皮弁素積古者四民世事士之子恒為士冠禮於五禮屬嘉禮大小戴及别録此皆第一釋曰下昬禮及士相見禮據士身自昬自相見又大戴禮公冠篇及下諸侯有冠禮夏之末造亦據諸侯身自加冠故鄭據士身自加冠為目也鄭云四民世事士之子恒為士者是齊語文證此士身年二十加冠法若士之子則四十彊而仕何得有二十為士自加冠也二十而冠者鄭據曲禮文二十曰弱冠故云年二十而冠其大夫始仕者二十已冠訖五十乃爵命為大夫故大夫無冠禮又案喪服小功章云大夫為昆弟之長殤鄭云大夫為昆弟之長殤小功謂為士者若不仕者也以此知為大夫無殤服也小記云大夫冠而不為殤大夫身已加冠降兄殤在小功是身有徳行得為大夫冠不以二十始冠也若諸侯則十二而冠故左傳襄九年晉侯與諸侯伐鄭還公送晉侯以公宴于河上問公年季武子對曰㑹于沙隨之嵗寡君以生注云沙隨在成十六年晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣是諸侯十二而冠也若天子亦與諸侯同十二冠故尚書金縢云王與大夫盡弁時成王年十五云王與大夫盡弁則知天子亦十二而冠矣又大戴禮云文王十三生伯邑考左傳云冠而生子禮也是殷之諸侯亦十二而冠若夏之天子諸侯與殷天子亦十二而冠可知若天子之子則亦二十而冠故禮記祭法云王下祭殤五又禮記檀弓云君之適長殤車三乗是年十九已下乃為殤故二十乃冠天子諸侯自有冠禮餘皆士禮若天子諸侯冠自有天子諸侯冠禮故大戴禮有公冠篇天子自然有冠禮但儀禮之内亡耳士既三加為大夫早冠者亦依士禮三加若天子諸侯禮則多矣故大戴禮公冠篇云公冠四加者緇布皮弁爵弁後加𤣥冕天子亦四加後當加衮冕矣案下文云天子之元子猶士天下無生而貴者則天子之子雖早冠亦用士禮而冠案家語冠頌云王大子之冠擬冠則天子元子亦擬諸侯四加若然諸侯之子不得四加與士同三加可知大小戴别録皆冠一昬二士相見三鄭云冠於五禮屬嘉禮大小戴别録此皆第一大戴即以士䘮為第四既夕為第五士虞為第六特牲為第七少牢為第八有司徹為第九鄉飲酒為第十鄉射第十一燕禮第十二大射第十三聘禮第十四公食第十五覲禮第十六喪服第十七小戴於鄉飲鄉射燕禮大射四篇亦依此别録次第而以士虞為第八喪服為第九特牲為第十少牢為第十一有司徹為第十二士喪為第十三既夕為第十四聘禮為第十五公食為第十六覲禮為第十七皆尊卑吉凶雜亂故鄭𤣥皆不從之矣題周禮者别夏殷題儀禮兼異代儀禮周禮言周不言儀儀禮言儀不言周既同是周公攝政六年所制題號不同者周禮取别夏殷故言周儀禮不言周者欲見兼有異代之法故此篇有醮用酒燕禮云諸公士喪禮云商祝夏祝是兼夏殷故不言周又周禮是統心儀禮是履踐外内相因首尾是一故周禮己言周儀禮不須言周周可知矣且儀禮亦名曲禮故禮器云經禮三百曲禮三千儀禮次序以賤先貴以吉先凶鄭氏注後漢書云鄭𤣥字康成青州北海郡髙宻縣人鄭崇之後也言注者注義於經下若水之注物亦名為著故鄭叙云凡著三禮七十二篇云著者取著明經義者也孔子之徒言傳者取傳述之意為意不同故題目有異也伹周禮六官六十叙官之法事急者為先不問官之大小儀禮見其行事之法賤者為先故以士冠為先無大夫冠禮諸侯冠次之天子冠又次之其昬禮亦士為先大夫次之諸侯次之天子為後諸侯鄉飲酒為先天子鄉飲酒次之鄉射燕禮已下皆然又以冠昬士相見為先後者以二十而冠三十而娶四十彊而仕即有摯見鄉大夫見己君及見來朝諸侯之等又為鄉大夫州長行鄉飲酒鄉射之事已下先吉後凶凶盡則行祭祀吉禮筮于廟門謂布席門中闑西閾外士冠禮筮于廟門釋曰自此至宗人告事畢一節論將行冠禮先筮諏日之事案下文云布席於門中闑西閾外者闑為門限即是門外故特牲禮筮日主人即位于門外西面此不言門外者閾外之文可參故省文也經單言庿者皆禰廟鄭云筮者以蓍問日吉凶於易也又云云冠必筮日於廟門者重以成人之禮成子孫也者案冠禮云筮日筮賔所以敬冠事敬冠事所以重禮是筮日為重禮之事也冠義又云古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也是成人之禮成子孫也此經唯論父子兄弟不言祖孫鄭言孫者家事統於尊若祖在則為冠主故兼孫也云廟謂禰廟者案昬禮行事皆直云廟記云凡行事受諸禰廟此經亦直云廟故知亦於禰廟也然儀禮之内單言廟者皆是禰廟若非禰廟則以廟名别之故聘禮云賔朝服問卿卿受于祖廟又受聘在始祖廟既云不腆先君之祧是不言於廟舉祖祧以别之也士於廟若天子諸侯冠在始祖之廟是以襄九年季武子云以先君之祧處之祧則與聘禮先君之祧謂遷主所藏始祖同也若然服氏注以祧為曽祖者以其公還及衛冠於衛成公之廟服注成公衛曽祖故以祧為曽祖廟時不冠於衛之始祖以非己廟故也無大夫冠禮若幼而冠者與士同在禰廟筮在庿門外嫌蓍之靈由庿神云不於堂者嫌蓍龜之靈由廟神者此據冠在廟堂此蓍筮在門外不同處故以廟決堂以蓍自有靈知吉凶不假廟神將謀日親父兄先服即位主人𤣥冠朝服緇帶素韠即位於門東西面注主人將冠者之父兄也釋曰此主人將欲謀日之時先服即位以禰廟門外東西面立以待筮事也當是父子加冠之禮知兼有兄者論語云出則事公卿入則事父兄父兄者一家之統父不在則兄為主可知故兼其兄也又案下文若孤子則父兄戒宿冠之日主人紒而迎賔則無親父親兄故彼注云父兄諸父諸兄則知此主人迎賔是親父親兄也云𤣥冠委貌者此云𤣥冠下記云委貌彼云委貌見其安正容體此云𤣥冠見其色實一物也衣與冠裳與韠同色若異色則别言之云朝服者十五升布衣而素裳也裳與韠同色云衣不言色者衣與冠同也者禮之通例衣與冠同色故郊特牲云黄衣黄冠是也裳與韠同色故下爵弁服纁裳韎韐韎韐即纁之類是也經直云朝服不言色與冠同可知也若然鄭不言裳與韠同色者舉衣與冠同裳與韠同亦可知素裳積白素絹為之其衣冠色異經即别言之是以下云爵弁服純衣是也筮用朝服冠用𤣥端尊蓍龜云筮必朝服者尊蓍龜之道者案鄉飲酒主人朝服則此有司賔主朝服自是尋常相見所服非特相尊敬之禮此筮而朝服決正冠時與士之祭禮入廟常服𤣥端今此筮亦在廟不服𤣥端故云尊蓍龜之道此筮唯有蓍兼言龜者案周禮小事徒筮而已若大事先筮而後卜龜筮是相將之物同著朝服故兼言龜是以雜記卜筮皆朝服也案特牲禮筮日與祭同服𤣥端少牢筮日與祭同服朝服不特尊蓍龜者彼為祭事龜不可尊於先祖故同服此為冠事龜可尊於子孫故服異也在朝君臣同服明堂中不言臣云緇帶黒繒帶素韠白韋韠者案玉藻云云云天子與其臣𤣥冕以視朔皮弁以日視朝者此約玉藻而知案彼云天子𤣥端聽朔於南門之外皮弁以日視朝又云諸侯皮弁以聽朔於太廟朝服以日視朝于内朝彼注云端當為冕謂天子以𤣥冕聽朔於南門之外明堂之中彼皆不言臣此鄭兼言臣者欲見在朝君臣同服引之者證天子諸侯與其臣子筮冠同服有司羣吏有事者主人辟除猶漢時假吏有司如主人服即位于西方東靣北上釋曰此論主人有司從主人有事故立位於廟門外西方東靣以待事也士雖無臣皆有屬吏胥徒及僕𨽻故云有司群吏有事者也云謂主人之吏所自辟除府史以下今時卒吏及假吏是也者案周禮三百六十官之下皆有府史胥徒不得君命主人自辟除去役賦補置之是也又案周禮皆云府史此云羣吏吏史亦一也故舉漢法為證又周禮鄭注云官長所自辟除此云主人者以此經云主人故依經而直云主人主亦為長者也又此注以有司為羣吏案特牲以有司為士屬吏不同者言羣吏則謂府史胥徒也言屬吏則謂君命之士是以下文宿贊冠者注云謂賔若他官之屬中士若下士也又主人贊者亦云其屬中士若下士是言屬者尊之義特牲之有司士之屬吏亦親類也所卦者畫地記爻古用木畫地今用錢筮與席所卦者具饌于西塾釋曰筮所以問吉凶謂蓍也者案曲禮云龜為卜䇿為筮故知問吉凶謂蓍案易筮法用四十九蓍分之為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閠十有八變而成卦是也云所卦者所以畫地記爻者筮法依七八九六之爻而記之但古用木畫地今則用錢以三少為重錢重錢則九也三多為交錢交錢則六也兩多一少為單錢單錢則七也兩少一多為坼錢坼錢則八也案少牢云卦者在左坐卦以木故知古者畫卦以木也西塾門外西堂闑西閾外指陳席處具饌于西塾布席于門中闑西閾外西面云西塾門外西堂也者案爾雅云門側之堂謂之塾即士虞禮云羞燔俎在内西塾上南順是也筮在門外故知此經西塾門外西堂也案布席此所布之席擬卜筮之事言在門中者以大分言之云闑西閾外者指陳席處也此注以槷蹙非門限之義故不從古文云闑門橛者闑一名橛閾閫也者閫門限與閾為一云古文闑為槷閾為蹙者遭於暴秦燔滅典籍漢興求録遺文之後有古書今文漢書云魯人髙堂生為漢博士𫝊儀禮十七篇是今文也至武帝之末魯恭王壊孔子宅得古儀禮五十六篇其字皆以書是為古文也古文十七篇與髙堂生所𫝊者同而字多不同其餘三十九篇絶無師説祕在於館鄭注禮之時以今古二字並之若從今文不從古文即今文在經闑閾之等是也於注内疊出古文𣙗蹙之屬是也若從古文不從今文則古文在經注内疊出今文即下文孝友時格鄭注云今文格為嘏又䘮服注今文無冠布纓之等是也此注不從古文𣙗蹙者以𣙗蹙非門限之義故從今不從古也儀禮之内或從今或從古皆逐義彊者從之若二字俱合義者則互換見之即下文云壹揖壹讓升注云古文壹皆作一公食大夫三牲之肺不離贊者辯取之一以授賔注云古文一為壹是大小注皆疊今古文二者俱合義故兩從之又鄭疊古今之文者皆釋經義盡乃言之若疊今古之文説須别釋餘義者則在後乃言之即下文孝友時格注云今文格為嘏又云凡醮不祝之類是也若然下記云章甫殷道鄭云章明也殷質言以表明丈夫也甫或為父今文為斧事相違故因疊出今文也筮人執筴抽韇向東方受命請筮筮人執莢抽上韇兼執之進受命於主人釋曰云筮人者有司主三易者也云韇藏筴之器者韇有二其一從下向上承之其一從上向下韜之也云今時藏弓矢者謂之韇丸也者此舉漢法為況亦欲見韜弓矢者以皮為之故詩云象弭魚服是以魚皮為矢服則此韇亦用皮也知自西方而前者上云即位于西方故知前向東方受命也云受命者當知所筮也者謂執之不知以請筮何事宰遂命之也凡卜筮之法案洪範云七稽疑擇建立卜筮人三人占從二人之言又案尚書金縢云乃卜三龜一習吉則天子諸侯卜時三龜並用於玉瓦原三人各占一兆也筮時連山歸藏周易亦三易並用夏殷以不變為占周易以變者為占亦三人各占一易筮皆三占從二三者三吉為大吉一凶為小吉案士喪禮筮宅卒筮執卦以示命筮者命筮者受視反之東面旅占注云旅衆也反與其屬共占之謂掌連山歸藏周易者又卜葬日云占者三人在其南注云占者三人掌玉兆瓦兆原兆者也少牢大夫禮亦云三人占鄭既云反與其屬占之則鄭意大夫卜筮同用一龜一易三人共占之矣其用一龜一易則三代類用不専一代故春秋緯演孔圖云孔子修春秋九月而成卜之得陽豫之卦宋均注云陽豫夏殷之卦名故今周易無文是孔子用異代之筮則大夫卜筮皆不常據一代者也士雖無臣以屬吏為宰宰自右少退贊命注佐主人告所以筮也云云釋曰知宰是有司主政教者士雖無臣以屬吏為宰若諸侯使司徒兼冡宰以出政教之類贊命皆在右特牲自左者為神故變注少儀曰贊幣自左詔辭自右鄭引少儀者取證贊命在右之義以其地道尊右故贊命皆在右是以士喪禮亦云命筮者在主人之右注云命尊者宜由右出特牲云宰自主人之左贊命不由右者為神求吉變故也士喪在右不在左者以其始死未忍異於生故在右也少牢宰不贊命大夫尊屈士卑不嫌故使人贊命祭禮卦者書筮人示喪與冠又異祭卒筮書卦執以示主人注卦體得成更以方版畫體釋曰案特牲云卒筮寫卦筮者執以示主人注云卦者主畫地識爻六爻備乃以方版寫之則彼寫卦亦是卦者故鄭云卦者畫爻者彼為祭禮吉事尚提提故卦者寫卦筮人報卦以示主人士喪禮注云卦者寫卦示主人經無寫卦之文是卦者自畫示主人以其喪禮遽於事故卦者自畫自示主人也此冠禮筮者自寫自示主人冠禮異於祭禮喪禮故也祭祀三卜則止冠子不可止故容後月若不吉則筮逺日如初儀注逺日旬之外釋曰曲禮吉事先近日此冠禮是吉事故先筮近日不吉乃更筮逺日是上旬不吉乃筮中旬又不吉乃更筮下旬曲禮云旬之内曰近某日旬之外曰逺某日彼據吉禮而言旬之内曰近某日據士禮旬内筮故云近某日是以特牲旬内筮日是也旬之外曰逺某日者據大夫以上禮旬外筮故言逺某日是以少牢筮旬有一日是也案少牢云若不吉則及逺日又筮日如初鄭注云及至也逺日後丁若後己言至逺日又筮日如初明不并筮則前月卜來月之上旬上旬不吉至上旬又筮中旬中旬不吉至中旬又筮下旬下旬不吉則止不祭祀也若然特牲不言及則可知上旬之内筮不吉則預筮中旬中旬不吉又預筮下旬又不吉則止若此冠禮亦先近日士冠禮亦於上旬之内預筮三旬不吉則更筮後月之上旬以其祭祀用孟月不容入他月若冠子則年已二十不可止然須冠故容入後月有禮辭固辭終辭三辭主人戒賔賔禮辭許注今將冠子故就告僚友使來云禮辭一辭而許者即此文是也云再辭而許曰固辭者則士相見云某也願見無由達某子以命命某見主人對曰某子命某見吾子有辱請吾子之就家也某將走見賔對曰某不足以辱命請終賜見主人對曰某不敢為儀固請君子之就家也某將走見賔對曰某不敢為儀固以請主人對曰某也固辭不得命将走見是其再辭而許名為固辭之義也云三辭曰終辭不許也者又士相見云士見於大夫終辭其摯是三辭不許為終辭之義也若一辭不許後辭而許則為禮辭許若再辭不許後三辭而許則為再辭而許之曰固辭若不許至於三辭又不許則為三辭曰終辭不許也又三辭而許則曰三辭若三辭不許乃曰終辭是以公食大夫戒賔上介出請入告三辭又司儀云諸公相為賔主君郊勞交擯三辭車逆拜辱三揖三辭注云先辭辭其以禮來於外後辭辭升堂皆是三辭而許稱三辭賔先戒後筮鄭云賢者恒吉前期三日筮賔如求日之儀注前期三日空二日也釋云筮賔筮其可使冠子者即下文三加皆賔親加冠於首者是也云賢者恒吉者解經先戒後筮之意凡取人之法先筮後戒今以此賔是賢者必知吉故先戒賔賔已許方始筮之以其賢恒自吉故先戒後筮之也若賢恒吉必筮之者取其審慎然冠既筮賔特牲少牢不筮賔者彼以祭祀之事主人自為獻主羣臣助祭而已天子諸侯之祭祭前已射於射宫擇取可預祭者故不筮之也賔與贊冠者戒而又宿衆賔不宿乃宿賔賔如主人服出門左西面再拜主人東面答拜釋曰鄭訓宿為進者謂進之使知冠日當來故下文宿曰某将加布於某之首吾子将蒞之敢宿賔對曰某敢不夙興是宿之使進之義也云宿者必相戒者謂若賔及贊冠同在上戒賔之内已戒之矣今又宿是宿者必先戒也云戒不必宿者即上文戒賔之中除正賔及贊冠者但是僚友欲觀禮者皆戒之使知而已後更不宿是戒不必宿者也云不宿者為衆賔或悉來或否者此決賔與贊冠者戒而又宿不得不來衆賔主來觀禮非要須來容有不來者故直戒不宿也云主人朝服者見上文有戒無宿者無戒而有宿者凡有戒無宿者非止於此案鄉飲酒鄉射主人戒賔及公食大夫各以其爵皆是當日之戒理無宿也又大射宰戒百官有事於射者射人戒諸公卿大夫射司士戒士射與贊者前射三日宰夫戒宰及司馬皆有戒而無宿是也射人宿視滌此言宿者謂將射之前於宿預視滌濯非戒宿之意也若然特牲禮云前期三日宿尸前無戒而直有宿者特牲文不具其實亦有戒也又禮記祭統云先期旬有一日宫宰宿夫人夫人亦散齋七日致齋三日注云宿讀為肅肅猶戒也戒輕肅重也者彼以夫人尊故不得言戒而變言宿讀為肅者肅亦戒之義彼以宿當戒處非謂祭前三日之宿也太宰云祀五帝則掌百官之誓戒者謂戒百官使之散齋至祭前三日當致齋也凡宿賔之法案特牲云前期三日筮尸乃宿尸厥明夕陳鼎則前期二日宿之也少牢筮吉下云宿鄭注云大夫尊儀益多筮日既戒諸官以齋戒矣至前祭一日又戒以進之使知祭日當來又云前宿一日戒宿尸注云先宿尸者重所用為尸者又為將筮吉則乃遂宿尸是前祭二日筮尸訖宿尸至前祭一日又宿尸天子諸侯祭前三日宿之使致齋也賔及贊冠皆屬官降主人一等乃宿賔賔許主人再拜賔答拜主人退賔拜送釋曰謂賔若他官之屬者此所取本由主人之意或取賔之屬或取他官之屬故鄭兩言之案周禮三百六十官每官之下皆有屬官假令上士為官首其下有中士下士為之屬若中士為官首其下即有下士為之屬也云中士若下士也者此據主人是上士而言之贊冠者皆降一等假令主人是上士賔亦是上士則取中士為之贊假令主人是下士賔亦是下士則亦取下士為之贊禮窮則同故也云宿之以筮賔之明日者以下有厥明夕為期是冠前一日宿賔宿贊在厥明之上則去冠前二日矣筮賔是前期三日則知宿賔贊冠者是筮賔之明日可知厥明夕為期謂冠前之夕與賔贊期厥明夕為期於庿門之外主人立于門東兄弟在其南云云釋曰自此至賔之家論冠前一日之夕為明日加冠之期告賔之事也云厥明夕為期者謂宿賔與贊冠明日向暮為加冠之期必於廟門者以冠在廟知亦在廟為期也主人之類在門東賔之類在門西者各依賔主之位夾處東西也在主曰擯在客曰介亦曰相擯者請期宰告曰質明行事注擯者有司佐禮者釋曰上云有司此言擯者故知擯者是有司佐主人行冠禮者也云在主人曰擯在客曰介者案聘禮及大行人皆以在主人曰擯在客稱介亦曰相司儀云每門止一相是也上經布位已畢此經見為期之事請主人加冠之期宰贊命告之特牲請期曰羮飪此無羮故云質明云旦日正明行冠事者案特牲請期曰羮飪鄭注云肉謂之羮飪熟也謂明日質明時而曰肉熟重豫勞賔此無羮飪故云質明少牢云旦明行事故此注取彼而言曰旦日正明行冠事也洗棄水器漢禮器制度士用鐡夙興設洗直於東榮南北以堂深水在洗東釋曰云洗承盥洗者棄水器也者謂洗手洗爵之時恐水穢地以洗承盥洗水而棄之故云棄水器也云士用鐡者案漢禮器制度洗之所用士用鐡大夫用銅諸侯用白銀天子用黄金也云榮屋翼也者即今之博風云榮者與屋為榮飾言翼者與屋為翅翼也榮謂屋翼即漢之博風匠人於殷路寢言四阿明夏否周制自卿大夫以下其室為夏屋者言周制者夏殷卿大夫以下屋無文故此經是周法即以周制而言也案此經是士禮而云榮鄉飲酒卿大夫禮鄉射喪大記大夫士禮皆云榮又案匠人云夏后氏世室堂脩二七廣四脩一五室此謂宗廟路寢同制則路寢亦然雖不云兩下為之彼下文云殷人重屋四阿鄭云四阿四注重屋屋謂路寢殷之路寢四阿則夏之路寢不四阿矣當兩下為之是以檀弓孔子云見若覆夏屋者矣鄭注云夏屋今之門廡漢時門廡也兩下為之故舉漢法以况夏屋兩下為之或名兩下屋為夏屋夏后氏之屋亦為夏屋鄭云卿大夫以下其室為夏屋兩下而周之天子諸侯皆四注故喪大記云升自屋東榮鄭以為卿大夫士其天子諸侯當言東霤也周天子路寢制似明堂五室十二堂上圓下方明四注也諸侯亦然故燕禮云洗當東霤鄭云人君為殿屋也水器尊卑皆用金罍沃盥用枓云水器金罍尊卑皆用金罍及大小異者此亦案漢禮器制度尊卑皆用金罍及其大小異此篇與昏禮鄉飲酒鄉射特牲皆直言水不言罍大射雖云罍水不云枓少牢云司宫設罍水於洗東有枓鄭注云設水用罍沃盥用枓禮在此也欲見罍枓俱有餘文無者不具之意也儀禮内設洗設尊先後及有無異儀禮之内設洗與設尊或先或後不同者若先設洗則兼餘事此士冠賔與贊共洗昏禮有夫婦與御媵之等少牢特牲兼舉鼎不專為酒以是皆先設洗鄉飲酒鄉射先設尊者以其專為酒燕禮大射自相對大射辨尊卑故先設尊燕禮不辨尊卑故先設洗又儀禮之内或有尊無洗或尊洗皆有文不言設之者是不具也儀禮要義卷一
