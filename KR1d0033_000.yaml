body:
  text: 儀禮要義禮類二儀禮之屬提要臣等謹按儀禮要義五十卷宋魏了翁所撰九經要義之一於每篇各為條目而節取注疏録於下方與周易要義略同蓋其著書本例也儀禮一經最為難讀諸儒訓詁亦稀其著録于史者自喪服諸𫝊外隋志僅四家舊唐志亦僅四家新唐志僅三家今惟鄭元注賈公彥疏存耳鄭注古奧既或猝不易通賈疏文繁句復雖詳贍而傷于蕪漫端緒亦不易明朱子語録謂其不甚分明蓋亦有故了翁取而刪剟之分臚綱目條理秩然使品節度數之辨展卷即知不復以詞義轇轕為病其梳爬剔抉于學者最為有功雖所採不及他家而儀禮之訓詁備于鄭賈之所說鄭賈之精華備于此書之所取後來詮解雖多大抵以注疏為藍本則此書亦可云提其要矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1f386ad0cec44958d24f1b1784fb25291e7b101bf81874ddf20fa7446bb441a0
