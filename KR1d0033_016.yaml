body:
  text: 儀禮要義卷十六宋魏了翁撰大射儀一將祭先習射於澤后射天射儀第七鄭目録云諸侯將有祭祀云云釋曰自此盡西紘論射前預戒諸官及張侯設樂縣之事不言禮言儀者以射禮盛威儀多故以儀言之是以射義云孔子曰射者何以射何以聽循聲而發發不失正鵠者其唯賢者乎若夫不肖之人則彼將安能以中是其射容難故稱儀也云將有祭祀之事當射者按射義云天子將祭必先習射於澤澤者所以擇士也己射於澤而后射於射宫射中者得與於祭不中者不得與於祭是其將祭必射也云宰告於君君乃命之者鄭意下云宰戒百官者宰先告君君使之戒乃戒即云戒百官是也鄭以冢宰釋宰其實諸侯謂司徒為宰卿宰戒百官有事於射者注宰於天子冢宰治官釋曰按周禮大宰職云掌百官之誓戒此言宰戒百官其事同故鄭以天子冢宰言之也其實諸侯兼官無冢宰立地官司徒以兼之故聘禮云宰命司馬注云宰上卿二君事者也諸侯謂司徒為宰卜日及戒皆在祭前旬有一日射人戒諸公卿大夫射司士戒士射與贊者釋曰上文宰官尊總戒此射人司士色别重戒之射人司士皆屬司馬故云司馬屬也此上下文所云戒者皆謂祭前旬有一日知者祭統云先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日若然卜及戒皆在旬有一日是大宰云前期十日帥執事而卜日遂戒注云前期前所諏之日也十日容散齊七日致齊三日其天子又有天地及山川社稷宗廟諸侯直有境內山川社稷宗廟卜日及戒皆同也按郊特牲云卜郊受命于祖廟作龜于禰宫卜之日王立于澤親聽誓命又云獻命庫門之內戒百官也大廟之命戒百姓也注云王自澤宫而還以誓命重相申敕也王自此還齊路寢之室若然卜日在澤宫又至射宫皆同在旬有一日空十日故後日乃齊也大祀前射三日戒前射一日宿前射三日宰夫戒宰及司馬射人宿視滌釋曰此宰夫戒是再戒之宿不云宿者辟下宿視滌何者宰夫戒是也戒下宿是夕宿是以宗伯云凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯注云宿申戒也此前有射人戒是七日前期此宰夫戒是申戒又知宿是夕宿者以戒宿同文明不同日以其上云前射三日戒明此非三日是前一日矣侯所射布乏獲者禦矢貍步六尺司馬命量人量侯道與所設乏以貍步云云釋曰云量人司馬之屬掌量道巷塗數者量人職文量人屬司馬故云司馬之屬也云侯謂所射布也者以其三侯皆以布以皮為鵠旁又飾以皮也云尊者射之以威不寧侯者即梓人云毋或若汝不寧侯不屬于王所故抗而射汝是也云卑者射之以求為諸侯者射義云故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯是也容謂之乏所以為獲者之禦矢者此云乏周禮射人云容云則此貍步六尺明矣者隂破先鄭鄭注射人貍步謂一舉足為步於今為半步鄭引弓之下制六尺以非之大夫祭亦大射擇士士無臣祭不射大夫將祭於己射麋侯者司裘云卿大夫共麋侯是天子卿大夫以孝經云大夫有爭臣三人以有臣故將祭得大射擇士鄭言此者以己射用麋侯又見助君祭亦射君之麋侯云士無臣祭不射者孝經云士有爭友不言臣以僕𨽻為友司裘卿大夫下不言士故祭不言士大射若然士有賔射燕射不得大射雖不得大射得與君賔射故射人注不言士者此與諸侯之賔射士不與也若然諸侯之士亦然也東笙磬西頌磬取隂陽生成樂人宿縣于阼階東笙磬西面其南笙鐘其南鑮皆南陳云東為陽中萬物以生者陽氣起於子盛於午故東方為陽中也萬物以生以其正月三陽生太蔟用事故萬物生焉云春秋𫝊者是外𫝊伶州鳩對周景王辭引之者證鐘磬為笙之事太蔟者寅上候氣之管度律均鐘金即鐘也故奏之所以贊陽出滯云姑洗所以修潔百物考神納賔者亦據度律均鐘姑洗在辰三月百物修潔而出考神納賔謂祭祀而有助祭之賔客但東方陽管唯有此二律故據此二律言之是以名東方鐘磬為笙也云皆編而縣之者言皆者欲解磬非應律之物與鐘同言之者以其鑮與鼓雖同西面與鐘同不編之而磬與鐘同十六枚而在一虡與鐘同編又同宫故兼言磬是以磬師職云掌教擊磬擊編鐘注云磬亦編於鐘言之者鐘有不編不編者鐘師擊之是其磬與鐘編之此東方云笙而西方言頌者以其夷則無射主西方成功收藏故稱頌頌者美盛德之形容故云頌也但天有十二次地有十二辰案書傳云天子出撞黃鐘之鐘右五鐘皆應入則撞蕤賔之鐘左五鐘皆應左右云五則除黃鐘蕤賔並為陽而應鐘林鐘已西為右五也大吕中吕已東為左五也凡縣鐘磬半為堵全為肆注周禮曰云云有鐘有磬為全鑮如鐘云云云周禮曰凡縣鐘磬半為堵全為肆者周禮小胥職文鼓鑮亦縣而直言鐘磬者據編縣者為文鼓鑮筍虡之上各縣一而已不編之鄭彼注云半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫天子之卿大夫判縣東西各有鐘磬是全之為肆諸侯卿大夫雖同判縣半天子卿大夫取一相鐘磬分為兩相西縣鐘東縣磬而天子之士特縣直東有鐘磬且是全之為肆諸侯之士直特縣半天子之士縣磬而已或於階間或於東方又天子宫縣四面皆有諸侯軒縣闕南面面皆有鐘磬鑮及鼓具有也卿大夫士皆無鑮者若有鑮則諸侯臣半天子臣不得具是以闕之云鑮如鐘而大者特牲注亦云鑮如鐘而大並據國語而注之以言鑮形如鐘而復大以大故特一縣不編之也云奏樂以鼓鑮為節者按周禮鑮師云掌金奏之鼓注云謂主擊晉鼓以奏其鐘鑮也以此言之則先擊鼓後擊鐘鑮皆是與樂為節夷則無射西方成功故為頌亦為庸西階之西頌磬東面其南鐘其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北注言成功曰頌云云釋曰言春秋傳者亦是外傳文云詠歌九則者謂六府三事九功之德是也以此九則平民使無差慝云無射所以宣布哲人之令德者哲人謂后稷后稷以稼穡之功成於季秋先王之業以農為本故云示民軌義謂軌法義理也云先擊西鼙樂為賔所由來也者解先擊朔鼙之意賓向外來位在西其樂主為樂賓故先擊朔鼙應之也云鍾不言頌鼙不言東鼓義同省文也者決上東方言笙鐘應鼙言南鼓此當言頌鍾東鼓義與上文同亦合有而不言者省文也云古文頌為庸者此雖疊古文不從亦通義是尚書云笙鏞以間笙東方鐘磬西方是庸亦功也亦有成功之義也國君於羣臣備三面為諸侯則軒縣一建鼓在西階之東南面云言面者國君於其羣臣備三面爾者言國君合有三面為辟射位又與羣臣射闕北靣無鍾磬鎛直有一建鼓而已故不言南鼓而言南靣也云其為諸侯則軒縣者若與諸侯饗燕之類則依諸侯軒縣三靣皆有鼓與鍾磬鎛笙簫與管異而鄭以笙簫釋簜簜在建鼓之間釋曰案禹貢云篠簜既敷注云簜竹故知此簜亦竹也其器則管也是以下云乃管新宫注云管謂吹簜故知竹管也按小師職注云管如笛而小併兩而吹之今大豫樂官有焉爾雅云大笙謂之巢小者謂之和簫大者二十三管長尺四寸小者十六管長尺二寸大笙十九簧小者十三簧若然笙簫與管器異以其皆用竹故云笙簫之屬也云倚于堂者管擬吹之不倚在兩建鼓間鼗以節樂倚頌磬西紘鼗倚於頌磬西紘釋曰知鼗如鼓而小者按那詩云猗與那與置我鼗鼓傳云猗歎辭那多也鄭讀置為植植鼗鼓者為楹貫而樹之美湯受命伐桀定天下而作護樂故歎之多其改夏之制乃始植我殷家之樂鼗與鼓也鼗雖不植貫而搖之亦植之類以其殷人植鼓以木貫之而下有拊鼓亦以木為柄而貫之但手執而不植為異故云亦植之類鼗與鼓同文是鼗如鼓而小也知有柄賓至搖之以奏樂者按眂瞭職云掌凡樂事播鼗擊頌磬笙磬磬言擊鼗言播紘若天子諸侯冕而朱紘用組之類磬又編縣之用紘故知紘編磬繩也知設鼗於磬西倚於紘者以其鍾磬皆靣向東人居其前西靣故知鼗在磬西倚之於紘也引王制者證鼗以節樂之器柷狀如漆筒中有椎所以節樂鼗亦節樂柷大於鼗故賜公侯樂則以柷將命賜伯子男樂則以鼗將命自餘樂器陳於外也諸侯射先行燕禮故此陳設厥明司宫尊于東楹之西兩方壺云云釋曰自此盡羮定論豫設尊洗具饌之事按禮記燕義諸侯射先行燕禮此以下至東陳皆陳設器物與燕禮同但文有詳略耳豐以承膳尊上聲下形之字膳尊兩甒在南有豐注膳尊君尊豐以承尊云云云說者以為若井鹿盧者鹿盧之形即葬下棺碑間重鹿盧之輩今見井上堅柱夾之以索繞而挽之是也云其為字從豆􅞱聲者比為上聲下形之字年和穀豆多有故從豆為形也豐者承尊之器象形也是以豐年之字􅞱下著豆今諸經皆以承尊爵之豐不用本字之􅞱而用豐年之豐故鄭還依豐字解之故云其為字從豆為形以􅞱為聲也云近似豆大而卑矣者既用豆為形還近似籩豆之豆舉漢法而知但豆口徑尺柄亦長尺口徑小而又髙此承尊之物口足徑各宜差寬中央亦大共髙尺比常豆而下故云近似豆而卑但斫一大木為之取其安穩此豐若在宗廟或兩君燕亦謂之坫致爵在於上故論語云邦君為兩君之好有反坫鄭注云反坫反爵之坫是也必用豐年之豐為坫者以其時和年豐萬物成熟粢盛豐備以供郊廟神歆其祀祝嘏其福至鄉飲酒鄉射燕禮大射或君與臣下及四方之賔燕家富民足人情優嘏㫖酒嘉肴盈尊滿俎於以講道論政既獻酬侑酢至無算爵行禮交樂和上下相歡勸飲為樂故也冪用錫細布即錫衰之錫鄉飲尊房户間此君尊得專惠冪用錫若絺云云皆𤣥尊酒在北云云注二者皆有𤣥酒之尊重本也酒在北尊統於君南為上也云云云錫細布也者喪服記曰錫者十五升抽其半無事其縷有事其布曰錫故知錫是細布也謂之錫者治其布使之滑易也云唯君靣尊者玉藻文注云靣嚮也彼謂人君燕臣子專其恩惠此大射亦謂人君燕臣下與彼是同專惠之道故皆尊鼻嚮君云言專惠者决鄉飲酒尊於房户之間賔主夾之不得專惠設尊言鑮南樂以縣為主尊士旅食於西鑮之南北靣兩圜壺釋曰前設縣時鑮南更有一建鼓今設尊不應在鼓北而云鑮南者其實在鼓南門西北靣與燕禮同而云鑮南者遙繼鑮而言必繼鑮者樂以縣為主獻酒讀為沙泲鬱鬯以手摩又尊於大侯之乏東北兩壺獻酒注獻讀為沙知沙酒濁者以五齊從下向上差之醍沈清於泛醴鬱鬯又在五齊之上故知沙酒濁也云特泲之必摩沙也者此解名沙酒之意云郊特牲曰汁獻涗於盞酒者此以五齊中取盞酒盎齊泲鬱鬯之事獻沙也泲鬱鬯之時和盎齊以手摩沙出其香汁涗清也法之使清也此為僕𨽻以下卑賤之人而獻鬱鬯者此所得獻皆因祭侯謂侯之神故用鬱鬯也云服不之尊俟時而陳于南統于侯皆東靣知此不為大侯服不設者按下文云服不之尊東靣南上賔席公席布之餘樹之位後小臣設公席于阼階上西鄉云云席工于西階之東東上云云知賔及公席布之其餘樹之于位後者下文更有孤卿大夫席文故知也此實未布而言布之者欲辨尊卑故先言也小卿命於其君諸公謂大國孤卿小卿命云云席于賔西射禮辨貴賤諸公大國有孤卿一人云小卿命于其君也者按王制云大國三卿皆命于天子次國三卿二卿命于天子一卿命于其君小國亦三卿一卿命于天子二卿命于其君若言小卿據次國以下有之云射禮辨貴賤也者决燕禮大小卿皆在尊東西無小卿位彼主于燕不辨貴賤故也云與君論道亦不典職如公矣者成王周官云立大師大傅大保兹惟三公論道經邦燮理隂陽是三公論道無職此大國立孤一人論道與公同亦無職故云不典職如公也縱鄭不見周官於周禮三公亦無職考工記云或坐而論道亦通及三公矣燕禮宰饌此言官饌官饌注百官各饌其所當共之物釋曰燕禮宰饌此不言宰而言官者欲見非獨宰以樂納賔奏肆夏與賔出奏陔異奏肆夏注樂章名周禮曰賔出入奏肆夏釋曰王用肆夏以饗諸侯來朝今引之者證燕時納賔亦奏之按燕禮記云若以樂納賔則賔及庭奏肆夏鄭云卿大夫有王事之勞則奏此樂焉此亦同彼注也若臣無王事之勞則如常燕無以樂納賔法也又此納賔樂故諸侯亦得用若升歌則不可若賔醉而出奏陔夏與此異也鄉飲射主人洗北此洗南辟正主主人降洗洗南西北靣釋曰自此至虛爵降論主人獻賔之事也云不於洗北辟正主者按鄉飲酒鄉射主人降洗洗北南面是正主此宰夫代君為主燕朝聘者卒爵而樂闋此燕啐而闕樂闋注止也樂止者尊賔之禮盛于上也釋曰此上經云奠爵拜告㫖下經云賔卒爵則此經者是賔啐酒節即樂闋燕禮記亦云賔及庭奏肆夏賔拜酒主人答拜而樂闋亦據啐酒時按郊特牲賔入大門而奏肆夏又曰卒爵而樂闋與此啐酒樂闋不同者彼注謂朝聘者故卒爵而樂闋此燕已臣子法故啐酒而樂闋也云尊賔之禮盛於上也者賔及庭奏肆夏乃至升堂飲酒乃樂止是尊賔之禮盛于堂上者也儀禮要義卷十六
