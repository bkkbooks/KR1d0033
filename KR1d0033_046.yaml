body:
  text: 儀禮要義卷四十六宋魏了翁撰特牲饋食禮三士有嗣子舉奠少牢無者辟君釋曰自此盡出復位論嗣子飲奠酌獻之事云嗣主人將為後者不言適而言將為後者欲見無長適立庶子及同宗為後皆是故泛言將為後也云舉猶飲也者非謂訓舉為飲直是嗣子舉而飲之耳云將傳重纍之者謂將使為嗣牽纍崇敬承重祭祀之事是以使飲之而獻也云大夫之嗣子不舉奠辟諸侯者案文王世子云其登餕獻受爵則以上嗣注云上嗣君之適長子以特牲饋食禮言之受爵謂上嗣舉奠也獻謂舉奠洗爵酌入也餕謂宗人遣舉奠盥祝命之餕也大夫之嗣無此禮辟君也今案少牢無嗣子舉奠之事故此注云辟諸侯士卑不嫌得與人君同故有嗣子舉奠之事也奠者即上文祝酌奠奠於鉶南是也賓啐酒即酢主人此賔啐無酢嗣子尸執奠進受復位祭酒啐酒云云又祭酒啐酒奠之云啐之者答其欲酢已也者鄉飲酒鄉射主人獻賔賓皆啐酒洗爵即酢主人此嗣子獻賔賓啐之亦欲酢已故啐之其實無酢嗣齒於子姓凡非主人不由阼云嗣齒於子姓者姓之言生子之所生謂孫行者今嗣亦孫之流故齒之也云凡非主人升降自西階者案曲禮云為人子者升降不由阼階是以嗣子亦宜升降自西階適子孫不升阼階故於此總言凡也弟子獻長兄弟長兄弟拜弟子北面答拜兄弟弟子洗酌於東方之尊阼階前北面舉觶於長兄弟釋曰自此盡乃羞論弟子舉觶將行旅酬之事云如主人酬賓儀者謂如上文主人酬賓就其階同北面並拜乃飲卒爵拜洗酌乃西面賓北面拜位故言如此亦然弟子洗觶酌於東方之尊阼階前東面獻長兄弟長兄弟北面拜受弟子奠於薦南長兄弟坐取觶還西面拜弟子北面答拜長兄弟奠於薦北揖復位若有司徹云兄弟之後生者舉觶於其長長在左弟子自飲訖升酌降長拜受於其位舉爵者東面答拜鄭注云拜受答拜不北面者儐尸禮殺此不儐尸則拜送皆北面可知也弟子後生者此即有司徹云兄弟之後生者是也乃羞謂庶羞非薦又無內羞乃羞釋曰知羞非薦羞者上文受獻時皆設薦俎於其位故知此羞乃是庶羞非薦也云此所羞者自祝主人至於內賔者言自祝下及內賔及衆賔兄弟皆在可知又下記云公有司獻次衆賔私臣獻次兄弟則內賔亦及之是以少牢下篇云乃羞庶羞於賓兄弟內賓及私人不儐尸亦云乃羞於賔兄弟內賔及私人辨是也若然少牢與有司徹儐尸與不儐尸庶羞與房中羞皆與尸佐食及祝主人主婦皆同時羞之者彼上下大夫禮尊故得與尸同時羞此士禮卑故不得與尸同也云無內羞者以其尸尊尚無內羞况祝卑旅酬無算爵堂上下參差不等賓坐取觶阼階前北面酬長兄弟長兄弟在右釋曰自此盡實觶於篚論行旅酬之間作止爵之事但此特牲之禮堂下行旅酬無算爵並有室中者不與旅酬之事上大夫儐尸與旅酬不與無算爵之事故别二人舉觶於尸侑得舉為旅酬遍及堂下尸與旅酬者以其儐尸在堂禮殺故也若下大夫不儐尸者堂下無旅酬直行無算爵於堂下而已尸則不與之所以下大夫無旅酬直有無算爵者以其禮尸於室中辟國君堂下不設尊故無旅酬直行無算爵而已以其堂下與神靈共尊不得與尸行旅酬故屈之此特牲堂下得旅酬無算爵並行者以其堂下與神靈别尊故為加爵禮尸於室中酌上尊堂下旅酬行神惠酌下尊故上大夫及士之祭禮旅酬行無算爵或行或不皆參差不等旅酬無算爵酌已尊酬人時酌彼尊賓奠觶拜長兄弟答拜賔立卒觶酌於其尊釋曰以其旅酬無算爵以飲者酌已尊酬人之時酌彼尊是各自其酒故無算爵賓弟子及兄弟弟子舉觶於其長各酌於其尊也為加爵者作止爵禮殺並作為加爵者作止爵如長兄弟之儀釋曰前衆賓之長為加爵如初爵止今還使為加爵者作止爵也故云如長兄弟之儀云於旅酬之間言作止爵明禮殺並作者此決上文賓三獻爵止鄭注云三獻禮成欲神惠之均於室中是以奠而待之故有室中主人主婦致爵訖乃三獻作止爵此衆賓長為加爵如初爵止鄭注云尸爵止者欲神惠之均於在庭而堂下庭中行旅酬未訖為加爵者作止爵故鄭注云禮殺並作也尸爵亦得為神惠無算爵非神惠賓弟子及兄弟弟子洗各酌於其尊云云舉觶於其長釋曰自此盡爵無算論二觶並行無算爵之事云奠觶進奠之於薦右非神惠也者案上尊兩壺於阼階東加勺南柄西方亦如之鄭注云為酬賔及兄弟行神惠至此云非神惠者彼三獻止爵欲得神惠均於室中衆賓長為加爵止爵者欲神惠均於在庭故止爵行旅酬雖以尸而奠爵待之亦得為神惠至此别為無算爵在下自勸故得為非神惠故奠於薦右同於生人飲酒凡堂下皆北面凡拜受送皆北面云凡堂下拜亦皆北面者前主人酬賔弟子舉於其長行旅酬及無算爵兄弟弟子賔弟子舉觶皆北面則知凡堂下雖不見面位者皆北面拜可知云凡賔以下至於私人拜受送皆北面故云凡也此言利即前佐食少牢兩見其名利洗散獻於尸酢及祝如初儀降實散於篚釋曰自此盡西序下論佐食獻尸祭祀畢之事云利佐食也言利以今進酒也者利與佐食乃有二名者以上文設俎啓㑹爾敦之時以黍稷為食故名佐食今進以酒酒所以供飬故名利利即養也故鄭云以今進酒也若然少牢名佐食上利執羊俎下利執豕俎者大夫禮文故即兩見其名祭畢祝告利成禮有階上堂下之異祝東面告利成釋曰少牢云主人出立於阼階上南面祝出立於西階上東面祝告曰利成此户外告利成彼階上告利成以尊者稍逺於尸若天子諸侯禮畢於堂下告利成故詩楚茨云禮儀既備鐘鼓既戒孝孫徂位工祝致告鄭注云鐘鼓既戒戒諸在廟中者以祭禮畢孝孫往位堂下西面位也祝於是致孝孫之意告尸以利成是尊者告利成逺所尸也云不言禮畢於尸間之嫌者間間暇無事若言禮畢則於尸間暇無事有發遣尸之嫌故直言利成而已也尸謖主人降前尸出廟尸謖祝前主人降釋曰引少牢者證大夫禮主人立位與士不同又證前尸出廟之事云前尸之儀士虞禮備矣者彼有室中出户降階出廟前尸之事徹庶羞不入於房而設於序以擬燕徹庶羞設於西序下注為將餕去之庶羞主為尸非神饌也尚書傳曰宗室有事族人皆侍終日大宗已侍於賓奠然後燕私燕私者何也已而與族人飲也此徹庶羞置西序下者為將以燕飲與然則自尸祝至於兄弟之庶羞宗子以與族人燕飲於堂內賔宗婦之庶羞主婦以燕飲於房釋曰知非神饌而云為尸者以其尸三飯後始薦庶羞故徹之乃餕也凡餕者尸餕鬼神之餘祭者餕尸之餘義取鬼神之惠遍朝中庶羞非鬼神惠故不用也引尚書已下者是彼康誥傳文大宗已侍於賓奠者或有作𧃊或有作暮者皆誤以奠為正也引之者證徹庶羞不入于房而設于西序下以擬燕故也必知祭有燕者案楚茨詩云鼓鐘送尸下云備言燕私鄭注云祭祀畢歸賔客之俎同姓則留與之燕所以尊賔客親骨肉也其上大夫當日儐尸安有燕故有司徹上大夫云主人退注云反於寢也是無燕私若下大夫不儐尸與此士禮同亦當有燕也云與者以經直言設於序下不言燕疑之引書傳為證有燕故言與以疑之也云然則自尸祝以下知義如此者以兄弟受獻於堂上主婦內賔受獻於房中尸出之後堂房無事故知燕時男子在堂婦人在房可也廟中分神惠猶君惠遍境內筵對席佐食分簋鉶釋曰自此盡尸外西面論嗣子共長兄弟對餕之事云敦有虞氏之器者大夫異姓既用異代之器故少牢特牲皆用敦則同姓之士當同周制周制用簋故經言分簋餕是鬼神之惠遍廟中若國君之惠遍境內是可以觀政之事祝命佐食徹阼俎改饌西北隅為陽厭祝命徹阼俎豆籩設於東序下釋曰自此盡畢出論徹薦俎改設饌於西北隅為陽厭之事云祝命徹阼俎者是佐食徹之當徹阼俎之時堂下賓兄弟俎畢出故下文云佐食徹阼俎堂下俎畢出是也若然祝命徹阼俎時堂下俎畢出又退在下者欲見先徹室內俎乃徹堂下是以祝命佐食徹阼俎及豆籩又祝自執俎以出又宗婦徹祝豆籩入於房即佐食改饌西北隅是以作經并說室內行事乃到本云上佐食徹阼俎時堂下俎畢出也云命命佐食者此命命使徹阼俎下文云佐食徹俎故知宗婦徹入房為主婦將燕內賓宗婦徹祝豆籩入於房徹主婦薦俎釋曰宗婦不徹主人豆籩而徹祝豆籩入房者為主婦將用之為燕祝兩豆籩而主婦用之者祝接神尸之類主婦燕姑姊妹及宗女宜行神惠故主人以薦羞并及祝庶羞燕宗人於堂主婦以祝籩豆用之燕內賓於房是其事也云宗婦既並徹徹其卑者以宗婦不徹主人籩豆而徹祝與主婦是徹其卑者當室之白陽厭尸未入直飫神隂厭佐食徹尸薦俎敦設於西北隅几在南厞用筵納一尊佐食闔牗户降注厞隱也不知神之所在或諸逺人乎尸謖而改饌為幽暗庶其饗之所以為厭飫少牢饋食禮曰南面而饋之設此所謂當室之白陽厭也則尸未入之前為隂厭矣曽子問曰殤不備祭何謂隂厭陽厭也釋曰云不知神之所在或諸逺人乎禮記郊特牲之文彼論正祭與繹祭之事此為陽厭引之者欲見孝子求神非一處故先為隂厭後為陽厭之事也引少牢者見彼大夫禮陽厭南面此士禮東面雖面位不同當室之白則同案曽子問庶殤為陽厭之事故彼云凡殤與無後者祭於宗子之家當室之白尊於東房是謂陽厭鄭注云當室之白謂西北隅得户之明者也凡言厭者謂無尸直厭飫神故鄭云則尸未入之前為隂厭矣謂祭於奧中不得户明故名隂厭對尸謖之後改饌於西北隅為陽厭以向户明故為陽厭也引曽子問云殤不備祭何謂隂厭陽厭者彼上文孔子曰有隂厭有陽厭謂宗子有隂厭無陽厭凡殤有陽厭無隂厭曽子言謂殤死隂厭陽厭具有故問孔子孔子引宗子一有隂厭凡殤一有陽厭引之證成人隂厭陽厭並有之義也凡主人拜送賔賔不答拜祝告利成降出主人降即位宗人告事畢賔出主人送於門外再拜注拜送賓也凡去者不答拜釋曰云凡去者不答拜者云凡總解諸文主人拜送賔皆不答拜鄭注鄉飲酒云禮有終是也若賔答拜是更崇新敬禮故不答也衆賓自徹俎而出賓俎有司徹歸之佐食徹阼俎堂下俎畢出注唯賓俎有司徹歸之鄭所以知歸賓俎者正見賔出主人送於門外再拜明賔不自徹俎主人使歸之若助君祭必自徹其俎鄭注曲禮大夫以下或使人歸之是以孔子世家云魯郊不致燔俎於大夫孔子不稅冕而行士大夫家尊賓則使歸之自餘亦自徹而去也記以特牲饋食上下始終皆朝服記特牲饋食其服皆朝服𤣥冠緇帶緇韠釋曰此退𤣥冠在朝服下者欲令近緇色士冠在朝服上從而正也云皆者謂賔及兄弟筮日筮尸視濯亦𤣥端者見上經云筮日主人冠𤣥端子姓兄弟如主人之服有司羣執事如兄弟服筮尸云如求日之儀至於視濯又不見異服故知皆𤣥端至祭日夙興云主人服如初初即𤣥端明其餘亦如初是朝服可知是以此注云皆者謂賓及兄弟也云朝服者諸侯之臣與其君日視朝之服大夫以祭者案玉藻云諸侯朝服以日視朝下少牢云主人朝服是也爵觚觶角散之大小貴賤篚在洗西南順實二爵二觚四觶一角一散注順從也言南從統於堂也二爵者為賓獻爵止主婦當致也二觚長兄弟酬衆賓長為加爵二人班同宜接並也四觶一酌奠其三長兄弟酬賓卒受者與賔弟子兄弟弟子舉觶於其長禮殺事相接禮器曰貴者獻以爵賤者獻以散尊者舉觶卑者舉角舊說云爵一升觚二升觶三升角四升散五升釋云禮器曰貴者獻以爵者謂賔長獻尸主人致爵於主婦是也賤者獻以散上利洗散是也尊者舉觶謂若酌奠之及長兄弟酬賔之等是也卑者舉角謂主人獻用角鄭云下大夫也則大夫尊用爵士卑用角是也引舊說者爵觚已下升數無正文韓詩雖有升數亦非正經故引舊說為證也內兄弟南上北上取曲禮主婦南面內賔立於其北東面南上宗婦北堂東面北上注二者所謂內兄弟內賔姑姊妹也宗婦族人之婦其夫屬於所祭為子孫或南上或北上宗婦宜統於主婦主婦南面北堂中房而北釋曰言所謂者上經云主人洗獻內兄弟於房中知獻衆兄弟之儀是也云其夫屬於所祭為子孫者以其在父行則謂之為母今言宗婦則其夫屬於所祭死者之子孫之妻皆稱婦也云或南上或北上云內賔姑姊妹賔客之類南上自取曲禮云東鄉西鄉以南方為上宗婦雖東鄉取統於主婦故北上主婦南面故也云北堂中房而北者謂房中半已北為北堂也爨者老婦之祭非火神燔柴失之尸卒食而祭饎爨雍爨注舊說云宗婦祭饎爨亨者祭雍爨云亨者則周禮亨人之官其職主實鑊水爨亨之事以供外內饔故使之祭饔爨也云用黍肉而已無籩豆俎者亦約禮器云盆瓶知之引禮器者案彼云孔子曰臧文仲焉知禮燔柴於奧鄭注云奧當為爨字之誤也或作竈禮尸卒食而祭饎爨饔爨也時人以為祭火神乃燔柴又云夫爨者老婦之祭也盛於盆尊於瓶注云老婦先炊者也盆瓶炊器也明此祭先炊非祭火神燔柴似失之引之者證祭爨之事也賓送尸出門若有儐尸則尸出不送賓從尸俎出廟門乃反位注從尸送尸也云士之助祭終其事也者謂送尸為終其事既送尸為終其事則更無儐尸之禮若上大夫有儐尸者尸出賓不送以其事終於儐尸故也俎不言所折骨體略言殽脀又略衆賓及衆兄弟內賓宗婦若有公有司私臣皆殽脀注又略此所折骨直破折餘體可殽者升之俎一而已不備三者賤祭禮接神者貴凡骨有肉曰殽祭統曰凡為俎者以骨為主貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也俎者所以明惠之必均也善為政者如此故曰見政事之均焉公有司亦士之屬命於君者也私臣自己所辟除者釋曰云又略者上文長兄弟及宗人直言折不言所折骨體已是略此又不言折而言殽脀是又略也言此所折骨值有餘體即破之可也云祭禮接神者貴者謂長兄弟及宗人已上俎皆三皆有嚌肺以接神及尸貴故三體不止接神象所接尸者亦貴可知自衆賓以下折體而已不接尸神賤無獻故也宗人雖不獻執巾以授尸亦名接尸也祭祀有上事者貴之獻在後者賤公有司獻在衆賓後私臣獻在兄弟後故云獻在後者賤也云祭祀有上事者貴之者謂衆賓兄弟次賓之卑得獻衆賓擇取公有司可執事者謂前舉鼎匕載羞從獻衆賓擇取公有司酬爵之屬如此者門外在有司羣執事中入門列在東面為衆賓餘者在門西位也兄弟雖無上事亦皆在西面位族親故也私臣獻在兄弟後者職賤公有司在衆賓後不執事賤於執事者故曰有上事者貴之宗人獻與旅齒於衆賓則公有司為之佐食於旅齒於兄弟則私臣之中擇為賓使為佐食也是以前文佐食北面立於中庭注云佐食賓佐尸食者是也君賜爵有爵則以官無爵從昭穆案祭統云凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序此不見昭穆位者主人衆兄弟非昭穆乎故彼注昭穆猶特牲少牢饋食之禮主人之衆兄弟也羣有司猶衆賓下及執事者君賜之爵謂若酬之是也若其有爵者則以爵序之何故然也案文王世子其在外朝則以官其在宗廟之中則如外朝之位宗人授事以爵以官是不以姓其獻之亦以官故祭統云尸飲五君洗玉爵獻卿尸飲七以瑶爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等是也其酬蓋因此位而昭穆得獻蓋依少牢下篇主人洗升酌獻兄弟阼階上注云兄弟長幼立飲賤不别大夫之賓尊於兄弟又曰辨受爵其位在洗東西面北上升受爵其薦脀設於其位注云先著其位於上乃後云薦脀設於其位明位初在是也此中皆無爵者以此二者差之知無爵者從昭穆有爵者則以官矣賓主相酬主常在東同在賔中則尊右賓酬長兄弟長兄弟在右長兄弟酬衆賓長自左受旅如初是賓主相酬主人常在東其同在賓中則受酬者在左若鄉飲酒賓酬主人主人立於賓東主人酬介介立於主人之西其衆賓受介酬者自介右鄭注云尊介使不失故位衆受酬者受自左異其義也賔主相酬各守其位不以尊卑變同類之中受者於左尊右也主婦俎觳折謂分後右足為俎主婦俎觳折注觳後足折分也釋曰案既夕記云明衣裳長及觳鄭注云觳足跗也是後足也云分後右足以為佐食俎者少牢主婦用左臑此士妻辟之不用左臑用後右足不用後左足太卑魚十有五象月盈尊卑俎同魚十有五注魚水物以頭枚數隂中之物取數於月十有五日而盈少牢饋食亦云十有五而俎尊卑同此所謂經而等也儀禮要義卷四十六
