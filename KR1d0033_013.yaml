body:
  text: 儀禮要義卷十三宋魏了翁撰鄉射三旅酬訖司正降使二人為無算爵司正降復位釋曰自此盡唯賔論舉觶於賔與大夫為無算爵之事云司正降復位者司正當監旅酬訖故降使二人舉觶于賔與大夫為無算始也二人主人之贊者二人舉觶于賔與大夫坐奠不敢授舉觶者皆洗觶升實之西階上北面皆坐奠觶拜執觶興賔與大夫皆席末答拜云云皆進坐奠於薦右云皆進坐奠于薦右者以其將飲者於右故也云坐奠之不敢授者對獻酬時親授主人之贊者卑不敢親授觶賔與大夫奠爵不舉盛禮已崇舉觶者退云云賔與大夫坐奠于其所興若無大夫則唯賔釋曰鄉二人舉觶為賔與大夫今若無大夫當闕一人故云則唯賔也云長一人舉觶如燕禮媵爵之為者燕禮初二大夫媵觶至旅酬復使二人君命長媵一爵於君與此同故云如燕禮之為彼旅酬此為無算爵不同但一人是同故引為證也禮成强有力者猶倦故請坐司正升請坐于賔注請坐欲與賔燕盡殷勤也釋曰自此盡少退北上論請坐徹俎之事云酒清肴乾强有力者猶倦焉者此禮記聘義文案彼云故强有力者將以行禮也酒清人渴而不敢飲也肉乾人饑而不敢食也日莫人倦齊莊正齊而不敢懈惰引之者證此賔須坐之義命弟子俟徹俎以賔辭俎故使賔黨司正降自西階階前命弟子俟徹俎釋曰知弟子是賔黨者以其司正降自西階階前命之明賔黨弟子在西階東面也必使賔黨弟子者徹俎是賔請之故鄭云俎者主人贊者設之今賔辭之使其黨俟徹順賔意也云上言請坐于賔此言主人曰互相備耳者凡辭皆司正請于主人主人有命司正乃傳告賔今上文云司正請坐于賔直見司正傳主人辭不見主人曰請坐于賔之辭此經直見主人曰請徹俎不見司正𫝊主人以告賔是互相備也賔主人大夫各歸俎降衆賔無俎亦從降賔取俎還授司正云云司正以俎出授從者主人取俎還授弟子云云大夫取俎云云云古者與人飲食必歸其盛者所以厚禮之者鄉飲酒燕禮大射賔客皆有俎徹歸客之左右俎是肴之貴是歸其盛者公食大夫既食有司卷三牲之俎歸于賔館云以東授主人侍者弟子是賔黨非主人之贊者故知徹主人俎還授主人侍者歸入於內也賔主人大夫有俎從俎而降此三賔無俎亦從大夫而降亦知賔主人大夫將燕故同降同升也說屨尊卑異鄉行敵禮皆堂下主人以賔揖讓說屨乃升大夫及衆賔皆說屨升坐釋曰自此盡門外再拜論升坐行無算爵賔醉送之出事云說屨則摳衣為其被地者曲禮云摳衣趨隅彼謂升席時引之證說屨低身亦然若不摳衣恐衣被地履之但對文上曰衣下曰裳散文衣裳通此衣即裳也案少儀云排闔說屨於户內一人而已矣鄭注云雖衆敵猶有所尊也彼尊卑在室則尊者說屨在户內自餘說屨於户外若尊卑在堂則亦尊者一人說屨在堂自餘說屨於堂下是以燕禮大射臣皆說屨於階下公不見說屨之文明公舄在堂以此乃鄉飲酒臣禮賔主人行敵禮故皆說屨於堂下也無算爵與正獻酬異視正旅酬又殺無算爵使二人舉觶賔與大夫不興取奠觶飲卒觶不拜云卒觶者固不拜矣著之者嫌坐卒爵者拜既爵者上正旅酬時賔酬主人賔不祭卒觶不拜不洗今此二人舉觶禮彌殺故云卒觶者固不拜矣嫌坐卒爵者拜既爵以正獻酬時皆坐卒爵拜既爵嫌此無算爵飲卒觶亦有拜義故明之云坐于席禮既殺不復崇者此決正行獻酬時在於階下有拜既爵此說屨就席禮既殺不復崇重故無拜爵也賔主人大夫賔長之觶交錯相酬執觶者受觶遂實之賔觶以之主人大夫之觶長受而錯皆不拜釋曰云其或多者迭飲於坐而已者衆賔之長在賔西者二人大夫則席於賔東若大夫亦三人則與衆賔等得交錯相酬言其或多者若有一大夫則衆賔二人無所酬直二人迭飲而已若大夫四人已上多於三賔自三人之外亦無所酬則亦自相酬迭飲而已云皆不拜受禮殺也者上二人舉觶於賔與大夫皆拜受及飲卒不拜是其殺今衆賔與大夫不拜受觶故言禮又殺也堂上賔坐飲辨即興以旅堂下者辨卒受者興以旅在下者于西階上云以其將旅酬不以己尊孤人也者其堂上皆坐行酒至此立階上旅在下解經興以旅在下者云其末若皆衆賔則先酬主人之贊者謂大夫或少或無則衆賔為末飲也云若皆大夫者謂大夫多衆賔遍後二觶並酬大夫則大夫為末飲也云執觶者酌在上辨降復位者謂二人舉觶酌堂上衆賔已上辨其堂下自酌相旅二人無事故降復于東階前西面北上位也舉觶者先己飲自以齒與旅飲執觶者皆與旅注嫌己云云亦自以齒與於旅釋曰此即上文二人舉觶者於西階上已卒觶故鄭云嫌己飲不復飲也正歌有次第皆三終無算樂異無算樂注合鄉樂無次數釋曰知合鄉樂二南者約上正歌時不略其正己歌鄉樂但上有次第先歌關雎次歌葛覃卷耳次歌鵲巢采蘋采蘩皆三終有次數今無次數在賔主所好也息司正以下皆記禮之異主人釋服乃息司正無介釋曰云勞禮略貶於飲酒也者謂貶於鄉飲酒鄉飲酒禮有介此上司正飲酒及此勞禮皆無介是貶於鄉飲酒也云此以下皆記禮之異者謂息司正之禮與上飲酒禮異羞唯所有鄉樂唯欲羞唯所有注用時見物釋曰謂昨日所有之餘見物鄉樂唯欲注不歌至所好釋曰此即與上無算樂同而云不歌雅頌者以其上飲酒主於射略於樂不用小雅此非鄉射而亦不歌雅頌者亦不可過于正飲酒禮故云周召之詩在所好也射賔無爵命有大夫則易公士鄉飲不易記大夫與則公士為賔據此鄉射使處士無爵命者為賔故有大夫來不以鄉人加尊於大夫故易去之使公士為賔若然鄉飲酒貢士法賢者為賔其次為介又其次為衆賔有大夫來不易去之以其賔擬貢故也云鄉賔主用處士即君子者也用醴無幂尊厭卑無幂徹則不復用尊綌幂賔至徹之注以綌為幂取其堅潔釋曰凡幂者皆為塵埃加故設之但用幂不用幂不同者凡用醴皆不見用幂質故也即士冠禮子昏禮禮賔贊禮婦聘禮禮賔此等用醴皆無幂是也醮用酒亦無幂者從禮子質也或以尊厭卑亦無幂燕禮君尊有幂方圜壺則無幂昏禮尊於室內有幂尊於房户外為媵御賤故無幂鄉飲酒鄉射有幂者無所厭故也若祭祀之幂幂人云以疏布幂八尊鄭云天地之神尚質以畫布幂六彞鄭云宗廟可以文凡王巾皆黼注云周尚武其用文德則黻可諸侯無文或與王同其喪中之幂皆用疏布士喪禮小斂用功布大斂亦同士虞用絺幂與吉同大夫亦當然也云賔至徹之者巾幂必布執幂賔未至恐塵加賔至徹去不復用以其鄉射飲酒不見更用之文故也燕禮君命徹幂則未命之前重用之者君尊久設恐塵故重覆之此與鄉人習禮雖尊無加席蒲筵緇布純注筵席也釋曰鄉大夫州長與鄉人習禮雖有公卿之尊無加席唯一種故記人記之衆賔已南面東上今又有東面北上西序之席北上注衆賔統於賔釋曰衆賔之席繼賔已西南面東上今云西序之席北上者謂衆賔有東面者則北上此東面非常故記之也若然此鄉射上設席雖不言衆賔之數上文云三拜衆賔鄭云三拜示遍也則衆賔亦三人矣而復有東面者若公卿大夫多尊東不受則於尊西賔近於西則三賔東面北上統於賔也俎以骨名肉骨為本賔肩主臂肩為尊賔俎脊脅肩肺云云注賔俎用肩主人用臂尊賔釋曰云以骨名肉者骨為本有名肉為末無名所食即肉故以骨名肉必知骨有肉者特牲乃食舉注云舉言食者明凡解體皆連肉是有肉也云賔俎用肩主人用臂尊賔也者此據前三體而言以其體有肩臂臑禮記祭統云周人貴肩為其顯故賔用肩尊賔也大笙曰巢小笙曰和三笙一和而成聲注凡四人也云爾雅曰笙小者謂之和者案爾雅釋樂云大笙謂之巢孫氏注云巢髙大又云小者謂之和記四侯者天子諸侯燕射亦用鄉射禮凡侯天子熊侯白質云云士布侯畫以鹿豕釋曰云此所謂獸侯也者周禮梓人云張獸侯以息燕注云息者休農息老物也燕謂勞使臣若與羣臣飲酒而射是也云燕射則張之者燕禮大射正為司射如鄉射之禮是諸侯燕用鄉射之禮故云燕射則張之也天子雖無文據記天子燕射記明天子燕射亦用鄉射之法也云鄉射及賔射當張采侯二正者案周禮射人掌賔射大夫士同二正是賔射二正鄉射無文知亦采侯二正者周禮賔射與賔客為射此鄉射雖與鄉人習禮亦立賔主行射禮又非私相燕勞故約與賔射同也言采侯者梓人云張五采之侯則逺國屬是賔射之侯云而記此者天子諸侯燕射各以其鄉射之禮射自楹間言楹非射於序射自楹間物長如笴其間容弓距隨長武釋曰注云自楹間者謂射於庠也知者以其言楹間則是庠則物當楣故知非射於序者也云楹間中央東西節也者從畫之長短也者其下有距隨為橫此言物長又是從迹之稱故知南北之長短也云笴矢幹也長三尺者以矢人職得知也云與跬相應者禮記祭義云故君子跬步而弗忘孝也一舉足謂之跬再舉足謂之步步射者履物不過一跬故知以三尺為限也云距隨者物橫畫也始前足至東頭為距後足合來而南面為隨者謂上射下射並足皆然言長武武跡也中人之跡尺二寸謂橫尺二寸也旌各以其物兼言大夫於庠士於序旌各以其物注旌總至於榭釋曰云旌總名也者以周禮司常云九旗對文通帛為旜雜帛為物全羽為旞析羽為旌各别今名物為旌者散文通云各者鄉射或於庠或於榭者諸侯鄉大夫是大夫詢衆庶射於庠射于榭于序是諸侯州長是士春秋習射于榭大夫士同建物而云各者雖同建物仞則大夫五仞士三仞不同故云各也無物謂小國之州長不命無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋云無物者謂小國之州長也者案典命子男之卿再命大夫一命士不命大夫一命得建物士不命則無物是以不得與上各以其物同别為此旌云此翿旌也者據下文士鹿中翿旌也下云君國中射則皮樹中以翿旌獲此不命士與國君同者士卑不嫌命士以上尊卑自異也云翿亦所以進退衆者此非直用之於獲案大喪記君葬時執翿居前詔傾虧亦所以進退衆人也云七尺曰仞者無正文鄭案書傳云雉長三尺髙一丈則牆髙一丈禮記祭義云築宫仞有三尺牆髙一丈云仞有三尺除三尺之外只有七尺故知七尺曰仞也王肅則依小爾雅四尺曰仞孔君則八尺曰仞所見不同也云鴻鳥之長脰者也者脰則項也云八尺曰尋者亦無正文冬官云車有六等之數云殳長尋有四尺長丈二而云尋有四尺除四尺則尋長八尺矣挾矢於二指間謂以食指將指挾之凡挾矢於二指之間橫之云二指謂左右手之第二指知左右手皆挾之者以云二指之間橫之則知左右手也云此以食指將指挾之者以左臂指拓弓右擘指鉤弦故知挾指以第二第三指間第二指為食指左傳云子公之食指動是也第三指為將指左傳云吳王闔閭傷於將指是也楅龍首蛇交韋當以韋為心楅長如笴博三寸厚寸有半龍首其中蛇交韋當釋曰云蛇龍君子之類也者易云龍戰于野其血𤣥黃鄭注云聖人喻龍君子喻蛇是蛇龍總為君子之類也云直心背之衣曰當者直通身之言其楅兩頭為龍首於背上通身著當言當心中央也知丹韋為之者周尚赤上云凡畫者丹質又周禮九旗之帛皆用絳此禮射與主皮之射異禮射不主皮主皮之射者勝者又射不勝者降禮射謂以禮樂射也大射賔射燕射是矣不主皮者貴其容體比於禮其節比於樂不待中為雋也言不勝者降則不復射也主皮者無侯張獸皮而射之主於獲也尚書傳曰戰鬭不可不習故於搜狩以間之也間之者貫之也貫之者習之也已祭則取餘獲陳於澤然後卿大夫相與射也中者雖不中也取不中者雖中也不取何以然所以貴揖讓之取也而賤勇力之取鄉之取也於囿中勇力之取也今之取也於澤宫揖讓之取也澤習禮之處非所於行禮其射又主中此主皮之射與天子大射張皮侯賔射張五采之侯燕射張獸侯釋曰云言不勝者降不復升射也者據主皮射者也禮射三畨不勝仍待後畨復升射也尚書傳者濟南伏生為尚書作傳云已祭取餘獲陳於澤然後卿大夫相與射也者此則周禮山虞田訖虞人植旗於中屬禽焉每禽擇取三十餘將向國以祭謂若大司馬云仲春祭社仲夏享礿仲秋祀方仲冬享蒸已祭乃以餘獲陳於澤宫中卿大夫共以主皮之禮射取之云雖不中雖中者據內田時也云非所於行禮者云揖讓取即是行禮而云非所於行禮者揖讓雖是禮對大射之等其體比於禮其節比於樂為非所行禮也云此主皮之射與者書傳不言主皮以義約同故云與以疑之也云天子大射已下者案梓人云張皮侯而棲以鵠則春以功即此鄭云天子大射張皮侯一也梓人又云張五采之侯逺國屬即此鄭云賔射張五采之侯也梓人又云張獸侯以息燕即此鄭云燕射張獸侯也鄭言此者證此是禮射與主皮異也先習射於澤宫而後射於射宫習武之射無侯直射甲革椹質天子有澤宫又有射宫二處皆行射禮者澤宫之內有班餘獲射又有試弓習武之射若西郊學中射者行大射之禮張皮侯者是也澤宫中射將欲向射宫先向澤宫中試弓習武之射此習武之射無侯直射甲革椹質故司弓矢職云王弓弧弓以授射甲革椹質而注引圉人職曰射則充椹質是也侯以鄉堂為面故右今在東東方謂之右個注侯以鄉堂為面也釋曰以其經直云左右個不辨東西故記人明之中十尺用布五幅以漢制約古中十尺注方者至中也釋曰云方者也者謂侯中正方十尺云用布五丈今官布幅廣二尺二寸旁削一寸者鄭意此言十尺用布五幅幅廣二尺二寸兩畔各削一寸為縫幅各二尺在故五幅為一丈也漢法幅二尺二寸亦古制存焉故舉以為況若然周禮鄭志純三只只八寸二尺四寸者據繒幅也士喪禮云亡則以緇長半幅注云半幅一尺終幅二尺亦謂繒而幅二尺者幅有二種喪禮略用其狹者故周禮鄭云凡為神之衣物必治而小是也引梓人者彼總據三侯侯中皆廣與崇方引之證經十尺是方也躬之兩旁為個左右出為舌倍躬以為左右舌注謂上至之舌釋曰謂上個者對下個不得倍躬故謂上個也云兩旁謂之個在躬之兩旁則謂之個云左右出謂之舌謂躬外兩相各出一丈若人舒舌故下云下舌半上舌據出者而言也箭籌八十謂十耦握膚扶皆四寸箭籌八十注箭篠至從賔釋曰云箭篠也者謂以箭為籌射之耦隨賔多少今言八十舉成數以十耦為文但一者數之始十者數之終以十耦為成數也長尺有握握素釋曰長尺復云有握則握在一尺之外則此籌尺四寸矣云刋本作膚者公羊𫝊僖三十一年云觸右而出膚寸而合不崇朝而遍雨乎天下者唯泰山耳何休云側手為膚又投壺云室中五扶注云鋪四指曰扶一指案寸皆謂布四指一指一寸四指則四寸引之者證握膚為一謂刊四寸也國中是燕射以翿旌獲尚文君國中射則皮樹中以翿旌獲云云注國中城中燕射知城中是燕射者以其下有賔射大射不在國故國中是燕射以其燕在寢故也云以翿旌獲尚文德也者以其燕主歡心故旌從不命之士亦取尚文德之義必知取尚文德者以其以文德者舞文舞羽舞也於郊謂天子小學諸侯大學知於郊謂大射也者案大射云公入鷔從外來入此既言於郊故知大射在郊也云大射於大學者據諸侯而言也天子大射在虞庠小學以其天子大學在國中小學在郊諸侯不得立大學在國立大學在郊故鄭引王制小學在公宫之左大學在郊是殷法諸侯用焉故引為證必知諸侯立大學在郊者見詩魯頌有泮宫禮記云故魯人將有事於上帝必先有事於頖宫鄭云頖宫郊之學也則詩泮宫此郊學是也云閭獸名如驢一角或曰如驢岐蹄周書曰北唐以閭者岐蹄已上山海經文周書見於國語也射於境與鄰國君射即賔射於竟則虎中龍旜釋曰與鄰國君射則賔射也以其君有送賔之事因送則射云尚文章也者亦若翿旌也云通帛為旜司常文君燕射在國賔射在朝國其餘否唯君有射於國中其餘否注臣不習武事於君側釋曰天子諸侯皆燕射在國又天子賔射在朝亦在國大夫士燕射賔射不在國大夫又得行大射雖無郊學亦不得在國是以孔子為鄉射射於矍相之圃是其一隅若然此鄉射亦不在國中亦宜在國外故記人於此見之也大夫與士射袒纁𥜗君前肉袒君在大夫射則肉袒注不袒纁𥜗厭於君也釋曰上云大夫與士射袒纁𥜗今與君射為厭與士同故肉袒也矢皆有題識如肅慎氏銘其括司馬袒決執弓升命取矢如初獲者許諾以旌負侯如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉注兼束大夫矢優之是以不祫也束于握上則兼取之順羽便也握謂中央也不束主人矢不可以殊於賔也言大夫之矢則矢有題識也肅慎氏貢楛矢銘其括儀禮要義卷十三
