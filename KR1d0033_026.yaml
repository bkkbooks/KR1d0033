body:
  text: 儀禮要義卷二十六上宋魏了翁撰公食大夫二拜賜于朝謂大門外不入明日賓朝服拜賜于朝拜食與侑幣皆再拜稽首訝聽之釋曰自此盡訝聽之論賓拜謝主君之事云朝謂大門外者以其經云拜賜于朝無賓入之文又聘禮以柩造朝亦無喪入之文皆言朝故云朝謂大門外也若然案閔二年左氏𫝊云季友将生使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔注兩社周社亳社之間朝廷執政所在但諸侯左宗廟右社稷在大門之内則諸侯外朝不在大門内者但外朝在大門外兩社之間遥繫外朝而言執政所在又此食禮拜侑幣聘禮歸饔餼直言拜饔與餼不拜束帛者彼使人致之故不拜此食禮君親賜故拜之此子男使下大夫小聘得有士訝注受其言云云云此下大夫有士訝者此篇是子男使下大夫小聘又案周禮掌訝大夫有士訝記公食上大夫異於下大夫之數上大夫八豆八簋六鉶九爼魚腊皆二爼注記公食云云釋曰云豆加葵菹蝸醢者案周禮醢人朝事之豆云韭菹醓醢昌本麋臡菁菹鹿臡茆菹麋臡案上文下大夫六豆用鹿臡以下仍有茆菹麋臡在今上大夫八豆不取茆菹麋臡而取饋食之豆葵菹蝸醢者鄭以特牲少牢參之彼二篇俱以饋食為始皆用周禮饋食之豆特牲兩豆用饋食葵菹蝸醢少牢四豆二豆與特牲同兩豆用朝事之豆韭菹醓醢注云韭菹醓醢朝事之豆也而饋食用之豊大夫禮以此觀之故此公食大夫兼用饋食之豆亦是豊大夫禮也云爼加鮮魚鮮腊者上文下大夫七爼牛羊豕魚腊腸胃與膚此云九爼明加鮮魚鮮腊云無特者陳饌要方上七爼者東西兩行為六爼一爼在特于爼東此九爼為三行故無特雖無特膚亦為下公侯伯之大夫與子男之卿同再命魚腸胃倫膚若九若十有一下大夫則若七若九釋曰云此以命數為差也者案周禮典命公侯伯之卿三命大夫再命士一命子男之卿再命大夫一命士不命則諸侯之臣分為三等三命再命一命不命與一命同此經魚腸胃倫膚亦分為三等有十一有九有七則十一當三命九當再命七當一命若然惟有上下二文者以公侯伯之大夫與子男之卿同再命卿爵尊為上大夫爵卑為下則上言若九者子男之卿也下言若九者公侯伯之大夫也故鄭云卿則曰上大夫則曰下云大國之孤視子男者欲見此經唯見三命以下案周禮典命大國之孤四命又大行人云大國之孤執皮帛以繼子男又云其他皆視小國之君若然孤與子男同十三侯伯十五上公十七差次可知主君有故不親食使大夫致禮賓舘若不親食釋曰自此盡聽命論主君不親食使大夫致禮於賓館之事疾病之外别云他故者君有死喪之事故聘禮云主人畢歸禮賓唯饔餼之受謂畢致饗食但賓不受之胾炙在牲未殺故以生魚釋庶羞庶羞陳于碑内釋曰云生魚者上文魚膾是魚之中膾者皆是生魚也案鄭注周禮云燕人膾魚方寸切其腴以㗖所貴是也此則全生不膾何者本膾在豆與胾炙俱設今胾炙在牲未殺膾全不破可知若庶羞之内衆羞俱有鄭獨云生魚者以其胾炙在牲不殺于此無矣雖有乾腊雉兎之等以生魚為主庭實陳於碑外主庭與賓館内外異庭實陳于碑外釋曰執乗皮者不參分庭一在南者以言歸宜近内者庭實正法皆參分庭一在南而陳之故昬禮記云納徵執皮者參分庭一在南今云碑外繼碑而言近北矣彼參分庭一在南陳之者謂在主人之庭參分庭陳之擬與賓向外故近南此陳於客館擬與賓入内故鄭云以言歸故在内也賓皮弁受饔今朝服受使食禮輕賓朝服以受如受饔禮注朝服食禮輕也釋曰云朝服食禮輕者以其歸饔餼時卿韋弁賓皮弁受此食禮賓朝服受不皮弁大夫相食親戒速君不親大夫相食親戒速釋曰自此盡大夫之禮論主國大夫食賓之禮别于主君之事大夫親戒速决君不親戒速此則異于君也以其下諸文皆異故云記異於君者也云先就告之歸具既具復自召之者以其戒具兩有皆親為之故為此解與鄉飲酒鄉射同故彼二文皆云戒賓既歸布筵設尊乃親速賓臣於君稽首敵而稽首食禮相敬受侑幣再拜稽首主人送幣亦然注敵也釋曰案郊特牲云大夫之臣不稽首非尊家臣以辟君也又案左氏傳哀十七年公㑹齊侯盟于蒙孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首若然臣於君乃稽首平敵相於當頓首今言敵而稽首者以食禮相尊敬雖敵亦稽首與臣拜同自戒速迎受之等外其豆數等同公其他皆如公食大夫之禮釋曰云其他謂豆數爼體陳設皆不異上陳但禮異者謂親戒速君則不親迎賓公不出此大夫出大門公受醤湆幣不降此大夫則降也公食大夫降食於階下此言西序端上公食卷加席公不辭此則辭之皆是異也祭七日戒三日宿大射三日一日則當日記不宿戒釋曰祭祀散齊七日為戒致齊三日為宿此則與祭祀異此不宿戒者謂不為三日之戒又不為一日之宿故鄭云此所以不宿戒者謂前期三日之戒申戒為宿謂前期一日者若然必知三日之戒一日之宿者大射前期三日宰夫戒宰及司馬又少牢辟人君有前期一日之宿此雖人君禮以食禮輕故知有三日之戒一日之宿既無前日之事宜與鄉飲酒鄉射禮同當日為之故皆不言日數故下注云食賓之朝宿興戒之賓則從戒而來不復召是也禮賓時親授几不授几釋曰决禮賓時公親授几也注異於禮也食燕禮少牢亨在門外特牲鄉飲門内亨于門外東方釋曰案上經甸人亨人之等亨人是士官不得言大夫之事言大夫之事者解亨在門外之禮也燕禮注云亨於門外臣所掌也言臣亦是大夫事少牢廩爨饔爨皆在門外亦大夫事特牲云主婦視饍爨于西堂下者以其無廩人主之故在内若然鄉飲酒雖是大夫之事以其取祖陽氣之始故亦於門内燕禮司宫注小宰此注太宰之屬司宫具几與蒲筵常緇布純加萑席尋𤣥帛純釋曰云司宫太宰之屬掌宫廟者案燕禮云司宫尊于東楹之西注司宫天子曰小宰聽酒人之成要者也注雖不同其義一也但燕禮司宫云設尊故以小宰解之此司宫設几席故以太宰之屬解之案太宰之下有宫人掌宫中除汙穢之事即此司宫彼不言設几席者以天子具官别有司几筵又有小宰諸侯兼官故司宫兼司几筵及小宰丈六尺曰常半常曰尋考工約文經文同前注丈六尺云云純縁也筵者以有左右饌釋曰云丈六尺曰常半常曰尋者此皆無正文案周禮考工記云車有六等之數云軫崇四尺謂之一等又云戈長六尺六寸既建而迆之崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇于人四尺謂之四等車㦸常崇于殳四尺謂之五等酋矛常有四尺崇于㦸四尺謂之六等自軫至矛皆以四尺為差以是約之即知常是丈六尺尋是八尺也天子諸侯東西房大夫士直東房宰夫筵出自東房釋曰上云司宫具几筵具之在房宰夫敷之而已天子諸侯左右房以其言東房對西房若大夫士直有東房而已賓車不入大門偏駕不入王門廣敬賓之乗車在大門外西方北面立注賓車不入門云云釋曰云賓車不入門廣敬也者曲禮云客車不入大門與此同覲禮云偏駕不入王門偏駕謂同姓金路之等乗墨車以朝墨車亦云不入大門與此亦同云凡賓即朝中道而往者内則云男子由右女子由左車從中央故賓乗車中道云而後車還立于西方者案少儀云僕於君子始乗則式君子下行然後還立注云還車而立以俟其去是還立于西方鄉外云賓及位而止北面者案玉藻云賓立不當門彼亦謂聘使也云卿大夫之位當車前者案大行人云上公立當軹諸侯伯立當前疾子男立當衡又云大國之孤朝位當車前者則卿大夫立亦與孤同一節兼云大夫者小聘曰問使下大夫立與孤卿同當車前故連言也簋先設卻㑹簠将食乃設設亦去幂簠有盖鼏釋曰簠簋相将簋既有㑹明簠亦有㑹可知但黍稷先設故卻㑹於敦南簠盛稻粱将食乃設故鄭云去㑹于房盖以鼏鼏巾也至于陳設幂亦去之經云有盖鼏者據出房未設而言儀禮要義卷二十六上欽定四庫全書儀禮要義卷二十六下宋魏了翁撰覲禮一朝位於内朝而序進覲位廟門外序入覲禮第十鄭目録云覲見也諸侯秋見天子之禮云云釋曰鄭云春見曰朝等大宗伯文云朝宗禮傋覲遇禮省者案曲禮下云天子當扆而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝鄭注諸侯春見曰朝受摰於朝受享於廟生氣文也秋見曰覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於扆宁而受焉夏宗依春冬遇依秋春秋時齊侯唁魯昭公以遇禮相見取易略也覲禮今有朝宗遇禮今亡據此彼而言是朝宗禮備覲遇禮省可知鄭云覲遇禮省享獻不見案下文有享鄭又云是以享獻不見焉者享謂朝覲而行三享獻謂二享後行私覿私覿後即有私獻獻其珍異之物故聘禮記云既覿賓若私獻奉獻将命注云時有珍異之物或賓奉之所以自序尊敬也猶以君命致之臣聘猶有私獻况諸侯朝覲有私獻可知是以周禮大宰云大朝覲㑹同賛玉幣玉獻注云幣諸侯享幣玉獻獻國珍異亦執玉以致之大朝覲㑹同既有私獻則四時常朝有私獻可知案下文有享亦當有獻而云享獻不見者案周禮大行人上公冕服九章介九人賓主之間九十步廟中将幣三享侯伯子男亦云鄭云朝先享不言朝者朝正禮不嫌有等彼據春夏朝宗而言不見秋冬者以四時相對朝宗禮備故見之覲遇禮省故略而不言此下文見享者不對春夏故言之鄭云是以享獻不見者據周禮大行人而説也必知鄭據大行人者以其引周禮四時朝見即云是以享獻不見明鄭據周禮大行人而言也有人解享字上讀以獻不見為義者苟就此文有享無獻不辭之甚也侯氏至近郊王使人皮弁用璧勞覲禮至于郊王使人皮弁用璧勞侯氏亦皮弁迎于帷門之外再拜釋曰自此盡乃出論侯氏至近郊天子使使者勞侯氏之事云郊謂近郊者案聘禮云至於近郊君使卿勞故知此郊者亦近郊也知近郊去王城五十里者成周與王城相去五十里而君陳序云分正東郊成周鄭云今河南洛陽相去則然是近郊五十里也引小行人職者約近郊勞是大行人以其尊者宜逸小行人既勞于畿明近郊使大行人也案大行人上公三勞侯伯再勞子男一勞此雖不辨勞數案小行人云凡諸侯入王則逆勞于畿不辨尊卑則五等同有畿勞其子男唯有此一勞而已侯伯又加逺郊勞上公又加近郊勞則此云近郊據上公而言若然聘禮使臣聘而云近郊勞者臣禮異于君禮君禮宜先逺臣禮宜先近故也若然書傳略説云天子之子十八曰孟侯者於四方諸侯來朝迎於郊孝經注亦云天子使世子郊迎者皆異代法非周禮也王后有勞諸侯主國夫人有勞聘客之禮案玉人職云案十有二寸棗栗十有二列諸侯純九大夫純五夫人以勞諸侯注云夫人謂王后勞諸侯皆九勞大夫皆五此文不見者以其聘禮於聘客主國夫人尚有勞以二竹簠方明后亦有略言王勞不言后文不具也王在朝服皮弁入廟乃禆冕王使人皮弁云云侯氏亦皮弁云云云皮弁者天子之朝朝服者司服云眡朝則皮弁故知在朝服皮弁至入廟乃禆冕也云璧無束帛者天子之玉尊者此對諸侯玉卑故聘禮云束帛加璧是諸侯臣所執小行人合六幣云璧以帛琮以錦琥以繡璜以黼是諸侯所執以致享皆有束帛配之諸侯玉卑故也此乃行勞所用以享禮況之耳不言諸侯言侯氏不凡之侯氏亦皮弁云云云不言諸侯言侯氏者明國殊舎異禮不凡之也而所勞之處或非一國舎處不同故不摠言郊舎狹寡為帷宫以受勞迎于帷門之外使者不答拜至侯氏升云云注升者升壇釋曰云郊舎狹寡為帷宫以受勞者周禮十里有廬三十里有宿五十里有市市有郊館郊關之所各自有舎或來者多館是狹寡故不在館舎以帷為宫以受勞禮也云掌舎職曰為帷宫設旌門者謂為帷宫則設旌旗以表四門彼天子所舎平地之事引之者證諸侯行亦有帷宫設旌為門之事也案聘禮使卿勞賓受於門内司儀諸侯之臣相為國客亦是受勞於館不為帷宫者彼臣禮卿行旅從徒衆少故在館此諸侯禮君行師從徒衆多故於帷宫襄二十八年左氏傳云子産相鄭伯以如楚舎不為壇注云至敵國郊除地封土為壇以受郊勞又外僕言曰先大夫相先君適四國未甞不為壇今子草舎無乃不可乎子産曰大適小則為壇小適大苟舎而已焉用壇彼亦是諸侯相朝當為壇以帷為宫受勞之事也使者不拜送玉凡奉命使皆不拜送使者左還而立侯氏還璧釋曰直云使者左還不云拜送玉者凡奉命使皆不拜送若卿歸饔餼不拜送幣亦斯類也若身自致者乃拜送下文儐使者及聘禮私覿私面皆拜送幣是也云左還還南面示將去也者以其東面致命而左還明左還者南面也未降而南面示将去故也云立者見侯氏将有事於己俟之者經云而立即云侯氏還璧故知立者見侯氏将有還玉之事於己故俟之不降圭璋還之璧琮加束帛受而報之侯氏還璧使者受侯氏再拜稽首使者乃出釋曰云還玉重禮者案聘義圭璋還之璧琮加束帛報之所以輕財重禮彼以璧琮不還則為輕財者以其璧琮加束帛故為輕財不還此以天子之璧不加束帛尊之與圭璋同故亦還之為重禮也賓在館為主人故侯氏先升使者後侯氏授几使者不坐而設几示優厚侯氏乃止使者使者乃入侯氏與之讓升侯氏先升授几侯氏拜送几使者設几荅拜釋曰自此盡遂從之論侯氏儐使者遂從入朝之事云侯氏先升賓禮統焉者行賓禮是賓客之禮是以賓在館為主人主人先升使者為賓賓後升故云禮統焉謂賓統有此堂也云几者安賓所以崇優厚者案大宰云賛玉几注云立而設几優尊也此使者亦不坐而設几故云所以優厚也聘禮卿勞受儐不設几者諸侯之卿卑故不與此同也云上介出止使者則已布席者經不云上介止使者鄭云上介出止使者案至館皆不敢當皆使上介出請事又見此經云使者乃入始云侯氏與之讓升是侯氏不出故知使上介止使者也云則已布席者以其素不云布席而云設几几不可設於地明有席席之所設唯在此時案聘禮受聘云几筵既設是几筵相将侯氏儐使者賓主拜各於其階侯氏用束帛乗馬儐使者使者再拜受侯氏再拜送幣釋曰云儐使者所以致尊敬也者案聘禮使卿用束帛勞賓賓不還束帛賓儐卿以束錦此使者以玉勞侯氏侯氏還玉仍亦儐使者是致尊敬天子之使故也知拜各於其階者此賓與使行敵禮者鄉飲酒鄉射賓主拜各於其階也侯氏陳四馬與使者使者執左驂以出釋曰知左驂設在西者陳四馬與人以西為上案聘禮禮賓時賓執左馬以出此亦以左驂出故知左驂設在西也又知其餘三馬侯氏之士遂以出授使者之從者于外者亦案聘禮禮賓執左馬以出記云主人之庭實測主人遂以出賓之士訝受之此侯氏在館如主人明主馬亦侯氏之士以出授使者從者可知云從之者遂隨使者以至朝者亦如聘禮云下大夫勞賓使者遂以賓入至於朝天子賜侯氏舎猶聘禮使卿天子賜舎釋曰自此盡乗馬論賜侯氏舎館侯氏儐使之事云賜舎猶致館者猶聘禮賓至于朝君使卿致館此不言致館言賜舎者天子尊極故言賜舎也云所使者司空與者聘禮使卿致館此亦宜使卿知是司空非卿者周禮以天地春夏秋冬六卿無致館之事司空主營城郭宫室館亦宫室之事故知所使者司空也但司空亡無正文故云與以疑之侯氏以束帛乗馬儐使者尊王命曰伯父女順命于王所賜伯父舎侯氏再拜稽首儐之束帛乗馬釋曰云王使人以命致館無禮猶儐之者尊王使也者决聘禮卿無禮致館賓無束帛儐卿此王使亦無禮致館其賓猶儐使者用束帛乗馬故云尊王使天子使大夫戒侯氏覲日天子使大夫戒曰某日伯父帥乃初事侯氏再拜稽首釋曰自此盡再拜稽首論天子使大夫戒侯氏期日使行覲禮之事知大夫是卿為訝者以其周禮秋官掌訝職云諸侯有卿訝故知大夫即卿為訝者云其為告使順循其事也初猶故者以其四時朝覲自是尋常故使恒循故事之常也前朝一日諸侯各遣上介受次於朝諸侯前朝皆受舎于朝同姓西面北上異姓東面北上釋曰此一經論前朝一日諸侯各遣上介受次於朝之事云言諸侯者明來朝者衆矣若其行禮自有前後故鄭云顧其入覲不得並耳云受舎於朝受次于文王廟門之外者以其春夏受贄於朝無迎法受享於廟有迎禮秋冬受贅受享皆在廟並無迎法是以大門外無位既受覲於廟故在大門外諸侯待朝聘之賓皆在大祖廟受次知在文王廟門外者案聘禮云不腆先君之祧既拚以俟則諸侯待朝聘之賓皆在大祖之廟以其諸侯者無二祧遷主所藏皆在始祖之廟故以始祖為祧案天子待覲遇亦當在祧祭法云天子七廟有二祧又案周禮守祧職云掌守先王先公之廟祧鄭注遷主所藏曰祧穆之遷主藏於文王廟昭之遷主藏於武王廟今不在武王廟而在文王廟者父尊而子卑故知在文王廟也若然先公木主藏於后稷廟受覲遇不在后稷廟者后稷生非王春夏受享迎賓有外次在大門外云言舎者尊舎也者此賓以帷為次非屋舎尊天子之次故以屋舎言之是尊舎也者天子春夏受享諸侯相朝聘迎賓客者皆有外次即聘禮記宗人授次是也有外次於大門外者則無廟門外之内次天子覲遇在廟者有廟門外之内次無大門外之外次此文是也云天子使掌次為之者案周禮掌次云掌次舎之法以待張事故知使掌次為之諸侯兼官無掌次使館人為之故聘禮云館人布幕于寝門外鄭注云館人掌次舎帷幕者諸侯受舎于朝置旗于宫皆上介云諸侯上介先朝受焉者知使上介者案下文諸侯覲於天子為宫方三百步上介皆奉其君之旗置于宫明知此亦使上介也同姓異姓皆北面惟廟門外異面云分别同姓異姓受之将有先後者案此經同姓西面異姓東面案下曲禮云天子當依而立諸侯北面而見天子曰覲彼此皆是覲禮彼諸侯皆北面不辨同姓異姓與此不同者此謂廟門外為位時彼謂入見天子時故鄭注云覲者謂於廟門外而序入入謂北面見天子時引春秋者案隠十一年經書滕侯薛侯來朝左傳曰爭長薛侯曰我先封滕侯曰我周之卜正也薛庶姓也我不可以後之公使羽父請於薛侯諸侯将覲釋幣于禰謂告行主侯氏禆冕釋幣于禰釋曰此經明諸侯之在館内将覲於王先釋幣告於行主之禮知将覲質明時者案聘禮賓厥明釋幣于禰故知此亦質明時也云禆之為言埤者讀從詩政事一埤益我取禆陪之義云天子六服大裘為上其餘為禆者天子吉服有九而言六服者據六冕而言以大裘為上無埤義衮冕以下皆為禆故云其餘為禆云以事尊卑服之者即司服所云王祀昊天上帝則大裘而冕祀五帝亦如之祀先王則衮冕以下至羣小祀則𤣥冕舉天子而言故云以事尊卑服之云而諸侯亦服焉者亦據司服而言諸侯唯不得有大裘上公則衮冕以下故鄭云此差司服所掌也上公衮無升龍天子升降俱有云上公衮無升龍者案白虎通引禮記曰天子乗龍載大旗象日月升龍傳曰天子升龍諸侯降龍以此言之上得兼下下不得僣上則天子升降俱有諸侯直有降龍諸侯而用禆冕告禰以将入天子廟案玉藻諸侯𤣥冕以祭不得服衮冕以下是以鄭注司服云諸侯自於其家則降若然諸侯自家祭降魯與二王之後皆不得用衮冕鷩冕毳冕則此等及孤卿大夫絺冕𤣥冕者是入君廟及入天子之廟故服也今云諸侯告禰用禆冕者将入天子之廟故服以告禰謂若曽子問云諸侯禆冕以朝鄭注云為将廟受亦斯之類也天子廵守以遷廟主行諸侯亦然云禰謂行主遷主矣者案禮記曽子問云師行必以遷廟主行乎孔子曰天子廵守以遷廟主行載于齊車言必有尊也彼雖據天子其諸侯行亦然以其皆有遷廟木主若然大夫無木主聘禮賓釋幣于禰者大夫雖無木主以幣帛主其神亦為行主也而云禰親之者以其在外唯有遷主可事故不言遷主而云禰也云其釋幣如聘大夫将受命釋幣于禰之禮者案聘禮将行釋幣于禰此禰無文故約與之同乃受命即出行故云将受命釋幣于禰皆是告将行無祭祀知既則祝藏其幣歸乃埋之於祧西階之東者此無正文案聘禮祝告祝又入取幣降卷幣實於笲埋於西階東此亦與彼同云祧者諸侯遷主藏於始祖之廟諸侯既以始祖之廟為祧遷主歸還入祧廟故知此幣埋於祧西階之東也諸侯偏駕不入王門乗大夫墨車以朝乗墨車載龍旂弧韣乃朝以瑞玉有繅釋曰自此盡乃出論諸侯發館至天子廟門之外以次行覲禮之事云墨車大夫制也者案周禮巾車職云孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車庶人乗役車故知墨車大夫制也必言墨車大夫制者對玉路金路象路之等天子諸侯之制也云乗之者入天子之國車服不可盡同者巾車云同姓金路異姓象路四衛革路並得與天子同據在本國所乗下記云偏駕不入王門偏駕金路象路等是也既不入王門舎於客館乗此墨車以朝也龍旂弧韣瑞玉繅藉之制云交龍為旂諸侯之所建者司常職文也云弧所以張縿之弓也者爾雅説旌旗正幅為縿故以此弧弓張縿之兩幅故云張縿之弓也云弓衣曰韣者案月令云瑞玉謂公桓圭之等皆大宗伯典瑞職文后云繅所以藉玉至於六色其義疏己見於聘禮記天子設斧依於户牖間左右玉几天子設斧依於户牖之間左右几釋曰云依如今綈素屏風也者案爾雅牖户之間謂之扆以屏風為斧文置於依也孔安國顧命傳云扆屏風畫為斧文置户牖間是也言綈素者綈赤也素白也漢時屏風以綈素為之象古者白黒斧文云有繡斧文所以示威也云斧謂之黼者據繡次言之白與黒謂之黼即為此黼字也據文體形質言之刃白而銎黒則為此斧字故二字不同也云几玉几也者案周禮司几筵云左右玉几故知此几是玉几也注左右有几優至尊也亦與此同衮衣禆之上衣繢裳繡法隂陽天子衮冕負斧依釋曰云負斧依者負謂背之南面也云衮衣者禆之上也者但禆衣者自衮冕至𤣥冕五者皆禆衣故云禆之上也上文云禆衣者摠五等諸侯指其衣有三等不得定其衣號故摠言禆衣此據天子一身故指其衣體言衮冕云繢之繡之為九章者衣繢而裳繡衣在上為陽陽主輕浮故對方為繢次裳在下為隂隂主沈深故刺之為繡次是以尚書衣言作繢裳言紩天子在朝在廟皆南鄉立云南鄉而立者此文及司几筵雖不云立案下曲禮云天子當宁而立又云當扆而立在朝在廟皆云立故知此南面而立以俟諸侯之見也嗇夫盖司空之屬為未擯承命侯氏擯介當在廟門外有末擯上擯嗇夫承命告于天子釋曰云嗇夫盖司空之屬也者無正文知司空屬者案五官之内無嗇夫之名故知是司空之屬但司空職亡故言盖以疑之云末擯承命於侯氏下介傳而上上擯以告於天子者案周禮司儀職兩諸侯相朝皆為交擯則此諸侯見天子交擯可知此所陳擯介當在廟之外門東陳擯從北鄉南門西陳介從南鄉北各自為上下此經先云嗇夫承命告于天子則命先從侯氏出下文天子得命呼之而入命又從天子下至侯氏即令入故下注云君乃許入若然此覲遇之禮略唯有此一辭而已無三辭之事司儀云交擯三辭者據諸侯自相見于大門外法其天子春夏受享於廟見於大門外亦可交擯三辭矣云天子見公擯者五人以下並大行人文云皆宗伯為上擯者案大宗伯職云朝覲㑹同則為上相鄭注云相詔王禮也出接賓曰擯入詔禮曰相若四時常朝則小行人為承擯覲遇雖無迎法饗與春夏同有送逆天子曰非他伯父實來予一人嘉之伯父其入予一人将受之釋曰此經直云伯父其入不云迎之禮記郊特牲云覲禮天子不下堂而見諸侯故無迎法若然案夏官齊僕云掌馭金路以賓朝覲宗遇饗食皆乗金路其法儀各以其等為車送逆之節者覲遇雖無迎法至於饗即與春夏同故連言之卑者見尊奠摯而不授侯氏入門右坐奠圭再拜稽首釋曰云卑者見尊奠摯而不授者案士昬禮云壻執鴈升奠鴈又云若不親迎則婦入三月然後壻見主人出門壻入門奠摰再拜出鄭注云奠摰者壻有子道不敢授也又士相見凡臣見於君奠摰再拜與此奠圭皆是卑者不敢授而奠之擯者延之延進也謂從後詔禮侯氏再拜稽首擯者延之曰升升成拜乃出釋曰云從後詔禮曰延延進也者以其賓升堂擯者不升若特牲少牢祝延尸使升尸升祝從升與此文同皆是從後詔禮之事儀禮要義卷二十六下
