body:
  text: 儀禮要義卷三十四宋魏了翁撰䘮服經傳七朋友無親皆在他邦則袒免朋友皆在他邦袒免歸則已注謂服無親者當為之主每至袒時則袒袒則去冠代之以免舊説以為免象冠廣一寸已猶止也歸有主則止也主若㓜小則未止小記曰大功者主人之䘮有三年者則必為之再祭朋友虞祔而已釋曰謂同門曰朋同志曰友或共遊學皆在他國而死者每至可袒之節則為之袒而免與宗族五世袒免同云歸則已者謂在他國袒免為死者無主歸至家自有主則止不為袒免也鄭云謂服無親者當為之主者以其有親入五服今言朋友故知是義合之輕無親者也云歸有主則止也主若㓜少則未止者本以在外為無主與之為主今至家主若㓜不能為主則朋友猶為之主未止引小記者證主㓜少不能主䘮朋友為主之義以雖有子是三年之人小不能為主大功為主者為之再祭謂練祥朋友輕為之虞祔而已以其又無大功已下之親此朋友自外來及在家朋友皆得為主虞祔乃去彼鄭注以義推之又云小功緦麻為之練祭可也是親䟽差降之法也朋友在國相為服緦絰帶朋友麻釋曰云朋友麻者上文據在他國加袒免今此在國相為弔服麻絰帶而已注云朋友雖無親有同道之恩相為服緦之絰帶者案禮記禮運云人其父生而師教之朋友成之又學記云獨學而無友則孤陋而寡聞論語云以文㑹友以友輔仁以此而言人須朋友而成也故云朋友雖無親有同道之恩故為之服知緦之絰帶者以其緦是五服之輕為朋友之絰帶約與之等故云緦之絰帶也云檀弓曰羣居則絰出則否者彼注羣謂七十二弟子相為朋友彼亦是朋友相為之法云居則絰絰謂在家居止則為之絰出家行道則否引之者證此亦然也彼又云孔子之䘮二三子皆絰而出是為師出行亦絰也朋友麻謂弔服弁絰如爵弁而素加環絰云其服弔服也者以其不在五服五服之外唯有弔服故即引周禮弔服之等也周禮者司服職文彼云凡弔事弁絰服鄭注亦云弁絰者如爵弁而素加環絰也言爵弁者制如冕以木為中幹廣八寸長尺六寸前低一寸二分以三升布上𤣥下纁爵弁之體廣長亦然亦以三升布但染作爵頭色赤多黑少之色置之於版上今則以素為之又加環絰者一股麻為骨又以一股麻為䋲纒之如環然謂之環絰加於素弁之上彼注云絰大如緦之絰是弔服之絰但此文云朋友麻鄭引周禮王弔諸臣之絰及三衰證此者以其王於諸臣諸侯於諸臣皆有朋友之義故泰誓武王謂諸侯云我友邦冡君是謂諸侯為友洛誥周公謂成王云孺子其朋是王以諸臣為朋諸侯於臣亦有朋友之義可知故引周禮弁絰與三衰證此朋友麻也若然弁絰唯一衰則有三則一弁冠三衰也錫衰緦衰疑衰皆弔服又居出有異云其服有三錫衰也緦衰也疑衰也者案彼云王為三公六卿錫衰為諸侯緦衰為大夫士疑衰鄭司農云錫麻之滑易者也十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升𤣥謂無事其縷哀在内無事其布哀在外疑之言擬也擬於吉者也云諸侯及卿大夫亦以錫衰為弔服當事乃弁絰否則皮弁辟天子也者案禮記服問云公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻往則服之出則否注云出謂以他事不至䘮所是諸侯及卿大夫亦以錫衰為弔服也天子常弁絰諸侯卿大夫當事大歛小歛及殯時乃弁絰非此時則皮弁是辟天子也云士以緦衰為䘮服者士卑無降服是以緦為䘮服既以緦為䘮服不得復將緦為弔服故句下取疑衰為弔服謂士弔服布上素下及素冠加朝服皆非侯卿大夫皮弁辟天子士素裳辟諸侯舊説者以士弔服無文故舊說云以為士弔服布上素下云或曰素委貎冠加朝服者前有此二種解者故鄭引論語破之云論語曰緇衣羔裘言此者欲解緇衣羔裘與下羔裘𤣥冠為一物並是朝服是以云又曰羔裘𤣥冠不以弔何朝服之有乎此破舊説以言朝服不合首加素委貎又布上素下近是天子之朝服又不言首所加故非之也云然則二者皆有似也者以其未小歛已前容有著朝服弔法則子游曽子弔是也但非正弔法之服又布上素下近士之弔服素下故云二者皆有似也云此實疑衰也者總破二者也云弁絰皮弁之時則如卿大夫然者以其三衰共有弁絰當事著皮弁亦同故知二者如卿大夫然也云又改其裳以素辟諸侯也者諸侯及卿大夫否則皮弁辟天子此諸侯之士不著疑裳而用素又辟諸侯也云朋友之相為服即士弔服疑衰素裳者是鄭正解士之弔服云庶人不爵弁者則其冠素委貎不言其服則白布深衣以白布深衣庶人之常服又尊卑始死未成服已前服之故庶人得為弔服也君弔臣服服問與文王世子注異案司服諸侯如王之服言之鄭則諸侯皆如王亦有三衰服問直云君弔用錫衰未辨緦衰疑衰所施用案文王世子注云君雖不服臣卿大夫死則皮弁錫衰以居往弔當事則弁絰於士蓋疑衰同姓則緦衰若然案士䘮禮君若有賜焉則視歛注云賜恩惠也歛大歛君視大歛皮弁服襲裘主人成服之後往則錫衰此注又與文王世子違者士䘮禮既言有恩惠則君與此士有師友之恩特加與卿大夫同其諸侯卿大夫則有錫衰士唯疑衰其天子卿大夫士既執贄與諸侯之臣同則弔服亦同也天子孤與卿同六命又亦名為卿諸侯孤雖四命與卿異及其聘之介數與卿降君二等等同則孤弔服皆與卿同也天子三公與王子母弟得稱諸侯其弔服亦與畿外諸侯同三衰也凡弔服直云素弁環絰不言帶或有解云有絰無帶但弔服既著衰首有絰不可著吉時之大帶吉時之大帶既有采矣麻既不加於采采可得加於凶服乎明不可也案此經注服緦之絰帶則三衰絰帶同有可知其以三衰所用皆是朋友故知凡弔皆有帯矣君於大夫士弔服亦有變除之節雜記云君於卿大夫比葬不食肉比卒哭不舉樂是知未吉則凡弔服亦當依氣節而除並與緦麻同三月除之矣為士雖比殯不舉樂其服亦當既葬除矣公士大夫之君於旁親降一等君之所為兄弟服室老降一等注公士大夫之君釋曰天子諸侯絶朞今言為兄弟服明是公士大夫之君於旁親降一等者室老家相降一等不言士士邑宰逺臣不從服若然室老似正君近臣故從君所服也庶子為後為外祖父母從母舅無服云庶子為後者為其外祖父母從母舅無服者以其與尊者為一體既不得服所出母是以母黨皆不服之不言兄弟而顯尊親之名者雷氏云為父後者服其本族若言兄弟恐本族亦無服故汎著其尊親之號以别於族人也宗子謂繼别為大宗有孤有不孤宗子孤為殤大功衰小功衰皆三月親則月算如邦人釋宗子謂繼别為大宗百世不遷收族者也云孤為殤者謂無父未冠而死者也云大功衰小功衰者以其成人齊衰故長殤中殤皆在大功衰下殤在小功衰也云皆三月者以其衰雖降月本三月法一時不可更服故還依本三月也云親則月算如邦人者上三月者是絶屬者若在五屬之内親者月數當依本親為限故云如邦人也注云言孤有不孤者鄭以記文云孤明對不孤者故曲禮注云是謂宗子不孤彼不孤對此孤也云不孤則族人不為殤服服之也者以父在猶如周之道有適子無適孫以其父在為適子則不為適孫服同於庶孫明此本無服父在亦不為之服殤可知也宗子不孤謂父廢疾子代主宗事云不孤謂父有廢疾者案䘮服小記云適婦不為舅後者則姑為之小功注云謂夫有廢疾他故若死而無子不受重者是子不孤謂父有廢疾不立其子代父主宗事云若年七十而老子代主宗事者案曲禮云七十曰老而傳注云傳家事任子孫是謂宗子不孤宗子絶屬猶齊衰三月親者可知云與宗子有期之親者成人服之齊衰期謂宗子親昆弟及伯叔昆弟之子姑姊妹在室之等皆是也自大功親已下盡小功親已上成人月數雖依本皆服齊衰者以其絶屬者猶齊衰三月明親者無問大功小功緦麻皆齊衰者也既皆齊衰故三月既葬受服乃始以大功小功齊衰也至於小功親已下殤與絶屬者同者以其成人小功五月殤即入三月是以與絶屬者同皆大功衰小功衰三月故與絶屬者同也云有緦麻之親者成人及殤皆與絶屬者同者以其絶屬者為宗子齊衰三月緦麻親亦三月墓崩改葬服緦者見柩不可無服改𦵏緦注謂墳墓以他故崩壊将亡失屍柩也言改葬者明棺物毁敗改設之如葬時也其奠如大歛從庿之庿從墓之墓禮宜同也服緦者臣為君也子為父也妻為夫也必服緦者親見屍柩不可以無服緦三月而除之童子當室緦女君有以尊降其兄弟童子唯當室緦傳曰不當室則無緦服也凡妾為私兄弟如邦人注童子未冠之稱也當室者為父後承家事者為家主與族人為禮於有親者雖恩不至不可以無服也嫌厭降之也私兄弟是其族親也然則女君有以尊降其兄弟者謂士之女為大夫妻大夫之女為諸侯夫人諸侯之女為天王后父卒昆弟之為父後者宗子亦不敢降也公為卿大夫居出皆錫衰大夫弔於命婦錫衰命婦弔於大夫亦錫衰注弔於命婦婦死也弔於大夫大夫死也小記曰諸侯弔必皮弁錫衰服問曰公為卿大夫錫衰以居出亦如之當事則弁絰大夫相為亦然為其妻往則服之出則否錫衰縷與緦同唯治布治縷異傳曰錫者何麻之有錫者也云云釋曰問者先問其名答云麻之有錫者也答以名錫之意但言以麻者以麻表布之縷也又云錫者十五升抽其半者以其縷之多少與緦同云無事其縷有事其布者事猶治也謂不治其縷治其布以哀在内故也緦則治縷不治布哀在外以其王為三公六卿重於畿外諸侯故也鄭云謂之錫者治其布使之滑易以治解事以滑易解錫謂使錫錫然滑易也云君及卿大夫弔士雖當事皮弁錫衰而已者是士輕無服弁絰之禮有事無事皆皮弁焉而已見其不足之意也若然文王世子注諸侯為異姓之士疑衰同姓之士緦衰今言士與大夫又同錫衰者此言與士䘮禮注同亦是君於此公士有師友之恩者也云士之相弔則如朋友服矣者朋友麻是朋友服也上注士弔服用疑衰素裳腰首服麻弔亦朋友服也婦人弔用錫衰首服無文注謂吉笄上文命婦弔於大夫錫衰未解首服至此乃解之者婦人弔之首服無文故特傳釋錫衰後下近婦人吉笄無首布總乃解之必知用吉笄無首素總者下文女子子為父母卒哭折吉笄之首布總此弔服用吉笄無首素總又男子冠婦人笄相對婦人䘮服又笄總相将上注男子弔用素冠故知婦人弔亦吉笄無首素總也婦人居父母舅姑䘮惡笄有首子折首女子子適人者為其父母婦為舅姑惡笄有首以髽卒哭子折笄首以笄布總釋曰此二者皆期服但婦人以飾事人是以雖居䘮内不可頓去修容故使惡笄而有首至卒哭女子子哀殺歸于夫氏故折吉笄之首而著布總也案斬衰章吉笄尺二寸斬衰以箭笄長尺檀弓齊衰笄亦云尺則齊衰已下皆與斬同一尺不可更變故折吉笄首而已其總斬衰已六升長六寸鄭注總六升象冠數則齊衰總亦象冠數正服齊衰冠八升則正齊衰總亦八升是以總長八寸笄總與斬衰長短為差但笄不可更變折其首總可更變宜從大功總十升之布總髽有笄髽免自對文髽不對笄言以髽者則髽有著笄明矣鄭言此者舊有人解䘮服小記云男子免而婦人髽免時無笄則髽亦無笄矣但免髽自相對不得以婦人與男子有笄無笄相對故鄭以經云惡笄有首以髽髽笄連言則髽有著笄明矣櫛笄象笄榛笄樿櫛象櫛之别傳曰笄有首者惡笄之有首也惡笄者櫛笄也云云釋曰案記自云惡笄之有首也即惡笄自有首明矣而傳更云笄有首重言之者但惡者直木理麤惡非木之名若然斬衰笄用箭齊衰用櫛俱是惡傳恐名通於箭故重疊言之傳以為初死惡笄有首至卒哭更著吉笄嫌其大飾乃折去首而著之也又云吉笄者象笄也者傳明吉時之笄以象骨為之據大夫士而言案弁飾天子諸侯笄皆玉也鄭云櫛笄者以櫛之木為笄者此櫛亦非木名案玉藻云沐櫛用樿櫛髪晞用象櫛鄭云樿白理木為櫛櫛即梳也以白理木為梳櫛也彼樿木與象櫛相對此櫛笄與象笄相對故鄭云櫛笄者以櫛之木為笄云或曰榛笄者案檀弓為姑用榛木為笄此亦婦人為姑與彼同但此用樿木彼用櫛木不同耳蓋二木俱用故鄭兩存之也云笄有首者若今刻鏤摘頭矣鄭時摘頭之物刻鏤為之此笄亦在頭而去首為大飾明首亦刻鏤之故舉漢法况之女子子既練而歸卒哭而歸二注異云卒哭而䘮之大事畢女子子可以歸于夫家者但以出適女子與在家婦俱著惡笄婦不言卒哭折吉笄首女子子即言折吉笄之首明女子子有所為故獨折笄首耳所為者以女子外成䘮大記云女子子既練而歸與此注違者彼小祥歸是其正法此歸者容有故許之妾為女君得與女君同妾為女君君之長子惡笄云云釋曰妾為女君之服得與女君同為長子亦三年但為情輕故與上文婦事舅姑齊衰同惡笄有首布總也五服衰皆外削幅裳内削幅凡衰外削幅裳内削幅幅三袧注削猶殺也大古冠布衣布先知為上外殺其幅以便體也後知為下内殺其幅稍有飾也後世聖人易之以此為䘮服袧者謂辟兩側空中央也祭服朝服辟積無數凡裳前三幅後四幅也釋曰自此已下盡袪尺二寸記人記衰裳之制用布多少尺寸之數也云凡者總五服而言故云凡以該之云衰外削幅者謂縫之邉幅向外裳内削幅者亦謂縫之邉幅向内云幅三袧者據裳而言為裳之法前三幅後四幅幅皆三辟攝之以其七幅布幅二尺二寸幅皆兩畔各去一寸為削幅則二七十四尺若不辟積其腰中則束身不得就故須辟積其腰中也腰中廣狹在人麤細故袧之辟攝亦不言寸數多少但幅别以三為限耳古冠衣皆白布齊則緇尚幽闇云大古冠布衣布者案禮記郊特牲云大古冠布齊則緇之鄭注云唐虞以上曰大古也是大古冠布衣布也云先知為上外殺其幅以便體也後知為下内殺其幅稍有飾也者此亦唐虞已上黄帝已下故禮運云未有麻絲衣其羽皮謂黄帝已前下文云後聖有作治其絲麻以為布帛後聖謂黄帝是黄帝始有布帛是時先知為上後知為下便體者邉幅向外於體便有飾者邉幅向内覩之善也云後世聖人易之以此為䘮服者又案郊特牲云緇布冠冠而敝之可也注此重古而冠之耳三代改制齊冠不復用也以白布冠質以為䘮冠也以此言之唐虞已下冠衣皆白布吉凶同齊則緇之鬼神尚幽闇三代改制者更制母追章甫委貎為行道朝服之冠緇布冠三代将為始冠之冠白布冠質三代為䘮冠祭服朝服辟積無數深衣實亦辟積云祭服朝服辟積無數者朝服謂諸侯與其臣以𤣥冠服為朝服天子與其臣以皮弁服為朝服祭服者六冕與爵弁為祭服不云𤣥端亦是士家祭服中兼之凡服唯深衣長衣之等六幅破為十二幅狹頭向上不須辟積其實腰間已外皆辟積無數似䘮冠三辟積吉冠辟積無數也然凡裳前三幅後四幅者前為陽後為隂故前三後四各象隂陽也唯深衣之等連衣裳十二幅以象十二月也衰一斬三緝緝裳内展緝衰外展若齊裳内衰外注齊緝也凡五服之衰一斬四緝緝裳者内展之緝衰者外展之釋曰據上齊斬五章有一斬四齊此據四齊而不言一斬者上文已論五服衰裳縫之外内斬衰裳亦在其中此據衰裳之下緝之用針功者斬衰不齊無針功故不言也言若者不定辭以其上有斬下不齊故云若也言裳内衰外者上言衰外削幅此齊還向外展之上言裳内削幅此齊還向内展之並順上外内而緝之此先言裳者凡齊據下裳而緝之裳在下故先言裳順上下也鄭云齊緝也者據上傳而言之也云凡五服之衰一斬四緝者謂齊衰至緦麻並齊齊既有針功緦之名則没去齊名亦齊可知也言展之者若今亦先展訖乃行針功者也負廣出於適寸謂負版出辟領外釋曰以一方布置於背上上畔縫著領下畔垂放之以在背上故得負名適辟領即下文適也出於辟領外旁一寸總尺八寸也負廣出於適寸適博四寸出於衰云博廣也者若言博博是寛狹之稱上下兩旁俱名為博若言廣則唯據横闊而言今此適四寸據横故博為廣見此義焉云辟領廣四寸者據項之兩相向外各廣四寸云則與闊中八寸也者謂兩身當縫中央總闊八寸一邉有四寸并辟領四寸為八寸云兩之為尺六寸也者一相闊與辟領八寸故兩之總一尺六寸云出於衰者旁出衰外者以兩旁辟領向前望衰之外也云不著寸數者可知也者以衰廣四寸辟領横廣總尺六寸除中央四寸當衰衰外兩旁各出衰六寸前衰後負左右辟領哀戚無不在衰長六寸博四寸釋曰袤長也據上下而言也綴於外衿之上故得廣長當心云前有衰後有負板者謂負廣出於適寸及衰長六寸博四寸云左右有辟領者謂左右各四寸云孝子哀戚無所不在者以衰之言摧孝子有哀摧之志負在背上者荷負其悲哀在背也云適者以哀戚之情指適縁於父母不兼念餘事是其四處皆有悲痛衣亦名衰帯謂帯衣之帯衣帯下尺釋曰謂衣腰也云衣者即衰也但衰是當心廣四寸者取其哀摧在於徧體故衣亦名為衰今此云據在上曰衣舉其實稱云帯者此謂帯衣之帯非大帯革帯者也云衣帯下尺者據上下闊一尺若横而言之不著尺寸者人有麤細取足為限也云足以掩裳上際也者若無腰則衣與裳之交際之間露見表文有腰則不露見故云掩裳上際也言上際者對兩旁有袵掩旁兩廂下際也袵掩裳際長比有司紳婦服無袵袵二尺有五寸釋曰云掩裳際也者對上腰而言此掩裳兩廂下際不合處也云二尺五寸與有司紳齊也者玉藻文案彼士已上大帯垂之皆三尺又云有司二尺有五寸謂府史紳即大帯也紳重也屈而重故曰紳此但垂之二尺五寸故云與有司紳齊也云上正一尺者取布三尺五寸廣一幅留上一尺為正正者正方不破之言也一尺之下從一畔旁入六寸乃向下邪向下一畔一尺五寸去下畔亦六寸横斷之留下一尺為正如是則用布三尺五寸得兩條袵各二尺五寸兩條共用布三尺五寸也然後兩旁皆綴於衣垂之向下掩裳際此謂男子之服婦人則無以其婦人之服連衣裳故鄭上斬章注云婦人之服如深衣則衰無帯下又無袵是也袂屬幅謂不削若射侯等削幅二寸袂屬幅注屬猶連也連幅謂不削釋曰屬幅者謂整幅二尺二寸凡用布為衣物及射侯皆去邉幅一寸為縫殺今此屬連其幅則不削去其邉幅取整幅為袂必不削幅者欲取與下文衣二尺二寸同縱横皆二尺二寸正方者也故深衣云袂中可以運肘二尺二寸亦足以運肘也袂與身參齊故此變袂言衣衣二尺有二寸釋曰云此謂袂中也上云袂據從身向袂而言衣據從上向掖下而言云言衣者明與身參齊者袂所以連衣為之衣即身也兩旁袂與中央身總三事下與畔皆等故變袂言衣欲見袂與衣齊參也故云與身參齊云二尺二寸其袖足以容中人之肱也者案深衣云袂中可以運肘鄭注云肘不能不出入彼云肘此云肱也凡手足之度鄭皆據中人為法故云中人也云衣自領已下云云者鄭欲計衣之用布多少之數自領至腰皆二尺二寸者衣身有前後今且據一相而言故云衣二尺二寸倍之為四尺四寸總前後計之故云倍之為四尺四寸也云加闕中八寸者闕中謂闕去中央安項處當縫兩相總闕去八寸若去相正去四寸若前後據長而言則一相各長八寸通前兩身四尺四寸總五尺二寸也云而又倍之者更以一相五尺二寸并計之故云又倍之云凡衣用布一丈四寸者此唯計身不計袂與袪及負衽之等者彼當丈尺寸自見又有不全幅者故皆不言也袪尺二寸謂袖口容併兩手袪尺二寸釋曰云袪袖口也則袂未接袪者也尺二寸者據複攝而言圍之則二尺四寸與深衣之袪同故云尺二寸足以容中人之併兩手也吉時拱尚左手䘮時拱尚右手者案檀弓吉時拱尚左䘮時拱尚右也以袪横既與深衣尺二寸既據横而言不言縁之深淺尺寸者同故縁口深淺亦與深衣同寸半可知衰三升三升半其冠六升受冠同七升衰三升三升有半其冠六升以其冠為受受冠七升注衰斬衰也或曰三升半者義服也其冠六升齊衰之下也斬衰正服變而受之此服也三升三升半其受冠皆同以服至尊宜少差也六升在齊衰三等之下釋曰自此至篇末皆論衰冠升數多少也以其正經言斬與齊衰及大功小功緦麻之等並不言布之升數多少故記之也云衰三升三升有半其冠六升者衰異冠同者以其三升半謂縷如三升半成布還三升故其冠同六升也云以其冠為受受冠七升者據至虞變麻服葛時更以初死之冠六升布為衰更以七升布為冠以其葬後哀殺衰冠亦隨而變輕或曰冠三升半者是義斬云或曰三升半者義服也者以其斬章有正義子為父父為長子妻為夫之等是正斬云諸侯為天子臣為君之等是義斬此三升半實是義服但無正文故引或人所解為證也上章子夏傳亦直云衰三升冠六升亦據正斬而言不言義服者欲見義服成布同三升故也云六升齊衰之下也者齊衰之降服四升正服五升義服六升以其六升是義服故云下也齊衰冠及受冠升數齊衰四升其冠七升以其冠為受受冠八升注言受以大功之上也此謂為母服也齊衰正服五升其冠八升義服六升其冠九升亦以其冠為受凡不著之者服之首主於父母此冠衰據父卒為母齊衰釋曰此據父卒為母齊衰三年而言也云言受以大功之上也者以其降服大功衰七升正服大功衰八升故云大功之上云此謂為母服也者據父卒為母而言若父在為母在正服齊衰則已解訖諸侯之大夫為天子繐衰繐衰四升有半其冠八升注此謂諸侯之大夫為天子繐衰也服在小功上者欲著其縷之精麤也升數在齊衰之中者不敢以兄弟之服服至尊也繐衰雖四升有半而縷細故冠與齊衰同釋曰云諸侯之大夫為天子繐衰也者是正經文也云服在小功之上者欲著其縷之精麤也者據升數合在杖期上以其升數雖少以縷精麤與小功同不得在杖期上故在小功之上也云升數在齊衰之中者不敢以兄弟之服服至尊也者據縷如小功小功以下乃是兄弟大功章既言受以小功衰此直記受服之差大功八升若九升小功十升若十一升注此以小功受大功之差也不言七升者主於受服欲其文相値言服降而在大功者衰七升正服裳八升其冠皆十升義服九升其冠十一升亦皆以其冠為受也斬衰受之以下大功受之以正者重者輕之輕者從禮聖人之意然也其降而在小功者衰十升正服衰十一升義服衰十二升皆以即葛及緦麻無受也此大功不言受者其章既著之小功大功俱有三等此各言二等釋曰云此以小功受大功之差也者以其小功大功俱有三等此唯各言二等故云此以小功受大功之差也以此二小功衰衰受二大功之冠為衰二大功初死冠還用二小功之衰故轉相受也云不言七升者以其七升乃是殤大功殤大功章云無受此主於受故不言受服重者輕之輕者從禮云斬衰受之以下大功受之以正者重者輕之輕者從禮聖人之意然也者聖人之意重者恐至滅性故抑之受之以輕服義服齊衰六升是也輕者從禮者正大功八升冠十升既葬衰十升受以降服小功義服大功衰九升冠十一升既葬衰十一升受以正服小功二等大功皆不受以義服小功是從禮也是聖人有此抑揚之義儀禮要義卷三十四
