body:
  text: 儀禮要義卷二十一宋魏了翁撰聘禮三束帛加璧設皮聘使為主君行享擯者出請賔裼奉束帛加璧享擯者云云庭實皮則攝之釋曰自此盡以束帛如享禮論享禮之事知皮是虎豹皮者鄭云毛在內不欲文之豫見是有文之皮郊特牲云虎豹之皮示服猛也束帛加璧往德也文無所屬則天子諸侯皆得用之此聘使為君行之故知皮是虎豹之皮也齊語云桓公知諸侯歸已令諸侯輕其幣用麋鹿皮非其正也云攝之者右手并執前足左手并執後足者下云皮右首故云右手執前兩足知入設參分庭一在南者見昏禮記納徴執皮攝之內文兼執足左首隨入西上參分庭一在南故知此亦然但此右首彼左首者昏禮象生云凡君於臣臣於君麋鹿皮可也者云凡君於臣謂使者歸若使卿贈如覿幣及食饗以侑幣酬幣庭實皆有皮故云凡也臣於君謂私覿庭實設四皮及介用儷皮此皆有麋鹿皮故亦云凡也若然大宗伯云孤執皮帛鄭云天子之孤用虎皮諸侯之孤用豹皮得用虎豹者所執以為贄與庭實不同若有言如告糴乞師則束帛如享無庭實若有言則以束帛如享禮云有言有所告請若有所問也者言有所告即告糴之類是也請乞師之類是也問即言汶陽之田之類是也鄭據傳而言有此三事皆是有言有言即記云有故一也云有言即有書致之故記云有故則束帛加書以將命也云春秋臧孫辰告糴者事在莊公二十八年也云公子遂如楚乞師者事在僖二十六年也云晉侯使韓穿來言汶陽之田事在成公八年也此三者皆見春秋經引之者證此有言以束帛加書之事也云無庭實也者以經直束帛如享禮則除束帛之外更無所有故知無庭實也國語云臧孫辰以鬯圭者是告糴之物服注云無庭實者又哀七年左傳云邾茅夷鴻以乘韋束帛自請救于吳求救非法故有乘韋為庭實也公事畢賓請私覿主人辭賓奉束錦以請覿注覿見也云云擯者入告出辭注云云釋曰自此盡從者訝受馬論賓將私覿主人不許而行禮賓之事云鄉將公事者聘享是也云是欲交其歡敬也者聘是公禮非是交歡此行私禮為交歡敬也案郊特牲云為人臣者無外交鄭注私覿是外交也者彼謂臣為君介而行私覿是外交若特行聘則得私覿非外交也故彼上經云大夫執圭而使所以申信也注云其君親來其臣不敢私見於主國君也以君命聘則有私見是也云不用羔因使而見非特來者謂因為君聘使而行私見故用束錦非特來若特來則卿用羔也若然案士相見卿初仕見己君及卿皆見以羔見他君得有羔者案尚書有三帛二生二生卿執羔大夫執鴈彼見天子法從朝君而見得有羔若諸侯相朝其臣從君亦得執羔見主君可知其為君聘則不得執羔見主君也故鄭云因使而見非特來案定公八年經書公會晉師于瓦左傳云范獻子執羔趙簡子中行文子皆執鴈亦是從君見主君法也天子孤卿大夫與諸侯之臣几筵同宰夫徹几改筵釋曰云宰夫又主酒食者也者對上宰夫設飱今又主酒食以禮賓也云賓席東上者對前為神而西上也云公食大夫禮曰蒲筵及萑席此筵上下大夫也者以公食蒲筵萑席二者是為上下大夫法又引周禮者鄭欲推出上下大夫用漆几也案司几筵云諸侯酢席莞筵紛純加繅席畫純筵國賓于牖前亦如之左彤几注云國賓諸侯來朝孤卿大夫來聘後言几者使不蒙如也朝者雕几聘者彤几但司几筵是天子之官几筵又是諸侯之法又鄭云國賓諸侯來朝孤卿大夫來聘是諸侯與朝聘天子法則孤卿大夫是諸侯之臣也以此言之則天子孤卿大夫几筵與諸侯之臣同可知若然公食大夫筵上下大夫禮同用蒲筵莞席與此席不同鄭注此國賓中卿大夫得與孤同者鄭欲廣國賓之義其實此國賓中唯有諸侯與孤無卿大夫也鄭必知卿大夫漆几者司几筵有五几從上向下序之天子玉几諸侯雕几孤彤几卿大夫漆几下有素几喪事所用差次然也無正文故云與以疑之醴自東箱來不面擸不訝授宰夫實觶以醴加柶于觶面枋云以醴自東箱來者下記云醴尊于東箱瓦泰一有豐是也云不面擸不訝授也者公西面向賓宰夫自東箱來在公傍側並授與公是以下云公側受醴不訝授故不面擸也此篇賓皆再拜稽首惟受醴一拜公側受醴注將以飲賔賔不降一拜進筵前受醴復位公拜送醴注一拜者醴質以少為貴賓於上下皆再拜稽首獨此一拜故鄭據大古之醴質無玄酒配之故一拜以少為貴也束帛言用尊賓公用束帛釋曰上文郊勞賓用束錦儐勞者下文歸饔餼於上介云大夫用束帛致之皆亦云用獨於此言用尊於下者儐勞者及歸饔餼皆是賓敬君之使者自尊之可知今君親用束帛禮賓故用尊于下也云亦受之于序端者上公側受几於序端則知此栗階趨君命尚疾不連步注栗階至連步釋曰凡栗階不過二等今云不連步者謂不從下向上皆連步其始升連步則有之也前公皆一拜今事畢送幣再拜云公再拜者事畢成禮也者前受几及醴公送皆一拜注云公尊也今事畢成禮不可亦自尊亢故送幣亦再拜也賓執左馬以出鄭云受尊者禮宜親賓執左馬以出釋曰案下歸饔餼於賓賓儐大夫庭實設乘馬賓用束錦乘馬大夫降執左馬以出覲禮侯氏至郊王使人用璧勞訖侯氏用束帛乘馬儐使者使者受幣降以左驂出二者皆是尊國賓故也唯上文郊勞賓儐勞執幣揖皮者皮是死物異於馬故也云效馬者并左右靮授之者曲禮云效馬效羊者右牽之效猶呈見故謂牽馬人為效馬者也云餘三馬主人牽者從出也者以是主人庭實出門乃有從者訝受馬明主人牽者從出可知諸文從者與士鄭注各異上介受賓幣從者訝受馬鄭云從者士介下記文案公食云上介受賓幣從者訝受皮鄭注從者府史之屬不為士者彼公食是子男之大夫小聘一介其餘皆府史以下故知從者是府史之屬也既夕云賵馬兩士受馬鄭云此士謂胥徒之長有勇力者受馬彼據一廟下士不應更有其屬士故以為胥徒之長言之也昏禮記云士受皮鄭注士謂若中士下士不命者以其主人為官長據上士而言之賓覿用束錦辟享幣入門右非公事賓覿奉束錦總乘馬二人贊入門右北面奠幣云云云覿用束錦辟享幣也者以上文享主君用束帛享夫人用玄纁束帛以今用束錦是辟享幣也云總者至扣馬也者賓總八轡在前牽之二人贊者各居兩馬間各用左右手手扣一匹故云在馬間扣馬也云入門而右私事自闑右者玉藻云公事自闑西鄭注云聘享也又云私事自闑東注云覿面也此行覿禮故引之凡授由右受由左今受馬由右士受馬者自前還牽者後適其右受此庭實之馬四匹在庭北面西上牽馬者亦四人各在馬西以右手執馬而立士受馬者從東方來由馬前各適牽馬者之前還繞其後適牽馬者之東馬西而受之牽馬者自前行而出之云此亦並授者不自前左由便也者鄉飲酒之等於西階之上皆授由其右受由其左今乃受馬者不自左而由其右受者使受馬者授訖右廽其身於出時為便鄭以玉錦為錦之文纎上介奉束錦士介四人皆奉玉錦束請覿釋曰自此盡舉皮以東論上介衆介行私覿之事云玉錦錦之文纎縟者也案聘義孔子論玉而云縝密以栗知也是玉有密致錦之纎縟似玉之密致者主人歸上介衆介覿幣執幣者西面北上擯者請受釋曰上文擯者執上幣注云請受請于上介也此雖衆介所請亦請上介上介尊故也云上言其次此言其位互約文也者上云擯者執上幣士執衆幣有司二人舉皮從其幣出請受是其次也此言委皮南面執幣者西面北上是其位言互者此言西面北上則上當有北面東上之文下云士介覿幣時士三人東上坐取幣立是也此宜有士執案幣立於南面之文如是者互文也言約者雖見其文文猶不備若欲備文當上取歸賓幣之文下取歸士介幣之文以理推約之乃備也若然上當言擯者執幣士四人北面東上坐取幣從有司二人坐舉皮從其幣出隨立於門中擯者出門西面于東孰南請受士執幣者進立擯南西面北上執皮者南面委皮於門中北上如是乃為文備也擯者授介幣介皆訝介禮辭聽命皆進訝受其幣連上文釋曰此言皆訝受者嫌擯者一一授之者案上受享皮及賓私覿之馬並不云皆此獨云皆者嫌擯者獨請上介請先授上介幣故言皆明不一一授同時訝受可知也享幣無門外授先後之法故不言皆庭實當使人執之今奠皮不敢授上介奉幣皮先入門左奠皮云執皮者奠皮以有不敢授之義者案享時庭實使人執之昏禮庭實亦使人執之亦皆東不奠於地以其得親授主人有司此奠之不敢授故下云坐舉皮上介衆介覿訖又納士介擯者又納士介釋曰自此盡序從之論士介行私覿之事云納者出道入也者謂若燕禮大射小臣納卿大夫出道入之也事畢衆介逆道賓而出擯者出請賓告事畢釋曰自此盡不顧論事畢送賓之事云衆介逆道賓而出也者介為首賓為尾謂進道也必知有逆出者上文聘訖云賓降介逆出又聘夫人私覿亦介逆出諸聘禮之等皆逆出公拜客趨辟上擯送賓反告及大門內公問君云云賓出公再拜送賓不顧云賓不顧據上擯送賓復回謂君云賓不顧矣故引孔子事為證若然此送賓是上擯則卿為上擯孔子為下大夫得為上擯者以孔子有德君命使攝上擯若定十年夾谷之會令孔子為相同也賓請問大夫訖即館卿大夫勞賓介賓請有事於大夫賓即館卿大夫勞賓賓不見釋曰自此盡亦如之論賓請問大夫訖即館卿大夫勞賓介之事云不言問聘聘亦問也嫌近君也者對文大聘曰聘小聘曰問總而言之問聘一也不得云問卿若言問近君矣故云有事于大夫也鄭云擯者反命因告之者但從朝以來行聘享行禮賓之事事已煩矣今日即請未可即行故云反命因告之告之使知而已是以賓至館行勞賓介及受饔餼終日有事明日乃行問卿之禮主國卿見朝君執羔見聘客用鴈大夫奠鴈再拜上介受云周禮者案周禮秋官掌客云凡諸侯之禮上公五積卿皆見以羔侯伯四積卿皆見以羔是主國之卿見朝君皆執羔引之證主國卿見聘客不得執羔與大夫同用鴈不見朝君故也行聘享皆皮辨歸饔餼韋辨君使卿韋辨歸饔餼五牢釋曰自此盡無儐論主君使卿歸饔餼於賓介之事云變皮辨服韋辨敬也者案周禮春官司服王之吉服有九祭服之下先云兵事韋辨服後云視朝皮辨服則韋辨尊於皮辨今行聘享之事等皆皮辨至歸饔餼則韋辨故云敬也案司服注鄭引春秋傳曰晉郤至衣韎韋之跗注又云今時五伯緹衣古兵服之遺色故知用韎韋也韎即赤色以赤韋為辨也有毛則曰皮去毛熟治則曰韋本是一物有毛無毛為異故云取相近耳云其服蓋韎布以為衣而素裳者此無正文但正服則鄭注司服云韋辨以韎韋為辨又以為衣裳又晉郤至衣韎韋之跗注鄭志解此跗注以跗為幅以注為屬謂制韋如布帛之幅而連屬為衣及裳今此鄭云以韎布為衣而素裳全與兵服異者鄭以意量之此為賓館於大夫士之廟既為入廟之服不可純如兵服故為韎布為衣而素裳鄭志兵服以其與皮辨同白舄故以素裳解之此言素裳又與鄭志同若然唯變其衣耳以無正文故云蓋以疑之朝聘使有正客館有館于大夫士廟有司入陳釋曰案上文直云致館及即館不辨廟與正客館之名案下記云卿館於大夫大夫館於士皆是大夫士之廟下文云揖入及廟鄭據此言明陳之於廟也曾子問孔子云自卿大夫士之家曰私館即卿大夫士之廟一也孔子又云公館與公所為曰公館鄭注云公館若今縣官宫也彼是正客館彼此兩言之者若朝聘使少則皆於正客館若使多則有在大夫廟多少不定兩言之案大行人及掌客積與饔餼各别此注以饔餼為陳其積者對文饔餼與積别散文總是委積陪鼎當內亷辟堂塗以非正饌飪一牢鼎九設于西階前陪鼎當內亷云云釋曰案公食大夫庶羞也以非正饌故在正鼎後而言加也云當內亷辟堂塗也者正鼎九雖大判繼階而言其云于階前則階東稍逺故陪鼎猶當內亷也而辟堂塗堂塗之內也云腸胃次臘以其出牛羊也鄭言此者以其膚是豕肉腸胃是腹內之物而在肉前者以其腸胃出於牛羊故在膚前列之也云膚豕肉也唯燖者有膚者君子不食圂腴大豕曰圂若然牛羊有腸胃而無膚豕則有膚而無腸胃也且豕則有膚豚則無膚故士喪禮豚皆無膚以其皮薄故也縱豕以四解亦無膚故既夕大遣奠少牢無膚以其豚解故也云此饌先陳其位後言其次重大禮詳其事也者先陳其位者南陳已上是也後言其次者牛羊豕已下是也案設飱時直云飪一牢在西鼎九羞鼎三腥一牢在東鼎七直言西九東七不言次陳位飱是小禮輕之宫必有碑所以識日景引陰陽鼎九至陪鼎當內亷東面北上上當碑南陳釋曰言宫必有碑者案諸經云三揖者鄭注皆云入門將曲揖既北面揖當碑揖若然士昏及此聘禮是大夫士廟內皆有碑矣鄉飲酒鄉射言三揖則庠序之內亦有碑矣祭義云君牽牲麗于碑則諸侯廟內有碑明矣天子廟及庠序有碑可知但生人寢內不見有碑雖無文兩君相朝燕在寢豈不三揖乎明亦當有碑矣言所以識日景者周禮匠人云為規識日出之景與日入之景者自是正東西南北此識日景唯可觀碑景邪正以知日之早晚也又引陰陽者又觀碑景南北長短十一月日南至景南北最長陰盛也五月日北至景南北最短陽盛也二至之間景之盈縮陰陽進退可知凡碑引物廟以麗牲廟以石窆用木云凡碑引物者宗廟則麗牲焉以取毛血者云凡碑引物則識日景引陰陽皆是引物則宗廟之中是引物但廟碑又有麗牲麗繫也案祭義云君牽牲麗于碑以其鸞刀以取血毛毛以告純血以告殺兼為此事也云其材宫廟以石窆用木者此雖無正文以義言之葬碑取縣繩繂暫時之間往來運載當用木而已其宫廟之碑取其妙好又須久長用石為之理勝於木故云宫廟以石窆用木也是以檀弓云公室視豐碑三家視桓楹時魯與大夫皆僭言視桓楹桓楹宫廟兩楹之柱是葬用木之驗也陳豆簋陳衣皆有䋫屈錯堂上八豆云云其南醓醢屈八簋繼之黍其南稷錯八豆言屈八簋言錯者以八豆之實各别直次第屈陳之則得相變故云屈也八簋唯有黍稷二種雖屈陳之則間雜錯陳之使當行黍稷間錯不得並陳設亦相變故鄭下注凡饌屈錯要相變是也六鉶至羊豕不言䋫屈錯者䋫文自具故不言之也案此文上下䋫屈錯似各别鄭此屈猶錯士喪禮陳衣於房中南領西上䋫注云䋫猶屈又似不别者云䋫屈二者下手陳之少異屈者句而屈陳之䋫者直屈陳之不為句陳訖則相似故注士喪禮云䋫猶屈言錯者間雜而陳之與䋫屈同或句屈陳而錯此文是也或䋫陳如錯公食大夫是也故公食大夫云宰夫設黍稷六簋于俎西二以並東北上黍當牛俎其西稷錯以終南陳是其直䋫錯之也儀禮要義卷二十一
