body:
  text: 儀禮要義卷三十八宋魏了翁撰既夕禮一既夕禮鄭依别録云士喪禮下篇既夕第十三云士喪禮下篇者依别録而言以記下士之始死乃記葬時而揔記之故名士喪禮下篇也鄭又云先葬二日與葬間一日者驗經云既夕哭請唘期告于賔明旦夙興開殯即遷于祖一日又厥明即葬故是葬前二日與葬間一日也云必容者請啓期在葬前二日中間容朝廟一日故云必容焉鄭又云此諸侯下士一廟其上士二廟則既夕哭先葬前三日者以其一廟則一目朝二廟則二日朝故葬前三日中間容二日故三日若然大夫三廟者葬前四日諸侯五廟者葬前六日天子七廟者葬前八日差次可知既夕哭謂哭訖請明朝啓殯之期既夕哭案此經論既夕哭請啓期之事夕哭者是主人朝夕哭在殯宫阼階之下禮將請啓殯之時主人於夕哭訖出寢門復外位故鄭云謂出門哭止復外位時者鄭知復外位請者見上篇卜日禮云既朝哭皆復外位朝夕之哭其禮並同此不於既朝哭而待既夕哭者謂明日之朝始啓殯又不可隔夕哭故于既夕請也但復外位之時必有弔賔來亦在外位故請期因告賔也將葬當遷柩于祖豫請啓肂之期請啓期告于賔鄭云將葬當遷柩於祖有司於是乃請啓肂之期於主人以告賔者鄭解時未至而豫前二日夕哭之後出於門外位請期者明旦須啓肂以柩朝于祖故有司於此時謂啓肂之期告賔使知而來赴弔之事也擬舉鼎者盥水故夙興設盥門外夙興設盥於祖廟門外案自此盡階間論豫於祖廟陳饌之事言夙興者謂夕哭請期訖明旦早起豫設盆盥於祖廟門外擬舉鼎之人盥手案小斂設盆盥在東堂下大斂設盥于門外雖不言東方約小斂盥在東堂下則大斂盥亦門外東方官師一廟謂中下士祖禰共廟云祖王父也者案祭法云曰考廟曰王考廟此云王父王父之言出于彼云下士祖禰共廟者又祭法云適士二廟官師一廟鄭注云官師中士下士案下記云其二廟則饌于禰則此經所朝據一廟者而言設盥于祖是下士一廟祖禰共廟據尊者而言也啓時陳三鼎及瓦甒豆等如殯案上文殯後大斂之陳三鼎有豚魚臘在廟門外西面北上此陳鼎亦如之云東方之饌亦如之者彼大斂時云東方之饌兩瓦甒其實醴酒毼豆兩其實葵菹芋螺醢兩籩無縢布巾其實栗不擇脯四脡云如殯如大斂既殯之奠者以其大斂于阼階即移于棺而殯之殯訖乃於室中設大斂之奠即大斂奠在殯後恐於殯時别有奠故明之云如殯如大斂既殯之奠也夷牀謂正柩于祖廟兩楹之間侇牀饌于階間釋曰云侇之言尸也者遷尸於堂亦言夷尸盤衾皆依尸而言故云夷之言尸也云朝正柩用此牀者謂柩至祖廟兩楹之間尸北首之時二燭俟于門外謂照徹與啓肂二燭俟于門外案自此盡夷衾論啓殯及變服之事二燭者以其彂殯宫二者下云燭入注云照徹與啓肂者故於此豫􅊀之云燭用蒸者案周禮甸師云以薪蒸役外內饔注云大曰薪小曰蒸又案少儀云主者執燭抱燋鄭云未爇曰燋燋即蒸男子免婦人髽今言丈夫髽互文丈夫髽散帶垂即位如初釋曰云為將啓變也者凡男子免與括髮散帶垂婦人髽皆當小斂之節今于啓殯時亦見尸柩故變同小斂之時故云為將啓變也云此互文以相見耳髽婦人之變者髽既是婦人之變則免是男子之變今丈夫見其人不見免則丈夫當免矣婦人見其髽不見人則婦人當髽矣故云互文以相見啓殯後雖斬衰亦免而無括髮引喪服小記者證見未成服已前男子免而婦人髽既成服以後男子冠婦人笄若然小斂之時斬衰男子括髮齊衰以下男子免不言男子括髮者欲見啓殯之後雖斬衰亦免而無括髮知者案喪服小記云緦小功虞卒哭則免注云棺柩已藏嫌恩輕可以不免也言則免者則既殯先啓之間雖有事不免以此而言先啓不免則啓當免矣又喪服小記云君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免注云不散麻者自若絞垂為人君變貶於大斂之前既啓之後也親者大功以上也注直言不散麻貶于既啓之後則主人著免不貶矣以此言之啓後主人著免可知若啓後著免亦是貶矣若然後至卒哭其服同矣以其反哭之時更無變服之文拂柩用功布三有聲以存神商祝袒免執功布入升云云云功布灰治之布也者亦謂七升以下之布也云執之以接神為有所拂㧍也者拂㧍猶言拂拭下經云商祝拂柩用功布是拂拭去塵也此始告神而用功布拂㧍者謂拂㧍去凶邪之氣也云三有聲存神也者案曽子問亦云祝聲三鄭云警神也即此存神周祝徹宿奠夏祝取銘降為妨啓祝降與夏祝交于階下取銘置于重此祝不言商夏則周祝也燭既入室周祝從而入室徹宿奠降降時夏祝自下升取銘降置于重為妨啓殯故也云祝降者祝徹宿奠降也者謂昨暮所設夕奠經宿故謂之宿奠也此宿奠擬朝廟所用即下云重先奠從燭從者是也宿奠謂經宿擬朝廟所用云吉事交相左者則鄉射大射皆云降與射者交於階下相左是也云凶事交相右者此凶事不言交相左者以凶事反于吉明交相右可知交相右者周祝降階時當近東夏祝升階當近西棺出南首夷衾覆棺衾隨柩入壙幠用夷衾注幠覆之為其形露案開柩已出時是棺南首夷衾本擬覆柩故斂時不用今得覆棺於後朝廟及入壙雖不言用夷衾又無徹文以覆棺言之當隨柩入壙矣遷于祖用軸謂從殯宮朝廟時遷于祖用軸案自此盡由足西面論以柩朝廟之事云遷于祖用軸者謂朝廟之時從殯宫遷移於祖廟時用輁軸載之案士喪禮將殯云棺入主人不哭升棺用軸則遷於祖時亦升輁軸於階上載之挽柩而下若然未升饌陳之當在堂下是以下記云夷牀輁軸饌於西階東注云明階間者位近西夷牀饌于祖廟輁軸饌於殯宫而言階間明在堂下也云檀弓曰殷朝而殯於祖者殷人將殯之時先朝廟訖乃殯至葬時不復朝也云周朝而遂葬者周人殯於路寢至葬時乃朝朝訖而遂葬朝廟時前後有燭男女分右左親疏重先奠從燭從柩從燭從主人從案此論發殯官鄉祖廟之次序柩之前後皆有燭者以其柩車為隔恐暗故各有燭以照道若至廟燭在前者升照正柩在後者在階下照升柩故下記云燭先入者升堂東楹之南西面後入者西階東北面在下是也云主人從者丈夫由右婦人由左以服之親疏為先後者經直云主人從者以主人為首者而言故鄭揔舉男子婦人并五服而言知男子由右婦人由左者以內則云道路男子由右女子由左鄭云地道尊右彼謂吉時此雖凶禮亦依之也云親疏為先後各從其昭穆者假令昭親則在先昭疏則在後就同昭穆之中又以年之大小為先後男從主人後女從主婦後云男賔在前女賔在後者謂無服者亦各從五服男子婦人之後為人子不由阼階至朝廟猶然升自西階釋曰云猶用子道不由阼也者案曲禮云為人子者升降不由阼階今以柩朝祖故用子道不由阼也唯主人主婦從柩升衆人東階下主人從升婦人升東面衆人東即位釋曰主人主婦從柩而升言婦人升東面不言主人西面舉主婦東面主人西面可知故下文云主人西面也云衆人東即位者唯主人主婦升自衆主人以下從柩至西階下遂鄉東階下即西面位正柩於兩楹間近西柩北首正柩於兩楹間用夷牀釋曰云兩楹間象鄉户牖之間賔客之位亦是人君受臣子朝事之處父母神之所在故於兩楹之間北面鄉之若言鄉戶牖則在兩楹間而近西矣故下記云夷牀輁軸饌於西階東饌夷牀俟正柩而言西階東則正柩於楹間近西可知矣云是時柩北首者既言朝祖不可以足鄉之又自上以來設奠皆升自阼階今此下文設奠升降皆自西階下鄭注云奠升不由阼階柩北首辟其足設宿奠於柩西據神位在奧不在東席升設於柩西奠設如初巾之升降自西階案此論設宿奠於柩西云從奠設如初東面也者如初謂如殯宮朝夕奠設於室中者從柩而來此還是彼朝夕奠脯醢醴酒據神東面設之於席前也云不統於柩神不西面也者特牲少牢皆設席於奧東面則天子諸侯亦不西面可知云不設柩東東非神位也者此亦據神位在奧不在東而言也若然小斂奠設於尸東者以其始死未忍異於生大斂以後奠皆設於室中亦不統於柩此奠不設於室者室中神所在非奠死者之處喪不剝奠據大小斂此宿奠無肉亦巾案禮記檀弓云喪不剝奠也與祭肉也與據小斂大斂之等也有牲肉故不裸露故巾之以此宿奠脯醢醴酒無祭肉巾之者以朝夕奠在室不巾此雖無祭肉為在堂風塵故巾之巾如字或居覲反主人殯宫拜賔訖即位袒至此乃襲絰主人踊無算降至襲主婦及親者由足西面此云降拜賔即位踊襲者賔謂在殯宮看主人開殯朝祖之賔襲者從殯宮中拜賔入即位袒至此乃襲襲者先即位踊踊訖乃襲絰於序東薦車如生時陳駕漢謂之魂車薦車當東榮北輈案自此盡還出論薦車馬設遷祖奠之事薦車者以明旦將行故豫陳車云進車者象生時將行陳駕也者案曲禮云君車將駕則僕執策立於馬前已駕僕展軨是生時將行陳駕今死者將葬亦陳車象之也云今時謂之魂車者鄭舉漢法況之周禮考工記有輈人為輈輈亦謂之轅故云輈轅也云車當東榮東陳西上於中庭者此車既非載柩之車即下記云薦乘車道車槀車云中庭者據南北之中庭不據東西為中庭也何者以下經云薦馬入門三分庭一在南馬右還出薦馬者當車南在庭近南明車近北當中庭矣喪奠皆升自阼唯朝祖奠升自西辟足質明滅燭徹者升自阼階降自西階云云釋曰新奠者謂遷祖之奠將設新故徹去從奠以辟新奠也云不設序西南已再設為䙝者謂徹從奠不設於序西南為再設䙝黜故不設也其再設者未啓殯前夕時一設至此朝廟又設云如初者亦於柩西當階之上東面席前為之則同其饌則異以其上三鼎及東方之饌皆大斂之奠是也云奠升不由阼階柩北首辟其足者以前大斂小斂及朝夕奠皆升自阼階降自西階今此遷祖奠升不由阼階故云辟足辟足者以其來往不可由首又飲食之事不可䙝之由足故升自西階也若然徹時所以由足者奠畢去之由足無嫌也薦馬以駕車士每車二匹有纓薦馬纓三就入門北面交轡圉人夾牽之釋曰案下記云薦乘車又云纓轡貝勒縣於衡又云道車載朝服槀車載蓑笠注云道車槀車之纓轡及勒亦縣於衡也若然薦車之時纓縣於衡此薦馬得有纓者以薦車時縣於衡至此薦馬時又取而用之故兩見之也云駕車之馬者即上文薦車之馬也云每車二匹者下經云公賵兩馬注云兩馬士制也故知此車有三乘馬則六匹矣云纓今馬鞅也者古者謂之纓漢時謂之鞅薦車之禮成於薦馬故始哭踊御者執策立於馬後哭成踊云云云主人於是乃哭踊者薦車之禮成於薦馬者以其車得馬而成故前薦車時主人不哭踊至薦馬乃哭賔以朝廟事畢而出就外位請祖期賔出主人送於門外有司請祖期云云自此盡屬引論祖時飾柩車之事此賔即上來弔主人啓殯者朝廟事畢而出主人送之云亦因在外位請之者上既夕哭訖因外位請唘期故云亦也此經不言告賔知告賔者若不告賔時至則設何須請期主人答之曰日側者昊是傍側亦為特義轉為昃者取差跌之義故從昊注側昳也將過中之時釋曰昳大結反袒為載變卒束乃襲束謂束棺主人入袒乃載踊無算卒束襲釋曰袒為載變也者將載主人先袒乃載故云為載變也云乃舉柩郤下而載之者郤猶却也鄉柩在堂北首今郤下以足鄉前下堂載於車故謂之為郤也云束束棺於柩車者案禮記喪大記云君蓋用漆三袵三束檀弓云棺束縮二橫三彼是束棺此經先云載下乃云卒束則束非棺束是載柩訖乃以物束棺柩車即蜃車飾以帷荒亦名牆栁商祝飾柩一池紐前赬後緇齊三采無貝案此並飾車之事其柩車即周禮蜃車也四輪迫地其輿亦一狀如長牀兩畔竪軨子以帷繞之上以荒一池縣於前面荒之瓜端荒上於中央加齊云飾柩為設牆栁也者即加帷荒是也云巾奠乃牆下記文鄭引之者以此經直云飾柩不言設牆時節故記人辨之以巾覆奠乃牆謂此飾柩者也云牆有布帷栁有布荒者案喪大記云飾棺君龍帷黼荒大夫畫荒士布帷布荒鄭注云布帷布荒者白布也君大夫加文章焉此注牆栁别案喪大記注又云在旁曰帷在上曰荒皆所以衣栁也則帷荒揔名為栁者案縫人云衣翣栁之材鄭注必先纒衣其木乃以張飾也栁之言聚諸飾之聚若然對則帷為牆象宮室有牆壁荒為栁以其荒有黼黻及齊三采諸色所聚故得栁名揔而言之皆得為牆巾奠乃牆及檀弓云周人牆置翣皆牆中兼有栁縫人衣翣栁之材栁中兼牆矣鄭注喪大記云荒蒙也取蒙覆之義云池者象宮室之承霤以竹為之者生人宮室以木為承霤仰之以承霤水死者無水可承故用竹而覆之直取象平生有而已云狀如小車笭衣以青布者此鄭依漢禮而言云一池縣於栁前者案喪大記君三池大夫二池士一池君三池三面而有大夫二池縣於兩相士一池縣於栁前面而已云士不褕絞者案雜記云大夫不褕絞屬於池下褕者依爾雅釋鳥云江淮而南青質五采皆備成章曰鷂絞者蒼黃之色則人君於蒼黃色繒上又畫鷂雉之形縣於池下大夫則闕之故云大夫則不褕絞屬於池下池下褕絞一名振容故喪大記云大夫不振容振容者車行振動以為容儀但大夫不振容池下仍有銅魚縣之士不但不褕絞又無銅魚故喪大記大夫有魚躍拂池士則無鄭注云士則去魚云左右面各有前後者柩車左右以有帷分兩相各為前後故云前赬後緇云齊居栁之中央雖無正文以其言齊若人之齊亦居身之中央也云若今小車蓋上蕤矣者漢時小車蓋上有蕤在蓋之中央故舉以為說云以三采繒為之上朱中白下蒼者案聘禮記云三采朱白蒼彼據繅藉用三采先朱次白下蒼此為齊用三采亦當然故取以為義也云著以絮者既云齊當人所覩見故知以絮著之使髙知元士以上有貝者案喪大記云君齊五采五貝大夫齊三采三貝士齊三采一貝鄭注云齊象車蓋蕤縫合雜采為之形如爪分然綴貝落其上及旁見彼士為天子元士元士已上皆有貝也此諸侯之士故云無貝也設披謂輅栁棺上貫結於戴人旁牽設披釋曰云披輅栁棺上貫結於戴者案喪大記注云戴之言值也所以連繫棺束與栁材使相值因而結前後披也此注云披栁棺上貫結於戴以此而言則戴兩頭皆結於栁材又以披在棺上輅過然後貫穿載之連繫棺束者乃結於戴餘披出之於外使人持之一畔有二為前後披故下記云執披者旁四人注云前後左右各二人是也人君則三披各三人持之備傾虧也引喪大記者證披連戴而施之屬引謂以紼繩屬於柩車在軸輴屬引案引謂紼繩屬著於柩車云在軸輴曰紼者士朝廟時用軸大夫已上用輴故并言之言紼見繩體言引見用力故鄭注周禮亦云在車曰紼行道曰引云古者人引柩者雜記乘人專道而行又云諸侯五百大夫三百皆是引人也言古者人引對漢以來不使人引也引春秋者案定公九年左氏傳云齊侯伐晉夷儀敝無存死之齊侯與之犀軒而先歸之坐引者以師哭之親推之三注云坐而飲食之此鄭略引之云坐引者亦謂飲食之哭之亦以師哭之三者亦謂公親推之三也引之者證古者人引也明器自包筲以下藏器陳於乘車西陳明器於乘車之西注云明器藏器者也自包筲以下皆是藏器故下云器西南上綪又云茵注云茵在抗木上陳器次而北也則自包筲以下揔曰藏器以其俱入壙也引檀弓者案彼注成猶善也竹不可用云陳器乘車之西則重北者無正文上薦車云直東榮繼廟屋而言上注云中庭不得云近北明車近不在重今東陳於乘車之西明重北可知引檀弓者竹不成用瓦不成味成猶善也謂邊無縢味當作沫靧也琴瑟張而不平注云無宮商之調折猶庪加於壙上承抗席禦上云折橫覆之者鄭云蓋如牀則加於壙上時南北長東西短以其窆畢加之於壙上所以承抗席若庪藏物然故云折猶庪也云方鑿連木為之蓋如牀而縮者三橫者五無簀者此無正文抗木橫三縮二云所以禦止土者以其在抗木之上故知以禦土也其橫與縮各足掩者以其壙口大小雖無文但明器之等皆由羡道入諸侯已上又有輴車亦由羡道入壙口唯以下棺則壙口大小容棺而已今抗木亦足掩壙口也抗木橫三縮二加抗席加茵茵以藉棺既陳抗木於折北又加此抗席三領於抗木之上知抗木不在折上者以抗木直言橫三縮二不言加明别陳於折北抗木之下而此云加加於抗木之上可知抗席之下而云茵明又加於抗席之上抗木在上故云禦土抗席在下隔抗木慮有塵鄉下故云禦塵云加茵者謂以茵加於抗席之上此說陳器之時云用疏布者謂用大功疏粗之布云緇剪者緇則七入黑汁為緇剪淺也謂染為淺緇之色言有幅者案下記云茵著用荼實綏澤焉此鄭云有幅緣之者則用一幅布為之縫合兩邊幅為袋不去邊幅用之以盛著也故云有幅也云茵所以藉棺者下葬時茵先屬引乃窆則茵與棺為藉抗木云縮二橫三此亦縮二橫三故知亦者亦抗木也陳明器從茵鄉北為次故連茵言之茵非明器而言之者陳器從此茵鄉北為次第故言之故鄭言茵在抗木上陳器次而北下文既設遣奠而云苞牲取下體故知苞二所以裹奠羊豕之肉也筲三黍稷麥云其容蓋與簋同一觳也者案考工記旊人為簋實一觳又云豆實三而成觳案昭三年晏子云四升曰豆豆實三而成觳則觳受斗二升此筲與簋同盛黍稷知受一觳斗二升約同之無正文故云蓋以疑之也罋三云罋瓦器者以罋與甒等字從缶瓦故知是瓦器云其容亦蓋一觳者聘禮記致饔餼云罋斗二升則此罋約同之故云蓋以疑之也知屑是薑桂者以其與內則屑桂與薑同云屑故引內則為證也甒二繼罋三而陳之言亦瓦器亦上罋三也云皆木桁久之者則自苞筲以下皆塞之置於木桁也若然既皆久塞而罋甒獨云幂者以其苞筲之等燥物宜苞塞之而無幂罋甒濕物非直久塞其口又加幂覆之云久當為炙炙謂以蓋案塞其口者此亦如上設重鬲亦與之同故讀從炙也云每器異桁者以其言皆木桁用器自弓矢耒耜以下皆常用器用器弓矢耒耜兩敦兩杅槃匜匜實於槃中南流注云此常用之器杅盛湯漿槃匜盥器也流匜口也今文杅作桙釋曰謂常用之器弓矢兵器耒耜農器敦杅食器槃匜洗浴之器皆象生時而藏之也明器鬼器祭器人器士無祭器無祭器注云云大夫以上兼用鬼器人器也者案檀弓云宋襄公葬其夫人醯醢百罋曽子曰既曰明器矣而又實之注云言名之為明器而與祭器皆實之是亂鬼器與人器以此而言則明器鬼器也祭器人器也士禮略無祭器空有明器而實之大夫以上尊者備故兩有若兩有則實祭器不實明器宋襄公既兩有而并實之故曾子非之士有燕樂器謂琴瑟特縣有燕樂器可也案言可者許其得用故云可也云與賔客燕飲用樂之器也者則升歌有琴瑟庭中有特縣縣磬也役器介胄干笮無弓矢示不用役器甲胄干笮案此役器中有干笮無弓矢示不用故不具上用器是常用之器故具陳之也云甲鎧胄兜鍪者古者用皮故名甲胄後代用金故名鎧兜鍪隨世為名故也但上下役用之器皆粗沽為之故下記云弓矢之新沽功注云設之宜新沽示不用弓矢云沽餘雖不言皆沽可知也但此笮是送死之具下記云薦乘車鹿淺幦干笮革靾者是魂車所載象生者與此别也燕器謂杖扶身笠禦暑翣招凉燕器杖笠翣注云燕居安體之器也者以杖者所以扶身笠者所以禦暑翣者所以招凉而在燕居用之故云燕居安體之器也云笠竹􅡓蓋也者􅡓竹青之皮以竹青皮為之還車為祖奠布巾席於車西方徹奠云云自此盡入復位論還車為祖奠之事此徹遷祖奠者為將還遷車更設祖奠云巾席俟於西方祖奠將用焉者以下經云祖還車還車訖布席設祖奠則布此巾席也故巾席俟祖奠在西方也云節者來象升丈夫踊去象降婦人踊者案上篇徹小斂大斂奠時皆升自阼階大夫踊降自西階婦人踊今奠在庭無升降之事直有來往經云要節而踊知有婦人亦踊者以下經徹祖奠時云徹者入丈夫踊設於西北婦人踊注云猶阼階升時也徹設於柩車西北亦猶序西南是男子婦人並有踊文大小斂奠等皆經宿此遷祖奠旦設昃徹云徹者由明器北西面既徹由重南東者凡奠於堂室者皆升自阼階降自西階奠於庭者亦由重北東方來陳由重北而西徹徹訖由重南而東象升自阼階降自西階也云不設於序西南者非宿奠也者以其大斂小斂奠及夕奠乃皆經宿故皆設之於序西南為神馮依此遷祖奠旦始設之今日側徹之未經宿將祖主人袒既祖踊而襲祖注為將祖變案下經商祝御柩乃祖是將祖故此主人袒袒即變也既祖訖故踊而襲云主人也者前袒是主人則此襲亦主人也婦人即位階間以柩遷鄉外階間空婦人降即位於階間云婦人降者以柩還鄉外階間空故婦人從堂上降在階間云為柩將去有時者去有時即明旦遣而行之是時也今此為行始也云位東上者以堂上時婦人在阼階西面統於堂下男子今柩車南遷男子亦在車東故婦人降亦東上統於男子也婦人不鄉車西者以車西有祖奠故辟之在車後茵與銘皆入壙重不藏埋廟門左祝取銘置於茵云云初死為銘置於重唘殯祝取銘置於重祖廟又置於重今將行置於茵者重不藏擬埋於廟門左茵是入壙之物銘亦入壙之物故置於茵也是以鄭云重不藏故於此移銘加於茵上也士無廞旌唯有乘車所建攝盛之旃并此銘旌而已大夫以上有廞旌通此二旌則此備三旌也祖奠與遷祖奠同在車西再薦馬布席乃奠如初主人要節而踊上祖奠既與遷祖奠同車西人皆從車而來則此要節而踊一與遷祖奠同云車已祖可以為之奠是之謂祖奠者下記云祝饌祖奠於主人之南是謂彼祖奠薦馬如初上己薦馬今又薦馬者以柩車動而鄉南為行始宜新之死至殯唘至葬主人及兄弟皆內位賔出主人送有司請葬期上啓期祖期事畢在外位故此亦因事畢出在外位時請葬期也又復位云自死至於殯自啓至於葬主人及兄弟常在內位者自死至於殯在內位據殯宫中自啓至於葬在內位據在祖廟中處雖不同在內不異故揔言之云在內位者始死未小斂已前位在尸東小斂後位在阼階下若自啓之後在廟位亦在阼階下也儀禮要義卷三十八
