body:
  text: 儀禮要義卷四宋魏了翁撰士昏禮一士娶妻之禮日入三商士昏禮第二釋曰鄭知是士娶妻之禮者以記云記士昏禮故知是士娶妻鄭云日入三商者商謂商量是漏刻之名故三光靈曜亦日入三刻為昏不盡為明案馬氏云日未出日沒後皆云二刻半前後共五刻今云三商者據整數而言其實二刻半也下達謂男父遣媒氏下通女氏昏禮下達納采用鴈注達通也云云釋曰從此下至主人許賔入授如初禮陳納采問名之禮云下達者謂未行納采已前男父先遣媒氏女氏之家通辭徃來女氏許之乃遣使者行納采之禮也言下達者男為上女為下取陽唱隂和之義故云下達謂以言辭下通於女氏也是以下記昏辭云吾子有惠貺室某也注云稱有惠明下也昏禮有六三不云納注女氏許之乃後使人納其采擇之禮用鴈為摯釋曰云納采用鴈者昏禮有六五禮用鴈納采問名納吉請朝親迎是也唯納徵不用鴈以其自有幣帛可執故也且三禮不云納言納者恐女氏不受若春秋内納之義若然納采言納者以其始相采擇恐女家不許故言納問名不言納者女氏已許故不言納也納吉言納者男家卜吉徃與女氏復恐女家翻悔不受故更言納也納徵言納者納幣帛則昏禮成復恐女家不受故更云納也請期親迎不言納者納幣則昏禮已成女家不得移改故皆不言納昏禮尊卑同魯莊喪昏闕納吉其昏禮有六尊卑皆同故左氏荘公二十二年經書冬公如齊納幣糓梁𫝊曰納幣大夫之事也禮有納采有問名有納徵有告期四者備而後娶禮也公之親納幣非禮也故譏之彼無納吉者以荘公在母喪内親行納幣非禮之事故闕其納吉以非之也媒氏天子之官諸侯亦常有釋曰鄭云必先使媒氏下通其言女氏許之乃後使人納其采擇之禮者欲見納采之前有此下達之言也案周禮地官有媒氏職是天子之官則諸侯之國亦有媒氏用鴈為摯順隂陽無尊卑皆鴈云用鴈為摯者取其順隂陽往来者案周禮大宗伯云以禽作六摯卿執羔大夫執鴈士執雉此昏禮無問尊卑皆用鴈故鄭注其意云取順隂陽徃来也順隂陽往来者鴈木落南翔冰泮北徂夫為陽婦為隂今用鴈者亦取婦人從夫之義使媒使媵御皆以養亷恥云昏必由媒交接設紹介者詩云匪媒不得是由媒也其行五禮自納采已下皆使使徃是交接設紹介也云皆所以養亷恥者解所以須媒及設紹介者皆所以養成男女使有亷恥也使媒通之媵御沃盥交之等皆是行事之漸養亷恥之義也以先祖遺體許人故受禮於禰廟主人筵於户西西上右几注主人女父也云云釋曰云筵為神布席也者下文禮賓云徹几改筵是為人設席故以此為神席也云户西者以户西是賓客之位故為尊處也必以西為客位者以地道尊右故也知將以先祖之遺體許人故受禮於禰廟者以記云凡行事受諸禰廟也云席西上右設凡神不統於人者案鄉射燕禮之等設席皆東上是統於人今以神尊不統於人取地道尊右之義故席西上几在右也云席有首尾者以公食記蒲筵萑席皆卷自末大夫唯有兩門廟在寑門外之東使者𤣥端至擯者出請事入告主人如賓服迎於門外釋曰知門外是大門外者以其大夫唯有兩門寢門大門而已廟在寢門外之東北下有至於廟門明此門外是大門外可知也云賓不答拜者奉使不敢當其盛禮者此士卑無君臣之禮故賓雖屬吏直言不答拜不言辟若諸侯於使臣則言辟是以射禮擯迎入門公拜賔辟不答拜公食大夫主為賔已故賓答拜稽首亦辟乃拜之以其君尊故也冠昏射鄉聘食皆有三揖尊卑同文異至於廟門揖入三揖至於階三讓釋曰凡入門三揖者以其入門賓主將欲相背故須揖賓主各至堂塗北面相見故亦須揖至碑碑在堂下三分庭之一在北是庭中之節故亦須揖但士冠注云入門將右曲揖將北曲揖當碑揖此注至内霤將曲揖既曲北面揖當碑揖文不同者鄭舉二文相兼乃足也三者禮之大節尊卑同故鄉飲酒鄉射聘禮公食大夫皆有此三揖之法但注有詳畧耳賔主敵俱升主尊或王使皆先升主人以賔升西面賔升西階當阿東面致命主人阼階上北面再拜釋曰賓則使者也禮之通例賔主敵者賔主俱升若士冠與此文是也若鄉飲酒鄉射皆主尊賔卑故初至之時主人升一等賔乃升至卒洗之後亦俱升唯聘禮公升二等賔始升者彼注云亦欲君行一臣行二也覲禮王使人勞侯氏使者不讓先升者奉王命尊故也士廟雖有室其棟在室外故賔當阿注阿棟也入堂深示親親今文阿為庪釋曰案鄉飲酒聘禮皆云賔當楣無云當阿者獨此云賔當阿故云示親親也凡士之廟五架為之棟北一楣下有室户中脊為棟棟南一架為前楣楣前接簷為庪鄉射記云序則物當棟堂則物當楣鄭云是制五架之屋也鄉大夫射於庠庠則有室故物當前楣士射於序序則無室故物當棟此士之廟雖有室其棟在室外故賓得深入當之也使者不敵而並授於楹間為合好授於楹間南面注明為合好其節同也云云釋曰楹間謂兩楹之間賔以鴈授主人於楹間者明和合親好令其賔主遠近節同也凡賔主敵者授於楹間不敵者不於楹間是以聘禮賔覿大夫云受幣于楹間南面鄭注云受幣楹間敵也聘禮又云公側襲受玉於中堂與東楹之間鄭注云東楹之間亦以君行一臣行二至禮賔及賔私覿皆云當東楹是尊卑不敵故不於楹間也今使者不敵而於楹間故云明為合好也云南面並授也者以經云南面不辨賔主大夫貴臣稱老士無臣羣吏尊者曰老賔降出主人降授老鴈釋曰授鴈訖賔降自西階出門主人降自阼階授老鴈於階立待後事也大夫家臣稱老是以喪服公士大夫以貴臣為室老春秋左氏𫝊云執臧氏老論語云趙魏老禮記大夫室老行事皆是老為家臣之貴者士雖無君臣之名云老亦是羣吏中尊者也一使兼行納采問名賔執鴈請問名主人許賔入授如初禮釋曰此之一使兼行納采問名二事相因又使還須卜故因即問名乃還卜之故共一使也云主人許者擯請入告乃報賔賔得主人許乃入門升堂授鴈與納采禮同故云如初禮也問名問女之姓氏名有二義注問名者將歸卜其吉凶釋曰言問名者問女之姓氏不問三月之名故下記問名辭云某既受命將加諸卜敢請女為誰氏鄭云誰氏者謙也不必其主人之女是問姓氏也然以姓氏為名者名有二種一者名字之名三月之名是也一者是名號之名故孔安國注尚書以舜為名鄭君目録以曾子為姓名亦據子為名皆是名號為名者也今以姓氏為名亦名號之類冠昏醴賔當作禮大夫以上有禮有擯擯者出請賔告事畢入告出請醴賔釋曰此下至送于門再拜主人禮賔之事云此醴亦當為禮者亦士冠禮賔為醴字彼已破從禮故云以此醴酒禮賔不從醴者以大行人云上公再祼而酢侯伯一祼而酢子男一祼不酢及以酒禮之用齊禮之皆不依酒醴為名皆取相禮故知此醴亦為禮敬之禮不取用醴為醴之義也秋官司儀云諸公相為賔及將幣賔亦如之注云上於下曰禮敵者曰擯聘禮卿亦云無擯注云無擯辟君是大夫以上尊得有禮儐兩名士以下卑惟稱禮也醴糟例無𤣥酒有篚有籩豆主人徹几改筵東上側尊甒醴于房中釋曰云側尊亦言無𤣥酒者醴禮側無𤣥酒配之以其醴象大古質故士冠與此昬禮之等皆無𤣥酒也鄭知此亦有篚有籩豆如冠禮者此下云贊者酌醴加角柶明有篚盛之又云贊者薦脯醢則有籩豆可知但冠禮尊在服北南上則此尊與篚等亦南上故云如冠禮之設也注徹几改筵者鄉為神今為人昏燕食射鄉拜賔至聘享否主人迎賔於廟門外揖讓云云賔西階上北面答拜釋曰云主人北靣再拜者拜賔至此堂飲之是以公食大夫燕禮鄉飲酒鄉射大射皆云拜至並是拜賔至此堂也但燕禮大射公食大夫皆云至再拜先言至者欲見賔至乃拜之是有尊卑不敵之義餘皆言拜至至在拜下者體敵之義也若然此為禮賔有拜至者前雖有納采問名之事以昏禮有相親之義故雖後亦拜至也聘禮享禮及禮賔不拜至者聘禮不取相親之義故不拜至是以彼鄭注云以賔不於此始至拂几有内外授几有中端禮賔有無几主人拂几授挍拜送賔以几辟北靣設於坐左之西階上云主人拂几者此拂几雖不言外拂内拂又不言三案有司徹主人西靣左手執几縮之以右袂推拂几三二手橫執几進授尸于筵前注云衣䄂謂之袂推拂去塵示新云拂者外拂之也則此亦外拂之三也凡行敵禮者拂几皆若此卑於尊者則内拂之故聘禮云宰内拂几三奉兩端以進鄭云内拂几不欲塵坋尊者是也若然冠禮禮賔無几者冠禮比昬為輕故無几鄉飲酒鄉射及燕賔賔輕故無几聘賔及公食大夫賔重故有几也云授校者凡授几之法卑者以兩手執几兩端尊者則以兩手於几間執之授設皆然是以聘禮宰夫奉兩端以進有司徹云尸進二手受于手間注云受從手間謙也雖不言兩手兩手授之可知又案聘禮云公東南鄉外拂几三卒振𬒮中攝之進西鄉賔進訝受几於筵前以此言之公尊中執几以一手則賔以兩手於几兩端執之也而此亦賔主不敵授校者昬禮異於餘禮受几有辟不辟設几有縱横左右賔以几辟注辟逡遁挍几足古文挍為枝云賔以几辟者以賔卑故以几辟聘禮賔卑亦云以几辟有司徹不云以几辟者尊尸故也覲禮不云以几辟者尊王故也凡設几之法受時或受其足或受於手間皆横授之及其設之皆旋几縱執乃設之於坐南北靣陳之位為神則右之為人則左之為異不坐設之者几輕故也鄭知挍几足者既夕記云綴足用燕几挍在南御者坐持之禮子禮婦於筵西受禮賔筵前受主人受醴面枋筵前西北靣賔拜受醴復位主人阼階上拜送釋曰經唯云主人西北靣知疑立者鄉飲酒云主人阼階東疑立明此亦然也凡主人將授酒醴於筵前待賔即筵前乃授之此鄭云即筵謂就筵前與下賔即筵别也是以冠禮禮子及下禮婦皆於筵西受禮然禮賔進筵前受醴是不躐席之事也云賔復位於西階上北靣明相尊敬此筵不主為飲食起者但此筵為行禮故拜及啐皆於西階也凡祭以右手祭於豆間示有先賔即筵坐左執觶祭脯醢以柶祭醴三釋曰鄭云祭以右手出於鄉射也云凡祭於脯醢之豆間者謂祭脯醢俎豆皆於豆間此及冠禮鄉飲酒鄉射燕禮大射皆有脯醢則在籩豆之間此注不言籩直言豆者省文公食大夫及有司徹豆多者則言祭於上豆之間也云必所為祭者謙敬示有所先也者案曲禮云主人延客祭注云祭祭先也君子有事不忘本也必南靣奠取席正又祭酒亦皆南靣賔即筵奠于薦左降筵北靣坐取脯主人辭釋曰此奠於薦左不言靣位下贊禮婦奠於薦東注云奠于薦東升席奠之此言奠于薦東升席奠之明皆升席南靣奠也必南靣奠者取席之正又祭酒亦皆南靣並因祭酒之靣奠之則冠禮禮子亦南靣奠之聘禮禮賔賔北靣奠者以公親執束帛待賜已不敢稽留故由便疾北靣奠之納吉謂歸卜於禰庿得吉復以告納吉用鴈如納采禮注歸卜於庿得吉兆復使使者徃告云云釋曰鄭知義然者案下記云納吉曰吾子有貺命某加諸卜占吉使某也敢告凡卜並皆於禰廟故然也未卜時恐有不吉昏姻不定知納吉乃定也納徴無鴈以有束帛即春秋納幣納徵𤣥纁束帛儷皮如納吉禮注徵成也釋曰此納徵無鴈者以有束帛為贄故也是以孝經鉤命决云五禮用鴈是也案春秋左氏荘公二十二年冬公如齊納幣不言納徵者孔子制春秋變周之文從殷之質故指幣體而言周文故以義言之徵成也納此則昏禮成𤣥纁象隂陽備束帛五兩取配合云用𤣥纁者象隂陽備也束帛十端也者周禮凡嫁子娶妻入幣緇帛無過五兩鄭彼注云納幣用緇婦人隂也凡於娶禮必用其類五兩十端也必言兩者欲得其配合之名十象五行十日相成也士大夫乃以𤣥纁束帛天子加以榖圭諸侯加以大璋雜記曰納幣一束束五兩兩五尋然則每端二丈若彼據庶人空用緇色無纁故鄭云用緇婦人隂此𤣥纁俱有故云象隂陽備也案玉人榖圭天子以聘女大璋諸侯以聘女故鄭據而言焉𤣥纁束帛者合言之陽竒隂偶三𤣥二纁也其大夫無冠禮而有昏禮若試為大夫及幼為大夫者依士禮若五十而爵改娶者大夫昏禮𤣥纁及鹿皮則同於士餘有異者無文以言也請期如納徵禮納吉如納采請期用鴈主人辭賔許告期如納徴禮釋曰請期如納徵禮納吉禮如納采禮案上納采之禮下至主人拜送於門外其中揖讓升降及禮賔迎送之事此皆如之請期女氏辭男家使乃告期注主人辭者陽唱隂和期日宜由夫家来也云云釋曰壻之父使使納徴訖乃卜婚月得吉日又使使徃女家告日是期由男家来今以男家執謙故遣使者請女家若云期由女氏故云請期女氏知陽唱隂和當由男家出故主人辭之使者既見主人辭遂告主人期日也是以下記云使者某使某受命吾子不許某告期曰某日注云某吉日之甲乙是告期之辭故鄭云辭即告也夫家欲迎婦時豫陳同牢之饌期初昏陳三鼎于寢門外東方北面北上釋曰此下文盡合卺一節論夫家欲迎婦之時豫陳同牢之饌也云陳三鼎于寢門外東方北靣北上者謂在夫寢門外也言東方北靣是禮之正但數鼎故云北靣北上則此及少牢皆是也特牲陳鼎于門外北靣北上當門而不在東方者辟大夫故也今此亦東方不辟大夫者重昏禮攝盛也鼎不言北上直言北面士冠所云是也凡鼎陳於外者北面為正阼階下西面為正士喪禮小歛陳一鼎於門外西面者喪禮少變在東方者未忍異於生於大歛大奠及朔月奠既夕陳鼎皆如大歛奠門外皆西面者亦是喪禮既夕變也士虞陳三鼎于門外之右北面北上入設于西階前東面北上不在東者既葬鬼事之反吉故也公食陳鼎七當門南面西上者以賔是外人向外統之父子同宫異宫壻皆有寢室其實特豚合升云云魚十有四腊一云鼎三者升豚魚腊也者即經文自顯也云寢壻之室也者命士以上之父子異宫自然别有寢若不命之士父子同宫雖大院同居其中亦隔别各有門户故經總云寢門外昏禮鬼神隂陽故與祭祀同二肺云合升合左右胖升於鼎也者以夫婦各一故左右胖俱升若祭則升右也云去蹄蹄甲不用也者以其踐地穢惡也云舉肺脊者食時所先舉者案下文贊者告具揖婦即對筵皆坐祭祭薦黍稷肺即此祭肺也下文云贊爾黍稷授肺脊皆食以湆醬皆祭舉食舉也即此舉肺脊也祭時二肺俱有生人唯有舉肺皆祭今此得有祭肺者禮記郊特牲論娶婦𤣥冕齋戒鬼神隂陽也故與祭祀同二肺也據下文先用祭肺後用舉肺此經先言舉肺後言祭肺者以舉肺脊長大故先言是以特牲少牢入鼎時舉肺脊在前云肺者氣之主也周人尚焉者案禮記明堂位云有虞氏祭首夏后氏祭心殷祭肝周祭肺鄭注云氣主盛也但所尚不同故云周人尚焉云脊者體之正也食時則祭之者對祭肺未食時祭也云飯必舉之貴之也者但一身之上體搃有二十一節前有肩臂臑後有肫胳脊在中央有三節正脡橫脊而取中央正脊故云體之正凡云先以對後案特牲舉肺脊後食幹骼注云肺氣之主也脊正體之貴者先食啗之所以導食通氣此不言先食㗖之從彼可知也云每皆二者夫婦各一耳者釋經多之義魚象月盈用十有五今去一取偶云凡魚之正十五而鼎减一為十四者據特牲記云魚十有五注云魚水物以頭枚數隂中之物重數於月之十有五日而盈少牢饋食禮亦云十有五而俎尊卑同則是尊卑同用十五而同鼎也云欲其敵偶也者夫婦各有七也此夫婦鬼神隂陽故同祭禮十五而去一若乎生人則與此異故公食大夫一命者七魚再命者九魚三命者十有一魚天子諸侯無文或諸侯十三魚天子十五魚也云腊兎腊也者少牢用麋腊士兎腊可知故曲禮云兎曰明視也云肫或作純純全也凡腊用全者此或少牢文案少牢腊一純注云純猶全也凡牲禮則用一胖不得云全其腊則左右體脅相配共為一體故得全名也特牲少牢亦用全士喪大歛與士虞皆用左胖不全者喪禮畧鄭以醯和醬夫妻皆有以意言之饌於房中醯醬二豆葅醢四豆鄭知以醯和醬者得醯者無醬得醬者無醯若和之則夫妻皆有是以知以醯和醬也云生人尚䙝味者此文與公食皆以醯和醬少牢特牲云不言之古者大羹不致三王以来鉶羮則致大羮湆在爨注煑肉汁也釋曰湆與汁一也知大古之羮無鹽菜者左傳桓二年臧哀伯云大羮不致禮記郊特牲云大羮不和謂不致五味故知不和鹽菜唐虞以上曰大古有此羮三王以来更有鉶羮則致以五味雖有鉶羮猶存大羮不致故也引周禮者證大羮雖熱故在爨臨食乃取也夫婦酌内尊合卺卺謂破匏尊于房户之東無𤣥酒篚在南實四爵合卺注無𤣥酒者畧之也夫婦酌於内尊其餘酌於外尊合卺破匏也四爵兩卺凡六為夫婦各三酳一升曰爵釋曰云無𤣥酒者畧之也者此對上文夫婦之尊有𤣥酒此尊非為夫婦故畧之也云夫婦酌於内尊其餘酌於外尊者據上文𤣥酒知之云一升曰爵者韓詩外𫝊云一升曰爵二升曰觚三升曰觶四升曰角五升曰散是也壻為婦主故稱主人主人爵弁纁裳緇袘從者畢𤣥端乘墨車從車二乘云主人壻也者以其親迎向女家女父稱主人男稱壻已下皆然今此未至女家仍據男家而言故云主人是壻為婦主故下親迎至男家壻還稱主人也以助祭之服親迎鬼神之注爵弁而纁裳𤣥冕之次云云云大夫以上親迎冕服者士家自祭服𤣥端助祭用爵弁今爵弁用助祭之服親迎一為攝盛則卿大夫朝服以自祭助祭用𤣥冕親迎亦當𤣥冕攝盛也若上公有孤之國孤絺冕卿大夫同𤣥冕侯伯子男無孤之國卿絺冕大夫𤣥冕也孤卿大夫士為臣卑復攝盛取助祭之服以親迎則天子諸侯為尊則衮矣不須攝盛宜用家祭之服則五等諸侯𤣥冕以家祭則親迎不過𤣥冕天子親迎當服衮冕矣是以禮記郊特牲云𤣥冕齋戒鬼神隂陽也將以為社稷主以社稷言之據諸侯而說故知諸侯𤣥冕也其於孤卿雖絺冕以助祭至於親迎亦用𤣥冕臣乃不得過君故也云冕服迎者鬼神之鬼神之者所以重之親之者郊特牲文士乘墨車有貳車昏禮攝盛天子諸侯尊不假攝盛云從者有司也乘貳車從行者也以士雖無臣其僕𨽻皆曰有司使乘貳車從壻大夫以下有貳車士無貳車此有者亦是攝也云墨車漆車者案巾車注云棧車不革鞔而漆之則士之棧車漆之但無革為異耳案考工記云棧車欲其弇鄭云無革輓又云飾車欲其侈鄭云革鞔則大夫以上皆以革鞔則得飾車之名飾者革上又有漆飾士卑無飾雖有漆不得名墨車故唯以棧車為名若然自卿以上更有異飾則又名玉金象夏篆夏縵之等也云士乘墨車攝盛也者案周禮巾車云一曰玉路以祭祀又云金路同姓以封象路異姓以封革路以封四衛木路以封蕃國孤乘夏卿乘夏縵大夫乗墨車士乘棧車庶人乘役車士乘大夫墨車為攝盛則大夫當乗卿之夏縵卿當乘孤之夏已上有木路質而無飾不可使孤乘之禮窮則同也孤還乘夏又於臣之外特置亦是尊尊則尊矣不欲攝盛若然庶人當乘士之棧車則諸侯天子尊其尊矣亦不假攝盛依巾車自乗本車矣玉路祭祀不可以親迎當乗金路矣以攝言之士之子冠與父同則昏亦同但尊適子皆與父同庶子宜降一等也士婦乘夫家之車大夫以上自有車送女婦車亦如之有裧注士妻之車夫家共之大夫以上云云釋曰婦車亦墨車但有裧為異耳云士妻之車夫家共之者即此是也云大夫以上嫁女則自以車送之者案宣公五年冬左𫝊云齊髙固及子叔姬來反馬也休以為禮無反馬而左氏以為得禮禮婦人謂嫁曰歸明無大故不反於家經書髙固及子叔姬來故譏乘行匹至也士昏皆異據士禮無反馬盖失之矣士昏禮曰主人爵弁纁裳緇袘從者畢𤣥端乘墨車從車二乘執燭前馬婦車亦如之有裧此婦乗夫家車鵲巢詩曰之子于歸百兩御之又曰之子于歸百兩將之國君之禮夫人始嫁自乘其車也何彼穠矣篇曰曷不肅雍王姬之車言齊侯嫁女以其母王姬始嫁之車逺送之則天子諸侯女嫁留其車可知今髙固大夫反馬大夫亦留其車禮雖散亡以詩論之大夫以上至天子有反馬之禮留車妻之道反馬壻之義髙固秋月逆叔姬冬來反馬則婦人三月祭行故行反馬禮也以此鄭箴膏肓言之則知大夫以上嫁女自以其車送之若然詩注以為王姬嫁時自乘其車箴膏肓以為齊侯嫁女乘其母王姬始嫁時車送之不同者彼取三家詩故與毛詩異也婦車之等及容葢之制婦車亦如之者車同等裧車裳云云釋曰凡婦車之法自士已上至孤卿皆與夫同有裧為異至于王后及三夫人并諸侯夫人皆乘翟車案周禮巾車王后之五路重翟厭翟安車皆有容盖又云翟車輦車鄭注云詩國風碩人曰翟茀以朝謂諸侯夫人始來乘翟茀之車以朝見於君盛之也此翟茀盖厭翟也然則王后始來乘重翟矣又詩序云王姬下嫁於諸侯車服不繫其夫下王后一等以此差之王后始来乘重翟則上公夫人用厭翟侯伯子男夫人用翟車若然巾車安車次厭翟在翟車之上者以其安車在宫中所乘有容盖與重翟厭翟有差退之在下其實安車無翟飾不用為嫁時所乘也三夫人與三公夫人當用翟車九嬪與孤妻同用夏世婦與卿大夫妻同用夏縵女御與士妻同用墨車也其諸侯夫人姪娣及二媵并姪娣依次下夫人以下一等為差也云裧車裳幃周禮謂之容者案巾車職重翟厭翟安車皆有容盖鄭司農云容謂幨車山東謂之裳幃或謂之童容後鄭從之衛詩云漸車帷裳是山東名幃裳也云車有容則固有盖者巾車云有容盖容盖相配之物此既有裧之容明有盖可知先言門外次入廟知廟在大門外至于門外注婦家大門之外釋曰知是大門外者以下有揖入乃至廟廟在大門内以先祖之遺體許人將告神故女父先於廟設神席乃迎壻也儀禮要義卷四
