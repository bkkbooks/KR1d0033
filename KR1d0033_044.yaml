body:
  text: 儀禮要義卷四十四宋魏了翁撰特牲饋食禮一天子大夫士以索牛羊豕此特牲諸侯之士特牲饋食禮第十五釋曰鄭知非天子之士而云諸侯之士者案曲禮云大夫以索牛士以羊豕彼天子大夫士此儀禮特牲少牢故知是諸侯大夫士也且經直云適其皇祖某子不云考鄭云祖禰者祭法云適士二廟官師一廟官師謂中下之士祖禰共廟亦兼祭祖故經舉祖兼有禰者鄭逹經意祖禰俱言也若祭無問一廟二廟皆先祭祖後祭禰是以文二年左傳云文武不先不窋子不先父是也若祭無問尊卑廟數多少皆同日而祭畢以此及少牢惟筮一日明不别日祭也此饋食自孰始無灌鬯朝踐饋獻等特牲饋食之禮不諏日釋曰自此至事畢論士將筮日之事云祭祀自孰始曰饋食饋食者食道也者案檀弓云用米貝弗忍虛也不用食道用美焉爾鄭注云食道褻米貝美若然食道是生人飲食之道孝子於親雖死事之若生故用生人食道饋之也此釋經不言祭祀而言饋食之意耳云祭祀自孰始者欲見天子諸侯饋食已前仍有灌鬯朝踐饋獻之事但饋食見進黍稷云饋孰見牲體而言天子諸侯堂上朝踐饋獻後迎尸於堂亦進黍稷牲體其犬豕牛羊亦孰之同節也云士賤職褻時至事暇可以祭則筮其日矣者此解經不諏日謂不如大夫已上預前十日與臣諏日而筮之是以鄭云不如少牢大夫先與有司於廟門諏丁巳之日也士時至事暇則祭大夫以上有攝鄭云時至事暇可以祭者若祭時至有事不得暇則不可以私廢公故也若大夫已上尊時至唯有喪故不祭自餘吉事皆不廢祭若有公事及病使人攝祭故論語孔子云吾不與祭如不祭注云孔子或出或病不自親祭使攝者為之不致肅敬於心與不祭同又祭統云是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也是君大夫有病故皆得使人攝祭若諸侯有朝會之事則不得使人攝故王制云諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿鄭注云虞夏之制諸侯嵗朝廢一時祭又明堂位云是故夏礿秋嘗冬蒸鄭注云不言春祠魯在東方東巡守以春或闕之是諸侯朝會不得攝以諸侯禮大故也案桓八年經書正月己卯蒸公羊傳云蒸者何冬祭也春曰祠夏曰礿秋曰嘗冬曰蒸常事不書此何以書譏何譏亟也亟則黷黷則不敬君子之祭也敬而不黷疏則怠怠則忘士不及兹四者則冬不裘夏不葛何休云禮本下為士制四者士有公事不得及兹四時祭者則不敢美其衣服若然則士不暇不得祭又不得使人攝大夫已上有公事乃有攝可知冠端玄玄冠玄端亦有玄冠不玄端及筮日主人冠端玄即位于門外西面注冠端云云釋曰云冠端玄玄冠玄端下言玄者玄冠有不玄端者不玄端則朝服下記云助祭者朝服不著玄端故也若然玄端一冠冠兩服也對文則玄端有纁裳玄裳黃裳雜裳若朝服緇布衣而素裳但六入為玄七入為緇大判言之緇衣亦名玄是以散文言之朝服亦名玄端故論語云端章甫鄭云端玄端也諸侯日視朝之服以端是正幅非直服稱端六冕亦有端稱故禮記魏文侯曰吾端冕而聽古樂則唯恐臥是冕服正幅亦名端也子姓子之所生小宗有四子姓兄弟如主人之服立于主人之南西面北上釋曰云子姓者子之所生者案鄭注喪大記云姓之言生也云子之所生則孫是也云小宗祭而兄弟皆來與焉者案喪服小記云繼别為宗繼禰者為小宗鄭注云小宗有四或繼高祖或繼曽祖或繼祖或繼禰皆至五世則遷若然繼禰者長者為小宗親弟等雖異宫皆來祭繼祖者從父昆弟皆來祭繼曽祖者從祖昆弟皆來祭繼高祖者族祖昆弟皆來祭是皆據小宗而言也云宗子祭則族人皆侍者此鄭據書傳而言案書傳康誥云天子有事諸侯皆侍尊卑之義注云事謂祭祀又云宗室有事族人皆侍終日大宗已侍於賔奠然後燕私注云謂卿大夫以下宗室大宗之家引禮記别子為祖繼别為大宗繼禰為小宗賔僚友助祭者若然大宗子祭一族之內來助祭引之者證經子姓兄弟若據小宗有服者若據大宗兼有絶服者也卜用龜知生數筮用蓍知成數筮人取筮于西執之東面受命于主人注云云釋曰案周禮春官有卜人筮人此士禮亦云筮人故云官名也云筮問也取其所用問神明者謂蓍也者案周禮天府云季冬陳玉以貞來嵗之美惡注云問事之正曰貞凡卜筮實問於鬼神謂卜用龜龜知生數一二三四五之神筮用蓍蓍知成數七八九六之神則此鄭云神明者也士祭曰嵗事此禫月吉祭故云某事宰自主人之左贊命命曰孝孫某筮來日某諏此某事云贊命由左為神求變者案士冠禮宰自右贊命鄭云宰有司主政教者自由也贊佐也命告也佐主人告所以筮也少儀曰贊幣自左詔辭自右此祭祀故宰自左贊命為神求吉故變於常禮也云士祭曰嵗事此言某事又不言妃者容大祥之後禫月之吉祭者案下宿賔云薦嵗事據吉祭而言又少牢吉祭云以某妃配即與士虞記云中月而禫是月也吉祭猶未配此與彼文同故知是禫月吉祭也言皇祖尊之言某子五十字與伯某異適其皇祖某子尚饗注禫月之吉祭皇君也言君祖尊之云言君祖者尊之也者天子諸侯名曽祖為皇考此士亦云皇祖故云尊之也云某子者祖字也伯子仲子者以其某在子上為男子美稱故以某為伯仲叔季五十字下篇云皇祖伯某鄭注云某祖字也不為五十字者以某在伯下士之筮者坐卦者書卦示主人筮者許諾云云注士之筮者坐蓍短由便士蓍三尺云卦者主畫地識爻爻備以方寫之者案士冠禮云筮人許諾右還即席坐西面卦者在左卒筮書卦執以示主人鄭云卒己也書卦者筮人以方寫所得之卦彼云書卦即云執以示主人則筮者書寫以示主人也此經云卒筮寫卦乃云筮者執以示主人則寫卦者非筮人長占謂長幼旅占長占卒告于主人占曰吉釋曰經直云長占知非長者一人而云長幼旅占之者士冠禮云筮人還東面旅占明此亦是長幼旅占經直云長者見從長者為始也前期三日筮尸容宿賔視濯宗人告事畢前期三日之朝筮尸如求日之儀釋曰自此盡主人退論祭前筮尸宿尸之事云三日者容宿賔視濯也者謂前期二日宿賔一日視濯是以下云厥明夕陳鼎于門外下至夙興皆祭前一日視濯之事以其夙興上事是祭前一日也宿賔又是厥明夕為期上則宿賔與視濯别日又知宿賔是祭前二日此經乃祭前三日筮尸故鄭云容宿賔視濯言容者為筮尸之後祭日之前有二日容此二事筮某之某為尸取子行無父者命筮曰孝孫某諏此某事適其皇祖某子筮某之某為尸經直云某之某鄭知字尸父而名尸者曲禮云為人子者祭祀不為尸鄭彼注云尊者之處為其失子道然則尸卜筮無父者又云卒哭乃諱則不稱名故知尸父云某是字尸既對父故某為名云連言其親庶幾其馮依之也者尸父前世與所祭之父同時同時必相識知今又筮其子為尸尸又與所祭之子相識父子皆同類故連言其親庶幾其神馮依之也云大夫士以孫之倫為尸者案祭統云夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也注云祭祖則用孫列皆取於同姓之適孫也天子諸侯之祭朝事延尸於户外是以有北面事尸之禮如是則天子諸侯宗廟之祭亦用孫之倫為尸而云大夫士者但天子諸侯雖用孫之倫取卿大夫有爵者為之故鳬鷖詩祭尸之等皆言公尸又曽子問云卿大夫將為尸於公若大夫士祭尸皆取無爵者無問成人與幼皆得為之故曽子問孔子曰祭成喪者必有尸尸必以孫孫幼則使人抱之宿尸讀作肅古文宿皆作羞乃宿尸釋曰云古文宿皆作羞壘之不從古文云凡宿或作速謂一部之內或作速者若公食大夫速賔之類是也云記作肅者曲禮云主人肅客而入是也又云周禮亦作宿者大宗伯文宿視滌濯是也是以鄭泛云或也主人於尸有子道故北面非賔不東面主人立于尸外門外子姓兄弟立于主人之後北面東上注云不東面者來不為賔客者為尸者父象也主人有子道故主人北面不為賔客不敢當尊故不東面此決冠禮宿賔主人東面此北面不同也士雖孫倫為尸猶不敢南面當尊尸如主人服出門左西面注不敢南面當尊釋曰此決少牢云主人即位於廟門外之東方南面以其大夫尊有君道故南面當尊此士之孫倫為尸雖被宿猶不敢當尊也士尸卑主人拜尸即答拜大夫之尸尊主人再拜尸答拜注主人先拜尊尸釋曰此決下文宿賔賔先拜主人乃答拜故云尊尸是以主人先拜也案少牢云吉則遂宿尸祝擯主人再拜稽首祝告曰孝孫某云云尸拜許諾祝先釋辭訖尸乃拜許此尸答拜後宗人乃擯辭者士尸卑主人拜尸即答拜不待擯辭訖大夫之尸尊尊得釋辭訖乃拜士將祭於屬吏內宿賔備三獻宿賔賔如主人服出門左西面再拜主人東面答再拜釋曰自此盡賔拜送論士將祭宿屬吏內一人為備三獻賔之事也云言吾子將臨之知賔在有司中者以其云將臨之明前筮尸在其中可知以上無戒文今宿之云吾子將涖之明知賔在有司內可知案前文有司羣執事如兄弟服東面北上鄭云士之屬吏此云賔在有司內則賔是士之屬吏可知下記云公有司門西北面東上獻次衆賔私臣門東北面西上獻次兄弟賔及衆賔行事在西階之下復似賔不在有司中者但賔是士之屬吏內言私臣據已自辟除者言公有司者亦是士之屬吏命於其君者言賔在有司中者諸在此獻者之中選以為賔又選為衆賔以下若在門外時同在門西東面北上及其入為賔及衆賔者適西階以俟行事公有司不選為賔者門西北面私臣不選為賔門東北面門外不列者以其未有事入門而列者為將行事公有司門西私臣門東二者皆無事故經不見記人乃辨之見其與於獻也少牢陳鼎在門東士卑鼎當門厥明夕陳鼎于門外北面北上有冪注厥其也云云釋曰自此盡主人拜送論祭前一日之夕視濯與視牲之事云門外北面當門也者以其經直云門外不言門之東西故知當門下篇少牢陳鼎在門東此當門者士卑避大夫故也此言實獸少牢五鼎不言獸略小棜在其南南順實獸於其上東首注順猶從也釋曰下篇云少牢牲北首東上司馬刲羊司士擊豕宗人告備乃退不言獸少牢五鼎明有獸可知不言之者已有二牲略其小者故不言之也案士虞記陳牲於廟門外北首西上鄭注云言牲臘在其中西上變吉此亦其西北首東足與彼文同彼云變吉者彼牲云北首西上明臘亦北首可知此實獸於上東首不與牲相統故云變吉小物全乾曰臘魚臘亦云獸云獸臘也者特牲鼎有豕魚臘案周禮臘人鄭注云小物全乾為臘故知豕云牲魚水物云獸是臘可知大夫士直有東房西堂西夾之前近南即西相豆籩鉶在東房南上几席兩敦在西堂釋曰大夫士直有東房西室若言房則東房矣故士冠禮陳服于房中西牖下東領北上不言東又昏禮側尊甒醴于房中亦不言東如此之類皆不言東以其直有一房不嫌非東房故不言東今此經特言東房明房內近東邉故云東房也夾室半以南為之以壁外相望則當夾北也又與少牢籩豆所陳相反少牢近于西方此經則房中之東也言當夾北者以其夾室在房近南東故云房中之東當夾北也云西堂西夾之前近南耳者案爾雅注夾室前堂謂之廂此在西堂在西廂有司徹衆賔答一拜此士賤衆賔答再拜主人再拜賔答再拜三拜衆賔衆賔答再拜釋曰云旅之得備禮者謂衆賔無問多少總三拜之旅衆也衆賔共得三拜故云旅之也衆賔再拜者士賤衆賔得備禮案有司徹主人降南面拜衆賔于門東三拜衆賔門東北面皆答一拜注云言三拜者衆賔賤旅之也衆賔一拜賤也卿大夫尊賔賤純臣也經云皆答一拜明人人從上至下皆一一獨答拜以其純臣故也所以不再拜者避國公故也此士賔莫問多少皆得一時再拜以其士賤衆賔得備禮故也少牢告旦明行事此重勞賔告羮飪請期曰羮飪釋曰案少牢云宗人曰旦明行事此不云旦明行事而云羮飪者彼大夫尊有君道可以豫勞賔故云時節此士卑無君道故不云旦明而云羮飪是以鄭云重豫勞賔羮飪乃來也云宗人既得期西北面告賔有司者此案少牢云主人門東南面宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事祭者朝服緣孝子欲得嘉賔事禰祖夙興主人服如初立于門外東方南面視側殺釋曰自此盡於中庭論祭日夙興主人主婦陳設及行位之事云主人服如初則其餘有不玄端者案下記云特牲饋食其服皆朝服玄冠緇帶緇韠注云於祭服此也皆者謂賔及兄弟筮日筮尸視濯亦玄端至祭而朝服朝服者諸侯之臣與其君日視朝之服大夫以祭今賔兄弟緣孝子欲得嘉賔尊客以事其祖禰故服之緇韠者下大夫之臣夙興主人服如初則固玄端是也鄭云其餘有不玄端者明亦有著玄端者是以下記人辨之云唯尸祝佐食玄端玄裳黃裳雜裳可也皆爵韠鄭注云與主人同服是有同服者有著朝服者故鄭云其餘有不玄端者天子諸侯有射牲大夫士不親殺案少牢主人即位於廟門之外司馬刲羊司士擊豕皆主人不視殺案楚語云諸侯宗廟之事必自射其牲刲羊擊豕又司弓矢云凡祭祀共射牲之弓矢注云射牲示親殺也殺牲非尊者所親唯射為可又國語云禘郊之事天子必自射其牲玉藻云凡有血氣之類君子弗身踐也者據凡常非祭祀天子尊於郊射牲諸侯降天子故宗廟亦親殺大夫士不敢與君同故視之而不親殺之側殺殺一牲者案冠禮云側尊一甒體在服北鄭注云側猶特也無偶曰側以其無玄酒是以少牢云司馬刲羊司士擊豕以其二牲不云側也主婦視饎爨於西堂下明自為之主婦視饎爨于西堂下釋曰知宗婦為之者以經言主婦視饎爨明主婦自為也是以下記云宗婦贊薦者執以坐于户外授主婦尸卒食而祭饎爨鄭以祭饎爨用黍而已是宗婦為之可知也云爨竈也者周公制禮之時謂之爨至孔子時謂之竈故論語王孫賈云與其媚於奧寧媚於竈是孔子時為竈也云西堂下者堂之西下也者以其為爨不可正在堂下當逼西壁為之故云堂之西下近西壁也又知南齊于坫者案既夕記云設棜于東堂下南順齊于坫明在東西堂下皆齊于坫可知又鄭下注引舊説云南北直屋梠稷在南是也案少牢云雍人溉鼎匕爼于雍爨雍爨在門東南北上廩人溉甒甗匕與敦於廩爨廩爨在雍爨之北廩爨既在門外不見主婦有視文主婦未知視之以否主婦視饎爨猶主人視殺牲故易歸妹上六云女承筐無實士刲羊無血鄭注宗廟之禮主婦奉筐米如饎之時兼視之可知亨豕魚臘以鑊各一爨亨煮也煮豕魚臘以鑊各一爨釋曰知用鑊者下少牢云羮定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西吉祭有致爵故主人主婦執事有爼執事之爼陳于階間二列北上注執事至於神釋曰鄭知經執事之爼祝主人主婦亦存焉者見士虞記祝爼陳於階間敦東彼虞不致爵故見主人主婦爼明此吉祭有致爵主人主婦陳於階間可知以主婦亦是執事之人也若然少牢主人主婦無爼者以三獻禮成别為儐尸正祭無致爵故主人主婦無爼儐尸行三獻致爵乃有爼下大夫不儐尸者亦於三獻尸爵止行致爵乃有爼也云不升鼎者異於神者前爼升鼎而入設於階前此鼎在門外不入而言陳於階間二列故知不升鼎尸盥匜不就洗不揮尸盥匜水實于槃中注尸尊不就洗又不揮釋曰云不揮者揮振去水使手乾今有巾故不揮也是以僖二十三年左氏傳云公子重耳在秦秦伯納女五人懷嬴與焉奉匜沃盥既而揮之懷嬴怒是也姑未老自為主婦老則子妻為主婦主婦纚笄宵衣立于房中南面注主人之妻云云釋曰云雖姑存猶使之主祭祀者謂姑老不堪祭祀故姑存猶使之主祭祀也云纚者謂若士冠禮廣終幅長六尺笄安髮之笄非冠冕之笄云宵綺屬也此衣染之以黑其繒本名曰宵者謂此宵衣是綾綺之屬鄭注內司服云男子之禒衣黑則是亦黑也以其士喪禮有禒衣與士冠玄端為一玄端黑是男子禒衣亦黑則此婦人宵衣亦黑可知其玄則黑之類也故鄭引玉藻君子狐青裘玄宵衣以禓之證婦人玄宵衣亦黑也云其繒本名宵者此字據形聲為綃從絲省聲但詩及禮記儀禮皆作宵字云凡婦人助祭者同服也者經及記不見主婦及宗婦異服之文故知同服對男子助祭祝佐食等與主人服異也少牢云主婦贊者一人亦髮鬄衣侈𬒮與主婦同其餘雖不侈𬒮同亦宵衣可知依內司服天子諸侯王后以下助祭皆不同者人君尊卑差等大夫士卑服窮則同也引內則者彼舅沒時年七十已上姑雖存年六十已上而當傳之家事故子之妻代姑祭雖代姑每事必請於姑引之者證經主婦而含姑未老自為主婦姑老則子妻為主婦也特牲吉禮主人行事由阼階佐食佐尸食佐食北面立于中庭注佐食賔佐尸食者云云案下記云佐食當事則户外南面無事則中庭北面據此而言則此經謂無事時也云立于宗人之西者案士虞禮云主人及兄弟賔即位於西方如反哭位注引既夕禮云反哭入門升自西階東面經又云宗人西階前北面注云當詔主人此特牲吉禮主人行事由阼階宗人亦在阼階南擯主人佐食北面於中庭明在宗人之西可知儀禮要義卷四十四
