body:
  text: 儀禮要義卷三十三宋魏了翁撰䘮服經傳六小功三月而變麻就葛凡五月小功成人章小功布衰裳牡麻絰即葛五月注即就也小功輕三月變麻因故衰以就葛絰帶而五月也間傳曰小功之葛與緦之麻同舊說小功以下吉屨無絇也釋曰此是小功成人章輕於殤小功故次之此章有三等正降義其衰裳之制澡絰等與前同故略也云即葛五月者以此成人文縟故有變麻從葛故云即葛但以日月為足故不變衰也不列冠屨承上大功文略小功又輕故亦不言也言日月者成人文縟故具言也云即就也者謂去麻就葛也引間傳欲見小功有變麻服葛法既葬大小同故變同之也引舊說云小功以下吉屨無絇也者以小功輕非直䘮服不見屨諸經亦不見其屨以輕略之是以引舊說為證絇者案周禮屨人職屨舄皆有絇繶純純者於屨口縁繶者牙底接處縫中有絛絇者屨鼻頭有飾為行戒吉時有行戒故有絇䘮中無行戒故無絇以其小功輕故從吉屨為其大飾故無絇也從祖祖父母從祖父母從祖昆弟從祖祖父母從祖父母報從祖昆弟釋曰此亦從尊向卑故先言從祖祖父母以上章已先言父次言祖次言曾此從祖祖父母是曾祖之子祖之兄弟故次之是以鄭言祖父之昆弟之親者云從祖祖父母者是從祖祖父之子是父之從父昆弟之親故鄭并言祖父之昆弟之親云報者恩輕欲見兩相為服故云報也從祖昆弟是從祖父之子故鄭云父之從父昆弟之子已之再從兄弟此上三者為三小功也姊妹逆降故亦逆降報不分在出從父姊妹注父之昆弟之女釋曰此謂從父姊妹在家大功出適小功不言出適與在室姊妹既逆降宗族亦逆降報之故不辨在室及出嫁也孫適人者以女孫在室與男孫同大功故出適小功也為人後者為姊妹適人小功為人後者為其姊妹適人者釋曰云不言姑者舉其親者而恩輕者降可知案詩云問我諸姑遂及伯姊注云先姑後姊尊姑也是姑尊而不親姊妹親而不尊外親不過緦今言為外祖父母小功為外祖父母釋曰發問者是傳之不得决此以云外親之服不過緦今乃小功故發問云加也者以言祖者祖是尊名故加至小功言為者以其母之所生情重故言為猶若衆子恩愛與長子同退入期故特言為衆子從母丈夫婦人報謂從母之男女從母丈夫婦人報注從母母之姊妹釋曰母之姊妹與母一體從於己母而有此名故曰從母言丈夫婦人者母之姊妹之男女與從母兩相為服故曰報云丈夫婦人者馬氏云從母報姊妹之子男女也丈夫婦人者異姓無出入降若然是皆成人長大為號外親無過緦從母有母名加至小功傳曰何以小功也以名加也外親之服皆緦也注外親異姓正服不過緦丈夫婦人姊妹之子男女同釋曰云以名加也者以有母名故加至小功云外親之服皆緦也者以其異姓故云外親以本非骨肉情䟽故聖人制禮無過緦也言此者見有親與母名即加服之意耳注云外親異姓者從母與姊妹子舅與外祖父母皆異姓故總言外親也夫為姑姊妹期妻於在適皆降小功夫之姑姊妹娣姒婦報釋曰夫之姑姊妹夫為之期妻降一等出嫁小功因恩䟽略從降故在室及嫁同小功若此釋恐謂未當報然文不為娣姒設以其娣姒婦兩見更相為服自明何言報也既報字不為娣姒其報於娣姒上者以其於夫之兄弟使之遠别故無名使不相為服要娣姒婦相為服亦因夫而有故娣姒婦下云報使娣姒上蒙夫字以冠之也注以穉為娣長為姒䟽以年大小不據夫傳曰云云何以小功也以為相與居室中則生小功之親焉傳云娣姒婦者弟長也者此二字皆以女為形以弟為聲則據二婦立稱謂年小者為娣故云娣弟是其年㓜也年大者為姒故云姒長是其年長假令弟妻年大稱之曰姒兄妻年小稱之曰娣是以左氏傳穆姜是宣公夫人大婦也聲伯之母是宣公弟叔肹之妻小婦也聲伯之母不聘穆姜云吾不以妾為姒是據二婦年大小為娣姒不據夫年為大小大夫大夫子公昆弟為大功者降小功大夫大夫之子公之昆弟為從父昆弟庶孫姑姊妹女子子適士者釋曰從父昆弟庶孫本大功此三等以尊降入小功姑姊妹女子子本期此三等出降入大功若適士又降一等入小功也此等以重出其文姑姊妹又以再降故在此鄭云從父昆弟及庶孫亦謂為士者以經女子子下總云適士鄭恐人疑故鄭别言之以其從父昆弟及庶孫已見於大功章為庶婦小功夫不可立者亦然庶婦注夫将不受重者釋曰經云於支庶舅姑為其婦小功鄭云夫将不受重則若䘮服小記注云世子有廢疾不可立而庶子立其舅姑皆為其婦小功則亦兼此婦也妾子為君母之父母從母如適子君母之父母從母釋曰此亦謂妾子為適妻之父母及君母姊妹如適妻子為之同也何以發問者以既不生已母又非骨肉怪為小功故發問也荅云不敢不從服者言無情實但畏敬故云不敢不從服也云君母不在者或出或死故直云不在容有數事不在也鄭云不敢不服者恩實輕也者以解不敢意也云如適子者則如適妻之子非正適長而據君母在而云如若君母不在則不加若然君母在既為君母父母其已母之父母或亦兼服之若馬氏義君母不在乃可申矣注君母父之適妻從母君母之姊妹君子子謂大夫及公子之適妻子君子子為庶母慈已者釋曰鄭云君子子者大夫及公子之適妻子者禮之通例云君子與貴人皆據大夫已上公子尊卑比大夫故鄭據而言焉又國君之子為慈母無服士又不得稱君子亦復自養子無三母具故知此二人而已必知適妻子者妾子賤亦不合有三母故也貴人子父在為三母慈已服小功傳曰為庶母何以小功也釋曰發問者以諸侯與士之子皆無此服唯此貴人大夫與公子之子猶有此服故發問也荅云慈已加也故以緦麻上加至小功也云君子子者則父在也者以其言子繼於父故云父在且大夫公子不繼世身死則無餘尊之厭如凡人則無三母慈已之義故知父在也云父没則不服之矣者以其無餘尊雖不服小功仍服庶母緦麻也如士禮故鄭又云以慈已加則君子子以士禮為庶母緦也是其本為庶母緦麻也内則已下至非慈母也皆内則文彼文承國君與大夫士之子生之下鄭彼注云為君養子之禮今此鄭所引證大夫公子養子之法以其大夫公子適妻亦得立三母故也云異為孺子室於宫中者鄭注云特掃一處以處之更不别室還於側室生子之處也云擇於諸母與可者諸母謂父之妾即此經庶母者也云可者彼注云可者傅御之屬也謂母之外别有傅母御妾之等有徳行者可以充三母也有庶母慈母保母食母即乳母云必求其寛裕慈惠温良恭敬慎而寡言者彼注云子師教示以善道者云其次為慈母彼注云慈母知其嗜欲者徳行稍劣者為慈母即此經慈母是也又云其次為保母者徳行又劣前者為保母彼注云保母安其居處者云皆居子室者以皆是子母是以居子之室也云他人無事不往者彼注云為兒精氣微弱將驚動也又云大夫之子有食母者彼注云選於傅御之中䘮服所謂乳母也案下章云乳母注云謂養子者有他故賤者代之慈已者若然大夫三母之内慈母有他故使賤者代慈母養子謂之乳母死則服之三月與慈母服異引之者證三母中又有此母也君與士皆無此事云庶母慈已者此之謂也者謂此經庶母慈已則内則所云之謂也云其可者賤於諸母謂傅姆之屬也者傅姆謂女師鄭注昏禮云姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母矣鄭注云内則云可者傅御之屬與此注不同者無正文故注有異相兼乃具云其不慈已則緦可矣者覆解子為三母之服謂諸母也傳云以慈已加若不慈已則不加明本當緦也云不言師保慈母居中服之可知也者周公作經舉中以見上下故知皆服之矣云國君世子生卜士之妻大夫之妾使食子三年而出見于公宫則劬非慈母者引此者彼既總據國君與鄉大夫士養子法向來所引唯據大夫與公子養子法故更見國君養子之禮但國君子之三母具如前説三母之外别有食子者二者之中先取士妻無堪者乃取大夫妾不并取之案彼注謂先有子者以其須乳故也劬勞三年子大出見公宫則勞之以束帛此經慈母以其無服故也知國君子於三母無服者案曾子問孔子曰古者男子外有傅内有慈母君命所使教子也何服之有以此而言則知天子諸侯之子於三母皆無服也云士之妻自養其子者此亦内則文取之者以其君大夫養子已具故因論士之養子法彼注云賤不敢使人也緦麻布衰裳麻絰帶不言衰絰略緦麻三月緦麻三月者釋曰此章五服之内輕之極者故以緦如絲者為衰裳又以澡治莩垢之麻為絰帶故曰緦麻也三月者凡䘮服變除皆法天道故此服之輕者法三月一時天氣變可以除之故三月也云緦麻布衰裳者緦則絲也但古之緦絲字通用故作緦字直云而麻絰帶也案上殤小功章云澡麻絰帶况緦服輕明亦澡麻可知云不言衰絰略輕服省文者據上殤小功言絰帶故成人小功於此緦麻有絰帶可知治縷如絲曰緦謂之錫者治布不治縷云緦者十五升抽其半者以八十縷為升十五升千二百縷抽其半六百縷縷麤細如朝服數則半之可謂緦而䟽服最輕故也云有事其縷無事其布曰緦者案下記云大夫弔於命婦錫衰傳曰錫者十五升抽其半無事其縷有事其布曰錫鄭注云謂之錫者治其布使之滑易也不錫者不治其縷哀在内也緦者不治其布哀在外若然則二衰皆同升數但錫衰重故治布不治縷哀在内故也此緦麻衰治縷不治布哀在外故也云謂之緦者治其縷細如絲也者以其麤細與朝服十五升同故細如絲也云或曰有絲者有人解有用絲為之故云緦又曰朝服用布何衰用絲乎者此鄭以義破或解朝服謂諸侯朝服緇布衣及天子朝服皮弁服白布衣皆用布至於䘮衰何得反絲乎故不可也引雜記緦冠繰纓者以其斬衰纓纓重於冠齊衰已下纓纓與冠等上傳曰齊衰大功冠其受也緦麻小功冠其衰也則此云緦冠者冠與衰同用緦布但繰纓者以灰繰治布為纓與冠别以其冠與衰皆不治布纓則繰治以其輕故特異於上也族曾祖父母祖父母父昆弟凡四緦麻禮記大傳云四世而緦服之窮也名為四緦麻者也經云族曾祖父母者已之曾祖親兄弟也云族祖父母者已之祖父從父昆弟也云族父母者已之父從祖昆弟也云族昆弟者已之三從兄弟皆名為族族屬也骨肉相連屬以其親盡恐相䟽故以族言之耳云祖父之從父昆弟之親者欲推出髙祖有服之意也以已之祖父與族祖父相與為從昆弟族祖父與已之祖俱是髙祖之孫此四緦麻又與己同出髙祖已上至髙祖為四世旁亦四世旁四世既有服於髙祖有服明矣鄭言此者舊有人解見齊衰三月章直見曾祖父母不言髙祖以為無服故鄭從下鄉上推之髙祖有服可知上章不言者鄭彼注髙祖曽祖皆有小功之差服同故舉一以見二也然則又云族祖父者鄭意以族祖父者上連祖父之從父昆弟為義句也故下亦髙祖之孫也明已之祖父即髙祖之正孫族祖父髙祖之旁孫也中殤從下經無單言中殤此誤庶孫之婦緦者以其適子之婦大功庶子之婦小功適孫之婦小功庶孫之婦緦是其差也云庶孫之中殤注云庶孫者成人大功其殤中從上者則長中殤皆入小功章中故云此當為下殤言中殤者字之誤爾又諸言中者皆連上下也者謂大功之殤中從上小功緦麻之殤中從下謂中殤之内無單言殤者此經單言中殤故知誤宜為下也此本服小功或出適或長殤降緦從祖姑姊妹適人者報從祖父從祖昆弟之長殤釋曰此一經皆本服小功是以此經或出適或長殤降一等皆緦麻云不見中殤者中從下者以其小功之殤中從下故也其云從祖父長殤謂叔父者也女外適所生曰外云外孫者以女出外適而生故云外孫大功之下殤皆降緦從父昆弟成人大功長中殤在小功故下殤在此章也姪者為姑之出降大功長中殤小功故下殤在此也夫之叔父成人大功長殤在小功故中下殤在此以下傳言之婦人為夫之族類大功之殤中從下從母與姊妹子兩相為服故云報從母之長殤報釋曰從母者母之姊妹成人小功故長殤在此中下之殤則無服故不言云報者以其䟽亦兩相為服也案小功章己見從母報服此殤又云報者以前章見兩俱成人以小功相報此章見從母與姊妹子亦俱在殤死相為報服故二章並言報庶子為父後為其母緦不敢服私親庶子為父後者為其母釋曰此為無冡適唯有妾子父死庶子承後為其母緦也傳發問者怪其親重而服輕故問引舊傳者子夏見有成文引以為證云與尊者為一體者父子一體如有首足者也云不敢服其私親也者妾母不得體君不得為正親故言私親也云然則何以服緦也又發此問者前答既云不敢服其私親即應全不服而又服緦何也答曰有死於宫中者則為之三月不舉祭因是以服緦也者云有死宫中者縱是臣僕死於宫中亦三月不舉祭故此庶子因是為母服緦有死即廢祭者不欲聞凶人故也君卒庶子為母大功大夫庶子三年士無厭注君卒至衆人釋曰云君卒庶子為母大功者大功章云公之庶昆弟為其母是也以其先君在公子為母在五服外記所云是也先君卒則是今君庶昆弟為其母大功先君餘尊之所厭不得過大功今庶子承重故緦云大夫卒庶子為母三年也者以其父在大功父卒無餘尊所厭故伸三年士雖在庶子為母皆如衆人者士卑無厭故也鄭并言大夫士之庶子者欲見不承後者如此服若承後則皆緦故并言之也向來經傳所云言據大夫士之庶子承後法若天子諸侯庶子承後為其母所服云何案曾子問云古者天子練冠以燕居鄭云謂庶子王為其母無服案服問云君之母非夫人則羣臣無服唯近臣及僕驂乗從服唯君所服服也注云妾先君所不服也禮庶子為後為其母緦言唯君所服伸君也春秋之義有以小君服之者時若小君在則益不可據彼二文而言曾子問所云據小君在則練冠五服外服問所云據小君没後其庶子為得伸故鄭云伸君是以引春秋之義母以子貴若然則天子諸侯禮同與大夫士禮有異也士為庶母緦大夫以上無服士為庶母釋曰上下體例平文皆士若非士則顯其名位傳云大夫已上為庶母無服則為庶母是士可知而經云士者當云大夫已上不服庶母庶人又無庶母為庶母服者唯士而已故詭例言士也獨士有服故發問答云以名服也以有母名故有服云大夫以上為庶母無服者以其降故無服貴臣貴妾謂公士大夫之家相姪娣貴臣貴妾釋曰此貴臣貴妾謂公士大夫為之服緦發問者以臣妾言不應服故發問之也答云以其貴也以非南靣故簡貴者服之也注云此謂公士大夫之君也者若士則無臣又不得簡妾貴賤天子諸侯又以此二者無服則知為此服者是公卿大夫之君得殊其臣妾貴賤而為之服也云貴臣室老士也者上斬章鄭已注云室老家相也士邑宰也云貴妾姪娣也者案曲禮云大夫不名家相長妾士昬禮云雖無娣媵先是士姪娣不具卿大夫有姪娣為長妾可知故以貴妾姪娣也云天子諸侯降其臣妾無服者以其絶期以下故也云士卑無臣者孝經以諸侯天子大夫皆云爭臣士有爭友是士無臣也云妾又賤不足殊也云有子則為之緦無子則已者䘮服小記文乳母即食母有母名故服緦乳母釋曰案内則云大夫之子有食母彼注亦引此云䘮服所謂乳母以天子諸侯其子有三母具皆不為之服士又自養其子若然自外皆無此法唯有大夫之子有此食母為乳母獨大夫之子有之故發問也答以名服有母名即為之服緦也族父母為從祖昆弟緦從祖昆弟之子注族父母為之服釋曰云從祖昆弟之子者據已於彼為再從兄弟之子云族父母為之服者據彼來呼已為族父母為之服緦也經唯言曾祖孫不言髙祖𤣥孫曾孫注孫之子釋曰據彼曾祖為之緦不言𤣥孫者此亦如齊衰三月章直見曾祖不言髙祖以其曾𤣥為曾髙同曾髙亦為曾孫𤣥孫同故二章皆略不言髙祖𤣥孫也女謂昆弟子為姪姪之子曰歸孫父之姑注歸孫為祖父之姊妹釋曰案爾雅云女子謂晜弟之子為姪謂姪之子為歸孫服從母昆弟緦亦以名服從母昆弟傳曰以名服也釋曰傳問者怪外親輕而有服者答云以名服者因從母有母名而服其子故云以名服也必知不因兄弟名以其昆弟非尊親之號是以上小功章云為從母小功云以名加也為外祖父母以尊加也因舅有甥之稱相為服緦甥注姊妹之子釋曰發問者五服未有此名故問之答云謂吾舅者吾謂之甥以其父之昆弟有世叔之名母之昆弟不可復謂之世叔故名為舅舅既得别名故謂姊妹之子為甥亦為别稱報之者甥既服舅以緦舅亦為甥以緦壻從妻而服妻之父母故報以緦壻注女子子之夫也傳曰何以緦報之也釋曰發問之者怪女之父母為外親女夫服答云報之者壻既從妻而服妻之父母妻之父母遂報之服前疑姪及甥之名而發問此不疑壻而發問者姪甥本親而疑異稱故發問而壻本是䟽人宜有異稱壻與妻父母連文明從服妻之父母傳曰從服也注從於妻而服之釋曰傳曰發問者亦怪外親而有服答云從服故有此服若然上言甥不次言舅此言壻次即言妻之父母者舅甥本親不相報故在後别言舅此壻本疏恐不是從服故即言妻之父母也姑子為外兄弟與内兄弟相為服姑之子注外兄弟也釋曰姑是内人以出外而生故曰外兄弟傳發問者亦疑外親而服之故問也答云報之者姑之子既為舅之子服舅之子復為姑之子兩相為服舅雖從服以母之親不得言報舅注母之兄弟傳曰從服也注從於母而服之釋曰傳發問者亦疑於外親而有服答從服者從於母而服之不言報者既是母之懐抱之親不得言報舅子為内兄弟從母而服舅之子注内兄弟也傳曰從服也釋曰云内兄弟者對姑之子云舅之子本在内不出故得内名也傳發問者亦以外親服之故問也答云從服者亦是從於母而服之不言報者為舅既言從服其子相於亦不得言報也夫小功者妻緦麻凡言報兩相服夫之姑姊妹之長殤夫之諸祖父母報注諸祖父者夫之所為小功從祖祖父母外祖父母或曰曾祖父母曾祖於曾孫之婦無服而云報乎曾祖父母正服小功妻從服緦釋曰夫之姑姊妹成人婦為之小功長殤降一等故緦麻也云諸祖父者夫之所為小功者妻降一等故緦麻者以其本䟽兩相為服則生報名云從祖祖父母外祖父母者此依小功章夫為之小功者也云或曰曾祖父母者或人解諸祖之中兼有夫之曾祖父母凡言報者兩相為服曾祖為曾孫之婦無降服何得云報乎鄭破或解也云曾祖父母正服小功妻從服緦者此鄭既破或解更為或人而言若今本不為曽祖齊衰三月而依差降服小功其妻降一等得有緦服今既齊衰三月明曰為曾孫妻無服君母之姊妹兄弟或云從母或不云舅君母之昆弟釋曰前章不云君母姊妹而云從母者以其上連君之父母故也此昆弟單出不得直云舅故云君母之昆弟也君母故從於君母服緦也云君母在則不敢不從服君母卒則不服也君母昆弟從服與君母之父母故亦同取上傳解之也皆徒從故所從亡則已夫不服而妻服以同室生緦之親從父昆弟之子之長殤昆弟之孫之長殤為夫之從父昆弟之妻傳曰何以緦也以為相與同室則生緦之親焉長殤中殤降一等下殤降二等齊衰之殤中從上大功之殤中從下注同室者不如居室之親也齊衰大功皆服其成人也大功之殤中從下則小功之殤亦中從下也此主謂妻為夫之親服也凡不見者以此求之釋曰從父昆弟之子之長殤昆弟之孫之長殤此二人本皆小功故長殤在緦麻中殤從下殤無服夫之從父昆弟之妻同堂娣姒降於親娣姒故緦也傳曰何以緦發問者以本路人夫又不服之今相為服故問之答云以為相與同室則生緦之親焉者以大功有同室同財之義故云相與同室則生緦之親焉云同室者不如居室之親也者言同室者直是舍同未必安坐言居者非直舎同又是安坐以上小功章親娣姒婦發傳而云相與居室此從父昆弟之妻相為即云相與同室是親䟽相並同室不如居室中故輕重不等無殤在齊衰齊衰之殤亦中從上云齊衰大功皆服其成人也者以其無殤在齊衰之服明據成人齊衰既是成人明大功亦是成人可知也云大功之殤中從下則小功之殤亦中從下者則舉上以明下上殤大功注云大功之殤中從上則齊衰之殤亦中從上彼注舉下以明上皆是省文云凡不見者以此求之者以其婦人為夫之親從夫服而降一等而經傳不見者以此求也儀禮有記記經不備記釋曰儀禮諸篇有記者皆是記經不備者也作記之人其䟽已在士冠公子為母不得伸權制服妻又輕公子為其母練冠麻麻衣縓縁為其妻縓冠葛絰帶麻衣縓縁皆既葬除之注公子君之庶子也其或為母謂妾子也麻者緦麻之絰帶也此麻衣者如小功布深衣為不制衰裳變也詩云麻衣如雪縓淺絳也一染謂之縓練冠而麻衣縓縁三年練之受飾也檀弓曰練練衣黄裏縓縁諸侯之妾子厭於父為母不得伸權為制此服不奪其恩也為妻縓冠葛絰帶妻輕釋曰云練冠麻麻衣縓縁者以練布為冠麻者以麻為絰帶又云麻衣者謂白布深衣云縓縁者以繒為縓色與深衣為領縁為其妻縓冠者以布為縓色為冠葛絰帶者又以葛為絰帶云麻衣縓縁者與為母同皆既葬除之者與緦麻所除同也云公子君之庶子也則君之適夫人第二已下及公妾子皆名庶子云其或為母謂妾子也者以其適夫人所生第二已下為母自與正子同故知為母妾子也云麻者緦麻之絰帶也者以經有二麻上麻為首絰腰絰知一麻而含二絰者斬衰云苴絰鄭云麻在首在腰皆曰絰故知此經亦然知如緦之麻者以其此言麻緦麻亦云麻又見緦服弔服環絰鄭云大如緦之絰則此云子為母雖在五服外絰亦當如緦之絰故鄭以此麻兼緦言之麻衣如小功布深衣不制衰裳云此麻衣者如小功布深衣者案士之妾子父在為母朞大夫之妾子父在為母大功則諸侯妾子父在小功是其差次故知此當小功布也云為不制衰裳變也者此記不言衰明不制衰裳變者以其為深衣不與䘮服同故云變也詩云麻衣如雪者彼麻衣及禮記檀弓云子游麻衣并間傳云大祥素縞麻衣注皆云十五升布深衣與此小功布深衣異引之者證麻衣之名同取升數則異禮之通例麻衣與深衣制同但以布縁之則曰麻衣以采縁之則曰深衣以素縁之袖長在外則曰長衣又以采縁之袖長在衣内則曰中衣又以此為異也皆以六幅破為十二幅連衣裳則同也君所為服子亦服謂正統不降傳曰何以不在五服之中也曰君之所為服子亦不敢不服也注謂君之正統者也注云君之所不服謂妾與庶婦也者解傳意還釋上公子為母與妻者也云君之所為服謂夫人與適婦也者正統故不降也云諸侯之妾貴者視卿賤者視大夫皆三月而葬者大戴禮文鄭不於上經葬之下注之至於此傳下乃别之者鄭意注傳云君之所不服謂妾與庶婦也下乃解妾有貴賤葬有早晚故至此引之見此意也謂妾貴者謂諸侯一娶九女夫人與左右媵各有姪娣二媵與夫人之娣三人為貴妾餘五者為賤妾下又引齊王子有其母死云所為後兄弟之子言報兩相為服為人後者為兄弟降一等報於所為後之兄弟之子若子釋曰謂支子為大宗子後反來為族親兄弟之類降一等云於所為後之兄弟之子若子者此等服其義已見於斬章云云報者嫌其為宗子不降者以其出降本親又宗子尊重恐本親為宗子有不敢降服之嫌故云報以明之言報是兩相為服者也不及知父母謂遺腹或㓜孤於兄弟加一等兄弟皆在他邦加一等不及知父母與兄弟居加一等釋曰云在他邦加一等者二人共在他國一死一不死相愍不得辭於親眷故加一等也云不及知父母與兄弟居加一等者謂各有父母或父母有早卒者與兄弟共居而死亦當愍其孤㓜相育特加一等云皆在他邦謂行仕者孔子身行七十二國不見仕者以古者有出他國之法故云行仕也又云出遊者謂若孔子弟子朋友同周遊他國兄弟容有死者又云若辟仇者周禮調人云從父昆弟之仇不同國兄弟之仇辟諸千里之外皆有兄弟共行之法也云不及知父母父母早卒者或遺腹子或㓜小未有識知而父母早死者也此經兄弟謂小功以下若大功以上不可加傳曰何如則可謂之兄弟傳曰小功以下為兄弟釋曰發問者上經及記已有兄弟皆是降等唯此兄弟加一等故怪而致問引舊傳者以有成文故引之云小功已下為兄弟者以其加一等故也鄭云於此發兄弟傳者嫌大功以上又加也者鄭亦據於此兄弟加一等發傳者嫌大功已上親則親矣又加之故於小功發傳也云大功以上若皆在他國則親自親矣者不可復加者也云若不及知父母則固同財矣者據經不及知父母與兄弟居既親重則財食是同雖無父母恩自隆重不可復加也儀禮要義卷三十三
