body:
  text: 儀禮要義卷二十三宋魏了翁撰聘禮五君使卿皮辨詣館還王相厲之義釋曰自此盡賓送不拜論主君使卿詣館還玉及報享之事云玉圭也者舉聘君之圭云君子於玉比德焉以之聘重禮也并相切厲之義並聘義文案聘義云天子制諸侯比年小聘三年大聘相厲以禮又云已聘而還圭璋此輕財而重禮之義又云夫昔者君子比德於玉焉是其義也云還之者德不可取于人相切厲之義也者相切磋相磨厲以德而尊天子故用之也云皮辨者始以此服受之不敢不終也者始謂受聘享在廟時今還以皮辨還玉是終之也大夫入賓不拜迎不純為主賓皮辨襲迎于外門外不拜帥大夫以入釋曰云帥大夫以入者大夫即卿卿亦大夫也云將去不純為主也者客在館如主人卿往如賓今不拜迎是不純為主也決上君使卿歸饔餼時賓拜迎是純為主人賓受禮歸餼皆階上聽命唯此碑內賓自碑內聽命升自西階自左南面受圭退負右房而立云聽命於下敬也者此決賓受禮時公用束帛賓西階上聽命歸饔餼時賓阼階上聽命此特於下聽命故云敬也云自左南面右大夫且並受也者以鄉飲酒獻酢之時授者在右受者在左故右大夫也且並受者欲取如向君前然也云退為大夫降逡遁者以大夫降為之逡遁而退因即負右房南面而立大夫士直有東房西室天子諸侯左右房今不在大夫廟於正客館故有右房也大夫賄賓用束紡即漢時素紗賓禓迎大夫賄用束紡釋曰此則未知何用之財若是報享之物不應在禮玉之上今言此束紡者以其上圭璋是彼國之物下云禮玉束帛報聘君之享物彼君厚禮於此此亦當厚禮於彼故將加此束紡是以鄭云相厚之至也云賄豫人財之言也者案下記云賄在聘于賄又云無行則重賄反幣鄭注周禮云布帛曰賄鄭注周禮內司服亦云素紗者今之白縛也則此束紡者素紗也故據漢法況之主君以玉束帛乘皮報聘君之享禮玉束帛乘皮釋曰云禮禮聘君也者此謂報享之物以其彼持享物來禮此主君此主君亦以物禮彼君故云禮禮聘君也云所以報享也者彼以物享此君此君亦以物享彼君上文聘賓行享之時束帛加璧束錦加琮今報享物亦有璧琮致之故云亦言玉璧可知此玉則琮也以其經言玉故以玉言之若然經言束帛兼有束錦矣案下記云賄在聘于賄又云無行則重賄反幣則此禮也賓將發主君就館拜謝賓辟不受公館賓賓辟釋曰自此盡賓退論明日賓將發主君就館拜謝聘君使臣來禮己國之事云公朝服者以其行聘享在廟之時相尊敬重故著皮辨此拜謝之禮輕故知著朝服上文賓即館卿大夫勞賓賓不見以其不見故遣上介聽命故知此賓亦不見凡言辟者將見而不見則謂之辟此本不見而言辟者以其君在廟門外雖不見而言辟故鄭云敬也云凡君有事於諸臣之家車造廟門乃下者以其卿館于大夫之廟此館則是諸臣之家案公食記云賓之乘車在大門外又曲禮云客車不入大門以此言之君車入大門矣大夫士有兩門入門東行則是廟門矣既至廟門須與賓行禮故云造廟門乃下也自聘享至送賓公皆載拜聘享夫人之聘享問大夫送賓公皆再拜釋曰云聘享者謂賓聘君以圭享君以璧夫人聘享者謂賓聘夫人以璋享夫人以琮問大夫者問三卿及嘗聘彼國之下大夫送賓以登路云拜此四事者君禮一夫人禮二大夫禮三送賓禮四四事皆再拜云公東面者公如賓禮門西東面擯者向公向介故知北面為相而言也賓請命于朝拜主君之館已公退賔從請命于朝注賔從者為拜主君之館已也云云案司儀云君館客客辟介受命遂送客從拜辱于朝此經不言拜辱而言請命凡言請者得不由君君聽則拜此下經直云公辭賓退不見拜文是君不受其謝故云請命者以己不敢斥尊者之意故不言辱而言請三拜乘禽明小者亦不敢忽賓三拜乘禽于朝訝聽之釋曰自此盡送至于竟論賓介發行主國贈送之事云明已受賜大小無不識者以其乘禽是禮之細小尚記識而拜之况饔餼食禮之大者君已駕僕展軨卿大夫自展遂行舍于郊釋曰曲禮云己駕僕展軨鄭注云具視也彼是君車故使僕展之此卿大夫故鄭云自展軨恐不得所故也受贈如受勞皆在近郊公使卿贈如覿幣受于舍門外如受勞禮無儐注云不入無儐對歸饔餼入設而有儐此則不入無儐明賓去禮冝有己云如受勞禮以贈勞同節者賓來勞之去有贈之皆在近郊禮又不别君贈上介如賓贈衆介如覿大夫贈如面幣使下大夫贈上介亦如之使士贈衆介如其覿幣大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣士送至于竟使者歸及郊請反命注郊近郊也告郊人使請反命于君也必請之者以已久在外嫌有罪惡不可以入春秋時鄭伯惡其大夫高克使之將兵遂而不納此蓋請而不得入釋曰自此盡拜其辱論使者反命之事知郊是近郊者以下文云朝服載􅎶鄭云行時稅舍於此郊今還至此正其故行服以俟君命敬也者初行云舍於郊斂旜今至此載旜而入故知近郊也云告郊人使請反命於君者以其使者至所聘之國謁關人明此至郊告郊人使請可知引春秋者案閔二年公羊傳云賓介所得公私幣之數乃入陳幣于朝西上上賓之公幣私幣皆陳上介公幣陳他介皆否云此幣使者及介所得于彼國君卿大夫之贈賜也者于君所得為公幣于卿大夫所得為私幣賓之公幣有八郊勞幣一也禮賓幣二也致饔餼三也夫人歸禮幣四也侑食幣五也再饗幣六也夕幣七也贈賄幣八也此八者皆主君禮賜使者皆用束錦故曰公幣賓之私幣略有十九主國三卿五大夫皆一食有侑幣饗有酬幣皆用束錦則是十六有三卿郊贈則十九也其上介公幣則有五致饔餼一也夫人致禮幣二也侑食幣三也饗酬幣四也郊贈幣五也降于賓者以其上介無郊贈幣又無禮賓幣又闕一饗幣故賓八上介五也上介私幣有十一主國三卿五大夫或饗或食不備要有其一則其幣八也又三卿皆有郊贈如其面幣通前則十一也主國下大夫嘗使己國者聘亦有幣及之則亦有報幣之事其數不定士介四人直有郊贈報私幣主國卿大夫報士介私面士介私幣數不甚明云禮於君者不陳者謂賄用束紡禮用束帛乘皮不陳之者以經云公幣又云上介公幣陳他介皆否若禮於君者一統於賓不得云介之幣故知禮於君者不陳禮於君者不陳禮於己者始陳必禮於君不陳禮於己始陳者以其禮於君者是其正故不陳之禮於己者以其榮故陳之是以下注云不加於其皮上榮其多是其義也若然聘君以幣問卿而其卿不見報聘君之幣者以其尊卑不敵若報之嫌其敵體故也初夕幣時束帛皆加于左皮上今不言加于皮上者若加於皮上相掩蔽故不加於皮上榮其多反命謂某君受幣于某宫謂太祖廟反命曰以君命聘于某君某君受幣于某宫云云釋曰云君亦揖使者進之乃進反命也者亦謂亦受命於朝位立定時君揖使者乃進受命明反命亦然某君某國名者若云鄭國君齊國君云某宫若言桓宫僖宫者左傳有桓宫之楹宫是廟名其受聘享於廟故以宫言之但受聘享在大祖廟不在親廟四而云桓宫僖宫者略舉廟名而言變反命言致命明婦人無外事受上介璋致命亦如之釋曰云變反言致者若云非君命也者君與夫人聘于鄰國君與夫人各有所當聘鄰國君受命於君今使者還反命於君聘於鄰國夫人當受命於夫人使者還反命於夫人但婦人無外事雖聘夫人亦君命之今使還反命不云反命於君變反言致命者若本非君命然故變反言致也若然婦人既無外事而承君命聘鄰國夫人者以其夫婦一體共事社稷故下記云君以社稷故在寡小君拜是賓主相對之辭云不言受幣於某宫可知略之者以其夫人受聘享皆因君聘享同時同宫郊勞至贈賄凡八此執初以言執禮幣以盡言賜禮釋曰云禮幣主國君初禮賓之幣也者謂從郊勞己後至於贈賄八度禮賓皆有幣是自郊勞為初也云以盡言賜禮謂自此至于贈者此則郊勞也大夫私行出疆反有獻公行獻可知若有獻則曰某君之賜也釋曰此獻物謂入賓者故下記云既覿賓若私獻奉獻將命注云時有珍異之物或賓奉之猶以君命致之則是賓亦言有私獻於彼君則彼君亦有私獻報賓則此獻者也云大夫出反必獻忠孝也案下曲禮云大夫私行出疆必請反必有獻彼私行出疆反必有獻此以公聘出疆反亦有獻故云大夫出反必獻此以入己之物獻於君者忠孝也大夫有獻不拜為君之答己君其以賜乎注云不拜者為君之答己也者士拜國君國君不拜士賤故也大夫拜國君國君即答拜大夫尊故也故云不拜者為君之答己拜若然自反命以來盡于賜禮之等或拜或不拜無答己之嫌獨此不拜為君之答己者自此以前皆是彼國報君之物賓直告事而已君受之而無言故賓不拜君有言及己者乃拜之拜君言也此獻是彼國君賜與己理須拜送是以玉藻云凡獻於君大夫使宰士親皆再拜稽首送之又郊特牲云大夫有獻弗親不面拜為君之答己亦此類故鄭云獻不拜者為君之答己若然玉藻不親此親者此因命故親獻也旅答士介一拜即竒拜比上介又賤上介徒以公賜告如上賔之禮云云君答拜勞士介亦如之鄭知旅答士介共一拜者君勞上介上介再拜稽首君答拜不言再拜則君答上介一拜矣勞士亦如之不言皆則總答一拜矣勞賓君答再拜勞上介君答一拜對賓再拜己是賤矣今此士介四人共答一拜故云又賤也此一拜答臣下則周禮大祝辨九拜七曰竒拜是也是以彼注云一拜答臣下也案曲禮云君於士不答拜此君答拜士者以其新行反命君勞苦之故答拜異於常也臣子得賜必獻君父反之如更受賜君使宰賜使者幣使者再拜稽首云禮臣子人賜之而必獻之君父不敢自私服也君父因以豫之則拜受之如更受賜也者案內則云婦或賜之衣服則受而獻諸舅姑舅姑受之則喜若反賜之則辭不得命如更受賜臣子於君父亦然釋幣于門謂賓介還禮大門之神釋幣于門釋曰自此盡亦如之論賓上介使還禮門神及奠於禰之事知門是大門者以其從外來先至大門即禮門神故知門是大門也案特牲筮時云席於門中闑西閾外故知此亦席於闑西閾外知東面者神居東面為正故也云設洗于門外東方者以其在廟在學設洗皆云洗當東榮故在門外亦在東方也云其餘如初于禰時者初出亦釋幣于行不如之者以其初出於廟禮文具設于行其文略故此云如禰時言如者謂釋幣於祝先入已下埋于西階東是也出告行入告門告所先見云出于行入于門不兩告告所先見也者出時自廟出先行即告行入時先見門故告門一獻當言奠今言陳以下有二獻乃至于禰筵几于室薦脯觴酒陳席于阼云云云筵几于室者還以特牲少牢司宫設席于奧東面右几但無牲牢進脯醢而已以告祭非常故也觴酒陳主人一獻當言奠今不言奠而言陳者以其下仍有室老及士獻以備故言陳陳有次第之言以其三時次第皆列于坐者也云先薦後酌祭禮也者以其特牲少牢皆先薦饌乃後獻奠于鉶南此與彼同故云先薦後酌祭禮也云行釋幣反釋奠略出謹入也者必略出謹入者出時以禱祈入時以祠報故不同也鄭謂告反主婦不與以室老士備獻三獻注室老亞獻士三獻也釋曰鄭注喪服云室老家相士邑宰知無主婦而取士者以其自外來主於告反即釋奠於禰廟故知主婦不與而取士備三獻必知有室老與士者以其前大夫致饔餼於賓時使老牽牛以致之鄭注云皆大夫之貴臣故知此亦貴臣為獻也云每獻奠輒取爵酌者此通三獻皆獻奠訖别取爵自酢故云輒取爵酌也别云主人自酢者對正祭有尸三獻皆獻尸訖尸酢主人主婦賓長今此無尸皆自酢獨云主人者主人為首正故舉前以包後鄭云更起酒以獻酬從者不酌神尊一人舉爵釋曰云三獻禮成者大夫士家祭三獻特牲少牢禮是也云更起酒者此欲獻酬從者不得酌神之尊是以特牲行酬時設尊兩壺於阼階東西方亦如之鄭注云謂酬賓及兄弟則此亦當然故知别取酒也云主人奠之未舉者以其下文云獻從者乃云行酬似鄉飲酒鄉射一人舉觶未舉待獻介衆賓後乃行酬亦然也案特牲禮獻衆賓及兄弟之等皆升飲於西階上故此獻從者亦於階上可知正祭雖國君亦自獻燕禮使宰夫若正祭雖國君亦自獻故祭統云尸飲五君洗玉爵獻卿尸飲七君洗瑶爵獻大夫之等若然則告祭非常今獻從者從燕法案燕禮使宰夫為獻主是國君不親獻此大夫親獻故云避國君也主國遭喪入竟則遂關人未告則反聘遭喪入竟則遂也釋曰自此盡卒殯乃歸上陳告行聘之事此以下論或遭主國君喪或聘君薨於後或使者與介身卒安不忘危故見此非常之事從此盡練冠以受論主國君或夫人薨或世子死行變禮之事云以國為體者謂公羊傳宋人執鄭祭仲使之逐忽而立突仲以逐忽則國存不逐則國滅故逐忽而立突是以國為體但聘君主以聘國故君雖薨而遂入關人未告則反者聘使至關乃謁關人關人入告君君知乃使士請事己入關自然入矣若關人未告君君不知使者又未入聞主國君死理當反矣聘使不郊勞以主國之子未君不郊勞注子未君也釋曰案文公八年天王崩九年毛伯來求金公羊傳曰何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子若然云子未君公羊傳文但彼據踰年即位後此據新遭父喪引之者以其同是子未君就賓廟致命不筵几與正聘異不筵几釋曰不筵几致命不于廟決正聘設几筵也就尸柩於殯宫者國君雖以國為體主聘其國但聘亦為兩君相好今君薨當就尸柩故不就祖廟也云又不神之者以其鬼神所在曰廟則殯宫亦得為廟則設几筵亦可矣但始死不忍異于生不神之故於殯傍無几筵也曽子問云君薨世子生告殯殯東几筵者鄭云明繼體也然則尋常則殯東不設几筵當在室內遭喪降事歸禮不以醴禮賓不禮賓注喪降事也釋曰云不禮者謂既行聘享訖不以醴酒禮賓也主人畢歸禮知歸禮中兼有饗食者主人有故雖饗食亦有生致法故主人亦歸之且下文云賓唯饔餼之受明本并饗食亦歸賓乃就中受饔餼若本不歸饔餼何須云饔餼之受明其時并致饗食也賓受饔餼之正不受饗食之加賓唯饔餼之受注受正不受加也釋曰饔餼大禮是其正自饗食之等是其加也不賄束紡不禮玉不郊贈不賄不禮玉不贈注喪殺禮為之不備釋曰云不賄者皆據上文謂不以束紡不禮玉者謂不束帛乘皮以報享不贈者賓出至郊不以物贈之也夫人世子喪使大夫受聘禮于廟遭夫人世子之喪君不受使大夫受于廟其他如遭君喪云夫人世子死君為喪主者案禮記服問云君所主夫人妻大子適婦鄭注云言妻見大夫以下亦為此三人為喪主也故云君為喪主既為喪主是以使大夫受聘禮不以凶接吉也云其他謂禮所降者謂不禮以下不贈以上皆闕之聘君若薨于後入竟則遂聘君若薨于後入竟則遂注既接於主國君也釋曰自此盡唯稍受之論聘者遭己君之喪行非常之禮事云接于主國者謂謁關人關人告君君使士請事是接於主國矣故入境則遂也聘君之赴未至巷哭館衰不受加禮赴者未至則哭于巷衰于館釋曰未至謂赴告主國君者也以其本國遭喪赴者有兩使一使告聘者一使告主國云未可為位者以其赴主國之使未至是以未可為位受人弔禮云衰于館未可以凶服出見人者對下經赴者至則衰而出云其聘享之事自若吉者下云受饔餼之禮故知先行聘享乃後受禮以其主國未得赴告故自若吉也受禮注受饔餼也不受饗食亦不受加使者聞聘君赴凶服若聘享吉服赴者至則衰而出釋曰云禮為鄰國闕者案襄二十三年春秋左氏傳云杞孝公卒晉悼夫人喪之平公不徹樂非禮也禮為鄰國闕服注云鄰國尚為之闕樂况舅甥之親乎若然赴者至主國君使者衰而出則主國可以闕樂云於是可以凶服將事者謂主人所歸禮則賓可以凶服受之其正行聘享則著吉服矣故雜記云執玉不麻是也米稟為稍謂稍稍給之唯稍受之注稍稟食也釋曰禮君行師從卿行旅從從者既多不可闕于稍食案周禮每云稍事皆謂米稟以其稍稍給之故謂米稟為稍復命于殯外自西階與奔親喪同歸執圭復命于殯升自西階不升堂自此盡即位踊論使者喪還執圭還國復命之事云臣子之於君父存亡同者案禮記奔父母之喪升自西階此復命于殯亦升自西階法生時必告反必靣此未葬稱子其實當稱子某子即位不哭釋曰云不言世子者君薨也者案公羊傳君存稱世子君薨稱子某既葬稱子踰年稱君案上文稱世子此文單稱子是知其君薨故君不稱某而與此既葬同號者以其既不得稱世子略云子而已故不言某其實正法稱子某是以雜記在殯待鄰國之使皆稱某云諸臣待之亦皆如朝夕哭位者但臣子一列上下文唯言子不言羣臣與子同知如朝夕哭位者案奔喪云奔父之喪在家者待之皆如朝夕哭位故知此亦然告殯知君存時復命辨復命如聘者上文君存時使者復命自陳公幣已下至賜告之等今復命於殯所亦盡陳之故言辨朝夕哭位在阼東此殯前北鄉異之與介入北鄉哭案使者升階復命訖不見出文而言與介入者以其復命之時介在幣南北面去殯逺復命訖除去幣賓更與介前入近殯北鄉哭鄉內為入故言與介入北鄉哭也云北鄉哭新至别于朝夕者朝夕哭位在阼階下西面今於殯前北鄉故云别於朝夕也出袒括髮案奔喪云至於家入門左升自西階東面哭括髮袒於殯東是於內者子故也此使者出門袒括髮變于外者臣故也入門右即位踊案奔喪云袒括髮於西階東即位踊襲絰於序東此門外袒括髮入門右即位踊亦當襲絰於序東故鄭云自哭至踊如奔喪禮也聞親喪衰哭于館聘享即吉服若有私喪則哭于館衰而居不饗食自此盡從之論使者有父母之喪行變禮之事云不敢以私喪自聞于主國者解哭于館又云凶服干君之吉使者亦取不敢解之言衰而居謂服衰居館行聘享即皮辨吉服故不敢凶服干君之吉使也引春秋傳者案宣八年經書夏六月公子遂如齊至黃乃復公羊傳云其言至黃乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不反何氏注聞大喪而不反重君命也徐行者為君當使人追代之以喪喻疾者喪猶不還而况疾乎是也以此言之使雖未出國境聞父母之喪遂行不敢以私廢王事君使人代之可也以此言之明至彼所使之國雖聞父母之喪不反可知是以哭于館衰而居在道及至國皆介居前已衰而從之歸使衆介先衰而從之釋曰云已有齊斬之服者以其私喪之內有為父斬為母齊衰故齊斬並言之也云不忍顯然趨於往來者解經歸使衆介先衰而從之意經云歸據反國時兼云往者鄭意去時聞父母之喪不敢即反亦使衆介先衰而從之故往來並言云在道路使介居前者謂去向彼國時云歸又請反命己猶徐行隨之者此謂還國至近郊使人請反命君許入猶使介居前徐行於後隨介至國也云君納之乃朝服者以其行聘之時猶不以凶服干君之吉使而服吉服知此反命時亦不以凶服干君之吉使而服朝服如吉時反命矣云出公門釋服哭而歸者案雜記云大夫士將與祭于公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸亦云其他如奔喪之禮明此亦出公門釋朝服而歸但彼祭服不可著故門內釋服此朝服可以著出門乃釋服為異也云其他如奔喪之禮者案奔喪云至於家入門左升自西階殯東西面坐哭盡哀括髮袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賓成踊送賓反位有賓後至者則拜之成踊送賓皆如初衆主人兄弟皆出門出門哭止闔門相者告就次于又哭括髮袒成踊於三哭猶括髮袒成踊三日成服拜賓送賓皆如初朝服下唯有深衣故道路服之云吉時道路深衣者以其朝服之下唯有深衣庶人之常服既以朝服反命出門去朝服還服吉時深衣三日成服乃去之儀禮要義卷二十三
