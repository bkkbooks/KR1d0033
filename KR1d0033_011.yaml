body:
  text: 儀禮要義卷十一宋魏了翁撰鄉射一鄭以鄉射為州長會民射於州序鄉射禮第五鄭目録州長至嘉禮釋曰鄭云州長春秋以禮會人而射於州序者周禮地官州長職文也鄭引之者證此鄉射是州長射法云謂之鄉者欲見州長射得名鄉射之意云州鄉之屬者周禮大司徒職云五州為鄉是州屬鄉故云州鄉之屬云鄉大夫或在焉者一鄉管五州鄉大夫或宅居一州之內則鄭注禮記云或則鄉之所居州黨而鄉大夫來臨此射禮是為鄉大夫在焉則名鄉射又鄉大夫三年大比興賢者能者訖而以鄉射之禮五物詢衆庶亦行此州長射禮以詢之亦是鄉大夫在焉故名為鄉射云不改其禮者雖鄉大夫在其禮仍依州長射禮故云不改其禮案經鄉大夫射於庠云堂則由楹外又云堂則物當楣又云大夫用兕中其禮與士射於序别而云不改者大判鄉大夫士射先行鄉飲酒禮及未旅而射為不改其實亦有少異也鄭云射禮於五禮屬嘉禮者案周禮大宗伯云以嘉禮親萬民下有以賔射之禮親故舊朋友故知屬嘉禮也射禮戒賔與射同日猶鄉飲戒與飲同日鄉射之禮主人戒賔云云乃請賔禮辭許云云無介釋曰自此至無介論州長將射先戒賔之事案大射前三日宰夫戒宰及司馬又射前一日樂人宿縣此不言日數則戒賔與射同日矣禮同鄉飲酒也以其鄉射先行鄉飲酒鄉飲酒戒賔與飲酒同日鄭既以鄉飲為諸侯之大夫此亦諸侯州長注主人州長也卿大夫若在焉則稱鄉大夫也云云釋曰案鄉大夫是諸侯鄉大夫則此州長亦諸侯之州長以士為之是以經云釋獲者執鹿中記云士鹿中是皆為此州長射而言是諸侯州長可知若天子州長中大夫為之若然記云大夫兕中者為鄉大夫詢衆庶而言也云鄉大夫若在焉則稱鄉大夫也者謂大夫來臨禮之時州長戒賔不自稱稱鄉大夫以戒賔也云出迎出門也者謂出序之學門亦如鄉飲酒出庠門皆有一門入門即至堂耳云不言拜辱者此為習民以禮樂不主為賔已也者對鄉飲酒主人戒賔賔拜辱者彼為賔也非為習民以禮樂故也云不謀賔者時不獻賢能事輕也者還決鄉飲酒獻賢能故須就先生而謀賔介禮重對此不獻賢能為輕故不謀賔也漢時郡國以季春行鄉射云今郡國行此禮以季春者漢時雖無侯國而置郡為守其王之子弟猶名國引之者證時節與周異此篇有射于堂及兕中兼有大夫行禮云周禮至衆庶皆周禮鄉大夫職文引之者證此鄉射中兼有鄉大夫行射禮故有射于堂及兕中之事云五物者案彼云一曰和二曰容三曰主皮四曰和容五曰興舞鄭注云和載六德容包六行也庶民無射禮因田獵分禽則有主皮主皮者張皮射之無侯也主皮和容興舞則六藝之射興禮樂與當射之時民必觀焉因詢之也是也主人還射宫即鄉庠州序主人戒賔云云主人退賔送再拜注退還射宫省録射事釋曰射宫者鄉庠州序是也知省録射事者即下文云乃張侯之等是也下言飲酒之事知不為飲酒事者以飲酒者止為射事故以射為主也無介以輔賔者主於射飲禮略無介注雖先飲酒云云釋曰鄭云雖先飲酒者自此已下先言飲酒獻後乃射以是禮記射義云古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮是也但鄉飲酒之禮有介一人以輔賔此無介者主於射序賔之禮略故無介以輔賔也設席不言於戶牖間州序無室乃席賔南面東上云不言於戶牖之間者此射於序者決鄉飲酒在庠以其序無室庠有室此據州長射於序以其無室無戶牖設席亦當户牖之處耳言東上亦主人在東故席端在東不得以曲禮席南向北向西方為上因隂陽解之也衆賔之席繼賔甫習衆庶與賔賢異衆賔之席繼而西注甫欲習衆庶未有所殊别釋曰甫始也言始欲習衆庶未有所殊别此決鄉飲酒三賔之席不屬殊别彼有德之人故各自特不繼有所殊别侯用布上廣下狹象人綱象足乃張侯下綱不及地武鄭知侯用布案下記云獸侯大夫士皆言布侯則餘賔射大射其侯皆用布此鄉射采侯二正亦用布可知云綱持舌繩也者周禮梓人云上綱與下綱出舌尋絹寸焉注云綱所以繫侯於植者也故云綱持舌繩也云武迹也中人之迹尺二寸者無正文蓋目驗當時而言似云中人定扼圍九寸也漢禮云五武成步步六尺或據此而言也云侯象人者案鄭注梓人云上下皆出舌尋者亦人張手之節也以其張侯之法下兩舌半上舌兩頭綱皆出一尋即是上廣下狹象人張足六尺張臂八尺故云象人也云綱即其足也者謂經下綱象足云是以取數焉者以下綱象足張之六尺是取數於武也侯以向堂為面則東為右西為左不繫左下綱中掩束之注事未至也釋曰案下記云東方謂之右個注云侯以向堂為面也則此左下綱以西畔而言云中掩束之者案記云鄉侯一丈倍中以為躬躬二丈倍躬以為左右舌舌四丈兩舌各出一丈又云下舌半上舌則左右各出五尺今將此五尺與下綱不繫者中掩左廂向東待將射乃解之故云事未至也乏參侯道居侯黨之一亦名容乏參侯道云云注容謂之之釋曰乏參侯道者謂三分侯道云居侯黨之一者黨旁也謂在侯西北邪向之故以旁言之其居旁之一者謂侯道內三分之居一分之地十丈也云西五步者據侯之正北落西有五步即三丈也云容謂之乏者案周禮射人職云王以六耦射三侯三獲三容五正彼據王三侯有三容容者以革為之可以容身故云容也云乏者謂矢於此匱乏不去故云乏也云獲者御矢也者謂唱獲者恐矢至身故云獲者御矢也鄉飲戒速賔皆朝服此習禮故戒以玄端主人朝服乃速賔賔朝服出迎再拜釋曰自此至當楣北面答再拜論主召賔從己之事此主人與賔俱朝服案鄉飲酒賔主俱不言服者以彼賔禮重故戒與速賔俱朝服故不言此習禮輕是故戒時玄端召時乃朝服故須言之也必以此戒時玄端者見公食大夫云賔朝服即位于大門外如聘注云於是朝服則初時玄端宜與彼同皆是戒時不言服後速時朝服故知此亦戒時玄端矣且鄉飲酒戒速俱不言服知皆朝服者下記云鄉朝服而謀賔介是也主人以賔非以吳子之以猶與也主人以賔揖先入云云主人以賔三揖云云釋曰云以猶與者案左氏傳云蔡人以吳子與楚人戰于柏舉彼以者能東西之曰以以謂驅使前人之稱此言嫌有驅使之稱故以為與謂主人與賔是以為平敵之義故須訓之云先入入門右西者此注亦與鄉飲酒同以其賔入東面故西面待之先升一等主人常禮燕禮君升二等主人以賔三揖皆行及階三讓主人升一等賔升釋曰知主人先讓於賔者以其主人之法先升導賔賔後升進宜難禮之常法故知主人先讓賔也此先升一等禮之常燕禮君升二等者尊君故也主人拜賔至賔主拜皆北面主人阼階上當楣北面再拜賔西階上當楣北面答再拜釋曰知拜是拜至者鄉飲酒義云拜至拜洗公食亦云當楣北嚮再拜故知拜是拜至賔是鄉民而言獻與玉府注異主人坐取爵于上篚以降注將獻賔也獻賔注云云釋曰云凡進物曰獻者欲見此賔乃是鄉民而已無尊卑上下猶言獻者此獻直是進物而言獻進之也案周禮玉府注云古者致物於人尊之則曰獻彼據尊敬前人雖卑亦曰獻若齊侯獻捷於魯之類義與此别也禮例衆賔答大夫人一拜答士再拜主人西南面三拜衆賔衆賔皆答一拜釋曰云三拜示遍也者衆賔無問多少止為三拜而已是示遍也云一拜不備禮也者衆賔人皆一拜是拜不備禮此亦答大夫拜法以其此禮中含鄉大夫法若答士拜則亦無再拜見於特牲也云獻賔畢乃與衆賔拜者自爾來唯與賔拜未與衆賔拜今始拜之故云敬不能並有司徹答一拜鄉射雖非賔賢衆賔數與鄉飲同實爵西階上獻衆賓衆賔之長云云釋曰衆賔之長升拜受者三人此雖非賔賢能其衆亦三人在堂上與鄉飲酒數同其堂上衆賔無定數故鄭云言三人則衆賔多矣云國以多德行道藝為榮者案周禮大司徒以鄉三物教萬民一曰六德二曰六行三曰六藝此既鄉人則德行亦據六德六行道藝則六藝也此並與鄉飲酒賔介與衆賔之類並來與在射中是以孔子射於矍相之圃觀者如堵墻彼亦據孔子為鄉大夫習人以禮樂之射至於誓之於後僅有存焉亦無常數之事也三賔禮略衆賔彌略衆賔皆不拜受爵坐祭立飲釋曰此謂堂下衆賔無數者故鄭云自第四以下云又不拜受爵禮彌略者三賔雖坐祭立飲不拜既爵仍拜受此衆賔非直坐祭立飲不拜既爵又不拜受爵堂上三賔有席堂下衆賔無每一人薦則薦諸其席衆賔辨有脯醢釋曰此還據堂上三人有席者故云薦諸其席謂席前也還據堂下無席者故鄭云薦於其位一人謂主人之吏故奠觶一人洗舉觶於賔坐奠觶于薦西注一人主人之吏釋曰主人之吏亦謂府史以下非屬官也以其是主人之吏既賤故不敢親授奠之也鄉大夫士非鄉人而禮同大夫若有遵者則入門左注謂此鄉之人為大夫者也釋曰云大夫若有遵者言若者或無不定故云若也鄭知是當鄉大夫者以其鄉射既與人行射禮而言大夫者當鄉大夫可知云其士也於旅乃入者下記云士既旅不入明未旅間皆得入是以未旅而射其士皆在也知鄉大夫士非鄉人禮亦然者以其同是鄉大夫士禮無異故也但異鄉不助主人樂賔為别也大夫辭加席不以己尊加於賔大夫辭加席主人對不去加席釋曰上云尊於賔席之東則在尊西今大夫言席於尊東明為賔夾尊可知云升不拜洗若以大夫尊故不拜洗也云反位者大夫反西階上位云主人大夫之右拜送者謂在大夫之東拜送爵也云辭之者謙不敢以己尊加賢者鄉射之禮鄉人為賔下記云若大夫與則以公士為賔亦選賢者為之故辭加席又不以己尊加賢者也云不去者大夫再重席正也者鄉飲酒云公三重大夫再重故知大夫再重席禮之正也云賔一重席者鄉人故一重縱公士為賔亦一重也據一大夫獻已即酢衆則遍獻長乃酢大夫降洗注將酢主人也大夫若衆則辨獻長乃酢釋曰知大夫若衆則辨獻長乃酢者此經據一大夫而言故獻大夫即酢案有司徹主人洗爵獻長賔于西階上然後衆賔長升拜受爵宰夫贊主人酌若是以辨乃升長賔主人酌酢于長賔西階上北面賔在左注主人酌自酢序賔意賔卑不敢酢大夫雖尊不奪賔主正禮大夫降立于賔南注雖尊不奪人之正禮釋曰大夫尊在堂則席之于尊東特尊之今降而在賔下者欲使賔主相對行禮若在北北則妨賔主揖讓之正禮故云不奪人之正禮席工不正東辟射位瑟有面鼓有後首席工于西階上少東云云工四人二瑟瑟先相者皆左何瑟云云釋曰云席工者謂為工設席下文乃升席也云言少東者明樂正西側階者既言席工于西階上少東則在西階東矣復云樂正立于其西則近席西其言從近故知樂正側近西階東則不欲大東辟射位大射亦同此注燕禮注亦然者燕亦容有射法鄉飲酒工位與此同云工四人二瑟則是二人歌可知云瑟先賤者先就事也者案大射大師少師歌衆工瑟是知瑟者賤也凡工者皆先瑟後歌是賤者先即事故序亦在樂有四節今不歌不笙不間唯有合樂故云志在射略於樂也云合樂者周南召南之風鄉樂也者上注已云頌及大雅天子樂小雅諸侯樂此二南鄉大夫樂但鄉飲酒鄉射是大夫士為主人故大夫士樂為鄉樂者也云不可略其正也者二南是大夫士之鄉樂己之正樂鄉射與鄉飲酒同是大夫士禮鄉大夫士行射禮先行鄉飲酒禮鄉飲酒與鄉射自為首尾故鄉飲酒注具於此略言燕禮是諸侯禮天子諸侯射先行燕禮則燕禮與大射自為首尾是以燕禮歌笙間合鄭亦具注之大射又略言之也注云堂上正樂畢與堂下騶虞及無算樂樂正告于賔乃降釋曰言告于賔者作樂主為樂賔今歌備故告賔言歌備也言樂正降者堂上正樂畢也者以其鄉飲酒燕禮但升歌笙間合樂皆是正歌今略去升歌笙間三者唯有合樂於堂上故云堂上正樂畢也云正樂者對後無算樂非正樂也下射雖歌騶虞亦是堂下非堂上故以堂上決之大夫士不合有大師君有賜樂法主人取爵于上篚獻工大師則為之洗釋曰自此至反升席論主人獻工笙之事但天子諸侯官備有太師少師瞽人作樂之長大夫士官不備不合有大師君有賜大夫士樂器之法故春秋左氏云晉侯歌鐘二肆取半以賜魏絳於是乎始有金石之樂禮也時以樂人賜之故鄭云君賜大夫樂又從之以其人謂之大師也主人降席自南禮殺由便主人降席自南方釋曰自此盡未旅論立司正之事也云禮殺由便者對上文主人受酢爵時禮盛故主人降席自北方啐酒於席末亦然今此立司正禮殺故降席自南方爵備樂畢留賔司馬仍為司正監察之作相為司正云云禮辭許諾云云釋曰云爵備者謂賔及衆賔與尊者并工笙並得獻是爵備也云樂畢者合樂訖是樂畢以無升笙與間故不言樂成而云畢而已也云將留賔以事者下有射事射訖行旅無算之事故須立司正以監之但中間為射繫變司正為司馬射訖反為司正以監察儀法也引詩者證監與正為一物皆察儀法也此大夫士禮於未旅而射與燕禮大射異未旅注旅序也未以次序相酬以將射也旅則禮終釋曰旅衆也而言序者謂衆以次序相酬必於未旅而射者旅則醉禮終恐不得射故於未旅而射也此大夫士禮將射先行鄉飲酒後行旅酬而已故射前未旅而射後乃始行旅酬燕禮大射國君禮故先行燕禮雖行一獻以其辨尊卑故行四舉旅大射主為射故再拜訖即射燕禮主為燕故三舉旅乃射彼皆與此不同也司正退立司射選三耦司馬請射三耦俟于堂西云云司射適堂西云云注司射選弟子云云為三耦釋曰云司射取弓于階西兼挾乘矢者以其司射之弓矢豫陳於西階故司射於堂西袒決遂訖即取弓矢於階西是以下記云司射之弓矢與撲倚于西階之西是也云有司請射者此有司謂司馬故大射云司射自阼階前曰為政請射注為政謂司馬司馬政官主射禮諸侯之州長無司馬官直言有司請射以此司馬也云司射主人之吏也者大射諸侯禮有大射正為長射人次之司射又次之小射正次之皆是士為之則此大夫士禮不得用士故知是主人之吏為之可知云於堂西袒決遂者主人無次隱蔽而已者此對大射人君禮有次在東方不須適堂西也吉凶皆袒左惟受刑袒右司射適堂西袒決遂取弓于階西兼挾乘矢云云釋曰云袒左免衣也知袒左者凡事無問吉凶皆袒左是以士喪主人左袒此及大射亦皆袒左不以吉凶相反唯有受刑袒右故覲禮云乃右肉袒于廟門之東注云右肉袒者刑宜施於右是也云決猶闓也以象骨為之者大射注亦然案繕人云掌王之用弓弩矢箙矰弋決拾鄭注云士喪禮決用正王棘若檡棘則天子用象骨與無正文故引士喪禮又言與以疑之若然諸侯及大夫生用象死用棘天子無問死生皆用象者蓋取其滑也云著右大擘指以鉤弦闓體也知者以右巨指鉤弦故知著於右大擘指也以右擘著極是以大射云朱極三注云以朱韋為之三者食指將指無名指是也云遂射韝也以韋為之以遂弦者也者大射注亦云遂射韝也以朱韋為之著左臂所以遂弦也云其非射時則謂之拾拾斂也所以蔽膚斂衣也者此篇及大射將射云袒決遂射訖則云説決拾於公雖射亦謂之拾故大射云公就物小射正奉決拾以笥大射正執弓皆以從於物彼亦臨時而云拾以公射袒朱𥜗言拾以見斂衣故變文以見義也云所以蔽膚斂衣也者言蔽膚據士斂衣據大夫已上是以下記大夫與士射袒薰襦燕禮記云君射袒朱襦若對君大夫亦與士同亦蔽膚也云方持弦矢曰挾知者下記云凡挾矢於二指之間橫之是言其方可知引大射挾乘矢於弓外見鏃於弣是其方也若側持弓矢則名執故下文云司射猶袒決遂左執弓右執一個兼諸弦面鏃注云側持弓矢曰執面猶尚也并矢於弦尚其鏃是也云乘矢四矢也者下云司射晉三挾一個又詩云四矢反兮經與注以酢為醋唯此主人阼階上答拜賔以虛爵降注將洗以醋主人賔升實爵主人之席前東南面醋主人注醋報儀禮要義卷十一
