body:
  text: 儀禮要義卷四十五宋魏了翁撰特牲饋食禮二自此主人主婦及祝佐食陳隂厭主人及祝升祝先入主人從西面於户內釋曰自此盡稽首論主人主婦及祝與佐食陳設隂厭之事云主人從西面於户內注引少牢者證主人户內西面其時祝北墉下南面之事以其未有祝行事之法直監納祭而已下文乃云祝在左為孝子釋辭乃有事也主人親舉宗人執畢臨匕載傋失脫畢狀如義蓋為似畢星取名宗人執畢先入當阼階南面釋曰云畢狀如義者下引舊説有他神物惡桑義之言故以義而言云蓋為其似畢星取名焉者案詩云有救天畢載施之行無正文故云蓋以疑之也云主人親舉宗人則執畢導之既錯義以畢臨匕載備失脫也知義然者以經云當阼階南面明鄉主人執畢臨匕備失脫可知也喪祭匕畢用桑吉祭用棘心雜記匕畢同用桑據喪祭今吉祭匕用棘心則畢亦棘心也云舊説云畢以御他神物神物惡桑義舊説如此又引少牢士虞已下破舊説之意也云此無義者乃主人不親舉耳者揔解士虞少牢二禮云少牢大夫祭不親舉者大夫尊主人不親舉云虞喪祭也主人未執事者對吉祭主人執事有畢彼無也云祔練祥執事用桑義者以其虞時主人不執事則祔已執事執事用桑義則雜記所云是也云自此純吉用棘心義者除祥後則禫月及吉祭用棘心也案易震卦彖辭云震來虩虩笑言啞啞震驚百里不喪匕鬯鄭注云雷發聲於百里古者諸侯象諸侯出教令能警戒國內則守其宗廟社稷為之祭主不亡其匕鬯人君於祭匕牲體薦鬯而已其餘不親為也若然諸侯親匕牲體大夫不親者辟人君士卑不嫌得與人君同親匕也俎設鼎西西肆匕加于鼎東枋贊者錯俎加匕釋曰云其錯俎東縮加匕東柄者少牢云俎皆設於鼎西西肆又云匕皆加於鼎東枋則此加匕於鼎東柄可知肵俎謂午割心舌于尸前肵之為言敬佐食升肵俎冪之設於阼階西知昕謂心舌者下記云肵俎心舌皆去本末午割之實於牲鼎載心立舌縮俎是也引郊特牲者見敬有肵俎送于尸前郊特牲曰肵之為言敬也言敬尸之俎凡饌必方明食味人之性所以正主人升入復位俎入設於豆東魚次臘特于俎北入設俎載者臘特饌要方也凡饌必方者明食味人之性所以正云臘特饌要方也者案經豆在神坐之前豕俎入設於豆東魚俎又次其東若臘俎復在東則饌不得方故臘俎特于俎北取其方士祭少于少牢主婦親之宗婦不贊主婦設兩敦黍稷于俎南西上及兩鉶芼設于豆南南陳釋曰案少牢主婦設金敦宗婦贊三敦以其多故使宗婦贊此士祭祀二敦少故不使宗婦贊主婦可親之也若然案少牢佐食贊鉶宗婦不贊鉶此不以佐食決之而并云宗婦者此決有司徹故有司徹云主婦洗于房中出實爵尊南西面拜獻尸尸拜於筵上受主婦西面於主人之席北拜送爵入於房取一羊鉶坐奠于韭菹西主婦贊者執豕鉶以從主婦不興受設於羊鉶之西又下至主婦致爵于主人主婦設二鉶與糗修如尸禮皆是也佐食啓會乃奠奠乃啓會大夫士異祝洗酌奠奠于鉶南遂命佐食啓會佐食啓會郤于敦南出立于西南面酌奠奠其爵觶也少牢饋食禮啓會乃奠之釋曰引少牢者案少牢祝酌奠遂命佐食佐食啓會乃奠者彼大夫禮與此士禮相變是以與此奠乃啓會異也祝代主人迎尸于門外主人不迎成尸尊祝迎尸于門外釋曰自此盡反黍稷于其所論隂厭後迎尸于正祭之事云尸自外來代主人接之者下注云主人不迎尸成尸尊故也云就其次而請不拜不敢與尊者為禮者凡平賔客皆在門西主人出門左西面拜今此經直云迎尸于門外不言祝拜尸答拜是祝出就次尸乃出次迎之而入門是不敢與尊者為禮引周禮者證門外張尸次之事周禮掌次有張尸次謂更衣處廟中則尸尊廟門外則君尊云主人不迎尸成尸尊者案祭統云君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外疑於君入廟門則全於臣全於子鄭云不迎尸者欲全其尊也尸神象也鬼神之尊在廟中人君之尊出廟門則伸此士禮雖無君道亦尊尸主人不迎迎之尊不成不迎之則成尸之道尊也云尸所祭者之孫也者禮記云孫為王父尸是也云祖之尸則主人乃宗子者以其祭祖兄弟來助祭故知宗子小宗大宗五宗皆然書傳云宗子將有事族人皆入侍也云禰之尸則主人乃父道者禮記祭統云夫祭之道孫為王父尸所使為尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也注云祭祖則用孫列皆取於同姓之適孫是其禰之尸則主人乃父道也云事神之禮廟中而已出迎則為厭出廟門主人有君厭臣之義故不迎也主人拜妥尸尸答拜祝饗稱孝子尸答拜執奠祝饗主人拜如初饗勸強之也其辭取于士虞記則宜云孝孫某圭為孝薦之饗舊説云明薦之釋曰喪祭稱哀吉祭稱孝故士虞記卒哭饗尸辭曰哀子某圭為哀薦之饗此既吉祭宜云孝孫某圭為孝薦之饗以其改哀云孝故曰宜云也引舊説者證圭為潔明之義也設饌飲神為隂厭今尸挼祭食神餘祝命挼祭尸左執觶右取菹挼于醢祭于豆間釋曰云挼祭祭神食也者鄉者設饌未迎尸隂厭厭飫神今尸來升席而挼祭祭訖當食神餘引周禮而云墮與挼讀同則二字通用云今文改挼皆為綏不從今文引古文者欲見挼下有祭無醢故壘之而不從也云挼醢者染於醢從經為正也生人禮大羮湆在薦右神禮在左喪用生禮設大羮湆于醢北釋曰云醢北者為薦左案公食大夫昏禮大羮湆皆在薦右此在左者神禮變於生人士虞禮大夫羮湆設于鉶南在右與生人同有不忍異於生故也云不和貴其質者案桓二年左氏傳云大羮不和以鹽菜是貴其質大羮湆隂厭時未設為尸不為神云不為神者隂厭時未設尸來始設為尸故士虞記云無尸則禮及薦饌皆如初不挼祭無大羮湆胾從獻有尸即有大羮湆從獻縱有亦不祭不嚌是不為神為尸非盛者也引士虞禮曰大羮湆自門入者證迎尸後乃從獻來也肵俎主於尸主人親羞尊賔以事先主人羞肵俎于臘北云肵爼主於尸者以其入後乃設之故知主於尸主人親進者敬尸故也前神俎使載者設之者欲得尊賔客以事其先故也主人洗角酳尸主人洗角升酌酳尸釋曰自此盡入復位論主人獻尸及祝佐食之事知是獻尸者下有主婦洗爵獻尸并賔長獻尸故知此是主人酳尸也云不用爵者下大夫也者此決少牢云主人降洗爵酌酒乃酳尸用爵不用角也祝爵授尸以醋主人尸尊不親洗爵祝酌授尸尸以醋主人注醋報也祝酌不洗云云釋曰云祝酌不洗者尸當酢主人宜親洗爵酌酒不親洗酌尸尊故也授代酌由祝代酌故不洗也士尸親嘏主人大夫尸尊不親佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人釋曰案少牢云祝與二佐食皆出盥於洗入二佐食各取黍於一敦上佐食兼受摶之以授尸尸執以命祝卒命祝祝受以東北面于户西以嘏于主人但少牢不親嘏者大夫尸尊又大夫禮文此親嘏者士尸卑禮質故也云其辭則少牢饋食禮有焉者案少牢云祝以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之是也祭用黍者食之主上文爾黍不爾稷云獨用黍者食之主者案上文云爾黍于席上不云爾稷者以稷雖五榖之長不如黍之美故云食之主是以喪大記云君沐粱大夫沐稷士沐粱士喪禮士沐稻諸侯之士鄭注云差率而上天子沐黍主人受嘏詩懷之挂袪以季指主人左執角再拜稽首受復位詩懷之實於左袂挂於季指卒角拜尸答拜詩猶承也謂奉納之懷中季小也實於左袂挂祛以小指者便卒角也少牢饋食禮曰興受黍坐振祭嚌之古文挂作卦釋曰云挂袪以小指者便卒角也但右手執角左手挂袪以小指不於左手言便卒角者飲酒之時恐其遺落故挂以小指佐食俎觳折至賔尸時無俎祝左執角祭豆興取肺坐祭嚌之云云云主人答拜受角酌獻佐食者案上獻祝有俎此獻佐食不言俎者上經云云執事之俎陳於階間二列北上鄭注云執事謂有司以佐食亦在有司內者下記云佐食俎觳折脊脅也又下經賔長獻節鄭注云凡獻佐食皆無從其薦俎獻兄弟以齒設之若少牢獻佐食俎即設於兩階之間西上大夫將賔尸故即設佐食俎至於賔尸時佐食無俎也主婦酌亞獻尸不夾拜主婦洗爵于房酌亞獻尸注亞次也次猶二釋曰自此盡以爵入于房論主婦獻尸祝及佐食之事云主婦二獻不夾拜者士妻儀簡耳者此決少牢主婦亞獻尸時夾拜此士妻下之尸酢主婦如主人儀不易爵辟內子尸酢如主人儀釋曰云尸酢主婦如主人儀者自祝獻至尸拜送如酢主人也云不易爵辟內子者以經云酢如主人儀上尸酢主人時不易爵故此主婦受酢亦不易爵可知男女不相襲爵所以今襲爵者辟內子是以少牢云祝受尸爵尸答拜易爵洗酌授尸主婦拜受爵尸答拜是其易爵也尸止爵以待神惠之均于室中賔三獻如初燔從如初爵止注初亞獻也尸止爵云云釋曰自此盡卒復位論賔長獻尸及佐食并主人主婦致爵之事此一科之內乃有十一爵賔獻尸一也主婦致爵于主人二也主人酢主婦三也主人致爵于主婦四也主婦酢主人五也尸舉奠爵酢賔長六也賔長獻祝七也又獻佐食八也賔又致爵于主人九也又致爵于主婦十也賔獻主人酢十一也云初亞獻也者知不初獻者以主婦亞獻承初獻後賔長又承亞獻後故知如亞獻不得如初獻也又面位及燔從皆如亞獻也云三獻禮成欲神惠之均於室中是以奠而待之者謂尸得三獻而禮成言其實飲三爵祝與佐食亦得三獻主人主婦各得一酢而已未得獻是神惠未均奠而待之者待主人主婦致爵乃均也案下文衆賔長為加爵如初爵止鄭注云尸止爵者欲神惠之均于在庭止得一獻亦言均則不以爵數為均直據得一獻則為均也主人更爵自酢男子不承婦人爵主人降洗酌致爵于主婦云云主人更爵酌醋卒爵云云云主人更爵自酢男子不承婦人爵也者案上主婦獻尸尸酢主婦不易爵鄭注云辟內子致爵于主人則易爵也若然案下記設洗篚在洗西實二爵鄭注云二爵者為賔獻爵止主婦當致也此賔長所獻爵尸奠之未舉其篚唯有一爵得云易者上主婦亞獻洗爵洗爵于房中則房中有爵又主婦獻祝及佐食訖以爵入于房後主婦致爵于主人還是房內爵後主人致爵于主婦者是下篚之爵主婦飲訖實于房中之篚主人更取房內之爵以酌酢酢訖奠于下篚云主人更爵者謂酌酢爵與房內爵相更鄭注下記云主婦當致者謂主人致爵於主婦則用下篚內爵也洗爵以致于主人主婦以承賤者爵尸卒爵酢酌獻祝及佐食洗爵酌致于主人主婦云云釋曰此決上文賔獻尸獻祝及佐食不洗今致于主人洗故決之也案下篇不儐尸洗爵致于主人注云以承佐食賤新之此云為異事新之注不同者但為異事異事則是承賤承賤後則事異飲射賔主獻酢各專階此賔輕不專主人降阼階西面拜賔如初洗釋曰自此論獻賔及衆賔云就賔拜者此禮不主於尊也者案鄉飲酒鄉射賔主獻酢各於其階至酬乃同階此因祭如初賔非為尊之所尊者謂尸也又賔是士家有司卑不得專階故就之使不得專階也對鄉飲酒鄉射得專階也云主人在右統於其位者以其賔得在西階上北面以東為右主人位在阼階故云統于其位鄭言此者主人就西階異於飲酒主人在右則與飲酒禮同以言主人常居右也凡節解牲體皆曰折升俎名折俎薦脯醢設折俎釋曰案下記云賔骼鄭云骼左骼也賔俎全體尊賔也折骨而曰折俎明凡節解牲體皆曰折升于俎故名折俎與臑折同名其折義則異彼折骨云不言其體略云折俎非貴體也者案下記云賔骼骼是牲體此經云折俎者亦用骼非貴體飲射賔親酢此賔不敢敵主人主人自酢賔卒爵拜主人答拜受爵酌酢奠爵拜賔答拜云賔不敢敵主人主人逹其意者以其賓是士之屬有司之中以卑不敢與主人為敵酢之是以主人酌以自酢逹賔意故也若鄉飲酒鄉射賔皆親酢主人以其賔尊行敵禮獻賔兄弟酌上尊旅酬禮褻酒在下尊兩壺於阼階東加勺南枋西方亦如之釋曰自此盡揖復位論堂下設尊酬賔之事云行神惠不酌上尊卑異之者決上文獻賔及兄弟皆酌上尊者獻是嚴正故得與神靈共尊至此旅酬禮褻故不敢酌上尊案司尊彛職四時之祭云皆有罍諸臣之所酢少牢上下大夫堂下皆無尊者士卑得與人君同大夫尊辟人君故也云兩壺皆酒優之者設尊之法皆有玄酒今兩壺皆酒無玄酒優之也案玉藻云唯饗野人皆酒鄭云飲賤者不備禮與此注無玄酒為優之異者此士之祭禮欲得尊賔嘉客以事其先非賤者故以皆酒為優之彼饗野人野人是賤者故以不備禮解之也云先尊東方示惠由近者東方主人位西方賔位今先設東方乃設西方者見酒由主人來故云示惠由近為始也引禮運者彼注澄為沈齊酒是三酒酒所以飲諸臣證此壷尊亦飲在下者也案禮運澄酒在下神惠右不舉生人飲酒左不舉主人奠觶於薦北釋曰以其神惠右不舉生人飲酒左不舉今行神惠不可同於飲酒故奠於左與生人相變故有司徹云二人舉觶酬尸侑侑奠觶于右鄭注云奠于右者不舉也神惠右不舉變於飲酒是也此酬奠於薦左下文賔舉為旅酬以其神惠故也言不可同飲酒者謂不可同於鄉飲酒故鄉飲酒記云將舉者於右奠者於左其義與此别酬賔乃獻兄弟獻之禮成於酬主人洗爵獻長兄弟于阼階上如賓儀釋曰自此盡如衆賔儀論主人獻長兄弟及衆兄弟之事云酬賔乃獻長兄弟者獻之禮成於酬者以其獻賔之禮以酬副之乃禮成故冠禮云乃禮賔以一獻之禮鄭注云獻酢酬賔主人各兩爵而禮成又鄉飲酒獻及酬賔訖乃獻介又此文獻賔即酬賔乃獻兄弟故鄭注獻之禮成於酬也云亦有薦脀設於位者以經云獻長兄弟於阼階上如賔儀則長兄弟初受獻於阼階上時亦薦脯醢設折爼於阼階上祭訖乃執以降設於下位皆當如賔儀內兄弟姑姊妹及宗婦洗獻內兄弟於房中如獻衆兄弟之儀釋曰自此盡入復位論主人獻姑姊妹及宗婦之事云內賔宗婦也者此揔云內兄弟下記云內賔宗婦案彼注云內賔姑姊妹宗婦族人之婦若然兄弟者服名故號婦人為兄弟也云其位在房中之尊北者案下記云尊兩壺於房中西墉下南上內賔立於其北東面南上宗婦北堂東面北上是也云不殊其長略婦人者決上文獻賔於西階上獻兄弟於阼階上皆殊其長此不殊故云略之引有司徹者欲見此內賓受獻時亦南面拜受爵故下注云內賔之長亦南面答拜言亦者亦前受獻時前雖無文約有司徹內賓之長亦南面答拜獻內兄弟爵辨乃自酢以不殊其長云爵辨乃自酢以初不殊其長也者對上賓與長兄弟不得獻衆賓衆兄弟遍主人先自酢也云內賓之長亦南面答拜者獻時不殊其長酢時猶如賓及兄弟殊其長與男子同男子婦人衆賓以下皆無酢也天子至士獻數降殺以兩多之為加長兄弟洗觚為加爵如初儀不及佐食洗致如初無從釋曰此一經論士三獻之外為加獻尸之事云如初儀者如賓長三獻之儀但賓長獻十一爵此兄弟之長加獻則降唯有六爵以其闕主人主婦致爵并酬四爵及獻佐食五唯有六在者洗觚為加獻一也尸酢長兄弟二也獻祝三也致爵於主人四也致爵於主婦五也受主人酢六也云大夫士三獻而禮成者天子大祫十有二獻四時與禘唯有九獻上公亦九獻侯伯七獻子男五獻卿大夫士略同三獻而祭禮成也是以多之者為加若主人飲酒禮卿大夫三獻士唯一獻而已祭禮士與大夫同者攝盛葬奠亦與大夫同少牢五鼎又乘車建旜亦與卿大夫同也庭賓及兄弟未得旅酬尸止爵以均惠衆賓長為加爵如初爵止釋曰庭賔及兄弟雖得一獻未得旅酬其已得三獻又别受加爵故停之使庭行旅酬是以云尸爵止者欲神惠之均於在庭也儀禮要義卷四十五
