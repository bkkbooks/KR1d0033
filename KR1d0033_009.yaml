body:
  text: 儀禮要義卷九宋魏了翁撰鄉飲酒二賓得獻將酢主人故降洗賓降洗注將酢主人釋曰自此已下至西階上答拜論賓酢主人之事云將酢主人者案爾雅云酢報也前得主人之獻今將酌以報之故降洗而致潔敬故云將酢主人也盥後辭洗禮之常此賓未盥辭洗重之主人對賓坐取爵云云釋曰此賓坐取爵適洗南盥坐取爵卒洗以此言之則賓未盥主人辭洗案鄉射賓盥訖將洗主人乃辭洗先後不同者彼與鄉人習禮輕故盥訖乃辭洗此鄉人將賓舉之故未盥先辭洗重之故也若然鄉射禮內兼有鄉大夫即尊與州長同於盥後辭洗者以其盥後辭洗是禮之常故也但鄉射賓坐取爵適洗坐奠爵于篚下主人辭洗之時賓方奠爵于篚下此不奠爵篚下便言奠爵于篚者鄉射云賓坐取爵洗之時未得主人之命故得奠於篚下得主人之命乃奠于篚此則賓取爵適洗未奠之時主人即辭故奠于篚也賓辭主人酌已奠觶而不舉不盡人歡賓辭坐取觶云云賓北面坐奠觶于薦東復位云云釋曰賓辭不解所辭之事案鄉射二人舉觶于賓與大夫進坐奠于薦右賓與大夫辭坐受觶以興注云辭辭其坐奠觶以彼云賓與大夫辭即云坐受觶以興若自手受之以舉觶是禮已故賓與大夫可以當亢答之禮得云辭其親奠此禮初賓謙卑不辭其奠故經不云坐受以興然此辭是主人復親酌已故鄉射主人酬賔云賔辭鄭注云辭主人復親酌已是也云酬酒不舉君子不盡人之歡不竭人之忠以全交也並曲禮文案彼歡謂飲食忠謂衣服引之並證飲食主人自飲而盥尊介卒洗主人盥注盥者當為介酌釋曰此主人自飲而盥者尊介也是以鄉射云大夫將酢主人卒洗主人盥注云盥者雖將酌自飲尊大夫不敢褻是其類也射飲等皆三拜衆賔衆賔答一拜介降立于賔南主人西南面三拜衆賔衆賔皆答一拜釋曰自此已下至奠于篚論獻衆賔之事云西南面者以其主人在阼階下衆賓在賓介之南故西南向拜之云三拜一拜示遍不備禮也者衆賔各得主人一拜主人亦遍得一拜是不備禮故鄉射云三拜衆賓衆賓皆答一拜彼注云三拜示遍也一拜不備禮也大夫禮皆然故少牢云主人三拜𧃊者𧃊者皆答拜鄭云三拜旅之示遍也又有司徹云主人降南面拜衆賓于門東三拜衆賓門東北面皆答一拜大夫尊故也士則答再拜故特牲云主人三拜衆賓衆賓答再拜鄭云衆賓再拜者士賤旅之得備禮是也云不升拜賤也者此決上主人與賓介行禮皆升堂拜至此三拜賔賤故不升拜至也主人獻衆賔拜受者言三人則衆賔多矣主人揖升云云實爵于西階上獻衆賔衆賔之長升拜受者三人釋曰云主人揖升者從三人為首一一揖之而升也云降洗升賓爵者以下不更言洗則以下因此不復洗矣云西階上獻衆賓者下别言衆賓之長三人則衆賓之中兼言堂下衆賓故鄭云衆賓多矣自三人已下於下便以次歷言之矣云拜受者三人則堂下衆賔不拜受矣賔介坐祭坐飲拜既爵三賔簡衆賔彌簡坐祭立飲不拜既爵授主人爵降復位釋曰云卒爵不拜立飲立授爵賤者禮簡者賔賢能以賢者為賔其次為介不問長幼其三賓德劣于賔介則數年之長幼故上衆賔之長也賔介則坐祭坐飲又拜既爵此三賔則坐祭與賔介同不拜既爵立飲立授則異賤故禮簡堂下衆賔不拜受簡於三人故云禮彌簡也知位在下者以其堂下立侍不合有席既不言席故位在下既不言其數則鄉人有學識者皆來觀禮皆入飲酒之內是以鄉射云旅酬堂上辨卒受者興以旅在下者明衆賔在堂下也賔席末答拜以其無席上拜法實觶西階上坐奠觶遂拜執觶興賔席末答拜釋曰云賔席末答拜者謂於席西南而非謂席上近西為末以其無席上拜法也已下賔拜皆然樂有歌有笙有間有合設席于堂亷東上注為工布席也側邊曰亷云云釋曰自此下至樂正告于賔乃降論主人樂賔之事大判總為作樂其中别有四節之殊有歌有笙有間有合次第不同也案燕禮席工于西階上即云樂正先升大射亦云席工于西階上工六人四瑟始云小樂正從之不同者燕禮主於歡心尚樂故先云樂正先升大射主於射略於樂故辨工數乃云樂正從之也若然此主於樂不與燕同而席工下辨工數乃云樂正引者此臣禮避君也至於鄉射亦應主於射略於樂而不言工數先云樂正而不與大射同者亦是避君之事也云為工席也者以鄉射燕禮大射皆席工連言此不言席工文不具爾故此為工布席下云工入升明此席也引燕禮者欲證此席為工又取此工席在西階東以其此經云堂亷東上不言階東故取燕禮西階上少東樂正又在工西此下云樂正立於西階東而立在工西則知工席更在階東北面可知但此言近堂亷亦在階東彼云階東亦近堂亷也工四人二瑟二歌皆有相此大夫制工四人二瑟瑟先相者二人皆左何瑟後首挎越內弦右手相釋曰云四人大夫制也者此鄉大夫飲酒而云四人大射諸侯禮而云六人故知四人者大夫制也燕禮亦諸侯禮而云四人者鄭彼注云工四人者燕禮輕從大夫制也鄉射是諸侯之州士為之其中兼有鄉大夫以三物詢衆庶行射禮法故工亦四人大夫制也若然士當二人天子當八人為差次也二瑟二人鼓瑟則二人歌也者既云工四人二人瑟眀二人鼓瑟可知也云相扶工也衆賓之少者為之者見鄉射云樂正適西方命弟子弟子則衆賓之少者也云每工一人者案周禮瞽三百人又此經二人瑟相者二人皆左何瑟又大射僕人正相大師以諸文言之故知每工一人若然此經工四人二人瑟相二人則工二人歌雖不言相亦二人可知以空手無事故不言也云鄉射禮曰弟子相工如初入者彼謂將射樂正命弟子相工遷樂於下降時如初入之次第亦瑟先歌後相師謂太師燕瑟面鼓飲射變於君注凡工瞽矇故有相之者相瑟者持瑟相歌徒相釋曰云師即大師之官無目瞽矇之長也云後首者變於君也者案燕禮云小臣左何瑟面鼓注云燕尚樂可鼓者在前也此鄉飲酒亦尚樂而不面鼓是變於君也案大射主於射略於樂鄉射亦應主於射略於樂所以面鼓亦是變於君也貢賢能擬為卿大夫故歌小雅之三工歌鹿鳴四牡皇皇者華釋曰凡歌詩之法皆歌其類此時貢賢能擬為卿大夫或為君所燕食以鹿鳴詩也或為君出聘以皇皇者華詩也或使反為君勞來以四牡詩也故賔賢能而預歌此三篇使習之也鄉飲燕禮有歌笙間合鄉大射略卒歌主人獻工工左瑟一人拜不興受爵主人阼階上拜送爵釋曰案此鄉飲酒及燕禮同是主歡心尚樂之事故有升歌笙間合樂及其獻工獻笙後間合不獻以知二節自前已得獻故不復重獻鄉射主於射略於樂無笙間唯有合樂笙工並為至終總獻之大射亦主於射略於樂但不間歌不合樂故有升歌鹿鳴三終主人獻工後乃下管新宫不復得獻此君禮異於鄉射也若鄉射與大射同略於樂大射不略升歌而略笙間合者二南是卿大夫之正小雅是諸侯之正鄭注鄉射云不略合樂者不可略其正諸侯不略鹿鳴之等義亦然獻酒正酬皆祭旅以下不洗不祭衆工則不拜受爵祭飲辨有脯醢不祭釋曰云獻酒重無不祭也其正酬亦祭至於旅酬以下則不祭而已故下記云凡旅不洗不洗者不祭鄭注云敬禮殺也不甚潔也此衆工亦不洗而祭是以云獻酒重無不祭也獻法先瑟後歌隨太師所在以次獻之太師則為之洗注大夫若君賜之樂謂之大師云云釋曰云其獻之瑟則先歌則後者以其序入及升堂皆瑟先歌後其獻法皆先瑟後歌是以知獻之瑟先歌後隨大師所在以次獻之也燕禮云卒歌主人洗升獻工工不興左瑟一人拜受爵注云左瑟便其右一人工之長者也燕禮諸侯禮有常官不言大師以燕禮主為臣子故工四人從大夫制其大師入工不别言之也大射云主人洗升實爵獻工工不興左瑟注云大師無瑟於是言左瑟者節也若大師在歌亦先得獻與燕異也笙詩三篇亡鄭注禮與注詩異笙入堂下磬南北面立樂南陔白華華黍釋曰案南陔注云孔子論詩雅頌各得其所時俱在耳篇第當在於此時遭戰國及秦之世而亡之其義則與衆篇之義合編故存至毛公為詁訓傳乃分衆篇之義各置於其篇端彼詩鄭注又與此不同者鄭君注禮之時未見毛傳以為此篇孔子前亡注詩之時既見毛傳以為孔子後失必知戰國及秦之世者以子夏作序具序三篇之義明其詩見在毛公之時亡其辭三笙一和今笙長一人堂下拜受爵主人獻之於西階上一人拜盡階不升堂受爵云云釋曰云一人拜者謂在地拜乃盡階不升堂受爵也云一人笙之長者也者笙者四人今言一人受爵明據為首長者而言也云笙三人和一人凡四人者案鄉射記云三笙一和而成聲注三人吹笙一人吹和凡四人爾雅曰笙小者謂之和是也云鄉射禮曰笙一人拜于下者即此一人拜者亦在堂下可知但獻工之時拜送在西階東以工在階東故也此主人拜送笙之時在西階上以其笙在階下故不同也堂上歌詩皆存堂下笙詩併亡乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀釋曰此一經堂下吹笙堂上升歌間代而作故謂之乃間也云謂一歌則一吹者謂堂上歌魚麗終堂下笙中吹由庚續之以下皆然此魚麗南有嘉魚南山有臺其詩見在云六者皆小雅篇也者見編在小雅之內故知之見在者鄭君亦先引其序後引其詩堂上歌者不亡堂下笙者即亡蓋當時方以類聚笙歌之詩各自一處故存者併存亡者併亡也合樂謂堂上下衆聲俱作乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋釋曰此一經論堂上堂下衆聲俱合之事也云合樂謂歌樂衆聲俱作者謂堂上有歌瑟堂下有笙磬合奏此詩故云衆聲俱作云周南召南國風篇也者案論語注國風之首篇謂十五國風之篇首義可知也云王后國君夫人房中之樂歌也者案燕禮記云有房中之樂注云弦歌周南召南之詩而不用鍾磬之節謂之房中者后夫人之所諷誦以事其君子是也既名房中之樂用鍾鼓奏之者諸侯卿大夫燕饗亦得用之故用鍾鼓婦人用之乃不用鍾鼓則謂之房中之樂也饗禮可進取燕禮可逮下其實饗燕同樂注鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂釋曰據此鄉飲酒為饗禮升歌鹿鳴進取諸侯之樂饗禮盛可以進取也云燕合鄉樂輕者可以逮下也鄭君據儀禮上下而言其實饗燕同樂知者穆叔如晉晉侯饗之歌鹿鳴之三是與燕禮同樂也若然小雅云饗或進取燕可以逮下者饗亦逮下也云春秋傳曰者襄公四年左氏傳文彼云穆叔如晉晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜升歌合樂各有差肆夏同笙間有未聞注諸侯相與燕升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅其笙間云云釋曰案詩譜云天子諸侯燕羣臣及聘問之賔皆歌鹿鳴合鄉樂鄭云諸侯相燕天子與國君燕與大國之君燕國語及襄公四年公言饗見之者亦欲饗同也向來所言皆據升歌合樂有此尊卑之差若納賔之樂天子與五等諸侯同用肆夏是以燕禮納賔用肆夏禮記郊特牲云大夫之奏肆夏由趙文子始也是大夫不得用之其諸侯以上同用之也云其笙間之篇未聞者案鄉飲酒禮笙間之樂前與升歌同在小雅則知元侯及國君相饗燕笙間亦同升歌矣而云未聞者謂如由庚由儀之等篇名未聞主人側降謂賔介不從主人降席自南方側降注賔介不從釋曰側者特也賔介不從故言側上文主人降賓介皆從降此獨不從者以其方燕禮殺故也將留賓燕作相為司正以監惰者作相為司正司正禮辭許諾主人拜司正答拜釋曰上經云一相迎于門外今將燕使為司正監察賓主之事故使相為司正也此司正升西階適阼階上案鄉射云司正升自西階由楹內適阼階上北面彼此同此不言由楹內者省文也儀禮要義卷九
