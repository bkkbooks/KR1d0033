body:
  text: 儀禮要義卷五十宋魏了翁撰有司徹二主人旅衆賓三拜衆賓皆答一拜釋曰自此盡賓降論主人獻長賓已下并主人受酢之事云拜於門東明少南就之也者以其繼門言之明少南就之云言三拜者衆賓賤旅之也者案周禮司士職孤卿特揖大夫以其等旅揖注云特揖一一揖之旅衆也大夫爵同者衆揖之此云旅之者旅衆也衆人共得一拜云衆賓一拜賤也者以賤不得備禮故云賤也云純臣也位在門東者此對特牲記云公有司門西北面東上獻次衆賓私臣門東北面西上獻次兄弟此賓皆在門東故云純臣者指北面時也得獻訖在西階下亦不純臣故下經云獻私人于阼階上注云私人家臣已所自謁云獻私人于阼階上注云私人家臣已所自謁除也大夫言私人明不純臣也若然大夫云私人見不純臣士言私臣不言人者大夫尊近君若言私臣則臣與君不異故名私人士卑無辟君臣之名不嫌故名私臣禮得獻即薦今徧獻乃薦畧之辯受爵其薦脯醢與脀設于其位釋曰即薦謂若燕禮三卿已上得獻即薦大夫徧獻乃薦亦其類云亦宰夫薦司士脀者此約上賓士獻長賓即酢此辯獻乃酢乃升長賓主人酌酢於長賓西階上北面賓在左釋曰特牲主人獻長賓訖即酢此辯獻乃酢者主人益尊先自達其意特牲主人獻内賓辯乃自酢注云爵辯乃自酢以初不殊其長也則此大夫尊初則殊其長故也主人酬長賓於堂下宰夫洗觶以升主人受酌降酬長賓於西階南釋曰自此盡於薦左論主人酬長賓於堂下之事也云宰夫授主人觶則受其虚爵尊於篚者謂上主人受賓之酢爵今宰夫既授觶訖因受取酢之虚爵降奠於篚也知然者上文主人受爵訖賓降主人無降文即云宰夫授觶主人受之明主人手中虚爵宰夫受之奠於篚可知若然知不待酬賓虚觶受之奠於篚者以其下文賓之虚觶奠於薦左故知非賓虚觶其賓奠薦左者後舉之以為無筭爵也大夫之兄弟雖賤而親故親酌主人洗升酌獻兄弟於阼階上兄弟之長升拜受云云釋曰自此盡其衆儀也論主人獻兄弟於阼階之事云兄弟長㓜立飲賤不别者案特牲云獻長兄弟於阼階上如賓儀者士卑長兄弟為貴殊貴賤故云如賓儀長賓坐飲也此大夫禮長賓坐飲衆賓立飲至於大夫貴兄弟賤兄弟長㓜皆立飲不得如賓儀故立飲賤不别也云大夫之賓尊於兄弟宰夫不賛酌者兄弟以親昵來不以官待之者決上文大夫賓貴使宰夫賛酌今兄弟酌不使宰夫賛酌者為兄弟是親昵不以官待之故兄弟雖賤於賓不得使人賛酌而親之也士兄弟位繼主人大夫兄弟在洗東其位在洗東西面北上升受爵其薦脀設於其位云位不繼於主人而云洗東卑不統於尊者案特牲主人卑故兄弟助祭之位得繼主人於阼階下南陳又得辟大夫不敢自尊也此以大夫尊故兄弟之位在洗東不繼主人卑不統於尊故也云此薦脀皆使私人者上獻賓長及衆賓使宰夫設薦司士設俎又使宰夫替酌至於此獻兄弟為親昵不以官待之主人親酌明亦不以官使私人薦脀可知先生之脀謂長兄弟非教學者先生之脀折脅一膚一鄭知先生是長兄弟者以其文承長兄弟之下故知先生非老人教學者知折是豕左肩之折者以上初亨牲體明侑俎豕左肩折注云折分為長兄弟俎是也主人獻内賓南面拜不與為賓主禮主人洗獻内賓於房中南面拜受爵主人南面於其右答拜釋曰自此盡亦有薦脀論主人獻姑姊之等於房中之事知内賓是姑姊妹及宗婦者約特牲記而知也云獻於主婦之席東主人不西面尊不與為賓主禮也者案特牲獻内兄弟於房中如獻衆兄弟之儀主人西面答拜此大夫禮主人南面拜故決之不與為賓主之禮也云南面於其右主人之位恒左人者謂人在主人左若鄉飲酒鄉射之等於西階上北面主人在東賓在西北南面則主在西賓在東故云恒左人也大夫獻私人下拜升受主人答長拜主人降洗升獻私人於阼階上拜於下升受主人答其長拜釋曰自此盡主人就筵論主人獻私人之事云私人家臣已所自謁除也者此對公士得君所命者此乃大夫自謁請於君除其課役以補任為之云大夫言私人明不純臣也者大夫尊近於君故屈已之臣名為私人云士言私臣明有君之道者士卑不嫌近君故得名屬吏為私臣也云北上不敢専其位者以其兄弟北上今繼兄弟之南亦北上與兄弟位同故云不敢專其位至賓長三獻備因號上賓為三獻尸作三獻之爵釋曰自此盡降實於篚論舉三獻之爵賓長又獻侑并致爵之事云上賓所獻爵者若然三獻是上賓不言上賓而言三獻者以其主人主婦并此賓長備三獻因號上賓為三獻是以事名官者也云不言三獻作之者對特牲云三獻作止爵故決之下大夫不儐尸自作爵者順上大夫為文作其爵者以神恵均於庭訖欲使尸飲此酒但此一節之内有四爵行事四者尸作三獻之爵一也獻侑二也致爵於主人三也受尸酢四也飲禮至旅酬及無筭乃為殷勤二人洗觶升實爵西楹云云尸侑答拜坐祭云云尸侑答拜皆降釋曰自此盡及私人論旅酬從尸及上下無不徧之事云三獻而禮小成者以此獻為正後仍有舉奠加爵之等終備乃是禮之大成故云小成也云使二人舉爵序殷勤於尸侑者飲酒之禮酬無筭爵乃盡歡心故以旅酬及無筭乃為殷勤於尸侑也案鄉飲酒及鄉射特牲等皆一人舉觶為旅酬始二人舉觶為無筭爵始今儐尸乃以二人為旅酬始者此儐尸别一體與彼不同以其初時主人酬尸尸奠之侑未得酬故使二人舉觶侑乃得奠而不舉即與亦奠一爵一爵遂酬於下是以湏二人舉觶兄弟之後生者舉觶於其長為無筭爵者以其賓長所舉奠酬亦無筭爵以此二觶者皆在堂下故為無筭爵尸不與無筭爵故舉堂下觶為無筭爵其為旅酬皆從上發尸為首故特牲等使一人舉觶為旅酬與賓長所舉薦右之觶此賓不舉旅酬皆從尸舉故所奠者為無筭一爵亦是異於特牲上經主人與尸分東西楹今同阼階尸遂執觶以興北面於阼階上酬主人主人在右釋曰決上文尸酢主人主人東楹東北面拜受爵尸西楹西北面答拜是各各於其階今尸酬主人同於阼階故云禮殺也私人之長拜下升受兄弟之爵下飲遂及私人拜受者升受下飲釋曰私人位在兄弟之南今言下飲之則私人之長一人在西階下飲之其餘私人皆飲於其位故下經云卒爵升酌以之其位相酬辯是也末受酬者雖無所旅猶自飲卒飲者實爵於篚釋曰凡旅酬之法皆執觶酒以酬前人前人領受其意乃始自飲此私人末受酬者後雖無人可旅猶自飲之訖乃實爵於篚以其酒是前人所酬不可不飲故也私人得旅酬房中内賓旅可知乃羞庶羞於賓兄弟内賓及私人釋曰此經論無筭爵時羞庶羞於賓及兄弟之等事云比羞同時羞則酌房中亦旅者旅酬之下云乃羞庶羞内賓羞在私人之上私人得旅酬則房中内賓亦旅可知注其始主婦舉酬於内賓遂及宗婦古文觶皆作爵延熹校書定作觶兄弟之後生者舉觶於其長釋曰自此盡爵止論後生舉觶於長兄弟主人酬兄弟之事古文觶皆作爵延熹中詔校書定作觶長兄弟北面而長在西辟主人釋曰凡獻酬之法主人常在左若北面則主人在東今長兄弟北面云長在左則在西故辟主人拜受答拜皆不北面儐尸禮殺長拜受於其位舉爵者東面答拜爵止云儐尸禮殺者案特牲兄弟之後生舉觶於其長為旅酬又兄弟弟子舉觶於其長為無筭爵拜送皆北面此云東面決上儐尸禮殺長賓言奠兄弟言爵止互明長在左奠爵拜云云舉爵者東面拜爵止云長賓言奠兄弟言止互相發明者上文主人酬賓奠爵於薦左是長賓言奠此言爵止是兄弟言止長賓言奠明止而未行此言止明亦奠薦左故云互相發明也云相待也者酬賓雖在前及其行之相待俱時舉行故下文云賓及兄弟交錯其酬皆遂及私人爵無筭是也若二人舉觶於尸侑侑奠於右不舉尸即酬主人主人酬侑侑酬長賓至於衆賓遂及兄弟遂及私人依次第行徧不交錯所謂旅酬也爵不止即飲用爵爵尊於觚賓長獻於尸如初無湆爵不止釋曰此一經論衆賓長加為爵數多與上賓異何者上賓獻侑致爵於主人時皆有湆魚從今無湆魚從故經云無湆也云爵不止者上賓獻尸時亦止爵待獻堂下畢乃舉觶今尸不止爵即飲故云爵不止言獻者尊大夫用爵者爵尊於觚次賓舉爵於尸更為旅酬如初賓一人舉爵於尸如初亦遂之於下釋曰此一經論次賓舉觚於尸更為旅酬如上旅酬之事但前二人舉觶於尸侑尸舉旅酬從上至下皆徧飲今亦從上至下故云亦遂之於下云上言無湆爵不止互相發明者上經云爵止與上賓奠爵云互相發明今此又與上文無湆爵不止相發明是以二文皆在如初之下賓及兄弟交錯行無筭爵賓及兄弟交錯其酬皆遂及私人爵無筭釋曰自此盡有司徹論堂下行無筭爵禮終尸侑出主人送於廟門外之事云長賓取觶者是主人酬賓觶云長兄弟取觶者是兄弟之後生者舉觶於其長之觶也有司徹堂上下薦俎外實尸雖堂上婦人不徹有司徹釋曰云徹堂上下之薦俎也者案上文堂上有尸侑之薦俎堂下有賓及兄弟之薦俎皆徹之也云外賓尸雖堂上婦人不徹者案特牲云宗婦徹祝豆籩入於房徹主婦薦俎此篇首云有司徹鄭注云徹室中之饋及祝佐食之俎為將儐尸故使有司徹之下大夫不儐尸改饋饌於西北隅云有司官徹饋饌於室中西北隅至篇末禮終云婦人乃徹注云徹祝之薦及房中薦俎不使有司者下上大夫之禮然此篇首云有司徹别無婦人也下大夫有司饌陽厭婦人徹之篇末云徹室中之饌注云有司饌之婦人徹之外内相兼禮殺此户外儐尸亦禮殺嫌婦人亦徹之故云雖堂上婦人不徹婦人必不徹者異於下大夫也堂上儐尸猶如堂内之陽厭故鄭注篇首云儐尸則不設饌西北隅以此薦俎之陳有祭象而亦足以厭飫神是也下大夫不賓尸不得備禮若不賓尸注不賓尸謂下大夫也其牲物則同不得備其禮耳舊説云謂大夫有疾病攝昆弟祭曽子問曰攝主不厭祭不旅不假不綏祭不配布奠於賓賓奠而不舉而此備有似失之矣釋曰自此盡牢舉如儐論下大夫不賓尸之事云不賓尸謂下大夫者從尸飲七已前皆與上大夫賓尸者同已後則以此祝侑續之是儐尸之禮故云不賓尸謂下大夫也云其牲物則同不得備其禮耳者謂不備儐尸禮也引曽子問者破舊説案彼上云若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配注云皆辟正主厭厭飫神也厭有隂有陽迎尸之前祝酌奠奠之且饗是隂厭也尸謖之後徹薦俎敦設於西北隅是陽厭也此不厭者不陽厭也不旅不旅酬也假讀為嘏不嘏不嘏主人也不綏祭謂今主人也又云布奠於賓賓奠而不舉是也云而此備有似失之矣者謂此不儐尸者不厭已下皆有則非如舊法使昆弟攝者乃盛於肵俎以歸尸故乃盛俎臑臂肫脡脊横脊短脅代脅皆牢釋曰云盛者盛於肵俎也者以特牲云盛肵俎俎釋三个故知盛於肵以歸尸故也云此七體羊豕者以其五鼎下有魚腊膚又不升故唯羊豕凡骨體之數左右合為二十一體云而俎猶有六體焉者謂三脊三脅皆取一骨盛於肵各有一骨體在俎不取以備陽厭也主人獻尸祝佐食酳尸主人洗酌酳尸賓羞肝皆如儐禮自此盡薦脀皆如儐禮論主人獻尸祝及佐食之事此主人獻有五節主人獻尸一也酢主人二也獻祝三也獻上佐食四也獻下佐食五也綏祭讀如藏其隋之隋尸酢主人亦如儐其綏祭其嘏亦如儐云綏皆當作挼者案經唯有一挼而云皆者鄭并下佐食綏摠破之故云皆也云讀為藏其隋之隋者讀從周禮守祧職云既祭則藏其隋必讀從之者義取隋減之事也主婦獻尸祝佐食同主人唯不受嘏主婦其洗獻於尸亦如儐釋曰自此盡入於房論主婦亞獻尸及祝并獻二佐食之事此一節之内獻數與主人同唯不受嘏為異云與儐同者經既云如儐而注復云與儐同者為事在上篇而發也士妻獻尸不夾爵拜此夾拜尸以酢主婦主婦主人之北拜受爵尸答拜案特牲主婦獻尸不夾爵拜上篇上大夫賓尸主婦獻尸夾爵拜下大夫既不賓尸主婦宜與士妻同今夾爵拜者為不賓尸降崇敬故夾爵拜與上大夫同言降謂降賓尸之禮也卿妻為内子今鄭於下大夫妻亦稱注内子不薦籩祝賤使官可也云云案禮記注内子卿妻引春秋趙姬請逆叔隗以為内子證卿妻為内子今此下大夫妻得稱内子者欲見此下大夫妻於祝不薦籩兼見上大夫妻亦不薦籩故變言内子也或可散文下大夫妻亦得為内子也尸欲神恵均故止爵待之賓長洗爵獻於尸尸拜受賓尸西北面答拜爵止釋曰自此盡庶羞在左論賓長獻尸祝佐食并致爵之事此一節之内凡有十爵獻尸一也主婦致爵於主人二也主人酢主婦三也尸作止爵飲訖酢賓長四也賓獻祝五也又獻上佐食六也又獻下佐食七也賓致爵於主人八也又致爵於主婦九也賓受主人酢十也云賓尸西北面答拜者案上少牢正祭賓獻與此篇首賓長獻皆云拜送此特言答拜者下大夫故也言拜送者禮重云答拜者禮輕祭見夫婦之别主婦洗於房中酌致於主人主人拜受主婦拜送爵司宫設席釋曰此下大夫夫婦致爵之禮祭統云夫祭有十倫之義七曰見夫婦之别焉又曰尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵彼據夫婦致爵而言又詩既醉序云醉酒飽徳謂見十倫之義志意充滿是天子諸侯皆有夫婦致爵之事但少牢上大夫受致不酢下大夫受致又酢不致士受致自致是上大夫尊辟君受致不酢下大夫與士卑不嫌得與人君同夫婦致爵也云拜受乃設席變於士也者案特牲禮未致爵已設席故云異於士其上大夫正祭未致爵至賓尸尸酢主人設席以有尸賓故設席在前也案周禮司几筵云祀先王胙席亦如之鄭注云謂祭祀及王受酢之席彼受酢時已設席與大夫禮異也鄭注周禮司几筵又云后諸臣致爵乃設席與此禮同者士卑不嫌多與君同故也特牲無祭酒之文大夫作止爵乃祭酒尸作止爵祭酒卒爵賓拜祝受爵尸答拜釋曰云作止爵乃祭酒亦變於士者特牲賓三獻如初燔從如初爵止無祭酒之文至三獻作止爵尸卒爵亦無祭酒之文知特牲祭酒訖乃止爵者以經云燔從如初乃云爵止鄭注云初亞獻也亞獻時祭酒訖乃始燔從則三獻燔從如初始云爵止明是祭酒既訖乃始止爵今大夫作止爵乃祭酒故云變於士云自爵止至作止爵亦異於賓者此篇首賓尸禮賓長獻尸奠爵又云尸作三獻之爵不解以為與賓同云異者賓尸止爵在致爵後其作之在獻私人後欲神恵之均於庭此止爵在主婦致爵前作之在致爵後欲神恵均於室中與特牲燔從如初爵止同少牢上篇所以不致爵者為賓尸賓尸止爵者欲室中神恵均於庭故止爵也特牲再止爵者一止爵欲神恵均於室中一止爵者順上大夫之禮也主人獻衆賓兄弟内賓私人皆堂下主人降拜衆賓洗獻衆賓云云獻兄弟内賓私人此一經論主人獻堂下衆賓兄弟下及私人并房中内賓皆與上大夫禮同之事次賓長獻尸為加爵賓長獻於尸尸醋獻祝致醋賓以爵降實於篚此經論次賓長獻尸已下之事以其上賓長上已獻尸訖明此是次賓長為加爵也致致爵於主人主婦下大夫闕旅酬直行無筭爵賓兄弟交錯其酬無筭爵案此一經論堂下賓及兄弟行無筭爵之事此堂下兄弟及賓行無筭爵似下大夫無旅酬故鄭云此亦與儐同者在此篇若此經兼有旅酬鄭不得言與儐同案特牲尸在室内亦不與旅酬之事而堂下賓及兄弟行旅酬又使弟子二人舉觶為無筭爵者下大夫雖無儐尸之禮堂下亦與神靈共尊不敢與人君之禮同既與神靈共尊故闕旅酬直行無筭爵而已特牲堂下得獻之後與神别尊故旅酬無筭爵並皆行之士賤不嫌與君同故得禮備也利獻不及主人儐尸禮殺利洗爵獻於尸尸醋獻祝祝受祭酒啐酒奠之此一經論佐食事尸禮將畢為加爵獻尸及祝之事云利獻不及主人殺也者此對上文賓長為加爵及主人此不及主人是殺也又云此亦異於賓者案上少牢無利獻賓三獻尸即止此篇首儐尸之禮佐食又不與故無佐食獻故云異也官徹謂司馬司士舉俎宰夫取敦豆卒𧃊有司官徹饌於室中西北隅南面如饋之設右几自此下盡篇末論餕訖改饌於西北隅為陽厭之事云官徹饋者司馬司士舉俎者經云官徹則司馬主羊司士主豕明還遣此二人舉俎可知即上經云司馬刲羊司士擊豕是也云宰夫取敦及豆者以其宰夫多主主婦之事儀禮要義卷五十
