body:
  text: 儀禮要義卷二十七宋魏了翁撰覲禮二四享當作三享古二二字積畫故誤四享皆束帛加璧庭實惟國所有自此盡事畢論侯氏行覲禮訖相隨即行三享之事云四當為三古書作三四或皆積畫此篇又多四字字相似由此誤也者知四當為三者諸文唯謂三享無四享之事所以誤作四者由古書作三四之字或皆積畫者堯典云帝曰咨亖嶽臯陶云外薄亖海泰誓序云作泰誓三篇是古書三四皆積畫也云此篇文多四字者下有四傳擯又云路下四亞之又云束帛四馬四門四尺四字既多積畫四又似三由此故誤為四字也引大行人者欲證三享為正文云其禮差又無取於四也者案聘禮小聘曰問不享大聘雖有享不言數明一享而已案大行人五等諸侯皆同三享若然三與一及不享是其禮之差是無取於四之義故從三為正初享皮馬次享三牲魚臘等云初享或用馬或虎豹之皮者案下經先陳馬聘禮特言皮故知初享以此二者為先言或者聘禮記云皮馬相間可也又聘禮經夕幣時皮則左首展幣時更云馬則幕南北靣此下經亦用馬案郊特牲云虎豹之皮示服猛也是其或用馬或用虎豹之皮為初享也云其次享三牲魚臘籩豆之實以下皆禮器文是以禮器云大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也彼諸侯國王為祫祭而致之與此因覲致之同以其因覲即助祭因祭即致享物若不當三年祫祭即特致三享也凡享者皆貢國所有以璧帛致之云皆以璧帛致之者案聘禮束帛加璧享君束錦加琮享夫人小行人亦云璧以帛琮以錦是五等諸侯享天子與后此云璧帛致之者據享天子而言若享后即用琮錦但三享在庭分為三段一度致之據三享而言非謂三度致之為皆也凡享者貢國所有或因朝而貢或歲之常貢歲之常貢則小行人云春入貢及太宰九貢是也因朝而貢者則大行人云侯服歲一見其貢祀物之等是也皆有璧帛以致之案小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故注云合同也六幣所以享也五等諸侯享天子用璧享后用琮其大各如其瑞皆有庭實以馬若皮皮虎豹之皮用圭璋者二王之後也二王後尊故享用圭璋而特之禮器曰圭璋特義亦通於此其於諸侯亦用璧琮耳子男於諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玉大小各降其瑞一等若如此言鄭知五等享玉各如其瑞者見玉人職云璧琮九寸諸侯以享天子言九寸據上公琮以享后不言者文不具公依命數與瑞等則侯伯子男之享玉亦如其瑞可知又知五等自相享各降其瑞一等又見玉人職云瑑琮八寸諸侯以享夫人鄭云獻於所朝聘君之夫人兼言聘者欲見聘使亦下君之瑞一寸與君同直言瑑琮享夫人不見瑑璧以享君亦文不具若然侯伯子男自相享各降其瑞一寸可知圭璋據二王後享天子與后者五等諸侯既用璧琮二王後尊明用圭以享天子用璋以享后可知又知二王後自相享亦用璧琮者以五等諸侯降於享天子明二王後退用璧琮可知子男自相享用琥璜者以其子男瑞用璧享天子可與瑞同自相享不得與瑞等降用琥璜可知若然子男之臣自相聘亦享用琥璜不得踰君故也又知五等之臣聘享之玉皆降其君一寸者又見玉人云瑑圭璋八寸璧琮八寸以眺聘八寸據上公之臣則侯伯子男臣各降其君一寸可知上公者謂王之三公為二伯及二王後孝經緯援神契云二王後稱公大國稱侯則二王之後為公而二伯謂公者案典命云上公九命為伯其國家宫室車旗衣服禮儀皆以九為節鄭注云上公者謂王之三公有德者加命為二伯二王之後亦為上公若然典命云王之三公八命有功加一命為二伯則周公召公是也本國猶稱侯則魯侯燕伯是也一馬卓上讀如卓王孫之卓奉束帛匹馬卓上九馬隨之云云云卓讀如卓王孫之卓卓猶的也者以音字既同而讀從之卓王孫是司馬相如之妻文君之父也於十馬之內以素的一馬以為上故訓卓為的也云書其國名後當識其何産也者謂若晉有鄭之小駟復有屈産之類是也云馬必十匹者不敢斥王之乘用成數敬也者此為庭實故用十匹案康王之誥二伯率諸侯而入皆布乘黃朱而陳四匹者彼據二王之後以國所有享新王享物陳於庭用圭以馬致享馬不得上堂亦陳於庭直以圭升堂致命乘馬若乘皮故以四為禮非所享之物故用四馬與此異也皮馬與玉皆為幣侯氏升致命王撫玉侯氏降自西階東面授宰幣云云釋曰云授宰幣王既撫玉不受幣幣即束帛加璧并玉言幣故小行人合六幣皮馬與玉皆為幣此單言宰即大宰大宰主幣故周禮大宰職云大朝覲㑹同贊玉幣玉獻玉几玉爵注云助王受此四者是也云王不受玉撫之而已輕財也者案聘義圭璋還之為重禮璧琮不還為輕財是以圭璋親受璧琮初即不受為輕財故也云以馬出隨侯氏出授王人於外也者謂侯氏牽馬而出馬隨侯氏之後出授王人於外也云王之尊益君侯氏之卑益臣者春夏受贄于朝雖無迎法王猶在朝至受享又迎之而稱賔主至覲禮受享皆無迎法不下堂而見諸侯已是王尊為君禮臣卑為臣禮王猶親受其玉今至于三享貢國所有行供奉之節故使自執其馬王不使人受之於庭者是王之尊益君侯氏之卑益臣故也聘禮享用皮及賔私覿馬皆使人受之者見他國之君不臣人之臣故與此異聘禮享君有幣問卿大夫覲亦當然聘禮享君尚有幣問卿大夫此諸侯覲天子享天子訖亦當有幣問公卿大夫是以隱七年左氏傳云初戎朝于周發幣于公卿而凡伯不賔服注云戎以朝禮及公卿大夫發陳其幣凡伯以諸侯為王卿士不修賓主之禮敬報于戎是以冬天王使凡伯來聘還戎伐之於楚丘以歸是諸侯朝天子亦有聘及公卿大夫之事也侯氏右袒受刑王免之降出事畢乃右肉袒于廟門之東乃入門右北面立告聽事釋曰自此盡降出論侯氏受刑王免之降出之事刑袒於右者右是用事之便又是隂隂主刑以不能用事故刑袒於右也云凡以禮事者左袒左袒者無問吉凶禮皆袒左知者士喪禮云主人出南靣左袒扱諸靣之右檀弓云延陵季子葬其子於嬴博之間葬訖左袒故云凡以該之引易曰折其右肱無咎者案易豐卦九三云折其右肱無咎凡卦爻二至四三至五兩體交互各成一卦先儒謂之互體故鄭隨其義而注云三艮爻艮為手互體為巽巽又為進退右肱也猶大臣用事于君君能誅之故無咎引之者證刑理宜於右既袒而王辭當出隱於屏外而襲侯氏再拜稽首出自屏南適門西遂入門左北靣立云當出隱於屏而襲之也者以屏外不見天子為隱向者右袒今王辭以無事故冝襲也云天子外屏者據此文出門乃云屏南即是外屏云天子外屏取禮緯之文故禮緯云天子外屏諸侯內屏大夫以簾士以帷是也天子賜侯氏車服天子賜侯氏以車服迎于外門外再拜釋曰自此盡亦如之論王使人賜侯氏車服之事云同姓金路異姓象路案周禮巾車掌五路自玉路至木路玉路以祀尊之不賜諸侯金路云同姓以封象路云異姓以封革路云以封四衛木路云以封蕃國鄭云同姓謂王子母弟率以功德出封雖為侯伯其畫服猶如上公賜魯侯鄭伯服則衮冕得乘金路以下與上公同則大公與杞宋雖異姓服衮冕乘金路矣異姓謂舅甥之國與王有親者得乘象路異姓侯伯同姓子男皆乘象路以下四衛謂要服以內庶姓與王無親者自侯伯子男皆乘革路以下蕃國據外為揔名皆乘木路而已鄭直言金路象路者略之也云服則衮也鷩也毳也據司服而言邦國連言據諸侯單言國據王同姓大國則曰伯父其異姓則曰伯舅同姓小邦云云釋曰案周禮冢宰職云掌建邦之六典以佐王治邦國注云大曰邦小曰國邦之所居亦曰國者彼經或邦國連言或單言國則邦國連言據諸侯單言國據王以邦在國上故云大曰邦小曰國唯王建國是邦之所居亦曰國彼對文則例散文則通故此大國言國小國言邦也鄭云據此禮云伯父同姓大邦而言者鄭欲解稱伯父叔父不要同姓為定之意云據此云伯父者即上文云伯父此文即云同姓大國則曰伯父是以據此禮云伯父同姓大邦而言者也據文則不要同姓與大國案下曲禮東西二伯不問同姓異姓皆稱伯父州牧而稱叔父鄭云牧尊於大國之君而謂之叔父辟二伯亦以此為尊是此又云同姓大國則曰伯父者唯據此禮而云伯父而言不據他文故鄭此注決為不定之意饗食燕皆有酬幣侑幣饗禮乃歸釋曰云禮謂食燕也者案聘禮及諸文言饗皆單云享無云禮鄭所引掌客五等饗食燕三者具有今饗下有禮故以禮為食燕也云王或不親以其禮幣致之鄭言此者欲解經變食燕而言饗禮見王有故不親食燕則以禮幣致之故言饗禮云略言饗禮互文者直言饗見王無故親饗之若王有故亦以侑幣之禮致之食燕公之禮見王有故以幣之禮致之亦宜有王無故親食燕故云互文也引掌客者見五等諸侯享食燕皆具有證經之禮是食燕之義也以此文為互則饗食燕皆有酬幣侑幣是以掌客職三享三食三燕云云即云若弗酌則以幣致之鄭注云若弗酌謂君有故不親享食燕彼是諸侯自相待法此鄭引之證經天子待諸侯法則天子待諸侯三者皆有幣可知案掌客云王巡守從者三公視上公之禮卿視侯伯之禮大夫視子男之禮則天子使公卿大夫存眺省至諸侯之國諸侯與之饗食燕皆有幣與諸侯同可知也若大國之孤聘於天子及鄰國其饗食燕有侑幣酬幣亦與子男同故大行人云凡大國之孤執皮帛以繼小國之君出入三積不問一勞又云其他皆視一小國之君鄭注云他謂二車及介牢禮賔主之間擯者將幣祼酢饗食之數故知饗食燕亦有幣也案聘禮云若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐致饗以酬幣亦如之是親饗食之有幣可知又云燕與俶獻無常數又不言致燕以幣則無致燕之禮親燕亦無酬幣鹿鳴序云燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意飲食據饗食有幣若然發首云燕羣臣嘉賔者文王於羣臣嘉賔恩厚燕之無數故先言其實無幣也若然天子燕已臣及四方卿大夫諸侯燕已臣及四方卿大夫皆無酬幣也時㑹殷同王為壇見諸侯諸侯覲于天子為宫三百步四門壇十有二尋深四尺釋曰自此盡四傳擯論㑹同王為壇見諸侯之事云四時朝覲受之於廟者案曲禮下經言之春夏朝宗在朝不在廟而言四時朝覲皆在廟者朝宗雖在朝受享則在廟故并言之云此謂時㑹殷同也者以司儀職云將合諸侯則令為壇三成與此為一事則合者合諸侯也故知此為壇見諸侯謂時㑹殷同時也案大宗伯云時見曰㑹殷見曰同鄭注云時見者言無常期諸侯有不順服者王將有往討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而㑹不協而盟是也殷猶衆也十二歲王如不巡守則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡守殷見四方四方四時分來終歲則遍若如此注則時㑹殷同亦有朝覲在廟而獨云四時朝覲在廟者以其周禮大行人諸侯依服數來朝時㑹無常期假令當方諸侯有不順服則順服者皆來朝王其中則有當朝之歲者復有不當朝之歲者若當朝之歲者自於廟朝覲若不當朝之歲者當在壇朝若十二年王不巡守則殷朝亦云既朝乃於壇者六服之內若以當歲者即在廟則依服數十二歲合有侯服年年朝者在廟朝覲其五服自甸男采衛要五服若以十二歲王巡守揔合朝服不得獨在廟在壇朝故鄭㑹同皆言既朝覲乃為壇於國外也朝事儀未在壇朝而先言帥諸侯拜日亦謂帥已朝者諸侯而言也云為宫者於國外春㑹同則於東方云云者經直言為壇鄭知逐四方為之者案司儀云將合諸侯則令為壇三成鄭注云合諸侯謂有事而㑹也云方明者上下四方神明之象也者謂合木為上下四方故名方此則神明之象故名明此鄭解得名方明神之義也云所謂明神也者所謂秋官司盟之職云北靣詔明神既盟則二之是也云則謂之天之司盟有象者案春秋襄十一年經書公㑹晉侯宋公之等伐鄭鄭人懼行成秋七月同盟于亳范宣子曰不慎必失諸侯乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川明神殛之注云二司天神司慎司不敬者司盟司察盟者是為天之司盟也云有象者猶宗廟之有主乎者以其宗廟木主亦上下四方為之故云猶宗廟之有主無正文約同之故云乎以疑之雖同四方為之但宗廟主止一神而已此下文以色為六神用六玉禮之有此别但取四方同而已云王巡狩至於方嶽之下諸侯㑹之亦為此宫以見之者案下文祭天燔柴祭山丘陵升祭川沈祭地瘞鄭注云升沉必就祭者也則是謂王巡守及諸侯之盟祭也者是王巡守在方嶽亦為此宫可知是以司儀注云王巡守殷國而同則其為宫亦如此與以其與宫同也六色象方明之神六玉禮之加方明于其上注方明上下云云方明者木也方四尺設六色東方青南方赤西方白北方黑上𤣥下黃設六玉上圭下璧南方璋西方琥北方璜東方圭六色象其神六玉以禮之上冝以蒼璧下冝以黃琮而不以者則上下之神非天地之至貴者也設玉者刻其木而著之五等各有旗以表朝位如銘旌徽幟上介皆云云尚左公侯伯子男皆就其旗而立釋曰云上介皆奉其君之旗置于宫尚左者此雖不言前期鄭云豫為其君見王之位也則亦前期一日可也公侯就旗據臨朝之時也此旗鄭雖不解鄭注夏官中夏辨號名此表朝位之旗與銘旌及在軍徽幟同皆以尺易刃小而為之也二伯帥諸侯入壝門就旗以東為上云尚左者建旗公東上侯先伯伯先子子先男而位皆上東方者以其侯伯别階相對子男雖隔門亦相對皆以東為上故云侯先伯子先男也云諸侯入壝門或左或右各就其旗而立者案下注云諸侯初入門王官之伯帥之則此云諸侯入壝門或左或右者是二伯初帥之各依左右若康王之誥云大保帥西方諸侯入應門左畢公帥東方諸侯入應門右皆北面此雖無應門亦二伯帥諸侯初入宫門或左或右亦皆北面立定乃始各就其旗而立王乃降南面見之而揖必知王有降揖之事者燕禮大射公降揖羣臣使定位故知王亦然又知王土揖庶姓之等者此是司儀職王在壇揖諸侯之事彼與此同鄭彼注云土揖推手小下之也時揖平推手也天揖推手小舉之以推手曰揖引手曰撎故為此解也若然覲禮天子不下堂而見諸侯今王降者以在壇㑹同相見與覲異故也以其覲禮廟門設擯此則堂壝門設擯是以雖繼覲禮之下覲禮無降揖法此與諸侯對面相見故有降揖之事㑹同受玉撫玉請事勞皆如覲禮四傳擯注王既至作傳釋曰知奠瑞玉及享幣公拜於上等侯伯於中等子男於下等擯者每延之升堂致命王受玉撫玉降拜於下等者三等拜禮皆司儀職文擯者延之升堂以下約上覲禮之法云王受玉謂朝時撫玉謂享時是以司儀三等之下云其將幣亦如之鄭云將幣享也又云及請事勞皆如覲禮者請事謂上文侯氏奠圭擯者請侯氏王欲親受之勞謂侯氏受刑後王勞之故云皆如覲禮云公也侯也伯也各一位者以其面位同故各自設擯云子男俠門而俱東上亦一位也者以其雖隔門相去近又同北面東上故共一位設擯故有四傳擯云至庭乃設擯者對上覲禮門外設擯案此文上經諸侯各就其旗而立乃云四傳擯則在諸侯之北故知至庭乃設擯諸侯龍旗無日月星天子大常兼之案左傳云三辰旗旗服注云三辰謂日月星孔君尚書傳亦云畫日月星於衣服旌旗鄭注云服亦云王者相變至周而以日月星辰畫於旌其所謂三辰旗旗昭其明也若然大常當有星所以司常及此直云日月不云星者既言三辰則日月星俱有周禮司常不言星者司常九旗皆以二字為名故略不言星是以此文亦略不言星案文大常之上又有交龍則諸侯交龍為旗無日月王之大常非直有日月兼有交龍天子帥諸侯朝日東郊教尊尊云帥諸侯朝日於東郊者朝日即拜日一也以其朝必有拜云所以教尊尊也者天子至尊猶往朝日是教天下尊敬其所尊其朝事儀朝日退乃始朝諸侯此覲禮加方明於壇上公侯伯子男就其旗而立王乃四傳擯見之是已祀方明乃始見諸侯二者同故云由此二者言之若然朝事儀直有朝日禮畢退見諸侯此覲禮祀方明禮畢乃朝諸侯不同者以其邦國有疑則有盟事朝日既畢乃祀方明於壇祀方明禮畢退去方明於下天子乃升壇與諸侯相見朝禮既畢乃更加方明於壇與諸侯行盟誓之禮若邦國無疑王帥諸侯朝日而已無祀方明之事是以朝事儀直云朝日教尊尊而朝諸侯不言祀方明之事鄭云已祀方明者據此覲禮上下有盟誓而言此天子乘龍及下文禮日之等若有盟誓文當在宫方三百步之上今退文在下者欲見盟誓非常尋常無盟誓之事直朝日而已禮日月四瀆山川丘陵於三門謂夏秋冬禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外釋曰知此謂㑹同夏秋冬者以經禮日之等各於其門外上經禮日於東門之外已是春㑹同明知此是夏秋冬也既所禮各於門外為壇亦各合於其方是以司儀云將合諸侯則令為壇三成宫旁一門鄭注云天子春率諸侯拜日於東方則為壇於國東夏禮日于南郊則為壇於國南秋禮山川丘陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北云變拜言禮者容祀也者言拜無祀祀則兼拜上春云拜日無盟誓不加方明於壇直拜日教尊尊而已此經三時皆言禮見有盟誓之事加方明於壇則有祀日與四瀆及山川之事故言禮是以或言拜或言禮云禮月于北郊者月太隂之精以為地神也者鄭據經三時先北後西不以次第以其祭地於北郊祭月四瀆亦於北郊與地同但日者太陽之精故於東郊南郊於陽方而禮之以月是地神四瀆與山陵俱是地神以山陵出見為微隂故配西方四瀆為極隂故月同配北方又以月尊故先言之而又祭於北郊也上言㑹同拜禮諸神此言巡守就祭祭天燔柴祭山丘陵升祭川沈祭地瘞釋曰上論天子在國行㑹同之禮於國之四郊拜禮於日月山川之神以為盟主已備於上今更言祭日月山川者據天子巡守於四嶽各隨方祭之以為盟主故重見此文云升沈必就祭者也對上經山川丘陵但於四郊望祭之故不言升沉之事此經言升沉必是就山川丘陵故言升沉案爾雅云祭山曰庪縣祭川曰浮沉不言升此山丘陵云升者升即庪縣也此祭川直言沉不言浮者以牲體或沉或浮不言浮亦文略也云就祭則是謂王巡守及諸侯之盟祭也者此經主為天子春東郊夏南郊皆禮日即此經祭天燔柴也秋西郊即此經祭山丘陵升是也冬北郊即此經祭川沉祭地瘞也以其川即四瀆也樂與禋柴牲體為下神歆神薦饌始云燔柴升沉瘞祭禮終矣者案周禮禋祀實柴燎是歆神始禮未終而言禮終者以其祭禮有三始樂為下神始禋柴為歆神始牲體為薦饌始燔柴是樂為下神之後是下神之禮終故云禮終案爾雅祭天曰燔柴祭地曰瘞埋柴與瘞相對則瘞埋亦是歆神若然則升沈在柴瘞之間則升沉亦是歆神之節皆據樂為下神之後而為祭禮終矣或可周禮此三者為歆神至祭祀之後更有此柴瘞升沉之事若今時祭祀訖始有柴瘞之事鄭以此祭天地乃是祭日月引郊特牲者案易緯二王之郊一用夏正春分以後始日長於建寅之月郊天云迎長日之至者預迎之又云大報天而主日也者鄭彼云大猶遍謂郊天之時祭尊可以及卑日月以下皆祭以日為主又云大宗伯職曰以實柴祀日月星辰者此所引不取月與星辰之義直取日而已與此經燔祭文同鄭引此諸文者欲證此經祭天燔柴是祭日非正祭天神以其日亦是天神故以祭天言之是以鄭云則燔柴祭天謂祭日也又云柴為祭日則祭地瘞者祭月也者以其前文天子在國祀日月燔祭既是日祭地是月可知亦非正祭地神也云日月而云天地靈之者以其尊之欲為方眀之主故變日月而云天地是神靈之也有先敷席後設几有同時預設設几俟于東箱注王即席之處釋曰云王即席乃設之也者案公食大夫記宰夫筵出自東房則此天子禮几席亦在東房其席先敷其几且俟于東廂待王即席乃設之謂若聘禮賔即席乃授几若然公食大夫宰夫設筵加席几同時預設者公親設湇可以略几故以几與席同時設之若為神几筵亦同時而設故聘禮几筵設擯者出請命宗廟如明堂無箱夾而鄭云東夾云東箱東夾之前者案上文覲在文王廟中案鄭周禮注宗廟路寢制如明堂明堂有五室四堂無箱夾則宗廟亦無箱夾之制此有東夾者此周公制禮據東都乃有明堂此文王廟仍依諸侯之制是以有東夾室若然樂記注云文王廟為明堂制者彼本無制字直云文王廟為明堂云相翔待事之處者翔謂翺翔無事故公食賔將食辭於公親臨已食公揖退於箱以俟賔食偏駕不入王門謂四路對玉路為偏偏駕不入王門注左旁至館與釋曰云左旁與己同曰偏者依周禮巾車掌五路玉路以祀不賜諸侯金路以賔同姓以封象路以朝異姓以封革路以即戎以封四衛木路以田以封蕃國此五路者天子所乘為正四路者諸侯乘之為偏是據諸侯在旁與王同為偏云不入王門乘墨車以朝是也者據上文而言云偏駕之車舍之於館與者偏駕既云不入王門又云乘墨車而至門外諸侯各停於館明舍在館無正文故言與以疑之儀禮要義卷二十七
