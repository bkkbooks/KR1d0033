body:
  text: 儀禮要義卷二宋魏了翁撰士冠禮二陳服東領異凶禮北上先卑服陳服于房中西墉下東領北上注墉牆釋曰自此至東靣論陳設衣服器物之等以待冠事喪大記與士喪禮服或西領或南領此東領者此嘉禮異於凶禮故也士冠時先用卑服北上便也爵弁士與君祭之服冕之次爵弁服纁裳純衣緇帶韎韐注此與君祭之服云云釋曰士禮𤣥端自祭以爵弁服助君祭故云與君祭之服也云爵弁者冕之次者凡冕以木為體長尺六寸廣八寸績麻三十升布上以𤣥下以纁前後有旒其爵弁制大同唯無旒又為爵色為異又名冕者俛也低前一寸二分故得冕稱其爵弁則前後平故不得冕名以其尊卑次於冕故云爵弁冕之次也云其色赤而微黒如爵頭然或謂之緅者七入為緇若以纁入黒則為紺以紺入黒則為緅是三入赤再入黒故云云鄭注鍾氏云今禮俗文作爵言如爵頭色也巾車注黒多赤少色朝服十五升故冕三十升冠常倍服云其布三十升者取冠倍之義是以喪服衰三升冠六升朝服十五升故冕三十升也縓赬纁皆淺絳朱則四入與無正文凡染絳一入謂之縓再入赬三入纁朱則四入與云云云纁裳淺絳裳者絳則一染至三染同云淺絳詩云我朱孔陽毛𫝊云朱深纁也故從一染至三染皆謂之淺絳也云朱則四入與者爾雅及鍾氏皆無四入之文經有朱色故鄭約之若以纁入黒則為紺若以纁入赤則為朱無正文故云與以疑之然上注以解𤣥緇故引鍾氏染黒法此解纁故引爾雅染赤法諸經内純字鄭或為絲或為色云純衣絲衣也者案鄭解純字或為絲或為色兩解不同者皆望經為注若色理明者以絲解之若絲理明者以色解之此經𤣥衣與纁裳相對上𤣥下纁色理自明絲理不明則以絲解之昏禮女次純衣注云絲衣以下文有女從者畢袗𤣥色理自明則亦絲理不明故亦以絲理解之周禮媒氏云純帛無過五兩注云純實緇字也古緇以才為聲納幣用緇婦人隂也以經云純帛絲理自明故為色解之祭統云蠶於北郊以供純服絲理自明故鄭亦以色解也論語云麻冕禮也今也純儉以純對麻絲理自明故鄭亦以色解之是注有不同之事但古緇䊷二字並行若據布為色者則為緇字若據白為色者則為䊷字但緇布之緇多在本字不誤䊷帛之䊷則多誤為純冕爵弁服用絲皮弁𤣥端服深長衣等皆布餘衣皆用布惟冕與爵弁服用絲耳釋曰鄭云餘衣皆用布者此據朝服皮弁服𤣥端服及深衣長衣之等皆以布為之是以雜記云朝服十五升布𤣥端亦服之類則皮弁亦是天子朝服深衣或名麻衣故知用布也以韎染韋合為韐因名韍為韎韐韎韐緼紱也士緼紱而幽衡合韋為之釋曰鄭云韎韐緼韍也者此經云韎韐二者一物故鄭合為一物解之也云士緼韍而幽衡者玉藻文言幽衡者同繫於革帶故連引之也云合韋為之者鄭即因解名緼韍之字言韐者韋旁著合謂合韋為之故名韐也云士染以茅蒐因以名焉者案爾雅云茹藘茅蒐孫氏注一名蒨可以染絳若然則一草有此三名矣但周公時名蒨草為韎草以此韎染韋合之為韐因名韍為韎韐也云韍之制似韠者案上注已釋韠制其韍之制亦如之但有飾無飾為異耳祭服謂之韍其他服謂之韠易困卦九二困於酒食朱韍方來利用享祀是祭服之韍也又案明堂位云有虞氏服韍夏后氏山殷火周龍章鄭云後王彌飾天子備焉諸侯火而下卿大夫山士韎韋而已是士無飾則不得單名韍一名韎韐一名緼韍而已是韍有與緼異以制同飾異故鄭云韍之制似韠也但染韋為韍之禮天子與其臣及諸侯與其臣有異詩云朱芾斯黄鄭云天子純朱諸侯黄朱詩又云赤芾在股是諸侯用黄朱玉藻再命三命皆云赤芾是諸侯之臣亦用赤韍鄭以困九二朱韍為文王將王之制困卦九二云困於酒食朱韍方來利用享祀鄭注云二據初辰在未未為土此二為大夫有地之象未上值天㕑酒食象困於酒食者采地薄不足已用也二與日為體離為鎮霍爻四為諸侯有明德受命當王者離為火火色赤四爻辰在午時離氣赤又朱是也文王將王天子制用朱韍故易乾鑿度云孔子曰天子三公諸侯同色困卦困于酒食朱韍方來又云天子三公大夫不朱韍諸侯亦同色者其染之法同以淺絳為名是天子與其臣純朱諸侯與其臣黄朱為異爵弁服以冠表服冠弁不與服同陳爵弁服纁裳云云見上冠弁不與衣陳而言於上以冠名服耳者案此文上下陳服則於房緇布冠皮爵弁在堂下是冠弁不與服同陳今以弁在服上並言之者以冠弁表明其服君臣視朔同皮弁服以白鹿皮為冠皮弁服素積緇帶素韠注此與君眂朝之服也釋曰案玉藻云諸侯皮弁聽朔于大廟又案鄉黨說孔子之服云素衣麑裘鄭云視朔之服視朔之時君臣同服也云皮弁者以白鹿皮為冠象上古者禮運云先王云云未有麻絲衣其羽皮鄭云此上古之時云云經言素有三義云積猶辟也以素為裳辟蹙其要中者經典云素者有三義若以衣裳言素者謂白繒也即此文之等是也畫繢言素者謂白色即論語云繢事後素之等是也器物無飾亦曰素則檀弓云奠以素器之等是也𤣥端大夫士莫夕於君之朝服𤣥端𤣥裳黄裳雜裳可也緇帶爵韠釋曰云此莫夕於朝之服者當是莫夕於君之朝服也案玉藻云君朝服以日視朝於内朝夕深衣祭牢肉是君朝服朝服夕服深衣矣下又云朝𤣥端夕深衣朝時所服與君不同故鄭注云謂大夫士也則彼朝𤣥端夕深衣是大夫士家私朝也若然大夫士既服𤣥端深衣以聽私朝矣此服注云莫夕於朝之服是士向莫之時夕君之服必以莫為夕者朝禮備夕禮簡故以夕言之也若卿大夫莫夕於君當亦朝服矣案春秋左氏傳成十二年晉郤至謂子反曰百官承事朝而不夕此云莫夕者無事則無夕法若夕有事須見君則夕故昭十二年子革云夕哀十四年子我亦云夕者皆是有事見君非常朝夕之事也𤣥端即朝服之衣此經但易裳韠云𤣥端即朝服之衣易其裳耳者上云𤣥冠朝服緇帶素韠此𤣥端亦緇帶彼云朝服即此𤣥端也但朝服亦得名端故論語云端章甫鄭云端諸侯視朝之服耳皆以十五升布為緇色正幅為之同名也云易其裳耳者彼朝服素韠韠同裳色則裳亦素此既易其裳以三等裳同爵韠則亦易之矣不言者朝服言素韠不言裳故須言易彼言素韠此云爵韠於文自明緇布冠缺項約漢時卷幘言之緇布冠缺項青組纓屬于缺釋曰云缺讀如有頍者弁之頍者讀從頍弁詩義取在首頍者弁貌之意也云緇布冠無笄者案經皮弁爵弁言笄緇布冠不言笄故云無笄也云著頍圍髪際者無正文約漢時卷幘亦圍髪際故知也云結項者此亦無正文以經云頍明於項上結之也云隅為四綴以固冠也者此亦無正文以義言之既武以下别有頍項明於首四隅為綴上綴於武然後頍項得安穏也云項中有􅕒亦由頍為之耳者此亦無正文頍漢卷幘纚漢幘梁今皆未審緇纚廣終幅長六尺云今之未冠笄者著卷幘頍象之所生者此舉漢法以况義耳漢時男女未冠笄者首著卷幘卷幘其狀雖不審知既言頍圍髪際故以况之明漢時卷幘以布帛之等圍繞髪際為之矣云頍象之所生者漢時卷幘是頍之遺象所生至漢時故云頍象之所生也云滕薛名蔮為頍者此亦舉漢時事以况之漢時滕薛二國云蔮蔮卷幘之類亦遺象故為况也云纚今之幘梁者亦舉漢法為況耳幘梁之狀鄭目騐而知至今乆逺亦未審也云纚一幅長六尺足以韜髪而結之矣者人髮之長者不過六尺纚六尺故云足以韜髪既云韜髪乃云結之則韜訖乃為紒矣皮爵弁有笄屬以紘緇布冠無笄以纓皮弁笄爵弁笄緇組紘纁邊云有笄者即經云皮弁及爵弁皆云笄者是有笄也云屈組為紘者經緇組紘纁邊是為有笄者而設言屈組謂以一條組於左笄上繫定遶頥下右相向上仰屬於笄屈繫之有餘因垂為飾也云無笄者纓而結其絛者無笄即經緇布冠是也則以二絛組兩相屬於頍故經云組纓屬於頍也既屬訖則所垂絛於頥下結之隋方曰篋簞亦笥類同篋櫛實於簞注謂此以上凡六物隋方曰篋簞笥也釋曰鄭注曲禮圓曰簞方曰笥笥與簞方圓有異而云簞笥共為一物者鄭舉其類注論語亦然禮例稱側者有無偶之側有旁側側尊一甒醴在服北釋曰云側猶特也無偶曰側置酒曰尊側者無𤣥酒者凡禮之通例稱側有二一者無偶特一為側則此文側是也又昏禮云側尊甒禮于房中亦是無𤣥酒曰側至於昏禮合升側載聘禮云側襲士虞禮云側尊此皆是無偶為側之類也一者聘禮云側受几者側是旁側之義也罍枓以㪺水尊升以㪺酒實勺觶角柶脯醢南上云勺尊升所以㪺酒也者案少牢云罍水有枓與此勺為一物故云尊升對彼是罍枓所以㪺水則此為尊升㪺酒者也爵觶對異散文通曰爵云爵三升曰觶者案韓詩外傳云一升曰爵二升曰觚三升曰觶四升曰角五升曰散相對爵觶有異散文則通皆曰爵故鄭以爵名觶也古庶人常服緇布冠漢小吏猶然爵弁皮弁緇布冠各一匴云緇布今小吏冠其遺象也者但緇布冠士為初加之冠冠訖則弊之不用庶人則常著之故詩云臺笠緇撮是庶人以布冠常服者以漢之小吏亦常服之故舉為況匴竹器漢時冠箱云匴竹器名今之冠箱也者此亦舉漢法為況執匴者亦有司有司不主一事執以待于西坫南南面東上賓升則東面注執之云云云執之者有司也者則上云有司如主人服有司不主一事故知此亦有司也廟中亢反爵為坫此堂角亦為坫云坫在堂角者但坫有二文一者謂若明堂位云崇坫亢圭及論語云兩君之好有反坫之等在廟中有之以亢反爵之屬此篇之内言坫者皆據堂上角為名故云堂角云古文匴為篹坫作襜者皆從經今文主人𤣥端立阼階下將與賔行事主人𤣥端爵韠立于阼階下直東序西面注士入廟服釋曰上文已陳衣冠器物自此已下至外門外論賔主兄弟等著服及位處也云𤣥端爵韠者主人之服與上所陳子加冠𤣥端服亦一也云立於阼階下者時欲與賔行禮之事也云直東序者直當也謂當堂上東序牆也案特牲士禮祭服用𤣥端此亦士之加冠在廟故與祭同服故云士入廟之服也云東西牆謂之序者爾雅釋宫文兄弟袗𤣥立洗東退於主人兄弟畢袗𤣥立於洗東西面北上釋曰云袗同也上下皆𤣥主人當序南西面洗當東榮兄弟又在洗東故云退於主人也云不爵韠者降於主人也者爵弁同色主人尊故也兄弟用緇韠不用爵韠緇布衣縁紳紐束髪皆朱錦童子服將冠者采衣紒在房中南面釋曰即童子二十之人云緇衣布錦縁者以其童子不帛襦袴不衣裘裳故云緇布衣以錦為緇布衣之縁也云錦紳者以錦為大帶也云并紐者亦以錦為紐紳之垂也云錦束髪者以錦為總云皆朱錦也者童子之錦皆朱也云紒結髪者則詩云總角丱兮是也以童子尚華飾故衣此也賔主同服贊以下𤣥端惟裳異賔如主人服贊者𤣥端從之立于外門之外釋曰云賓如主人服者以其賔與主人尊卑同故得如之贊者皆降主人一等其衣冠雖同其裳則異故不得如主人服故别𤣥端也若然此冠兄弟及賔贊皆得𤣥端特牲主人與尸祝佐食𤣥端自餘皆朝服者彼助祭在廟縁孝子之心欲得尊嘉賔以事其祖禰故朝服與主異也出以東為左入以東為右主人迎出門左西面再拜賔答拜注云左東也釋曰出以東為左入以東為右據主人在西出則以西為右入則以西為左也入大門東向入廟毎曲揖當碑揖每曲揖至於廟門揖入三揖至于階三讓釋曰云周左宗廟祭義與小宗伯俱有此文對殷右宗廟也言此者欲見入大門東向入廟云入外門將東曲揖者主人在南賔在北俱東向是一曲故一揖也至廟南主人在東北面賓在西北面是曲為二揖故云直廟將北曲又揖也通下將入廟又揖三也經直云入門揖鄭知此為三揖者以上云每曲揖據入門東行時此入廟門三揖是據主人將右欲背客宜揖將北面與客相見又揖云當碑揖者碑是庭中之大節又宜揖出房謂房外之西以東南當阼階將冠者出房南面注南面立于房外之西待賔命釋曰知在房外之西不在東者以房外之東南當阼階是知房外者皆在房外之西故昏禮女出於母左母在房外之西故得出時在母左也云待賔命者以其下文有賔揖將冠則賔有命也一壹得通用賔盥卒壹揖壹讓升注古文壹皆作一釋曰一壹得通用雖疊古文不破之也賔加初冠訖適房服𤣥端出房觀容賔右手執項左手執前進容乃祝坐如初乃冠興復位贊者卒冠者興賔揖之適房服𤣥端爵韠出房南面釋曰曲禮云堂上不趨室中不翔則堂上固得翔矣又云大夫濟濟士蹌蹌注云皆行容止之貌此進容是士故知進容謂行翔而前鶬焉言復者對前出房故云復前出為待賔命此出為觀衆以容體也案郊特牲論加冠之事云加有成也故此鄭云一加禮成也云觀衆以容體者以其既去緇布衣錦縁童子服著此𤣥端成人之服使衆觀知此第二加皮弁笄纚互見禮皆如初賔揖之即筵坐櫛設笄賔盥正纚如初降二等受皮弁釋曰此當第二加皮弁之節云即筵坐櫛者坐訖當脫緇布冠乃更櫛也云設笄者凡諸設笄有二種一是紒内安髪之笄一是皮弁爵弁及六冕固冠之笄今此櫛訖未加冠即言設笄者宜是紒内安髪之笄也若安髪之笄則緇布冠亦宜有之前櫛訖不言設笄者以其固冠之笄緇布冠無笄而皮弁爵弁有笄上文已陳訖今若緇布冠亦言設笄即與皮弁爵弁相亂故緇布冠不言設笄其實亦有也若然緇布冠不言設笄而言設纚皮弁冠言設笄不言設纚互見為義明皆有也其於固冠之笄則於賔加弁之時自設之可知云如初為不見者言也者上加緇布冠時有賔降主人降賔辭主人對賔盥卒一揖一讓升主人升復初位賔筵前坐之等相次此皆不見故設經省文如之而已此再加言容儀益繁三加爵弁服素積素韠容出房南面賓降三等受爵弁云云釋曰此對上文加緇布冠時直言出房南面不言容此則言容以再加彌成其儀益繁故言容其實彼出亦是容故鄭注云觀衆以容體也賔降三等受爵弁加之服纁裳韎韐其他如加皮弁之儀注他謂卒紘容出凡醴皆設柶有面葉以授有面枋以授云葉柶大端者謂扱醴之面柄細故以為柶大端此與昏禮賔皆云面葉者此以賔尊不入户贊者面葉授賔賔得面枋授冠者冠者得之面葉以扱醴而祭昏禮賔亦主人尊不入房贊者面葉以授主人主人面枋以授賔賔得面葉以扱祭至於聘禮禮賔宰夫實觶以醴加柶于觶面枋授公者凡醴皆設柶聘禮宰夫不訝授公側授醴則還面枋以授賔故面枋也賔受醴于室户東東面答冠者拜賔受醴于户東云云冠者筵西拜受觶賓東面答拜釋曰知室户東者以其冠者在室户西賔自至房户取醴酌醴者出向西以授也云筵西拜南面拜也者上云冠者筵西南面知受觶拜還南面也知賔東面在西序者以上文與主人相對本位於西序也云東面者明成人與為禮異於答主人者案鄉飲酒鄉射賔於西階北面答主人拜今此於西序東面拜故云異冠者祭啐不拜既爵以其不卒爵冠者即筵坐左執觶右祭脯醢以柶祭醴三興云云釋曰云祭醴三興者三祭者亦如昏禮始扱一祭又扱再祭也云筵末坐啐醴建柶興降筵此啐醴不拜既爵者以其不卒爵故不拜也凡奠爵將舉者於右不舉者於左冠者奠觶于薦東降筵北面坐取脯云云適東壁北面見于母釋曰云薦東薦左者據南面為正故云薦左也云凡奠爵將舉者於右者謂若鄉飲酒鄉射是也此文及昏禮贊醴婦是不舉者皆奠之於左也云適東壁者出闈門也者宫中之門曰闈門母既冠子無事故不在門外今子須見母故知出闈門也云婦人入廟由闈門者雜記云夫人奔喪入自闈門升自側階鄭注云宫中之門曰闈門為相通者也是也婦人於丈夫皆俠拜舉子以見義母拜受子拜送母又拜釋曰云婦人於丈夫雖其子猶俠拜者欲見禮子之體例但是婦人於丈夫皆使俠拜故舉子以見義也冠義字訖乃見母此末字先見冠者立於西階東南面賔字之冠者對釋曰案禮記冠義云既冠而字之成人之道也見於母母拜之據彼則字訖乃見母此文先見乃字者此先見母是正見彼母在下者記人以下有兄弟之等皆拜之故退見母於下使與兄弟拜文相近也若然未字先見母字訖乃見兄弟之等者急於母緩於兄弟也此醴賔當作禮猶周禮不云鬯賔請醴賔賔禮辭許賔就次釋曰云此醴當作禮者對上文有酌醴受醴之等不破之此當為上於下之禮不得用醴禮即從醴字何者周禮云諸侯用鬯不云鬯賔明不得以醴禮賔即為醴故破從禮次謂門外更衣處帷幕等為之賔就次注次門外更衣處也以帷幕簟席為之釋曰更衣之時須入於次故云更衣處也云以帷幕簟席為之者案聘禮記云宗人授次次以帷少退于君之次注云主國之門外諸侯及卿大夫之所使者次位皆有常處又案周禮幕人掌帷幕幄帟綬之事注云帷幕皆以布為之四合象宫室曰幄云簟席者士卑或用簟席是以雜記諸侯大夫䘮皆用布士用簟席為之次亦當然兄弟及贊冠者皆先拜冠者答拜冠者見於兄弟兄弟再拜冠者答拜見贊者西面拜亦如之釋曰兄弟位在東方此贊冠者則賔之類故贊者東面也言贊者先拜冠者答之也知贊者後賓出者文於見兄弟下始見之入見姑姊如見母不見父賓冠畢己見入見姑姊如見母釋曰男子居外女子居内廟在寢門外入見入寢門可知不見父與賔者盖冠畢則己見也不言者從可知也不見妹妹卑者以其妹卑於姑姊爵弁助祭之服故易𤣥端以見君乃易服服𤣥冠𤣥端爵韠奠贄見于君云云釋曰云易服者爵弁既助祭之服不可服見君與先生等故易服服𤣥端也云易服不朝服者非朝事也者此乃因加冠以成人之禮見君非立朝之節故不朝服經直云𤣥端則兼𤣥冠矣今更云𤣥冠者以初冠時服𤣥端為緇布冠服緇布冠非常著之冠冠而弊之易服宜服𤣥冠配𤣥端故兼云𤣥冠也朝服與𤣥端同𤣥端則𤣥裳黄裳雜裳黒屨若朝服𤣥冠𤣥端雖同但裳以素而屨色白也以其但正幅故朝服亦得端名然六冕皆正幅故亦名端是以樂記云魏文侯端冕而聽古樂又論語云端章甫鄭云端𤣥端諸侯視朝之服則𤣥端以朝得名為𤣥端也鄉先生卿大夫致仕者即父師少師遂以贄見于鄉大夫鄉先生云鄉先生鄉中老人為卿大夫致仕者此即鄉飲酒與鄉射禮先生及書傳父師皆一也先生亦有士之少師鄭不言者經云卿大夫不言士故先生亦畧不言其實亦當有士也壹獻士禮備有酬酢無主婦亞獻乃醴賔以壹獻之禮云壹獻者主人獻賔而已即燕無亞獻者案特牲少牢主人獻尸主婦亞獻為二獻此則主人獻賔而已無亞獻知即燕者鄉飲酒末有燕故知獻後有燕云獻酢酬賔主人各兩爵而禮成者主人獻賔賔酬主人主人將酬賔先自飲訖乃酬賔奠而不舉是賔主人各兩爵而禮成也必知一獻之禮備有酬酢者昏禮舅姑饗婦以一獻之禮奠酬得正禮不旅又曰婦酢舅更爵自薦是備酬酢也鄉飲酒亦備獻酬酢是其義也云特牲少牢饋食之禮獻尸此其類也者此賔主人各兩爵無亞獻彼主人主婦各一爵有亞獻雖不同得主人一獻義類同故云此其類也云士禮一獻者即士冠及昏禮鄉飲酒禮鄉射皆是一獻也云卿大夫三獻者案左氏𫝊云季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻又禮記郊特牲云三獻之介亦謂卿大夫三獻之介案大行人云上公饗禮九獻侯伯七獻子男五獻是以大夫三獻士一獻亦是其差也凡禮事質者用糟不泲文者用清云禮賔不用柶者泲其醴者此有獻酢酬飲之泲者故不用柶冠禮禮子用醴不泲故用柶也云内則曰飲者鄭注云目諸飲也云重醴清糟者鄭云重陪也糟醇也清泲也致飲有醇者有泲者陪設之稻醴以下是也云凡醴事質者用糟文者用清者質者謂若冠禮禮子之類是也故於房户之間顯處設尊也酬幣尊卑數異惟奠酬之節一行主人酬賔束帛儷皮釋曰主人酬賔當奠酬之節行之以財貨也此禮賔與饗禮同但為饗禮有酬幣則多故聘禮云若不親饗致饗以酬幣注云禮幣束帛乗馬亦不是過也又案大戴禮云禮幣采飾而四馬是大夫禮多與士異也案禮器云琥璜爵鄭云天子酬諸侯諸侯相酬以此玉將幣也是又異於大夫也下凡酬幣之法尊卑獻數多少不同及其酬幣唯於奠酬之節一行而已春秋秦后子出奔晉后子享晉侯歸取酬幣終事八反杜注云備九獻之儀始禮自齎其一故續送其八酬酒幣彼九獻之間皆云幣春秋之代奢侈之法非正禮也云束帛十端也者禮之通例凡言束者無問脯與錦皆以十為數也云儷皮兩鹿皮也者當與射禮庭實之皮同禮記郊特牲云虎豹之皮示服猛也又覲禮用馬則國君用馬或虎豹皮若臣聘則用鹿皮故鄭注聘禮云凡君於臣臣於君麋鹿皮可也言可者以無正文若然兩國諸侯自相見亦用虎豹皮也凡一獻有薦有俎俎必有特牲此牲未聞賔出主人送於外門外再拜歸賔俎釋曰賔不言薦脯醢者案舅姑共饗婦以一獻有姑薦則此一獻亦有薦脯醢可知經有俎必有特牲但鄉飲鄉射取擇人而用狗此冠禮無擇人之義則不用狗但無正文故云其牲未聞也知使人歸諸賔家以賔出主人送於門外乃始言歸賔俎明歸於賔家也儀禮要義卷二
