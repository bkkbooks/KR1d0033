body:
  text: 儀禮要義卷十宋魏了翁撰鄉飲酒三旅酬所以酬正獻主人之屬不與賔北面坐取俎西之觶阼階上北面酬主人主人降席立于賔東釋曰自此至司正降復位論堂上堂下徧行旅酬之事云取俎西之觶者謂前一人舉觶奠于薦右今為旅酬而舉之前主人酬賔奠于薦東者不舉故言俎西以别之云凡旅酬者少長以齒以下並是鄉飲酒義文是以彼云賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉知其能弟長而無遺矣案下記云主人之贊者西面北上不與注云贊佐也謂主人之屬佐助主人禮事徹鼐沃盥設薦俎者與及也不及謂不及獻酒言不及獻酒則旅酬亦不與旅酬所以酬正獻也又云無算爵然後與若然此旅酬得終於沃洗者鄭解酬之大法欲見堂上賔主人之黨無不與故鄭君連引無算爵旅酬而言終沃洗也其實此時未及沃洗也主人西南面授介以旅酬皆西階上主人西階上酬介介降席自南方立于主人之西云云釋曰知西南面授介者案賔酬主人時於阼階上東南面向之則知此主人酬介于西階上西南面可知云自此已下旅酬酌者亦如之者謂亦如主人酬介其酬酌介賔觶西南面授之以其旅酬皆西階上故也司正不監主賔介監衆賔司正升相旅曰某子受酬受酬者降席釋曰上文作相為司正注云將留賔為有懈惰立司正以監之今以賔主及介旅酬不監之至衆賔乃監者以其主人與賔介習禮已久又各一位不嫌失禮至於衆賔既不久習禮又同在一位恐其失禮故須監之受酬者介右衆賔左受受酬者由介右注由介東也云云釋曰北面以東為右故鄭云由介東也云尊介使不失故位者凡授受之法者授由其右受由其左即下文衆受酬者是也衆受酬者謂上衆賔之内為首者一人自介右受之自第二以下并堂下衆賔皆自左受之言變於介者即是授受之常法也主人使吏二人舉觶賔介答拜異面使二人舉觶于賔介云云賔介席末答拜釋曰自此至無算樂論賔主燕坐爵樂無數之事云賔介席末答拜者賔於席西南面答拜介於席南東面答云二人亦主人之吏者亦上一人舉觶是主人之吏以其主人使之旅酬以前立行禮至是司正請坐司正升自西階受命于主人主人曰請坐于賔釋曰云司正升自西階受命于主人此不言阼階上受案鄉射司正升自西階阼階上受命于主人適西階上北面請坐於賔則此亦同自此以上皆立行禮人皆勞倦故請坐於賔也云酒清肴乾者案聘義云酒清人渴而不敢飲也肉乾人饑而不敢食也彼上云聘射之禮至大禮也則是聘射皆有飲酒禮故此鄉飲酒引之云賔主百拜者樂記文彼是飲酒禮與此同故引而相證但此鄉飲酒之禮雖無百拜舉全數而言也云强有力者亦聘義文言此者欲見自此以前未得安坐飲酒也云張而不弛弛而不張非文武之道者此雜記文畧而言之此以弓弩喻行禮之法張而不弛以喻旅酬已前立行禮弛而不張喻無算爵以後坐食賔辭俎不敢以殺禮當貴肴賔辭以俎主人請徹俎賔許云俎者肴之貴者謂骨體貴而肉賤故云肴之貴者云辭之者不敢以禮殺當貴者自旅以前立行禮是盛自此後無算爵坐以禮謂之殺故今將坐辭以俎不敢以禮殺當貴者案燕禮司正奠觶于中庭請徹俎而坐此禮司正監旅訖二人舉觶後將行無算爵始請坐于賔不同者燕禮司正之前云二人致爵三舉旅得爵多故司正奠時坐燕此禮由來未行旅酬故使二人舉觶徹俎後乃坐取俎者降自西階與燕禮阼階異賔取爼還授司正司正以降賔從之主人取俎云云釋曰主人取俎還授弟子弟子以降自西階案燕禮膳宰徹公俎降自阼階與此不同者彼公不降故宰夫降阼階此主人降自阼階故弟子降自西階也云取俎者皆鄉其席者以其俎在席前鄉席取俎還轉授之故經皆言還授坐則降説屨主先左賔先右説屨揖讓如初升坐注今文説為税云説屨者為安燕當坐也者凡堂上行禮之法立行禮不説屨坐則説屨屨空則不宜陳於側故降説屨然後升坐也云説屨主人先左賔先右者案曲禮云上於東階則先右足上於西階則先左足鄭注云近於相鄉敬也案玉藻著屨之法坐左納右坐右納左今説之亦北面鄉階主人先坐左賔先坐右亦取近於相鄉敬之義也羞狗胾醢所以盡愛乃羞注羞進也云云釋曰知所進者狗胾醢者案下記云其牲狗禮記又云薦羞不踰牲則所羞者狗胾也但醢是舊作之物諸經又不見以狗作醢則胾必狗也醢則當兼有餘牲也云鄉設骨體所以致敬也今進羞所以盡愛也者骨體貴人不食故云致敬胾醢賤人所食故云盡愛也歌笙間合皆三終此燕樂無數無算爵無算樂釋曰云燕樂亦無數者亦上無算爵也案上升歌笙間合樂皆三終言有數此即無也云或間或合盡歡而止也者以其不言風雅故知或間如上間歌用小雅也或合用二南也言或間或合者於後科用其一但不並用也引春秋者彼是國君禮此是大夫禮見其異也但無算之樂還依尊卑用之案春秋為季札所歌大雅與頌者但季札請觀周樂魯為之盡陳又魯周公之後歌樂得與元侯同故無算之樂雅頌並作也天子諸侯以鐘鼓奏陔夏九夏亦有等賔出奏陔釋曰云陔陔夏也者周禮鐘師有陔夏故云陔夏也云周禮鐘師以鐘鼓奏九夏者案鐘師云凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏裓夏鷔夏杜子春云以鐘鼓者庭中先擊鐘却擊鼓而奏此九夏故云是奏陔夏則有鐘鼓矣云鐘鼓者天子諸侯備用之者鐘師天子禮有鐘鼓大射諸侯禮亦具有鐘鼓故云天子諸侯備用之云大夫士鼓而已者案鄉射云不鼓不釋明無鐘可知此且論鼓若用九夏則尊卑不同天子則九夏俱作諸侯則不用王夏得奏其肆夏以下大夫以下據此文用陔夏其餘無文旅酬後鄉内諸公大夫觀禮者乃入賔若有遵者諸公大夫則既一人舉觶乃入釋曰自此已下至不加席論鄉内有諸公大夫來觀禮主人迎之與行禮事也言不干主人正禮者正禮謂賔主獻酢是也是以一人舉觶為旅酬始乃入若然即是作樂前入而於此篇末乃言之者以其無常或來或不來遵席于賔東尊之不與鄉人齒席于賔東公三重大夫再重云席此二者於賔東者賔在户牖之間酒尊又在户東席此二者又在酒尊之東但繼賔而言耳云尊之不與鄉人齒也者鄉人謂衆賔之席在賔西故云不與鄉人齒案上注云此篇無正齒位之事今此言齒者彼云無正齒位者對黨正飲酒鄉人五十已上九十已下有齒法鄉飲酒貢士以德為次故云無正齒位之禮此言齒者謂士已上來觀禮乃有齒法云天子之國三命者不齒者案周禮黨正職云國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命不齒彼是天子黨正飲酒法故知天子之國三命不齒此是天子貢人鄉飲酒法鄭引之為證者欲見天子鄉飲酒三命不齒同也云於諸侯之國爵為大夫則不齒矣者以此篇及鄉射皆云若有大夫不辨命數故知爵為大夫即不齒也皆謂鄉射鄉飲酒之禮若黨正飲酒則與此異案文王世子云其朝于公内朝則東面北上臣有貴者以齒下文云庶子治之雖有三命不踰父兄鄭注云治之治公族之禮也唯於内朝則然其餘㑹聚之事則與庶姓同又引黨正飲酒云一命齒于鄉里再命齒於父族三命不齒不齒者特為位不在父兄行列中但文王世子是諸侯之法即諸侯黨正飲酒還與天子同但諸侯之國一命已上至三命大夫士具有言一命齒於鄉里者公侯伯之士一命與堂下鄉人齒以其士立堂下故也子男之士不命與一命之士同齒於階下子男之大夫一命坐於上與六十已上齒於堂再命齒於父族者謂子男之卿與公侯伯之大夫以父族為賔則與之齒異姓為賔則不與之齒席於尊東三命不齒者謂公侯伯之卿雖父族為賔亦不與之齒席於尊東也云不言遵者遵者亦卿大夫者案上文賔若有遵者與諸公大夫雖文異諸公大夫則遵也故鄭云遵者諸公大夫也大夫如介禮有諸公則辭加席大夫則如介禮有諸公則辭加席委于席端主人不徹釋曰云加席上席也者以其再重三重席皆一種故云上席也記云蒲筵緇布純明無異也以其鄉大夫賢者公與大夫來觀禮而已故俱加重數更無異席也公食大夫禮異國之客有别席是以公食大夫云宰夫設筵加席几又記云司宫具几與蒲筵常緇布純加萑席尋又上注云謂三命大夫也孤為賔則莞筵紛純加藻席畫純是與當國之大夫異也燕禮云司宫筵賔于户西東上無加席也者以其燕私故也大射云司宫設賔席于户西南面有加席與公侯同者以其大射辨尊卑故也賔服鄉服即朝服拜賜拜辱皆造門外明日賔服鄉服以拜賜釋曰此賔是鄉人子弟未仕雖著朝服仍以鄉服言之故鄭云不言朝服未服以朝也主人如賔服以拜辱引鄉射者於此文不具故引以為證明彼此賔主皆不相見造門外拜謝而已息司正之日主人釋朝服服𤣥端主人釋服言釋朝服更服𤣥端也者以其昨日正行賔舉飲酒之禮相尊敬故朝服此乃燕私輕故𤣥端無介不殺羞唯所有徴唯所欲乃息司正無介不殺薦脯醢羞唯所有徴唯所欲以告于先生君子可也賔介不與鄉樂唯欲釋曰昨日正行飲酒不得喚親友故今禮食之餘别召知友故言徴唯所欲也此先生老人教學者故云先生不以筋力為禮於是可以來也云君子國中有盛德者此君子則曲禮博聞强識敦善行而不怠謂之君子也又玉藻云居士錦帶鄭云居士道藝處士亦一也賔介昨日正行禮今又召之則是數數則瀆瀆則不敬故云禮瀆則䙝是以不與奠觶不飲者奠於左舉觶者奠於右凡奠者於左注不飲者不欲其妨將舉於右注便也釋曰奠於左者謂主人酬賔之觶主人奠於薦右客不盡主人之歡奠之於左是不欲其妨後奠爵也將舉於右謂若上文一人舉觶為旅酬使二人舉觶為無算爵始皆奠於右是其將舉者於右以右手舉之便也衆賔堂下立者不洗賔多即門西北面立衆賔之長一人辭洗如賔禮立者東面北上若有北面者則東上此記上主人獻衆賔時主人揖升坐取爵于西楹下降洗爵衆賔長一人降亦進東向辭洗如賔禮是於三人之中復差尊者得辭洗餘二人雖為之洗不敢辭也云其下不洗者謂其堂下立者不為之洗獻之而已堂下立者鄉人賢者或多或少若少則東面北上綂於堂也若多東面立不盡即門西北面東上綂於門也上篚三爵獻賔介衆賔一工笙一大夫一獻工與笙取爵于上篚鄭知上篚三爵者以上經初主人獻賔時云取爵於篚降洗獻賔受酢主人奠爵于序端酬賔訖又取爵於東序端以獻介受酢訖奠爵于西楹南降三拜衆賔訖猶升取爵于西楹下獻堂上堂下衆賔訖主人以爵降奠于篚是其上篚一爵也此記又云獻工與笙取爵于上篚既獻奠于下篚是上篚二爵也又鄉射禮獻大夫云主人揖讓以大夫升拜至大夫答拜主人以爵降洗獻大夫此篇亦有大夫故知上篚有三爵也鄭既云大夫而用特縣以賔賢從士禮磬階間縮霤北面鼓之言大夫而特縣者案周禮小胥半為堵全為肆鄭注云鐘磬者縮縣之二八十六枚而在一虡謂之堵鐘一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫西縣鐘東縣磬今諸侯卿大夫合鐘磬俱有今直云磬是以鄭云大夫而特縣方賔鄉人之賢者從士禮也此以後旅酬皆不洗敬禮殺凡旅不洗注敬禮殺也釋曰案上二人舉觶皆為旅始不可不自絜故洗自此以後旅酬皆不洗故云凡旅不洗也既旅後無算爵行士不入既旅士不入注後正禮也既旅則將燕矣釋曰旅謂旅酬所酬獻皆拜受故云正禮既旅之後無算爵行燕飲之法非正禮故士不入後正禮故也主人之屬綂於堂無算爵乃得酒若有諸公則大夫於主人之北西面主人之贊者西面北上不與若無諸公則大夫南面西上綂於遵也云西面北上綂於堂也者以其主人之屬故也主人之屬非主人所敬故無算爵乃得酒也鄉朝服而謀賔介漢時冠服異係補記鄉朝服而謀賔介皆使能不宿戒注鄉鄉人謂鄉大夫也朝服冠𤣥端緇帶素韠白屨今郡國行鄉飲酒禮𤣥冠而皮弁服與禮異再戒為宿戒儀禮要義卷十
