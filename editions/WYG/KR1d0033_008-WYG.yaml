body:
  text: 儀禮要義卷八宋魏了翁撰鄉飲酒一鄭以此鄉飲為諸侯之鄉大夫獻賢能鄉飲酒禮第四鄭目録云諸侯之鄉大夫三年大比云云釋曰鄭知此鄉飲酒是諸侯之鄉大夫獻賢能法者案春官小胥掌樂縣之法而云凡縣鍾磬半為堵全為肆注云鍾磬者編縣二八十六枚而在一簴謂之堵鍾一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鍾東縣磬士亦半天子之士縣磬而已今此下唯縣磬而無鍾故以為諸侯鄉大夫也若然謂諸侯鄉大夫是大夫為之亦應鍾磬俱有而直有磬者鄭彼注云賓鄉人之賢者従士禮也故縣磬而已若然天子鄉大夫賓賢能従士禮亦鍾磬俱有不得獨有磬也知諸侯之鄉大夫非士者案鄉射記云士則鹿中大夫則兕中又經有堂則物當楣序則物當棟則非直州射兼有諸侯郷大夫以五物詢衆庻行射之禮則知諸侯郷大夫是大夫為之可知也凡鄉飲酒其名有四凡鄉飲酒之禮其名有四案此賓賢能謂之鄉飲酒一也又案鄉飲酒義云六十者坐五十者立侍是黨正飲酒亦謂之鄉飲酒二也鄉射州長春秋習射于州序先行鄉飲酒亦謂之鄉飲酒三也案鄉飲酒義又有鄉大夫士飲國中賢者用鄉飲酒四也其王制云習射尚功習鄉尚齒還是鄉飲酒黨飲酒法先生處士居士君子賓介之别鄉飲酒之禮主人云云注主人謂諸侯之鄉大夫也云云釋曰主人就先生而謀賓介者謂鄉大夫尊敬之先就庠學者若先生謀此二人道藝優者為賓稍劣者為介云賓介處士賢者案玉藻云大夫素帶士練帶居士錦帶弟子縞帶鄭𤣥以居士在士之下弟子之上解為道藝處士非朝廷之士此處士亦名君子即鄉射禮云徴唯所欲以告于先生君子可也鄭亦云君子有大德行不仕者以其未仕有德自處故名處士君子也云賢者義取鄉大夫之興賢能者而言也云周禮至書數並大司徒職文故彼鄭注云物猶事也興猶舉也民三事教成鄉大夫舉其賢者能者以飲酒之禮賓客之既則獻其書於王矣鄭引周官興賢云諸侯鄉大夫蓋如此云云及三年大比而興賢者能者大比謂三年大案比户口之時而興舉之賢者即德行者也能者即道藝者也云鄉老謂三公二鄉公一人云及鄉大夫帥其吏者即帥其鄉吏州長已下云與其衆寡者即鄉中之人也云以禮禮賓之者以鄉飲酒之禮禮而賓舉之也云厥明獻賢能之書於王者今日行鄉飲酒之禮至其明日獻此賢能之書於王王再拜而受之登于天府也云是禮乃三年正月而一行也者欲見彼是天子鄉大夫法諸侯鄉大夫無文以此約之故云諸侯之鄉大夫貢士於其君蓋亦如此云但無正文故云蓋以疑之父師少師教學於鄉里鄭謂貢士如鄉數則遂與公采皆有貢云古者年七十至學焉案略説云大夫七十而致仕老于鄉里名曰父師士曰少師以教鄉人子弟于門塾之基而教之孝焉是也云賢者為賓其次為介又其次為衆賓而與之飲酒是亦将献之以禮禮賓之也者謂據此經諸侯鄉大夫貢士之法亦如天子之鄉大夫貢法故云亦也若據鄉貢一人其介與衆賓不貢之矣但立介與衆賓輔賓行鄉飲酒之禮待後年還以貢之耳案射義云古者天子之制諸侯歳獻貢士注引舊説大國三人次國二人小國一人大國三鄉次國二鄉小國一鄉所貢之士與鄉同則鄉送一人至君所其國有遂數亦同其鄉并有公邑采地皆有賢能貢之而貢士與鄉數同不言遂與公邑采地所貢者葢當鄉送一人至君所君又緫校德之大小取以貢之縱取鄉外仍准鄉數為定鄉大夫雖行飲酒禮賓之於君其簡訖仍更行飲酒禮賓之于是易觀盥而不薦鄭注云諸侯貢士于天子鄉大夫貢士於其君必以禮賓之唯主人盥而獻賓賓盥而酢主人設薦爼則弟子也是鄉大夫及諸侯貢士皆行飲酒禮禮賓也漢郡國十月鄉飲取此黨正之説注今郡國十月行此鄉飲酒禮以黨正云云之説然釋曰云今郡國至之説然者鄭欲解此郷飲酒貢士法彼漢時之所行飲酒禮者是正齒位與此不同之意漢時已罷諸侯之國而為郡郡有太守而封王子母弟者仍為國故云郡國也云十月行此飲酒禮者謂行此鄉飲酒禮也云以黨正每歳邦索鬼神而祭祀者則禮記郊特牲云蜡者索也歳十二月合聚萬物而索饗之周謂之十二月即夏之十月農功畢而蜡祭也云則以禮屬民而飲酒於序以正齒位者屬聚也謂當蜡祭之月黨正聚民於序學中以三時務農將闕於禮此時農隙故行正齒位之禮則禮記鄉飲酒義云六十者三豆七十者四豆八十者五豆九十者六豆年長者在上是正齒位之法也云之説然者漢時十月飲酒禮取此黨正之文而然與此篇鄉飲酒禮異也云此篇無正齒位焉者以其此篇以德行為本而貢之無黨正正齒位法鄉飲黨飲皆於民聚之時鄉大夫飲酒尚德黨正飲酒尚齒云凡鄉黨飲酒必于民聚之時者此鄉飲必於三年大比民聚之時黨正鄉飲酒亦于大蜡民聚之時也云皆欲見其化知尚賢尊長也者尚賢㨿此篇鄉飲酒尊長據黨正飲酒以鄉大夫臨觀行禮或鄉大夫居此黨内則亦名鄉飲酒也云孟子者孟子公孫丑篇齊王召孟子不肯朝後不得已而朝之宿於大夫景丑之家景子譏之曰禮云父召無諾君召不俟駕而行固將朝矣聞君命而遂不果冝與夫禮若不相似然對曰天下有逹尊三爵也德也齒也朝廷莫如爵鄉里莫如齒輔世長民莫如德惡得有其一以慢其二哉是也引之者證郷大夫飲酒是尚德也黨正飲酒尊長尚齒也爵則於此無所當連引耳冠禮賓尊故答拜此賔卑故先拜主人戒賓賓拜辱主人答拜乃請賓云云主人再拜賓答拜案冠禮主人先拜賓答拜此賔先拜主人答拜者彼冠禮主人戒同寮同寮尊又使之加冠於子尊重之故主人先拜此則鄉大夫尊矣賔是鄉人卑矣又將貢已宜尊敬主人故賔先拜辱也是以下注云去又拜辱者以送謝之也謀戒速皆言賔介不言衆賔介亦如之注如戒賔也謀賔介及戒亦言賔介竟不言衆賔衆賔徳劣但謀介時雖不言衆賔亦當之故上注兼言其次為衆賔至於戒速之日必當遣人戒速使知但畧而不言故下云賔及衆賔皆從之是也鄉飲酒義云主人親速賔及介而衆賔自從之亦據不待主人戒速而為自從也賔主介皆獨坐衆賔席不屬與鄉射異乃席賔主人介衆賔之席皆不屬焉釋曰鄭知衆賔席在賔席之西者見鄉射云席賔南面東上衆賔之席繼而西此衆賔之席亦當然但此不屬為異耳云皆獨坐明其徳各特者鄉射注云言繼者甫欲習衆庶未有所殊别此乃特貢於君故衆賔之席皆不屬焉明三物已乆其徳各特故不屬續其席雖不屬猶統賔為位同南面也設醴有在房在東廂在東楹之西尊兩壺于房戸間斯禁有𤣥酒在西設篚于禁南東肆云云釋曰凡設尊之法但醴尊見其質皆在房内故士冠禮禮子婚禮禮婦醴皆在房隠處若然聘禮禮賔尊於東廂不在房者見尊欲與卑者為禮相變之法設酒之尊皆於顯處見其文是以此及醮子與鄉射特牲少牢有司徹皆在房戸之間是燕禮大射尊在東楹之西者君尊専大位也云設篚于禁南東肆者言東肆以頭首為記從西向東為肆則大頭在西也云斯禁禁切地無足者斯斯也澌盡之名故知切地無足昬禮冠禮皆云禁者士禮以禁戒為名卿大夫士並有禁名故鄭以大夫士雙言也是以王藻云大夫側尊用棜士側尊用禁注云棜斯禁也大夫士禮之異也禮器云大夫士棜禁注云棜斯禁也諸云棜者無足有似於棜或因名云耳大夫用斯禁士用棜禁然則禁是定名言棜者是其義稱故禮器大夫士總名為棜禁案特牲禮云實獸於棜注云棜之制如今大木輿也則棜是輿非承尊之物以禁與斯禁無足似輿故世人名為棜若然周公制禮少牢名為棜則以周公為世人或有本無世人字者是以少牢不名斯禁謂之為棜取不為酒戒特牲云壺禁在東序記云壺棜禁饌于東序注云禁言棜者祭尚厭飫得與大夫同器不為神戒也其實不用云棜禁不敢與大夫同名斯禁作記解注故云士用棜禁明與少牢棜同也若然士之棜禁大夫之斯禁名雖異其形同是以禮器同名棜禁也其餘士冠昬禮禮賔用醴不飲故無禁不為酒戒若天子諸侯承尊之物謂之豊上有舟是尊與卑異號也羮定謂狗孰為速賔之節羮定注肉謂之羮定猶孰也釋曰云肉謂之羮者爾雅文言肉正謂其狗孰云定者孰即定止然故以定言之言此者以與速賔時節為限不敢煩勞賔故限之也聘食賔不拜送主人此賔卑主尊拜送主人速賔賔拜辱主人答拜還賔拜辱云主答拜還賔拜辱案聘禮云賔入境至近郊使下大夫至賔館下大夫遂以賔入賔送不拜又公食大夫禮使大夫戒賔大夫還賔不拜送遂從之鄭注云不拜送者為從之不終事皆不拜送此獨拜送者亦是鄉大夫尊賔卑又擬貢故特拜辱而送之異於餘者主人自迎賔而云相欲見𫝊命乃迎主人一相迎于門外再拜賔賔答拜拜介介答拜釋曰云主人一相迎于門外者謂主人於羣吏中立一相使𫝊賔主之命主人乃自出迎賔於大門外必拜一相迎賔者案鄉飲酒義云主人拜迎賔於庠門之外明主人自迎若然主人輙言一相者欲見使一相𫝊命乃迎故云相主人之吏擯贊𫝊命者也庠學唯有一門即向階門内三揖賔主人揖先入注揖衆賔也先入門而西面釋曰此鄉大夫行鄉飲酒在庠學唯有一門即向階門内既有三揖故主人導賔揖而先入門至内霤西向待賔也主人揖賔賔之屬相厭變於主人賔厭介入門左介厭衆賔入衆賔皆入門左北上釋曰主人入後賔乃厭介介厭衆賔相隨入門皆東面北上定位賔既北上主人西面相向揖訖乃相背各向堂塗介與衆賔亦隨賔至西階下已云賔之屬相厭變於主人也者以賔與介衆賔等自用引手而入故不揖是變於主人也云推手曰揖引手曰厭者厭字或作撎字者古字義亦通也云推手揖者案周禮司儀云土揖庶姓時揖異姓天揖同姓鄭以推手小下之為土揖平推手為時揖推手小舉之為天揖皆以推手為揖又案僖二年公羊𫝊荀息進曰虞郭見與獻公揖而進之何休云以手通指曰揖與此别者推手解其揖􅃺通指道其揖意也鄭則解揖體何氏釋其揖意相兼乃足也云引手曰厭者以手向身引之公食射燕皆拜賔至此升拜亦拜至主人與賔三揖至于階三讓主人升賔升主人至北面答拜釋曰云三讓主人升者主人先升賔後升故鄉射云主人升一等賔升是也云三揖者將進揖當陳揖當碑揖者爾雅陳堂塗也云楣前梁也者對後梁為室户上云復拜拜賔至此堂尊之者案公食禮云公升三等賔升公當楣北鄉至再拜燕禮大射皆云主人升自西階賔右至再拜鄉飲酒義亦云拜至拜洗此不云至者畧之是知此升堂拜亦是拜至可知凡拜至者皆是尊之事同曰讓事異曰辭散文亦通主人坐奠爵于階前辭注重以已事煩賔云云釋曰云事同曰讓事異曰辭者事同謂若上文主人與賔俱升階而云三讓是也事異若此文主人有事賔無事是事異則曰辭此對文為義若散文則通是以周禮司儀云主君郊勞交擯三辭車逆拜辱三揖三辭拜受注云三辭重者先辭辭其以禮來於外後辭辭升堂事同而云辭是其通也主人先盥後洗所以致潔主人坐取爵興適洗南面坐奠爵于篚下盥洗釋曰案鄉飲酒義云主人盥洗揚觶所以致潔也拜至拜洗拜受拜送所以致敬也此經先言盥後言洗則盥手乃洗爵者所以致潔沃洗者主人之羣吏主人坐取爵沃洗者西北面釋曰知主人羣吏者下記云主人之贊者西面北上不與注云贊佐也謂主人之屬佐助主人之禮事徹鼎沃盥設薦爼是也上文主人先升賔乃升至此俱升卒洗主人壹揖壹讓升注俱升古文壹作一釋曰知俱升者鄉射云主人卒洗一揖一讓以賔升明俱升可知若然上文主人先升賔乃升者以初至之時賔客之道進宜難故主人升導之至此以辭讓訖故畧威儀而俱升也賔疑立讀如疑然從乎趙盾𫝊作仡賔西階上疑立云疑讀為仡然從於趙盾之仡疑正立自定之貌者案宣公六年公羊𫝊云晉靈公欲殺趙盾於是伏甲於宫中召趙盾而食之趙盾之車右祁彌明者國之力士也仡然從乎趙盾而入放乎堂下而立何休云仡然壯勇貌鄭氏以仡然從乎趙盾而入放乎堂下而立不取何休注義以鄉射注云疑止也有矜莊之色自定其義不殊字義與何少異牲有全烝其豚解為二十一體即折爼乃設折爼注牲體枝解節折右爼釋曰凡解牲體之法有全烝其豚解為二十一體體解即此折爼是也是以下有賔爼脊脅肩介爼脊脅肫胳是體解也賔客自有捝巾拭手坐捝手遂祭酒注捝拭也釋曰案内則事佩之中有帨則賔客自有帨巾以拭手也坐挩手因事曰遂因坐祭酒故云遂也案鄉射坐挩手執爵遂祭此不言執爵省文也啐酒席末言是席之正非専為飲食興席末坐啐酒注啐亦嘗也釋曰言席末謂於席之尾故云末鄉飲酒義云祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也於席末言是席之正非專為飲食也此所以貴禮而賤財也注云祭薦祭酒嚌肺於席中唯啐酒於席末是也啐酒於席末者酒是財賤財之義也云啐亦嘗者亦前肺云嚌是至齒為嘗此酒云啐謂入口為嘗賔拜告㫖主人拜崇酒降席坐奠爵拜告㫖執爵興主人阼階上答拜釋曰賔拜告㫖主人拜崇酒其節同義即異也賔言㫖甘主人之味啐則拜之主人云崇者崇充也謝賔以酒惡相充實飲訖乃崇酒先後亦同也儀禮要義卷八
