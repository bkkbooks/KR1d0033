body:
  text: 儀禮要義卷二十五宋魏了翁撰公食大夫一鄭以公食為主國君食小聘大夫公食大夫禮第九鄭云主國君以禮食小聘大夫之禮釋曰鄭知是小聘大夫者案下文云宰夫自東房薦豆六于醬東設黍稷六簋又設庶羞十六豆此等皆是下大夫小聘之禮下乃别云上大夫八豆八簋又云上大夫庶羞二十豆是食上大夫之法故知此篇據小聘大夫也若然聘禮據侯伯之大聘此篇據小聘大夫者周公設經互見為義案篇末云魚腸胃倫膚若九若十有一下大夫則若七若九鄭注云此以命數為差九謂再命者十一謂三命者七謂一命者九或上或下者再命謂小國之卿次國之大夫也卿則曰上大夫則曰下大國之孤視子男以此言之魚腸胃倫膚皆七者謂子男小聘之大夫此公食序在聘禮之下是因聘而食之不言食賓與上介直云大夫者若云食賓與上介則小聘使下大夫上介乃是士是以直云大夫兼得大夫聘賓與上介亦兼小聘之賓若然聘禮據大聘因見小聘此公食先見小聘後言大聘者欲見大聘小聘或先或後不常之義主君使大夫戒聘客行食禮公食大夫之禮使大夫戒各以其爵釋曰自此盡如聘論主君使大夫就舘戒聘客使來行食禮之事云各以其爵者此篇雖據子男大夫為正兼見五等諸侯大聘使卿之事故云各以其爵也受饔禮辭至饗食皆當三辭上介出請入告注問所以來事釋曰據大夫就賓館之門外賓使上介出請大夫所為來之事三辭既先受賜者謂聘日致饔受賜大禮故今辭食不敢當之但受饔之時禮辭而已至於饗食皆當三辭大夫還賓不拜送遂從之大夫将命云云大夫還賓不拜送遂從之此賓不拜送為從之不終事故賓不拜送也若然鄉飲酒鄉射戒賓遂從之而云拜辱拜送者以其主人先反不相隨故得拜辱拜送覲禮使者勞賓於門外侯氏再拜遂送之使者既不先反猶拜送者尊天子使故也聘重賓發館即皮弁食輕大門乃朝服賓朝服即位于大門外如聘謂賓發館時服𤣥端若鄉射主人朝服乃速賓鄭注云射賓輕也戒時𤣥端以此言之亦賓在館拜所戒大夫即𤣥端賓遂從大夫至君大門外入次乃去𤣥端著朝服出次即位也云如聘亦入於次俟者案聘禮賓皮弁聘至于朝賓入于次注云入于次者俟辦則此入次亦俟主人辦也若聘禮重賓發館即皮弁此食禮輕及大門乃朝服君未迎賓入位序饌物皆廟門外即位具釋曰云擯者俟君於大門外者解即位之事云卿大夫士序及宰夫具其饌物皆於廟門之外者以其君迎賓入始言卿大夫以下廟内之位鼎有扄有鼏鼏若束若編甸人陳鼎七當門南面西上設扄鼏鼏若束若編注七鼎一大牢也甸人冢宰之屬兼亨人者南面西上以其為賓統於外也扄鼎扛所以舉之者也凡鼎鼏盖以茅為之長則束本短則編其中央今文扄作鉉古文鼏皆作密釋曰鼎鼏盖以茅為之者諸文多言鼎鼏皆不言所用之物此經雖言若束若編亦不指所用之體故鄭云盖以疑之然必知用茅者詩云白茅苞之尚書孔𫝊云苴以白茅茅是潔白之物故疑用茅也鄭謂先饗後食聘禮食在饗前設洗如饗釋曰云必如饗者先饗後食如其近者也鄭據此文行食禮而云如饗明先饗設洗訖乃後食故鄉前如之是先饗後食也案聘禮云公於賓壹食再饗則食在饗前矣不言如燕禮者饗食在廟燕在寢則是饗食重先行之故二者自相先後是以不得用燕禮决之也引燕禮者欲見設洗之法燕與饗食同故無享禮引燕禮而言也生人左几異於神右几宰夫設筵加席几釋曰云設筵於户西南面而左几者以其賓在户牖之間南面又生人左几異於神右几故也飲酒漿飲皆以酳口不為飲飲酒漿飲俟于東房釋曰云飲酒清酒也者按周禮酒正注先鄭云清酒祭祀之酒後鄭從之則此賓客用之者優賓故也云漿飲酨漿也者酨之言載以其汁滓相載故云酨漢法有此名故也云其俟奠于豐上也者下云飲酒實於觶加于豐是也此云奠即彼加也云飲酒先言飲明非獻酬之酒也者以其鄉飲酒燕禮等獻酬之酒皆不言飲飲之可知此擬酳口故言飲是異於獻酬酒故也是以酒人云共賓客之禮酒飲酒鄭注云禮酒饗燕之酒不言飲食之酒云飲亦是其義也云漿飲先言漿别于六飲也者按漿人云共王六飲水漿醴凉醫酏彼先云六飲後云水漿與此先云漿不同故云先云漿别於六飲必别於六飲者彼六飲為渇而飲此漿為酳口不為渇故異之國君來則出迎今迎賓不出大門公如賓服迎賓于大門内自此盡階上北面再拜稽首論主君迎賓入拜至之事云不出大門降於國君者按周禮司儀云將幣交擯三辭車逆拜辱賓車進荅拜又云致饔餼饗食皆如將幣之儀是國君來則出迎經内言廟皆禰非禰則言祧或祖廟及廟門公揖入注廟禰廟也釋曰儀禮之内單言廟者皆據禰廟是以昏禮納采云至于廟記云凡行事必用昏昕受諸禰廟以此而言則言廟皆禰廟也若非禰廟則言廟祧若聘禮云不腆先君之祧問卿云受于祖廟之類是也但受聘在祖廟食饗在禰廟燕輕于食享又在寢是其差次也客降等則就主階此徑就西階與禮異至于階三讓釋曰案曲禮云客若降等則就主人之階主人固辭然後客復就西階此亦降等初即就西階者此君與客食禮禮之正彼謂大夫士以小小燕食之禮故與此不同也公升二等賓升注言逺下人君者亦取君行一臣行二之義序已西為正堂序東有夾室大夫立于東夾南西面北上此謂主國卿大夫立位云取節於夾明東于堂者序已西為正堂序東有夾室今大夫立于夾室之南是東于堂也東夾之北謂北堂之南小臣東堂下南面西上宰東夾北西面南上釋曰云宰東夾北西面南上者謂在北堂之南與夾室相當故云夾北也云宰宰夫之屬也者以經云南上則非止一人諸侯内官之士明當天子内宰内官之士在宰東北西面南上云夫人之官内宰之屬也者經云内官按周禮天官内宰下大夫掌王后已下彼天子内官諸侯未必有内宰以其言内官之士以士為之明當天子内宰卿大夫助君饗食賓故從君不先入云自卿大夫至此不先即位從君而入者明助君饗食賓自無事者按前聘時君迎客于大門内時卿大夫已下入廟即位者受聘事重非饗食之事故先入廟即位此已下雖有宰及宰夫者皆有事及大夫二牲士庶羞之等皆助君食賓非己之事故後入賓至再拜降再拜其實各一拜公當楣北鄉至再拜賓降也公再拜自此盡稽首論公拜至賓荅拜之事云公再拜賓降矣者釋經賓降在至再拜下公再拜上以其至再拜者公已一拜賓即降下公再拜者賓降後又一拜雖一拜本當再拜故皆以再拜言之猶下侑幣之時公一拜賓降公再拜注云賓不敢俟成拜也若然鄭云公再拜賓降矣者解經至再拜者賓降也賓西階東荅拜擯辭公降賓猶終再拜賓西階東北面荅拜釋曰自此盡稽首論賓降荅拜之事此云荅拜下云拜也並據公未降之前賓為一拜以其賓始一拜之間公降一等故間在一辭之中是以鄭云賓降再拜釋經北面荅拜及拜也擯者辭辭賓拜于下也賓栗階升不拜以堂下終再拜稽首訖賓栗階升不拜釋曰云自以己拜也者於堂下終為再拜稽首故於堂上不拜也云栗實栗也者謂疾之意也云不拾級連步者曲禮云拾級聚足連步以上此栗階據趨君命而上按燕禮記云凡君所辭皆栗階注云栗蹙也謂越等急趨君命也又曰凡栗階不過二等注云其始升猶聚足連步越二等左右足各一發而升堂是栗階之法也云不拾級而下曰辵者凡升降有四種云辵者君臣急諫諍則越三等為辵階越一等為歴階又有連步又有栗階為四等也義已具於燕禮記疏也賓已拜下主君猶命命之成拜階上北面再拜稽首按論語孔子云拜下禮也今拜乎上㤗也是以上文主君雖辭賓猶終拜于下盡臣之禮為成拜主君之意猶以為不成故命之升成拜賓遂主君之意故升更拜也鼎去鼏乃入與喪禮入乃去鼏異士舉鼎去鼏於外次入陳鼎于碑南南面西上右人云云釋曰自此盡逆退復位論鼎入已載之事云去鼏于外次入者次入謂序入也故少牢云序入去鼏于外者以其入當載於爼故去之也士喪士虞皆入乃去鼏者喪禮變于吉故也諸侯官多已爼各一人大夫士以次兼官雍人以爼入陳于鼎南旅人南面加匕于鼎退釋曰云每器一人諸侯官多也者按少牢云鼎序入雍正執一匕以從雍府執四匕以從司士合執二爼以從司士賛者二人皆合執二爼以相從是大夫官少故每人兼執也若然特牲云賛者執爼及匕從鼎入士虞亦云匕爼從士昏禮亦云匕爼從設彼注云執匕者執爼者從鼎而入設之不言并合者士官彌少并合可知食禮尚熟饗禮有腥即體薦豚解魚腊飪注饗有腥者釋曰樂記云大饗而爼腥魚鄭注云以腥魚為爼實不臑熟之是饗禮有腥也又宣公十六年冬普侯使士㑹平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折爼公當享卿當宴王室之禮也又國語云禘郊之事則有全烝王公立飫則有房烝親戚宴饗則有殽烝以此觀之明饗有腥以饗禮用體薦體薦則腥矣故禮記云腥其爼謂豚解而腥之豚解者皆腥也牲腊進奏謂進本若祭則進末載體進奏注體謂牲與腊也奏謂皮膚之理釋曰若致飱及歸饔餼腥鼎皆無庶羞鄉飲酒鄉射燕禮大射雖同用狗一牲以其亨亨亦皆有庶羞也云奏謂皮膚之理進其理本在前者此謂生人食法故進本本謂近上者若祭祀則進末故少牢云進下鄭云變于食生魚縮爼寢右以脊鄉賓祭尚氣進腴魚七縮爼寢右釋曰云縮爼者于人為横縮縱也魚在爼為縱于人亦横云寢右鄭云右首也寢右進鬐也賓在户牖之間南面爼則東西陳之魚在爼首在右腹腴鄉南鬐脊也進脊在此鄉賓必以脊鄉賓者鄭云乾魚近腴多骨鯁故不欲以腴鄉賓取脊少骨鯁者鄉賓優賓故也若祭祀則進腴以鬼神尚氣腴者氣之所聚故少牢進腴倫膚豕之皮革食禮膚從體數倫膚七釋曰倫膚謂豕之皮革為之但此公食大夫謂賓用為美故膚與腸胃皆别鼎爼特牲腥有三鼎魚腊不同鼎故膚從牲同鼎有司徹雖同少牢亦止三鼎而已羊豕魚皆一鼎故膚還從於牲鼎也又此膚與牲體之數亦七而少牢膚九者此食禮故膚從體數少牢大夫之祭膚出下牲故取數於牲之體而九也公與宰夫為賓將設醬故降盥公降􅏕注將設醤釋曰自此盡各卻于其西論公與宰夫為賓設正饌之事云将設醬者下云公設之是以盥手也鉶羹鉶鼎陪鼎羞鼎之别宰夫設鉶四于豆西東上牛以西羊羊南豕豕以東牛釋曰云鉶菜和羹之器者下記云牛藿羊苦豕薇是菜和羹以鉶盛此羹故云之器也據羹在鉶言之謂之鉶羹據器言之謂之鉶鼎正鼎之後設之謂之陪鼎據入庶羞言之謂之羞鼎其實一也食有酒者優賓設于豆東不舉飲酒實于觶加于豐宰夫右執觶左執豐進設于豆東云云釋曰云食有酒者優賓也者按下文宰夫執漿飲賓興受唯有漿酳口不用酒今主人猶設之是優賓引燕禮記者彼據酒主人奠于薦左賓不飲取奠於薦右此酒不用故亦奠于豆東酒義雖異不舉是同故引為證也按燕禮無此文鄉飲酒鄉射記皆云凡奠者于左舉者于右不同之而引燕禮記者此必轉寫者誤鄭本引鄉飲酒鄉射之等也啓簋㑹蓋各卻於其西宰夫東面坐啓簋㑹各卻于其西注㑹蓋也釋曰簋盖有六兩兩皆相重而仰之謂之合郤故云一一合卻之各當其簋之西為兩處亦者亦少牢故少牢云佐食啓㑹盖二以重設于敦南公東序内賓户西故賛者負東房南面賛者負東房南面告具于公注負房户而立釋曰自此盡醤湆不祭論賓所祭饌之事經直云負東房鄭知負房户而立者以公在東序内賓在户西雖告具于公且欲使賓聞之故知於房近西是以鄭云得鄉公與賓也賛唯授賓黍稷以逺故賓祭之豆間賛者東面坐取黍實于左手辯又取稷辯反于右手興以授賓賔祭之此所授者皆謂逺賓者故菹醢及鉶皆不授以其近賓取之易故不言按曲禮云殽之序辯祭之故知雖不授亦祭可知也經直云祭知祭之於豆祭者按少牢云尸取韭菹辯㨎于三豆祭于豆間故知於豆祭也云獨云賛興優賔者欲見賓坐而不興是優賓其實俱興也引少儀者欲見賛亦興之義以其賓坐賛亦坐故也鄭謂挩為拭蓋佩巾名帨案内則左佩紛帨帨即佩巾而云挩拭拭手以巾似挩不名巾者本名帨者以拭手為名其實名巾故鄭舉其實稱公設粱東上賓辭遷而西之宰夫授公飯粱公設之于湆西賓北面辭坐遷之釋曰自此盡降出論設加饌粱與庶羞之事云遷之遷而西之以其東上也知粱東上者下文宰夫膳稻于粱西是以粱在東為上也羞人不足除先者一人不反餘皆反取之先者反之釋曰反之者以其庶羞十六豆羞人不足故先至者反取之下文云先者一人升設于稻南其人不反則此云先者反之謂第二已下為先者也正饌公揖食此使賛升賓加饌禮殺賛升賓注以公命命賓升席釋曰前設饌訖賛者告具于公公再拜揖食此使賛升賓者以其禮殺故也是以上文正饌公先拜賓荅拜此賓先拜公公荅拜為異也祭稻粱于醬湆間祭加宜于加賓坐席末取粱即稻祭于醬湆間注即就也釋曰注云祭稻粱不於豆祭祭加宜於加者按下文云賓三飯以湆醤注云每飯歠湆以肴擩醤食正饌也三飯而止又云不以湆醤注云不復用正饌也則此湆醤是正饌而云加者但湆醤與粱皆是加故公親設之下文為正饌而此云加者為湆醤雖是加以在正饌之上得與正饌為本故名正饌其實是正饌之加故公親設之也賓降拜庶羞以後正食受侑幣賓降拜注拜庶羞釋曰自此盡魚腊不與論賓正食受侑幣至於食終之事有東西箱曰廟箱在夾前夾在序次賓升公揖退于箱注箱東夾之前俟事之處釋曰按爾雅有東西廂曰廟其夾皆在序外故也知是俟事之處者正以此文公揖退于箱而俟賓食公食大夫禮食先殺大夫下燕食先胾賓三飯以湆醤釋曰云每飯歠湆以殽擩醤者按曲禮三飯主人延客食胾然後辯殽鄭注云先食胾後食殽殽尊此先食殽者彼鄭云大夫士與客燕食之法其禮食宜放公食大夫禮云若然此為禮食故先食殽大夫士與客燕食則先食胾故不同或酒或漿皆右兩有則左酒右漿宰夫設其豐于稻西釋曰云酒在東漿在西者案上飲酒實于觶宰夫設于豆東是酒在東也云漿在西者即此經設於稻西是也云是所謂左酒右漿者按曲禮云酒漿處右鄭云此言若酒若漿耳兩有之則左酒右漿云兩有者據此公食而言束帛侑賓公西鄉立賓序公受宰夫束帛以侑西鄉立注束帛十端帛也侑勸也主國君以為食賓殷勤之意未至復發幣以勸之欲用深安賓也西鄉立序内位也受束帛于序端釋曰云西郷立序内位也者案上文公設醤公立于序内西鄉此經亦云西鄉立故知亦在序内位也云受束帛于序端者按大射禮公凡受于序端故每云公之所受者皆約之受於序端三飯後當受幣再入終禮今拜稽示将退賓入門左没霤北面再拜稽首釋曰云便退則食禮未卒不退則嫌者此鄭探解賓意食禮自有常法三飯之後當受侑幣更入以終食禮故送庭實而後入是以鄭云便退則食禮未卒解經賓入之意云不退則嫌者謂有貪食之嫌解再拜稽首将辭之意是以更入行拜若欲從此退者待公設辭留賓之意也簋盛黍稷有㑹簠盛稻賓卒食㑹飯三飲注卒已也己食㑹飯三潄醤也釋曰上文云宰夫東面坐啓簋㑹各卻于其西北云食㑹飯故知㑹飯者是黍稷也前賓三飯不云㑹以其簠盛稻粱無㑹故鄭云此食黍稷則初食稻粱矣初食加飯用正饌此食正飯用庶羞不以醤湆釋曰云初時食加飯用正饌此食正飰用庶羞互相成也者案上文賓三飰以湆醤注云每飯歠湆以殽擩醤是正饌稻粱是其加此云卒食㑹飯三飲不以醤湆鄭意以庶羞黍稷是其正庶羞是其加互相成而已言相成者既非互文直取饌食互相成而已云後言湆者或容前三飯後用湆也賓初來揖讓而退不顧示難進易退賓出公送于大門内再拜賓不顧注初來揖讓而不顧示難進易退之義云云釋曰云擯者以賓不顧告公公乃還也者知擯者告公者按經公送于大門内公不見賓矣而云賓不顧明知擯者告公公還入宴寢也此擯者告賓不顧即論語云賓退必復命曰賓不顧矣但彼據聘享訖此據食禮訖卷三牲之爼謂與祭虞有所釋異有司卷三牲之爼歸于賓館魚腊不與釋曰云歸爼者實于篚者此食禮無肵爼而言卷三牲之爼不言用爼惟云實于篚按士虞禮亦無肵爼尸舉牲體皆盛于篚吉凶雖不同無肵爼是一故知同用篚也云它時有所釋故者解三牲之爼言卷案特牲及士虞尸卒食取爼歸於尸三个是有所釋此無所釋故稱卷也彼注云釋猶遺也遺者君子不盡人之歡不竭人之忠也儀禮要義卷二十五
