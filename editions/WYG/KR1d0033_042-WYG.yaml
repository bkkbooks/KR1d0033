body:
  text: 儀禮要義卷四十二宋魏了翁撰士虞禮一迎精而反日中祭於殯宫以安之曰虞士虞禮第十四鄭且録云虞安也士既𦵏父母迎精而反日中祭之於殯宫以安之虞於五禮屬凶大戴第六小戴第十五别録第十四釋曰案此經云側亨于廟門外之右又記云陳牲于廟門外皆云廟目録云祭之殯宫者廟則殯宫也故鄭注士䘮禮凡宫有鬼神曰廟以其虞卒哭在寢祔乃在廟是以鄭注䘮服小記云虞於寢祔於祖廟虞亦當言牲此云特豕饋食士虞禮特豕饋食注饋猶歸也釋曰自此盡南順論陳鼎鑊於祭器几筵等之事案左氏傳云卜日曰牲是以特牲云牲大夫已上稱牲亦稱牢故云少牢此虞祭䘮祭又葬日虞因其吉日故略無卜牲之禮故指豕體而言不云牲大夫已上亦當然雜記云大夫之虞也犆牲又此下記云陳牲於廟門外檀弓云與有司視虞牲皆言牲者記人之言不依常例故也然少牢云司馬刲羊士擊豕不言牲者據殺時須指事而言亦非常例也云饋猶歸者謂以物與神及人皆言饋是以此虞及特牲少牢皆言饋坊記云父母在饋獻不及車馬是生死皆言饋側亨唯亨一胖以虞不致爵唯獻賔側亨于廟門外之右東面案吉禮皆全左右胖皆亨不云側此云側亨明亨一胖而已必亨一胖者以其虞不致爵自獻賔已後則無主人主婦及賔已下之爼故唯亨一胖也若然特牲亦云側殺者彼雖亨左右胖少牢二特牲一故以一牲為側各有所對故也云亨於爨用鑊者亦案少牢有羊鑊故亨在鑊云不於門東未可以吉也者以虞為䘮祭不於門東對特牲吉禮鼎鑊皆在門東此云門外之右是門之西卒哭對虞為吉祭若比祔為䘮祭是日也以虞易奠卒哭曰成事是日也以吉祭易䘮祭如是則卒哭即是吉祭而鄭此注云祔為吉祭者卒哭對虞為吉祭卒哭比祔為䘮祭故下記云卒哭祭乃餞云尊兩甒於廟門外之右少南在尊東南水在洗東篚在西注云在門之左又少南則鼎鑊亦在門左又云明日以其班祔云云又云其他如饋食是祔乃與特牲吉祭同以祔為吉祭是以云祔而以吉祭易䘮祭迎魂而反神還在寢故寢云廟云鬼神所在則曰廟尊言之者對時廟與寢别今雖葬既以其迎魂而反神還在寢故以寢為廟虞於中祭之也魚腊爨在豕鼎北孔子時爨為竈魚腊爨亞之北上注爨竈釋曰上豕爨在門右東面此魚腊各别鑊言北上則次在豕鼎之北而云爨竈者周公經為爨至孔子時為竈故王孫賈問孔子曰與其媚於奥寜媚於竈三鑊在西方饎爨在東壁皆反吉饎爨在東壁西面釋曰以三鑊在西方反吉案特牲云主婦視饎爨于西堂下宗婦主之在西方今在東亦反吉也少牢廩爨在饔爨之北在門外者是大夫主之廩人掌男子之事故與牲爨同在門外東方也知炊黍稷曰饎者案周禮饎人云掌凡祭祀共盛齊盛即黍稷故知也云北上上齊于屋宇者此案特牲記云饎爨在西壁鄭注云西壁堂之西牆下舊說云南北直屋梠稷在南彼此東西皆言壁彼云屋梠此云屋宇故知此亦齊屋也云於虞有亨饎之爨彌吉者以其小斂大斂未有黍稷朔月薦新之等始有黍稷向言仍未有爨至此始有亨饎之爨𤣥酒在酒上䘮祭無𤣥酒醴之云酒在東上醴也者醴法上古酒是人所常飲故在東吉禮𤣥酒在酒上今以䘮祭禮無𤣥酒則醴代𤣥酒在上故云上醴也云絺布葛屬者絺綌以葛為之布則以麻為之今絺布並言則此麻葛雜故有兩號大斂奠有席虞有几君則始死素几葦席在西序下注有几始鬼神也釋曰經几席具有注唯云几者以其大斂奠時已有席至此虞祭乃有几故也然案檀弓云虞而立尸有几筵筵則席虞祭始有者以几筵相將故連言筵其虞有几若天子諸侯始死則几筵具故周禮司几筵云每敦一几據始殯及葬時是始死即几席具也尸在奥東面設者西面饌兩豆菹醢于西楹之東醢在西一鉶亞之釋曰此饌繼西楹言之則以西楹為主向東陳之云一鉶亞之者菹以東也云醢在西南面取之得左取菹右取醢便其設之者以其尸在奥東面設者西面設於尸前菹在南醢在北今於西楹東饌之菹在東醢在西是南面取之得左取菹右取醢至尸前西面又左菹右醢故云便也扃在鼏上先設鼏後扃今文扃作鉉陳三鼎于門外之右北面北上設扃鼏今文扃作鉉云設其設扃在後知者案士䘮禮小斂云右人左執匕抽扃予左手兼執之取鼏委于鼎北加扃則扃在鼏上故先抽扃後去鼏則鼏先設可知扃鼏雖在三鼎之下總言其實陳一鼎設即設之知者案下記云皆設扃鼏注云嫌既陳乃設扃鼏是也三虞與葬服同卒哭變麻服葛主人及兄弟如葬服賔執事者如弔服云云釋曰自此盡北面論將虞祭於位及衣服之事云葬服者既夕曰丈夫髽髪散帶垂也者此唯謂葬日反日中而虞及三虞時其後卒哭即服其故服是以既夕記注云自卒至殯自啟至葬主人之禮其變同則始虞與葬服同三虞皆同至卒哭卒去無時之哭則依其䘮服乃變麻服葛賔執事士之屬官即公有司亦朋友云賔執事者賔客來執事也者以其虞為䘮祭主人未執事故云賔客來執事也案下注云士之屬官為其長弔服加麻即此經賔執事者弔服是也若然此士屬官中有命于其君者是以特牲記賔中有公有司鄭注云公有司亦士之屬命于其君者也案曽子問士則朋友奠不足取於大功以下又云士祭不足則取於兄弟大功以下者鄭云祭謂虞卒哭時以此而言彼朋友則公有司與此執事一物以僚友言之雖屬官亦為朋友也卒哭緦至斬皆免祝亦免以所親祝免澡葛絰帶布席于室中東面右几降出釋曰云祝亦執事者謂亦上執事也云免者祭祀之禮祝所親也者案禮記䘮服小記云緦麻小功虞卒哭則免注云卒哭緦麻已上至斬衰皆免今祝是執事屬吏之等皆無免法今與緦已上同著免嫌其大重故云祭祀之禮祝所親而可以受服也祝不與執事同位接神尊也祝入門左北面釋曰云不與執事同位接神尊也者執事即上兄弟賔即位于西方如反哭位皆是執事故曽子問䘮祭不足則取兄弟此隂厭主人倚杖入祝從祝盥升取苴降洗之升入設于几東席上東縮降洗觶升止哭釋曰自此盡哭出復位論設饌於神杖不入於門之事也案此文隂厭時主人倚杖入祝從在左西面下記云尸入祝從尸注云祝在主人前也嫌如初時主人倚杖入祝從之初時主人之心尚若親存宜自親之今既接神祝當詔侑尸也主人前自西入向東在階下未得倚杖于序今主人在西階將入室故倚杖於西序齊斬不執事虞自尸入後祔隂厭亦執事賛薦菹醢醢在北注主婦不薦齊斬之服不執事也釋曰曽子問士祭不足則取於兄弟大功已下者彼文承奠下故引之下卒哭既取大功以下則齊斬不執事唯為今時至于尸入之後亦執事兩籩􅀥栗設於㑹南至於祔祭雖隂厭亦主婦薦主人自執事也知者下記云其他如饋食案特牲云主人在右及佐食舉牲鼎是也若大夫已上尊不執事故少牢云主人出迎鼎注云道之也是不執事也吉祭直有酒䘮祭酒醴俱有祝酌醴命佐食啟㑹佐食許諾啟㑹郤于敦南復位釋曰特牲少牢直言酌奠不言酌醴者以彼直有酒故不言酒此兩有者以其同小斂大斂朔月遷祖祖奠大遣奠等皆酒醴並有故此虞之䘮祭亦兩有異於吉祭也祝祝者釋祭辭迎尸後祝饗尸辭祝饗命佐食祭釋曰下云祝祝卒注云祝祝者釋孝子祭辭又下文迎尸後尸堕祭云祝祝主人拜如初此等三者皆有辭此文饗神引記者是隂厭饗神辭下文迎尸上釋孝子辭者經記無文案少牢迎尸祝孝子辭云孝孫某敢用柔毛剛鬛嘉薦普淖用薦嵗事于皇祖伯某以某妃配某氏尚饗此是釋孝子辭此迎尸上釋孝子辭宜與彼同但稱哀為異其迎尸後祝辭者即下記饗辭云哀子某圭為而哀薦之饗鄭注云饗辭勸强尸之辭也凡吉祭饗尸曰孝子是以特牲迎尸後云祝饗注云饗勸强之也其辭取於士虞記則宜云孝孫某圭為孝薦之饗是也下二虞卒哭記皆有辭至彼别釋孝子將納尸疑於其位設苴以定之佐食許諾鉤袒取黍稷祭于苴三取膚祭祭如初祝取奠觶祭亦如之不盡益反奠之主人再拜稽首注鉤袒如今擐衣也苴所以藉祭也孝子始將納尸以事其親為神疑於其位設苴以定之耳或曰苴主道也則特牲少牢當有主象而無可乎云鉤袒如今擐衣也者經云鉤袒若漢人擐衣以露臂故云如今擐衣也云孝子始將納尸以事其親為神疑於其位設苴以定之耳者案上文祝取苴降洗設于几東者至此乃祭于苴下文乃延尸是孝子迎尸之前用苴以將納尸以事其親為神疑於其位故設苴以定之觧預設苴之意也云或曰苴主道也則特牲少牢當有主象而無可乎者觧舊有人云苴主道似重為主道然故鄭破之云若是苴為主道特牲少牢吉祭亦當有主象亦宜設苴今而無苴可乎是鄭以苴為藉祭非主道也若然此據文有尸而言將納尸有苴案下記文無尸者亦有苴又特牲少牢吉祭無苴案司巫祭祀則共匰主及蒩館常祀亦有苴者以天子諸侯尊者禮備故吉祭亦有苴凶祭有苴可知祝迎尸主人兄弟奉篚哭從尸祝迎尸一人衰絰奉篚哭從尸自此盡如初設論迎尸入九飯之事鄭知一人衰絰是主人兄弟者以主人哭出復位無從尸之理又云衰絰且非䟽逺故知一人衰絰是主人兄弟也引檀弓者證祝隨主人葬先反宿虞尸檀弓既封主人贈而祝宿虞尸鄭此經注云尸主也孝子之祭不見親之形象心無所繫立尸而主意焉墮祭謂下祭或挼或羞或綏或擩同尸取奠左執之取菹擩于醢祭于豆間祝命佐食墮祭云尸取奠左執之者以右手將墮故也云下祭曰墮者以其凡祭皆手舉之向下祭之既祭藏其墮謂此也者謂此墮祭一也引之者證守祧同之耳云今文墮為綏又云特牲少牢或為羞失古正矣者此二字皆非墮下之義故云失古正也云齊魯之間謂祭為墮者案特牲云祝命挼祭注云士虞禮古文曰祝命佐食墮祭周禮曰既祭則藏其墮墮與綏讀同耳今文改挼皆為綏古文此皆為擩祭也又少牢尸將酢主人時上佐食以綏祭鄭注云綏讀為墮此三處經中墮皆不同者此五字或為墮或為挼或為羞或為綏或為擩此五者鄭既以挼綏及羞三者已從墮復云古文作擩以其特牲及此士虞皆有擩祭故亦兼擩觧尸受肺脊嚌之不受魚腊庶羞不備味佐食舉肺脊授尸尸受振祭嚌之左手執之釋曰云右手將有事也者為下文祭鉶嘗鉶是也云尸食之時亦奠肺脊於豆者觧經無文知不執以食卒者案下文云尸卒食佐食受肺脊實于篚在尸手當云受肺脊又知在豆者特牲云尸實舉于菹豆是也案特牲尸乃食食舉注云舉言食者明凡觧體皆連肉少牢云食舉注云舉牢肺正脊也先飯㗖之以為道也此䘮祭不言食舉亦食舉可知是以特牲注云肺氣之主也脊正體之貴者先食㗖之所以道食通氣也案下文注云尸不受魚腊以䘮不備味則亦不食庶羞矣尸祭豕鉶嘗羊鉶用右手用柶尸祭鉶嘗鉶釋曰知以右手者上經云佐食舉肺脊授尸尸受振祭嚌之左手執之少牢曰以柶祭羊鉶遂以祭豕鉶嘗羊鉶引少牢者證此經嘗祭之時亦用柶案下記云鉶芼用苦若薇有滑夏用葵冬用荁有柶是用柶祭之義觶北鉶南設泰羮薦豆之左設胾泰羮湆自門入設于鉶南胾四豆設于左釋曰云設于鉶南者以泰羮湆未設故繼鉶而言之其實觶北留空處以待泰羮云胾四豆設于左者案特牲四豆設於左南上云左者正豆之左又少牢云上佐食羞胾兩瓦豆有醢設于薦豆之北注云設於薦豆之北以其加也言北亦是左也云博異味者以其有湆有胾古者飯用手播餘于篚不反餘尸飯播餘于篚案曲禮云無摶飯又云無放飯飯黍無以箸故知古者飯用手言此者證播飯去手為放飯云吉時播餘于㑹者可知注不反餘也古文播為半特牲三舉魚腊皆祭嚌此反吉案特牲三舉魚腊尸皆振祭嚌之此佐食舉魚腊實於篚尸不嚌故云䘮不備味爵敦無足者曰廢爵廢敦主人洗廢爵酌酒酳尸釋曰自此盡升堂復位論主人初獻尸并獻祝及獻佐食之事云爵無足曰廢爵者案下文主婦洗足爵鄭云爵有足輕者飾也則主人䘮重爵無足可知凡諸言廢者皆是無足廢敦之類是也吉禮嚌肝加菹豆䘮逺味加于爼賔長以肝從實于爼縮右鹽尸左執爵右取肝擩鹽振祭嚌之加于爼釋曰復位者謂賔長也尸既振肝訖復西階前衆兄弟之南東面位云以䘮不志於味者決特牲少牢尸嚌肝訖加菹豆以近身此虞禮尸嚌肝訖不加于菹豆而逺加於爼以同牲體者以䘮志不在於味逺身加爼也主婦為舅姑齊衰故獻用足爵主婦洗足爵于房中酌亞獻尸如主人儀釋曰自此盡入於房論主婦獻尸并獻祝及佐食之事云如主人儀者即上主人酳尸尸拜受爵主人北面答拜之等今主婦亞獻亦然故云如主人儀也云爵有足輕者飾也者主婦主人之婦為舅姑齊衰是輕於主人故爵有足為飾賔長三獻用繶爵口足之間有篆賔長洗繶爵三獻釋曰此一節論賔長終三獻之事云繶爵口足之間有篆又彌飾者案屨人繶是屨之牙底之間縫中之飾則此爵云繶者亦是爵口足之間有飾可知云又彌飾以其主婦有足已是有飾今口足之間又加飾也祭訖婦人復位送尸改饌為陽厭婦人復位釋曰自此盡拜稽顙論祭訖送尸及改饌為陽厭之事云復堂上西面位者上云主人即位於門外如朝夕臨位婦人及内兄弟服即位於堂亦如之以下更不見别有婦人位明復位者還此位可知又案士䘮禮凡臨位婦人即位于堂南上即面位也云尸將出當哭踊者以哭送此䘮祭故踊特牲吉祭不哭踊故亦無此復位之事也尸謖不告尸起者尸尊祝入尸謖釋曰云祝入而無事尸則知起矣者雖不告尸無事尸亦知無事禮畢而起矣云不告尸者無遣尊者之道也者謂不告尸以禮畢者尸尊尸入丈夫婦人踊有三出降亦如之祝前尸出户踊如初降堂踊如初出門亦如之釋曰案上文尸入門丈夫踊婦人踊尸及階祝延尸尸升宗人詔踊如初尸入户踊如初故此鄭云出如入降如升三者之節悲哀同是以如之得有三者也虞祭不南面以特牲東面右几故漸向吉云几在南變右文者上文隂厭時設几席于室中東面右几今云几在南明其同必變文者案少牢大夫禮陽厭時南亦几在右此言右几嫌與大夫同南面而右几故變文云几在南與前在奥同故云明東面也又以特牲云祝筵几于室中東面至於改饌云佐食徹尸薦爼敦設于西北隅几在南是與此同也云不南面漸也者以特牲東面右几今虞為䘮祭示向吉有漸故設几與吉祭同佐食闔牖户或取逺人之意賛闔牖户釋曰云或諸逺人乎者禮記郊特牲文此鄭𤣥之義非直取鬼神居幽闇或取逺人之意故也知是生人之意云賛佐食者自上以來行事唯有祝與佐食以其云祝自執其爼出故知闔牖户者是佐食也三年之䘮不櫛期以下虞而櫛沐浴可也記虞沐浴不櫛釋曰云唯三年之䘮不櫛期以下櫛可也者經云不據三年為主案下文班祔而明以下虞而沐浴櫛可也虞牲陳于廟門外北首西上寢右皆反吉陳牲于廟門外北首西上寢右釋曰知腊在牲中者士虞唯有一豕而云西上明知兼兎腊得云西上也云西上變吉者案少牢二牲東上是吉祭東上今此西上是變吉也云寢右者當升左胖也者若然特牲腊在東置於棜東首牲在西尚右今虞禮反吉故寢右升左胖知腊用棜者案特牲陳鼎於門外北面北上棜在南南順實獸于其上東首是也引檀弓者證虞時有牲之事日中而行事謂辰正再虞三虞質明日中而行事釋曰云辰正者謂朝夕日中也以朝有葬事故至日中而行虞事也云再虞三虞皆質明者以朝無葬事吉祭主人視牲又視殺虞不視殺殺于廟門西主人不視豚解釋曰云主人視牲不視殺凡為䘮事略也者案特牲饋食禮宗人告濯具賔出主人出皆復外位鄭云為視牲也又曰告事畢賔出主人拜送夙興主人服如初立于門外東方南面視側殺然則特牲吉祭故主人視牲又視殺今虞為䘮事故主人視牲不視殺士正祭九體䘮祭略升七體羮飪升左肩臂臑肫骼脊脅離肺膚祭三云云肺祭一云云釋曰肉謂之羮爾雅釋器文飪孰釋言文云脊脅正脊正脅也者案特牲注云不貶正脊不奪正也然則此為䘮祭體數雖略亦不奪正故知脊脅正脊正脅也云䘮祭略七體耳者案特牲尸爼右肩臂臑肫胳正脊二骨横脊長脅二骨短脅注云士之正祭禮九體貶於大夫有併骨二亦得十一之名合少牢之體數此所謂放而不致者然則此所升唯七體故云䘮祭略升腊亦七體牲之類云腊亦七體牲之類者牲上文升左肩臂臑肫胳脊脅是牲之七體今升腊左胖亦然特牲記云腊如牲骨載猶進柢魚進鬐未異於生載猶進柢魚進鬐注云猶猶士䘮既夕言未可以吉也者云與吉反則明與生人同士䘮禮小斂云皆覆進柢注云柢本也進本者未異於生也至大斂載魚左首進鬐腊進柢鄭注云亦未異於生也又葬奠云如初皆未異於生故記人以猶之是以鄉飲酒鄉射記皆云右體進腠上隂厭時祝從主人今接神在主人前尸入祝從尸釋曰上經隂厭時主人先祝入户至此迎尸祝在主人前先後有異故記人明之是以鄭云祝在主人前也嫌如初時主人倚杖入祝從之也云今既接神祝當詔侑尸也者尸神象是以云既接神祝當詔侑尸即上祝命佐食爾敦舉黍稷及祝酌授尸及祝出告利成祝入尸謖之等凡禮坐皆說屨尸坐不說尸坐不說屨釋曰案鄉飲酒燕禮之等凡坐降說屨乃升坐今尸雖坐不說屨者為侍神不敢燕墯膚祭肺祭之别膚祭尸未入前所祭肺祭尸所祭上文注儀禮要義卷四十二
