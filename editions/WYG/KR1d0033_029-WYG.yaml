body:
  text: 儀禮要義巻二十九宋魏了翁撰喪服經傳二父以斬母以齊家無二尊父釋曰周公設經上陳其服下列其人即此文父已下是為其人服上之服者也先陳父者此章恩義並設傳曰為父何以斬衰也父至尊也者言何以者問比例以父母恩愛等母則在齊衰父則入于斬比並不同故問何以斬不齊衰答云至尊者天無二日家無二尊父是一家之尊尊中至極故為之斬也此文在父下君上者君則兼諸侯大夫諸侯為天子釋曰此文在父下君上者以下文君中雖言天子兼有諸侯及大夫此天子不兼餘君君中最尊上故特著文於上也君尊與父同以義合故從義服君釋曰臣為之服此君内兼有諸侯及大夫故文在天子下鄭注曲禮云臣無君猶無天則君者臣之天故亦同之於父為至尊但義故還著義服也卿大夫承天子諸侯則天子諸侯之下卿大夫有地者皆曰君案周禮載師云家邑任稍地小都任縣地大都任畺地是天子卿大夫有地者若魯國季孫氏有費邑叔孫氏有郈邑孟孫氏有郕邑晉國三家亦皆有韓趙魏之邑是諸侯之卿大夫有地者皆曰君以其有地則有臣故也天子不言公與孤諸侯大國亦有孤鄭不言者詩云三事大夫謂三公則大夫中含之也但士無臣雖有地不得君稱故僕𨽻等為其弔服加麻不服斬也子不言適大而言長通上下父為長子釋曰君父尊外次長子之重故其文在此言長子通上下則適子之號唯據大夫士不通天子諸侯若言大子亦不通上下案服問云君所主夫人妻大子適婦鄭注云言妻見大夫已下亦為此三人為喪主也則天子下及大夫之下不通士若言世子亦不通上下唯據天子諸侯之子是以鄭云不言適子通上下非直長子得通上下冡子亦通上下故内則云冢子則大牢注云冡子猶言長子通於下也是冡子亦通上下也云亦言立適以長者欲見適妻所生皆名適子第一子死也則取適妻所生第二長者立之亦名長子若言適子唯據第一者若云長子通立適以長故也為長子不問斬而問三年舉輕明重傳曰何以三年也正體於上又乃將所傳重也釋以其俱是子不杖章父為衆子期此章長子則為之三年故發何以之傳也不問斬而問三年者斬重而三年輕長子非尊極故舉輕以問之輕者尚問明重者可知故舉輕以明重也云正體於上又乃將所傳重也者此是答辭也以其父祖適適相承為上已又是適承之於後故云正體於上云又乃将所傳重者為宗廟主是有此二事乃得三年云庶子不得為長子三年不繼祖也者此明適適相承故須繼祖乃得為長子三年也為父後者然後為長子三年庶子不得為長子三年不繼祖也釋曰云此言為父後者然後為長子三年者經云繼祖即是為祖後乃得為長子三年鄭云為父後者然後為長子三年不同者周之道有適子無適孫適孫猶同庶孫之例要適子死後乃立適孫乃得為長子三年是為父後者然後為長子三年也云重其當先祖之正體者觧經正體于上又云又以其将代己為宗廟主也者釋經傳重為父後者之弟則庶子衆子亦名庶云庶子者為父後者之弟也者謂兄得為父後者是適子其弟則是庶子是為父後者之弟不得為長子三年此鄭據初而言其實繼父祖身三世長子四世乃得三年也云言庶者逺别之也者庶子妾子之號適妻所生第二者是衆子今同名庶子逺别於長子故與妾子同號言繼祖不言禰容祖禰共廟云小記曰不繼祖與禰此但言祖不言禰容祖禰共廟者案祭法云適士二廟官師一廟鄭注云官師中下之士祖禰共廟則此容祖禰共廟據官師而言若然小記所云祖禰并言者是適士二廟者也祖禰共廟不言禰直言祖舉尊而言長子斬不必五世鄭微破先師説鄭注小記云言不繼祖禰則長子不必五世者鄭前有馬融之等解為長子五世鄭以義推之已身繼祖與禰通己三世即得為長子斬長子唯四世不待五世也此微破師馬融之義也以融是先師故不正言而云不必而己也若然雖承重不得三年有四種一則正體不得傳重謂適子有廢疾不堪主宗廟也二則傳重非正體庶孫為後是也三則體而不正立庶子為後是也四則正而不體立適孫為後是也案喪服小記云適婦不為舅後者則姑為之小功鄭注云謂夫有廢疾他故若死而無子不受重者婦既小功不大功則夫死亦不三年期可知也不言所後之父或後祖父以上不定為人後者釋曰此出後大宗其情本疏故設文次在長子之下也案喪服小記云繼别為大宗繼禰為小宗大宗即下文為宗子齊衰三月彼云後大宗者則此所後亦後大宗者也云何以三年者以生己父母三年彼不生己亦為之三年故發問比例之傳也云受重者必以尊服服之者答辭也雷氏云此文當云為人後者為所後之父闕此五字者以其所後之父或早卒今所後其人不定或後祖父或後曽髙祖故闕之見所後不定故也云何如而可為之後問辭同宗則可為之後答辭大宗子當収聚旅人非同宗則不可謂同承别子之後一宗之内若别宗同姓亦不可以其収族故也又云何如而可以為人後問辭云支子可也答辭以其他家適子當家自為小宗小宗當収歛五服之内亦不可闕則適子不得後他故取支子支子則第二已下庶子也不言庶子云支子者不限妾子而已若然適子不得後人無後亦當有立後之義也云為所後者之祖父母已下之親至若子謂如死者之親子則死者祖父母則當已曽祖父母齊衰三月也妻謂死者之妻即後人之母也妻之父母昆弟昆弟之子並據死者妻之父母妻之昆弟妻之昆弟之子於後人為外祖父母及舅與内兄弟皆如親子為之著服也若然不言為父此經直言為所後者之祖父母及妻及死者外親之等不言死者緦麻小功大功及期之骨肉親者子夏作傳舉疏以見親言外以包内骨肉親者如親子可知妻為夫斬以在家天父出則天夫妻為夫傳曰夫至尊也釋曰自此已下論婦人服也婦人卑於男子故次之案曲禮云天子曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻后以下皆以義稱士庶人得其總名妻齊也妻為夫者上從天子下至庶人皆同為夫斬衰也傳言夫至尊者雖是體敵齊等夫者猶是妻之尊敬以其在家天父出則天夫又婦人有三從妾為君服斬君至尊妾為君傳曰君至尊也釋曰妾賤於妻故次妻後案内則云聘則為妻奔則為妾既名為妾故不得名壻為夫故加其尊名名之為君也亦得接於夫又有尊事之稱故亦服斬衰也女子子别於男子在室關許嫁者女子子在室為父釋曰自此盡為父三年論女子子為父出及在室之事制服又與男子不同云女子子者子女也别有男子也者男子女子各單稱子是對父母生稱今於女子别加一字故雙言二子以别於男一子者云言在室者闗已許嫁者内則女子十年不出又云十有五年而笄女子子十五許嫁而笄謂女子子年十五笄四徳已備許嫁與人即加笄與丈夫二十而冠同死而不殤則同成人矣身既成人亦得為父服斬也媍人服於女子子下言布言三年布總箭笄髽衰三年釋曰上文不言布不言三年至此言之上以哀極故沒其布名與年月至此須言之故也以其笄既用箭則總不可不言用布又上文絰至練有除者此經三年既與男子有殊並終三年乃始除之矣案喪服小記云婦人帶惡笄以終喪彼謂婦人期服者帶與笄終喪此斬衰帶亦練而除笄亦終三年矣故以三年言之云此妻妾女子子喪服之異子者鄭據經上下婦人服斬者而言若然周公作經越妻妾而在女子子之下言之者雷氏云服者本為至情故在女子之下云謂之總者既束其本又總其末者鄭解此經云布總者只為出紒後垂為飾者而言以其布總六升與男子冠六升相對故知據出見者而言是以鄭云謂之總者既束其本又總其末也云箭笄篠竹也者案尚書禹貢云篠蕩既敷孔云篠竹箭是箭篠為一也又云髽露紒也猶男子之括髪者髽有二種案士喪禮曰婦人髽于室注云姑死婦人將斬衰者去笄而纚將齊衰者骨笄而纚今言髽者亦去笄纚而紒也云斬衰括髪以麻則髽亦用麻者案喪服小記云斬衰括髪以麻免而以布男子髻髪與免用布有文婦人髽用麻布無文鄭以男子髻髪婦人髽同在小歛之節明用物與制度亦應不殊但男子陽以外物為名名為括髪婦人隂以内物為稱稱為髽為異耳鄭引漢法幓頭況者古之括髪其髽之状亦如此故鄭注士喪禮云其用麻布亦如著幓頭也引喪服小記者彼男子冠婦人笄相對云男子免而婦人髽者亦小記之文此免既齊衰以下用布而免則髽是齊衰以下亦同用布為髽相對而言也但男子陽多變斬衰名括髪齊衰以下名免耳婦人隂少變故齊斬婦人同名髽齊衰將􅃝以免代冠免制未聞士喪禮鄭注云衆主人免者齊衰將􅃝以免代冠免之制未聞舊説以為如冠状廣一寸亦引小記括髪及漢幓頭為説則括髪及免與髽三者雖用麻布不同皆如著幓頭不别若然成服以後斬衰至緦麻皆冠如著幓頭婦人皆露紒而髽男子衰裳並見女子直名衰云凡服上曰衰下曰裳此但言衰不言裳婦人不殊裳者以其男子殊衣裳是以衰綴於衣衣統名為衰故衰裳並見案周禮内司服王后六服皆單言衣不言裳以連衣裳不别見裳則此喪服亦連裳於衣裳亦綴於衣而名衰故直名衰無裳之别稱也云衰如男子衰者婦人衰亦如下記所云凡衰外削幅以下之制如男子衰也云下如深衣者如深衣六幅破為十二闊頭鄉下狹頭鄉上縫齊倍要也云深衣則衰無帶下者案下記云衣帶下尺注云衣帶下尺者要也廣尺足以掩裳上際也今此裳既縫著衣不見裏衣故不湏要以掩裳上際故知無要也云又無祍者又案下記云祍二尺有五寸注云祍所以掩裳際也彼據男子陽多變故衣裳别制裳又前三幅後四幅開兩邊露􅂻衣是以須祍屬衣兩旁垂之以掩交際之處此既下如深衣縫之以合前後兩邊不開故不須祍以掩之也案深衣云續祍鉤邊注云續猶屬也祍在裳旁者也屬連之不殊裳前後也鉤邊如今曲据也彼吉服深衣須有曲􅅂之祍此婦人凶服之衰下連裳雖如深衣不得盡如深衣并有祍故鄭總云下無祍則非直無喪服之祍亦無吉服深衣之祍也吉笄有象有玉喪中唯有箭有榛釋曰云箭笄長尺吉笄尺二寸者此斬之笄用箭下記云女子子適人為父母婦為舅姑用惡笄鄭以為榛木為笄則檀弓南宫縚之妻之姑之喪云蓋榛以為笄是也吉時大夫士與妻用象天子諸侯之后夫人用玉為笄今於喪中唯有此箭笄及榛二者若言寸數亦不過此二等以其斬衰尺吉笄尺二寸檀弓南宫縚之妻為姑榛以為笄亦云一尺則大功以下不得更容差降鄭注小記云笄所以卷髪既直同卷髪故五服略為一節皆用一尺而已是以女子子為父母既用榛笄卒哭之後折吉笄之首歸於夫家以榛笄之外無可差降故用吉笄也若然總不言吉而笄言者以其喪中有用吉笄之法故小記無折笄之法當記文故小記折吉笄之首是也總用布六升與男子冠同首飾云總六升者首飾象冠數也上云男子冠六升此女子子總用布當男子冠用布之處故同六升以同首飾故也十五升首飾尊故吉服之冕三十升亦倍於朝服十五升也云長六寸謂出紒後所垂為飾也鄭知者若據其束本人所不見何寸數之有乎故鄭以六寸據垂之者此斬衰六寸南宫縚妻為姑總八寸以下雖無文大功當與齊同八寸緦麻小功同一尺吉總當尺二寸與笄同也喪冠倍衰之升吉服冕亦倍朝服女為父服齊衰後被出更服斬子嫁反在父之室為父三年云反在父之室者以其出時父已死初服齊衰不與在室同既服齊衰後反被出更服斬衰即與在室同故須言在室也言三年者亦有事須言以其初死服朞服死後被出向父家更服斬衰三年與上在室者同凡女行於大夫已上曰嫁士庶曰適人云凡女行於大夫已上曰嫁行於士庶人者曰適人案齊衰三月章云女子子嫁者未嫁者為曽祖父母傳曰嫁者嫁於大夫未嫁者成人而未嫁者是行於大夫曰嫁不杖章云女子子適人者為其父母昆弟之為父後者傳雖不觧喪本文是士故知行于士庶人曰適人庶人謂庶人在官者府史胥徒名曰庶人至於民庶亦同行士禮以禮窮則同之行大夫以上曰嫁若天子之女嫁於諸侯諸侯之女嫁于大夫出嫁為夫斬仍為父母不降之者以其外宗内宗及與諸侯為兄弟者為君皆斬明知女雖出嫁反為君不降若然下傳云婦人不二斬猶曰不二天今若為夫斬又為父斬則是二天與傳違者彼不二天者以婦人有三從之義無自專之道欲使一心於其天此乃尊君冝斬不可以輕服服之不得以彼决此若然外宗内宗與諸侯為兄弟服斬者豈不為夫服斬乎明為君斬為夫亦斬矣公士大夫者謂公卿大夫公士大夫之衆臣為其君布帶繩屨云士卿士也者以其在公之下大夫之上尊卑當卿之位故知是卿士也不言公卿言士者欲見公無正職大夫又承副於卿士之言事卿有職事之重故變言士諸侯有公卿謂大國立孤一人云公卿大夫厭於天子諸侯故降其衆臣布帶繩屨者鄭公卿大夫天子諸侯並言之者欲見天子諸侯下皆有公卿大夫公卿大夫下皆有貴臣衆臣若然天子諸侯下公卿大夫周禮典命及大宰具有其文此諸侯下公卿典命大國立孤一人是也以其諸侯無公故以孤為公卿燕禮云若有諸公則先卿獻之鄭注云諸公者大國之孤也孤一人言諸者容牧有三監是以其孤為公室老與士為貴臣其餘皆衆臣傳曰公卿大夫室老士貴臣云云君謂有地者也釋曰云室老士貴臣其餘皆衆臣也者傳以經直云衆臣不分别上下貴賤故云室老士二者是貴臣其餘皆衆臣也云有地者衆臣杖不以即位欲見公卿大夫或有地或無地衆臣為之皆有杖但無地公卿大夫其君卑衆臣為之皆得以杖與嗣君同即阼階下朝夕哭位若有地公卿大夫其君尊衆臣雖杖不得與嗣君同即阼階下朝夕哭位下君故也有地卿大夫有邑宰家相無地直有家相云室老家相也者左氏傳云臧氏老論語云趙魏老是家臣稱老云家相者案曲禮云大夫不名家相長妾以大夫稱家是室老相家事者也云士邑宰也者雜記云大夫居廬士居堊室鄭注云士居堊室亦謂邑宰也與此同皆謂邑宰為士也若然孤卿大夫有采邑者其邑既有邑宰又有家相若魯三卿公山弗擾為季氏費宰子羔為孟氏之郕宰之類皆為邑宰也陽貨冉有子路之等為季氏家相亦名家宰若無地卿大夫則無邑宰直有家宰則孔子為魯大夫而原思為之宰是直有家相者也此等諸侯之臣而有貴臣衆臣之事案周禮載師云家邑任稍地小都任縣地大都任畺地是天子公卿大夫有采地者也案鄭志答云天子之卿其地見賜乃有何由諸侯之臣正有此地則天子下有無地者也有采地者有邑宰復有家相無地者直有家相可知畿内諸侯不世爵此經乃有嗣君云君嗣君也者釋傳云君服但其君已死矣更有君為死君之服故知是嗣君若然案王制畿内諸侯不世爵而世禄彼則天子公卿大夫未爵命得有嗣君者以世禄降未得爵亦得為嗣君況其中兼畿外諸侯下卿大夫也且詩云維周之士不顯亦世左氏傳云官有世功則有官族皆是臣有世功子孫得襲爵故雖畿内公卿大夫有嗣君周屨後謂菲漢時謂不借云繩菲今時不借也者周時人謂之屨子夏時人謂之菲漢時謂之不借者此凶荼屨不得從人借亦不得借人儀禮要義卷二十九
