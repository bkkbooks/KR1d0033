body:
  text: 儀禮要義卷三十五宋魏了翁撰士䘮禮一士䘮禮自始死至卜葬日士䘮禮第十二鄭目録云士䘮其父母自始死至於既殯之禮是以下殯後論朔奠筮宅井槨卜𦵏日之事也有天子士公侯伯之士子男之士天子諸侯之下皆有士此當諸侯之士知者下云君若有賜不言王又䘮大記云君沐粱大夫沐稷士沐粱鄭云士䘮禮沐稻此云士沐粱葢天子之士也又大歛陳衣與䘮大記不同鄭亦云彼天子之士此諸侯之士以此言之此篇諸侯之士可知但公侯伯之士一命子男之士不命一命與不命皆分為三等各有上中下及行䘮禮其節同但銘旌有異故下云為銘各以其物亡則以緇長半幅物謂公侯伯之士一命已上生時得建旌旗亡謂子男之士生時無旌旗之物者唯此為異適室適寢皆正側室燕寢非正士死于適室幠用歛衾釋曰自此盡帷堂論始死招魂綴足設奠帷堂之事云適室正寢之室也者若對天子諸侯謂之路寢卿大夫士謂之適室亦謂之適寢故下記云士處適寢總而言之皆謂之正寢是以荘三十二年秋八月公薨于路寢公羊傳云路寢者何正寢也糓梁傳亦云路寢正寢也言正寢者對燕寢與側室非正案䘮大記云君夫人卒於路寢大夫世婦卒於適寢内子未命則死於下室遷尸於寢士之妻皆死於寢鄭注云言死者必皆於正處也以此言之妻皆與夫同處若然天子崩亦於路寢是以顧命成王崩延康王於翼室翼室則路寢也若非正寢則失其所是以僖公二十三年冬十二月公薨于小寢左氏傳云即安也疾者齊故于正寢疾時北牖下云疾者齊故於正寢焉疾時處北牖下死而遷之南牖下有牀衽者此並取下記文鄭彼注云正情性也衽是卧席故彼云下莞上簟設枕焉云幠覆也歛衾大歛所并用之衾者經直云衾不辨大小鄭知非小歛衾是大歛衾者案䘮大記君大夫士皆小歛一衾大歛二衾今始死用大歛一衾以覆尸及至大歛之時兩衾俱用一衾承薦於下一衾以覆尸故云大歛所并用之衾引䘮大記者欲見加歛衾以覆尸以去死衣鄭彼注云去死衣病時所加新衣及復衣也去之以俟沐浴是也有司招魂復魄必朝服事死如生復者一人以爵弁服簮裳於衣左何之扱領于帯釋云復者有司者案䘮大記復者小臣則士家不得同僚為之則有司府史之等也不言所著衣服者案䘮大記小臣朝服下記亦云復者朝服則尊卑皆朝服可知必著朝服者鄭注䘮大記云朝服而復所以事君之衣也復者庻其生氣復既不蘇方始為死事耳愚謂朝服平生所服冀精神識之而來反衣以其事死如事生故復者皆朝服也若然天子崩復者皮弁服也云招魂復魄也者出入之氣謂之魂耳目聰明謂之魄神去離於魄今欲招取魂來復歸於魄始廟曰大廟髙祖以下小廟小寢天官夏采職云大䘮以冕服復於大祖以乗車建綏復於四郊鄭注云求之王平生常所有事之處乗車玉路於大廟以冕服不出宫也又夏官祭僕職云大䘮復于小廟鄭注云小廟髙祖已下也始祖曰大廟又𨽻僕云大䘮復于小寢鄭注云小寢髙祖已下廟之寢也始祖曰大寢此不言𨽻僕以其𨽻僕與祭僕同僕官之屬中兼之案檀弓君復於小寢大寢小祖大祖庫門四郊鄭注云尊者求之備也亦他日所嘗有事是諸侯復法言庫門據魯作說若凡平諸侯則臯門舉外門而言三門俱復則天子五門及四郊皆復不言者文不具卿大夫已下復自門以内廟及寢而已婦人無外事自王后已下所復處亦自門以内廟及寢而已云諸侯則小臣為之者䘮大記文也復諸侯以褒衣冕服士用助祭服案雜記云士弁而祭於公冠而祭於已是士服爵弁助祭於君𤣥冠自祭於家廟士復用助祭之服則謂諸侯以下皆用助祭之服可知故雜記云復諸侯以褒衣冕服爵弁服鄭注云復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲見加賜之衣也褒猶進也則衮冕之類云爵弁服謂以冠名服用服不用弁云禮以冠名服者案士冠禮皮弁爵弁並列於階下執之而空陳服於房云皮弁服爵弁服是以冠名服鄭言此者欲見復時唯用緇衣纁裳不用爵弁而經言爵弁服是禮以冠名服也云簪連也者若常時衣服衣裳各别今此招魂取其便故連裳於衣復者降自後西榮不由前降嫌虛反復者降自後西榮注云不由前降云云釋曰云不由前降不以虚反也者凡復者縁孝子之心望得魂氣復反復而不蘇則是虛反今降自後是不欲虚反也云降因徹西北厞者案此文及䘮大記皆言降自西北榮皆不言徹厞鄭云徹厞者案䘮大記将沐甸人為垼于西牆下陶人出重鬲管人受沐乃煑之甸人取所徹廟之西北厞薪而㸑之諸文更不見徹厞薪之文故知復者降時徹之故鄭云降因徹西北厞也西北名為厞者案特牲尸謖之後改饌於西北隅以為陽厭而云厞用筵鄭云厞隠也故以西北隅為厞也必徹毁之者鄭云若云此室凶不可居然綴足用燕几校在南案記云綴足用燕几校在南御者坐持之鄭注云校脛也尸南首几脛在南以拘足則不得辟戾矣以此言之几之兩頭皆有兩足今竪用之一頭以夾兩足恐几傾倒故使御者坐持之案䘮大記小臣楔齒用角柶綴足用燕几君大夫士一也又案周禮天官玉府大䘮共含玉復衣裳角枕角柶則自天子已下至於士其禮同言燕几者燕安也當在燕寢之内常馮之以安體也始死之奠以餘閣設奠以依神奠脯至尸東釋曰案檀弓曾子云始死之奠其餘閣也與鄭注云不容改新也則此奠是閣之餘食為之案下小歛一豆一籩大歛兩豆兩籩此始死俱言亦無過一豆一籩而已下記云若醴若酒鄭注云或卒無醴用新酒小歛醴酒俱有注鬼神無象設奠以馮依之李釋曰不立尸奠置之而已父兄命赴者士則主人親命之此及下經論使人告君之事云臣君之股肱耳目死當有恩是以下有弔及贈禭之事也案檀弓云父兄命赴者鄭注云謂大夫以上也士主人親命之凡哭位有尊坐卑立有尊卑皆立入坐於牀東衆主人在其後西靣婦人俠牀東靣釋曰自此盡北靣論主人以下哭位之事云入坐者謂上文主人拜賓訖入坐于牀東衆主人直言在其後不言坐則立可知婦人雖不言坐案䘮大記婦人皆坐無立法言俠牀者男子牀東婦人牀西以近而言也案䘮大記士之䘮主人父兄子姓皆坐于東方主婦姑姊妹子姓皆坐于西方此義恐錯此經有不命士䘮大記無不命士又與大記文不同釋亦不合子姓皆坐于西方注云士賤同宗尊卑皆坐此除主人之外不坐者此據命士彼據不命之士知者案䘮大記云大夫之䘮主人坐于東方主婦坐于西方其有命夫命婦則坐無則皆立是大夫䘮尊者坐卑者立哭位親者在室謂大功以上親者在室釋曰知親者謂大功以上者以大功以上有同財之義相親昵之理下有衆婦人戸外據小功以下䟽者衆兄弟謂小功以下衆婦人戸外北靣衆兄弟堂下北靣釋曰案䘮服記云兄弟皆在他邦加一等傳曰小功以下為兄弟𤣥謂於此發兄弟者嫌大功以上又加也大功以上若皆在他國則親自親矣是大功以上為親者則上文是也是以知此婦人在戸外是小功以下可知若然同是小功以下而男子在堂下者以其婦人有事自堂及房不合在下故男子在堂下婦人戸外堂上耳君使人弔禭使士若天子則不以爵各以官君使人弔徹帷主人迎於寢門外見賓不哭先入門右北靣釋曰自此盡不辭入論君使人弔禭之事鄭知禮使人必以其爵者案聘禮使人歸饔餼及致禮皆各以其爵此君使人弔朝士明亦以其爵使士可知此儀禮見諸侯弔法若天子則不以其爵各以其官是以周禮大僕職云掌三公孤卿之弔勞鄭云王使往又小臣職云掌士大夫之弔勞又御僕職掌群吏之弔勞又案宰夫職云凡邦之弔事掌其戒令與幣器注弔事弔諸侯是其皆以官不以爵也大夫士唯兩門此寢門謂内門云寢門内門也者以其大夫士唯有兩門有寢門者以其下云主人拜送于外門外故知此寢門内門也㧁之謂褰而上事畢則下之徹帷㧁之事畢則下之云徹帷㧁之者謂褰帷而上非謂全徹去知事畢則下之者案下君使人禭徹帷明此事畢下之可知君命弔大夫之子升堂受命士子堂下弔者入升自西階東靣主人進中庭弔者致命釋曰上云主人迎於寢門外此云弔者入謂入寢門以其死在適寢云主人不升賤也者對大夫之䘮其子得升堂受命知者案䘮大記大夫於君命迎于寢門外使者升堂致命主人拜於下言拜於下明受命之時得升堂必知大夫之子得升堂受命者案䘮大記云大夫之䘮将大歛君至主人迎先入門右君即位于序端主人房外南靣卒歛宰告主人降北靣於堂下君撫之主人拜稽顙鄭注云大夫之子尊得升視歛下文又云士之䘮将大歛君不在其餘禮猶大夫也以君常視士殯故言君不在稽顙觸地無容哭踊三者三云稽顙頭觸地者案禮記檀弓云稽顙而后拜頎乎其至也為稽首之拜但觸地無容即名稽顙云成踊三者三案曾子問君薨世子生三日告殯云衆主人卿大夫士哭踊三者三凡九踊也䘮服小記為父母長子稽顙大夫弔之雖緦必稽顙者三衣被曰禭小歛主人先自盡云衣被曰禭者案左傳隠元年秋七月天王使宰咺來歸惠公仲子之􅈖糓梁傳曰乗馬曰􅈖衣衾曰禭貝玉曰含錢財曰賻是也云致命曰君使某禭者亦約雜記文此君禭雖在襲前主人襲與小歛俱不得用君禭大歛乃用之知者案䘮大記云君無禭大夫士畢主人之祭服親戚之衣受之不以即陳注云無禭者不陳不以歛謂不用之為小歛至大歛乃用之故下文大歛之節云君禭不倒注云至此乃用君禭主人先自盡是也凡弔禭來唯君命出謂始死時云禭者入衣尸出者案既夕記禭者委衣于牀不坐衆禭者委於牀上不坐則此禭者左執領右執要以衣尸亦不坐云唯君命出者欲見孤卿大夫士雖有弔禭来皆不出故云唯著異也云遂拜賓者因事曰遂以因有君命故拜賓若無君命則不出戶大功兄弟弔禭謂異門齊衰親者禭不将命以即陳釋曰自此盡適房論大功兄弟及朋友弔禭之事云大功以上謂并異門齊衰故云以上云即陳陳在房中者下云如禭以適房庶兄弟禭謂小功緦麻親庶兄弟禭使人以將命于室主人拜于位委衣于尸東牀上釋知庻兄弟即衆兄弟者見上文云親者在室又云衆兄弟堂下北靣注云是小功以下又云親者禭此云庶兄弟禭者以文次而言故知庶兄弟即衆兄弟也云變衆言庶容同姓耳者以同姓絶服者有禭法云将命曰某使某禭者某謂庶兄弟名使某禭者名但庶兄弟是小功緦麻之親在堂下使有司歸家取服致命於主人若同姓容不在始來弔禭也云拜于位室中位也者以其非君命不出銘旌名以其物同用雜帛杠長短異為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末云云釋曰自此至西階上論書死者銘旌之事此士䘮禮記公侯伯之士一命亦記子男之士不命故此銘旌總見之也云為銘各以其物者案周禮司常大夫士同建雜帛為物今云各以其物而不同者雜帛之物雖同其旌旗之杠長短則異故禮緯云天子之旗九刅諸侯七刅大夫五刅士三刅但死以尺易刅故下云竹杠長三尺云以死者至録之矣者鄭注檀弓云謂重與奠此引證銘旌者鄭君兩解之以彼兼有重與奠亦是録死者之義此銘旌是録死者之名故兩注不同案周禮小祝云設熬置銘杜子春引檀弓曰銘明旌也以死者為不可别故以其旗識之愛之斯録之矣子春亦為此解云無旌不命之士者謂子男之士也復與名男子稱名婦人書姓與伯仲凡書銘之法案䘮服小記云復與書銘自天子逹於士其辭一也男子稱名婦人書姓與伯仲鄭注云此謂殷禮也殷質不重名復則臣得名君周之禮天子崩復曰臯天子復諸侯薨復曰臯某甫復其餘及書銘則同以此而言除天子諸侯之外其復男子皆稱姓名是以此云某氏某之柩云在棺為柩者下曲禮文以其銘旌表柩不表屍銘杠立宇下待為重卒塗置於肂竹杠長三尺置于宇西階上注杠銘橦也宇梠也案此始造銘訖且置於宇下西階上待為重訖以此銘置於重又下文卒塗始置於肂若然此時未用權置於此及於重也云宇梠也者案爾雅釋宫云檐謂之樀郭云屋梠謂當檐下甸人掘坎以埋棄潘為垼以煑潘甸人掘坎于階間少西為垼于西牆下東鄉釋曰自此盡西階下論掘坎為垼饌陳沐浴之具此坎不論淺深及所盛之物案既夕記云掘坎南順廣尺輪二尺深三尺南其壤下文沐浴餘潘及巾柶等棄埋之於此坎也云甸人有司主田野者士無臣所行事皆是有司屬吏之等言主田野者案周禮甸師其徒三百人掌帥其屬而耕耨王籍是掌田野士雖無此官亦有掌田野之人謂之甸人云垼塊竈者案既夕記云垼用塊是以塊為竈名為垼用之以煑沐浴者之潘水盆盛水槃盛渜濯瓶管人以汲水新盆槃瓶廢敦重鬲皆濯造于西階下釋曰云盆以盛水者案下文祝淅米時所用槃以盛渜濯者謂置於尸牀下時餘潘水名為渜濯知以此槃盛者下文别云士有冰用夷槃彼是寒尸之槃故知此承渜濯云瓶以汲水也者下文管人汲用此瓶也廢敦廢爵皆以無足得名廢敦敦無足者若有足直名敦故下文徹朔奠云敦啟㑹靣足注云靣足執之令足間鄉前也是其有足直名敦凡物無足稱廢是以士虞禮云主人洗廢爵主婦洗足爵廢爵注云爵無足是也云所以盛米也者以下文而知重鬲先用煑沐潘将以縣重云重鬲鬲将縣重者也下文鬻餘飯乃縣於重此時先用煑沐潘故云将縣重者也以其事未至故言将也陳襲事於房内戸東西領南上陳襲事于房中西領南上不綪注綪讀為䋫釋曰自此至繼陳不用論陳襲所用之事云襲事謂衣服也者此先陳之至下文啇祝襲時乃用之但用者三稱而已其中庶禭之等雖不用亦陳之以多為貴案下小歛大歛先陳先用後陳後用依次第而陳此襲事以其初死先成先陳後成後陳䘮事遽備之而已故不依次也云襲事少上陳而下不屈者所陳之法房戸之内於戸東西領南上以衣裳少從南至北則盡不須䋫屈知戸東陳之者取之便故也江沔之間以縈收繩索為䋫引之證取䋫為屈明衣裳用帷幕之布親身為圭潔明衣裳用布釋曰案下記云明衣裳用幕布注云幕布帷幕之布則此布用帷幕之布但升數未聞知親身者下浴訖先設明衣故知親身也云為圭潔也者以其言明安髪之笄男女俱有冠笄唯男子鬠笄用桑長四寸纋中釋曰以髻為鬠義取以髪㑹聚之意凡笄有二種一是安髪之笄男子婦人俱有即此笄是也一是為冠笄皮弁笄爵弁笄唯男子有而婦人無也此二笄皆長不唯四寸而已今此笄四寸者僅取入髻而已以其男子不冠冠則笄長矣此注及下注知死者不冠者下記云其母之䘮鬠無笄注云無笄猶丈夫之不冠也以此言之生時男子冠婦人笄今死婦人不笄則知男子亦不冠也家語云孔子之䘮襲而冠者家語王肅之増改不可依用也云纋笄之中央以安髪者兩頭闊中央狹則於髪安纋中謂狹其中央大夫以上鑿巾以飯有殷奠布巾環幅不鑿釋曰此為飯含而設所以覆死者靣云廣袤等不鑿者士之子親含反其巾而已者下經云主人左扱米實于右三實一貝左中亦如之是士之子親含此經云不鑿明反其巾而已也又知大夫以上賓為之含當口鑿之嫌有惡者案雜記云鑿巾以飯公羊賈為之也鄭云記士失禮所由始不鑿則大夫已上鑿謂若士月半不殷奠則大夫以上月半殷奠可知以其大夫以上有臣臣為賓賓飯含嫌有惡故鑿之也練帛為掩謂褁首若唐時幞頭掩練帛廣終幅長五尺析其末案掩若今人幞頭但死者以後二脚於頥下結之與生人為異也此陳之耳若設之案下經云啇祝掩瑱設幎目注云掩者先結頥下既瑱幎目乃還結項注褁首也為将結於頥下又還結於項中生時瑱以黄素玉象死用白纊瑱用白纊注瑱充耳纊新緜釋曰案下記云瑱塞耳詩云充耳充即塞也生時人君用玉臣用象又著詩云充耳以素充耳以黄之等注云所以懸瑱則生時以黄以素又以玉象等為之示不聽讒今死者直用纊塞耳而已豫州貢絲纊故知新緜對緼舊絮幎目鄭讀為縈緇表䞓裏以覆靣幎目用緇方尺二寸䞓裏著組繫注覆靣者也案鄭讀從葛藟縈之縈者以其葛藟縈于樹木此靣衣亦縈於靣目故讀從之也云組繫為可結者以四角有繫於後結之握手謂在手之衣握手用𤣥纁裏長尺二寸廣五寸牢中旁寸著組繫案名此衣為握以其在手故言握手不謂以手握之為握手云牢讀為樓樓謂削約握之中央以安手也者義取縷歛挾少之意云削約者謂削之使約少也決以闓弦生者朱極三死用纊二決用正王棘若檡棘組繫纊極二云挾弓以横執弦者方持弓矢曰挾未射時已然至射時還依此法以闓弦云生者以朱韋為之而三者大射所云朱極三者是也彼但為君設文引證此士禮則尊卑生時俱三皆用朱韋死者尊卑同二用纊也冐如直囊以韜尸緇質䞓殺冐緇質長與手齊䞓殺掩足云制如直囊者下經云設冐櫜之故云如直囊云上曰質下曰殺質正也者案此經以冐為總目下别云質與殺自相對則知上曰質質正者以其在上故以正為名引䘮大記君與大夫士皆以冐對殺不云質則冐既總名亦得對殺為在上之稱皆云綴旁者以其冐無帯又無鈕一定不動故知旁綴質與殺相接之處使相連尊卑降殺而已云其用之先以殺韜足而上後以質韜首而下齊手者凡人著服先下後上又質長與手齊殺長三尺人有短者質下覆殺故後韜質也皮弁服取以冠名服見死者不冠皮弁服釋曰云皮弁所衣之服也者亦見死者不冠不用皮弁今直取以冠名服是皮弁所衣著之服也知其服白布衣素裳者士冠禮注衣與冠同色裳與屨同色以皮弁白而白屨故士冠禮云素積白屨是也雜記云朝服十五升則皮弁天子朝服與諸侯朝服同十五升布也冠有三服士襲亦三服而同裳褖衣是黑衣裳者此褖衣則𤣥端知者以其士冠禮陳三服𤣥端皮弁爵弁有𤣥端無褖衣此士䘮襲亦陳三服與彼同此無𤣥端有褖衣故知此褖衣則𤣥端者也𤣥端有三等裳此䘮禮質略同𤣥裳而已但此𤣥端連衣裳似婦人褖衣故變名褖衣也若然連衣裳者以其用之以表袍袍連衣裳故也是以雜記云子羔之襲也繭衣裳與稅衣纁袡曾子曰不襲婦服彼曾子譏用纁袡不譏其稅衣是税衣以表袍故連衣裳而名褖衣引䘮大記者欲見褖衣以表袍之意若然雜記云繭衣大記云袍不同者玉藻云纊為繭緼為袍鄭云衣有著之異名也其實連衣裳一也襲三服同一緇帯生時各設帯緇帯注黒繒之帯釋曰上雖陳三服同用一帯者以其士唯有此一帯而已案玉藻云士練帯緇辟是黑繒之帯據禆者而言也但生時著服不重各設帯此襲時三服俱著共一帯為異也生時有韠有韎韐死則三服同韎韎韐注一命緼韍釋曰韎者據色而言以韎草染之取其赤韐者合韋而為之故名韎韐也云一命緼韍者玉藻文但祭服謂之韍他服謂之韠士一命名為韎韐亦名緼韍不得直名韍也但士冠禮𤣥端爵韠皮弁素韠爵弁服韎韐今亦三服共設韎韐者以其重服亦如帯矣笏之所用物不同士以竹本象竹笏注笏所以云云作忽釋曰云笏所以書思對命者亦玉藻文引玉藻者證天子以下笏之所用物不同又曰笏度二尺有六寸云云又曰天子搢珽云云今文作忽夏葛屨冬白屨變皮言白以互見夏葛屨冬白屨皆繶緇絇純組綦繫于踵案士冠禮云屨夏用葛冬用皮今此變言白者欲互見其義以夏言葛冬當用皮冬言白明夏亦用白又士冠禮云爵弁纁屨素積白屨𤣥端黑屨以三服各自用屨屨從裳色其色自明今死者重用其服屨唯一故須見色若然三服相參帯用𤣥端屨用皮弁韎韐用爵弁各用其一以當三服而已庶禭陳而不用陳貴多納貴少庻禭繼陳不用釋曰直云庶禭即上經親者禭庶兄弟禭朋友禭皆是故云庶禭云繼陳謂繼襲衣之下陳之云不用不用襲也者以其繼襲衣而言不用明不用襲至小歛則陳而用之唯君禭至大歛乃用也云多陳之為榮者庶禭皆陳之是也少納之為貴者襲時唯用三稱是也飯含用米貝珠玉之等貝三實于笲釋曰自此盡夷槃可也論陳飯含沐浴器物之事此云貝三下云稻米則士飯含用米貝故檀弓云飯用米貝亦據士禮也但士飯用米不言兼有珠玉大夫以上飯時兼用珠玉也雜記云天子飯九貝諸侯七大夫五士三鄭注云此蓋夏時禮也周禮天子飯含用玉案典瑞云大䘮共飯玉含玉雜記云含者執璧彼據諸侯而用璧唯大夫含無文哀十一年左氏傳云公㑹吳子伐齊陳子行命其徒具含玉示必死者春秋時非正法若趙簡子云不設屬稗之類文五年王使榮叔歸含且􅈖何休云天子以珠諸侯以玉大夫以璧士以貝春秋之制也引書傳食貨志見古者以貝為貨書傳云紂囚文王散宜生等於江淮之間取大貝如車渠以獻於紂遂放文王是貝水物出江水也又云古者以為貨者漢書食貨志云五貝為朋又云有大貝壯貝之等以為貨用是古者以為貨也注貝水物古者以為貨江水出焉巾於笲櫛於簞浴衣於篋沐巾一浴巾二皆用綌於笲櫛於簞浴衣於篋釋曰知浴衣已浴所衣之衣者下經云浴用巾挋用浴衣是既浴所著之衣用之以晞身明以布為之云如今通裁者以其無殺即布單衣漢時名為通裁序中半以南曰堂戸房外皆堂皆饌于西序下南上釋曰謂從序半以北陳之云東西牆謂之序者爾雅釋宫文云中以南謂之堂者謂於序中半以南乃得堂稱以其堂上行事非專一所若近戸即言戶東戸西若近房即言房外之東房外之西若近楹即言東楹西楹若近序即言東序下西序下若近階即言東階西階若自半以南無所繼屬者即以堂言之即下文淅米于堂是也其實户外房外皆是堂故論語云由也升堂矣未入於室是室外皆名堂也儀禮要義卷三十五
