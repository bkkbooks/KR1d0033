body:
  text: 儀禮要義卷二十宋魏了翁撰聘禮二王后勞賔有玉案竹簠此夫人惟簠盛􅀥栗夫人使下大夫勞以二竹簠方𤣥被纁裏有蓋釋曰自此盡以賔入論夫人勞賔之事夫人勞使下大夫者降于君故不使卿凡簋皆用木而圓受斗二升此則用竹而方故云如簋而方受斗二升則同如今寒具筥者寒具見籩人先鄭云朝事謂清朝未食先進寒具口實之籩實以冬食故謂之寒具筥圓此方者方圓不同為異也案玉人云案十有二寸􅀥栗十有二列諸侯純九大夫純五夫人以勞諸侯彼有玉案者謂王后法有玉案并有竹簠以盛􅀥栗故彼引此為證此諸侯夫人勞卿大夫故無案直有竹簠以盛􅀥栗故下文云其實􅀥蒸栗擇兼執之以進賔至外朝主人拚祧以俟至于朝主人曰不腆先君之祧既拚以俟矣釋曰自此盡俟間論賔初至主君請行聘禮賔又請俟間之事云至于朝者鄭云賔至外門者外門即諸侯之外朝故下云以柩造朝亦謂大門外為外朝也云下大夫入告出釋此辭者此下大夫即夫人勞賔導賔入者也云明至欲受之不敢稽賔案覲禮云侯氏遂從之天子賜舍鄭云且使即安不即言欲受之者彼天子以諸侯為臣故使且安此鄰國聘賔不臣人之臣故言不敢稽賔受聘享於太祖祧饗食於禰燕於寢云遷主所在曰祧者此總解天子諸侯稱祧也云周禮天子七廟文武為祧者案周禮大宗伯序官守祧職云奄八人鄭注云逺廟曰祧又守祧職云掌守先王先公之廟祧鄭注云廟謂大祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏于后稷之廟先王之遷主藏于文武之廟天子有二祧以藏遷主諸侯無二祧遷主藏于大祖廟故此名大祖廟為祧也云既拚者少儀云埽席前曰拚拚者埽除之名云諸侯五廟王制與祭法文云則祧始祖是亦廟也言祧者祧尊而廟親待賔客者上尊者下文迎賔於大門揖入及廟門受賔聘享皆在廟此云先君之祧明下云廟是大祖廟可知是以於大祖廟受聘享尊之若饗食則於禰廟燕又在寢彌相親也此鄭義若孔君王肅則以髙祖之父及祖為二祧凡稱致館者有幣覲禮稱賜舍無幣大夫帥至于館卿致館釋曰自此盡送再拜論主君遣卿致館之事至此館主人以上卿禮致之者案覲禮云侯氏遂從之天子賜舍辭曰賜伯父舍侯氏再拜稽首受儐之束帛乗馬注云王使人以命致館無禮猶儐之者尊王使也無禮謂無束帛此云以上卿禮明有束帛致亦可知若然有禮則稱致覲禮不稱致無禮故也案司儀云諸公相為賔主君郊勞云三辭拜受拜受謂拜受幣又云致館亦如之鄭云使大夫授之君又以禮親致焉亦是有幣可知又云諸侯諸伯諸子諸男之相為賔也各以其禮相待也如諸公之儀是五等相待致館同有幣矣天子待諸侯無幣則其臣来無幣可知據此文侯伯之卿聘郊勞致館有幣則五等待臣皆同有幣也司儀諸侯之臣相為國客亦皆有幣與此同若諸侯遣大夫小聘曰問下云小聘曰問不享有獻不及夫人不筵几不禮面不升不郊勞注云記貶於大聘所以為小也獻私獻也面猶覿也雖不言不致館略之耳亦不致也又諸臣朝覲天子天子無禮以致猶儐尊王使又五等自相朝主國皆有禮皆有儐故司儀云賔繼主君皆如主國之禮鄭𤣥謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭贈郊送之時也此等皆主君親致館又云致館亦如之亦如郊勞時亦有儐矣以此言諸臣致者皆有儐也若諸侯遣卿大夫聘王國有用幣致館無儐也故司儀云諸公之臣相為國客致館如初之儀鄭注云如郊勞也不儐耳賔在館如主人故迎卿先拜賔迎再拜卿致命賔再拜稽首卿退賔送再拜云賔迎再拜者賔在館如主人故先拜也卿不言答拜答拜可知但文略耳雖不言入言迎則入門可知言卿致命者亦東面致君命也云卿不俟設飱之畢以不用束帛致故也者下直云宰夫朝服設飱不言致則此卿致館兼致飱矣致館有束帛致飱空以辭致君命無束帛者案下記云飱不致鄭注云不以束帛致命草次饌飱具輕若然卿以空拜致飱既即退不待宰夫設畢也以不用束帛致故也又案司儀云君親致館至於致飱如致積之禮鄭注云俱使大夫禮同也以此言之致館致飱似别人者但致積在道致飱在館所致别人若致館與致飱同時致館者兼致飱無嫌也言俱使大夫者言積與飱同使大夫決君不親之義何妨致館與致飱一人也其臣致飱無幣其五等諸侯致飱則有幣案司儀諸侯相於致飱如致積致積有幣知致飱亦有幣也食不備禮曰飱讀如魚飱素飱宰夫朝服設飱釋曰云食不備禮曰飱者對饔餼也生與腥飪俱有餘物又多此飱唯有腥飪而無生餘物又少故云不備禮也引詩𫝊者案詩云彼君子兮不素飱兮毛云熟食曰飱鄭云讀如魚飱之飱則詩飱與𫝊魚飱同是直食魚與飯為飱彼少牢小禮中不備此則兩大牢大禮中不傋不傋是同故引證一邊不傋其實禮有異也春秋𫝊曰方食魚飱者案宣六年經書晉趙盾衛孫免侵陳公羊𫝊中庭之饌孰西腥東象春秋飪一牢在西鼎九羞鼎三腥一牢在東鼎七釋曰云中庭之饌也者對下文是堂上及門外之饌也云象春秋也者腥之言生象春物生飪熟也象秋物有成熟故云象春秋也云鼎西九東七者九謂正鼎九牛羊豕魚腊腸胃膚鮮魚鮮腊東七者腥鼎無鮮魚鮮腊故七云凡其鼎實與其陳如陳饔餼者如其死牢故掌客云諸侯之禮饔餼九牢七牢五牢其死牢如飱之陳凡介行人皆有飱饔餼此則如介禮也是飱之死牢與饔餼死牢實與飱陳同亦於東階西階也云羞鼎則陪鼎也知是一物者此云羞鼎下饔餼言陪鼎故知一也陪鼎三則下云膷臐膮是也堂夾所陳六八鄭唯言豆凡饌以豆為本堂上之饌八西夾六釋曰堂上與西夾所陳六八非一知六八是豆者凡設饌皆先設豆乃設餘饌故鄭云凡饌以豆為本無妨六八之内兼有餘饌故鄭言簋鉶之等也凡鄭所云皆約饔餼故云亦如饔饌也鄭必約與陳饔餼同者以其陳鼎饔餼同知餘亦同也注八六者豆數也堂上八豆八簋六鉶兩簠八壺云云米視生牢禾視死牢牢皆十車門外米禾皆三十車釋曰諸侯之禮車米視生牢禾視死牢牢皆十車者案掌客云上公之禮飱五牢饔餼九牢其死牢如飱之陳牽四牢車米視生牢牢十車車秉有五籔車禾視死牢牢十車侯伯飱四牢饔餼七牢其死牢如飱之陳牽二牢皆米視生牢牢十車禾視死牢牢十車是其義也云大夫之禮皆視死牢而已雖有生牢不取數焉者知然者見下歸饔餼五牢饔三牢餼二牢饔三牢死牢也門外米禾皆三十車與死三牢同不取餼二牢生之數知義然約少牢此五鼎此不數膚與祭異衆介皆少牢釋曰知亦飪者依上介知然知鼎五者以賔九上介七衆介當五降殺以兩又約少牢五鼎此亦少牢故知亦五鼎也知鼎實有羊豕魚腊與腸胃者以上介無鮮魚鮮腊此又無牛故從羊豕以下數之得五案少牢有膚此無者生人食與祭異故玉藻朔月少牢五俎亦云羊豕魚腊腸胃不數膚也此大聘是卿使下大夫厥明訝賔于館釋曰自此盡每曲揖論将行聘禮主君迎賔向廟之事云此訝下大夫也者案周禮有掌訝中士八人為之此訝下大夫非彼掌訝也案下記云卿大夫訝大夫士訝士皆有訝又周禮掌訝云凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝此大聘是卿故使下大夫訝也天子諸侯雖有掌訝之官朝聘之賔不使掌訝為訝直以尊卑節級為訝故云此訝下大夫也言以君命迎者凡舉事皆以承君命故知迎賔待君命也云亦皮弁者下文君及賔皮弁朝聘主相尊敬故皮弁服賔皮弁聘至于朝賔入于次釋曰云服皮弁者朝聘主相尊敬也者周禮大行人諸侯朝天子各服冕服廟中将幣三享覲禮亦云侯氏禆冕在廟覲天子此諸侯待四方朝聘皆皮弁者入天子廟得申其上服入巳廟不可以冕服又不可服常朝之服故服天子之朝服諸侯以為視朔之服在廟待朝聘之賔是相尊敬故也知此皮弁是諸侯視朔服者以其玉藻云諸侯皮弁以聽朔於大廟是也云次在大門外之西以帷為之者下記云宗人授次次以帷少退于君之次以賔位在西陳幣有幕在主國廟門外乃陳幣釋曰有司入于主國廟門外者案下文行聘時幣在主國廟門外知在此也知有幕者以言陳幣如展幣明亦布幕陳幣也云圭璋賈人執櫝而俟者案下文云賈人東面坐啟櫝取圭鄭注賈人鄉入陳幣東面俟此經擯者之數鄭以意解之卿為至請事注擯謂至無擯釋曰此擯陳在主國大門外主君之擯與賔之介東西相對南北陳之云其位相承繼而出也者從門向南陳為繼而出云主君公也則擯者五人侯伯也則擯者四人子男也則擯者三人者案周禮大行人天子待諸侯云上公之禮擯者五人侯伯之禮擯者四人子男則擯者三人今以諸侯待聘賔用天子待己之擯數者以諸侯自相待無文鄭以意解之但天子尊得分辨諸侯尊卑以行之諸侯卑降天子不敢分辨前人故據己國大小而為擯數且春秋又有大國朝焉小國聘焉又有卿出並聘之事則小國有朝大國法無大國下朝小國之禮若相聘問大小皆得若然待其臣據此文與待君等天子待諸侯之臣亦宜與君同也又案周禮大宗伯為上擯小行人為承擯覲禮嗇夫為末擯若待子男三人足矣若侯伯少一人待上公少二人一人二人皆以士充數於所尊不敢質故設儐介通情引聘義者案彼鄭注質謂正自相當故設擯介通情乃相見是敬之至引之者證須擯介之意也云既知其所為来之事者在道已遣士請事大夫問行郊勞致館之等是足知来事矣云復請之者賔来當與主君為禮為其謙不敢斥尊者啟發以進之者亦解所以立擯介通情及進相見之義也云於是時賔出次直闑西北面者案玉藻云君入門介拂闑大夫中棖與闑之間士介拂棖此謂朝君又云賔入不中門此謂聘賔云不中門則此闑西北面者若然聘賔入門還依作介入時同亦拂闑也云上擯在闑東閾外西面者主位在東故賓在闑西上擯在闑東以擯位並門東西面故上擯亦西面向君諸侯之卿其禮各下其君二等云其相去也公之使者七十歩侯伯之使者五十步子男之使者三十步者此依大行人云諸侯之卿其禮各下其君二等鄭注云所下者介與賔主之間是以步數與介數亦降二等天子諸侯交擯在大門外未迎賓時注天子諸侯朝覲乃命介紹𫝊命耳其儀各鄉本受命云云自此以下論天子諸侯交擯法云紹者亦謂使介相紹繼以𫝊命𫝊命即擯介相傳賓主之命也此交擯謂在大門外初未迎賓時案曲禮注春夏受摯於朝受享於廟秋冬一受之於廟覲禮天子不下堂而見諸侯則秋冬受贄受享皆無迎法無迎法則無此交擯之義若春夏受贄於朝無迎法受享於廟則迎之故大行人云廟中将幣三享鄭注朝先享不言朝者朝正禮不嫌有等也是正朝無迎法若然覲禮無迎法此云朝覲彼言覲者覲雖無迎法饗食則有迎法故齊僕云朝覲宗遇饗食皆乗金路其法儀各以其等為車送逆之節故連覲也門容二轍參个謂五門各容二丈四云門容二轍參个者冬官匠人云天子五門匠人直計應門直舉應門則臯庫雉亦同云二轍參个者轍廣八尺參个三八二十四門容二丈四云傍加各一步也者此無正文但人之進退周旋不過再舉足一步故門傍各空一步丈二添二丈四尺為三丈六尺注此朝去三丈六尺者旁加各一步也云云公迎賔不出大門降其君一等公皮弁迎賓于大門内大夫納賓釋曰云公不出大門降于待其君也者案司儀諸公相為賔公皮弁交擯車迎拜辱出大門此於門内是降於待其君也云從大夫總無所别也者春秋之義卿稱大夫王制云上大夫卿是總無别也云於是賔主人皆禓者案玉藻云不文飾也不禓又云執龜玉襲下文行聘時執玉賔主人皆襲此時未執玉正是文飾之時明賓主人皆禓也廟皆别門有南北隔牆故每門有曲公揖入每門每曲揖釋曰諸侯三門臯應路則應門為中門左宗廟右社稷入大門東行即至廟門其間得有每門者諸侯有五廟大祖之廟居中二昭居東二穆居西廟皆别門門外兩邊皆有南北隔牆隔牆中夾通門若然祖廟已西隔牆有三則閤門亦有三東行經三門乃至大祖廟門中則相逼入門則相逺是以每門皆有曲有曲即相揖故每曲揖也是以司儀亦云每門止一相亦據閤門而言凡入廟寢門賔必後君云凡君與賓入門賓必後君者以賓主不敵是以玉藻云於異國之君稱外臣某故知聘賔後於主國君也言凡者非直聘享向祖廟若饗食向禰廟燕禮向路寢皆當後於主君故言凡以廣之賔入拂闑不中門賔之介主之擯鴈行玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖鄭注云此謂兩君相見也君入必中門上介夾闑大夫介士介鴈行於後示不相㳂也君若迎聘客擯者亦然又云賔入不中門不履閾鄭注云辟尊者所從也此經謂聘客鄭君并引朝君欲見卿大夫聘来還與從君為介時入門同故并引之也云君入門介拂闑又云門中門之正又云卑不踰尊者之迹若然聊為一闑言之君最近闑亦拂之而過上介則隨君而行拂闑而過所以與君同行者臣自為一列主君既出迎賔主君與賔並入主君於東闑之内賔於西闑之内並行而入上介於西闑之外上擯於東闑之外皆拂闑次介次擯皆大夫中棖與闑之間末介末擯皆士各自拂棖如是得君入中門之正上擯上介俱得拂闑又得不踰尊者之迹矣又云賓入不中門者此謂聘賓大聘大夫故鄭卿大夫並言入門之時還依與君為介来入相似賓入還拂闑故上注賓自闑西擬入時拂闑西故也云門中門之正也者謂兩闑之間云卑不踰尊者之迹者士以大夫為尊大夫以上介為尊上介以君為尊也云賔之介猶主人之擯者欲見擯介鴈行不别也及廟門公揖先入省内事及廟門公揖入立于中庭釋曰自此盡公禓降立論行聘之事云公揖先入省内事也者曲禮云請入為席彼卿大夫士禮是以鄭注云雖君亦然省内事即請入為席之類也云如此得君行一臣行二於禮可矣者言得君行一臣行二者案下文三揖言之初揖注云将曲揖謂在内霤之間在主君先立無過近於内霤間若然去門既近去階又逺也以此不得君行一臣行二下文受玉于東楹之間彼得為君行一臣行二矣不見大夫士入廟君未入時已在位俟云公迎賓於大門内卿大夫以下入廟門即位而俟之者上初命拜迎賓于館之時卿大夫士固在朝矣及賓来大門外陳介之時主君之擯亦在大門外之位君在大門内時其卿大夫不以無事亂有事當於廟中在位矣必知義然當見行事之時公授宰玉又云士受皮又云宰夫授公几皆是於外無事在廟始有事更不見此官等命入廟之文明君未入廟時此官已在位而俟公食大夫以其官各具饌物皆有事不預入廟故公迎賓入後乃見卿大夫以下之位與此異也賓已與主君交禮立近塾以俟命賓立接西塾釋曰云門側之堂謂之塾者爾雅釋宫文云立近塾者已與主君交禮将有出命俟之於此者對在大門外時未與主君交禮直使擯傳命故去門七十步五十步三十步此将與君交禮故近門也云於此介在幣南北面西上者以上文入竟展幣時布幕賓西面介北面東上統於賓今此陳幣賓在門西北面明介北面西上統於賓也云上擯隨公入門東東上少進於士者案下几筵既設擯者出請命更不見上擯别入之文明隨公入可知也知門東有士者案公食云士立于門東北面西上鄭云統於門者非其正位也故知此亦然以擯者是卿又相君故知進於士在士前也大聘覲禮有几筵以廟受依神几筵既設擯者出請命釋曰云有几筵者以其廟受宜依神也者此對不在廟受不几筵故下云聘遭喪入竟則遂也不郊勞不几筵注云致命不於廟就尸柩於殯宫又不神之下小聘不几筵注云記貶於聘是以記云唯大聘有几筵覲禮不云几筵文不具也又案曲禮注春夏受摰於朝受享於廟秋冬一受之於廟諸侯無此法四時皆在於廟亦無四時朝覲之别名同皆曰朝賓至廟門設筵几與公食先設後迎云賓至廟門司宫乃于依前設之神尊不豫事也者此對公食宰夫設筵加席几而後迎賓彼食禮與此異天子諸侯設几筵皆在依前知在扆前者案司几筵云大朝覲大饗射王位依前南鄉設筵几覲禮亦云依前諸侯亦然爾雅釋宫云牖户之間謂之扆但天子以屏風設於扆諸侯無屏風為異席亦不同此常祭祀之席與周禮諸侯祀席異云周禮諸侯祭祀席蒲筵續純右彫几者周禮司几筵文彼諸侯祭祀席三重上更有加莞筵紛純不引之者文略可知引之者證此所設者設常祭祀之席也賓襲執圭以盛禮不盡飾以蔽敬賓襲執圭釋曰云執圭盛禮者玉藻云執玉龜襲注重寳瑞也若然云盛禮者以其圭瑞以行禮故為盛禮也云又盡飾為其相蔽敬也者玉藻又云君在則禓盡飾也注云臣於君所今聘賓於主君亦是臣於君所合禓以盡飾今既執圭以瑞為敬若又盡飾而禓則掩蔽玉之敬故不得禓也云服之襲也充美也者彼注云充猶覆也是故尸襲者為尸尊故去飾也不裼云執玉龜襲也者彼注云重寳瑞也以龜玉為寳瑞若禓則盡飾為蔽敬故引之證不裼也上擯出辭玉以圭贄之重者擯者入告出辭玉釋曰知擯是上擯者案上相禮者皆上擯故知此亦據上擯云圭贄之重者大宗伯云以玉作六瑞君之所執又云以禽作六贄臣之所執總而言之皆是贄故左氏傳云男贄不過玉帛禽鳥但君之所執為贄之重者也文公十二年左氏傳云秦伯使西乞術来聘襄仲辭玉賓對曰不腆敝器不足辭也彼主人無三辭者文不具亦當三辭也公先揖入此賓獨入而云三揖三揖釋曰前云公揖入立于中庭三分庭一在南賓後獨入得云入門將曲揖者謂公先在庭南面賓既入門至碑曲揖賓既曲北面賓又揖主君揖主君二者皆向賓揖之再揖訖亦主君東面向堂塗北行當碑乃得賓主相向而揖是以得君行一臣行二不必盡如晏子君行一臣行二之言公升二等釋曰諸侯階有七等公升二等在上仍有五等而得云君行一臣行二者但君行少臣行多大判而言非謂即君行一臣行二此文出齊語晏子辭凡公拜賓辟此不言辟將進授圭擯者進公當楣再拜注拜貺也賔三退負序釋曰案上文賓入門公再拜賓辟不答拜又下文云賓訝受几於筵前公一拜送賓以几辟皆言辟此不言辟故决之也案司儀云諸公之臣相為國客及将幣客登拜客三辟授幣注云客三辟三退負序也者彼諸公之臣相聘之禮與侯伯之卿聘於鄰國之禮少異故也公側襲受玉言獨為之見尊賓公側襲受玉于中堂與東楹之間注側猶獨也言側見其尊賓釋曰凡襲于隐者案士喪禮小歛主人袒于户内襲于序東喪禮遽於事尚襲於序東况吉事乎明知襲于隐者也云公序坫之間可也者士喪襲于序東謂於堂東地上此則公在堂上堂東南角為坫鄭以意斟酌隐處無過於序東坫北可也無正文故云可也云中堂南北之中也入堂深尊賓事也者凡廟之室堂皆五架棟南北皆有兩架棟北一架下有壁開户棟南一架謂之楣則楣北有二架楣南有一架今於當楣北面拜訖乃更前北侵半架於南北之中乃受玉故云南北之中乃入堂深尊賓事故也云東楹之間亦以君行一臣行二者兩楹之間為賓主處中今乃於東楹之間更侵東半間故云君行一臣行二也袒而有衣曰裼謂袒衿前上服見裼衣裼降立釋曰云裼者免上衣見裼衣者案玉藻云君衣狐白裘錦衣以裼之注云君衣狐白毛之裘則以素錦衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服與凡裼衣象裘色也若然凡服四時不同假令冬有裘襯身禈衫又有襦袴襦袴之上有裘裘上有裼衣裼衣之上又有上服皮弁祭服之等若夏則以絺綌絺綌之上則有中衣中衣之上復有上服皮弁祭服之等若春秋二時則衣袷褶袷褶之上加以中衣中衣之上加以上服也言見裼衣者謂袒衿前上服見裼衣也故玉藻云裘之裼也見美也襲者掩之故玉藻云襲充美是也云凡當盛禮者以充美為敬非盛禮者以見美為敬禮尚相變也者玉藻云執龜玉襲是禮之盛者充美為敬玉藻又云君在則裼盡飾也是非盛禮者以見美為敬據此二者是禮尚有相變也引玉藻者證禮不盛者以裼見美也諸侯與其臣視朔行聘裘裼有同者曰麛裘青豻褎絞衣以裼之引論語素衣麛裘又云皮弁時或素衣其裘同可知也鄭并引二文者欲見諸侯與其臣視朔與行聘禮皆服麛裘但君則麛裘還用麛褎臣則不敢純如君麛裘則青豻褎裼衣君臣亦有異時若在國視朔君臣同素衣為裼故鄉黨云素衣麛裘彼一篇是孔子行事鄭兼見君臣視朔之服是其君臣同用素裼可知若聘禮亦君臣同用麛裘但主君則用素衣為裼使臣則用絞衣為裼是以鄭總云皮弁或素衣其裘同可知也言或素衣者在國則君臣同素衣聘時主君亦素衣唯臣用絞衣為裼也案雜記云朝服十五升布皮弁亦天子朝服與諸侯朝服同用十五升布亦同素積以為裳白舄臣用白屨也云裘者為温表之為䙝者案月令云孟冬天子始裘是裘為温云表之者則裼衣是也裼衣象裘色復與上服色同也吉凶皆袒左惟受刑袒右云凡襢裼者左者吉凶皆袒左是也是以士喪禮主人左袒檀弓云吳季札左袒右還其封大射亦左袒若受刑則袒右故覲禮侯氏袒右受刑是也儀禮要義卷二十
