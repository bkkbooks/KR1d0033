body:
  text: 儀禮要義卷三十二宋魏了翁撰喪服經傳五為適婦大功降於長子加於庶婦適婦注適婦適子之妻釋曰疏於孫故次之其婦從夫而服其舅姑期其舅姑從子而服其婦大功降一等者也此傳問者以其適庶之子其妻等是婦而為庶婦小功特為適婦服大功故發問也答不一等服期者長子本為正體於上故加至三年婦直是適子之妻無正體之義故直加於庶婦一等大功而已姪對姑若對世叔唯言昆弟之子姪丈夫婦人報注為姪男女服同釋曰姪卑於昆弟故次之不言男子女子而言丈夫婦人者姑與姪在室出嫁同以姪女言婦人見嫁出因此謂姪男為丈夫亦見長大之稱是以鄭還以男女觧之云謂吾姑者吾謂之姪者名唯對姑生稱若對世叔唯得言昆弟之子不得姪名也為夫之祖父母世叔父母大功從夫而服夫之祖父母世父母叔父母釋曰以其義服故次在此記云為夫之兄弟降一等此皆夫之期故妻為之大功也問者恠無骨肉之親而重服大功故致問也答從服也從夫而服故大功也若然夫之祖父母世父母為此妻著何服也案下緦麻章云婦為夫之諸祖父母報鄭注謂夫所服小功者則此夫所服期不服報王肅以為父為衆子期妻小功為兄弟之子期其妻亦小功以其兄弟之子猶子引而進之進同己子眀妻同可知夫之昆弟何以無服已下總論兄弟之妻不為夫之兄弟服夫之兄弟不為兄弟妻服之事云其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也此二者尊卑之叙並依昭穆相為服即此經為夫之世叔父母服是也云謂弟之妻婦者是嫂亦可謂之母乎者此二者欲論不著服之事若著服則相親近于滛亂故不著服推而逺之兄弟之妻本無母婦之名塞亂原謂弟之妻為婦者卑逺之故謂之婦者使下同子妻則本無婦名云嫂猶叟也叟老人稱也者叟有兩號若孔注尚書西蜀叟叟是頑愚之惡稱若左氏傳云趙叟在後叟是老人之善名是以名為嫂云若已以母婦之服服兄弟之妻兄弟之妻以舅子之服服已則是亂昭穆之序也者此觧不得之意何者以弟妻為婦即以兄妻為母而以母服服兄妻又以婦服服弟妻又使妻以舅服服夫之兄又使兄妻以子服服已夫之弟則兄弟反為父子亂昭穆之次序故不得以兄妻為母者也故聖人深塞亂源使兄弟之妻本無母婦之名不相為服大宗子合族屬母婦燕族婦引大傳者云同姓從宗合族屬者謂大宗子同是正姓姬姜之類屬聚也合聚族人於宗子之家在堂上行食燕之禮即繫之以姓而弗别綴之以食而弗殊是也又云異姓主名治際㑹者主名謂母與婦之名治正也際接也以母婦正接之㑹聚則宗子之妻食燕族人之婦於房是也大夫為期服之為士降至大功大夫為世父母叔父母子昆弟昆弟之子為士者釋曰大夫為此八者大期今以為士故降至大功亦為重出此文故次在此也云子謂庶子者長子在斬章云公之庶昆弟謂父卒大夫庶子父在公之庶昆弟大夫之庶子為母妻昆弟釋曰云公之庶昆弟大夫之庶子者此二人各自為母妻為昆弟服大功此並受厭降卑於自降故次在自降人之下若云公子是父在今繼兄而言昆弟故知父卒也又公子父在為母妻在五服之外今服大功故知父卒也云大夫之庶子則父在也者以其繼父而言又大夫卒子為母妻得伸今得大功故知父在也云其或為母謂妾子也者以其為妻昆弟其禮並同又於適妻君大夫自不降其子皆得伸今在大功明妾子自為己母也大夫降庶子庶子亦厭而降昆弟母妻傳曰何以大功也先君餘尊之所厭不得過大功也大夫之庶子則從乎大夫而降也父之所不降子亦不敢降也注言從乎大夫而降則於父卒如國人也昆弟庶昆弟也舊讀云云釋曰以大夫尊少身在降一等身沒其庶子則得伸如國人也云昆弟庶昆弟也者若適則在父之所不降之中故知庶昆弟也云舊讀昆弟在下其於厭降之義冝䝉此傳也是以上而同之者言舊讀謂鄭君已前馬融之等以昆弟二字抽之在傳下今皆易之在上鄭檢經義昆弟乃是公之庶昆弟大夫之庶子所為者父以尊降庶子則庶子亦厭而為昆弟大功是知宜䝉此傳則昆弟二字當在傳上與母妻冝䝉此傳同為厭降之文不得如舊讀也云父所不降謂適也者不指不降之人而云謂適者欲見適中非一謂父為適妻釋子之等皆是也世叔母為女服而言夫之昆弟婦人子為夫之昆弟之婦人子適人者注婦人子女子子也釋曰此亦重出故次從父昆弟下此謂世叔母為之服在家期出嫁大功云不言女子子者因出見恩疏者女在家室之名是親也婦者事人之稱是見疏也今不言女與母而言夫之昆弟與婦人子者是因出見恩疏故也大夫妾為君之長子三年庶子大功已子期大夫之妾為君之庶子釋曰妾為君之庶子輕於為夫之昆弟之女故次之引下傳曰何以大功也妾為君之黨服得與女君同指謂此也者彼傳為此經而作故云指謂此在下者鄭彼云文爛在下爾故也云妾為君之長子亦三年者妾從女君服得與女君同故亦同女君三年又云自為其子期異於女君也者以其女君從夫降其庶子大功夫不厭妾故自服其子期是異於女君也云士之妾為君之衆子亦期謂亦得與女君期者亦是與已子同故也女成人未嫁亦降旁親故期女子子嫁者未嫁者傳曰嫁者其嫁於大夫者也未嫁者成人而未嫁者也云云注成人者云云及將出者明當及時也云女子子成人者有出道降旁親者此鄭依經正解之以其嫁者降旁親是其常而云未嫁者成人未嫁亦降旁親者謂女子子十五已後許嫁笄為成人有出嫁之道是以雖未出即逆降世父已下旁親也云及將出者明當及時也者謂女子子年十九後年二月冠子娶妻之月其女當嫁今年遭此世父已下之喪若依本服期者過後二月不得及時逆降在大功大功之末可以嫁子則於二月得及時而嫁是以云明當及時也大夫大夫妻子等為女之尊同者不降大夫大夫之妻大夫之子公之昆弟為姑姊妹女子子嫁于大夫者君為姑姊妹女子子嫁於國君者傳曰何以大功也尊同也尊同則得服其親服諸侯之子稱公子公子不得禰先君公子之子稱公孫公孫不得祖諸侯此自卑别於尊者也若公子之子孫有封為國君者則世世祖是人也不祖公子此自尊别於卑者也是故始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟封君之孫盡臣諸父昆弟故君之所為服子亦不敢不服也君之所不服子亦不敢服也注不得禰不得祖者不得立其廟而祭之也卿大夫以下祭其祖禰則世世祖是人不復祖公子者後世為君者祖此受封之君不復祀别子也公子若在髙祖以下則如其親服後世遷之乃毁其廟爾因國君以尊降其親故終説此義云女尊同唯有出降若卑又降在緦麻此等姑姊已下應降而不降又兼重出其文故次在此也此大夫大夫妻大夫之子公之昆弟四等人尊卑同皆降旁親姑姊已下一等大功又以出降當小功但嫁於大夫尊同無尊降直有出降故皆大功也但大夫妻為命婦若夫之姑姊妹在室及嫁皆小功若不為大夫妻又降在緦麻假令彼姑姊妹亦為命婦唯小功耳今得在大夫科中者此謂命婦為本親姑姊妹已之女子子因大夫大夫之子為姑姊妹女子子寄文於夫與子姑姊妹之中不煩别見也云君為姑姊妹女子子嫁於國君者國君絶期已下今為尊同故亦不降依嫁服大功公子不禰先君公孫不祖諸侯諸侯之子稱公子已下因尊同遂廣説尊不同之義也但諸侯之子適適相承象賢而旁支庶已下並為諸侯所絶不得稱諸侯子變名公子案檀弓注云庶子言公卑逺之是以子與孫皆言公見疏逺之義故也云此自卑别於尊者也謂適既立廟支庶子孫不立廟公子之子孫有封君則世祖之不祀别子云若公子之子孫有封為國君者謂若周禮典命云公八命卿六命大夫四命其出封皆加一等是公之子孫或為天子臣出封為五等諸侯是公子有封為國君之事云則世世祖是人也不祖公子此自尊别於卑者也謂後世將此始封之君世世祖是人也不祖公子謂不復祀别子始封君與子孫於諸父昆弟有臣不臣云是故始封之君不臣諸父昆弟者以其初升為君諸父是祖之一體又是父之一體其昆弟既是父之一體又是已之一體故不臣此二者仍為之著服也云封君之子不臣諸父而臣昆弟者以其諸父尊故未得臣仍為之服昆弟卑故臣之不為之服亦既不臣當服本服期其不臣者為君所服當服斬以其與諸侯為兄弟者雖在外國猶為君斬不敢以輕服服至尊明諸父昆弟雖不臣亦不得以輕服服君為之斬衰可知云封君之孫盡臣諸父昆弟者繼世至孫漸為貴重故盡臣之不言不降而言不臣君是絶宗之人親疏皆有臣道故雖未臣子孫終是為臣故以臣言之云故君之所為服子亦不敢不服也者此欲釋臣與不臣之子與君同不祖禰先君謂支庶避適無廟鄭恐人以傳云不得禰不得祖令卑别之不得將為禰祖故云不得者不得立其廟而祭之名為不得也以其廟已在適子為君者立之旁支庶不得並立廟故云不得也云卿大夫以下祭其祖禰鄭言此者欲見公子公孫若立為卿大夫得立三廟若作上士得立二廟若作中士得立一廟並得祭其祖禰既不祖禰先君當立别子已下以其公子公孫並是别子若魯桓公生世子名同者後為君慶父叔牙季友等謂之公子公子並為别子不得禰先君桓公之廟慶父等雖為卿大夫未有廟至子孫已後乃得立别子為大祖不毁廟已下二廟祖禰之外次第則遷之也故云卿大夫已下祭其祖禰也雖得祭祖禰但不得禰祖先君也云則世世祖是人不得祖公子者此謂鄭疊傳文也云後世為君者祖此受封之君不得祀别子也者此鄭解義語以其後世為君祖此受封君解世世祖是人不得祀别子解不祖公子者也以其别子卑始封君尊是為自尊别於卑始封君未有太祖廟唯四親廟云公子若在髙祖以下則如其親服者此解始封君得立五廟五廟者大祖與髙祖已下四廟今始封君後世乃不毁其廟為大祖於此始封君未有大祖廟唯有髙祖以下四廟則公子為别子者得入四廟之限故云公子若在髙祖以下則如其親如其親謂自禰已上至髙祖以次立四廟云後世遷之乃毁其廟爾者謂始封君死其子立即以父為禰廟前髙祖者為髙祖之父當遷之又至四世之後始封君為髙祖父當遷之時轉為大祖通四廟為五廟定制也故云後世遷之乃毁其廟也云因國君以尊降其親故終説此義云者自諸臣之子已下既非經語而傳汎説降與公子之義諸侯臣為天子繐衰七月葬除之繐衰裳牡麻絰既𦵏除之者釋曰此繐衰是諸侯之臣為天子在大功下小功上者以其天子七月葬既葬除故在大功九月下小功五月上又縷雖如小功升數又少故在小功上也此不言帶屨者以其傳云小功之縷也則帶屨亦同小功可知布細而疏曰繐漢時有鄧繐云凡布細而疏者謂之繐者此喪服謂之繐由繐而疏若非喪服細而疏亦謂之繐故云凡以總之云今南陽有鄧繐者謂漢時南陽郡鄧氏造布有名繐諸侯之大夫兼有孤卿諸侯之大夫為天子釋曰此經直云大夫則大夫中有孤卿以其小聘使下大夫大聘或使孤或使卿也故大行人云諸侯之孤以皮帛繼子男故知大夫中兼孤卿陪臣受天子恩故服介與畿外民否傳問者恠其重此既陪臣何意服四升半布七月乃除荅云以時接見乎天子者為有恩故服之大宗伯云時聘曰問殷覜曰視鄭注云時聘者亦無常期天子有事乃聘之焉竟外之臣既非朝歲不敢瀆為小禮是天子有事乃遣大夫來聘彼又注云殷覜謂一服朝之歲以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十二年此時唯有侯服一服朝故餘五服並使卿來見天子此並是以時㑹見天子天子待之以禮皆有委積飱饔饗食燕與時賜加恩既深故諸侯大夫報而服之也云則其士庶民不服可知者上文云庶人為國君注云天子畿内之民服天子亦如之即知畿外之民不服可知其有士與卿大夫聘時作介者雖亦得禮介本副使不得天子接見亦不服可知殤小功由齊衰降故在成人小功上殤小功章小功布衰裳澡麻帶絰五月者釋曰此殤小功章在此者本齊衰大功之親為殤降在小功故在成人小功之上也但言小功者對大功是用功粗大則小功是用功細小精宻者也自上以來皆帶在絰下今此帶在絰上者以大功已上絰帶有本小功以下斷本此殤小功中有下殤小功帶不絶本與大功同故進帶於絰上倒文以見重故與常例不同也且上文多直見一絰苞二此别言帶者亦欲見帶不絶本與絰不同故兩見之也又殤大功直言無受不言月數此直言月不言無受者聖人作經欲互見為義大功言無受此亦無受此言五月彼則九月七月可知又且下章言即葛此章不言即葛亦是兼見無受之義也又不言布帶與冠文略也不言屨者當與下章同吉屨無絇也澡麻去莩垢不絶本為下殤小功帶云澡者治去莩垢者謂以枲麻又治去莩垢使之滑淨以其入輕竟故也引小記者欲見下殤小功中有本是齊衰之喪故特言下殤若大功下殤則入緦麻是以特據下殤云屈而仄以報之者謂先以一股麻不絶本者為一條展之為繩報合也以一頭屈而反鄉上合之乃絞垂必屈而仄以合者見其重故也引之者證此帶亦不絶本屈而仄以報之也為人後者昆弟本大功今殤降小功為人後者為其昆弟之長殤從父昆弟之長殤此二者以本服大功今長殤中殤小功故在此章從父昆弟情本輕故在出降昆弟後也大功之殤中從上小功之殤中從下傳曰問者曰中殤何以不見也大功之殤中從上小功殤中從下釋曰鄭云問者據從父昆弟之下殤在緦麻也者以其緦麻章見從父昆弟之下殤此章見從父昆弟之長殤唯中殤不見故致問是以據從父昆弟也云大功小功皆謂服其成人也者以其緦麻章傳云齊衰之殤中從上大功之殤中從下據此二傳言之禮無殤在齊衰則下齊衰之殤與大功之殤據成人明此大功與小功之殤據服其成人可知也若然此經大功之殤唯有為人後者為昆弟及從父昆弟二者長殤中殤在此小功其成人小功之殤中從下自緦麻於此言之者欲使小功與大功相對故兼言之中殤從上下有二文鄭謂丈夫婦人異云此主謂丈夫之為殤者服也者鄭以此云大功之殤中從上小功之殤中從下緦麻章云齊衰之殤中從上大功中從下兩文相反故鄭以彼謂婦人為夫之族類此謂丈夫為殤者服也鄭必知義然者以其此傳發在從父昆弟丈夫下下文發傳在婦人為夫之親下成人期者長中殤大功小殤小功昆弟之子女子子夫之昆弟之子女子子之下殤者此皆成人為之齊衰期長中殤在大功故下殤在此小功也云為姪庶孫丈夫婦人之長殤者謂姑為姪成人大功長殤在此小功不言中殤中從上不言男子女子而言丈夫婦人亦是見恩疏之義庶孫者祖為之大功長殤中殤亦在此小功言丈夫婦人亦是見恩疏也鄭謂為大夫無殤為大夫則已冠云大夫為昆弟之長殤小功謂為士者若不仕者也者凡為昆弟成人期長殤在大功今大夫為昆弟長殤小功明大夫為昆弟降一等成人大功長殤中殤在小功若昆弟亦為大夫同等則不降今言降在小功眀是昆弟為士若不仕者也云以此知為大夫無殤服也者已為大夫則冠矣大夫冠而不為殤是以知大夫無殤服矣然大夫身用士禮已二十而冠而有兄姊殤者已與兄姊同十九而兄姊於年終死已至明年初二十因喪而冠是已冠成人而有兄姊殤也且五十乃爵命今未二十已得為大夫者五十乃爵命自是禮之常法或有大夫之子有盛徳謂若甘羅十二相秦之等未必要至五十是以得有㓜為大夫者也若然曲禮云四十强而仕則四十然後為仕今云殤死者為士若不仕則為士而殤死亦是未二十得為士者謂若士冠禮鄭目録云士之子任士職居士位二十而冠則亦是有徳未二十為士至二十乃冠故鄭引管子書四民之業士亦世焉妾為君之庶子長殤降小功大夫之妾為庶子之長殤注君之庶子釋曰妾為君之庶子成人在大功已見上章今長殤降一等在此小功云君之庶子者若適長則成人隨女君三年長殤在大功與此異故言君之庶子以别之儀禮要義卷三十二
