body:
  text: 儀禮要義卷三十七宋魏了翁撰士喪禮三君襚庶襚不必盡用即守祧遺衣服厥明滅燎陳衣於房南領西上綪絞紟衾二君襚祭服散衣庶襚凡三十稱紟不在筭不必盡用釋曰云君襚祭服散衣者士祭服有助祭爵弁服自家祭𤣥端服散衣非祭服朝服之等云庶襚者謂朋友兄弟之等來襚者也云紟不在筭者案喪大記紟五幅無紞鄭云今之單被也以其不成稱故不在數内云不必盡用者案周禮守祧職云其遺衣服藏焉鄭云遺衣服大歛之餘也即此不盡用者也云衾二者始死歛衾今又復制者此大歛之衾二始死幠用歛衾以小歛之衾當陳之故用大歛衾小歛已後用夷衾覆尸故知更制一衾乃得二也云小歛衣數自天子達者案喪大記君大夫小斂已下同云十九稱則天子亦十九稱注云十九稱法天地之終數也云大歛則異矣者案此文士喪大歛三十稱喪大記士三十稱大夫五十稱君百稱不依命數是亦喪數略則上下之大夫及五等諸侯各同一節則天子宜百二十稱此鄭雖不言襲之衣數案雜記注云士襲三稱大夫五稱公九稱諸侯七稱天子十二稱與以其無文推約為義故云與以疑之大小歛之饌亦在東堂下籩豆皆巾東方之饌云云奠席在饌北歛席在其東此云饌但言東方則亦在東堂下也者案上小歛之饌云于東堂下此直言東方則亦東堂下鄭云亦上小歛也云籩豆具而有巾盛之也者使小歛一豆一籩籩豆不具故無巾若然籩有巾豆無巾者以豆盛菹醢濕物不嫌無巾故不言其實有巾矣案此注引特牲記籩巾鄭彼注云籩有巾者果實之物多皮核優尊者此言盛之不同引之者以其彼為尸尸食故云優尊者此為神云彌神之者以其小歛奠無巾大歛奠有巾已是神之今于大歛奠又有席掘肂見衽肂謂埋棺之坎掘肂見衽釋曰云肂埋棺之坎者肂訓為陳謂陳尸於坎鄭即以肂為埋棺之坎也知於西階上者檀弓孔子云夏后氏殯於東階殷人殯於兩楹之間周人殯於西階之上故知士亦殯於西階之上此殯時雖不言南首南首可知鄭注上文云如商祝之事位則尸南首以檀弓又云葬於北方北首三代之達禮也禮運云故死者北首生者南郷亦據葬後而言則未葬已前不忍異於生皆南首唯朝廟時北首故既夕云正柩於兩楹間用夷牀注云是時柩北首必北首者朝事當不背父母以首郷之大夫殯在西序四面及上塗之如屋引喪大記者云畢塗屋者畢盡也四面及上盡塗之如屋然云大夫殯以幬攅置於西序者大夫不得如人君於西階離序而四面攅之大夫但逼西序以木幬覆棺營攅置於西序云塗不暨於棺者彼注云攅中狹小裁取容棺暨及也但攅木不及棺而已也云士殯見衽塗上者即此經掘肂而見其小要於上塗之而已云帷之者鬼神尚幽闇君大夫士皆同棺不釘蓋用漆有衽有束云又曰君蓋用漆三衽三束者古者棺不釘彼鄭注云用漆者塗合牝牡之中也衽小要也棺蓋毎一縫為三道小要毎道為一條皮束之故云君蓋用漆三衽三束大夫士降於君故二衽二束大夫有漆士無漆也引之者證經肂與衽之義也輁軸異狀輴與龍輴異制云輁狀如牀軸其輪者此注文略案既夕云遷於祖用軸注云軸輁軸也軸狀如轉轔刻兩頭為軹輁狀如長牀穿程前後著金而關軸焉大夫諸侯以上有四周謂之輴天子畫之以龍是也小歛近戸得明此大歛於室之奥故有燭燭俟於饌東釋曰堂雖明室猶闇者前小歛陳衣於房無燭者近戸得明故無燭此大歛於室之奥故有燭以待之云在地曰燎者謂若郊特牲云庭燎之百又詩云庭燎之光如此之類皆在地曰燎此云執之云燭及少儀云主人執燭抱燋此之類皆是人之手執燭也庭燎且燕禮亦謂之大燭也司烜氏亦謂之墳燭也大小歛奠皆受巾於阼階下而升云授執巾者於尸東使先待於阼階下者此巾前為小歛奠巾之今祝徹巾還為大斂奠巾之前小斂奠升自阼階設於尸東祝受巾於阼階下而升今大斂奠亦升自阼階設於奥亦宜受巾於阼階下而升不忍使親須臾無依故後奠繼先奠其餘取先設者出於足降自西階婦人踊設于序西南當西榮如設於堂注為求神於庭孝子不忍使其親須臾無所馮依也堂謂尸東也釋曰云凡奠設於序西南者畢事而去之者言凡奠謂小歛奠大斂奠遷祖奠祖奠但將設後奠則徹先奠於西序南待後奠則去之故小斂奠設之於此不巾以不久設故也自小斂後男髺女髽今袒為大斂變婦人尸西東面主人及親者升自西階出於足西面袒知袒為大斂變者前將小斂袒今言袒下文即行大斂事故知為大斂變也云不言髽免髺髪小斂以來自若矣者决前小斂袒男有髺髪免婦人有髽今大斂袒不言者自小斂以來有此至成服乃改若如也自如常有故不言之也主人先自盡至大斂乃用君襚商祝布絞紟衾衣美者在外君襚不倒釋曰云至此乃用君襚主人先自盡者喪大記君無襚大夫士注云不陳不以斂彼無襚大夫士止謂不陳為小斂用之故云無襚大夫士以其上文士喪始死君使人襚何得云君全無襚大夫士也故以不陳不以斂解之至大斂乃用君襚於小斂所用主人先自盡也士初喪為君命出小斂後為大夫出有大夫則告釋曰案檀弓大夫弔當事而至則辭焉注云辭猶告也擯者以主人有事告也主人無事則為大夫出喪大記云士之喪於大夫不當斂則出注父母始死悲哀非所尊不出也上文則君命則出迎於門外是始死唯君命出若小歛後則為大夫出從阼階遷户郷西階入棺棺在肂中釋曰士舉遷尸謂從戸外夷牀上遷尸於斂上下云奉尸斂于棺謂從阼階斂上遷尸鄉西階斂於棺中乃加蓋於棺上也云棺在肂中斂尸焉者欲見先以棺入肂中乃奉尸入棺中云所謂殯也者即所引檀弓殯於客位者是也以尸入棺名斂亦名殯也殯後拜客北面視肂謂西階東主人降拜大夫之後至者北面視肂注北面於西階東釋曰小斂後主人阼階下今殯後拜大夫後至者殯訖不忍即阼階因拜大夫即於西階東北面視肂而哭也始死作銘置於重殯後置肂東卒塗祝取銘置於肂注為銘設柎樹之肂東釋曰上文始死則作銘訖置於重今殯訖取置于肂上銘所以表柩故也云肂東者以不使當肂襲奠小斂奠皆尸旁殯後奠在奥乃奠燭升自阼階祝執巾席從設于奥東面釋曰執燭者先升當照室者以其設席于奥當先照之為明也云自是不復奠于尸者鄭欲解自始死已來襲奠小斂奠皆在尸旁今大斂奠不在西階上就柩所故于室内設之則自此已下朝夕奠朔月薦新奠皆不於尸所載魚左首據執者言之未異于生魚左首進鬐注古文首為手鬐為耆釋曰云左首進鬐亦未異於生也者案公食右首進鬐此云左首則與生異而云亦未異於生者下文注載者統於執設者統於席彼公食言右首據席而言此左首據載者統于執若設於席前則亦右首也云不致死也者檀弓云之死而致死之不仁而不可為也今進魚不異於生則亦是之死不致死之魚左首以執者言豆右菹據設言云設豆右菹者凡設醢菹常在右今特言之者此從北鄉南而陳嫌先設者在北故言右言右菹則醢自然在左是以鄭云右菹菹在醴南也注云此左右異於魚者載者統於執設者統於席者鄭以上文魚言左首據載者統於執故云左首及設則右首此言設豆右菹據設者統於席前若執來即左菹也哭殯謂既塗兄弟䟽者可以歸賔出云云主人拜送於門外入及兄弟北面哭殯兄弟出云云云北面哭殯者案喪大記云大夫士哭殯則杖哭柩則輯杖注云哭殯謂既塗也哭柩謂唘後也此哭不言杖者文略也云小功以下至此可以歸者案喪服記云小功以下為兄弟則此兄弟可以兼男女也云異門大功亦存焉者大功容有同門有同財故喪服以小功以下為兄弟但大功亦有不同門不同財之義以異門疏至此亦可以歸故云亦存焉謂存在家之法也既殯雖歸至朝夕朔奠之日近者亦入哭限也若至葬時皆就柩所故既夕反哭云兄弟出主人拜送云兄弟小功以下也異門大功亦可以歸是也凡言次廬堊室以下緫名賔客亦云次衆主人出門哭止皆西面于東方闔門主人揖就次釋曰凡言次者廬堊室以下揔名是賔客所在亦名次也故引禮記間傳為證案間傳云父母之喪居倚廬寢苫枕凷不説絰帶齊衰居堊室芐翦不納大功寢有席小功緦麻牀可也齊衰既居堊室故大功已下有帷帳也君於士視大斂皮弁服襲裘君若有賜焉則視斂既布衣君至主人出迎云云釋曰案雜記云公視大斂公升商祝鋪席乃斂注引喪大記曰大夫之喪將大斂既鋪絞紟衾君至此君升乃鋪席則君至為之改始新之此經上下不言改新者文不具也云斂大斂者案喪大記云君於士既殯而徃為之賜大斂焉此經云若有賜明君於士視大斂也云君視大斂皮弁服襲裘者案喪服小記云諸侯弔必皮弁錫衰言諸侯不言君者以其彼是弔異國之臣法案服問云公為卿大夫錫衰以居出亦如之當事則弁絰不見君弔士服案文王世子注君為同姓之士緦衰異姓之士疑衰並據成服後今大斂未成服縁弔異國之臣有服皮弁之法則君弔士未成服之前可服皮弁襲裘襲裘之文出檀弓子㳺弔小斂後襲裘帶絰而入此小斂後亦宜然也云成服之後徃則錫衰者亦約服問君弔卿大夫之法若然文王世子注同姓之士緦衰異姓之士疑衰不同者彼謂凡平之士此士於君有師友之恩特賜與大夫同也君弔主人出迎不哭厭於君主人出迎於外門外見馬首不哭還入門右北面及衆主人袒注不哭厭於君不敢伸其私恩巫掌招彌王弔則與祝前巫止於廟門外祝代之小臣二人執戈先二人後釋曰云巫掌招彌以除疾病者周禮春官男巫職文彼注云招招福也彌讀為敉敉安也謂安凶禍也云小臣掌正君之法儀者夏官小臣職文云男巫王弔則與祝前者亦男巫職文云祝者則禮春官喪祝職云王弔則與巫前是也引之者證經巫祝小臣之事也引檀弓者證彼與此經異故云皆天子之禮也以其巫祝桃茢具殯宫而曰廟門神之云凡宮有鬼神曰廟者以經云廟謂適寢為廟大國之孤四命如鄭良霄亦號公君升主人主人西楹東北面升公卿大夫繼主人東上案典命云公之孤四命故云大國之孤四命也引春秋者襄三十年左氏傳文鄭為伯爵不合立孤但良霄鄭之公族大夫貴之極以比大國之孤故臣子尊其君亦號為公引之者證經是公之孤也以其天子有三孤副貳三公公國無公唯有孤亦號為公是以燕禮亦謂之為公也撫尸奉尸馮尸雖異馮為緫名云凡馮尸興必踊者喪大記文此經直云君坐撫當心主人直踊又不言馮尸而鄭云凡馮尸興必踊者欲見撫即馮之類興亦踊故得與主人拾踊也是以喪大記君于臣撫之父母于子執之子于父母馮之婦于舅姑奉之舅姑于婦撫之馮尸不當君所又云凡馮尸興必踊是馮為揔名故君撫之亦踊也凡奠升自阼階此自西階辟君在乃奠升自西階注以君在阼釋曰以其凡奠皆升自阼階是為君在阼故辟之而升西階也君弔臣至廟門下車臣出大門送君出門廟中哭主人不哭辟君式之釋曰君入臣家至廟門乃下車則貳車本不入大門下云貳車畢乗主人哭拜送者明出大門矣云辟逡遁辟位也者案曲禮云君出就車左右攘辟則此云辟亦是主人攘辟故云逡遁辟位古者立乗故式視馬尾云辟亦是主人攘辟故云古者立乗也知式是禮主人者曲禮云式宗廟曽子問卿大夫見君之尸皆下之尸必式是凡式皆是禮前物為式引曲禮者欲見式小俛彼注嶲猶規也車輪轉之一帀為一規案周禮冬官輪崇六尺六寸圍三徑一三六十八一帀則一丈九尺八寸五規則五箇一丈九尺八寸揔為九丈九尺六尺為一歩揔十六歩半凡平立視視前十六歩半若小俛焉式則低頭視馬尾故連引曲禮云式視馬尾也貳車視命數君使異姓乗之在後貳車畢乗主人哭拜送釋曰云其數各視其命之等者案周禮大行人云上公貳車九乗侯伯貳車七乗子男貳車五乗故知視命數也云君出使異姓之士乗之在後者禮記坊記云君不與同姓同車與異姓同車彼謂與君同在一車為御與車右者也此經云貳車畢乗明亦使異姓之士乗之在後可知云君弔蓋乗象路者案周禮巾車職王有五路玉金象革木以其象路以朝及燕出入弔臨亦是出入之事故云蓋以疑之若四衞諸侯侯伯已下與王無親者亦各乗已所賜之車革路木路之等今鄭于貳車之下言所乗車者以其言貳車其飾皆與正車同故于貳車以下言君之所乗車也引曲禮者乗君之乗車則貳車是也三日成服除死日數之士與大夫以上異三日成服杖拜君命及衆賔不拜棺中之賜釋曰云既殯之明日者上厥明㓕燎者是三日之朝行大斂之事今别言三日成服則除上三日更加一日是四日矣而言三日者謂除死日數之為三日也云全三日始歠粥矣者謂成服日乃食粥除此日已前是未全三日不食至四日乃食也案喪大記云三日不食謂通死日不數成服日故云三日不食孝經三日而食者是除死日數引曲禮者彼注云與猶數也生數來日謂成服杖以死明日數也死數徃日此謂殯斂以死日數也此士禮貶於大夫者大夫以上皆以來日數引之以證此士喪禮與大夫已上異也朝夕哭據殯後而言不辟子卯朝夕哭不辟子卯釋曰云既殯之後朝夕及哀至乃哭者此據殯後阼階下朝夕哭廬中思憶則哭云不代哭也者决未殯以前大夫以上以官代哭士以親疏代哭不絶聲云子卯桀紂亡日者王者以為忌日云凶事不辟者即此經是也云吉事闕焉者檀弓云子卯不樂桀亡見詩頌左傳紂見牧誓未祥則外位皆有哭哭與奠開廟門婦人即位于堂南上哭丈夫即位于門外云云辟門釋曰喪大記云祥而外無哭者則此外位皆有哭今直云婦人哭則丈夫亦哭矣但文不備也案下注云兄弟齊衰大功者主人哭則哭小功緦麻亦即位乃哭是也云外兄弟異姓有服者謂若舅之子姑姊妹從母之子等皆是有服者也云凡廟門有事則開無事則閉者有事謂朝夕哭及設奠之時無此事等則閉之鬼神尚幽闇故也大功以上親無門内外位主人哭亦哭賔皆即此位乃哭盡哀止主人乃右還拜之如外位矣兄弟齊衰大功者主人哭則哭小功緦麻亦即位乃哭上言賔此言卿大夫明其亦賔爾少進前於列異爵卿大夫也他國卿大夫亦前于列尊之拜諸其位就其位特拜釋曰既云如外位又案外位主人之南有外兄弟其南乃有賓此内位主人之南即有卿大夫不言兄弟者以外兄弟雖在主人之南以少退故卿大夫繼主人而言也云諸公門東少進者謂門東有士故云少進少進於士云兄弟齊衰大功者主人哭則哭者以其大功已上親無門外内位但主人哭則亦哭矣小功緦麻䟽故入即進前於士之列也云異爵卿大夫也者以主人是士明異爵是卿大夫也云他國卿大夫亦前於列者以經云他國之異爵者門西少進亦當前於士之位也云拜諸其位就其位特拜者以其異爵則亦卿大夫故知特拜一一拜諸其位也喪不剥奠故大斂之俎朝廟之宿奠皆巾乃奠醴酒脯醢升丈夫踊入如初設不巾釋曰注云入入于室也者以其設奠在室中故也云如初設者豆先次籩次酒次醴也者以其大斂有俎籩豆又多今言如初設直豆籩酒醴見用者先後次第耳云不巾無菹無栗也者以大斂奠兼有菹栗則巾之是以檀弓云喪不剥奠也與祭肉也與其大斂皆有俎俎有祭肉故巾之也若然朝廟之奠亦是宿奠無菹栗有巾者為在堂而久設塵埃故也朝夕哭止拜賔乃奠奠則禮畢奠者由重南東丈夫踊賔出婦人踊主人拜送云哭止乃奠者謂朝夕哭止拜賔乃奠奠則禮畢矣是以檀弓云朝奠日出是也大夫以上有月半殷奠士惟朔月朔月奠用特豚魚腊陳三鼎如初東方之饌亦如之知大夫已上月半又奠者下經云月半不殷奠士不者大夫已上則有之謂若下文云不述命大夫已上則有之又若特牲云士不􅓪日大夫已上則􅓪諸士言不者大夫已上則皆有之故知大夫已上又有月半奠也云如初者謂大斂時者以其上陳大斂事至殷奠始有黍稷猶平常供養無籩有黍稷用瓦敦有蓋當籩位云於是始有黍稷者始死以來奠不言黍稷至此乃言之故云於是始有黍稷也云死者之於朔月月半猶平常之朝夕者謂猶生時朝夕之常食也案既夕記云燕養饋羞湯沐之饌如他日注云燕養平常所用供養也饋朝夕食也羞四時之珍異若然彼謂下室中不異於生時殯宫中則無黍稷今至朔月月半乃有之若朔月月半殯宫中有黍稷下室則無故既夕記云朔月若薦新則不饋於下室注云以其殷奠有黍稷也下室如今之内堂是也是以云猶平常朝夕决之也云大祥之後則四時祭焉者士虞禮禫月吉祭猶未配是大祥之後得四時祭若虞祭之後卒哭之等雖不四時亦有黍稷俎在黍稷前設執之在後云俎行者俎後執執俎者行鼎可以出者案下文設時豆錯俎錯黍稷後設則俎宜在黍稷前今在黍稷後而言俎行者欲見俎雖在黍稷前設以執之在後欲與鼎匕出為節故云俎行即匕鼎出也士月半無殷奠有薦新如朔奠月半不殷奠注殷盛也有薦新如朔奠釋曰云下尊者以下大夫以上有月半奠故也案月令仲春開冰先薦寢廟季春云薦鮪于寢廟孟夏云以彘甞麥羞以含桃先薦寢廟皆是薦新如朔奠者牲牢籩豆一如上朔奠也徹朔奠先取醴酒序出如入徹朔奠先取醴酒其餘取先設者敦唘㑹面足序出如入注唘㑹徹時不復蓋也面足執之令足間鄉前也敦有足則敦之形如今酒敦釋曰以前設時即不葢至徹亦不蓋今經云敦啓㑹嫌先蓋至徹重啓之故云不復蓋也為葬將北首故南其壤在足處筮宅冢人營之曰案周禮有冢人掌公墓之地辨其兆域此士亦有冢人掌墓地兆域故云冢人營之也掘四隅外其壤掘中南其壤云為𦵏將北首者解掘中南其壤為葬時北首故壤在足處案檀弓云葬於北方北首卜宅與葬日主人有司不敢純凶服既朝哭主人皆徃兆南北面免絰注求吉不敢純凶釋曰案雜記云大夫卜宅與葬日有司麻衣布衰布帶因䘮屨緇布冠不蕤占者皮弁下又云如筮則史練冠長衣以筮占者朝服彼有司與占者之服不純吉亦不純凶此乃主人之服不純吉免絰亦不純凶也為父某甫謂二十加冠時且字命曰哀子某為其父某甫筮宅度茲幽宅兆基無有後艱云某甫且字也者謂二十加冠時且字云若言山甫孔甫矣者此亦二十加冠所稱故士冠禮云伯某甫仲叔季唯其所當鄭亦以孔甫之字解某甫則孔甫之等是實字以某甫擬之是且字也是以諸侯薨復者亦言某甫鄭云某甫且字是為之造字也引孝經卜其宅兆者證宅為葬居又見上大夫以上卜而不筮故雜記云大夫卜宅與葬日下文云如筮則史練冠鄭注云謂下大夫若士也則卜者謂上大夫上大夫卜則天子諸侯亦卜可知但此注兆為域彼注兆為吉兆不同者以其周禮大卜掌三兆有玉兆瓦兆原兆孝經注亦云兆塋域此文主人皆徃兆南北面兆為營域之處義得兩全故鄭注兩解士與大夫命筮命龜之辭釋曰云不述者士禮略者但士禮命筮辭有一命龜辭有二大夫已上命筮辭有二命龜辭有三士命筮辭有一者即上經是直有命筮無述命又無即席西面命筮辭是命筮辭唯有一也下文卜日有族長涖卜為事命龜直云哀子某以下又有即席西面一命龜注云不述命亦士禮略是士命龜辭有二又知大夫以上命筮辭有二命龜辭有三者案少牢是大夫筮禮彼上文云主人曰孝孫某來日丁亥以下是為因事命筮下又云遂述命曰假爾大筮有常是直云孝孫某來日丁亥已下將即西面命筮冠於述命之上共為一辭通前為事命筮有二若卜則有為事命龜通述命又有卿當席西面命為三知大夫龜亦有述命士云不者士喪禮士之卜筮皆云不述命士云不者大夫已上皆有謂若士月半不殷奠大夫則殷奠之類知大夫命龜不將述命與即西面命龜共為一命龜亦知有二者案此士喪注述命命龜異龜重威儀多也對少牢述命與命龜為二通前命龜為三若然則天子諸侯亦命筮辭有二命龜辭有三可知也知士不述命非為喪禮略者特牲之吉禮亦云不述命故知士吉凶皆不述命卜筮各三人以龜三兆筮三易卒筮執卦以示命筮者筮者受視反之東西旅占云云注云與其屬共占之謂掌連山歸藏周易者案洪範卜筮云三人占則從二人之言注云卜筮各三人太卜掌三兆三易以其龜有三兆玉兆瓦兆原兆筮有三易連山歸藏周易連山者夏家易以純艮為首艮為山象山之出雲連連不絶故易名連山歸藏者殷之易以純坤為首坤為地萬物歸藏於地故易名歸藏周以十一月為正月一陽爻生為天統故以乾為首乾為天天能周帀於四時故易名周易也井椁皮獻明器之材皆殯門外既井椁主人西面拜工左還椁反位哭不踊婦人哭於堂釋曰自此盡亦如之論將葬須觀知椁材與明器之材善惡之事案禮記檀弓云既殯旬而布材與明器注云木工宜乾腊則此云井椁及明器之材布之已久故云既已也又須作之豈今始獻材也但至此時將用故主人親㸔視是以云既哭之則往施之竁中也云匠人為椁刋治其材者此解經主人拜工之事以其冬官主百工百工之内匠人主木工之事所云者拜匠人以其為椁刋治其材有功故主人拜之也云以井構於殯門外也者以下文獻材於殯門外則此亦在殯門外此不言下言者以明器之材多并有獻素獻成之事故具言處所也反位拜位者謂反西面拜位知既哭施之竁中者以其文承筮宅以下見其即入壙故也知主人還椁亦以既朝哭矣者以其筮宅與卜日皆在朝哭訖明還椁亦既朝哭明器獻材獻素獻成與椁異獻材于殯門外西面北上綪主人徧視之如哭椁獻素獻成亦如之釋曰上經已言椁此經言材故鄭言明器之材也檀弓云既殯旬而布材與明器明器與材别言故彼言材為椁材也又此下别言素與成則此明器之材未斵治先獻之騐其堪否也云形法定為素飾治畢為成知義然者以其言素素是未加飾名又經言獻材是斵治明素是形法定斵治訖可知又言成成是就之名明知飾治畢也此明器須好故有三時獻法上椁材既多故不須獻直還觀之而已楚焞以鑚龜明火以爇燋龡其焌契卜日卜人先奠龜于西塾上南首有席楚焞置於燋在龜東荆焞所以鑽灼龜者古法鑽龜用荆謂之荆焞也云燋炬也者謂存火者為炬亦用荆為之故鄭云所以燃火者也周禮菙氏掌共燋契以待卜事者案彼下注杜子春云明火以陽燧取火於日𤣥謂焌讀如戈鐏之鐏謂以契柱燋火而吹之也契既然以授卜師用作龜也役之使助之是楚焞與契為一皆謂鑚龜之荆讀為戈鐏之鐏者取其鋭頭為之灼龜也族長有司宗人禮官皆吉服以卜族長涖卜及宗人吉服釋曰云族長有司掌族人親疏者以其言族長故知掌族人親䟽也云吉服服𤣥端也者案雜記云大夫卜宅與葬日有司麻衣又云如筮則史練冠長衣此宗人直云吉服不言服名則士之吉服祭服為吉服士之祭服為𤣥端而已宗人掌禮之官非卜筮者著𤣥端則筮史亦服練冠長衣族長涖卜兼代主人命卜宗人告事具主人北面免絰左擁之涖卜即位于門東西面云涖卜族長也者上文所云是也以其改郷西面下文受龜受視受命訖即云命曰哀子某則族長非直視髙兼行命龜之事也故云當代主人命卜也周禮天子卜法則與士異假使大事則大宗伯涖卜小宗伯陳龜貞龜命龜大卜眂髙作龜次事小事已上各有差降也示髙謂腹甲髙處鑚之以示涖卜宗人受卜人龜示高釋曰凡卜法案禮記云禎祥見乎龜之四體鄭注云春占後左夏占前左秋占前右冬占後右今云腹甲髙者謂就龜之四體腹下之甲髙突起之處鑚以示涖卜也儀禮要義卷三十七
