body:
  text: 儀禮要義卷二十四宋魏了翁撰聘禮六賓入竟死主人具而殯因歛連言殯釋曰自此盡卒殯乃歸論賓介死之事云賓入境而死遂也者若未入境即反來云主人為之具而殯者謂從始死至殯所當用者主人皆供之鄭云具謂始死至殯所當用直云至殯所當用明不殯於館取其至殯節主人供䘮具以其大歛訖即殯故連言殯故下文歸介復命之時柩止門外明歛于棺而已賓死介攝賓致命介攝其命釋曰云初時上介接聞命者鄭解介得代賓致命之意以其命出於君初賓受命於君之時賓介同北面上介接聞君命矣以是今賓死得攝其命君弔賓則介為主臣子不為君弔介為主人釋曰古者賓聘家臣適子皆從行是以延陵季子聘於齊其子死葬於嬴博之間故鄭云雖有臣子親姻猶不為主人以其介尊故也主人歸禮幣當中喪用者主人歸禮幣必以用釋曰賓既死主人所歸禮與幣必以當䘮者之用云當中奠贈者解經中小歛大歛之用云當中奠贈諸喪具之用者具謂襲與小歛大歛解經幣云不必如賓禮者不必致飱饔之禮束紡皮帛之類不堪喪者之用故也介受賓禮無辭以反命陳之介受賓禮無辭也釋曰云介受主國賓已之禮者謂公幣私幣之屬故鄭云當陳之以反命也言無辭者雖無三辭以其賓受饔餼之時禮辭受食三辭明介亦有禮辭云無所辭也者以有賓喪嫌介有三辭介復命賓柩止於􅆏門外外朝歸介復命柩止于門外釋曰知門外是大門外者國君有三門􅆏應路又有三朝内朝在路寢庭正朝在路門外應門外無朝外朝當在􅆏門外經直云止于門外無入門之言明知止於大門外外朝之上是以上賓拜賜皆云於門外亦在外朝矣故鄭云必以柩造朝逹其忠心也介送賓柩于其家弔卒殯介卒復命出奉柩送之君弔卒殯案當介復命之時賔之尸柩在外朝上介卒復命謂復命訖出君大門奉賓之柩送至賓之家屍柩入殯於兩楹之間君往就弔卒殯者謂殯訖殯是喪之大節故云卒殯成節乃去謂君與大夫盡去大夫介卒亦如之注不言上介者小聘上介士也士介直言具棺自以時服歛士介死則為之棺歛之釋曰以其士介卑其體降於賓與上介非直具棺他衣物亦具之此士介直具棺不具他物也其士介從者自用時服歛之君不弔焉賓在館死亦以柩造朝若賓死未将命則既歛于棺造于朝介将命前云賓入境而死謂在路死未至國此經更説賓至朝俟間之後使大夫致館未行聘享而賓在館死之事故鄭云俟間之後是以鄭云以柩造朝以其既至朝志在達君命則知介國外死不以柩造朝可知小聘不享不禮面不升不郊勞小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞釋曰自此盡三介論侯伯行小聘之事云不享者謂不以束帛加璧獻國所有云不禮者聘訖不以齊酒禮賓面不升者謂私覿庭中受之不升堂此對大聘升堂受若然不言私覿而言面者對大聘言覿故辟之久無盟㑹之事則相聘記久無事則聘焉注事謂盟㑹之屬釋曰此云久無事則聘焉者則周禮殷聘也是以周禮大行人云凡諸侯之邦交嵗相問也殷相聘也世相朝也注云小聘曰問殷中也久無事又於殷朝者及時相聘也云事謂盟㑹之屬者案春秋有事而㑹不協而盟是以春秋有㑹而不盟盟必因㑹若有盟㑹相見故云久無事則聘焉若有告請束帛加書将命若有故則卒聘束帛加書将命百名以上書於䇿云故謂災患及時相告請者此即上經云若有言一也言災患上注引春秋臧孫辰告糴于齊公子遂如楚乞師此云及時事者即上注引春秋晉侯使韓穿來言汶陽之田是也古謂字為名多則書策少則書方云名書文今謂之字者鄭注論語亦云古者曰名今世曰字許氏説文亦然言此者欲見經云名名者即今之文字也云策簡方板也者簡謂據一片而言策見編連之稱是以左𫝊云南史氏執簡以往是簡者未編之稱此經云百名以上書之於䇿是其衆簡相連之名鄭作論語序云易詩書禮樂春秋策皆尺二寸孝經謙半之論語八寸策者三分居一又謙焉是其策之長短鄭注尚書三十字一簡之文服虔注左氏云古文書一簡八字是一簡容字多少者云方板者以其百名以下書之於方若今之祝版不假連編之策一板書盡内史讀書于門外書必璽之主人使人與客讀諸門外注云云主人國君也人内史也云云釋曰注云既聘享賓出而讀之者上經云若有言則以束帛如享禮文承聘享之後故知此讀諸門外故云既聘享也鄭知人是内史者案内史職云凡四方之事書内史讀之此云使人與客讀諸門外者亦是四方事書故知人是内史也知書必璽之者案襄二十九年左𫝊云公如楚還及方城季武子取卞使公冶問璽書追而與之故知昨日書報明日館送書問尚疾客将歸使大夫以其束帛反命于館注為書報也釋曰此為書報上有故之事彼以束帛加書将命此亦以束帛加書反命于館明日君館之釋曰昨日為書報之今日君始就館送客者書問之道尚疾故也必須尚疾者以其所報告請多是密事是以鄭云既報館之書問尚疾也國内釋幣于行國外釋奠于軷出祖釋軷祭酒脯乃飲酒于其側云既受聘享之禮行出國門止陳車騎釋酒脯之奠於軷者凡道路之神有二在國内釋幣於行者謂平適道路之神出國門釋奠於軷者謂山行道路之神是以委土為山象國中不得軷名國外即得軷稱引詩𫝊曰者證軷祭道路之神也引春秋𫝊曰者案襄二十八年左氏𫝊子大叔云軷涉山川蒙犯霜露引之者證軷是山行之名涉者水行之稱故鄘詩云大夫軷涉我心則憂毛𫝊云草行曰軷水行曰涉云是以委土為山者案月令冬祀行鄭注行廟門外之西為軷壤厚二寸廣五尺輪四尺祀行之禮北面設主於軷上國外祀山行之神為軷壌大小與之同鄭注夏官大馭云封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也此使還亦祖道鄭引陳鍼子為證左氏𫝊鄭忽逆婦媯于陳先配而後祖陳鍼子曰是不為夫婦誣其祖矣鄭志以祖謂祭道神是亦将還而後祖道此聘使還亦宜有祖但文不具鄭釋圭為瑞節按節不得言瑞所以朝天子圭與繅皆九寸云圭所執以為瑞節者案周禮大宗伯云以玉作六瑞以等邦國又云王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧是以其圭為瑞又案周禮掌節有玉節之節即是節與瑞别矣今此云瑞節但連言節者案節不得言瑞瑞亦是節信圭長短依命數雜采曰繅案雜記賛大行曰博三寸厚半寸剡上左右各寸半此經直剡上寸半不言左右文不具也凡圭天子鎮圭公桓圭侯信圭皆博三寸厚半寸剡上左右各寸半唯長短依命數不同云雜采曰繅者凡言繅者皆象水草之文天子五采公侯伯三采子男二采皆是雜采也云以韋衣木板餙以三色再就者依漢禮器制度而知聘諸侯降於朝天子之繅問諸侯朱緑繅八寸此亦降于諸侯而言降於天子者此鄭君指上文朝天子而言故言聘諸侯降於朝天子也云於天子曰朝者據上文所以朝天子是也則諸侯自相朝亦同圭與繅九寸侯伯以下亦依命數云於諸侯曰問者諸侯遣臣自問若遣臣問天子圭與繅亦八寸是以云記之於聘文互相備圭有𤣥纁繫以繫玉因為飾即繅藉皆𤣥纁繫長尺絢組釋曰上文繅藉尊卑不同此之組繫尊卑一等云采成文曰絢鄭注論語文成章曰絢與此語異義同云繫無事則以繫玉因以為飾者無事謂在櫝之時亦以繫玉因以為飾此組繫亦名繅藉即上文反命之時使者執圭垂繅上介執璋屈繅又曲禮下云執玉其有藉者則裼無藉者則襲鄭注云亦藉繅也裼襲皆據有繅無繅之時是其因以為飾云皆用五采組者以其言絢絢是文章之名經又言皆復無尊卑之别大夫使受命不受辭辭無常孫而説注孫順也大夫使受命不受辭云云正文辭多則史云云受命謂受君命聘於鄰國不受賓主對荅之辭必不受辭者以其口及則言辭無定準案周禮太史内史皆掌䇿書尚書金縢云史乃䇿祝是䇿書祝辭故辭多為文史賓介辭對主人鄭釋旅𤨏𤨏之義辭曰非禮也敢對曰非禮也敢注辭不受也云云曰敢言不敢釋曰辭謂賓辭主人荅謂賓荅主人介則在旁曰非禮也敢故易旅卦初六云旅𤨏𤨏斯其所取災鄭云𤨏𤨏猶小小爻互艮艮小石小小之象三為聘客初與二其介也介當以篤實之人為之而用小人𤨏𤨏然客主人為言不能辭曰非禮不能對曰非禮每者不能以禮行之則其所以得罪是其義也館不於敵者之廟嫌大尊卿館於大夫大夫館於士士館於工商云館者必於廟案上歸饔餼云於廟明其禮皆在廟可知云不館於敵者之廟為大尊也者以其在廟尊則尊矣故就降等而已若又在敵者之廟以上是其大尊云自官師以上有廟有寢者案祭法云適士二廟官師一廟鄭云官師謂中士下士是其官師有廟知廟有寢案周禮𨽻僕云掌五寢之埽除鄭注云五寢五廟之寢天子七廟唯祧無寢詩云寢廟奕奕相連之貌故左𫝊云大叔之廟在道南其寢在道北是其前曰廟後曰寢工商則寢而已者案爾雅釋宫云室有東西廂曰廟注云夾室前堂又云無東西廂有室曰寢注云但有大室是其自士以上有廟者必有寢庶人在官者工商之等有寢者則無廟故祭法云庶士庶人無廟祭於寢是也飱禮輕故不以束帛致賓亦不拜飱不致釋曰君不以束帛致命者對饔餼以束帛致之此不以束帛致草次饌具輕者以其客始至則致之故言草次也對聘曰致饔餼生死俱有禮物又多為重故以此物為輕而不致賔不拜注以不致命釋曰云拜者宰夫朝服設食賓無拜受之文以其不以束帛致訝以迎賓如漢時使者䕶客卿大夫訝大夫士訝士皆有訝注卿使者大夫上介也士衆介也訝主國君所使迎待賓者如今使之䕶客釋曰云卿大夫訝者謂大聘使卿主人使大夫迎士訝者小聘使大夫主人使士迎言皆有訝者自介也下皆迎之云卿使者大夫上介士衆介也者據此篇是侯伯之卿大聘而言其實小聘使大夫亦使士迎之所迎者謂初行聘及饗食燕皆迎之故鄭君無所指定天子有掌訝諸侯使大夫士賓即館訝將公命注使己迎待之命釋曰案秋官掌訝職云賓入館次于舎門外待事于客注云次如今官府更衣處待事于客通其所求索彼謂天子有掌訝之官共承客禮此諸侯使無掌訝是以還遣所使大夫士訝將公命有事通𫝊于君訝執摯以見賓又見之以其摯釋曰云復以私禮見者訝將舎於賓館之外宜相親也者禮掌訝舎于賓之館門外此大夫士君使為訝雖非掌訝之官亦為次舎于賓之館外宜相親故執摯以相見大夫訝者執鴈士訝者執雉案士相見及大宗伯文賓將公事以摯私見訝者賓既將公事復見訝以其摯云以公事聘享問大夫者此並行君物享主國君及問大夫故云公事也云復報也者以向訝者以摯私見已今還以摯私報之圭璧人執曰瑞禮神曰器散文通凡四器者唯其所寶以聘可也釋曰案周禮大宗伯云以玉作六瑞王執鎮圭公執桓圭以上人執之曰瑞又云以玉作六器以禮天地四方謂禮神曰器此四者人所執不言瑞而言器者對文執之曰瑞禮神曰器散文則通雖執之亦曰器是以尚書云五器卒乃復與此文皆稱器云言國獨此以為寶者案周禮天府職凡邦國之玉鎮大寶器藏焉注云玉鎮大寶器玉瑞玉器之美者是其玉稱寶云四器謂圭璋璧琮者是據上經圭璋以行聘璧琮以行享而言此據公侯伯之使者用圭璋璧琮若子男使者聘用璧琮享用琥璜主國之大門外賓次宗人授次次以帷少退于君之次釋曰主國門外以其行朝聘陳賓介皆在大門外故次亦在大門外可知云諸侯及卿大夫之使者次位皆有常處者以其上公九十步侯伯七十步子男五十步使其臣聘問大聘小聘又各降二等其次皆依其步數就西方而置之未行禮之時至於次中至将行禮賓乃出次凡為次君次在前臣次在後故云少退於君之次故云皆有常處賓入門皇升堂讓将授志趨賓入門皇升堂讓将授志趨注皇自莊盛也云云釋曰賓入門皇謂未至堂時升堂讓謂升堂東面向主君之時将授志趨謂賓執玉向楹将授玉之時念鄉入門在庭時執玉徐趨今亦然若降堂後趨進翼如則疾趨也云讓謂舉手平衡也者謂若曲禮云凡奉者當心下又云執天子之器則上衡注云謂高於心國君則平衡注云謂與心平則此亦執國君器也故引之以為證引孔子之執圭者鄉黨論孔子為君聘使法彼是蹜蹜如有循謂徐趨據入彼國廟門執玉行步之時以足容重退之在降堂之下與此趨同将授玉屏氣下階發氣而趨君還而後退下階發氣怡焉再三舉足又趨云發氣舎息也者以将授玉屏氣似不息今既授玉降階縱舎其氣怡然和悦也云至此舉足則志趨卷豚而行也者是釋志趨為徐趨此舉足為疾趨也及門正焉入門鞠躬焉心變見於威儀及門正焉此謂聘訖将更有享而出門時云心變見於威儀者以其貌從心起觀威儀省禍福覩貌可以知心故也執圭入門鞠躬焉如恐失之釋曰亦謂将聘執圭入廟門時云鞠躬焉則鞠躬如也如恐失之者即執輕如不克也云記異説者以上文已記執圭此又記執圭之儀以同記事而言有差異人記事説有不同及享發氣焉盈容者即孔子行享禮有容色一也故注引為證也此發氣即上注云舎息此又記執玉行法與上二記别一人皇且行入門主敬升堂主慎上已二度記執玉行步之法今又云皇且行是别有人更記此行法故云復記執玉異説也皮馬相間君子不以所無為禮凡庭實隨入左先皮馬相間可也注間猶代也云云云左先者以皮馬以四為禮北面以西頭為上故左先入陳也云君子不以所無為禮者案禮器云天不生地不養君子不以為禮言當國有馬而無虎豹皮則用馬或有虎豹皮并有馬則以皮為主而用皮也云畜獸同類可以相代者畜謂馬獸謂虎豹多貨則傷徳故聘享君夫人各二器多貨則傷于徳釋曰此經主論聘享所用圭璋璧琮不得過多之事也云貨天地所化生謂玉也者鄭注周禮九職亦云金玉曰貨布帛曰賄故此注云貨天地所化生謂玉也下注云幣人所造成幣則布帛曰賄對金玉是自然之物也若多之則是主於貨物不取相厲以徳是傷敗其為徳是以圭璧聘享主國君璋琮聘享主國夫人各用一而已也享用帛錦過美則没禮幣美則没禮釋曰此主論享時用束帛故享君用束帛享夫人用束錦皆不得過美云幣人所造成以自覆幣為束帛也者案禮記檀弓伯髙之喪孔氏之使者未至冉子攝束帛乗馬而将之孔子曰異哉徒使我不誠于伯髙鄭注云禮所以副忠信也忠信而無禮何𫝊乎是知自覆者覆忠信而已若更美則主意於財美而禮不見故没禮也云愛之斯欲衣食之君子之情也者兼言食謂以幣欲之君子之情則忠信賄在聘于賄謂視聘禮而為財賄在聘于賄釋曰鄭轉于作為者欲就司儀之文為解故也云言主國禮賓者釋經賄是主國禮賓也云當視賓之聘禮者釋經在聘謂在賓聘財多少云而為之財也者釋經于賄也謂主人視賓多少為財賄報賓云若茍豐之是又傷財也者凡行禮用財者取不豐不儉取于折中若苟且豐多則傷于貪財引周禮者秋官司儀職文案彼注云幣謂享幣也於大國則豐於小國則殺解經各稱其邦而為之幣彼又注云主國禮之如其豐殺之禮解經以其幣為之禮謂賄用束紡禮用束帛乗皮及贈之屬是也鄉飲主人拜賓至此無拜至禮不拜至釋曰此文承執玉帛之下聘臣事據鄉飲酒賓主升堂主人有拜至之禮此賓昨日初至之時主人請賓行禮賓言俟間此時賓已至矣故聘時不拜至是以鄭云以賓不於是始至主人庭實謂設乗馬賓執左馬出主人之庭實則主人遂以出賓之士訝受之此主人之庭實者謂主人禮賓時設乗馬也經云賓執左馬以出三馬在後主人從者牽之遂從賓以出於門外賓之士介迎受之賓覿後有私獻猶以君命致之既覿賓若私獻奉獻将命云猶以君命致之者以經云将命是以知雖是私獻己物與君物同皆以君命致之臣統於君經云兄弟之國則問夫人注及異姓親若兄弟之國則問夫人釋曰云兄弟謂同姓者若魯於晉鄭之等同姓也云若婚姻甥舅有親者若魯取齊女以為舅齊則以魯為甥是有親者也云非兄弟獻不及夫人者以其經云兄弟之國則問夫人則非兄弟問不及夫人可知君有故不見賓則使大夫受若君不見釋曰云他故者病之外或親有哀慘也使大夫受釋曰知受聘享者以其在後雖有覿獻之法聘享在前是以據在先者而言云大夫上卿也者以其卿上大夫故以卿為大夫必知使卿不使下大夫者以其君無故君親受今既有故明使上卿代君受之賓受主國饔餼筮尸祭然後食賜饔唯羹飪筮一尸若昭若穆注云云容父在祭祖釋曰古者天子諸侯行載廟木主大夫雖無木主亦以幣帛主其神是以受主國饔餼故筮尸祭然後食之尊神以求福故也大夫容父在祭祖故孫子祖考兩言僕為祝祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子釋曰經並云孝孫孝子皇祖皇考以其不定故兩言謂上經若昭若穆亦兩言之云僕為祝者大夫之臣攝官也者若然諸侯不攝官使祝祝策矣案定四年祝佗云嘉好之事君行師從卿行旅從則臣無事若君到主國祭饔之時得不攝官乎諸侯亦使人攝是以覲禮云侯氏禆冕釋幣于禰注云釋幣于禰之禮既則祝藏其幣歸乃埋之於祧西階之東大夫使僕攝祝則是本無祝官與諸侯異矣其諸侯禮大祝不行知不使小祝行者以其掌客云羣介行人宰史是諸侯從官不言祝明大小祝俱不行矣賓祭饔餼如少牢饋食禮如饋食之禮釋曰云如少牢饋食之禮者案少牢禮有尊爼籩豆鼎敦之數陳設之儀隂厭陽厭之禮九飯三獻之法上大夫又有正祭於堂儐尸於堂此等皆宜有之至於致爵加爵及獻兄弟等固當略之矣不敢用君之器假主國大夫祭器假器於大夫釋曰案曲禮云大夫士去國大夫寓祭器於大夫士寓祭器於士注云與得用者言寄覬已後還若然卑者不得用尊者之器是以此大夫聘使不得将己之祭器而行致饔餼雖是祭器人臣不敢以君之器為祭器是以聘使是大夫還於主國大夫假祭器而行之朌肉及廋車謂歸胙在下朌肉及廋車釋曰此謂祭訖歸胙在下云廋廋人也車巾車也者案周禮天子夏官有廋人職掌養馬春官有巾車職諸侯雖兼官亦當有廋人巾車既致饔若賓留則旬致稍禮既致饔旬而稍宰夫始歸乗禽日如其饔餼之數云既致饔旬而稍者以其賓客之道十日為正行聘禮既訖合歸一旬之後或逢凶變或主人留之不得時反即有稍禮故下文云既将公事賓請歸注云謂已問大夫事畢請歸不敢自専謙也主國留之享食燕獻無日數盡殷勤也是主人留之是以周禮漿人亦共賓客之稍禮注云稍禮非飱饔之禮留間主稍所給賓客者漿人所給亦六飲而已諸侯相待亦如之是其留間致稍者也乗禽如饔餼數非物四曰乗乗禽乗行之禽也者别言此者欲見此乗非物四曰乗言如其饔餼之數者一牢當一雙故聘義云乗禽日五雙是此饔餼五牢者也云鴈鶩之屬者依爾雅二足而羽若然上介三牢則三雙也士介一牢則一雙也羽謂之禽故以禽為鴈鶩之屬云其賓與上介也者以其下文别有士介故也致禽羞與四時俶獻如致禽禽羞俶獻比注比放也其致之禮如乘禽也禽羞云云俶始也云云釋曰云禽羞謂成熟有齊和者以其稱羞謂若庶羞内羞之等故稱禽則以鴈鶩等為之故以成熟解之聘義謂之時賜者案聘義云燕與時賜無數時賜謂四時珍異以賜諸賓客與此俶獻是一物饗使者無加籩豆此有非正法凡致禮皆用其饗之加籩豆云其其賓與上介也者案上經賓壹食壹饗上介若食若饗唯士介不言饗故知其中唯有賔與上介耳云加籩豆謂其實也亦實于罋者案致饔餼醢是豆實實于罋明此饗之豆實亦實于罋可知也案昭六年夏季孫宿如晉拜莒田也晉侯享之以如籩武子退使行人告曰小國之事大國也苟免於討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也此中致饗有加籩豆者饗使者無加籩豆之正禮此云加籩豆者殷勤之義也云饗禮今士者以其食禮在知其豆數饗禮亡無文以知之無饔者無饗禮謂士介唯有餼無饔者無饗禮釋曰文承饗下故鄭以士介無饗禮解之以其賓與上介饔餼俱有故有饗士介唯有餼而已無饔故無饗禮賓請歸主國留之饗食燕獻既将公事賓請歸釋曰云已問大夫者請問三卿與下大夫嘗使於彼國幣所及皆是君命及以君物行禮者皆是公事事訖故請歸也云主國留之饗食燕獻無日數盡殷勤也者亦謂至旬賓乃将歸主君乃留賓有此饗食燕獻之等故燕禮注云今燕又宜獻焉是也賓於大小禮皆拜唯稍不拜凡賓拜于朝訝聽之注拜賜也唯稍不拜案上經云賓三拜乗禽於朝訝聽之遂行舎于郊又案司儀云明日客拜禮賜遂行是臨行大小禮皆拜賜則知唯米稟芻薪等不拜也饗食君為主燕則上介為賓賓為苟敬燕則上介為賓賓為茍敬釋曰云饗食君親為主尊賓也者以其饗食在廟為賓故君親為主至後燕禮在寢又以醉為度崇於恩殺於敬故賓辭而使介為賓也以苟敬為小敬者以阼階西近主為位諸公坐位故云小敬對户牖南面為大敬云更降迎其介以為賓者介在廟門内西北面降至庭迎之云不與亢禮也者略取燕義文解君不親為獻主而使宰夫之意也云主人所以致敬者自敵以上者謂兩君相見兩大夫兩士以上則主人親獻也無行則重賄反幣謂特來非歴聘無行則重賄反幣注無行謂獨來復無所之也必重其賄與反幣者使者歸以得禮多為榮所以盈聘君之意也反幣謂禮玉束帛乗皮所以報聘君之享禮也昔秦康公使西乞術聘于魯辭孫而説襄仲曰不有君子其能國乎厚賄之此謂重賄反幣者也今文曰賄反幣釋曰云重其賄即上賄在聘于賄是也反幣謂上禮玉束帛乗皮是也云秦康公者案文公十二年左氏𫝊云秦伯使西乞術來聘云云是也此特來非􅊗聘歴聘則吴公子札聘於上國聘齊聘魯是賛拜夫人聘享亦言以社稷故君以社稷故在寡小君拜釋曰云言君以社稷故者夫人與君體敵不敢當其恵也者釋經云社稷故以其禮記哀公問孔子云取夫人為社稷主婦人無外事天地并社稷后夫人雖不與以夫婦一體故夫人亦得云社稷主是其云社稷故者見夫人與君體敵今夫人使致禮來主人不敢當下文云君貺寡君延及二三老是與君不敵敢當之也賓将去留皮帛以禮主人不致不拜賓於館堂楹間釋四皮束帛賓不致主人不拜注賓將遂去是館留禮以禮主人所以謝之也不致不拜不以将别崇新敬也釋曰若賓敬主宜致主人敬賓宜拜皆是崇敬若致與拜即是崇新敬故不為若鄉飲酒送賓賓不荅禮有終相類也使者有罪則執今過輕餼以愧之云過則餼之謂禮有失誤故引聘義使者聘而誤主君云云不言罪者罪将執之者春秋之義聘賓有罪皆執之若然上經云無罪饗之有罪非但不饗又執之此過則餼之雖不饗猶生致過輕故也若然上云罪下云過互見其義也将饗食使者有大客後至則廢有大客後至則先客不饗食致之釋曰此據聘禮而言則無君朝之事若然則前有小國之卿大夫來聘将行饗食有大國卿大夫來聘則廢小國饗食以其卑不與尊齊禮惟大聘為神位有几筵惟大聘有几筵釋曰案上經云几筵既設擯者出請命者行聘享及私覿禮畢云宰夫徹几改筵是行聘享為神位今小聘不為神位屈也儀禮要義卷二十四
